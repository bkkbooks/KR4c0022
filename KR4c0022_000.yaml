  text: 欽定四庫全書集部二
  hash: sha256:12d8190cadcf5eac3a9a3b81ae053c873dee29480bf15c1526bdc2f7417fab40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0022_WYG_000-1a, image: WYG1071/WYG1071-0001a.png}
body:
  text: 王右丞集箋注别集類一唐提要臣等謹案王右丞集箋注二十八巻附録一巻國朝趙殿成撰殿成字松谷仁和人王維集舊有顧起經分類注本但注詩而不及文詩注亦間有舛漏殿成是本初定稿於雍正戊申成書於乾隆丙辰鉤稽考訂定為古體詩六巻近體詩八巻皆以元劉辰翁評本所載為斷其别本所増他書互見者則為外編一巻其雜文則釐為十三巻併為箋注又以王縉進表代宗批答唐書本傳世系遺事及同時唱和後人題詠為一巻弁之於首以詩評畫録年譜為一巻綴之於末其年譜亦本傳世系之類後人題詠亦詩評畫録之類而一置於後一置於前編次殊為未協又集外之詩既為外編其論畫諸篇亦集外之文疑以傳疑者而混於文集不復分别體例亦未畫一然排比有緒終較他本為精審其箋注往往捃拾類書不能深究出典即以開巻而論閶闔字見楚詞而引三輔黄圖八荒字見淮南子而引章懐太子後漢書註胡牀字見世説新語桓伊戴淵事而引張端義貴耳集朱門字亦見世説新語支遁語而引程大昌演繁露雙鵠字自用古詩願為雙黄鵠語而引謝維新合璧事類絶迹字見莊子而引曹植與楊修書皆未免舉末遺本然於顧註多所訂正又維本精於佛典顧注多未及詳殿成以王琦熟於三藏屬其助成亦頗補所未備固可與顧注相輔而行也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀王右丞集箋注序傳稱詩以道性情人之性情不一以是發於謳吟歌詠之間亦遂參差其不同盖有不知所以然而然者唐之詩傳者幾百家其善為行樂之詞與工為愁苦之什相半雖于性情各得所肖而求其不悖夫温柔敦厚之教者未易數數覯也右丞崛起開元天寳之間才華炳煥籠罩一時而又天機清妙與物無競舉人事之升沉得失不以膠滯其中故其為詩真趣洋溢脫去凡近麗而不失之浮樂而不流於蕩即有送人逺適之篇懐古悲歌之作亦復渾厚大雅怨尤不露茍非實有得於古者詩教之㫖焉能至是乎乃論者以其不能死禄山之難而遽譏議其詩以為萎弱而少氣骨抑思右丞之服藥取痢與甄濟之陽為歐血苦節何殊而一則竟脫於樊籠一則不免於維縶者遇之有幸有不幸也普施拘禁凝碧悲歌君子讀其詞而原其志深足哀矣即謂揆之致身之義尚少一死至於詞章之得失何與而亦波及以微辭焉毋乃過歟又古今來推許其詩者或稱趣味澄夐若清流貫達或稱如秋水芙蕖倚風自笑或稱出語妙處與造物相表裏之類揚詡亦為曲當若其詩之温柔敦厚獨有得於詩人性情之美惜前人未有發明之者詩註雖有數家頗多舛鑿至於文筆類皆缺如鄙心有所未盡爰是校理舊文芟柞浮蔓捜遺補逸不欲為空謬之談亦不敢為深文之說總期無失作者本來之㫖而已獨是能薄材謭讀書未廣縱有一隅之見譬之管窺筐舉所得幾何幸而生逢聖世文教誕敷炳炳麟麟典籍于今大備而博物洽聞之彦接武於蘭臺麟閣之間可以折中而問難行將訪其所末知訂其所未合以定斯編之闕失其或有雌霓謬呼金根妄易薪歌延瀨之未詳者茍有見聞克以應時改定是固區區之志焉矣仁和趙殿成欽定四庫全書王右丞集箋注巻首仁和趙殿成撰弁言王縉進王右丞集表臣縉言中使王承華奉宣進止令臣進亡兄故尚書右丞維文章恩命忽臨以驚以喜退因編録又竊感傷臣兄文詞立身行之餘力當官堅正秉操孤直縱居要劇不忘清浄實見時輩許以髙流至于晚年彌加進道端坐虚室念兹無生乗興為文未嘗廢業或散朋友之上或留篋笥之中臣近捜求尚慮零落詩筆共成十巻今且隨表奉進曲承天鑒下訪遺文魂而有知荷寵光於幽穸殁而不朽成大名於聖朝臣不勝感戴悲歡之至謹奉表以聞臣縉誠惶誠恐頓首頓首謹言文苑英華本奉宣進止作奉先進㫖令臣進亡兄故尚書右丞維文章作應是王維文賦並仰録冩進上者當官堅正作常持堅正秉操孤直作秉操孤貞未嘗廢業作未曽廢筆隨表奉進作隨表進上誠惶誠恐作誠惶誠懼銀青光禄大夫尚書兵部侍郎兼御史大夫臣王縉表上代宗皇帝批答手敇敕卿之伯氏天下文宗位歴先朝名髙希代抗行周雅長揖楚辭調六氣於終編正五音於逸韻泉飛藻思雲散襟情詩家者流時論歸美誦於人口久鬰文房歌以國風宜登樂府眎朝之後乙夜將觀石室所蔵殁而不朽柏梁之㑹今也則亡乃眷棣華克成編録聲猷益茂歎息良深劉昫唐書本傳王維字摩詰太原祁人父處亷終汾州司馬徙家於蒲遂為河東人維開元九年進士擢第事母崔氏以孝聞與弟縉俱有俊才博學多藝亦齊名閨門友悌多士推之歴右拾遺監察御史左補闕庫部郎中居母䘮柴毁骨立殆不勝䘮服闋拜吏部郎中天寳末為給事中禄山陥兩都𤣥宗出幸維扈從不及為賊所得維服藥取痢偽稱瘖疾禄山素憐之遣人迎置洛陽拘於普施寺廹以偽署禄山宴其徒于凝碧宮其工皆梨園弟子教坊工人維聞之悲惻潛為詩曰萬戸傷心生野煙百官何日再朝天秋槐花落空宮裏凝碧池頭奏管絃賊平陥賊官三等定罪維以凝碧詩聞于行在肅宗嘉之㑹縉請削已刑部侍郎以贖兄罪特宥之責授太子中允乾元中遷太子中庶子中書舍人復拜給事中轉尚書右丞維以詩名盛于開元天寳間昆仲宦遊兩都凡諸王駙馬豪右貴勢之門無不拂席迎之寧王薛王待之如師友維尤長五言詩書畫特臻其妙筆蹤措思參于造化而創意經圖即有所缺如山水平逺雲峰石色絶迹天機非繪者之所及也人有得奏樂圖不知其名維視之曰霓裳第三疊第一拍也好事者集樂工按之一無差咸服其精思維弟兄俱奉佛居常蔬食不茹葷血晩年長齋不衣文綵得宋之問藍田别墅在輞口輞水周于舍下别漲竹洲花塢與道友裴廸浮舟往來彈琴賦詩嘯詠終日嘗聚其田園所為詩號輞川集在京師日飯十數名僧以𤣥談為樂齋中無所有惟茶鐺藥臼經案繩牀而巳退朝之後焚香獨坐以禪誦為事妻亡不再娶三十年孤居一室屏絶塵累乾元二年七月卒臨終之際以縉在鳳翔忽索筆作别縉書又與平生親故作别書數幅多厲朋友奉佛修心之㫖捨筆而絶代宗時縉為宰相代宗好文常謂縉曰卿之伯氏天寳中詩名冠代朕嘗于諸王座聞其樂章今有多少文集卿可進來縉曰臣兄開元中詩百千餘篇天寳事後十不存一比于中外親故間相與編綴都得四百餘篇翌日上之帝優詔褒賞宋祁唐書本傳王維字摩詰九嵗知屬辭與弟縉齊名資孝友開元初擢進士調大樂丞坐累為濟州司倉參軍張九齡執政擢右拾遺歴監察御史母䘮毁㡬不生服除累遷給事中安禄山反𤣥宗西狩維為賊得以藥下痢陽瘖禄山素知其才迎置洛陽廹為給事中禄山大宴凝碧池悉召梨園諸工合樂諸工皆泣維聞悲甚賦詩悼痛賊平皆下獄或以詩聞行在時縉位巳顯請削官贖維罪肅宗亦自憐之下遷太子中允久之遷中庶子三遷尚書右丞縉為蜀州刺史未還維自表巳有五短縉五長臣在省戸縉逺方願歸所任官放田里使縉得還京師議者不之罪久乃召縉為左散騎常侍上元初卒年六十一疾甚縉在鳯翔作書與别又遺親故書數幅停筆而化贈秘書監維工草𨽻善畫名盛于開元天寳間豪英貴人虛左以迎寧薛諸王待若師友畫思入神至山水平逺雲勢石色繪工以為天機所到學者不及也客有以按樂圖示者無題識維徐云此霓裳第三疊最初拍也客未然引工按曲乃信兄弟皆篤志奉佛食不葷衣不文綵别墅在輞川地竒勝有華子岡欹湖竹里館栁浪茱萸沜辛夷塢與裴廸游其中賦詩相酬為樂䘮妻不娶孤居三十年母亡表輞川第為寺終𦵏其西寳應中代宗謂縉曰朕嘗于諸王座聞維樂章今傳㡬何遣中人王承華往取縉裒集數十百篇上之成按國史補云人有畫奏樂圖維熟視而笑或問其故曰此是霓裳羽衣曲第三疊第一拍好事者集樂工騐之無一差謬新舊二史皆採其事入傳中圖畫見聞志亦載此事云維嘗至招國坊庾敬休宅見屋壁有畫按樂圖維熟視而笑或問其故維答曰此所奏曲適到霓裳羽衣第三疊第一拍也好事者集樂工驗之無一差者夢溪筆談云國史補言客有以按樂圖示王維維曰此霓裳第三疊第一拍也客未然引工按曲乃信此好竒者為之凡畫奏樂止能畫一聲不過金石管絃同用一字耳何曲無此聲豈獨霓裳第三疊第一拍也或疑舞節及他舉動拍法中别有竒聲可驗此亦未然霓裳曲凡十三疊前六疊無拍至第七疊方謂之疊遍自此始有拍而舞作故白樂天詩云中序擘騞初入拍中序即七疊也至第三疊安得有拍但言第三疊第一拍即其妄也歐陽修唐書宰相世系表河東王氏儒賢趙州司馬知節揚州司馬胄協律郎處亷汾州司馬維字摩詰尚書右丞縉字夏卿相代宗繟江陵少尹紘紞太常少卿遺事計二十六則王維右丞年未弱冠文章得名性閑音律妙能琵琶遊歴諸貴之間尤為岐王之所眷重時進士張九臯聲稱籍甚客有出入公主之門者為其地公主以詞牒京兆試官令以九臯為觧頭維方將應舉言於岐王仍求庇借岐王曰貴主之强不可力争吾為子畫焉子之舊詩清越者可録十篇琵琶新聲之怨切者可度一曲後五日至吾維即依命如期而至岐王謂曰子以文士請謁貴主何門可見哉子能如吾之教乎維曰謹奉命岐王乃出錦繡衣服鮮華竒異遣維衣之仍令齎琵琶同至公主之第岐王入曰承貴主出内故擕酒樂奉醼即令張筵諸伶旅進維妙年潔白風姿都美立於行公主顧之謂岐王曰斯何人哉答曰知音者也即令獨奉新曲聲調哀切滿坐動容公主自詢曰此曲何名維起曰號鬰輪袍公主大竒之岐王因曰此生非止音律至於詞學無出其右公主尤異之則曰子有所為文乎維則出獻懐中詩巻呈公主公主既讀驚駭曰此皆兒所誦習常謂古人佳作乃子之為乎因令更衣昇之客右維風流藴藉語言諧戯大為諸貴之欽矚岐王因曰若令京兆府今年得此生為解頭誠為國華矣公主乃曰何不遣其應舉岐王曰此生不得首薦義不就試然已承貴主論託張九臯矣公主笑曰何預兒事本為他人所託顧謂維曰子誠取解當為子力致焉維起謙謝公主則召試官至第遣宫婢傳教維遂作解頭而一舉登第矣及為大樂丞為伶人舞黄師子坐出官黄師子者非一人不舞也天寳末禄山初陷西京維及鄭䖍張通等皆處賊庭洎克復俱囚於宣楊里楊國忠舊宅崔圓因召於私第令畫數壁當時皆以圓勲貴無二望其救解故運思精巧頗絶其藝後由此事皆從寛典至于貶黜亦獲善地今崇義里竇丞相易直私第即圎舊宅也畫尚在焉明皇雜録云太和中畫尚存維累為給事中禄山授以偽官及賊平弟縉為北都副留守請以已官爵贖之由是免死累為尚書右丞于藍田置别業留心釋典焉出集異記太平廣記王維有俊才尤工五言詩獨歩於當時染翰之後人皆諷誦冊府元龜開元日通不以姓而可稱者燕公曲江太尉魯公不以名而可稱者宋開府陸兖公王右丞房太尉郭令公崔太傅楊司徒劉忠州楊崖州段太尉顔魯公國史補夫古以名徳稱占其官謚者甚稀前以詩稱者若謝吏部何水部陶彭澤鮑參軍之類唐朝以詩稱若王江寧宋考功韋蘓州王右丞杜員外之類裴敬翰林學士李白墓碑唐司馬承禎與陳子昂盧蔵用宋之問王適畢構李白孟浩然王維賀知章為仙宗十友海録碎事韋抗所表奉天尉梁昇卿新豐尉王倕華原尉王燾為僚屬後皆為顯人它所辟舉如王維王縉崔殷等皆一時選云唐書韋抗傳王縉好與人作碑銘有送潤毫者誤叩其兄門維曰大作家在那邉盧氏雜記王河南維或有人報云公除右轄王曰吾罟此官慮被人呼為不解作詩王右丞大唐傳竇臮述書賦其稱右丞云詩興入神畫筆雄精李將軍世稱髙絶淵㣲已過薛少保時許美潤合極不如竇蒙註云右丞王維字摩詰瑯琊人詩通大雅之作山水之妙勝于李思訓弟太原少尹縉文筆泉藪善草𨽻書功超薛稷二公名望首冠一時時議論詩則曰王維崔顥論筆則曰王縉李邕祖詠張說不得預焉幼弟紞有兩兄之風閨門之内友愛之極成按右丞書畫之妙新舊兩史俱兼稱之宋朱長文續書斷所推能品六十六人右丞與焉藝苑巵言稱兄弟善書者亦數王維王縉乃世徒美其畫而不及其書湮没無傳惜哉王維字摩詰官尚書右丞家于藍田輞川兄弟並以科名文學冠絶當時故時稱朝廷左相筆天下右丞詩其畫山水松石蹤似吳生而風致標格特出今京都千福寺西塔院有掩障一合畫青楓樹一圖又嘗冩詩人襄陽孟浩然馬上吟詩圖見傳于世復畫輞川圖山谷鬰盤雲飛水動意出塵外怪生筆端嘗自題詩云當世謬詞客前身應畫師其自負也如此慈恩寺東院與畢庶子鄭廣文各畫一小壁時號三絶故庾右丞宅中有壁畫山水兼題記亦當時之妙山水松石並居上品唐朝名畫録王維字摩詰太原人年十九進士擢第與弟縉並以詞學知名官至尚書右丞有髙致信佛理藍田南置别業以水木琴書自娛工畫山水體渉今古人家所蓄多是右丞指揮工人布色原野簇成逺樹過于樸拙復務細巧翻更失真清源寺壁上畫輞川筆力雄壯常自製詩曰當世謬詞客前身應畫師不能捨餘習偶被時人知誠哉是言也余曾見破墨山水筆跡勁爽歴代名畫記唐王維善畫山水人物筆蹤雅壯體渉古今嘗于清凉寺壁畫輞川圖巖岫盤鬰雲水飛動自製詩曰當世謬詞客前身應畫師不能捨餘習偶被時人知圖畫見聞志鄭嵎津陽門詩云煙中壁碎摩詰畫雲間寺失𤣥宗詩註云石甕寺有紅樓在佛殿之西巖下臨絶壁樓中有𤣥宗題詩草八分每一篇一體王右丞山水兩壁寺毁之後皆失之矣慈恩寺大殿東廊從北第一院鄭䖍畢宏王維等白畫歴代名畫記李林甫奏分其宅東南隅立為嘉猷觀觀中有精思院王維鄭䖍吳道子皆有畫壁長安志王維過郢州畫孟浩然像于刺史亭因曰浩然亭咸通中刺史鄭諴謂賢者名不可斥更署曰孟亭唐書王維畫品妙絶于山水平逺尤工今昭國坊庾敬休屋壁有之國史補韓幹藍田人少時嘗為貰酒家送酒王右丞兄弟未遇每一貰酒漫遊幹常徵債于王家戯畫地為人馬右丞精思丹青竒其意趣廼嵗與錢二萬令學畫十餘年酉陽雜俎王維以黄磁斗貯蘭蕙養以綺石累年彌盛汗漫録雲仙雜記王維輞川林下坐用雷門四老石燈滅則石中鑽火事畧雲仙雜記王維居輞川宅宇既廣山林亦逺而性好温潔地不容浮塵日有十數掃飾者使兩童専掌縳帚而有時不給洛陽要記雲仙雜記王維為岐王畫一大石信筆塗抹自有天然之致王寳之時罘罳間獨坐注視作山中想悠然有餘趣數年之後益有精彩一旦大風雨中雷電俱作忽拔石去屋宇俱壞不知所以後見空軸乃知畫石飛去耳憲宗朝髙麗遣使言幾年月日大風雨中神嵩山上飛一竒石下有王維字印知為中國之物王不敢留遣使奉獻上命羣臣以維手蹟較之無毫髪差謬上始知維畫神妙徧索海内蔵之宫中地上俱灑雞狗血厭之恐飛去也丹青記瑯嬛記世傳七賢過闗圖云是開元冬雪後張說張九齡李白李華王維鄭䖍孟浩然出藍田闗遊龍門寺鄭虔圖之虞伯生有題孟浩然像詩風雪空堂破帽温七人圖裏一人存又有槎溪張輅詩二李清狂狎二張唫鞭遥指孟襄陽鄭䖍筆底春風滿摩詰圖中詩興長是必有所傳云玉堂漫筆成按東觀餘論有滕子濟所蔵唐人出遊圖乃宋之問王維李白髙適史白岑參也䟦云昔人深于畫者得意忘象其形模位置有不可以常法觀者顧陸王吳之蹟時有若此如雪與蕉同景桃李與芙蓉並秀或手大于面或車濶于門使俗工睨之未免随變安於拙目故九方臯之相馬畧其𤣥黄取其駔雋惟真賞者獨知之此㢧寫唐人出游狀據其名題或有弗同時者而揚鑣並驅睇眄相語豈亦于世得意忘象者乎求畫者主名弗可知要非俗手作也云云畫意亦竒并附錄於此西安府藍田縣有王維母博陵縣君崔氏及維墓俱在鹿原寺西陜西志王右丞祠在藍田縣輞川鹿苑寺陜西志元丞相載妻王氏字韞秀王縉相公之女維右丞之姪初王相公鎮北京以韞秀嫁元載嵗久而見輕怠王氏謂夫曰何不增學妾有奩幌資粧盡為紙墨之費王氏父母或未之知親屬以載夫婦皆乞兒厭薄之甚元乃游秦為詩别妻曰年來誰不厭龍鍾雖在侯門似不容看取海山寒翠樹苦遭霜霰到秦封妻請偕行曰路掃饑寒跡天哀志氣人休零離别淚擕手入西秦元秀才到京屢陳時務深得上㫖肅宗擢拜中書王氏喜元郎入相寄諸妹詩曰相國巳随麟閣貴家風第一右丞詩筓年解笑鳴機婦恥見蘇秦富貴時元公肅宗代宗兩朝宰相貴盛無比廣葺亭臺交遊貴族客候其門而或間阻王氏復為一篇以諷之曰楚竹燕歌動畫梁春闌重換舞衣裳孫𢎞開館招佳客知道榮華不久長元公見詩於是稍減威望太原内外親族悉來謁賀韞秀置於閒院忽因晴霽日景以青紫縧四十條毎條長三十丈皆施羅綺錦繡之飾每條縧下排金銀爐二十枚皆焚異香亘其服乃命諸親戚西院閒步韞秀問是何物侍婢對曰今日相公及夫人曬曝衣服王氏謂諸親曰豈料乞索兒婦還有兩事盖形粗衣也于是諸親羞赧稍稍而辭韞秀每分衣服器飾于他人惟不及太原之骨肉且曰兒非不禮于姑姊其奈當時見辱何洎元公貪恡為心竟招罪戾臺閣彈奏而亡其家韞秀少有識量節槩因元丞相已謝上令入宫備彤管箴規之任歎曰王家十三娘二十年太原節度使女十六年宰相妻誰能書得長信昭陽之事死亦幸矣堅不從命或曰上宥連罪或云京兆笞而斃矣雲溪友議唐人所撰說部多本自傳聞較以正史每有乖錯雲溪友議以元載妻為王縉之女洎考唐書乃王忠嗣女非縉女也不知范氏何所據而云然豈因家風第一右丞詩之句而致有此訛耶若雲仙雜記若瑯嬛記皆鑿空而作絶無所本尤謬妄不可信宜皆削而勿録然觀夢溪筆談之論奏樂圖則正史且不能無議矣况稗官野乗乎古人著述經文緯意成一家之言者雖所聞異詞往往不肯割愛彼好竒如司馬子長者無論即韓嬰註詩孟喜說易公羊髙穀梁赤傳春秋皆不免斯弊又何論紀錄昔人之一言一行耶偶于暇日捜録右丞遺事耳漁目獵真贋並存自笑盲賈人到寳洲見一異物即拾取入槖眀眼者得無以此見譏歟藍上茅茨期王維補闕儲光羲山中人不見雲去夕陽過淺瀨寒魚少藂蘭秋蝶多老年疎世事幽性樂天和酒熟思才子溪頭望玉珂答王十三維儲光羲門生故來往知欲命浮觴忽奉朝青閣回車入上陽落花滿春水疎栁映新塘是日歸来暮勞君奏雅章留别王侍御維孟浩然寂寂竟何待朝朝空自歸欲尋芳草去惜與故人違當路誰相假知音世所稀祗應守寂寞還掩故園扉奉贈王中允維杜甫中允聲名久如今契濶深共傳收庾信不比得陳琳一病縁明主三年獨此心窮愁應有作試誦白頭吟崔氏東山草堂杜甫愛汝玉山草堂静髙秋爽氣相鮮新有時自發鐘磬響落日更見漁樵人盤剥白鵶谷口栗飯煮青泥坊底芹何為西莊王給事柴門空閉鎻松筠解悶杜甫不見髙人王右丞藍田丘壑蔓寒藤最傳秀句寰區滿未絶風流相國能自註右丞弟今相國縉故王維右丞堂前芍藥花開悽然感懐錢起芍藥花開出舊闌春衫掩淚再來看主人不在花長在更勝青松守嵗寒題清源寺王右丞宅陳跡耿湋儒墨兼宗道雲泉結舊廬孟城今寂寞輞水自紆餘内學銷多累西園易故居深房春竹老細雨夜鐘疎陳迹留金地遺文在石渠不知登座客誰得蔡邕書過王右丞書堂二首儲嗣宗澄潭昔卧龍章句世為宗獨步聲名在千巖水石空野禽悲灌木落日弔清風後學攀遺趾秋山聞草蟲萬樹影參差石牀藤半垂螢光雖散草鳥跡尚臨池風雅傳今日雲山想昔時感深蘓屬國千載五言詩右丞昔陥賊庭故有此句過胡居士覩王右丞遺文司空曙舊日相知盡深居獨一身閉門維有雪看竹永無人每許前山隠曾隣陋巷貧題詩今尚在蹔為拂流塵王維終南山堂元吳鎮昔人謝政後生事此山中樹灑空堂雨泉飛隔浦風喜無舟楫至旋有鶴猿通應識無聲妙臨窗展未窮讀右丞五言明李日華紫禁神仙侶青霄侍史郎明心寒水骨妙語出天香煙壑從疎散花洲坐渺茫菁華時攬擷珠玉亂輝光輞川謁王右丞祠明敖英蜀棧青騾不可攀孤臣無計出秦闗華清風雨蕭蕭夜愁殺江南庾子山王右丞集箋注巻首
