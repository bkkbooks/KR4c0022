body:
  text: 王右丞集箋注巻一仁和趙殿成撰古詩十首奉和聖製天長節賜宰臣歌應制太陽升兮照萬方開閶闔兮臨玉堂儼冕旒兮垂衣裳金天浄兮麗三光彤庭曙兮延八荒徳合天兮禮神遍靈芝生兮慶雲見唐堯后兮稷卨臣匝宇宙兮華胥人盡九服兮皆四鄰乾降瑞兮坤獻珍獻一作降天長節揮麈録唐明皇實錄云開元十七年秋八月上降誕之日大置酒合樂燕百官于花萼樓下尚書左丞相源乾曜右丞相張說率百官上表願以八月五日為千秋節著之甲令布于天下咸使燕樂休假三日詔從之誕日建節蓋肇于此天寶七載八月已亥詔改為天長節太陽後漢書日者太陽之精人君之象閶闔三輔黄圖宫之正門曰閶闔玉堂漢書玉堂金門至尊之居揚雄觧嘲歴金門上玉堂吕延濟註金門天子門也玉堂天子殿也金天唐人多使金天字即秋天也秋于五行屬金故曰金天三光初學記日月星謂之三辰亦曰三光彤庭班固西都賦元墀釦砌玉階彤庭張銑註彤赤色也以彤漆飾庭八荒章懐太子後漢書註八荒八方荒忽極逺之地慶雲漢書若煙非煙若雲非雲郁郁紛紛蕭索輪囷是為慶雲慶雲見喜氣也成按靈芝生慶雲見皆天寳七載間實事見十巻詩題及註華胥列子黄帝退而閒居大庭之館齋心服形三月不親政事晝寢而夢遊于華胥氏之國華胥氏之國在弇州之西台州之北不知斯齊國㡬千萬里盖非舟車足力之所及神遊而已其國無帥長其民無嗜慾自然而已不知樂生不知惡死故無夭殤不知親已不知疎物故無愛憎不知背逆不知向順故無利害都無所愛憎都無所畏忌入水不溺入火不熱斫撻無傷痛指摘無痟癢乗空如履實寢虛若處牀雲霧不硋其視雷霆不亂其聴美惡不滑其心山谷不躓其步神行而已黄帝既寤怡然自得召天老力牧太山稽告之曰朕閒居三月齋心服形思有以養身治物之道弗獲其術疲而睡所夢若此今知至道不可以情求矣朕知之矣朕得之矣而不能以告若矣又二十有八年天下大治㡬若華胥氏之國九服周禮乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服登樓歌聊上君兮髙樓飛甍鱗次兮在下俯十二兮通衢綠槐參差兮車馬郤瞻兮龍首前眺兮宜春王畿欎兮千里山河壯兮咸秦舍人下兮青宫據胡牀兮書空執㦸疲於下位老夫好隠兮牆東亦幸有張伯英草聖兮龍騰虬躍擺長雲兮捩回風琥珀酒兮彫胡飯君不御兮日將晩秋風兮吹衣夕鳥兮爭返孤砧發兮東城林薄暮兮蟬聲逺時不可兮再得君何為兮偃蹇飛甍鮑照詩京城十二衢飛甍各鱗次李周翰注甍屋簷也若魚鱗之相次龍首水經注髙祖在闗東令蕭何成未央宫何斬龍首山而營之山長六十餘里頭枕于渭尾達樊川頭髙二十丈尾漸下髙五六丈土色赤而堅云昔有黒龍從南山出飲渭水其行道因成山跡元和郡縣志龍首山在京兆府長安縣北一十里宜春史記正義括地志云秦宜春宫在雍州萬年縣西南三十里宜春苑在宫之東杜之南雍録宜春之名漢史凡三出其實止為兩地有曰宜春苑者地屬下杜有曰宜春宫者即下杜苑中宫皆秦剏也有曰宜春觀者則在鄠縣漢武帝之所造也雖三其名而實止兩地也東方朔傳曰武帝東遊宜春師古曰宜春宫也在長安城東南上林賦曰息宜春師古曰宫名在杜縣東即唐曲江也揚雄傳武帝東遊宜春師古曰宜春近下杜也史記秦紀曰子嬰𦵏二世杜南宜春苑司馬相如從武帝至長楊獵還過宜春奏賦以哀二世其賦曰臨曲江之隑州望南山之差参師古曰曲岸之洲曲江也故賦末云弔二世持身之不謹兮墓蕪穢而不修也參數者言之則二世之所𦵏相如之所賦漢之曲洲唐之曲江皆此下杜之宜春也其苑若宫皆秦創而漢唐因之也至于宜春觀者則在長安之西鄠縣澇渼二水之旁上林故地也水經曰澇水逕漢宜春觀合渼陂入渭師古曰觀在鄠縣十道志曰漢武帝所造也又合此數語者而求之則宜春之觀在漢城之西秦上林苑中而下杜之宜春自在漢城東南其别甚明也說者誤以下杜之宫為鄠縣之觀則失之矣故師古于東方朔傳眀辨之曰在鄠縣者自是宜春觀耳在長安城西豈得言東遊也其說極為允篤貢禹傳元帝用禹言罷宜春下苑以假貧民此則下杜之苑矣王畿周禮國方千里曰王畿舍人唐書百官志東宫官有中舍人二人正五品下太子舍人四人正六品上通事舍人八人正七品下青宫神異經東方外有東眀山有宫焉左右有闕而立其髙百尺建以五色青石為牆面一門門有銀榜以青石碧鏤題曰天地長男之宫後人稱太子宫曰青宫本此胡牀貴耳録今之交椅古之胡床也胡三省通鑑註胡床即今之交牀隋惡胡字改曰交牀今之交椅是也書空晉書殷浩雖被黜放口無怨言夷神委命談詠不輟雖家人不見其有流放之慼但終日書空作咄咄怪事四字而已執㦸曹子建與楊徳祖書昔揚子雲先朝執㦸之臣耳潘岳夏侯常侍誄執㦸疲揚長沙投賈牆東後漢書王君公遭亂儈牛自隐時人為之論曰避世牆東王君公草聖晉書漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔寔亦皆稱工𢎞農張伯英者因而轉精其巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號忩忩不暇草書寸紙不見遺至今世尤寳其書韋仲將謂之草聖長雲鮑照蕪城賦矗似長雲捩玉篇捩力計力結二切抝捩也回風楚辭悲回風之揺蕙兮王逸註回風謂之飄風彫胡飯西京雜記菰之有米者長安人謂為彫胡鄭樵通志畧彫蓬者米茭也其米謂之彫胡可作飯宋玉諷賦為臣炊彫胡之飯不御班媫妤賦君不御兮誰為容蔡邕獨斷御者進也凡衣服加于身飲食入于口妃妾接于寢皆曰御砧韻㑹碪知林切音與斟同搗繒石或作砧林薄楚辭露申辛夷死林薄兮王逸註􅓜木曰林草木交錯曰薄張衡西京賦蕩川瀆簸林薄薛綜註林薄草木􅓜生也再得楚辭時不可兮再得偃蹇十六國春秋欲偃蹇考槃以待通者雙黄鵠歌送别原註時為節度判官在涼州作天路來兮雙黄鵠雲上飛兮水上宿撫翼和鳴整羽族不得已忽分飛家在玉京朝紫微主人臨水送將歸悲笳嘹唳垂舞衣賔欲散兮復相依㡬往返兮極浦尚徘徊兮落暉岸上火兮相迎將夜入兮邊城鞍馬歸兮佳人散悵離憂兮獨含情黄鵠合璧事類鵠禽之大者色白又有黄者善髙翔湖海江漢間有之天路張衡西京賦要羨門乎天路雲飛水宿左思蜀都賦雲飛水宿哢吭清渠撫翼傅休奕釣竿篇撫翼翔太清羽族潘岳射雉賦樂羽族之羣飛劉良註羽族鳥之族類也玊京葛洪枕中書元始天王在天中心之上名曰玉京山山中宫殿並金玉飾之紫微魏書老子上處玉京為神王之宗下在紫㣲為飛仙之主臨水楚辭登山臨水兮送將歸悲笳魏文帝與吴質書清風夜起悲笳微吟張銑註笳類笛韻㑹笳胡人捲蘆葉吹之樂書云胡笳似觱篥而無孔後世鹵簿用之世言伯陽避入西戎所作晉有大箛小箛盖其遺製極浦楚辭望涔陽兮極浦王逸註極逺也浦水涯也離憂楚辭思公子兮徒離憂劉良註離羅也贈徐中書望終南山歌唐詩品彚作望終南贈徐中書晩下兮紫㣲悵塵事兮多違駐馬兮雙樹望青山兮不歸楚辭後語駐字下多一駟字終南山初學記五經要義云終南山長安南山也一名太乙潘岳闗中記云其山一名中南言在天之中居都之南故曰中南福地記云其山東接驪山太華西連太白至于隴山北去長安城八十里南入楚塞連屬東西諸山周迴數百里名曰福地括地志終南山一名中南山一名太乙山一名南山一名橘山一名楚山一名太山一名周南一名地胏山在雍州萬年縣南五十里雍録終南山横亘闗中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去六百里而連綿峙據其南者皆此之一山也一統志終南山在陜西西安府城南五十里一名南山東西連亘藍田咸寧長安盩厔四縣之境産玉石金銀銅鐵及合離草丹青樹紫微唐書開元元年改中書省為紫微省五年復紫微省為中書省塵事陶潛詩閒居三十載遂與塵事㝠李善註塵事塵俗之事也送友人歸山歌二首楚辭後語作山中人山寂寂兮無人又蒼蒼兮多木羣龍兮滿朝君何為兮空谷文寡和兮思深道難知兮行獨恱石上兮流泉與松間兮草屋入雲中兮養雞上山頭兮抱犢神與棗兮如𤓰虎賣杏兮收榖愧不才兮妨賢嫌既老兮貪禄誓解印兮相從何詹尹兮可卜羣龍後漢書唐堯在上羣龍為用章懐太子註羣龍喻賢臣也鮑照詩皇漢方盛明羣龍滿堦閣養雞列仙傳祝雞翁者洛人也居尸鄉北山下養雞百餘年雞有千餘頭皆立名字暮棲樹上畫放散之欲引呼名即應呼而至抱犢元和郡縣志抱犢山在沂州承縣北六十里壁立千仞頂寛而有水此山去海三百餘里天氣澄明宛然在目昔有遁隐者抱一犢于其上墾種故以為名太平寰宇記鎮州獲鹿縣有萆山今名抱犢山後魏葛榮之亂百姓抱犢而上故以為名棗如𤓰史記李少君言臣嘗遊海上見安期生安期生食巨棗大如𤓰虎賣杏葛洪神仙傳董奉居廬山不種田日為人治病重病愈者使栽杏五株輕者一株數年計得十萬餘株欎然成林後杏子大熟于林中作一草倉示時人曰欲買杏者不須報奉但將榖一器置倉中即自往取一器杏去常有人置榖来少而取杏去多者林中羣虎出吼逐之大怖急挈杏走路傍傾覆至家量杏一如榖多少或有人偷杏者虎逐之到家嚙至死家人知其偷杏乃送還奉叩頭謝過乃却使活奉一日竦身入雲中妻與女猶守其宅賣杏取給有欺之者虎還逐之妨賢漢書王尊傳趣自避退毋乆妨賢詹尹楚辭屈原既放三年不得復見竭智盡忠而蔽障于䜛心煩慮亂不知所從乃往見太卜鄭詹尹曰余有所疑願因先生決之山中人兮欲歸雲冥冥兮雨霏霏水驚波兮翠菅靡白鷺忽兮翻飛君不可兮褰衣山萬重兮一雲混天地兮不分樹晻曖兮氛氲猿不見兮空聞忽山西兮夕陽見東臯兮逺村平蕪緑兮千里眇惆悵兮思君山中人楚辭山中人兮芳杜若冥冥楚辭雲冥冥而闇前山霏霏何遜詩霏霏入窗雨冥冥暗牀塵翠菅成按楊升菴外集云水葱生水中如葱而中空又名翠菅王維詩水驚波兮翠菅靡是也檢羣書無有名水葱為翠菅者說文云菅茅也翠菅即是青茅翠菅靡與水驚波對列皆承上雨霏霏而言非謂翠菅因驚波而靡也楊氏混為一意造此臆說不足憑矣晻曖玉篇晻曖暗貌氛氲謝恵連雪賦氛氲蕭索李善註氛氲盛貌夕陽成按宋景文筆記云莒公謂後人用夕陽為斜日者為誤盖據爾雅山西為夕陽之說也然古人往往有二物共一名者鄭人謂玉之未理者曰璞周人謂䑕之未腊亦曰璞毛公謂蘆之初生時者曰鵻謂鳥之名夫不者亦曰鵻載籍之中往往多有洎考劉越石贈盧諶詩有夕陽忽西流之句則晉人已用之矣安得執彼為是指此為非也東臯阮籍奏記方將耕于東臯之陽張銑註澤畔曰臯潘岳秋聲賦耕東臯之沃壤兮李善註水田曰臯平蕪江淹四時賦平蕪際海千里飛鳥魚山神女祠歌二首河岳英靈集作漁山神女智瓊祠歌楚辭後語作魚山迎送神曲樂府詩集作祠漁山神女歌迎神曲坎坎撃鼓魚山之下吹洞簫望極浦女巫進紛屢舞陳瑶席湛清酤酤劉須溪本顧可久本俱作醑非風淒淒兮夜雨兮河岳英靈集作而樂府詩集作又神之來兮不來河岳英靈集樂府詩集于神字上皆多不知二字使我心兮苦復苦河岳英靈集作使我心苦魚山神女太平寰宇記鄆州東阿縣有魚山一名吾山漢書溝洫志武帝臨决河作瓠子歌曰吾山平兮巨野溢魚沸欝兮廹冬日吾山即魚山述征記濟北運使絃超魏嘉平中有神女成公智瓊降之超同室疑其有奸以告監國詰問超具言之智瓊乃絶後五年超使至于洛西到濟北魚山下陌上遥望曲道頭有車馬似智瓊前到果是同乗至洛克復舊好太康中仍存坎坎毛萇詩傳坎坎擊鼔聲洞簫漢書元帝紀鼓琴瑟吹洞簫如淳註洞簫簫之無底者宋書前世有洞簫其器今亡蔡邕曰簫編竹有底然則邕時無洞簫矣女巫周禮有女巫國語在男曰覡在女曰巫說文巫祝也女能事無形以舞降神者也瑶席楚辭瑶席兮玉瑱清酤詩既載清酤毛萇傳酤酒也送神曲紛進拜兮堂前拜樂府詩集作舞目眷眷兮瓊筵來不語兮意不傳語樂府詩集作言作暮雨兮愁空山悲急管思繁絃管字下樂府詩集唐詩品彚皆多一兮字靈之駕兮儼欲旋靈河岳英靈集作神倐雲收兮雨歇收河岳英靈集作消山青青兮水潺湲潺湲唐文粹作潺潺眷眷楚詞章句眷眷顧貌詩曰眷眷懐顧今詩作睠睠其義同瓊筵謝朓詩端儀穆金殿敷教藻瓊筵急管鮑照詩催弦急管為君舞繁絃蔡邕琴賦曲引興兮繁絃舞靈駕謝恵連詩沃若靈駕旋潺湲楚詞觀流水兮潺湲說文潺湲水聲韻㑹潺湲水流貌白黿渦原註雜言走筆南山之瀑水兮激石􅘝瀑似雷驚人相對兮不聞語聲飜渦跳沫兮蒼苔濕蘚老且厚春草為之不生獸不敢驚動鳥不敢飛鳴白黿渦濤戱瀨兮委身以縱横瀨顧元緯本凌初成本俱作漱主人之仁兮不網不釣得遂性以生成􅘝瀑馬融長笛賦􅘝瀑噴沫李善註􅘝瀑沸湧貌左思蜀都賦龍池􅘝瀑濆其隈李善註􅘝瀑水沸之聲也渦韻㑹渦水回也跳沫上林賦馳波跳沫戯瀨左思蜀都賦躍濤戯瀨中流相忘說文瀬水流沙上也遂性隋書髙祖紀率土大同含生遂性酬諸公見過原註時官出在輞川莊嗟余未䘮哀此孤生屏居藍田薄地躬畊嵗晏輸稅以奉粢盛晨往東臯草露未晞暮㸔煙火負擔來歸負顧元緯本凌本俱作漁我聞有客足掃荆扉簞食伊何副𤓰㧓棗副顧元緯本淩本俱作疈仰厠羣賢皤然一老媿無莞簟班荆席藁汎汎登陂折彼荷花静觀素鮪俯暎白沙山鳥羣飛日隐輕霞登車上馬倐忽雨散雨一作雲雀噪荒村雞鳴空館還復幽獨重欷累歎屏居漢書竇嬰謝病屏居藍田南山下師古註屏隐也藍田太平寰宇記藍田山古華胥氏陵在藍田縣西三十里一名玉山一名覆車山郭縁生述征記云山形如覆車之象也按後魏風土記云山頂方二里仙聖逰集之所劉福鳴學道于此下有祠甚嚴㶚水之源出于此躬畊漢書齊相雅行躬耕後漢書孟嘗單身謝病躬畊隴次嵗晏楚辭嵗既晏兮孰華予王逸註晏晚也輸稅潘岳秋興賦輸委稷之餘稅粢盛左傳粢盛豐備杜預註黍稷曰粢在器曰盛露晞詩白露未晞毛萇傳晞乾也荆扉陶潛詩白日掩荆扉副𤓰韻㑹副說文判也從刀鬲聲引周禮副辜祭廣韻析也禮記為天子削𤓰者副之註既削又四析之乃横斷之或作疈今文周禮以疈辜祭四方百物㧓玉篇㧓古華切撃也厠謝靈運詩招納厠羣英韻㑹厠次也皤然南史范縝年二十九髪白皤然莞簟詩下莞上簟鄭康成箋莞小蒲之席也竹葦曰簟班荆左傳伍舉聲子遇于鄭郊班荆相與食而言復故杜預註班布也布荆坐地席藁藁禾稈謂藉禾稈而坐史記應侯席藁請罪陂玉篇陂彼皮切澤鄣也池也孔安國尚書傳澤障曰陂停水曰池鄭康成禮記註畜水曰陂穿地通水曰池素鮪素鮪非鱣鮪之鮪似另是一種髙誘淮南子註鮪魚似鯉而大者是也雨散謝朓詩山川隔舊賞朋僚多雨散王右丞集箋注巻一
