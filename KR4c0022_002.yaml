body:
  text: 王右丞集箋注巻二仁和趙殿成撰古詩三十首扶南曲歌詞五首翠羽流蘓帳春眠曙不開羞從面色起嬌逐語聲來早向昭陽殿君王中使催扶南曲杜氏通典隋煬帝平林邑國獲扶南工人及其匏瑟琴陋不可用但以天竺樂傳冩其聲而不齒樂部翠羽梁范静妻詩明珠翠羽帳金簿綠綃帷流蘓左思吳都賦張組帷搆流蘓呂向註流蘓五色羽飾帷而垂之海録碎事流蘇者乃盤線繪繡之毬五色錯為之同心而下垂者是也王冏詩珠扉玳瑁牀綺席流蘓帳昭陽殿西京雜記趙飛燕女弟居昭陽殿三輔黄圗武帝時後宫八區有昭陽飛翔増成合歡蘭林披香鳳凰鴛鴦等殿中使吳志朱然傳中使醫藥口食之物相望於道沈約齊安陸昭王碑文中使相望張銑註天子私使曰中使堂上青絃動青樂府詩集作清堂前綺席陳齊歌盧女曲雙舞洛陽人傾國徒相㸔寧知心所親青絃鮑照詩靚妆坐帷裏當戸弄青絃綺席隂鑒詩佳人徧綺席說文綺文繒也盧女曲古今注雉朝飛者牧犢子所作也其聲中絶魏武帝官人有盧女者故冠軍將軍隂叔之妹年七嵗入漢宫學鼓琴琴特鳴異於諸伎善為新聲能傳此曲洛陽人謝朓詩要取洛陽人共命江南管傾國漢書北方有佳人絶世而獨立一顧傾人城再顧傾人國香氣傳空滿妝華影箔通歌聞天仗外舞出御樓中日暮歸何處花間長樂宫秉恕按郭茂倩樂府詩集所載睦州歌一首即是詩前四句也但改氣作風滿作陌影箔通作映薄紅聞作聲出作態七字不同句調遂劣盖唐時樂曲多採才人名句被之管絃而歌之其聲律不諧者則改字就之以叶宮商不問其句調之雅俗故也長樂宫三輔黄圖長樂宫本秦之興樂宫也髙帝居此宫後太后常居之又隋書地理志京兆郡大興縣有長樂宮宮女還金屋將眠復畏明入春輕衣好半夜薄妝成拂曙朝前殿玉墀多珮聲墀樂府詩集作除金屋漢武故事膠東王數嵗長公主抱置膝上問曰兒欲得婦否指左右長御百餘人皆曰不用指其女阿嬌好否笑對曰若得阿嬌作婦當作金屋貯之薄妝宋玉神女賦嫷被服侻薄妆沈約麗人賦来脫薄妝去留餘膩拂曙庾信對燭賦蓮帳寒檠窓拂曙筠籠熏火香盈絮前殿成按漢時長樂未央建章甘泉諸宮皆有前殿即正殿也玉海周曰路寢漢曰前殿玉墀鮑照詩璇閨玉墀上椒閣文窓繡戸垂羅幕朝日照綺牕佳人坐臨鏡散黛恨猶輕插釵嫌未正同心勿遽游幸待春妝竟綺牕左思蜀都賦列綺牕而瞰江呂向註綺牕彫畫若綺也陸機詩䆳宇列綺牕張銑註綺牕牕為錦綺之文也梁武帝子夜歌朝日照綺牕光風動紈羅散黛昭明太子詩散黛隨廣眉臙脂逐臉生春妝沈約詩斜簪映秋水開鏡比春妝從軍行吹角動行人喧喧行人起笳悲馬嘶亂悲文苑英華作應樂府詩集作鳴爭渡金河水金一作黄日暮沙漠垂戰聲煙塵裏戰聲文苑英華作力戰盡繫名王頸名王文苑英華作蕃王一作名蕃歸來報天子報顧可乆本作獻凌本作見從軍行按樂府詩集王僧䖍技録平調七曲其六曰從軍行樂府觧題曰從軍行皆軍旅辛苦之辭角宋書角書記所不載或云出羌胡以驚中國馬或云出吳越金河杜氏通典雲中郡地有金河上承紫河及衆水又南流入河太平寰宇記郡國志云雲中郡有紫河鎮界内有金河水其泥色紫故曰金河又云金河在振武軍金河縣西北髙居誨使于闐記西北五百里至肅州渡河至西百里出天門闗沙漠垂唐六典註沙漠在豐勝二州之北曹植詩揚聲沙漠垂盧諶詩北眺沙漠垂劉良註沙漠流沙也垂邉也名王頸漢書賈誼傳行臣之計請必繋單于之頸而制其命又宣帝紀匈奴單于遣名王奉獻師古曰名王者謂有大名以别諸小王也又陳湯傳至今無名王大人見將軍受事者師古曰名王諸王之貴者隴西行十里一走馬五里一揚鞭都䕶軍書至匈奴圍酒泉闗山正飛雪烽戍斷無煙戍一作火隴西行樂府詩集瑟調曲有隴西行一曰步出夏門行樂府觧題曰古辭云天上何所有歴歴種白榆始言婦有容色能應門承賓次言善於主饋終佳言送迎有禮若簡文帝隴西四戰地但言辛苦征戰人怨思而已通典曰秦置隴西郡以居隴坻之西為名後魏兼置渭州禹貢曰導渭自鳥䑕同穴即其地也今首陽山亦在焉按右丞是作亦與簡文同意不合古辭也都䕶漢書鄭吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道神爵中日逐王先賢撣降漢威震西域遂并䕶車師以西北道故號都䕶都䕶之置自吉始焉師古曰都猶總也言總䕶南北之道軍書漢書軍書交馳而輻凑酒泉漢書武帝紀征和三年匈奴入五原酒泉殺兩都尉又地里志酒泉郡武帝太初元年開應劭曰其水若酒故曰酒泉也師古曰舊俗傳云城下如金泉泉味如酒早春行紫梅發初遍黄鳥歌猶澀誰家折楊女弄春如不及愛水看妝坐羞人映花立香畏風吹散衣愁露霑濕玉閨青門裏日落香車入游衍益相思含啼向綵帷憶君長入夢歸晩更生疑不及紅簷鷰雙棲綠草時黄鳥陸璣詩疏黄鳥黄鸝留也或謂之黄栗留幽州人謂之黄鶯一名倉庚一名商庚一名鵹黄一名楚雀齊人謂之搏黍當葚熟時来在桑間故里語曰黄栗留㸔我麦黄葚熟不亦是應節趨時之鳥也看妝庾肩吾美人詩看妝畏水動斂袖避風吹青門三輔黄圖長安城東出南頭第一門曰覇城門民見門色青名曰青城門或曰青門游衍謝朓登山曲王孫尚游衍蕙草正萋萋贈裴廸不相見不相見來久日日泉水頭常憶同携手携手本同心復歎忽分衿相憶今如此相思深不深裴廸唐詩紀事裴迪初與王維崔興宗俱居終南天寳後為蜀州刺史與杜甫交善唐詩品彚裴廸闗中人𤓰園詩并序維瓜園髙齋俯視南山形勝二三時輩同賦是詩兼命詞英數公同用園字為韻韻任多少劉本顧可久本俱少一韻字又誤任字作住字不成句時太子司議郎薛璩發此題遂同諸公云余適欲鋤瓜倚鋤聽叩門鳴騶導驄馬常從夾朱軒窮巷正傳呼故人儻相存擕手追涼風放心望乾坤藹藹帝王州宮觀一何繁林端出綺道殿頂揺華幡摇顧元緯本凌本俱作播素懐在青山若值白雲屯回風城西雨返景原上村前酌盈樽酒往往聞清言黄鸝轉深木朱槿照中園中一本作空猶羨松下客石上聞清猿司議郎唐六典太子司議郎四人正六品上薛璩唐詩紀事作薛據云薛據與王摩詰杜子美最善子美有喜薛三據授司議郎詩云文章開穾奥遷擢潤朝廷又有寄薛三郎中詩云與子俱白頭役役常苦辛雖為尚書郎不及村野人天末厭戎馬我輩本常貧子尚客荆州我亦滯江濱聞子心甚壮所過信席珍賦詩賓客間揮灑動八垠乃知盖代手才力老益神其畧如此又云薛據河中寳鼎人中書舍人文思曽孫父元暉什邡令開元天寳間據與弟播摠相繼登科終禮部侍郎成按工部集秦州見勅目薛三璩授司議郎云云本是璩字與右丞同疑薛據薛璩本是二人紀事誤作一人再千家注見除目詩作璩寄薛三郎中詩亦作璩薛據以天寳六載風雅古調科及第見唐㑹要後為尚書水部郎中贈給事中見韓昌黎薛君公達墓誌銘劉昫唐書亦附見薛播傳中俱不言其為司議郎鳴騶南史到溉傳恒鳴騶枉道以相存問北山移文鳴騶入谷鶴書赴壠章懐太子後漢書註騶騎士也驄馬後漢書桓典舉髙第拜侍御史常乗驄馬京師畏憚為之語曰行行且止避驄馬御史常從吳志孫權親乗馬射虎於庱亭常從張世撃以戈獲之魏畧曰臨淄侯植因呼常從取水朱軒尚書大傳未命為士不得朱軒鄭康成曰軒輿也士以朱飾之張景陽詩朱軒曜金城供帳臨長衢劉良註朱軒公卿車也窮巷漢書生於窮巷之中長於蓬茨之下傳呼漢書蕭望之傳下車趨門傳呼甚寵師古註傳呼傳聲而呼也相存魏武帝詩越陌度阡枉用相存周翰註存存問也白雲屯謝靈運詩巖髙白雲屯李周翰註屯聚也返景劉孝綽詩返景入池林初學記日西落光返照於東謂之返景清言晉書郭象少有才理好老莊能清言朱槿南方草木狀朱槿花莖葉皆如桑葉光而厚樹髙止四五尺而枝葉婆娑自三月開花至中冬即歇其花深紅色五出大如蜀葵有蘂一條長於花葉上綴金屑日光所爍疑若焰生一藂之上日開數百朶朝開暮落挿枝即活出髙涼郡一名赤槿一名日及同盧拾遺過韋給事東山别業二十韻給事首春休沐維已陪游及乎是行亦預聞命㑹無車馬不果斯諾韋一本作章非託身侍雲陛昧旦趨華軒旦劉本顧可久本俱作早非遂陪鵷鴻侣霄漢同飛翻君子垂恵顧期我於田園側聞景龍際親降南面尊萬乗駐山外順風祈一言髙陽多夔龍荆山積璵璠盛徳啟前烈大賢鍾後昆侍郎文昌宮給事東掖垣謁帝俱來下冠盖盈丘樊閨風首邦族庭訓延鄉村采地包山河樹井竟川原巖端迴綺檻谷口開朱門階下羣峰首雲中瀑水源鳴玉滿春山列筵先朝暾㑹舞何颯踏撃鐘彌朝昏是時陽和節清晝猶未暄藹藹樹色深嚶嚶鳥聲繁顧已負宿諾延頸慙芳蓀蹇步守窮巷髙駕難攀援素是獨往客脫冠情彌敦拾遺唐書百官志門下省有左拾遺六人中書省有右拾遺六人皆從八品上給事唐書百官志門下省有給事中四人正五品上韋恒按劉昫唐書韋嗣立傳嗣立有三子皆知名長曰孚官至左司員外郎次曰恒開元初為碭山令擢拜殿中侍御史歴度支左司等員外太常少卿給事中二十九年為隴右道河西黜陟使出為陳留太守次日濟開元初為鄄城醴泉令三遷庫部員外郎二十四年為尚書戸部侍郎轉太原尹天寳七載為河南尹遷尚書左丞出為馮翊太守右丞所謂給事侍郎者正指恒濟兄弟東山别業劉昫唐書景龍三年十二月康子幸兵部尚書韋嗣立莊封嗣立為逍遥公上親製序賦詩又韋嗣立傳嗣立嘗于驪山搆營别業中宗親往幸焉自製詩序令從官賦詩賜絹二千匹因封嗣立為逍遥公名其所居為清虚原幽棲谷唐詩紀事韋嗣立莊在驪山鸚鵡谷中宗幸之嗣立獻食百轝及木器藤盤等物上封為逍遥公谷為幽棲谷原為清虛原中宗留詩從臣屬和嗣立並鐫於石張說為之序薛稷書之張說東山記曰兵部尚書同中書門下三品修文館大學士韋公體含貞静思叶幽曠雖翊亮廊廟而緬懐林藪東山之曲有别業焉嵐氣入野榛烟出谷石潭竹岸松齋藥畹虹泉電射雲木虚吟恍惚疑夢間闗㤀術兹所謂丘壑夔龍衣冠巢許幸温泉之嵗也皇上聞而賞之廼命掌含設帟金吾劃次太官載酒奉常抱樂停輿輦於青靄佇翬䄖於紫氛百神朝於谷中千官飲乎池上緹騎環山朱斾焰野縱觀空巷途歌傳壑是日即席拜公逍遥公名其居曰清虛原幽棲谷景移樂極天子賦詩皇后帝女宫嬪邦媛歌焉和焉以寵徳也加以中宫教序謂我諸兄引内子於重幄見児童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈恵之恩朝野歡并君臣義洽夫飛翠華歴茨嶺至道之主也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩曜合舍衆星聚徳雅道光華髙風允塞寒谷煦景竅崖潤色猗歟盛事振古未有篆之元石貽厥後代首春梁元帝纂要孟春曰首春休沐漢書張安世精力於職休沐未嘗出初學記休假亦曰休沐漢律吏五日得一下沐言休息以洗沐也成按唐制十日一休沐韋應物詩九日驅馳一日閒白樂天郡齋旬假詩公門日兩衙公假日三旬衙用决簿領旬以㑹親賔是矣託身顔延年詩託身侍天闕謝靈運詩託身青雲上李周翰註託寄也雲陛雲陛天子殿陛左思七啟闓甲第之廣袤建雲陛之嵯峨昧旦左傳昧旦丕顯華軒潘岳詩優游省闥珥筆華軒吕向註華軒殿上曲欄也霄漢後漢書仲長統傳則可以凌霄漢出宇宙之外矣飛翻王仲宣詩茍非鴻鵰孰能飛翻順風莊子廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久髙陽左傳昔髙陽氏有才子八人蒼舒隤敳檮戭大臨龎降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷荆山杜氏通典虢州湖城縣有荆山出美玉璵璠說文璵璠魯之寳玉文昌宫荀綽晉百官表註曰尚書為文昌天府衆務淵藪䑕璞今以六曹尚書為文昌成按晉書天文志文昌六星在北斗魁前天之六府也天子六曹尚書似之故以文昌為尚書美稱東掖垣成按掖垣謂掖門之垣唐時宣政殿前有兩廡兩廡之掖門東曰日華日華之外則門下省西曰月華月華之外則中書省唐書權徳輿獨直兩省數旬一還舍乃上書言左右掖垣承天子誥命奉命詳覆各有攸司云云正指門下中書二省而言以其皆在掖垣之側也中書省在西謂之西掖垣門下省在東謂之東掖垣給事中屬門下省謁帝曹植詩謁帝承明廬丘樊宋書隠逸傳放情江海取逸丘樊謝莊月賦臣東鄙幽介長自丘樊劉良註丘園樊籬也采地漢書此卿大夫采地之大者也顔師古註采官也因官食地故曰采地爾雅曰采寮官也韓詩外傳古者天子為諸侯受封謂之采地綺檻王勃七夕賦珠櫳綺檻北風臺繡戸雕牕南向開朱門演繁露後世諸侯王及達官所居之屋皆飾以朱故號曰朱門又曰朱邸也羣峯首謝靈運詩遂登羣峰首邈若升雲煙瀑水長安志唐韋嗣立構别廬於驪山鳳凰原鸚鵡谷有重崖洞壑飛流瀑水鳴玉國語趙簡子鳴玉以相列筵謝靈運詩列筵皆静寂李延濟詩註列筵謂四座也朝暾謝靈運詩晚見朝日暾李周翰註暾日初出貌颯踏鮑照詩珠履颯踏䘛袖飛擊鐘左傳左師每食撃鐘陽和史記時在中春陽和方起嚶嚶鄭康成毛詩箋嚶嚶兩鳥聲也揚雄羽獵賦王睢闗闗鴻鴈嚶嚶師古註嚶嚶相命聲也延頸列子莫不延頸舉踵而願安利之芳蓀說文蓀香草也史記索隐蓀草似菖蒲而無脊生溪澗中音孫謝靈運詩乗月聴哀狖浥露馥芳蓀髙駕劉孝綽詩髙駕何由来和使君五郎西樓望逺思歸髙樓望所思目極情未畢枕上見千里牕中窺萬室悠悠長路人曖曖逺郊日惆悵極浦外迢遞孤煙出能賦屬上才思歸同下秩故鄉不可見雲外空如一外文苑英華作水目極楚辭目極千里兮傷春心情未畢謝靈運詩行源逕轉逺距陸情未畢曖曖王逸楚辭章句曖曖闇昧貌迢遞謝靈運詩迢遞瞰髙峯張銑註迢遞髙逺貌能賦毛萇詩傳升髙能賦師旅能誓下秩後漢書體兼上才榮微下秩酬黎居士淅川作原註曇壁上人院走筆成儂家真箇去公定隨儂否著處是蓮花無心變楊栁松龕蔵藥裹石唇安茶臼氣味當共知那能不擕手淅川後魏置淅川縣本漢時析縣地以地有淅水取名晉書桓温傳步自淅川以征闗中是也後周併入内鄉縣儂玉篇儂奴冬切吳人稱我是也松龕庾肩吾詩松龕徹暮爼棗徑落寒叢藥裹藥裹字唐人詩如杜甫輩皆屢用之考漢書外戚列傳武發篋中有裹藥二枚當是出於此也奉寄韋太守陟荒城自蕭索萬里山河空天髙秋日迥嘹唳聞歸鴻寒塘映衰草髙館落疎桐臨此嵗方晏顧景詠悲翁詠唐詩品彚作問故人不可見寂寞平林東韋陟按劉昫唐書韋陟本傳陟累官吏部侍郎為李林甫所忌出為襄陽太守歴陳留採訪使以親累貶鍾離太守尋移河東太守肅宗即位起為呉郡太守累官吏部尚書因宗人伐墓柏坐不能禁出為絳州刺史凡五為太守右丞寄此詩時不知為何郡太守也本傳云陟丁父憂居䘮過禮自此杜門不出八年與弟斌相勸勵探討典墳不捨晝夜文華當代俱有盛名於時才名之士王維崔顥盧象等常與陟唱和遊處嘹唳陶𢎞景詩悽切嘹唳傷夜情韻㑹嘹唳雁聲寒塘何遜詩露濕寒塘草疎桐梁元帝詩樓前飄宻栁井上落疎桐嵗方晏謝莊月賦月既没兮露欲晞嵗方晏兮無與歸悲翁按宋書漢鼔吹鐃歌十八曲二曰思悲翁陸機鼓吹賦詠悲翁之流思沈烱詩杖策尋遺老歌嘯詠悲翁庾信竹杖賦拉虎捭熊予猶穉童觀形察貌子實悲翁平林毛萇詩傳平林林木之在平地者也林園即事寄舍弟紞寓目一蕭散消憂冀俄頃青草肅澄陂陂一本作波白雲移翠嶺後浦通河渭浦二顧本凌本俱作沔非前山包鄢郢松含風裏聲花對池中影地多齊后瘧瘧顧元緯本凌本俱作㿉非人帶荆州癭徒思赤筆書詎有丹砂井心悲常欲絶髪亂不能整青簟日何長閒門晝方静頽思茅簷下彌傷好風景寓目左傳得臣與寓目焉杜預註寓寄也蕭散江淹詩蕭散得遺慮鄢郢史記正義鄢在襄州夷道縣南九里郢在荆州江陵縣東六里成按鄢郢二地在唐時襄陽宜城縣故楚之鄢郡也荆州江陵縣故楚之郢都也齊后瘧晏子春秋景公疥且瘧期年不已荆州癭晉書杜預拜鎮南大將軍都督荆州諸軍事攻江陵吳人知預病癭憚其智計以瓠繋狗頸示之毎大樹似癭輒斫使白題曰杜預頸博物志山居之民多癭腫疾由于飲泉之不流者今荆南諸山郡東多此疾赤筆書二顧註俱引漢官儀尚書丞郎月給赤管大筆一雙可久氏并觧其下云謂昔仕朝時成謂非是赤筆書當作仙書符篆之觧魏書釋老志所謂丹書紫字雲笈七籖所謂紫書紫筆繕文之類是也丹砂井抱朴子余亡祖鴻臚少時曾為臨沅令云此縣有廖氏家世世夀考或出百嵗或八九十後徙去子孫轉夭折他人居其故宅復如舊後累世夀考由此乃覺是宅之所為而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去數尺此丹砂汁因泉漸入井是以飲其水而得夀青簟江淹别賦夏簟青兮晝不暮冬釭凝兮夜何長頽思抱朴子愍俗者所以痛心而長慨憂道者所以含悲而頽思也茅簷陶潛詩繿縷茅簷下後浦諸本俱誤作後沔惟劉須溪本是浦字顧元緯因沔鄢郢荆州諸字俱是楚地遂於題下註云公次荆州時作成按沔水不通河渭雖禹貢梁州貢道有逾於沔入於渭亂於河之文孔頴達云計沔在渭南五百餘里故越沔陸行而北入渭渭水入河故浮渭而東帝都在河之東故渡河陸行而還帝都則是言其水陸相間而行之道如此非謂其一水通流也其為浦字之誤明甚鄢郢雖是楚地然前山則指秦地之山而言與送李太守赴上洛詩云商山包楚鄧積翠靄沉沉文意一例荆州與齊后對用是引故事非實指楚地参互考之非次荆州時作也贈從弟司庫員外絿少年識事淺强學干名利徒聞躍馬年苦無出人智即事豈徒言累官非不試既寡遂性歡恐招負時累清冬見逺山積雪凝蒼翠浩然出東林發我遺世意恵連素清賞夙語塵外事欲緩擕手期流年一何駛司庫成按唐六典兵部屬官有庫部員外郎一人從六品上龍朔二年改為司庫咸亨元年復故則右丞時不復有司庫之名矣而猶襲用之者當是取其名雅馴之故與中書省之稱紫微門下省之稱黄門同一例也躍馬年史記蔡澤曰吾持粱刺齒肥躍馬疾驅懐黄金之印結紫綬於要揖讓人主之前食肉富貴四十三年足矣恵連宋書謝恵連幼而聰敏年十嵗能屬文族兄靈運深相知賞塵外晉書謝安傳論文靖始居塵外髙謝人間梁書徵士何㸃居貞物表縱心塵外駛潘岳詩嘆彼年往駛張銑註駛急也座上走筆贈薛璩慕容損希世無髙節絶跡有卑棲君徒視人文吾固和天倪緬然萬物始及與羣物齊物顧元緯本凌本俱作牧非分地依后稷用天信重黎信一作奉春風何豫人令我思東谿草色有佳意花枝稍含荑更待風景好與君藉萋萋希世莊子希世而行比周而友漢書公孫𢎞希世用事位至公卿陸機詩希世無髙符李善註希世随世也絶跡曹植與楊徳祖書然此數子猶復不能飛鶱絶跡一舉千里也卑棲酈炎詩脩翼無卑棲逺趾不步局人文周易觀乎人文以化成天下孔頴達正義言聖人觀察人文則詩書禮樂之謂當法此教而化成天下也天倪莊子和之以天倪郭象註天倪者自然之分也萬物始史記此老子之所謂無名者萬物之始也后稷陸賈新語民知室居食榖而未知功力於是后稷乃列封疆畫畔界以分土地之所宜闢土殖榖以用養民種桑麻致絲枲以蔽形體重黎史記昔在顓頊命南正重以司天北正黎以司地唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地荑韻㑹荑卉木初生葉貌萋萋孫綽遊天台山賦藉萋萋之􅊏草李善註以草薦地而坐曰藉呂延濟註萋萋草美貌贈李頎聞君餌丹砂甚有好顔色不知從今去㡬時生羽翼王母翳華芝望爾崑崙側文螭從赤豹萬里方一息顧元緯本凌本俱作萬里走方息悲哉世上人甘此羶腥食李頎唐詩品彚李頎東川人開元十三年賈季鄰榜進士調新鄉縣尉有集傳於世羽翼魏文帝詩服藥四五日身輕生羽翼翳華芝揚雄甘泉賦廼登夫鳳凰兮而翳華芝顔師古註翳蔽也以華芝為蔽也李善註翳隐也華芝盖也言以華盖自翳也崑崙山海經西海之南流沙之濱赤水之後黒水之前有大山名曰崑崙之丘其下有弱水之淵環之其外有炎火之山投物輒然有人戴勝虎齒有豹尾穴處名曰西王母水經注崑崙墟在西北去嵩髙五萬里地之中也其髙萬一千里赤豹楚辭乗赤豹兮從文貍螭說文螭若龍而黄北方謂之地螻從虫离聲或云無角曰螭丑知切羶腥漢武外傳絶五榖去羶腥嵇康絶交書手薦鸞刀漫之羶腥贈劉藍田此詩亦載盧象集中籬中犬迎吠中河岳英靈集唐文粹俱作間出屋候柴扉柴河岳英靈集唐文粹俱作荆嵗晏輸井稅山邨人夜歸晚田始家食食唐文粹作熟餘布成我衣詎肯無公事煩君問是非盧集作對此能無憶勞君問是非又問字顧元緯本作聞藍田唐書地理志京兆府有藍田縣贈房盧氏琯達人無不可忘已愛蒼生豈復小千室小顧元緯本唐詩正音俱作少千顧可久本作十誤弦歌在兩楹浮人日已歸但坐事農畊桑榆鬰相望邑里多雞鳴里顧元緯本作地非是秋山一何浄蒼翠臨寒城視事兼偃卧對書不簪纓蕭條人吏疎疎凌本作散唐詩品彚作稀鳥雀下空庭鄙夫心所向向一作尚晩節異平生將從海嶽居守靜解天刑或可累安邑茅茨君試營房琯劉昫唐書房琯應堪任縣令舉授虢州盧氏令政多恵愛人稱美之盧氏唐書地理志虢州𢎞農郡有盧氏縣武徳元年置達人賈誼鵩賦達人大觀兮物無不可兩楹張景陽詩制勝在兩楹劉良註兩楹謂階間也視事漢書王尊傳今太守視事巳一月矣偃卧列子紀昌歸偃卧其妻之機下謝靈運詩偃卧任縱誕空庭謝靈運詩虚館絶諍訟空庭来鳥雀晩節謝靈運詩晚節值衆賢李周翰注晩節暮年也守靜後漢書羊續坐黨事禁錮十餘年幽居守静晉書王湛閤門守静不交當世天刑晉書䖍糾天刑致之誅辟累安邑髙士傳閔貢字仲叔太原人也世稱節士客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與邑令聞敕吏常給焉仲叔怪問之乃嘆曰閔仲叔豈以口腹累安邑耶遂去客沛以夀終茅茨漢書茅茨不剪師古曰屋盖曰茨茅茨以茅覆屋也贈祖三詠原註濟州官舍作蠨蛸挂虚牖蟋蟀鳴前除嵗晏涼風至君子復何如髙館闃無人館凌本作閣離居不可道閒門寂已閉落日照秋草雖有近音信千里阻河闗中復客汝潁去年歸舊山結交二十載不得一日展貧病子既深契濶余不淺仲秋雖未歸暮秋以為期良㑹詎㡬日終自長相思自二顧本凌本俱作日誤祖詠唐詩品彚祖詠洛陽人開元十三年進士張說引為駕部員外郎集一巻蠨蛸郭璞爾雅註蠨蛸小蜘蛛長脚者俗呼為蟢子陸璣詩疏蠨蛸長踦一名長脚荆州河内人謂之喜母此蟲來著人衣當有親客至有喜也幽州人謂之親客亦如蜘蛛為羅網君之謂也虚牖韻㑹牖說文穿壁以木為交牕也從片􅂒聲徐曰但穿明則為牕牖者更以木為交欞也古者一室一戸一牖一曰在墻曰牖蟋蟀陸璣詩疏蟋蟀似蝗而小正黒有光澤如漆有角翅一名蛬一名青􅖹楚人謂之王孫幽州人謂之趣織督促之言也里語曰趣織鳴懶婦驚是也前除謂階除之前王勃詩頽華臨曲磴傾影赴前除闃說文闃静也玉篇闃苦壁古覔二切静無人也潘岳懐舊賦空館闃其無人離居楚辭將以遺兮離居汝潁唐書地里志汝州臨汝郡潁州汝隂郡皆𨽻河南道契濶毛萇詩傳契濶勤苦也良㑹曹植洛神賦悼良㑹之永絶兮長相思古詩上言長相思下言久離别春夜竹亭贈錢少府歸藍田夜靜羣動息時聞隔林犬却憶山中時人家澗西逺羡君明發去采蕨輕軒冕錢起唐書錢起吴興人天寳中舉進士與郎士元齊名時語曰前有沈宋後有錢郎終考功郎中不言其為少府洎考起集中有初黄綬赴藍田縣作詩一首知史闕載也少府清波雜志古治百里之邑令拊其俗尉督其姧故令曰明府尉曰少府嬾真子令呼明府故尉呼少府以亞於縣令羣動息陶潛詩日入羣動息明發孔頴達毛詩正義夜地而闇至旦而明明地發後謂之明發也蕨陸璣詩疏蕨鼈也山菜也周秦曰蕨齊魯曰鼈初生似蒜莖紫黒色可食如葵軒冕謝朓詩志狭輊軒冕杜預左傳註軒大夫車說文冕大夫以上冠也酬王維春夜竹亭贈别錢起山月随客來主人興不淺今宵竹林下誰覺花源逺惆悵曙鶯啼孤雲還絶巘絶巘張協七命于是登絶巘遡長風張銑註絶巘髙山也廣韻巘山峯也戯贈張五弟諲三首凌本無戯字一本有時在常樂東園走筆成九字註吾弟東山時心尚一何逺一唐詩正音唐詩品彚俱作亦日髙猶自卧鐘動始能飯領上髮未梳領唐詩品彚作頭牀頭書不巻清川興悠悠空林對偃蹇唐詩品彚作空林時偃蹇青苔石上浄細草松下軟牕外鳥聲閒階前虎心善徒然萬象多象林本唐詩品彚俱作慮澹爾太虚緬一知與物平自顧為人淺對君忽自得浮念不煩遣東山晉書謝安累違朝㫖髙臥東山南史何引謝朏並隐東山緬廣韻緬逺也張弟五車書讀書仍隠居染翰過草聖賦詩輕子虚閉門二室下隐居十年餘宛是野人也也一作野時從漁子魚魚一作漁秋風日蕭索日一作自五栁髙且疎望此去人世渡水向吾廬嵗晏同擕手只應君與予五車書莊子恵施多方其書五車染翰謝恵連詩朋来當染翰劉良註翰筆也子虚西京雜記司馬相如為上林子虚賦意思蕭散不復與外事相闗控引天地錯綜古今忽然如睡躍然而興㡬百日而後成二室初學記嵩髙山者五嶽之中嶽也戴延之西征記云其山東為太室西為少室相去十七里嵩髙總名也謂之室者以其下各有石室焉少室髙八百六十丈上方十里與太室相埒但小耳水經注合而言之為嵩髙分而名之為二室西南為少室東北為太室五栁晉書陶潛嘗著五栁先生傳以自况曰先生不知何許人不詳姓氏宅邉有五栁樹因以為號焉設罝守毚兔垂釣伺游鱗此是安口腹非關慕隐淪吾生好清靜蔬食去情塵今子方豪蕩思為鼎食人我家南山下動息自遺身入鳥不相亂見獸皆相親雲霞成伴侶虚白侍衣巾何事須夫子邀予谷口真設罝鮑照詩伐木清江湄設罝守毚呂向註罝網也毛萇詩傳毚兔狡兔也游鱗潘岳閒居賦游鱗瀺灂菡萏敷披隐淪謝朓詩隐淪既已託李周翰註隐淪隐逸也情塵王屮頭陀寺碑文愛流成海情塵為岳鼎食張衡西京賦撃鐘鼎食連騎相過入鳥不亂莊子入獸不亂羣入鳥不亂行鳥獸不惡而况人乎虚白莊子瞻彼闋者虚室生白陸徳明註崔譔云白者日光所照也司馬彪云室比喻心心能虚空則純白獨生也淮南子虚室生白吉祥止也髙誘註虛心也室身也白道也能虛其心以生於道道性無欲吉祥来止舍也谷口真髙士傳鄭樸字子真谷口人也修道静黙世服其清髙成帝時元舅大將軍王鳳以禮聘之遂不屈揚雄盛稱其徳曰谷口鄭子真畊於巖石之下名振京師成按前二篇美張能隐居樂道物我兩忘與已合志後一篇嗤張之釣弋山中祗圖口腹與已異操譬如李家娘子纔出墨池便登雪嶺何一日之間黒白不均乎題曰戯贈良有以也至滑州隔河望黎陽憶丁三㝢隔河見桑柘藹藹黎陽川望望行漸逺孤峯没雲煙故人不可見河水復悠然賴有政聲逺時聞行路傳滑州唐書地里志河南道有滑州靈昌郡黎陽元和郡縣志衛州有黎陽縣成按唐時滑州在黄河之南屬河南道黎陽在黄河之北屬河北道雖各𨽻一方而中間僅隔一水對岸可見秋夜獨坐懐内弟崔興宗夜靜羣動息蟪蛄聲悠悠庭槐北風響日夕方髙秋思子整羽翮翮顧元緯本凌本俱作翰及時當雲浮吾生將白首嵗晏思滄洲髙足在旦暮肯為南畝儔内弟鄭康成儀禮註姑之子外兄弟也舅之子内兄弟也右丞母崔姓興宗是其内弟崔興宗唐書宰相世系表有崔興宗乃駙馬都尉崔恭禮之子後官饒州長史顧元緯以為即是其人成按公主列傳恭禮尚髙祖女真定公主去開元天寳世甚逺又綠樹重隂一絶題云過崔處士興宗林亭則是未有爵禄于朝者其非一人明矣夫名姓偶同者若魯國一時有兩曽参趙國一時有兩毛遂楚漢之際一時有兩韓信唐宣之代一時有兩韓翃皆灼見於簡冊嘗閱詩文箋釋往往以姓氏偶合者指為一人如昌黎所稱盤谷之李愿以為即河中節度之李愿少陵所贈錦城之花卿以為即成都猛將之花卿成以為皆非也蟪蛄楚辭蟪蛄鳴兮啾啾陸徳明莊子音義蟪蛄寒蟬也一名蝭蟧春生夏死夏生秋死或曰山舜秋鳴者不及春春鳴者不及秋廣雅云蟪蛄蛁蟧也即楚辭所云寒螿者也滄洲阮籍為鄭沖勸晉王牋臨滄洲而謝支伯登箕山以揖許由陸雲泰伯碑滄洲遁跡箕山辭位皆泛指滄海洲渚而言世人或引神異經水經註之滄浪洲謬矣甚有引杜陽雜編隋大業中事者尤非髙足古詩何不䇿髙足先據要路津李善註髙上也亦謂逸足也贈裴十迪風景日夕佳與君賦新詩澹然望逺空如意方支頤春風動百草蘭蕙生我籬曖曖日暖閨文苑英華作曖曖閨日暖田家來致詞欣欣春還臯澹澹水生陂桃李雖未開荑萼滿其枝萼文苑英華作英其顧元緯本凌本俱作芳請君理還䇿敢告將農時日夕佳陶潛詩山氣日夕佳如意釋氏要覽指歸云如意古之爪杖也或骨角竹木刻作手指爪柄可長三尺許或脊有癢手所不到用以搔爪如人之意故曰如意成嘗問譯經三蔵通梵大師清沼字學通慧大師雲勝皆云如意之製盖心之表也故菩薩皆執之狀如雲葉又如此方篆書心字故若局爪杖者祗如文殊亦執之豈欲搔癢也又云今講僧尚執之多私記節文祝詞於柄備於忽忘要時手執目對如人之意故名如意如俗官之手板備於忽忘名笏也若齊髙祖賜隐士明僧紹竹根如意梁武帝賜昭明太子木犀如意石季倫王敦皆執鐵如意此必爪杖也因斯而論則有二如意盖名同而用異焉臯李竒漢書註臯水邊淤地也澹澹髙唐賦潰澹澹而並入李善註澹澹平滿貌還策策杖也南史褚伯玉傳望其還䇿之日蹔紆清塵華嶽西嶽出浮雲積翠在太清翠一作雪連天疑黛色疑一作凝百里遥青冥白日為之寒森沉華隂城昔聞乾坤閉閉文苑英華作開造化生巨靈造文苑英華作變右足踏方止止文苑英華作山左手推削成天地忽開拆大河注東溟遂為西峙嶽峙嶽文苑英華作嶽峙雄雄鎮秦京大君包覆載至徳被羣生上帝佇昭告金天思奉迎人祗望幸久人一作神何獨禪云亭西嶽水經華山為西嶽在𢎞農華隂縣西南太平寰宇記太華山在華州華隂縣南八里逺而望之有若華狀故名華山按名山記云華嶽有三峯直上數千仞基廣而峯峻疊秀迄于嶺表有如削成今博山香爐形實象之又按華山記云頂有池生千葉蓮花服之羽化因名華山白虎通云西方華山少隂用事萬物生華故曰華山以西有少華故曰太華太清髙誘淮南子註太清元氣之清者也青冥楚辭據青冥而攄虹兮森沉鮑照詩銅谿畫森沉乳竇夜涓滴巨靈水經注左丘明國語云華嶽本一山當河河水過而曲行河神巨靈手盪脚踏開而為兩今掌足之跡仍存華嶽開山圖曰有巨靈胡者偏得坤元之道能造山川出河所謂巨靈贔屭首冠靈山者也常有好事之人故升華嶽而觀厥跡焉薛綜西都賦註巨靈河神也古語云此本一山當河水過之而曲行河之神以手擘開其上足蹋離其下中分為二以通河流手足之跡於今尚在藝文類聚述征記曰華山對河東首陽山黄河流於二山之間云本一山巨靈所開今覩手跡於華嶽而脚跡在首陽山下法苑珠林巨靈大人秦洪海者患水浩蕩以左掌托太華右足蹣中條太一為之裂河也通地出張衡西京賦云髙掌逺蹠以流河曲者是削成山海經太華之山削成而四方其髙五千仞其廣十里東溟顔延年詩日觀臨東溟呂向註東溟謂東海秦京闗中本秦地在漢為京師故稱秦京陸機詩孟諸吞楚夢百二侔秦京金天杜氏通典先天二年封華岳神為金天王禪云亭按史記昔無懷氏伏義神農炎帝顓頊帝嚳堯舜皆封泰山禪云云黄帝封泰山禪亭亭李竒註云云山在梁父東索隐云晉灼云云云山在蒙陽縣故城東北下有云云亭應劭云亭亭山在鉅平北十餘里服䖍云在牟隂非也輿地廣記襲慶府奉符縣有亭亭山泗水縣有云云山成按劉昫唐書開元十三年東封泰山十八年百僚及華州父老累表請封西嶽不允右丞之作當在是時故有神祇望幸久何獨禪云亭之句厥後至天寳九載正月羣臣又請封西嶽從之三月辛亥西嶽廟灾時久旱制停封西嶽則始終末嘗封矣王右丞集箋注巻二
