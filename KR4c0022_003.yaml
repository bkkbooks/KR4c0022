body:
  text: 王右丞集箋注卷三仁和趙殿成撰古詩二十三首胡居士臥病遺米因贈了觀四大因根性何所有妄計茍不生是身孰休咎色聲何謂客隂界復誰守徒言蓮花目豈惡楊枝肘既飽香積飯不醉聲聞酒有無斷常見生滅幻夢受即病即實相趨空定狂走無有一法真無有一法垢居士素通達隨宜善抖擻牀上無氊臥鎘中有粥否鎘顧可久本作鍋非齋時不乞食定應空潄口凌本於此句下多露葵自朝折黃梁不煩剖二句諸本皆無之聊持數斗米且救浮生取居士鳩摩羅什維摩詰經注外國白衣多財富樂者名為居士釋氏要覽智度論云除四姓外通名居士翻譯名義迦羅越大品經中居士是也楞嚴云愛結名言清淨自居普門疏以多積貨財居業豐盈謂之居士鄭康成云道藝處士四大此身因四大和合為相骨肉之堅相為地大津液之潤濕為水大暖觸之氣息為火大動搖之筋脈為風大維摩詰經四大合故假名為身四大無主身亦無我根性華嚴經普現一切衆生心念根性樂欲而無所現隂界謂五隂十八界維摩詰經言是身是隂界諸八所共合成蓮花目法華經是菩薩目如廣大青蓮花葉楊枝肘莊子支離叔與滑介叔觀於冥伯之丘崑崙之虛黃帝之所休俄而栁生其左肘其意蹶蹶然惡之林希逸注桞瘍也今人謂生節也香積飯維摩詰經於是維摩詰不起於座居衆會前化作菩薩而告之曰汝往上方界分度四十二恆河沙佛土有國名衆香佛號香積與諸菩薩方共坐食汝往到彼如我辭曰願得世尊所食之餘當於娑婆世界施作佛事令此樂小法者得宏大道亦使如來名聲普聞時化菩薩即於會前升於上方舉衆皆見其去到衆香界禮彼佛足又聞其言於是香積如來以衆香鉢盛滿香飯與化菩薩時化菩薩既受鉢飯須臾之間至維摩詰舍以滿鉢香飯與維摩詰飯香普薰毗耶離城及三千大千世界時毗耶離婆羅門居士等聞是香氣身意快然歎未曽有於是長者主月蓋從八萬四千人來入維摩詰舍諸地神虛空神及欲色界諸天聞此香氣亦皆來入維摩詰舍維摩詰語舍利弗等諸大聲聞仁者可食如來甘露味飯大悲所薰無以限意食之使不消也有異聲聞念是飯少而此大衆人人當食化菩薩曰勿以聲聞小德小智稱量如來無量福慧四海有竭此飯無盡使一切人食揣若須彌乃至一劫猶不能盡所以者何無盡戒定智慧解脫解脫知見功德具足者所食之餘終不可盡於是鉢飯悉飽衆會其諸菩薩聲聞天人食此飯者身安快樂又諸毛孔皆出妙香聲聞法華經若有衆生內有智性從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘釋氏要覽智度論云若苦行頭陀初中後夜勤心禪觀苦而得道者聲聞教也若觀法相無縛無解心得清淨菩薩教也瑜伽論云諸佛聖教聲為上首從師友所聞此聲教展轉修證永出世間小行小果故名聲聞斷常見涅槃經衆生起見凡有二種一者常見二者斷見楞伽經離於斷常有無等見大般若經如是般若波羅蜜多能滅一切常見斷見有見無見乃至種種諸惡趣見法苑珠林成論云以世諦故得成中道以五隂相續生故不斷念念滅故不常離此斷常名為中道故知因果非定斷常於現報中凡愚不觀念念遷滅則是常見不觀念念新生則是斷見若於來報愛未盡著隨業受生六道不定人非常人迷此謂常則是常見若謂死後更不受生心識永謝則是斷見幻夢維摩詰經是身如幻從顛倒起是身如夢為虛妄見實相法華經唯佛與佛乃能究盡諸法實相涅槃經無相之相名為實相抖擻抖擻猶言振作釋氏要覽頭陀梵語杜多漢言抖擻謂三毒如塵能坌汙真心此人能振掉除去故鎘韻會説文鬲鼎屬本作鬲實五觳十二升曰觳象腹交文三足徐曰上頸也腹交文謂其刻飾也五觳六斗也爾雅鼎款足謂之鬲或作鬲又作鎘狼狄切音與栗同漱口釋氏法每食後必以楊枝漱刷口齒浮生莊子其生若浮與胡居士皆病寄此詩兼示學人二首一興微塵念橫有朝露身如是覩隂界覩一作都誤何方置我人礙有固為主趣空寧捨賔洗心詎懸解悟道正迷津因愛果生病從貪始覺貧色聲非彼妄浮幻即吾真四達竟何遣萬殊安可塵胡生但髙枕寂寞與誰鄰戰勝不謀食理齊甘負薪子若未始異詎論疏與親朝露漢書人生如朝露何久自苦如此師古注朝露見日則晞人命短促亦如之我人瓔珞經盡觀世界空無我人華嚴經此中無少物但有假名字若計有我人則為入險道空有後漢書清心釋纍之訓空有兼遣之宗章懷太子注不執著為空執著為有兼遣謂不空不有虛實兩忘也鳩摩羅什維摩詰經注佛法有二種一者有二者空若常在有則纍于想著若常在空則捨于善本若空有迭用則不設二過猶日月代明萬物以成懸解莊子適來夫子時也適去夫子順也安時而處順哀樂不能入也古者謂是帝之縣解郭象注以有繫者為縣則無繫者縣解也縣解而性命之情得矣此養生之要也陸德明注縣音玄解音蟹崔云以生為縣以死為解生病維摩詰經從癡有愛則我病生浮幻西域記人命危脆世間浮幻戰勝韓非子子夏見曾子曾子曰何肥也對曰戰勝故肥也曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰于胸中未知勝負故臞今先王之義勝故肥浮空徒漫漫泛有定悠悠無乘及乘者所謂智人舟詎捨貧病域不疲生死流無煩君喻馬任以我為牛植福祠迦葉求仁笑仲由何津不鼓棹何路不摧輈念此聞思者胡為多阻修空虛花聚散煩惱樹稀稠滅想成無記想顧元緯本作相生心坐有求降吳復歸蜀不到莫相尤無乘及乘者楞伽經諸天及梵乘聲聞緣覺乘諸佛如來乘我説此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者無有乘建立我説為一乘引導衆生故分别説諸乘生死流涅槃經善斷有頂種永度生死流喻馬涅槃經譬如大王有三種馬一者調壯大力二者不調齒壯大力三者不調羸老無力王若乘者當先乘誰應當先乘調壯大力次乘第二後及第三調壯大力喻菩薩僧其第二者喻聲聞僧其第三者喻一闡提為牛莊子子呼我牛也而謂之牛呼我馬也而謂之馬迦葉法苑珠林第四拘樓秦佛第五拘那含牟尼佛第六迦葉佛此三佛同姓迦葉又釋迦文佛之大弟子亦名迦葉僧肇維摩詰經注迦葉以貧人昔不植福故生貧里若今不積善後復彌甚愍其長苦多就乞食聞思修學人修習禪觀有聞思修三法謂聞法思惟修習能生智慧遺教經是故汝等當以聞思修慧而自增益空虛花楞伽經觀一切有為猶如虛空花仁王經世諦幻化起譬如虛空花煩惱樹佛遺教經實智慧者伐煩惱樹之利斧也涅槃經是經即是剛利智斧能伐一切煩惱大樹無記釋氏説心有三種以思惟世間雜善等事為善思惟世間五欲因緣為惡善惡不形寂然昏住為無記降吳歸蜀蜀志黃權傳有降吳不可還蜀無路之語右丞借用其字承上而言以喻滅想生心皆非入道之經耳藍田山石門精舍落日山水好漾舟信歸風玩竒不覺逺玩一作探因以緣源窮緣唐詩紀事作尋遙愛雲木秀秀一作翠初疑路不同疑文苑英華作言安知清流轉安文苑英華作誰偶與前山通捨舟理輕䇿果然愜所適老僧四五人逍遙蔭松柏朝梵林未曙未一作方夜禪山更寂道心及牧童及一作友世事問樵客問文苑英華作聞暝宿長林下林一作井焚香臥瑶席澗芳襲人衣山月映石壁再尋畏迷誤明發更登歷笑謝桃源人謝一作問花紅復來覿文苑英華本分捨舟理輕䇿以下另為一首漾舟謝惠連詩漾舟陶嘉月李周翰注漾舟泛舟也歸風木華海賦或乃萍流而浮轉或因歸風以自反緣源謝朓詩緣源殊未極歸徑窅如迷劉良注緣尋也輕䇿謝靈運詩裹糧仗輕䇿蔭松柏楚辭飲石泉兮蔭松柏道心梁武帝詩道心理歸終信首故宜先桃源搜神後記晉太原中武陵人捕魚為業緣溪行忘路逺近忽逄桃花夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣佛若有光便捨舟從口入初極狹才通人復行數十步豁然開朗土地曠空屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞男女衣著悉如外人黃髮垂髫並怡然自樂見漁人大驚問所從來具答之便要還家設酒殺雞作食村中人聞有此人咸來問訊自云先世避秦時難率妻子邑人來此絶境不復出焉遂與外隔問今是何世乃不知有漢無論魏晉此人一一具言所聞皆為歎惋停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡詣太守説如此太守劉歆即遣人隨之往尋向所志不復得焉殷墦云王維詩詞秀調雅意新理愜在泉為珠著壁成繪一句一字皆出常境至如落日山水好漾舟信歸風又澗芳襲人衣山月映石壁又天寒逺山靜日暮長河急又賤日豈殊衆貴來方悟稀又日暮沙漠垂戰聲煙塵裏豈肯慚於古人也青溪文苑英華作過青溪水作言入黃花川每逐青溪水隨山將萬轉趣途無百里聲喧亂石中色靜深松裏漾漾泛菱荇漾漾文苑英華作演漾澄澄映葭葦我心素已間清川淡如此川一作明請留盤石上垂釣將已矣黃花川杜氏通典鳳州黃花縣有黃花川方輿勝覽黃花川在鳳州梁泉縣大散水流入黃花川一統志黃花川在漢中府鳳縣東北一十里唐黃花縣以此名盤石成公綏嘯賦坐盤石潄清泉李善注聲類曰盤大石也崔濮陽兄季重前山興原注山西去亦對維門秋色有佳興况君池上間悠悠西林下自識門前山千里橫黛色數峯出雲間嵯峨對秦國合沓藏荆關殘雨斜日照夕嵐飛鳥還故人今尚爾歎息此頽顔崔季重蘇源明小洞庭五太守宴籍序天寶十二載七月辛丑東平太守扶風蘇源明觴濮陽太守清河崔公季重魯郡太守隴西李公蘭濟南太守太原田公琦濟陽太守隴西李公倰於回源亭濮陽唐書地理志河南道有濮州濮陽郡武德四年置合沓謝朓詩兹山髙百里合沓與雲齊呂向注合沓髙貌嵐廣韻嵐山氣也頽顔駱賔王詩祗應傾玉醴時許寄頽顔終南别業河嶽英靈集文苑英華唐文粹俱作入山寄城中故人國秀集作初至山中中歲頗好道晚家南山陲興來每獨往勝事空自知空國秀集作祗行到水窮處坐看雲起時偶然值林叟值國秀集作見林一作鄰談笑無還期無還期國秀集瀛奎律髓俱作滯還期唐文粹作無回期中歲中年也謝朓詩中歲歷三臺詩人玉屑此詩造意之妙至與造物相表裏豈直詩中有畫哉觀其詩知其蟬蛻塵埃之中蜉蝣萬里之表者也李處士山居李二顧本凌本俱作石君子盈天階小人甘自免方隨錬金客林上家絶巘背嶺花未開入雲樹深淺清晝猶自眠山鳥時一囀天階潘正叔詩遊鱗萃靈沼撫翼希天階劉良注靈沼天階喻左右省閣也韋侍郎山居幸忝君子顧遂陪塵外蹤間花滿巖谷瀑水映杉松水凌本作布啼鳥忽臨澗歸雲時抱峰良遊盛簪紱繼迹多夔龍詎枉青門道故聞長樂鐘故凌本作胡一作用清晨去朝謁車馬何從容車一作鞍良遊陸機詩念昔良遊茲焉永歎長樂鐘徐陵玉臺新詠序厭長樂之疏鐘勞中宮之緩箭丁宇田家有贈文苑英華作田家贈丁宇君心尚棲隱久欲傍歸路在朝每為言解印果成趣晨雞鳴鄰里羣動從所務農夫行餉田閨婦起縫素婦一作妾開軒御衣服散帙理章句時吟招隱詩或製間居賦新晴望郊郭日映桑榆暮映一作昳隂盡小苑城隂文苑英華作蔭盡一作畫微明渭川樹揆豫宅閭井幽賞何由屢道存終不忘迹異難相遇此時惜離别再來芳菲度傍歸路謝靈運詩從來漸二紀始得傍歸路張銑注傍近也成趣歸去來辭園日涉以成趣散帙謝靈運詩散帙問所知劉良注散帙謂開書帙也説文帙書衣也招隱詩左太沖有招隱詩間居賦潘嶽聞居賦序於是覽止足之分庶浮雲之志築室種樹逍遙自得池沼足以漁釣舂稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之費孝乎惟孝友於兄弟此亦拙者之為政也乃作間居賦以歌事遂情焉桑榆初學記日西垂景在樹端謂之桑榆言其光在桑榆樹上小苑城小苑字始見漢書蕭望之傳昔賢不注地在何處六朝及唐人詩中多用之或謂唐人所稱小苑即宜春苑是成按右丞長樂青門外宜春小苑東之句則不得謂宜春即小苑矣當是指曲江之芙蓉園也唐大內有西內苑有東內苑有禁苑凡三苑芙蓉園不及三苑之澗逺故謂之小苑一時稱謂如此宜春宮雖在其地然不得混指為一渭川三輔黃圖渭水出隴西首陽縣鳥鼠同穴山東北至華隂入河唐六典注渭水出渭州厯秦隴岐京兆同華六州入於河揆豫楚辭皇覽揆豫於初度兮閭井宋書何承天傳並踐禾稼焚爇閭井道存莊子若夫人者目擊而道存矣渭川田家川文苑英華作水斜光照墟落光文苑英華作陽窮巷牛羊歸窮唐文粹作深野老念牧童牧童唐詩品彚作僮僕倚杖候荆扉雉雊麥苗秀蠶眠桑葉稀田夫荷鋤立立二顧本文苑英華唐文粹俱作至相見語依依即此羡間逸唐文粹作羡此良間逸悵然歌式微歌二顧本凌本俱作吟斜光王僧孺詩斜光隱西壁墟落謂村墟籬落范雲詩軒蓋照墟落雉雊潘嶽射雉賦麥漸漸以擢芒雉鷕鷕而朝雊鄭康成毛詩箋雊雉鳴也蠶眠蠶將蛻輒卧不食古人謂之俯荀卿蠶賦所謂三俯三起事乃大已是也後人謂之眠考庾信歸田詩云社雞新欲伏原蠶始更眠又燕歌行云春分燕來能幾日三月蠶眠不復久則六朝時巳有此稱矣荷鋤陶潛詩帶月荷鋤歸式微子貢詩傳狄侵黎黎侯出奔衛衛穆公不禮焉黎人怨之賦旄丘黎大夫勸其君以歸國賦式微春中田園作中凌本作日屋上春鳩鳴村邉杏花白持斧伐逺揚荷鋤覘泉脈歸燕識故巢歸唐詩品彚作新故文苑英華唐詩品彚俱作舊舊人看新歷舊一作故臨觴忽不御惆悵逺行客文苑英華作惆悵思逺客春中史記秦始皇本紀時在春中正義曰中音仲春鳩曹植詩春鳩鳴飛棟逺揚詩蠶月條桑取彼斧斨以伐逺揚毛萇傳逺枝逺也揚條揚也孔穎達正義逺枝逺者謂長枝去人逺也揚條揚者謂長條揚起者也皆手所不及故枝落之而採取其葉泉脈謝朓詩察壤見泉脈臨觴陸機詩置酒髙堂悲歌臨觴過李揖宅間門秋草色間劉本顧元緯本俱作閉終日無車馬客來深巷中犬吠寒林下林唐詩品彚作籬散髮時未簪道書行尚把與我同心人樂道安貧者一罷宜城酌還歸洛陽社寒林陸機歎逝賦步寒林以悽惻散髮鍾會遺榮賦散髮抽簪永縱一壑道書江淹自序傳山中無事與道書為偶樂道安貧後漢書韋彪安貧樂道恬於進趣宜城曹植酒賦其味有宜城濃醪蒼梧漂清張華詩蒼梧竹葉清宜城九醖醝太平寰宇記襄州宜城縣出美酒俗號宜城美酒為竹葉杯方輿勝覽金沙泉在宜城縣東一里造酒極美世謂之宜城春又名竹葉酒洛陽社晉書董京字威輦初與隴西計吏俱至洛陽被髮而行逍遙吟詠常宿白社中吳均詩豫為隴西使寓居洛陽社飯覆釡山僧晚知清淨理日與人羣疏將候逺山僧先期掃敝廬果從雲峰裏顧我蓬蒿居藉草飯松屑焚香看道書燃燈晝欲盡鳴磬夜方初已悟寂為樂此生間有餘生一作日思歸何必深身世猶空虛覆釡山成按山名覆釡者不止一處然右丞所指疑在長安未詳所在敝廬左傳小人糞除先人之敝廬雲峰江淹詩平明望雲峰蓬蒿居趙岐三輔決録注張仲蔚扶風人也少與同郡魏景卿隱身不仕明天官博物好為詩賦所居蓬蒿沒人也松屑江淹報袁叔明書朝餐松屑夜誦仙經又青苔賦咀松屑以髙想捧丹經而永慕初夜遺教經汝等比丘晝則勤心修習善法無令失時初夜後夜亦勿有廢中夜誦經以自消息謁璿上人并序上人外人內天不定不亂捨法而淵泊無心而雲動色空無得不物物也得顧元緯本凌本俱作礙默語無際不言言也故吾徒得神交焉玄關大啓德海羣泳時雨既降春物俱美序于詩者人百其言少年不足言識道年已長事往安可悔悔顧元緯本作否非餘生幸能養誓從斷葷血葷顧元緯本凌本俱作臂且引神光斷臂事作解非是秉恕按唐書本傳謂維居常蔬食不茹葷血此句自是實事若訛作臂字虛假無當且不成文不復嬰世網浮名寄纓珮空性無羈鞅夙從大導師從一作承焚香此瞻仰頽然居一室覆載紛萬象髙桞早鶯啼長廊春雨響牀下阮家屐窗前笻竹杖方將見身雲陋彼示天壤一心在法要願以無生奬璿上人續高僧傳元崇以開元末年因從璿禪師咨受心要日夜匪懈璿公乃因受深法與崇歷上京遂入終南至白鹿下藍田於輞川得右丞王公維之别業松生石上水流松下王公焚香靜室與崇相遇神交釋氏要覽十誦律云有四種一粗人二濁人三中間人四上人瓶沙王呼佛弟子為上人古師云內有智德外有勝行在人之上名上人外人內天莊子天在內人在外郭象注天然在內而天然之所順者在外故大宗師曰知天人之所為者至矣明內外之分皆非為也不定不亂維摩詰經我觀如來不定不亂色空大般若經色不離空空不離色色即是空空即是色物物呂覽物物而不物于物則胡可得而纍言言列子夫知言之謂者不以言言也神交晉書嵇康所與神交者惟陳留阮籍河內山濤玄關頭陀寺碑文玄關幽鍵感而遂通李善注玄關幽鍵喻法藏也謝靈運金剛般若經注曰玄關難啓善鍵易開德海華嚴經為令一切菩薩於佛功德海中得安住故世網陸機詩借問子何之世網嬰我身張銑注嬰纏也纓珮沈約詩纓珮空為忝劉良注纓珮官服飾也羈鞅廣韻羈馬絆也鞅牛羈也大導師法華經諸比丘如來亦復如是今為汝等作大導師華嚴經一切菩薩為大導師引諸衆生入佛法門阮家屐晉書阮孚性好屐或有詣阮正見自蠟屐因自歎曰未知一生當著幾量屐笻竹杖劉淵林三都賦注笻竹出興古盤江以南竹中實而髙節可以作杖太平寰宇記蜀記云漢張騫奉使尋河源得髙節竹植於卭山今緣嶺皆是堪為杖號曰卭竹杖身雲華嚴經或見諸菩薩入變化三昧各於其身一一毛孔出一切變化身雲或見出天衆身雲或見出龍衆身雲或見出夜義乾闥婆緊那羅阿修羅迦樓羅摩㬋羅伽釋梵護世轉輪聖王小王王子大臣官屬長者居士身雲或見出聲聞緣覺及諸菩薩如來身雲或見出一切衆生身雲又云如來應正等覺無上法王欲以正法教化衆生先布身雲彌覆法界隨其樂欲為現不同所謂或為衆生現生身雲或為衆生現化身雲或為衆生現力持身雲或為衆生現色身雲或為衆生現相好身雲或為衆生現福德身雲或為衆生現智慧身雲或為衆生現諸力不可壞身雲或為衆生現無畏身雲或為衆生現法界身雲如來以如是等無量身雲普覆十方一切世界天壤莊子鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子見之而心醉歸以告壺子壺子曰嘗試與來以豫示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不可以旬數矣吾見怪焉見濕灰焉列子入涕泣沾襟以告壺子壺子曰向吾示之以地文萌乎不震不正是殆見吾杜德機也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣吾見杜權矣列子入告壺子壺子曰向吾示之以天壤名實不入而機發於踵此為杜權是殆見吾善者幾也法要涅槃經如來為説種種法要無生魏書釋老志凡其經旨大抵言生生之類皆因行業而起有過去當今未來三世識神常不滅凡為善惡必有報應漸積勝業陶冶粗鄙經無數形藻鍊神明乃致無生而得佛道送魏郡李太守赴任與君伯氏别氏文苑英華作兄又欲與君離君行無幾日當復隔山陂蒼茫秦川盡日落桃林塞獨樹臨關門黃河向天外前經洛陽陌宛路故人稀路顧可久本凌本俱作洛故人離别盡文苑英華作故人盡離别淇上轉驂騑企豫悲送逺惆悵睢陽路古木官渡平秋城鄴宮故宮文苑英華作都想君行縣日其出從如雲遙思魏公子復憶李將軍魏郡成按唐書地理志天寶元年改相州魏郡為鄴郡改魏州陽武郡為魏郡觀詩中所云官渡鄴城者則是相而非魏矣是詩之作當在開元時也或引劉昫唐書楊國忠秉政郎官不附已者悉出於外李峘自考功郎中出為睢陽太守尋而弟峴出為魏郡太守兄弟夾河典郡皆以理行稱右丞所謂與君伯氏别又欲與君離者正指峘峴兄弟考國忠秉政在天寶時是時相州已更鄴名不得仍稱魏號蓋别是一人非李峴也山陂古詩悠悠隔山陂秦川水經注秦水出東北大隴山秦谷二源雙導歷三泉合成一水而歷秦川川有育故亭秦仲所封也秦之為號始自是矣秦水西徑降隴縣故城南又西南歷隴川徑六槃口過清水城西南注清水清水上下咸謂之秦川長安志周自武王克商都豐鎬則雍州為王畿及秦孝公作為咸陽築冀闕徙都之故謂之秦川亦曰關中地桃林塞左傳晉侯使詹嘉處瑕以守桃林之塞杜預注桃林在𢎞農華隂縣東潼關史記正義括地志云桃林在陜西桃林縣西至潼關皆為桃林塞九域志潼關即桃林之塞也通鑑地理通釋潼關古桃林塞也書放牛桃林之野注云在華山東山海經夸父之山其北有林名曰桃林廣圓三百里三秦記桃林塞在長安東四百里西京賦注桃林在閿鄉南谷中晉地道記漢𢎞農函谷關有桃林寰宇記自陜州靈寶縣以西至潼關皆是也今考古函谷關在陜州靈寶縣西南潼關在華州華隂縣自潼關至函谷歷陜華二州之地俱謂之桃林塞淇上孔穎達尚書正義河內共縣淇水出焉東至魏郡黎陽縣入河鄭樵通志淇水一名清水鄭玄云即降水也出衛州共城縣北山或云出林慮東至陽隂又東至黎陽入河驂騑説文驂駕三馬也騑驂傍馬也鄭康成儀禮注騑馬曰驂又詩經注驂兩騑也孔穎達疏云車駕四馬在內兩馬謂之服在外兩馬謂之騑又穎達禮記疏云車有一轅而四馬駕之中央兩馬夾轅者名服馬兩邉名騑馬亦曰驂馬李善文選注服謂中央兩馬夾轅者在服之左曰驂右曰騑三説不同而鄭孔之説為是蔡雍協和婚賦車服照路驂騑如舞睢陽唐書地理志河南道有宋州睢陽郡本梁郡天寶元年改名官渡水經注渠又左徑陽武縣故城南東為官渡水又徑曹太祖壘北有髙臺謂之官渡臺渡在中牟故世又謂之中牟臺建安五年太祖營官渡袁紹保陽武紹連營稍前依沙堆為屯東西數十里公亦分營相禦合戰不利紹進臨官渡起土山地道以逼壘公亦起髙臺以捍之即中牟臺也今臺北土山猶在山之東悉紹舊營遺臺並存章懷太子後漢書注裴松之北征記曰中牟臺下臨汴水是為官渡袁紹曹操壘尚存焉在今鄭州中牟縣北鄴宮太平寰宇記相州安陽縣有鄴宮十六國春秋云石勒大破鄴宮燒之火旬有五日方滅石虎建武元年自襄國徙都之自襄國至鄴道路相去二百里每一舍輒立一宮宮有一夫人侍婢數十季龍所起內外臺觀行宮凡四十四所成按自曹魏建國於鄴其後後趙前燕東魏北齊相繼都之則宮室之盛可知後人所稱鄴宮定是泛指釋者多援引後趙時事其解偏矣行縣漢書尹翁歸傳田延年為河東太守行縣至平陽後漢書百官志凡郡國皆掌治民進賢勸功決訟檢姧常以春行所主縣勸民農桑振救乏絶如雲詩其從如雲毛萇傳如雲言盛也魏公子謂魏文帝曹子建公宴詩公子敬愛客終宴不知疲李善注公子謂文帝時武帝在為五官中郎也劉良注時武帝在故稱丕為公子李將軍謂李典魏志李典傳從圍鄴鄴定與樂進圍髙幹於壺關擊管承於長廣皆破之遷捕虜將軍典宗族部曲三千餘家居乘氏自請願徙詣魏郡太祖笑曰卿欲慕耿純耶典謝曰典駑怯功微而爵寵過厚誠宜舉宗陳力加以征伐未息宜實郊遂之內以制四方非慕純也遂徙部曲宗族萬三千餘口居鄴太祖嘉之遷破虜將軍成按末一聨是謂其行縣之時或思魏公子之風流或憶李將軍之功烈蓋覽故迹遺墟而感懷憑弔之意皆用魏郡事實也顧元緯以魏公子為無忌李將軍為李廣謂其姓李而官魏故比之二人以致思信如所解則遙思復憶俱屬右丞而言與上聨想君之句不相重復耶且相州之地在戰國時雖屬於魏而信陵遺迹皆𨽻大梁在唐時為汴州其於相州若風馬牛不相及也詩人用事固不拘拘於地理之經界而判然兩境者豈容援引而及之至顧可久謂李廣為雲中太守魏郡與上黨雲中等古之相屬地也并載李廣云云尤屬無稽矣送康太守城下滄江水江邉黃鶴樓朱欄將粉堞江水映悠悠鐃吹發夏口使君居上頭郭門隱楓岸候吏趨蘆洲何異臨川郡還來康樂侯來一作勞滄江任昉詩滄江路窮此黃鶴樓元和郡縣志鄂州城本夏口城吳黃武二年城江夏以安屯戍地也城西臨大江西南角因磯為樓名黃鶴樓方輿勝覽黃鶴樓在鄂州子城西南隅黃鶴山上此樓因山得名蓋自南朝已著矣南齊志仙人子安乘黃鶴過此閻伯理記州城西南隅有黃鶴樓者圖經云費文禕登仙嘗駕黃鶴返憩於此遂以名樓張敬夫云黃鶴樓以山得名也而唐圖經何自而為怪説謂費文禕仙去駕鶴來憩於此閻伯理記中乃實其事而或者又引梁任昉記所謂駕鶴之賔乃荀叔禕非文禕也此皆因黃鶴之名而世之好事者妄為之説後來者既不之察又從而並緣增飾之一統志黃鶴樓在武昌府城西南隅黃鶴磯上粉堞梁簡文帝詩平江含粉堞鐃吹唐書儀衛志凡鼓吹五部一鼓吹二羽葆三鐃吹四大橫吹五小橫吹鐃吹部七曲一破陳樂二上車三行車四向城五平安六歡樂七太平夏口章懷太子後漢書注夏口城今之鄂州也杜氏通典夏口即今江夏郡方輿勝覽夏口一名魯口似指夏水之口然何尚之云夏口在荆江之中正對沔口浦大容舫於事為便而章懷太子注東漢亦謂夏口戍在今鄂州故唐史皆指鄂州為夏口自孫權取對面夏口之名以名之而江北之名始晦上頭陌上桑古辭東方千餘騎夫壻居上頭候吏後漢書王霸傳及至滹沱河候吏還白蘆洲庾仲雍江圖蘆洲至樊口二十里伍子胥所渡處也樊口至武昌十里水經注邾縣故城南對蘆洲舊吳時客舍於洲上方便謂所止焉亦謂之羅洲矣臨川宋書謝靈運襲封康樂公高祖受命降公爵為侯後為臨川內史送陸員外郎署有伊人居然古人風天子顧河北詔書𨽻征東𨽻顧元緯本凌本俱作除拜手辭上官緩步出南宮九河平原外七國薊門中隂風悲枯桑古塞多飛蓬萬里不見敵蕭條蕃地空無為費中國更欲邀竒功遲遲前相送握手嗟異同行當封侯歸肯訪南山翁郎署後漢書馬融傳安帝親政召還郎署伊人詩所謂伊人鄭康成箋伊當作翳翳猶是也河北唐六典河北道古幽冀二州之境今懷衛相洺邢趙恆定易幽莫瀛深冀貝魏博德滄棣媯澶營平安東凡二十有五焉東並於海南迫於河西距太行山北通渝關薊門征東成按開元天寶問無征東事迹當是安東之訛劉昫唐書總章元年九月司空李績平髙麗髙麗本五部一百七十六城户六十九萬七千其年十二月分髙麗地為九都督府四十二州一百縣置安東都護府於平壤城以統之用其酋渠為都督刺史縣令上元三年二月移安東府於遼東郡故城儀鳳二年又移置於新城開元二年移於平州天寶二年移於遼西故郡城至德後廢拜手尚書太甲篇伊尹拜手稽首孔安國傳拜手首至手也孔頴達正義周禮太祝辨九拜一曰稽首二曰頓首三曰空首鄭玄云稽首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也鄭惟解此三者拜之形容所以為異也此言拜手稽首者初為拜頭至手乃復申頭以至於地至手是為拜手至地乃為稽首然則凡為稽首者皆先為拜手乃後為稽首故拜手稽首連言之上官後漢書任延傳善事上官南宮成按唐人通呼尚書省為南宮後人因禮部郎有南宮舍人之目及杜工部寄禮部賈侍郎詩有南宮故人之句遂謂南宮專稱禮部誤矣白樂天詩我為憲部入南宮是其除刑部時詩也盧綸詩南宮樹色曉森森是酬金部王郎中詩也李嘉祐詩多雨南宮夜仙郎寓直時是和都官員外詩也因話録尚書省東南隅通衢有小橋相承目為拗項橋言侍御史及殿中諸郎久次者至此必拗項而望南宮參互考之其義見矣韻府羣玉謂漢建尚書百官府曰南宮考其説亦無所本惟後漢時陳忠為尚書令前後所奏悉條於南宮閣上以為故事鄭𢎞為尚書令前後所陳有補益王政者皆著之南宮以為故事見後漢書及杜氏通典謂尚書省為南宮當本此九河尚書九河既道孔安國傳河水分為九道在兗州界平原以北是孔穎達正義云釋水載九河之名云徒駭太史馬頰覆釡胡蘇簡潔鉤盤鬲津李巡曰徒駭禹疏九河以徒衆起故云徒駭太史禹大使徒衆通其水道故曰太史馬頰河勢上廣下狹狀如馬頰也覆釡水中多渚往往而處形如覆釡胡蘇其水下流故曰胡蘇胡下也蘇流也簡大也河水深而大也潔言河水多山石治之苦潔潔苦也鉤盤言河水曲如鉤屈折如盤也鬲津河水狹小可鬲以為津也孫炎曰徒駭禹疏九河用功雖廣衆懼不成故曰徒駭胡蘇水流多散胡蘇然其餘同李巡郭璞云徒駭今在成平東光縣今有胡蘇亭覆釡之名同李巡餘名皆云其義未詳計禹疏九河云復其故道則名應先有不宜徒駭太史因禹立名此郭氏所以未詳也或九河雖舊有名至禹治水更别立名即爾雅所云是也漢書溝洫志成帝時河隄都尉許商上書曰古記九河之名有徒駭胡蘇鬲津今見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝也許商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也爾雅九河之次從北而南既知三河之處則其餘六者太史馬頰覆釡在東光之北成平之南簡潔鉤盤在東光之南鬲縣之北也其河填塞時有故道鄭玄云周時齊桓公塞之同為一河今河間弓髙以東至平原鬲津往往有其遺處七國晉書地理志幽州統郡國七范陽國燕國北平郡上谷郡廣寧郡代郡遼西郡薊門唐六典注薊門在幽州北一統志古薊門關在薊州唐置薊州蓋取此薊丘在舊燕城西北隅即古薊門也舊有樓館並廢但門存二土阜旁多林木蓊鬱蒼翠蕭條後漢書蕭條萬里野無遺寇竒功漢書陽朔中段會宗復為都護會宗為人好大節矜功名與谷永相友善谷永閔其老復逺出豫書戒曰足下以柔逺之令德復典都護之重職甚休甚休若子之材可優遊都城而取卿相何必勒功昆山之仄總領百蠻懷柔殊俗子之所長愚無以喻雖然朋友以言贈行敢不略意方今漢德隆盛逺人賓服傅鄭甘陳之功沒齒不可復見願吾子因循舊貫毋求竒功終更亟還亦足以復雁門之踦萬里之外以身為本願詳思愚言遲遲毛萇詩傳遲遲舒行貌送宇文太守赴宣城寥落雲外山迢遙舟中賞鐃吹發西江秋空多清響地迥古城蕪月明寒潮廣時賽敬亭神復解罟師網何處寄相思南風吹五兩吹顧元緯本凌本俱作搖宣城唐書地理志江南西道有宣州宣城郡敬亭神謝朓有賽敬亭山廟喜雨詩宣城郡圖經敬亭山在宣城縣北十里太平寰宇記郡國志及宋永初山川記云宛陵北有敬亭山山有神祠即謝朓賽雨賦詩之所其神曰梓華府君頗有靈驗五兩郭璞江賦覘五兩之動靜李善注許慎淮南子注曰綄候風也楚人謂之五兩也送綦母校書棄官還江東校一作袐明時久不達棄置與君同天命無怨色人生有素風念君拂衣去四海將安窮秋天萬里淨日暮澄江空澄顧元緯本凌本俱作九清夜何悠悠扣舷明月中和光魚鳥際淡爾蒹葭叢無庸客昭世衰鬢日如蓬日顧元緯本凌本俱作白頑疏暗人事僻陋逺天聰微物縱可採其誰為至公余亦從此去余劉本唐詩品彚俱作今誤歸耕為老農校書按唐書百官志𢎞文館有校書郎二人集賢殿書院有校書四人祕書省有校書郎十人著作局有校書郎二人崇文館有校書郎二人司經局有校書四人皆九品官素風袁安三國名臣贊操不激切素風愈鮮拂衣後漢書楊彪傳孔融魯國男子明日便當拂衣而去扣舷舷船邊也扣舷為聲以節歌郭璞江賦詠採菱以扣舷和光老子和其光同其塵昭世鮑照詩浮生旅昭世空事歎年華頑疏嵇康詩匪降自天實由頑疏天聰曹植求通親親表冀陛下儻發天聰而垂神聽也送六舅歸陸渾伯舅吏淮泗卓魯方喟然悠哉自不競退耕東臯田條桑臘月下種杏春風前酌醴賦歸去共知陶令賢陸渾唐書地理志河南府有陸渾縣卓魯後漢書卓茂遷密令勞心諄諄視人如子舉善而教口無惡言魯恭拜中牟令專以德化為理不任刑罰北山移文籠張趙于往圖架卓魯於前籙條桑晉書劉驎之於樹條桑詩蠶月條桑鄭康成箋條桑枝落采其葉也孔穎達正義謂斬條於地就地采之也此借用為臘月事蓋謂落其繁枝枯莖而已與詩義稍異臘月漢書注臣瓚曰臘月建丑之月也酌醴劉向九歎欲酌醴以娛意兮王逸注醴醴酒也陶令宋書陶潛為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去職賦歸去來辭留别丘為歸鞍白雲外繚繞出前山今日又明日自知心不間親勞簪組送欲趁鶯花還一步一回首遲遲向近關丘為唐書藝文志丘為蘇州嘉興人事繼母孝常有靈芝生堂下纍官太子右庶子時年八十餘而母無恙給俸祿之半初還鄉縣令謁之為候門磬折令坐乃拜里胥立庭下既出乃敢坐經縣署降馬而趨卒年九十六趁廣韻趁逐也俗作趂近關左傳蘧伯玉遂行從近關出送别下馬飲君酒問君何所之君言不得意歸卧南山陲但去莫復問白雲無盡時王右丞集箋注卷三
