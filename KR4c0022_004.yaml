body:
  text: 王右丞集箋注巻四仁和趙殿成撰古詩二十九首送張五歸山送君盡惆悵復送何人歸幾日同攜手一朝先拂衣東山有茅屋幸為掃荆扉當亦謝官去豈令心事違齊州送祖三河嶽英靈集文苑英華唐文粹唐詩紀事並作淇上送趙仙舟國秀集作河上送趙仙舟相逢方一笑相送還成泣祖帳已傷離帳河嶽英靈集國秀集俱作席一作悵非已唐詩紀事作忽荒城復愁入天寒逺山淨日暮長河急解纜君已遥望君猶佇立猶國秀集文苑英華唐文粹俱作空齊州唐書地理志河南道有齊州濟南郡本齊郡天寳元年更名臨淄五載又更名濟南祖帳祖帳即祖席所設之帳解纜謝靈運詩解纜及流潮李善註纜維船索也佇立毛萇詩傳佇立乆立也送縉雲苗太守手疏謝明王王顧元緯本凌本俱作主腰章為長吏方從㑹稽邸邸一作郊更發汝南騎按節下松陽清江響鐃吹露冕見三吳方知百城貴縉雲唐書地理志江南道有處州縉雲郡本括州永嘉郡天寳元年更名長吏漢書髙帝紀守尉長吏師古註長吏謂縣之令長景帝紀吏六百石以上皆長吏也張晏註長大也百官公卿表秩四百石至二百石是為長吏師古註吏理也主理其縣内也是皆以縣令為長吏右丞以此稱太守未詳㑹稽邸見漢書朱買臣傳按節子虛賦按節未舒郭璞註言頓轡也司馬彪云按轡而行得節故曰按節松陽唐書地理志處州縉雲郡有松陽縣露冕益部耆舊傳郭賀拜荆州刺史明帝巡狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勅去䄡露冕使百姓見此衣服以彰其德三吳水經注吳後分為三世號三吳吳興吳郡㑹稽也杜氏通典吳郡吳興丹陽為三吳百城後漢書賈琮傳百城聞風自然竦震送從弟蕃游淮南文苑英華作送從叔游淮南座上成讀書復騎射帶劍游淮隂淮隂少年輩千里逺相尋髙義難自隱自文苑英華作為明時寧陸沉島夷九州外泉館三山深席帆聊問罪卉服盡成擒歸來見天子拜爵賜黃金忽思鱸魚膾復有滄洲心洲文苑英華作江天寒蒹葭渚日落雲夢林江城下楓葉淮上聞秋砧送歸青門外車馬去駸駸惆悵新豐樹空餘天際禽淮南按唐書地理志淮南道盖古揚州之域揚楚滁和廬壽舒安黃申光蘄為州十二高義史記廉頗傳徒慕君之高義也陸沉莊子孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何為者邪仲尼曰是聖人僕也是自埋於民自藏於畔其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沉者也是其市南宜僚邪郭象註陸沉人中隱者譬無水而沉也島夷尚書島夷卉服孔穎達正義島夷南海島上之夷也泉館泉館謂泉客所館即鮫人之室述異記鮫人又名泉客三山史記蓬萊方丈瀛洲此三神山者其傳在渤海中去人不逺患且至則船風引而去盖常有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黄金銀為宮闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云席帆木華海賦維長綃挂帆席李善註随風張幔曰帆或以席為之卉服孔穎達尚書正義卉服是草服葛越也葛越南方布名用葛為之左思吳都賦云蕉葛升越弱於羅紈是也顔思古漢書註卉服絺葛之屬鱸魚膾晉書張翰因見秋風起乃思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸雲夢周禮荆州其澤藪曰雲夢鄭康成註雲夢在華容爾雅十藪楚有雲夢郭璞註今南郡華容縣東南巴丘湖是也孔安國尚書傳雲夢之澤在江南左傳宣四年䢵夫人使棄諸夢中杜預註夢澤名江夏安陸縣東南有雲夢城又傳昭四年王以田江南之夢杜註楚雲夢跨江南北又傳定四年楚子渉睢濟江入於雲中杜註入雲夢澤中所謂江南之夢也漢書地理志南郡華容雲夢澤在南後漢書華容侯國雲夢澤在南水經注監利縣晉武帝太康五年立縣土卑下澤多陂池西南自州陵東界逕於雲杜沌陽為雲夢之藪矣韋昭曰雲夢在華容縣按春秋魯昭公三年鄭伯如楚子産備田具以田江南之夢郭景純言華容縣東南巴丘湖是也杜預云枝江縣安陸縣有雲夢盖跨川亘隰兼包勢廣矣史記索隱雲夢裴駰云孫叔敖激沮水作此澤張揖云楚藪也在南郡華容縣郭璞云江夏安陸有雲夢城南郡枝江亦有雲夢城華容縣又有巴丘湖俗云即古雲夢澤也則張揖云在華容者指此湖也元和郡縣志安州雲夢縣本漢安陸縣地後魏大統末於雲夢古城置雲夢縣雲夢澤在縣西七里成按諸説不同合而觀之雲夢本二地觀禹貢雲土夢作乂之文及左傳之析言雲夢其義顯矣後人謂雲在江之北夢在江之南亦據傳中江南之夢而言而孔安國以為雲夢皆在江南杜元凱以為雲中即江南之夢是又一説矣然雲與夢地雖異號界則相接故或稱雲或稱夢或合稱雲夢其地脩廣跨江之南北共為一藪春秋文耀鉤謂大别已東雷澤九江衡山皆雲夢司馬相如子虛賦謂雲夢方九百里酈道元謂其跨川亘隰兼包勢廣者良非虛語至於名號相沿或城或縣皆名雲夢者乃後人因地借稱非楚藪全區之謂也顔延年詩却倚雲夢林前瞻京臺囿駸駸毛萇詩傳駸駸驟貌新豐太平寰宇記新豐故城在雍州昭應縣東一十八里漢新豐縣也漢七年高祖以太上皇思東歸於此置縣徙豐人以實之故曰新豐并移枌榆舊社街衢棟宇一如舊制士女老幼各知其室雖雞犬混放亦識其家焉雍録唐新豐縣在府東五十里凡自長安東出而趨潼闗路必由此庾肩吾詩逺聽平陵鐘遥識新豐樹成按劉昫唐書本紀開元二十年九月渤海靺鞨寇登州殺刺史韋俊命左領衞將軍盖福順發兵討之又北狄列傳渤海靺鞨王大武藝遣其將張文休率海賊攻登州刺史韋俊詔遣門藝往幽州徵兵以討之仍令太僕員外卿金思蘭往新羅發兵以攻其南境屬山阻寒凍雪深丈餘兵士死者過半無功而還詩中所云島夷泉館席帆問罪疑蕃於是時從諸將泛海往攻者也至所謂拜爵者即唐制之勲官也勲官凡十二等有柱國䕶軍輕車騎都尉驍騎飛騎雲騎武騎諸名征戍勤勞則授之初無職任所謂賜金者乃軍旋勞賞之事猶木蘭詞云歸來見天子天子坐明堂䇿勲十二轉賜物百千強盖詩人溢美之語也或疑是時軍出無功安得有拜爵賜金之事者無乃近於固歟送權二高人不可友清論復何深一見如舊識一言知道心明時當薄宦解薜去中林芳草空隱處白雲餘故岑韓侯乆攜手河嶽共幽尋悵别千餘里臨堂鳴素琴薄宦何遜詩薄宦恧師表屬辭慚愈疾中林中林即林中也見毛萇詩傳送高道弟耽歸臨淮作座上作道顧元緯本凌本皆作適少年客淮泗落魄居下邳魄劉本作拓遨游向燕趙結客過臨淄山東諸侯國迎送紛交馳自爾厭游俠閉戸方垂帷深明戴家禮頗學毛公詩備知經濟道高臥陶唐時聖主詔天下賢人不得遺公吏奉纁組安車去茅茨君王蒼龍闕九門十二逵羣公朝謁罷冠劍下丹墀野鶴終踉蹌威鳳徒参差或問理人術但致還山詞天書降北闕賜帛歸東菑都門謝親故行路日逶遲遲顧元緯本作迤孤帆萬里外淼漫將何之江天海陵郡雲日淮南祠南二顧本凌本俱作隂杳冥滄洲上蕩漭無人知緯蕭或賣藥出處安能期臨淮唐書地理志河南道有泗州臨淮郡本下邳郡治宿預開元二十三年徙治臨淮天寳元年更郡名淮泗淮泗二水皆經臨淮元和郡縣志淮水西南自虹縣界流入徐城縣泗水西自彭城縣界流入下邳縣落魄漢書酈食其家貧落魄無衣食業鄭氏曰魄音薄應劭曰落魄志行衰惡之貌師古曰落魄失業無次也鄭音是臨淄成按元和郡縣志臨淄古營丘之地呂望所封齊之都也以城臨淄水故曰臨淄在唐時青州之臨淄縣是矣游俠荀悦漢紀立氣勢作威福結私交以立强於世者謂之游俠閉戸後漢書魯㳟居太學習魯詩閉戸講誦絶人間事垂帷漢書董仲舒少治春秋孝景時為博士下帷講誦弟子傳以乆次相授業或莫見其面戴家禮後漢書魯髙堂生漢興傳禮十七篇後瑕丘蕭奮以授同郡后蒼蒼授梁人戴德及德兄子聖於是德為大戴禮聖為小戴禮毛公詩漢書毛公趙人也治詩為河間獻王博士隋書經籍志趙人毛萇善詩自云子夏所傳作訓詁傳是為毛詩古學纁組爾雅一染謂之縓二染謂之赬三染謂之纁郭璞註纁綘也說文組綬屬安車後漢書嚴光少有高名與光武同游學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至蒼龍闕三輔黄圖未央宮有𤣥武蒼龍二闕三輔舊事未央宮東有蒼龍闕北有𤣥武闕九門鄭康成禮記註天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也逺郊門也闗門也逵毛萇詩傳逵九達之道爾雅九達謂之逵後人凡通衢大道皆謂之逵不特九達矣丹墀張衡西京賦青瑣丹墀李善註漢官典職曰以丹漆地故稱丹墀呂向註丹墀階以丹漆塗之漢書俯視兮丹墀孟康註丹墀赤地也宋書明光殿以丹朱色地謂之丹墀野鶴晉書或謂王戎曰昨於稠人中始見嵇紹昂昂然如野鶴之在鷄羣踉蹌潘岳射雉賦已踉蹡而徐來徐爰註踉蹡乍行乍止不迅疾之貌踉蹌踉蹡義同威鳳漢書元康四年南郡獲白虎威鳳為寳晉灼曰鳳之有威儀者與尚書鳳凰來儀同意北闕漢書蕭何治未央宮立東闕北闕師古註未央殿雖南向而上書奏事謁見之徒皆詣北闕賜帛高士傳韓福者涿人也以行義修潔著名昭帝時大將軍霍光秉政表顯義士郡國條奏行狀天子謂福等五人行義最高以德行徵至京兆病不得進元鳳元年詔䇿曰朕愍勞福官職之事賜帛五十匹遣歸其務修孝弟以教鄉里東菑爾雅田一嵗曰菑郭璞註今江東呼初耕地反草為菑謝朓詩臺笠聚東菑逶遲毛萇詩傳逶遲歴逺之貌淼漫左思吳都賦滇㴐淼漫呂向註山水流廣之貌海陵郡太平寰宇記海陵縣故楚邑漢以為縣屬臨淮郡晉立為海陵郡唐武德三年改為吳州置吳陵縣七年州廢復為海陵縣𨽻揚州淮南祠太平寰宇記泗州臨淮縣有淮瀆祠在淮南岸斗山下緯蕭莊子河上有家貧恃緯蕭而食者送别河嶽英靈集文苑英華唐文粹並作送綦母潛落第還鄉聖代無隱者英靈盡來歸遂令東山客不得顧採薇既至君門逺君二顧本凌本俱作金孰云吾道非江淮度寒食京洛縫春衣洛唐文粹作兆置酒臨長道唐文粹作置酒長亭送二顧本凌本俱作置酒長安道同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤城當落暉城唐文粹作村吾謀適不用勿謂知音稀謂一作為誤英靈隋書李德林美容儀善談吐齊天統中兼中書侍郎於賓館受國書陳使江總目送之曰此即河朔之英靈也又文學傳江漢英靈燕趙竒俊吾道非史記孔子世家詩云匪兕匪虎率彼曠野吾道非耶吾何為於此寒食荆楚嵗時記去冬至一百五日即有疾風甚雨謂之寒食禁火三日造餳大麥粥據厯今在清明前二日亦有去冬至一百六日者京洛班固東都賦子徒習秦阿房之造天而不知京洛之有制陸機詩京洛多風塵又云京洛多妖麗並謂東京洛陽之地桂棹楚辭桂棹兮蘭枻王逸註棹楫也吾謀適不用左傳子無謂秦無人吾謀適不用也知音稀古詩但傷知音稀送張舍人佐江州同薛據十韻據顧元緯本作璩束帶趨承明守官惟謁者清晨聽銀虯薄暮辭金馬受辭未嘗易當御方知寡御顧元緯本凌本俱作是誤清範何風流高文有風雅忽佐江上州當自潯陽下逆旅到三湘長途應百舍香爐逺峰出石鏡澄湖瀉董奉杏成林陶潛菊盈把彭蠡常好之彭諸本皆作范誤廬山我心也送君思逺道欲以數行灑舍人唐六典通事舍人十六人從六品上掌朝見引納及辭謝者於殿廷通奏凡近臣入侍文武就列則引以進退而告其拜起出入之節凡四方通表華夷納貢皆受而進之凡軍旅之出則受命慰勞而遣之既行則毎月存問將士之家以視其疾苦凱還則郊迓之皆復命凡致仕之臣與邦之耋老時巡問亦如之李林甫註通事舍人即秦之謁者漢書百官表云謁者掌賓贊受事員七十人秩比六百石皇朝改謁者為通事舍人江州唐書地理志江南西道有江州潯陽郡承眀三輔黄圖未央宮有承明殿著述之所也班固西都賦云内有承明著作之庭即此也守官謝膽詩守官反南服銀虯初學記張衡漏水轉渾天儀制曰以銅為器再疊差置實以清水下各開孔以玉虬吐漏水入兩壺右為夜左為晝李蘭漏刻法曰以器貯水以銅為渴烏狀如鉤曲以引器中水於銀龍口中吐入權器漏水一升秤重一斤時經一刻殷夔漏刻法曰漏水皆於器下為金龍口吐出轉注入踟躕經緯之中流於衡渠之下金馬史記金馬門者宦署門也門旁有銅馬故謂之金馬門三輔黃圖金馬門宦者署武帝時得大宛馬以銅鑄像立於署門因以為名東方朔主父偃嚴安徐樂皆待詔金馬門即此當御國語秦景公使其弟鍼來求成叔向命召行人子員行人子朱曰朱也當御叔向曰肸也欲子員之對客也子朱怒撫劍就之叔向曰夫子員道賓主之言無私子常易之姧以事君者吾所能御也韋昭註當直也御進也言次應直事易變也潯陽一統志潯陽江在九江府城北源自岷山至此下流四十里合彭蠡湖水東流入海逆旅左傳虢為不道保於逆旅杜預註逆旅客舍也孔穎達正義逆迎也旅客也迎止賓客之處也三湘南史巴陵南有地名三湘元和郡縣志侯景浦在巴陵縣東北十二里本名三湘浦太平寰宇記湘潭湘隂湘鄉是為三湘百舍莊子百舍重趼而不敢息陸德明註百舍百日止宿也高誘淮南子註百舍百里一舍也香爐峰逺法師廬山記東南有香爐山孤峰秀起游氣籠其上則氛氲若烟太平寰宇記香爐峰在廬山西北其峰尖圓烟雲聚散如博山香爐之狀方輿勝覽香爐峰在南康城北山南山北皆見其形圓聳常出雲氣故名石鏡幽明録宮亭湖邊旁山間有石數枚形圓若鏡明可鑑人謂之石鏡水經注廬山東有石鏡照水之所出有一圓石懸崖明淨照見人形晨光初曜則延曜入石毫細必察故名石鏡焉太平寰宇記石鏡在東山懸崖之上其狀團圓近之則照見形影董奉杏見一巻虎賣杏註陶潛菊續晉陽秋陶潛嘗九月九日無酒宅邊菊叢中摘菊盈把坐其側乆望見白衣人至乃王𢎞送酒也即便就酌醉而後歸彭蠡唐六典註彭蠡湖一名宮亭湖在江州潯陽縣界杜氏通典彭蠡湖在潯陽郡之東南五十二里廬山逺法師廬山記山在江州潯陽郡左挾彭澤右旁通川有匡俗先生者出自殷周之際遯世隱時潛居其下或云匡俗受道於仙人而共游其嶺遂托室崖岫即巖成館故時人謂所止為仙人之廬而命焉其山大嶺凡七重圓基周回垂三五百里其南嶺臨宮亭湖下有神廟七嶺㑹同莫升之者東南有香爐山其上氛氲若香烟西南中石門前有雙闕壁立千餘仞而瀑布流焉其中鳥獸草木之美靈藥芳林之竒所稱名代元和郡縣志廬山在江州潯陽縣東三十二里本名鄣山昔匡俗字子孝隱淪潛景廬於此山漢武帝拜為大明公俗號廬君故山取號周環五百餘里太平寰宇記廬山在江州南高二千三百六十丈周回二百五十里其山九疊川亦九派郡國志云廬山疊嶂九層崇巖萬仞山海經所謂三天子障亦曰天子都也周武王時匡俗字子孝兄弟七人皆有道術結廬於此仙去空廬尚在故曰廬山思遠道古詩青青河畔草綿綿思逺道送韋大夫東京留守人外遺世慮空端結遐心曾是巢許淺始知堯舜深蒼生詎有物黃屋如喬林上德撫神運沖和穆宸襟雲雷康屯難江海遂飛沉遂顧元緯本凌本俱作逐非天工寄人英龍衮瞻君臨瞻劉本顧可乆本俱作澹名器茍不假保釐固其任素資貫方領資顧元緯本凌本唐詩品彚俱作質清景照華簪慷慨念王室從容獻官箴雲旗蔽三川畫角發龍唫晨揚天漢聲夕捲大河隂窮人業已寧人顧元緯本凌本俱作乆逆冦遺之擒然後解金組拂衣東山岑給事黃門省秋光正沉沉功名與身退功名一作壯心老病隨年侵君子從相訪重𤣥其可尋韋大夫劉昫唐書乾元二年秋七月乙丑朔以禮部尚書韋陟充東京留守東京留守唐書百官志初太宗伐高麗置京城留守其後車駕不在京都則置留守以右金吾大將軍為副留守開元元年改京兆河南府長史為尹十一年太原府亦置尹及少尹以尹為留守少尹為副留守謂之三都留守人外後漢書陳寵傳南陽尹勤字叔梁篤性好學屏居人外荆棘生門宋書孔淳之與徵士戴顒王𢎞之及王𢎞敬等共為人外之游巢許高士傳巢父者堯時隱人也山居不營世利年老以樹為巢而寢其上故時人號曰巢父許由字武仲陽城槐里人也為人據義履方邪席不坐邪膳不食後隱於沛澤之中黃屋漢書黃屋左纛李斐註天子車以黃繒為盖裏喬林謝朓詩牕中列逺岫庭際俯喬林上德老子上德不德是以有德河上公註上德謂太古無名號之君德大無上故言上德也宸襟何遜詩宸襟動時豫歳序屬凉氛屯難謝靈運詩屯難既云康尊主隆斯民天工天工天官也尚書天工人其代之人英淮南子明於天道察於地理通於人情大足以容衆德足以懐逺信足以一異知足以知變者人之英也龍衮禮記天子龍衮君臨三國志君臨萬國秉統天機名器左傳惟器與名不可以假人杜預註器車服也名爵號也保釐保安也釐理也尚書命畢公保釐東郊方領後漢書馬援傳朱勃衣方領能矩歩華簪陶潛詩聊用忘華簪官箴左傳昔周辛甲之為太史也命百官官箴王闕杜預註使百官各為箴詞戒王過雲旗上林賦拖蜺旌靡雲旗張揖曰畫熊虎於旒為旗似雲氣也三川史記索隱三川今洛陽也地有伊洛河故曰三川畫角晉書蚩尤氏率魑魅與黃帝戰於涿鹿帝乃命始吹角為龍鳴以禦之梁簡文帝詩城高短簫發林空畫角悲大河隂陸機詩發軫清洛汭驅馬大河隂李善註穀梁傳曰水南曰隂李周翰註大河黃河也遺之擒左傳使羣臣往遺之禽以逞君心黃門省漢書劉向傳拜為郎中給事黃門又揚雄傳除為郎給事黃門唐書開元元年改門下省為黃門省五年復黃門省為門下省隨年侵陸機詩後途隨年侵重𤣥陸機漢高祖功臣頌重𤣥匪奥晉書索襲傳味無味于慌惚之際兼重𤣥于衆妙之内皆用老子𤣥之又𤣥語資聖寺送甘二浮生信如寄薄宦夫何有來往本無歸别離方此受此文苑英華作正柳色藹春餘槐隂清夏首不覺御溝上銜悲執杯酒資聖寺長安志崇仁坊東南隅資聖寺本太尉趙國公長孫無忌宅龍朔三年為文德皇后追福立為尼寺咸亨四年改為僧寺長安三年七月火焚之灰中得經數部不損一字百姓施捨數日之間所獲鉅萬遂營造如故留别山中温古上人兄并示舍弟縉文苑英華無山中字舍字解薜登天朝去師偶時哲豈惟山中人兼負松上月宿昔同游止致身雲霞末開軒臨潁陽臥視飛鳥没好依盤石飯屢對瀑泉歇歇顧元緯本凌本俱作渴理齊少狎隱顧元緯本作理齊狎小隱道勝寧外物舍弟官崇髙宗兄此削髮削一作祝荆扉但灑掃乗閒當過拂拂顧元緯本凌本俱作歇時哲謝靈運詩鳴葭戾朱宮蘭巵獻時哲宿昔阮籍詩宿昔同衣裳潁陽成按唐書地理志河南府有潁陽縣本名武林載初元年析河南伊闕嵩陽三縣置開元十五年更名潁陽然右丞所稱者當是泛指潁水之陽也呂氏春秋許由處乎潁陽高誘註潁水之北曰潁陽是矣道勝淮南子子夏見曾子一臞一肥曽子問其故曰出見富貴之樂而欲之入見先王之道又悦之兩者心戰故臞先王之道勝故肥觀别者青青楊柳陌陌上别離人愛子游燕趙高堂有老親不行無可養行去百憂新切切委兄弟依依向四鄰都門帳飲畢帳顧可乆本凌本唐詩品彚俱作悵畢凌本作别從此謝賓親賓親顧可乆本唐詩品彚俱作親賓揮淚逐前侶前唐詩品彚作行含悽動征輪車從望不見從凌本作徒時時起行塵時時一作時見余亦辭家乆乆凌本唐詩品彚俱作者看之淚滿巾百憂詩無思百憂帳飲盖用漢書疏廣傳設祖道供帳東都門外事江淹别賦帳飲東都送客金谷揮淚陸機詩揮淚廣川隂李周翰註揮拭也含悽謝靈運詩含悽汎廣川呂延濟註悽悲也行塵江淹别賦見行塵之時起庚溪詩話昔人臨岐執别回首引望戀戀不忍遽去而形於詩者如王摩詰云車徒望不見時見起行塵歐陽詹云高城已不見况無城中人東坡與其弟子由别云登高回首坡隴隔時見烏㡌出復没咸紀行人已逺而故人不可復見語雖不同其惜别之意則同也别弟縉後登青龍寺望藍田山陌上新别離蒼茫四郊晦登高不見君故山復雲外山文苑英華作人非遠樹蔽行人長天隱秋塞心悲宦游子宦游凌本唐詩品彚俱作游宦何處飛征盖青龍寺長安志南門之東青龍寺本隋靈感寺開皇二年立文帝移都徙掘城中陵墓葬之郊野因置此寺故以靈感為名至武德四年廢龍朔二年城陽公主復奏立為觀音寺景雲二年改為青龍寺北枕髙原南望爽塏為登眺之美張禮游城南記樂游之南曲江之北新昌坊有青龍寺北枕高原前對南山為登眺之絶勝賈島所謂行坐見南山也秋塞沈約詩寒光稍眇眇秋塞日沉沉宦游子陸機詩翩翩游宦子辛苦誰為心飛征盖劉楨詩輦車飛素盖從者盈路旁别弟妹二首盧象詩集有八月十五日象自江東止田園移莊慶㑹未幾歸汶上小弟幼妹尤悲其别兼賦是詩三首其一謝病始告歸其二兩妹日長成其三小弟更孩幼唐詩紀事載此亦作象詩成考右丞本傳及他書未有言其寓家於越浪跡水鄉者宛作二語合之盧象江東之説乃為得之讀者試辨焉兩妹日成長成長唐詩紀事作長成雙鬟將及人已能持寶瑟自解掩羅巾念昔别時小未知疎與親今來始離恨拭淚方慇懃拭唐詩紀事作掩寶瑟何遜詩對牕看寳瑟入戸弄鳴機小弟更孩幼歸來不相識同居雖漸慣見人猶未覓未覓唐詩紀事作黙黙宛作越人語語唐詩紀事作言殊甘水鄉食别此最為難淚盡有餘憶别綦母潛端笏明光宮宮文苑英華作殿歴稔朝雲陛詔看延閣書看顧元緯本凌本俱作刋高議平津邸適意偶輕人虛心削繁禮文苑英華作適意輕微祿遇人削繁禮又繁一作煩盛得江左風彌工建安體高張多絶弦截河有清濟嚴冬爽羣木伊洛方清泚渭水冰下流潼關雪中啓啓文苑英華作閉非荷蓧幾時還塵纓待君洗綦母潛唐書藝文志綦母潛字孝通開元中由宜夀尉入為集賢院待制遷右拾遺終著作郎端笏江淹詩歛袵依光采端笏奉仁明明光宮雍錄漢有明光宮三一在北宮南與長樂相連者武帝太初四年起即王商之所指借欲以避暑者也别有明光宮在甘泉宮中亦武帝所起發燕趙美女三千人充之至尚書郎主作文書起草更直於建禮門内則近明光殿矣建禮門内得神仙門神仙門内得明光殿省中省中皆糊粉塗壁以丹漆地謂之丹墀尚書郎握蘭含鷄舌香奏事此之明光殿約其方向必在未央正宮殿中不與北宮甘泉設為竒玩者比則臣下奏事之地也歴稔何遜詩歴稔共追隨一旦辭羣匹延閣劉歆七略孝武皇帝勅丞相公孫𢎞廣開獻書之路百年之間書積如丘山故外則有太常太史博士之藏内則有延閣廣内祕書之府宋書漢西京圖籍所藏有天府石渠蘭臺石室延閣廣内之府是也平津邸漢書公孫𢎞為丞相封平津侯於是啓客館開東閣以延賢人與參謀議陸厥詩出入平津邸張銑註邸國舍也繁禮史記孝文好道家之學以為繁禮適貌無益於事江左風宋齊梁陳四朝並建都江左其時詩篇多尚綺麗宋書謝靈運傳文章之美江左莫逮建安體建安漢末年號時曹氏父子及鄴中七子俱善篇章後人謂之建安體鍾嶸詩品降及建安曹公父子篤好斯文平原兄弟鬱為文棟劉楨王粲為其羽翼次有攀龍附鳳自致於屬車者盖將百計彬彬之盛大備於時矣高張物理論琴欲高張瑟欲下聲顔延年詩高張生絶絃聲急由調起截河孔安國尚書傳濟水入河並流十數里而南截河又並流數里溢為滎澤孔穎達正義濟水既入於河與河相亂而知截河過者以河濁濟清南出還清故可知也伊洛括地志伊水出虢州盧氏縣東巒山東北流入洛洛水出商州洛南縣冢嶺山東流經洛州郭内又東合伊水唐六典註伊出河南伊陽縣北流入洛洛出商州上洛縣經虢州河南入河清泚謝朓詩寒流自清泚説文泚清也潼關杜氏通典華州華隂縣有潼闗左傳所謂桃林塞也本名衝闗河自龍門南流沖激華山東故以為名元和郡縣志潼闗在華州華隂縣東北三十九里古桃林塞也春秋時晉侯使詹嘉處瑕以守桃林之塞是也闗西一里有潼水因以名闗又云河在闗内南流衝激闗山因謂之衝闗謹按秦函谷闗在漢𢎞農縣即今靈寶縣西南十一里故闗是也今大路在北本非鈐束之要漢武帝元鼎三年楊僕為樓船將軍本宜陽人恥居闗外上疏請以家僮七百人徙闗於新安武帝從之即今新安縣東一里函谷故闗是也而御傳所馳出於南路至後漢獻帝初平二年董卓脅帝西幸長安出函谷闗自此已前其關並在新安其後二十年至所建安十六年曹公破馬超於潼闗則是中間徙於今今厯二處而至河潼上躋高隅俯視洪流盤紆峻極實為天險河之北岸則風陵津北至蒲闗六十餘里河山之險邐迤相接自此西望川途曠然盖神明之奥區帝宅之戸牖百二之固信非虛言也太平寰宇記自函谷至於潼闗高出雲表幽谷秘䆳深林茂木白日成昏又按今闗即隋大業七年移於南北鎮城門坑檻谷所置去舊闗四里餘至唐朝天授二年移近向北臨河為路雍錄潼闗在華州華隂縣東北三十九里自華而虢自虢而陜自陜而河南中間千餘里地古嘗立闗塞者凡三所由長安東一百八十里出華州華隂縣外則唐潼闗也自潼闗東二百里至陜州靈寶縣則秦函谷闗也自靈寶縣三百餘里至河南府新安縣則漢函谷闗也塵纓沈約詩願以潺湲水霑君纓上塵新晴晚望晚一作野新晴原野曠極目無氛垢郭門臨渡頭村樹連溪口白水明田外碧峰出山後農月無閒人傾家事南畝極目謝靈運詩極目睞左閭白水劉公幹詩方塘含白水晦日游大理韋卿城南别業四首原註四聲依次用各六韻與世澹無事自然江海人側聞塵外游解驂􅦫朱輪驂劉本文苑英華俱作弁顧元緯本凌本俱作􅀈誤字書無􅀈字極野照暄景極顧元緯本凌本俱作平上天垂春雲張組竟北阜劉本作張組共曲阜汎舟過東鄰汎舟顧元緯本凌本俱作汎汎非故鄉信高㑹牢醴及家臣家臣二顧本凌本俱作佳辰幸同擊壤樂心荷堯為君大理唐書百官志大理寺卿一人從三品少卿二人從五品下側聞漢書亦嘗側聞長者遺風矣解驂三國志董允傳乃命解驂􅦫成按玉篇􅦫柅夷切軾也今尋文義當作止訓知􅦫是柅字之訛也孔穎達周易正義柅者在車之下所以止輪令不動者也張組謝靈運詩張組眺倒景呂延濟註組組惟也北阜謝靈運詩卜室倚北阜高㑹史記飲酒高㑹師古曰高㑹大㑹也擊壤高士傳帝堯之世天下太和百姓無事壤父年八十餘而擊壤於道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德於我哉郊居杜陵下永日同攜手人里藹川陽人顧元緯本凌本俱作仁平原見峰首園廬鳴春鳩林薄媚新桞上卿始登席故老前為壽臨當游南陂游文苑英華作送非約略執盃酒歸與絀微官文苑英華作歸轍繼微官顧可乆本作車轍絀微官惆悵心自咎杜陵太平寰宇記杜陵漢縣在今萬年縣東十五里漢志註云古杜伯國也漢宣帝以杜東原上為初陵更名杜縣為杜陵後魏改為杜城縣周建德二年省永日詩國風且以永日上卿左傳王以上卿之禮饗管仲故老小雅召彼故老前為壽史記莊王置酒優孟前為夀章懐太子後漢書註壽者人之所欲故卑下奉觴進酒皆言上夀微官歐陽堅詩抱責守微官冬中餘雪在中文苑英華作日墟上春流駛風日暢懐抱山川好天氣文苑英華作山川多秀氣雕胡先豐酌豐酌二顧本凌本俱作晨炊庖膾亦雲至雲二顧本凌本俱作後高情浪海嶽浮生寄天地君子外簪纓埃塵良不啻所樂衡門中陶然忘其貴冬中冬中字出後漢書周舉傳春流謝靈運山居賦毖温泉於春流何遜詩君隨春水駛衡門毛萇詩傳衡門橫木為門言淺陋也高館臨澄陂曠望蕩心目望顧元緯本凌本俱作然蕩一作理澹蕩動雲天玲瓏映墟曲鵲巢結空林雉雊響幽谷雊文苑英華作雛應接無閒暇徘徊以躑躅紆組上春隄側弁倚喬木弦望忽已晦後期洲應綠雲天謝靈運詩崔崒刺雲天玲瓏謝靈運詩側徑既窈窕環州亦玲瓏李周翰註玲瓏明暗貌墟曲陶潛詩時復墟曲中應接世説王子敬云從山隂道上行山川自相映發使人應接不暇紆組謝朓詩我行雖紆組兼得窮幽蹊李善註說文曰紆屈也一曰縈也組綬也側弁詩小雅側弁之俄喬木高誘淮南子註喬木上疎少隂之木也弦望晦釋名弦月半之名也其形一旁曲一旁直若張弓弦也望月滿之名也月大十六日月小十五日日東月在西遥相望也晦灰也火死為灰月光盡似之也冬日游覽步出城東門試騁千里目青山橫蒼林赤日團平陸渭北走邯鄲關東出函谷秦地萬方㑹來朝九州牧鷄鳴咸陽中中唐詩正音作市冠盖相追逐丞相過列侯羣公餞光祿相如方老病方一作今獨歸茂陵宿千里目孫楚詩抗我千里目赤日何遜詩赤日下城圓平陸爾雅大野曰平高平曰陸謝瞻詩夕陽曖平陸走邯鄲漢書上指視慎夫人新豐道曰此走邯鄲道也函谷括地志函谷闗在陜州桃林縣西南十二里雍錄秦函谷闗在唐陜州靈寶縣南十里靈寳縣者漢𢎞農縣也路在谷中深險如函故以為名其中劣通行路東西四十里絶岸壁立巖上栢林隂䕃谷中常不見日闗去長安四百里日入則閉鷄鳴則開東自殽山西至潼津通名函谷實為天險漢函谷闗在唐河南府新安縣之東一里盖漢世楊僕移秦函谷闗而立之於此也以比秦舊則移東三百七十八里楊僕者宜陽縣人漢武帝時數立大功以其家居宜陽宜陽者靈寶縣東其地即在秦咸闗之外矣僕耻其家不在闗内乞移秦闗而東之使闗反在外武帝允焉僕自以其家僮築立闗隘是為漢世函闗自此闗移在河南府新安縣而秦闗之在靈寶者廢矣九州牧晉書上欲圖三公下不失九州牧咸陽三輔黃圖咸陽在九堫山渭水北山水俱在南故名咸陽相如史記司馬相如既病免家居茂陵自大散以往深林密竹蹬道盤曲四五十里至黃牛嶺見黃花川危徑幾萬轉數里將三休廻環見徒侶隱映隔林丘颯颯松上雨潺潺石中流靜言深谿裏溪文苑英華作林長嘯高山頭望見南山陽白日靄悠悠日顧元緯本凌本俱作露青臯麗已淨綠樹鬱如浮曽是厭䝉密曠然消人憂大散文獻通考鳳州梁泉縣有黃花川大散闗宋中興四朝志大散闗𨽻梁泉縣在鳳翔寳鷄縣之南為秦蜀往來要道兩山闗控斗絶出可以攻入可以守實表裏之形勢也一統志大散闗在鳳翔府寶鷄縣南五十二里通褒斜大路三休賈誼新書楚王誇使者以章華之臺臺甚高三休乃至靜言陸機猛虎行靜言幽谷底長嘯高山岑悠悠楚辭開春發歲兮白日出之悠悠青臯謝朓詩青臯向還色春潤視生波王融拜祕書丞謝表欽至道而出青臯捨布衣而望朱闕䝉密范曄詩遵渚攀䝉密休假還舊業便使假凌本唐詩品彚俱作暇唐詩紀事作盧象詩詳見四巻别弟妹詩下謝病始告歸依依入桑梓依依唐詩紀事作依然家人皆佇立相候柴門裏柴凌本文苑英華唐詩紀事唐詩品彚俱作衡時輩皆長年時輩唐詩紀事作儔類皆文苑英華作今成人舊童子上堂嘉慶畢嘉凌本唐詩紀事唐詩品彚俱作家顧與姻親齒顧凌本作願齒唐詩紀事唐詩品彚俱作邇論舊忽餘悲忽一作或目存且相喜目文苑英華唐詩品彚作自田園轉蕪没但有寒泉水衰柳日蕭條秋光清邑里入門乍如客客唐詩品彚作昨休騎非便止休文苑英華作歸中飯顧王程離憂從此始謝病漢書王吉遂謝病歸琅邪告歸漢書高祖嘗告歸之田孟康曰古者名吏休假曰告師古曰告者請謁之言謂請休耳後漢書張湛告歸平陵章懐太子註告請也告歸謂請假歸桑梓詩維桑與梓必㳟敬止本言父之所樹後人用為鄉里之稱家慶韻語陽秋唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與姻親邇孟浩然詩云明朝拜家慶須著老萊衣成按顔延年秋胡詩云上堂拜嘉慶入室問何之李善註蘓亥織女詩曰時來嘉慶集呂向註見母故云拜嘉慶則此語劉宋時已然雖嘉字不同其義一也王程劉孝儀與永豐侯書王程有限時及玉闗早入滎陽界汎舟入滎澤兹邑迺雄藩河曲閭閻隘川中烟火繁因人見風俗入境聞方言秋晚田疇盛晚文苑英華作野朝光市井喧漁商波上客雞犬岸旁村前路白雲外孤帆安可論滎陽唐書地理志河南道鄭州滎陽郡有滎陽縣滎澤成按史記正義滎澤在鄭州滎澤縣西北四里今無水成平地是滎澤在唐時巳成平陸豈能泛舟盖謂泛舟大河以入滎陽之界耳滎陽滎澤地本相連取古文之名以為今地之稱詩家盖多有之田疇韋昭國語解穀地為田麻地為疇杜預左傳註並畔為疇漁商郭璞江賦泝洄㳂流或漁或商水經註江閲漁商川交樵隱宿鄭州朝與周人辭暮投鄭人宿人凌本作地他鄉絶儔侶孤客親僮僕宛洛望不見秋霖晦平陸田父草際歸村童雨中牧主人東臯上時稼遶茅屋蟲思機杼鳴文苑英華作蟲鳴機杼休又鳴字顧元緯本作悲雀喧禾黍熟明當渡京水昨晚猶金谷晚文苑英華作夜此去欲何言言文苑英華作之窮邊徇微祿微一作食鄭州唐書地理志河南道有鄭州滎陽郡儔侶張華詩安知慕儔侶宛洛謝朓詩宛洛佳遨游張銑註宛南陽也洛洛陽也秋霖左傳凡雨自三日以往為霖楚辭皇天滛溢而秋霖京水水經注黃水發源京縣黃淮上東南流名祝龍泉泉勢沸湧狀若巨鼎湯湯西南流謂之龍項口世謂之京水也元和郡國志京水出鄭州滎陽縣南平地太平寰宇記京水在鄭州滎陽縣東二十二里鄭樵通志黄水出京縣故亦謂之京水東北流入於濟金谷水經注穀水又東左㑹金谷水水出太白原東南流歴金谷謂之金水東南流逕晉衞尉卿石崇之故居也太平寰宇記河南府河南縣有金谷郭緣生述征記曰金谷谷名也地有金水自太白原南流經此谷晉衞尉石崇因即川阜而造置園館渡河到清河作汎舟大河裏積水窮天涯天波忽開拆郡邑千萬家行復見城市宛然有桑麻廻瞻舊鄉國淼漫連雲霞清河唐書地理志河北道貝州清河郡有清河縣汎舟國語汎舟於河韋昭解汎浮也積水荀子積水成淵蛟龍生焉苦熱赤日滿天地火雲成山嶽草木盡焦巻川澤皆竭涸輕紈覺衣重密樹苦隂薄密樹劉本顧元緯本俱作樹密莞簟不可近絺綌再三濯思出宇宙外曠然在寥廓長風萬里來江海蕩煩濁却顧身為患始知心未覺忽入甘露門宛然清凉樂火雲盧思道納凉賦火雲赫而四舉焦巻應休璉與岑文瑜書沙礫銷鑠草木焦巻絺綌小爾雅葛之精者曰絺麤者曰綌寥廓楚辭上寥廓而無天漢書猶焦朋已翔乎寥廓顔師古註寥廓天上寛廣之處長風左思吳都賦習御長風劉淵林註長風逺風也陸機詩長風萬里舉覺鳩摩羅什維摩詰經註凡得道名為覺覺有二種一於四諦中覺二於一切法中覺甘露門法華經普智天人尊哀愍羣萌類能開甘露門廣度於一切納凉喬木萬餘株清流貫其中前臨大川口豁達來長風漣漪涵白沙涵顧可乆本唐詩品彚俱作含素鮪如游空偃臥盤石上翻濤沃微躬潄流復濯足前對釣魚翁貪餌凡幾許徒思蓮葉東豁達劉楨詩華館寄流波豁達來風涼漣漪左思吳都賦濯明月於漣漪劉淵林註風行水成文曰漣漪呂向註漣漪細波文微躬沈約詩便欲息微躬潄流晉書隱逸傳潄流而激其清寢巢而韜其耀貪餌楚辭知貪餌而近死兮蓮葉東古江南曲魚戲蓮葉東魚戲蓮葉西王右丞集箋注巻四
