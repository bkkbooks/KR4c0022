body:
  text: 王右丞集箋注卷五仁和趙殿成撰古詩三十二首濟上四賢詠三首崔録事解印歸田里賢哉此丈夫少年曾任俠晚節更為儒遁世東山下世文苑英華作迹因家滄海隅已聞能狎鳥余欲共乘桴録事按杜氏通典大唐官品流內有門下省録事從七品詹事府録事正九品京兆河南太原府九寺少府將作監録事都督都護府上州録事國子監親王府録事京縣録事公主邑司録事俱從九品又流外有諸衛都水監羽林軍録事宫苑總監録事親勳翊勳府録事九寺少府將作軍器監府都水宫苑總監府京及東都市平準諸陵署録事諸牧園苑監録事諸倉監諸關津録事太子親勳翊衛府録事諸王府國司録事賢哉張景陽詩行人多隕涕賢哉此丈夫任俠史記季布者楚人也為氣任俠有名於楚如淳曰相與信為任同是非為俠所謂權行州里力折公卿者也或曰任氣力也俠俜也師古曰任謂任使其氣力俠之言挾也以權力挾輔人也狎鳥列子海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百住而不止其父曰吾聞鷗鳥皆從汝遊汝取來吾玩之明日之海上鷗鳥舞而不下也江淹詩物我但忘懷可以狎鷗鳥成文學寶劍千金裝登君白玉堂身為平原客家有邯鄲娼使氣公卿座論心遊俠場心文苑英華作交中年不得志志文苑英華作意謝病客遊梁文學按唐書百官志東宫官有文學三人正六品下分知經籍侍奉文章王府官有文學一人從六品上掌校典籍侍從文章至諸州文學乃德宗時改博士為之德宗以前無此稱也玩謝病遊梁之句當是為諸王文學者白玉堂相逢行古辭黃金為君門白玉為君堂平原客史記平原君喜賓客賓客蓋至者數千人邯鄲娼古辭上有雙尊酒作使邯鄲娼使氣南史傅縡負才使氣凌侮人物遊梁史記司馬相如為武騎常侍非其好也會景帝不好辭賦是時梁孝王來朝從遊説之士齊人鄒陽淮陰枚乘吳莊忌夫子之徒相如見而悅之因病免客遊梁梁孝王令與諸生同舍鄭霍二山人河嶽英靈集文苑英華並作寄崔鄭二山人翩翩繁華子繁河嶽英靈集作京多出金張門出文苑英華作事幸有先人業早蒙明主恩早蒙河嶽英靈集作思逢文苑英華作早逢童年且未學肉食騖華軒豈乏中林士乏河嶽英靈集作知無人獻至尊獻顧元緯本凌本河嶽英靈集俱作薦鄭公老泉石公河嶽英靈集文苑英華俱作生霍子安丘樊賣藥不二價著書盈萬言盈一作仍息陰無惡木飲水必清源吾賤不及議吾河嶽英靈集作余斯人竟誰論繁華子阮籍詩昔日繁華子吕延濟注繁華喻人美盛如春花之繁金張漢書功臣之後惟有金氏張氏親近貴寵比於外戚先人業國語朝夕處事猶恐忘先人之業華軒華軒車之美者江淹詩金張服貂冕許史乘華軒中林士王康琚詩今雖盛明世能無中林士至尊唐六典凡夷夏之通稱天子曰皇帝臣下內外兼稱曰至尊賣藥後漢書韓康字伯休京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休那乃不二價乎康歎曰我本欲避名今小女子皆知有我焉何用藥為乃遁入霸陵山中惡木陸機詩渴不飲盜泉水熱不息惡木隂偶然作六首楚國有狂夫茫然無心想散髮不冠帶行歌南陌上孔子與之言仁義莫能奬未嘗肯問天何事須擊壤復笑採薇人胡為乃長往楚狂髙士傳陸通字接輿楚人也好養性躬耕以為食楚昭王時通見楚政無常乃佯狂不仕故時人謂之楚狂孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行郤曲郤曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而不知無用之用也孔子下車欲與之言趨而避之不得與之言田舍有老翁垂白衡門裏有時農事間斗酒呼鄰里喧聒茅簷下或坐或復起短褐不為薄園葵固足美動則長子孫不曾向城市五帝與三王古來稱天子天一作君干戈將揖讓畢竟何者是得意茍為樂野田安足鄙且當放懷去放一作忘懷一作志行行沒餘齒垂白漢書杜欽傳誠哀老姐垂白師古注垂白者言白髮下垂也短褐列子衣則裋褐食則粢糲淮南子覽冥訓裋褐不完髙誘注褐毛布如今之馬衣也又齊俗訓必有菅屩跐踦裋褐不完者髙誘注楚人謂袍為裋褐大布史記秦始皇本紀夫寒者利短褐而飢者甘糟粳徐廣曰短一作䄈小襦也音豎索隱云趙岐曰褐以毛毳織之若馬衣或以褐編衣也短一音豎蓋謂褐布豎裁為勞役之衣短而且狹故謂之短褐亦曰豎褐又孟嘗君傳士不得短褐索隱短音豎豎褐謂褐衣而豎裁之以其省而便事也漢書貢禹傳裋褐不完師古曰裋者謂僮豎所著布長襦也褐毛布之衣也裋音豎又敘傳思有短褐之褻儋石之畜晉書潘尼傳披短褐茹藜藿又劉驎之傳拂短褐與桓沖言話成按裋褐短褐書傳兩見今人以裋字為正以短字為訛非也或謂傳中短字皆係訛寫然考岑參詩野花迎短褐河栁拂長鞭明作短字用矣豈亦以此為訛耶園葵陶潛詩好味止園葵餘齒晉書隱逸傳乞還餘齒歸死岱宗日夕見太行沉吟未能去問君何以然世網嬰我故小妹日成長兄弟未有娶家貧祿既薄儲蓄非有素幾回欲奮飛踟蹰復相顧孫登長嘯臺松竹有遺處相去詎幾許故人在中路愛染日已薄禪寂日已固寂一作習忽乎吾將行乎凌本作呼非寧俟嵗云暮太行太平寰宇記太行山在懷州修武縣北三十二里一統志太行山在衛輝府輝縣西五十里西南連懷慶府界一帶峰麓雖各有名然總呼為太行沉吟後漢書曹褒傳晝夜研精沉吟專思奮飛詩靜言思之不能奮飛毛萇傳如鳥奮翼而飛去長嘯臺晉書阮籍嘗於蘇門山遇孫登與商略終古及棲神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳳之音響乎山谷乃登之嘯也太平寰宇記懷州修武縣有天門山今謂之百家巖在縣西北三十七里以巖下可容百家因名上有精舍又有煆竈處傳云嵇康所居圖經云百家巖有劉伶醒酒臺孫登長嘯臺阮氏竹林嵇康淬劍池並在巖之左右一統志蘇門山在衛輝府輝縣西北七里一名百門山嘯臺在百門山上即孫登隱居長嘯之所愛染大般若經於妙欲境心不愛染禪寂維摩詰經一心禪寂攝諸亂意忽乎楚辭懷信侘傺忽乎吾將行兮嵗云暮古詩凜凜嵗云暮陶潛任天真其性頗耽酒自從棄官來家貧不能有九月九日時菊花空滿手中心竊自思儻有人送否白衣攜壺觴果來遺老叟河嶽英靈集作白衣攜觴來果不違老叟且喜得斟酌安問升與斗奮衣野田中今日嗟無負負顧元緯本凌本俱作有兀傲迷東西簔笠不能守傾倒強行行酣歌歸五栁生事不曽問肯愧家中婦婦顧元緯本凌本俱作帚非陶潛宋書陶潛性嗜酒家貧不能恆得親舊知其如此或置酒招之造飲輒盡期在必醉為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去職白衣見四卷陶潛菊注斟酌陶潛詩過門更相呼有酒斟酌之奮衣世説郭林宗奮衣而去兀傲陶潛詩規規一何愚兀傲差若穎家中婦成按淵明與子書曰嘗感孺仲賢妻之言敗絮自擁何慚兒子云云右丞所謂肯愧家中婦者正隱括此語也顧元緯改婦字作帚字且云實用漢紀家有敝帚語諸本作家中婦雖帚婦同韻恐義不可解今據漢紀改作帚非也或以淵明有鄰靡二仲室無萊婦之語謂淵明安得有賢婦而愧之考南史陶潛傳其妻翟氏志趣亦同能安苦節夫耕於前妻鋤於後不可謂無賢婦也其云室無萊婦者當是翟卒之後故云不得據此作證且肯愧家中帚較之肯愧家中婦不更難解乎趙女彈箜篌復能邯鄲舞夫壻輕薄兒鬬雞事齊主黃金買歌笑用錢不復數許史相經過髙門盈四牡客舍有儒生昂藏出鄒魯讀書三十年腰下無尺組下一作間被服聖人教一生自窮苦箜篌釋名箜篌此師延所作靡靡之樂也後出於桑間濮上之地蓋空國之侯所存也師涓為晉平公鼓焉鄭衛分其地而有之遂號鄭衛之音謂之淫樂也劉昫唐書箜篌漢武帝使樂人侯調所作以祠太乙或云侯輝所作其聲坎坎應節謂之坎侯聲訛為箜篌或謂師延靡靡之樂非也舊説亦依琴制今按其形似瑟而小七弦用撥彈之如琵琶邯鄲舞劉劭趙都賦狄鞮妙音邯鄲才舞輕薄兒沈約詩洛陽繁華子長安輕薄兒鬬雞莊子紀渻子為王養鬬雞陸德明注王齊王也許史漢書上無許史之屬應劭曰許伯宣帝皇后父史髙宣帝外家也師古曰許氏史氏有外屬之恩四牡詩四牡孔阜昂藏陸機孝侯周處碑汪洋延闕之旁昂藏寮宷之上鄒魯史記鄒魯濱洙泗猶有周公遺風俗好儒備於禮老來懶賦詩惟有老相隨宿世謬詞客宿世唐詩紀事作當代前身應畫師不能捨餘習偶被世人知世萬首唐人絶句唐詩紀事俱作時名字本皆是此心還不知疊用二知字疑誤萬首唐人絶句採宿世謬詞客四句作一絶題曰題輞川圖餘習維摩詰經深入緣起斷諸邪見有無二邊無復餘習同王十三維偶然作十首儲光羲仲夏日中時草木看欲焦田家惜功力功一作工把鋤來東臯顧望浮雲隂往往誤傷苗歸來悲困極兄嫂共相譊譊一作饒無錢可沽酒何以解劬勞夜深星漢明庭宇虛寥寥髙栁三五株可以獨逍遙儲光羲唐書儲光羲兖州人登開元進士第又詔中書試文章歷監察御史祿山反陷賊自歸顧况監察御史儲公光羲集序云開元十四年嚴黃門知考功以魯國儲公進士髙第與崔輔國員外綦母潛著作同時其明年擢第常少府建王龍標昌齡此數人皆當時之秀而侍御聲價隱隱轥轢諸子其文篇賦論凡七十卷雖無風雷之會意氣相感而扶危拯病綽有賢達之風拔身虜庭竟陷危邦士生不榮可以言命然窺其鴻黃窈窕之學金石管磬之聲如登瑤臺而進玉府靈篇邃宇景物寥映緑流翠草佳木好鳥不足稱珍嗣息曰溶亦鳳毛駿骨恐墜先志沂洄千里泣拜告余曰我先人與王右丞伯仲之歡也相國縉雲嘗以序冠編次會縉雲之謫亡焉後輩據文之士風流不接故小子獲忝操簡伏恐魂遊無方嗤責造次茫茫古道不見來者豈以龍戰害乎鹿鳴齊竽競吹燕石爭寶嗚呼薄遊之士未躋一峰已代其峻登閬風者乃知其迤邐昏明掩豁將盡復通之者其若是乎北山種松柏南山種蒺藜出入雖同趣所向各有冝向一作尚孔子貴仁義老氏好無為我心若虛空此道將安施暫過伊闕間晼晚三伏時髙閣入雲中芙蓉滿清池要自非我室還望南山陲蒺藜郭璞爾雅注蒺藜布地蔓生細葉子有三角刺人無為老子是以聖人處無為之事行不言之教伊闕水經注伊水又北入伊闕昔大禹疏以通水兩山相對望之若闕伊水歷其間北流故謂之伊闕矣春秋之闕塞焉昭公二十六年趙鞅使女寬守闕塞是也陸機云洛有四闕斯其一焉東巖西嶺並鐫石開軒高甍架峰西側靈巖下泉流東注入於伊水傅毅反都賦曰因龍門以暢化開伊闕以達聰也元和郡縣志河南府有伊闕縣北至府七十里伊闕山在縣北四十五里晼晚楚辭白日晼晚其將入兮潘嶽懷舊賦日晼晚而將暮李周翰注晼晚日落貌三伏初學記隂陽書曰從夏至後第三庚為初伏第四庚為中伏立秋後初庚為終伏謂之三伏野老本貧賤冒暑鋤瓜田暑一作雨一畦未及終樹下髙枕眠荷蓧者誰子皤皤來息肩不復問鄉墟相見但依然腹中無一物髙話羲皇年落日臨層隅層隅唐詩正音作曾城逍遙望晴川晴唐詩正音作秦使婦提蠶筐呼兒傍漁船悠悠泛緑水去摘浦中蓮蓮花豔且美美一作妍使我不能還畦説文田五十畝曰畦皤皤班固詩皤皤國老乃父乃兄章懷太子注説文曰皤皤老人貌也音步何反息肩左傳子駟請息肩於晉層隅鮑照凌煙樓銘巖巖崇樓藐藐層隅浮雲在虛空隨風復卷舒我心方處順動作何憂虞但言嬰世網不復得間居迢遞别東國超遙來西都見人但恭敬曾不問賢愚雖若不能言中心亦難誣故鄉滿親戚道遠情日疏偶欲陳此意復無南飛鳬復無一作無復南飛鳬沈約詩無因達往意欲寄雙飛鳬草木花葉生相與命為春當非草木意信是故時人靜念惻羣物何由知至真狂歌問夫子夫子莫能陳鳳凰飛且鳴容裔下天津清淨無言語兹焉庶可親容裔張衡東京賦紛焱悠以容裔薛綜注容裔髙低之貌江淹詩行光自容裔張銑注容裔自在貌天津楚辭章句天津東極箕斗之間漢津也黃河流向東顧元緯本作黃河向東流弱水流向西趨舍各有異造化安能齊妾本邯鄲女生長在叢臺既聞容見寵復想玄為妻刻劃尚風流幸遇君招攜逶迤歌舞座婉孌芙蓉閨日月方向除恩愛忽焉暌棄置誰復道但悲生不諧羡彼匹婦意偕老常同棲弱水史記索隱魏略云弱水在大秦西玄中記云天下之弱者有崑崙之弱水鴻毛不能載也通鑑地理通釋弱水出吐谷渾界窮石山自甘州刪丹縣西至合黎山與張掖縣河合其水力不勝芥然可以皮船渡通鑑魏太武擊柔然至栗水西行至莬園水又循弱水西行至涿邪山則弱水在莬園水之西涿邪山之東禹貢弱水既西以水皆東流惟弱黑二水乃西注耳叢臺漢書趙王宫叢臺災師古注連聚非一故名叢臺蓋本六國時趙王故臺也在邯鄲城中水經注叢臺六國時趙王之臺也郡國志曰邯鄲有叢臺故劉劭趙都賦曰結雲閣於南宇立叢臺於少陽者也今遺基舊墉尚在元和郡縣志叢臺在邯鄲縣內東北隅九域志磁州有叢臺趙武靈王所築玄妻左傳昔有仍氏生女黰黑而甚美光可以鑑名曰玄妻婉孌後漢書婉孌龍姿章懷太子注婉孌猶親愛也除詩小雅昔我往矣日月方除毛萇傳除除陳生新也顔延年秋胡詩良時為此别日月方向除生不諧後漢書周澤為太常清潔循行盡敬宗廟嘗卧病齋宫其妻哀澤老病窺問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪當世疑其詭激時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋日暮登春山山鮮雲復輕遠近看春色踟蹰新月明仙人浮丘公對月時吹笙丹鳥飛熠熠蒼蠅亂營營羣動汩吾真訛言傷我情安得如子晉與之遊太清浮丘公列仙傳王子喬者周靈王太子晉也好吹笙作鳳凰鳴遊伊洛之間道士浮丘公接以上嵩髙山三十餘年後求之於山上見桓良曰告我家七月七日待我於緱氏山巔至時果乘白鶴駐山頭望之不得到舉手謝時人數日而去丹鳥古今注螢火一名耀夜一名景天一名熠耀一名丹良一名磷一名丹鳥一名夜光一名宵燭腐草為之食蚊蚋營營詩營營青蠅毛萇傳營營往來貌耽耽銅鞮宫遙望長數里賓客無多少出入皆珠履朴儒亦何為辛苦讀舊史不道無家舍效他養妻子冽冽玄冬暮衣裳無準擬偶然著道書神人養生理公卿時見賞賜賚難具紀莫問身後事且論朝夕是耽耽張衡西京賦大厦耽耽九户開闢薛綜注耽耽深邃之貌銅鞮宫左傳今銅鞮之宫數里杜預注銅鞮晉離宫元和郡縣志晉銅鞮宫在潞州銅鞮縣東十五里太平寰宇記銅鞮城在銅鞮縣南十五里本晉銅鞮宫上黨記云銅鞮有晉宫闕猶存珠履史記春申君客三千餘人其上客皆躡珠履朴儒陸機詩鳴玉豈朴儒憑軾皆俊民冽冽陶潛詩冽冽氣遂嚴玉篇冽寒氣也玄冬揚雄羽獵賦玄冬季月天地隆烈師古注北方色黑故曰玄冬空山暮雨來衆鳥竟棲息斯須照夕陽雙雙復撫翼我念天時好東田有稼穡浮雲蔽川原新流集溝洫徘徊顧衡宇僮僕邀我食卧擁牀頭書擁一作覽睡看機中織想見明膏煎中夜起唧唧衡宇歸去來辭乃瞻衡宇劉良注衡宇謂其所居衡門屋宇也四鄰競豐屋我獨存卑室窈窕髙臺中時聞撫清瑟狂颷動地起拔木乃非一相顧始知悲中心憂且栗蚩蚩命子弟恨不居髙秩日入賓從歸清晨冠蓋出中庭有竒樹榮早衰復疾此道猶不知微言安可述窈窕毛萇詩傳窈窕幽間也鄭康成箋孔穎達正義皆作居處訓與揚子雲所謂善心為窈善容為窕之解不同狂颷陸雲南征賦狂颷起而妄駭行雲藹而芊眠蚩蚩毛萇詩傳蚩蚩者敦厚之貌微言漢書仲尼沒而微言絶師古注微言精微要妙之言也西施詠河嶽英靈集唐文粹唐詩紀事俱作西施篇豔色天下重西施寧久微寧一作又朝為越溪女為唐詩紀事作仍暮作吳宫妃暮一作暝宫妃一作王姬賤日豈殊衆貴來方悟稀邀人傅脂粉河嶽英靈集作要人傅香粉不自著羅衣君寵益驕態君憐無是非當時浣紗伴當一作常莫得同車歸持謝鄰家子持謝河嶽英靈集唐詩紀事俱作寄言一作寄謝子河嶽英靈集唐詩正音俱作女效顰安可希西施吳越春秋越王乃使相於國中得苧蘿山鬻薪之女曰西施鄭旦飾以羅縠教以容步習於土城臨於都巷三年學服而獻於吳吳王大悅浣紗太平寰宇記諸暨縣有苧蘿山山下有石迹水是西施浣紗之所浣紗石猶存效顰莊子西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走陸德明注蹙額曰矉矉與顰同成按賤日豈殊衆二言古今亟稱佳句然愚意以為不及君寵益驕態二言為尤工四言之義俱屬慨詞然出之以沖和之茟遂不覺渢渢乎為入耳之音誠有合於風人之旨也哉李陵詠時年十九漢家李將軍三代將門子結髮有竒䇿少年成壯士長驅塞上兒深入單于壘旌旗列相向簫鼓悲何已日暮沙漠陲戰聲煙塵裏將令蕃落滅豈獨名王侍既失大軍援遂嬰穹廬恥少小蒙漢恩何堪坐思此深衷欲有報投軀未能死引領望子卿非君誰相理李陵史記李陵為建章監監諸騎善射愛士卒天子以為李氏世將使將八百騎嘗深入胸奴二千餘里過居延視地形無所見虜而還天漢二年二師將軍李廣利將三萬騎擊胸奴右賢王於祈連天山而使陵將其射士步兵五千人出居延北可千餘里欲以分胸奴兵陵既至期還而單于以兵八萬圍擊陵軍陵軍五千人兵矢既盡士死者過半而所殺傷胸奴亦萬餘人且引且戰連鬬八日還未到居延百餘里胸奴遮狹絶道陵食乏救兵不到遂降胸奴三代將門漢書李廣傳贊云三代之將道家所忌自廣至陵遂亡其宗結髮漢書施讎結髮事師數十年師古注言從結髮為童丱即從師學著其早也長驅史記輕卒鋭兵長驅至國單于顔師古漢書注單于胸奴天子之號也單音蟬穹廬漢書胸奴父子同穹廬臥師古曰穹廬旃帳也其形穹隆故曰穹廬投軀北史投軀萬死之地以邀一旦之功引領左傳引領西望子卿子卿蘇武字漢書蘇武傳胸奴與漢和親漢求武等於是李陵置酒賀武曰陵志雖駑怯令漢且貰陵罪全其老母使得奮大辱之積庶幾乎曹柯之盟此陵宿昔之所不忘也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人一别長絶陵起舞歌曰經萬里兮渡沙幕為君將兮奮胸奴路窮絶兮矢刃摧士衆滅兮名已隤老母已死雖欲報恩將安歸燕子龕禪師一本有詠字山中燕子龕路劇羊腸惡裂地競盤屈插天多峭崿瀑泉吼而噴怪石看欲落伯禹訪未知五丁愁不鑿上人無生緣生長居紫閣六時自捶磬一飲尚帶索種田燒白雲斫漆響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙博救世多慈悲即心無行作周商倦積阻蜀物多淹泊巖腹乍旁穿澗脣時外拓橋因倒樹架柵值垂藤縛鳥道悉已平龍宫為之涸跳波誰揭厲絶壁免捫摸山木日隂陰結跏歸舊林一向石門裏任君春草深燕子龕按唐驪山宫圖燕子龕在連理水上山城門在其東飛霞泉在其西羊腸謂燕子龕之路盤紆曲屈較羊腸更惡括地志太行山在懷州河內縣北二十五里有羊腸坂漢書地理志上黨郡壺關有羊腸坂峭崿孫綽遊天台山賦陟峭崿之崢嶸李善注文字集略曰崿崖也五丁華陽國志蜀有五丁力士能移山舉萬釣紫閣太平廣記終南山紫閣峰去長安城七十里陜西志紫閣峰在西安府鄠縣東南三十里旭日射之爛然而紫其形上竦若樓閣然即杜詩所謂紫閣峰隂入渼陂也六時西域分晝夜為六時謂日初分時日中分時日後分時夜初分時夜中分時夜後分時帶索列子孔子遊於泰山見榮啓期行乎郕之野鹿裘帶索鼓琴而歌燒田齊民要術凡開荒山澤田皆七月芟艾之草乾即放火至春而開墾其林木大者􅞑殺之葉死不扇便任耕種三嵗後根枯莖朽以火燒之斫漆古今注漆樹以剛斧斫其皮開以竹管承之汁滴管中即成漆也丹壑鮑照詩妍容逐丹壑山神請法苑珠林晉廬山有釋曇雍姓楊關中人形長八尺雄武過人南投廬山事遠公為師內外經書多所綜涉志尚傳法不憚疲苦乃於山之西南别立茅宇與弟子曇果澄思禪門嘗於一時果夢見山神求受五戒果曰家師在此可往咨受後少時雍見一人著單夾衣風姿端雅從者三十人請受五戒雍以果先夢知是山神乃為説法授戒神嚫以外國匕筯禮拜辭别倐忽不見又云大同元年二月五日攝山神現形著菩薩巾披袈裟形貌極端正侍從左右三十餘人又一人捉香爐在前來入禪堂詣𢎞誓法師所自坐胡牀與法師共語并請寺衆行道洞仙博曹植詩仙人攬六箸對博太山隅無行作維摩詰經不眴菩薩曰受不受為二若法不受則不可得以不可得故無取無捨無作無行是為入不二法門積阻郭璞江賦幽澗積阻鳥道凡山路之髙峻險絶者謂之鳥道南中八志交趾郡治龍編縣自興古鳥道四百里以其險絶獸猶無蹊特上有飛鳥之道耳鳥道字本此揭厲爾雅深則厲淺則揭揭者揭衣也以衣涉水為厲繇膝以上為揭繇帶以上為厲結跏菩薩瓔珞經二者坐禪若欲詣座結跏趺坐便去衆想羽林騎閨人秋月臨髙城城中管絃思離人堂上愁稚子階前戲出門復映户望望青絲騎行人過欲盡狂夫終不至左右寂無言相看共垂泪羽林騎漢書羽林掌送從次期門武帝太初元年置名曰建章營騎後更名羽林騎唐書百官志有左右羽林軍後人謂天子禁兵皆謂之羽林青絲騎劉孝綽詩未見青絲騎徒勞紅粉粧冬夜書懷冬宵寒且永夜漏宫中發草白靄繁霜木衰澄清月麗服映頽顔朱燈照華髮漢家方尚少顧影慚朝謁夜漏成按漏刻之法孔壺為漏浮箭為刻視水高下以定昏明之候故曰漏刻在晝謂之晝漏入夜謂之夜漏唐六典注凡候夜漏以為更點之節每夜分為五更每更分為五點更以擊鼓為節點以擊鐘為節後人謂之漏鼓亦謂之漏聲是也若直呼更籌為夜漏則非矣玩右丞發字亦屬更籌説繁霜詩正月繁霜毛萇傳繁多也朱燈鮑照夜坐吟朱燈滅朱顔尋華髮傅休奕詩一别終華髮尚少漢武故事上至郎署見一老郎龎眉皓髮問何時為郎何其老也對曰臣姓顔名駟以文帝時為郎文帝好文而臣好武景帝好老而臣獨少陛下好少而臣已老以是三葉不遇也上感其言擢為會稽都尉早朝皎潔明星髙蒼茫遠天曙槐霧暗不開暗文苑英華作鬱城鴉鳴稍去始聞髙閣聲莫辨更衣處銀燭巳成行金門儼騶馭金文苑英華作重槐霧何遜詩城霞旦晃朗槐霧曉氛氲更衣漢書王莽傳張于西廂及後閣更衣中晉灼曰更衣中謂朝賀易衣服處室屋名也銀燭顧野王舞影賦耀金波兮繡户列銀燭兮蘭房金門漢書敘傳平津斤斤晚躋金門師古注金門金馬門也騶馭張正見詩騶馭鬱相催寓言二首朱紱誰家子無乃金張孫驪駒從白馬出入銅龍門問爾何功德多承明主恩鬬雞平樂館射雉上林園曲陌車騎盛髙堂珠翠繁奈何軒冕貴不與布衣言朱紱韋孟諷諫詩黼衣朱紱四牡龍旗師古注黼衣晝為斧形而白與黑為彩也朱紱為朱裳畫為亞文也亞古弗字也故因謂之紱字又作黻其音同聲驪駒陌上桑古辭何用識夫壻白馬從驪駒銅龍門漢書上嘗急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛廉之為名也何功德應璩詩問我何功德三入承明廬平樂館漢書武帝紀元封六年夏京師民觀角抵於上林平樂館東方朔傳董氏常從遊戲北宫馳逐平樂觀雞鞠之會角狗馬之足射雉魏志辛毗常從帝射雉上林園三輔黃圖漢舊儀云上林苑方三百里苑中養百獸天子秋冬射獵取之曲陌陸機詩回渠繞曲陌君家御溝上垂栁夾朱門列鼎會中貴鳴珂朝至尊生死在八議窮達由一言須識苦寒士莫矜狐白溫瀛奎律髓編此首入俠少類作盧象雜詩列鼎説苑纍茵而坐列鼎而食中貴史記天子使中貴人從廣服虔曰中貴內臣之貴幸者索隱曰案董巴輿服志云黃門丞主密近使聽察天下謂之中貴人使者崔浩云在中而貴幸非德望故曰中貴也鳴珂劉昫唐書輿服志馬珂一品以下九子四品七子五品五子爾雅翼貝大者為珂黃黑色其骨白可以飾馬蓋此等飾非特取其容兼取其聲韻會服虔通俗文曰勒飾曰珂何遜詩隔林望行幰下阪聽鳴珂蓋馬行則珂響故曰鳴珂也八議漢書刑法志周官有八議之法一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議勤八曰議賓狐白溫王景玄詩詎憶無衣苦但知狐白溫吕向注狐白謂狐腋之白毛以為裘也雜詩朝因折楊栁相見洛城隅城凌本作陽誤楚國無如妾秦家自有夫對人傳玉腕腕一作碗映竹解羅襦竹諸本皆作燭人見東方騎皆言夫壻殊持謝金吾子煩君提玉壺秦家陌上桑古辭使君從南來五馬立踟蹰使君遣吏往問是誰家姝秦氏有好女自名為羅敷使君謝羅敷寧可共載否羅敷前置詞使君一何愚使君自有婦羅敷自有夫玉腕梁簡文帝詩簟文生玉腕香汗浸紅紗羅襦史記羅襦襟解微聞薌澤謝朓詩輕歌急綺帶含笑解羅襦東方騎陌上桑古辭東方千餘騎夫壻居上頭坐中數千人皆言夫壻殊金吾子辛延年羽林郎詩不意金吾子娉婷過我廬銀鞍何煜爚翠蓋空踟蹰就我求清酒絲繩提玉壺貽我青銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相踰多謝金吾子私愛徒區區獻始興公原注時拜右拾遺寧棲野樹林寧飲澗水流水文苑英華作中不用食粱肉食顧元緯本凌本俱作坐﨑嶇見王侯鄙哉匹夫節布褐將白頭任智誠則短守仁固其優側聞大君子安問黨與讎所不賣公器動為蒼生謀賤子跪自陳可為帳下不感激有公議曲私非所求始興公按劉昫唐書張九齡本傳開元二十一年十二月拜中書侍郎同中書門下平章事明年遷中書令二十三年加金紫光祿大夫纍封始興縣伯二十四年遷尚書右丞相罷知政事坐引非其人左遷荆州大都督府長史俄請歸拜墓因遇疾卒而宋祁唐書本傳以封始興伯為貶荆州長史後事非也當以劉書為正粱肉國語食必粱肉衣必文繡大君子漢書董仲舒傳故不足稱於大君子之門也黨讎劉琨詩尚能隆二伯安問黨與讎賤子應休璉詩避席跪自陳賤子實空虛帳下三國志樂進以膽烈從太祖為帳下吏世説王丞相主簿欲檢校帳下晉書石崇傳乃密貨崇帳下問其所以哭殷遙人生能幾何畢竟歸無形念君等為死萬事傷人情慈母未及葬一女才十齡泱漭寒郊外泱漭文苑英華作訣别蕭條聞哭聲浮雲為蒼茫茫文苑英華作莽飛鳥不能鳴行人何寂寞何唐詩紀事作同白日自淒清白日一作日色憶昔君在時問我學無生勸君苦不早令君無所成故人各有贈又不及生平生平諸本皆作平生復第七聨生字韻今從文苑英華唐詩紀事作生平負爾非一途痛哭返柴荆痛文苑英華作慟殷遙唐詩紀事殷遙丹陽人或云句容人天寶間終於忠王府倉曹參軍人生幾何陸機詩人生無幾何為樂常苦晏等死等死字見史記陳勝傳泱漭張衡西京賦泱漭無疆薛綜注泱漭無限域之貌柴荆謝靈運詩促裝返柴荆劉良注柴荆謂柴門荆扉也同王十三維哭殷遙儲光羲生理無不盡念君在中年遊道雖未深舉世莫能賢筮仕苦貧賤為客少田園膏腴不可求乃在許西偏四鄰盡桑柘咫步開牆垣內艱未及虞形影隨化遷茅茨俯苫蓋雙殯兩楹間時聞孤女號迥出陌與阡慈烏亂飛鳴猛獸亦以跧故人王夫子靜念無生篇哀樂久已絶聞之將泫然太陽蔽空虛雨雪浮蒼山迢遞親靈櫬顧豫悲絶絃處順與安時及此乃空言中年潘嶽夏侯常侍誄曾未知命中年隕卒筮仕左傳初畢萬筮仕於晉遇屯之比許西偏左傳乃使公孫獲處許西偏虞鄭康成儀禮注虞安也士既葬其父母迎精而反日中而祭之於殯宫以安之釋名既葬還祭於殯宫曰虞謂虞樂安神使還此也苫蓋左傳乃祖吾離被苫蓋蒙荆棘杜預注蓋苫之别名爾雅白蓋謂之苫郭璞注白茅苫今江東呼為蓋兩楹檀弓殷人殯於兩楹之間陌阡史記索隱風俗通曰南北曰阡東西曰陌河東以東西為阡南北為陌漢書成帝紀出入阡陌師古曰阡陌田間道也南北曰阡東西曰陌跧韻會跧阻頑切伏也無生篇孫綽遊天台山賦暢以無生之篇李善注無生謂釋典也維摩詰曰是天女所願具足得無生忍靈櫬潘嶽悲邢生詞停豫車而在郊撫靈櫬以增悲説文櫬棺也絶絃淮南子鍾子期死而伯牙絶絃破琴知世莫能賞也處順安時莊子安時而處順哀樂不能入也郭象注夫哀樂生於得失也今玄通合變之士無時而不安無順而不處冥與造化為一則無往而非我矣將何得何失孰死孰生哉故任其所受而哀樂無所錯其間矣歎白髮盧象集中亦載此首我年一何長一唐詩品彚作亦鬢髮日已白俯仰天地間能為幾時客悵惆故山雲徘徊空日夕何事與時人東城復南陌王右丞集箋注卷五
