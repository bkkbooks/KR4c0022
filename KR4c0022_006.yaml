body:
  text: 王右丞集箋注卷六仁和趙殿成撰古詩二十六首夷門歌七雄雄雌猶未分七雄唐詩品彚作七國攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子為嬴停駟馬執轡愈恭意愈下亥為屠肆鼓刀人嬴乃夷門抱關者非但慷慨獻竒謀竒唐詩正音作良意氣兼將身命酬向風刎頸送公子頸唐詩正音唐詩品彚俱作頭七十老翁何所求夷門史記魏公子無忌仁而下士士無賢不肖皆謙而禮交之魏有隱士曰侯嬴年七十家貧為大梁夷門監者公子從車騎虛左自迎侯生侯生攝弊衣冠直上載公子上坐不讓欲以觀公子公子執轡愈恭侯生曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥俾倪故立久與其客語微察公子公子顔色愈和侯生乃謝客就車至家公子引侯生坐上坐侯生曰今日嬴之為公子亦足矣嬴乃夷門抱關者也而公子親枉車騎自迎嬴於衆人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故久立公子車騎市中市人皆以嬴為小人而以公子為長者能下士也魏安釐王二十年秦兵圍邯鄲公子姊為平原君夫人數遺魏王及公子書請救於魏魏王使將軍晉鄙將十萬衆救趙留軍壁鄴實持兩端以觀望公子數請魏王魏王不聽公子乃請賓客約車騎百餘乘往赴秦軍與趙俱死行過夷門見侯生侯生曰嬴聞晉鄙之兵符常在王卧內而如姬出入王卧內力能竊之公子誠一開口請如姬如姬必許諾則得虎符奪晉鄙軍北救趙而西却秦公子從其計請如姬如姬盜晉鄙兵符與公子侯生曰將在外君令有所不受臣客屠者朱亥可與俱此人力士晉鄙聽大善不聽可使擊之於是公子請朱亥朱亥曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北向自頸以送公子公子遂行至鄴矯魏王令代晉鄙晉鄙合符疑之欲無聽朱亥袖四十斤鐡椎椎殺晉鄙遂將晉鄙軍擊秦軍秦軍解去救邯鄲存趙七雄張衡東京賦七雄並爭薛綜注七雄謂韓魏燕趙齊秦楚也雄雌東方朔答客難并為十二國未有雄雌意氣謝承後漢書楊喬曰侯生為意氣刎頸七十老翁晉書段灼傳七十老公復何所求哉成按夷門抱關屠肆鼓刀㸃化二豪之語對仗天成巳徵墨妙末句復借用段灼理鄧艾語尤見筆精使事至此未許後人步驟新秦郡松樹歌青青山上松數里不見今更逢不見君心相憶此心向君君應識為君顔色髙且閒亭亭迥出浮雲間新秦郡唐書地理志關內道有麟州新秦郡開元十二年析勝州之連谷銀城置十四年廢天寶元年復置青雀歌青雀翅羽短未能逺食玉山禾猶勝黃雀爭上下唧唧空倉復若何青雀爾雅桑扈竊脂郭璞注俗謂之青雀觜曲食肉好盜脂膏因名云玉山禾鮑照空城雀詩誠不及青鳥逺食玉山禾空倉庾信詩饑噪空倉雀寒驚懶婦機同詠盧象啾啾青雀兒飛來飛去仰天池逍遙飲啄安涯分何假扶搖九萬為扶搖莊子窮髮之北有冥海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若太山翼若垂天之雲摶扶搖羊角而上者九萬里絶雲氣負青天然後圖南陸德明注司馬彪云上行風謂之扶搖爾雅云扶搖謂之飈郭璞云暴風從下上也同詠王縉林間青雀兒來往翩翩繞一枝莫言不解銜環報但問君恩今若為銜環續齊諧記𢎞農楊寶性慈愛年九嵗至華隂山見一黃雀為鴟梟所搏墮逐樹下傷瘢甚多宛轉復為螻蟻所困寶懷之以歸置諸梁上夜聞啼聲甚切親自照視為蚊所嚙乃移置巾箱中啖以黃花逮十餘日毛羽成飛翔朝去暮來宿巾箱中如此積年忽與羣雀俱來哀鳴繞堂數日乃去是夕寶三更讀書有黃衣童子曰我王母使者昔使蓬萊為鴟梟所搏䝉君之仁愛見救今當受使南海别以四玉環與之曰令君子孫潔白且從登三公事如此環矣寶之孝大聞天下名位日隆子震震生秉秉生彪四世三公同詠崔興宗青扈繞青林翩翾陋體一微禽不應常在藩籬下他日凌雲誰見心青扈謝朓詩青扈飛不礙黃口得相窺翩翾張華鷦鷯賦育翩翾之陋體兮無𤣥黃以自貴劉良注翩翾小飛貌藩籬張華鷦鷯賦生於蒿萊之間長於藩籬之下同詠裴迪動息自適性不曾妄與燕雀羣幸忝鴛鸞早相識何時提攜致青雲燕雀羣史記鳳凰不與燕雀為羣隴頭吟一作邊情長城少年游俠客城顧元緯本河嶽英靈集俱作安夜上戍樓看太白隴頭明月迥臨關迥唐詩品彚作尚隴上行人夜吹笛關西老將不勝愁駐馬聽之雙淚流淚一作涕身經大小百餘戰身唐詩品彚作曾麾下偏裨萬户侯蘇武才為典屬國節旄空盡海西頭空盡一作零落河嶽英靈集作落盡唐詩品彚作空落海西唐文粹作海南隴頭吟樂府詩集隴頭一曰隴頭水通典曰天水郡有大阪名曰隴坻亦曰隴山即漢隴關也三秦記曰其阪九回上者七日乃越上有清水四注下所謂隴頭水也戍樓庾信詩戍樓侵嶺路山村落獵圍太白晉書太白進退以候兵髙埤遲速靜躁見伏用兵皆象之吉其出西方失行夷狄敗出東方失行中國敗未盡期日過參天病其對國若經天天下革民更王是謂亂紀人衆流亡隴關章懷太子後漢書注隴關隴山之關也今名大震關在今隴州汧源縣西關西老將後漢書關西出將關東出相大小戰袁宏後漢紀漢祖與項羽戰大小百餘麾下史記灌夫馳入吳軍至吳將麾下正義曰麾謂大將之旗偏裨漢書大將軍出必有偏裨所以揚威武參計策萬户侯漢書文帝曰惜李廣不逢時令當髙祖世萬户侯豈足道哉蘇武漢書昭帝紀栘中監蘇武使胸奴留單于庭十九嵗乃還奉使全節以武為典屬國賜錢百萬如淳注以其久在外國知邊事故令典主諸屬國師古曰典屬國本秦官漢因之掌歸義蠻夷蘇武本傳胸奴徙武北海上無人處使牧羝羝乳乃得歸武既至海上廩食不至掘野鼠去草食而食之杖漢節牧羊卧起操持節旄盡落海西頭隋煬帝詩淮南江北海西頭老將行少年十五二十時步行奪取蕃馬騎取樂府詩集作得射殺山中白額虎山中一作中山一作隂山肯數鄴下黃鬚兒一身轉戰三千里一劍曾當百萬師漢兵奮迅如霹靂賊騎崩騰畏蒺藜衛青不敗由天幸李廣無功緣數竒自從棄置便衰朽便凌本作更世事蹉跎成白首昔時飛箭無全目箭當作雀今日垂楊生左肘路傍時賣故侯瓜門前學種先生栁茫茫古木連窮巷茫茫顧元緯本凌本文苑英華唐詩品彚俱作蒼茫連一作迷寥落寒山對虛牖寥一作遼誓令疏勒出飛泉不似潁川空使酒賀蘭山下陳如雲羽檄交馳日夕聞節使三河募年少三劉本顧可久本唐詩品彚俱作山誤詔書五道出將軍試拂鐵衣如雪色聊持寶劍動星文願得燕弓射大將大劉本凌本顧可久本唐詩品彚俱作天恥令越甲鳴吾君恥唐詩品彚作敢吾君劉本樂府詩集唐詩正音唐詩品彚俱作吳軍誤莫嫌舊日雲中守猶堪一戰立功勳立唐詩正音作樹樂府詩集文苑英華作取白額虎晉書周處謂父老曰今時和嵗豐何苦而不樂耶父老嘆曰三害未除何樂之有處曰何謂也答曰南山白額猛虎長橋下蛟并子為三矣處乃入山射殺猛虎因投水搏蛟黃鬚兒劉孝標世說注魏略曰任城威王彰字子文太祖卞大后第二子性剛勇而黃鬚北討代郡獨與麾下百餘人突陳而走太祖聞曰我黃鬚兒可用也轉戰轉戰謂相馳逐戰鬬也後漢書踰越險阻轉戰千里賊騎曹植詩賊騎數遷移蒺藜六韜木蒺藜去地二尺五寸百二十具敗步騎要窮寇遮走北狹路微徑張鐵蒺藜芒髙四寸廣八寸長六尺以上千二百具敗走騎埤雅蒺藜布地蔓生子有三角刺人狀如菱而小今兵家乃鑄鐵為之以梗敵路亦呼蒺藜天幸漢書霍去病所將常選然亦敢深入常與壯騎先其大軍亦有天幸未嘗困絶也按天幸乃去病事今指衛青蓋誤用也數竒史記李廣傳元朔六年廣復為後將軍從大將軍軍出定襄擊胸奴諸將多中首虜率以功為侯者而廣軍無功元狩四年廣從大將軍青擊胸奴青隂受上誡以為李廣老數竒母令當單于恐不得所欲如淳注數為胸奴所敗竒為不偶也索隱曰案服䖍云作事數不偶也宋景文公筆記漢書李廣傳數竒注切為所角反故學者皆曰數竒音朔孫宣公奭當世大儒亦從曰數後豫得江南本乃所具反由是復觀顔注乃顔破朔從所具反云世人不之覺齊東野語李廣傳廣數竒母令當單于注竒不偶也言廣命隻不偶也數音所角切竒居宜切宋景文以為江南本漢書數乃所具切角字乃具字之誤耳然或以為疑余因考藝文類聚馮敬通集吾數竒命薄唐文粹徐敬業詩數竒良可嘆王維詩衛青不敗由天幸李廣無功緣數竒杜甫詩數竒謫關塞道廣存箕潁羅隱詩數竒當自愧時薄欲何干東坡詩數竒逢惡嵗計拙集枯梧觀其偶對則數為命數非疏數之數音所具切明矣全目鮑照詩驚雀無全目李善注帝王世紀曰帝羿有窮氏與吳賀北游賀使羿射雀羿曰生之乎殺之乎賀曰射其左目羿引弓射之誤中右目羿抑首而愧終身不忘故羿之善射至今稱之左肘見二卷楊枝肘注故侯瓜史記邵平者故秦東陵侯秦破為布衣貧種瓜於長安城東瓜美故世俗謂之東陵瓜疏勒後漢書耿恭以疏勒城旁有澗水可固乃引兵據之胸奴來攻恭於城下擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰嘆曰聞昔二師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示虜虜出不意以為神明遂引去潁川史記灌夫為人剛直使酒家纍數千萬食客日數十百人陂池田園宗族賓客為權利橫於潁川師古曰使酒因酒而使氣也賀蘭山元和郡縣志賀蘭山在靈州保靜縣西九十三里山有樹木青白望如駁馬北人呼駁為賀蘭其山阿東望雲中形勢相接迤邐向北經靈武縣又西北經保靜西又北經定逺城西又東北抵河其抵河之處亦名乞伏山在黃河西從首至尾有像月形南北約長五百餘里直邊城之拒防山之東羽檄漢書髙帝紀吾以羽檄徵天下兵未有至者師古注檄者以木簡為書長尺二寸用徵召也其有急事則加以鳥羽插之示速疾也魏武奏事云今邊有警輒露檄插羽陸倕石闕銘羽檄交馳軍書狎至節使劉孝威詩邊城多警急節使滿郊衢三河史記貨殖傳昔唐人都河東殷人都河內周人都河南夫三河在天下之中若鼎足王者所更居也水經注韋昭曰河南河東河內為三河也五道漢書常惠傳漢大發十五萬騎五將軍分道出胸奴傳遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓增三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原凡五將軍兵十餘萬騎出塞各二千餘里星文見十四卷七星文注燕弓顧可久謂燕弓合作天弓引弧九星為天弓為解天將合作燕將引安祿山反范陽為解成按列子云紀昌乃以燕角之弧朔蓬之簳射之左思魏都賦云燕弧盈庫而委徑李周翰注燕弧角弓出幽燕地則燕弓之見稱於世久矣故溫飛卿詩亦有燕弓弦徑霜封瓦之句不得疑其字之誤也天將自當依文苑英華唐文粹樂府詩集本作大將為是越甲說苑越甲至齊雍門子狄請死之齊王曰鼓鐸之聲未聞矢石未交長兵未接子何務死之為雍門子狄對曰昔者王田於囿左轂鳴車右請死之王曰子何為死車右曰為其鳴吾君也王曰左轂鳴者工師之罪也子何事之有焉車右曰臣不見工師之乘而見其鳴吾君也遂刎頸而死知有之乎齊王曰有之雍門子狄曰今越甲至其鳴吾君豈左轂之下哉車右可以死左轂而臣獨不可以死越甲也遂刎頸而死是日越人引甲而退七十里曰齊王有臣鈞如雍門子狄擬使越社稷不血食遂引甲而歸齊王葬雍門子狄以上卿之禮雲中守漢書馮唐傳上既聞廉頗李牧為人良說乃拊髀曰吾獨不得廉頗李牧為將豈憂胸奴哉唐曰陛下雖有廉頗李牧不能用也上曰公何以言吾不能用頗牧也唐曰臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客軍吏舍人是以胸奴逺避不及雲中之塞虜嘗一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍符伍終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之由是言之陛下雖得李牧不能用也文帝悅是日令馮唐持節赦魏尚復以為雲中守燕支行時年二十一漢家天將才且雄天顧元緯本唐詩品彚俱作大來時謁帝明光宫來時一作時來萬乘親推雙闕下千官出餞五陵東誓辭甲第金門裏身作長城玉塞中衛霍才堪一騎將才凌本作才朝廷不數二師功不唐文粹樂府詩集俱作莫趙魏燕韓多徑卒關西俠少何咆勃勃劉本顧可久本唐詩品彚俱作勃非報讎只是聞嘗膽飲酒不曾妨刮骨畫戟雕戈白日寒連旗大斾黃塵沒疊鼓遙翻瀚海波鳴笳亂動天山月天樂府詩集作關麒麟錦帶佩吳鉤颯踏青驪躍紫騮拔劍已斷天驕臂歸鞍共飲月支頭漢兵大呼一當百賊騎相看哭且愁教戰須令赴湯火須顧元緯本凌本俱作雖終知上將先伐謀先伐謀唐文粹樂府詩集俱作伐謀猷燕支史記漢使驃騎將軍去病將萬騎出隴西過焉支山千餘里擊胸奴得胡首虜騎萬八千餘級元和郡縣志焉支山一名删丹山在甘州删丹縣南五十里東西百餘里南北二十里水草荗美與祁連同胸奴失祁連焉支二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色楊炎燕支山神寧濟公祠堂碑西北之巨鎮曰燕支本胸奴王庭昔漢武納渾邪開右地置武威張掖而山界二郡之間連峰委㑹雲蔚黛起積髙之勢四向千里親推史記上古王者之遣將也跪而推轂曰閫以內者寡人制之閫以外者將軍制之雙闕爾雅觀謂之闕郭璞注宫門雙闕邢昺疏周禮太宰正月之吉縣治象之法於象魏使萬民觀治象鄭衆云象魏闕也劉熙釋名云闕在門兩旁中央闕然為道也白虎通云闕是闕疑義又相兼然則其上縣法象其狀巍巍然髙大謂之象魏使人觀之謂之觀也是觀與象魏闕一物而三名也以門之兩旁相對為雙故名雙闕雍録闕之得名也以其立土為髙夾峙宫門兩旁而中間闕然也周官象魏春秋兩觀皆其物矣秦始皇表南山為闕取峰巒凹處名之為闕也東晉寓金陵或欲造闕王導指牛首山曰此天闕也則闕之為制可想矣千官荀子古者天子千官諸侯百官五陵班固西都賦南望杜霸北眺五陵按李善劉良注宣帝之杜陵文帝之霸陵此二陵皆在南髙帝之長陵惠帝之安陵景帝之陽陵武帝之茂陵昭帝之平陵此五陵皆在北辭甲第漢書霍去病傳上為治第令視之對曰胸奴不滅無以家為也霍光傳賜甲第一區陸機詩甲第崇髙闥李善注漢書音義曰有甲乙次第故曰甲第李周翰注甲第第一宅也玉塞晉書載記控絃玉塞躍馬金山衛霍漢書遣大將軍衛青霍去病攻祁連絶大漠窮追單于斬首十餘萬級二師史記拜李廣利為二師將軍發屬國六千騎及郡國惡少年數萬人以往伐宛期至二師城取善馬故號二師將軍徑卒晉書謝萬傳諸將皆徑卒咆勃潘嶽西征賦出申威於河外何猛氣之咆勃李善注咆勃怒貌也嘗膽史記越王句踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰女忘㑹稽之恥邪刮骨三國志關侯嘗為流矢所中貫其左臂後瘡雖愈每至隂雨骨嘗疼痛醫曰矢鏃有毒毒入骨當破臂作創刮骨去毒然後此患乃除耳侯便伸臂令醫劈之時侯適請諸將飲食相對臂血流離盈於盤器而侯割炙飲酒言笑自若畫㦸韻會說文戈平頭㦸也從弋一橫之象形也徐曰謂㦸小支上向則為㦸平之則為戈一曰㦸偏距為戈增韻雙枝為㦸單枝為戈雕戈國語穆公衡雕戈出見使者韋昭注雕鏤也大斾左傳亡大斾之左旃杜預注大斾旗名疊鼓謝朓詩壘鼓送華輈李善注小擊鼓謂之疊張銑注疊鼓其聲重疊也瀚海史記禪姑衍臨瀚海而還如淳注瀚海北海名正義曰按瀚海自一大海名羣鳥解羽伏乳於此因名也鳴笳魏文帝與吳質書從者鳴笳以啓路謝靈運詩鳴笳發春渚稅鑾登山椒李周翰注笳簫也天山史記正義天山一名白山今名折漫羅山在伊吾縣北百二十里史記索隱祁連山西河舊事云山在張掖酒泉二界上東西二百餘里南北百里有松柏五木美水草冬溫夏凉宜畜牧養一名天山亦曰白山也晉灼漢書注天山在西域近蒲類國去長安八千餘里北邊備對天山即祁連山也又名時漫羅山又名祁漫羅山蓋蕃語謂為祁連也時漫羅也祁漫羅也皆天也通典元和志于張掖縣既著祁連山矣而伊西庭三州皆有此山則是自甘肅張掖而西至於庭州相去三千五六百里而天山皆能周遍其地此山亦廣長矣吳鉤鮑照詩錦帶佩吳鉤李周翰注吳鉤鉤類頭少曲吳越春秋闔閭命於國中作金鉤令曰能為善鉤者賞之百金吳作鉤者甚衆而有人貪王之重賞也殺其二子以血釁金遂成二鉤獻於闔閭詣宫門而求賞王曰為鉤者衆而子獨求賞何以異於衆夫子之鉤乎作鉤者曰吾之作鉤也貪而殺二子釁成二鉤王乃舉衆鉤以示之何者是也王鉤甚多形體相類不知其所在於是鉤師向鉤而呼二子之名吳鴻扈稽我在於此王不知汝之神也聲絶於口兩鉤俱飛著父之胸吳王大驚曰嗟乎寡人誠負於子乃賞百金青驪爾雅釋畜云青驪駽邢昺疏舍人曰青驪馬今名駽馬也孫炎曰色青黑之間青毛黑毛相雜者名駽今之鐵驄也紫騮赤色馬唐人謂之紫騮後人改呼棗騮天驕漢書胡者天之驕子也斷臂漢書孝武之世圖制胸奴患其兼從西域結黨南羌乃表河曲列四郡開玉門通西域以斷胸奴右臂月支頭史記胸奴破月支王以其頭為飲器一當百後漢書光武帝紀諸將既經纍捷膽氣益壯無不一當百赴湯火漢書鼂錯傳故能使其衆䝉矢石赴湯火視死如生上將淮南子故上將之用兵也上得天道下得地利中得人心乃行之以機發之以勢是以無破軍敗兵伐謀孫子上兵伐謀其次伐交其次伐兵其下攻城桃源行時年十九漁舟逐水愛山春兩岸桃花夾去津去唐文粹方輿勝覽樂府詩集俱作古坐看紅樹不知逺行盡青溪不見人不見文苑英華唐文粹方輿勝覽樂府詩集俱作忽值山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹方輿勝覽作近入千花映烟竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集驚文苑英華作忽競引還家問都邑都唐詩正音作鄉平明閭巷掃花開薄暮漁樵乘水入初因避地去人間更聞成仙遂不還更聞劉本顧可久本樂府詩集唐詩品彚俱作更問文苑英華唐文粹方輿勝覽俱作及至遂文苑英華唐文粹方輿勝覽俱作去峽裏誰知有人事世中遙望空雲山中劉本顧可久本俱作上不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長游衍自謂經過舊不迷安知峰壑今來變峰文苑英華作岑當時只記入山深青溪幾度到雲林度一作曲春來遍是桃花水不辨仙源何處尋隈隩玉篇隈水曲也隩水涯也房櫳班婕妤賦房櫳虛兮風泠泠師古注櫳疏檻也左思吳都賦房櫳對櫎連閣相經李善注說文曰櫳房室之疏也平明楚辭平明發兮蒼梧桃花水漢書來春桃花水盛師古注月令仲春之月始雨水桃始花蓋桃方花時既有雨水川谷氷泮衆流猥集波瀾甚長故謂之桃花水耳而韓詩傳云三月桃花水東坡謂世傳桃源事多過其實考淵明所記止言先世避秦亂來此則漁人所見似是其子孫非秦人不死者也又云殺雞作食豈有仙而殺者乎舊說南陽有菊水水甘而芳民居三十餘家飲其水皆夀或至百二三十嵗蜀青城山老人村有見五世孫者道極險逺生不識鹽醯而溪中多枸杞根如龍蛇飲其水故夀近嵗道稍通漸能致五味而夀亦益衰桃源蓋此比也歟使武陵太守得而至焉則已化為爭奪之場久矣嘗意天壤之間若此者甚衆不獨桃源其說甚正乃後之詩人文士往往以為神蹤仙境如韓退之詩云神仙有無何渺茫桃源之說尤荒唐劉禹錫云仙家一出尋無蹤至今流水山重重皆失之矣右丞此詩亦未能免俗洛陽女兒行時年十六一作十八洛陽女兒對門居才可顔容十五餘良人玉勒乘驄馬侍女金盤膾鯉魚畫閣珠樓盡相望紅桃緑栁垂簷向羅帷送上七香車寶扇迎歸九華帳狂夫富貴在青春意氣驕奢劇季倫自憐碧玉親教舞不惜珊瑚持與人春窗曙滅九微火九微片片飛花璅戲罷曽無理曲時妝成祗是薰香坐城中相識盡繁華日夜經過趙李家誰憐越女顔如玉貧賤江頭自浣紗洛陽女兒梁武帝河中之水歌河中之水向東流洛陽女兒名莫愁對門居梁武帝樂府誰家女兒對門居玉勒庾信華林園馬射賦控玉勒而搖星跨金鞍而動月金盤陌上桑古辭就我求珍肴金盤膾鯉魚七香車梁簡文帝烏棲曲青牛丹轂七香車九華帳鮑照行路難七綵芙蓉之羽帳九華蒲桃之錦衾九華疑是古時花式之名季倫晉書石崇字季倫財産豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以􅏁澳釜崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷嘗以珊瑚樹賜之髙三尺許枝柯扶踈世所罕比愷以示崇崇便以鐡如意擊之應手而碎愷既惋惜又以為嫉已之寶聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有髙三四尺者六七株條幹絶俗光彩耀日如愷比者甚衆愷恍然自失矣碧玉梁元帝詩碧玉小家女來嫁汝南王九微火何遜詩月映九微火風吹百和香理曲古詩當户理清曲徐陵玉臺新詠序五日猶賖誰能理曲趙李阮籍詩西游咸陽中趙李相經過顔延年注趙漢成帝趙后飛燕也李漢武帝李夫人也並以善歌妙舞幸於二帝成按漢書谷永傳云成帝數為微行多近幸小臣趙李從微賤專寵皆皇太后與諸舅夙夜所常憂此指趙飛燕李平二女寵而言也又敘傳云會許皇后廢班婕妤供養東宫進侍者李平為婕妤而趙飛燕為皇后自大將軍薨後富平定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入侍禁中設宴飲之㑹及趙李諸侍中皆飲滿舉白談笑大噱此則指趙李二家之戚屬言也籍所引正借用為貴戚事而顔延年以趙飛燕李夫人當之誤矣劉孟㑹則以為當時實有此人不必求其誰何更屬臆見楊用修誤讀小臣趙李為句又改易專字作尊字以為即成帝嘗與微行者亦失之顔如玉古詩燕趙多佳人美者顔如玉黃雀癡黃雀癡黃雀癡謂言青鷇是我兒一一口銜食養得成毛衣到大啁啾解游揚各自東西南北飛薄暮空巢上羈雌獨自歸鳳凰九雛亦如此慎莫愁思憔悴損容輝鷇邢昺爾雅疏鳥子生須母哺而食名鷇謂燕雀之屬也史記趙武靈王探雀鷇而食之是也鳥生子而能自噣食者名雛謂雞雉之屬也禮記內則云雛尾不盈握弗食是也羈雌枚乘七發朝則鸝黃鳱鴠鳴焉暮則羈雌迷鳥宿焉吕延濟注羈雌孤鳥也九雛古隴西行鳳凰鳴啾啾一母將九雛榆林郡歌山頭松柏林山下泉聲傷客心千里萬里春草色黃河東流流不息黃龍戍上游俠兒愁逢漢使不相識榆林郡唐書地理志關內道有勝州榆林郡黃河通典榆林郡北至黃河五里黃龍戍梁元帝詩黃龍戍北花如錦𤣥城前月似霜蕭子顯詩遙看白馬津上吏傳道黃龍征戍兒宋書馮跋自號燕王以其治黃龍城故謂之黃龍國游俠兒曹植詩借問誰家子幽并遊俠兒問寇校書雙溪君家少室西為復少室東别來幾日今春風新買雙溪定何似餘生欲寄白雲中似凌本作事校書按唐書百官志𢎞文館有校書郎二人集賢殿書院有校書四人祕書省有校書郎十人著作局有校書郎二人崇文館有校書郎二人司經局有校書四人俱九品官少室元和郡縣志少室山在河南府告成縣西北五十里登封縣西十里髙十六里周回三十里寄崇梵僧崇梵僧崇梵僧秋歸覆釜春不還落花啼鳥紛紛亂澗户山窗寂寂閒峽裏誰知有人事郡中遙望空雲山崇梵僧江鄰幾雜志王右丞濟州詩云汶陽歸客司馬君實云其地則唐濟鄆州今易地矣又崇梵僧詩初謂是僧名乃寺名近東阿覆釡村澗户北山移文澗户摧絶無與歸同崔傅答賢弟洛陽才子姑蘇客桂苑殊非故鄉陌桂苑凌本作杜苑劉本顧可久本唐詩品彚俱作杜宛唐詩正音作桂宛俱非故唐詩正音作舊九江楓樹幾回青一片揚州五湖白揚州時有下江兵蘭陵鎮前吹笛聲夜火人歸富春郭秋風鶴淚石頭城周郎陸弟為儔侣對舞前溪歌白苧曲機書留小史家史唐詩品彚作吏草堂碁賭山隂墅衣冠若話外臺臣先數夫君席上珍更聞臺閣求三語遙想風流第一人洛陽才子潘嶽西征賦賈生洛陽之才子姑蘇太平寰宇記隋平陳改吳州為蘇州蓋因州西有姑蘇山以為名姑蘇山一名姑胥山在吳縣西三十五里連橫山之北越絶書云吳地胥門外有九曲路闔廬造以游姑胥之臺以望湖中窺百姓淮南子亦謂之姑余桂苑太平寰宇記桂林苑吳立在升州上元縣北四十里落星山之陽吳都賦云數軍實於桂林之苑即此也故鄉陌謝朓詩嘆息東流水如何故鄉陌九江尚書荆州九江孔殷孔安國傳云江於此州界分為九道孔頴達正義云傳以江是此水大名九江謂大江分而為九猶大河分為九河故言江於此州之界分為九道鄭云殷猶多也九江從山溪所出其孔衆多地理志九江在今廬江潯陽縣南皆東合於大江如鄭此義九江各自别源其源非大江也下流合於大江耳然則江以南水無大小俗人皆呼為江或從江分出或從外合來故孔鄭各為别解應劭注地理志云江自潯陽分為九道符於孔說陸德明經典釋文九江潯陽地記云一曰烏白江二曰蚌江三曰烏江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江張須元緣江圖云一曰三里江二曰五州江三曰嘉靡江四曰烏土江五曰白蚌江六曰白烏江七曰箘江八曰沙提江九曰廩江參差隨水長短或百里或五十里始於鄂陵終於江口㑹於桑落洲太康地記曰九江劉歆以為湖漢九水入彭蠡澤也方輿勝覽朝氏志太湖一湖而名曰五湖昭餘祁一澤而名曰九澤九江一水而名曰九江五湖水經注江南東注於具區謂之五湖口五湖謂長塘湖太湖射貴湖上湖滆湖也郭景純江賦曰注五湖以漫漭蓋言江水經緯五湖而包注太湖也是以左丘明述國語曰越伐吳而戰於五湖是也又范蠡滅吳返至五湖而辭越斯乃太湖之攝通稱也虞翻曰是湖有五道故曰五湖韋昭曰五湖今太湖也尚書謂之震澤爾雅以為具區方圓五百里初學記周官揚州其浸五湖按張勃吳録五湖者太湖之别名以其周行五百里故以五湖為名或說以太湖射貴湖上湖洮湖滆湖為五湖按國語吳越戰於五湖直在笠澤一湖中戰耳則知或說非也史記正義五湖者菱湖游湖莫湖貢湖咠湖皆太湖東岸五灣為五湖蓋古十時應别今並相連一統志太湖在蘇州府城西南五里禹貢謂之震澤周官爾雅謂之具區史記國語謂之五湖圖經以貢湖游湖胥湖梅梁湖金鼎湖為五魏韋昭以胥湖蠡湖洮湖滆湖與太湖為五吳虞翻云水通五道謂之五湖其地跨蘇常嘉湖四府界下江兵漢書是時南郡張霸江夏羊牧王匡等起雲杜緑林號曰下江兵衆皆萬餘人蘭陵鎮一統志蘭陵城在常州府城北八十里萬嵗鎮西南富春郭漢書地理志㑹稽郡有富春縣水經注浙江又東北入富陽縣故富春也晉后名春改曰富陽也謝靈運詩宵濟魚浦潭旦及富春郭石頭城丹陽記石頭城吳時悉土塢義熙初始加磚纍甓因山以為城因江以為池地形險固尤有竒勢亦謂之石首城也伏韜北征記石頭城建康西界臨江城也元和郡縣志石頭城在上元縣西四里即楚之金陵城也吳改為石頭城建安十六年吳大帝修築以置財寶軍器有戍吳都賦云戎車盈於石城是也諸葛云鍾山龍盤石城虎踞言其形之險固也太平寰宇記石頭城楚威王滅越置金陵邑即此城也後漢建安十七年吳大帝乃加修理改名石頭城用貯軍糧器械諸葛亮曾使建業謂大帝曰鍾山龍盤石城虎踞即此也周郎吳志周瑜時年二十四吳中皆呼為周郎陸弟陸弟謂陸機之弟陸雲前溪樂府古題要解前溪歌晉車騎將軍沈珫所造舞曲也白紵晉書白紵舞按舞辭有巾袍之言紵本吳地所出宜是吳舞也晉俳歌又云皎皎白紵節節為雙吳音呼緒為紵疑白紵即白緒也曲几晉書王羲之嘗詣門生家見棐几滑淨因書之真草相半後為其父誤刮去之門生驚懊者纍日賭墅晉書謝安命駕出游山墅親朋畢集方與𤣥圍碁賭别墅外臺漢官儀尚書為中臺御史為憲臺謁者為外臺裴松之三國志注蘭臺為外臺祕書為內閣杜氏通典或謂州府為外臺夫君楚辭思夫君兮太息席上珍禮記儒有席上之珍以待聘臺閣後漢書仲長統傳雖置三公事歸臺閣章懷太子注臺閣謂尚書也三語晉書阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語椽第一人南史謝琨風華為江左第一同比部楊員外十五夜游有懷靜者季承明少休沐明顧元緯本作恩誤建禮省文書夜漏行人息歸鞍落日餘豈知三五夕豈顧元緯本凌本俱作懸萬户千門闢夜出曙翻歸傾城滿南陌陌頭馳騁盡繁華王孫公子五侯家由來月明如白日共道春燈勝百花聊看侍中干寶騎强識小婦七香車香車寶馬共喧闐箇裏多情俠少年競向長楊栁市北肯過精舍竹林前獨有仙郎心寂寞却將宴坐為行樂倘覓忘懷共往來覔顧元緯本凌本俱作覺幸霑同舍甘藜藿比部唐六典刑部有比部員外郎一人從六品上建禮宋書漢尚書寺居建禮門內漢官儀尚書郎主作文書起草晝夜更直五日于建禮門內三五夕謝靈運詩期在三五夕李善注三五謂十五日也五侯漢書元后傳河平二年上悉封舅談為平阿侯商成都侯立紅陽侯根曲陽候逢時髙平侯五人同日封故世謂之五侯侍中史記留侯子張辟疆為侍中應劭曰入侍天子故曰侍中後漢書侍中比二千石無員常侍左右贊導衆事顧問應對唐書百官志門下省有侍中二人正二品此詩所謂侍中者乃天子近臣猶史記所謂侍中非唐時門下省之侍中也寶騎駱賔王詩寶騎連花鐡作錢香輪騖水珠為網長楊三輔黃圖長楊宫在今盩厔縣東南三十里本秦舊宫至漢修飾之以備行幸宫中有垂楊數畝因為宫名栁市漢書萬章字子夏長安人也長安熾盛街閭各有豪俠章在城西栁市師古曰漢宫闕疏云細栁倉有栁市精舍成按精舍本為講讀之地後漢書劉淑傳遂隱居立精舍講授諸生常數百人檀敷傳立精舍教授遠方至者常數百人包咸傳因住東海立精舍講授李充傳立精舍講授裴松之三國志注魏武故事曰于譙東五十里築精舍欲秋夏讀書冬春射獵又江表傳曰時有道士琅邪于吉先寓居東方往來吳㑹立精舍燒香讀道書李善文選注精舍今讀書齊是也自晉孝武帝太元六年初奉佛法立精舍於殿內引諸沙門居之因此世俗謂佛寺為精舍翻譯名義或名僧坊者别屋謂之坊也或名精舍者釋迦譜云息心所栖故曰精舍靈裕寺誥曰非粗暴者所居故云精舍藝文類集云非由其舍精妙良由精練行者所居也涅槃經今在此間王舍大城住迦蘭他竹林精舍宋書戴顒傳黃鵠山北有竹林精舍林澗甚美顒憩於此澗宴坐維摩詰經舍利弗白佛言憶念我昔曽於林中宴坐樹下釋氏要覽宴坐又作燕坐宴安也安息貌也行樂漢書人生行樂耳同舍漢書直不疑為郎其同舍有告歸誤將持其同舍郎金去藜藿史記糲梁之食藜藿之羮正義曰藜似藿而表赤藿豆葉也故人張諲工詩善易卜兼能丹青草隸頃以詩見贈聊獲酬之酬唐詩正音作答不逐城東游俠兒隱囊紗帽坐彈碁蜀中夫子時開卦洛下書生解詠詩書一作諸藥欄花徑衡門裏時復據梧聊隱几屏風誤㸃惑孫郎團扇草書輕內史輕凌本作驚故園髙枕度三春永日垂帷絶四鄰自想蔡雍今已老想文苑英華作惜更將書籍與何人張諲張彥遠名畫記張諲官至刑部員外郎明易象善草隸工丹青與王維李頎等為詩酒丹青之友尤善畫山水王維答詩曰屏風誤㸃惑孫郎團扇草書輕內史李頎詩曰小王破體閒文䇿落日梨花照空壁詩堪記室妒風流畫與將軍作徑敵隱囊顔氏家訓梁朝全盛之時貴游子弟無不熏衣剃面敷粉施朱駕長簷車跟髙齒屐坐碁子方褥馮班絲隱囊紗帽中華古今注武德九年十一月太宗詔曰自今以後天子服烏紗帽百官士庶皆同服之彈碁西京雜記成帝好蹴踘羣臣以蹴踘為勞體非至尊所冝帝曰朕好之可擇似而不勞者奏之家君作彈碁以獻帝大悅後漢書梁冀能挽滿彈碁章懷太子注藝經曰彈碁兩人對局白黑碁各六枚先列碁相當更相彈也其局以石為之夢溪筆談西京雜記云漢成帝好蹴踘羣臣以蹴踘為勞求相類而不勞者遂為彈碁之戲子觀彈碁絶不類蹴踘頗與擊踘相近疑是傳寫誤耳唐薛嵩好蹴踘劉綱勸止之曰為樂甚衆何必乘危邀頃刻之歡此亦擊踘唐書誤述為蹴踘彈碁今人罕為之有譜一卷蓋唐人所為碁局方二尺中心髙如覆盂其巔為小壺四角微隆起今大名開元寺佛殿上有一石局亦唐時物也李商隱詩曰玉作彈碁局中心最不平謂其中髙也白樂天詩曰彈碁局上事最妙是長斜長斜謂抹角斜彈一發過半局今譜中具有此法栁子厚敘碁用二十四碁者即此戲也漢書注云兩人對局黑白子各六枚與子厚所記小異蜀中夫子髙士傳嚴遵字君平蜀人也隱居不仕嘗賣卜於成都市日得百錢以自給卜訖則間肆下簾以著書為事鮑照詩君平因世閒得還守寂寞閉簾注道德開卦述天爵洛下書生晉書謝安能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗能及或手掩鼻以效之世說人問顧長康何以不作洛生詠答曰何至作老婢聲劉孝標注洛下書生詠音重濁故云老婢聲藥欄李濟翁資暇録今園庭中藥欄欄即藥藥即欄猶言圍援非花藥之欄也有不悟者以為藤架疏圃可作切對是不知其由來矣按漢宣帝詔曰池藥未御幸者假與貧民蘇林注云以竹繩連綿為禁藥使人不得往來爾漢書闌入宫禁字多作草下闌則藥欄作藥蘭尤分明易悟也成考宣帝紀乃是池篽非池藥不得據此為證梁庾肩吾詩向嶺分花徑隨階轉藥欄以花徑對藥欄其義顯然又唐岑參詩亦有澗水吞樵路山花醉藥欄之句與庾義不相逺正不必過為創異之解也據梧莊子倚樹而吟據槁梧而瞑郭象注行則倚樹而吟坐則據梧而睡隱几莊子南郭子綦隱几而坐陸德明注隱憑也誤㸃歷代名畫記曹不興吳興人也孫權使畫屏風誤落筆㸃素因就成蠅狀權疑其真以手彈之內史晉書王羲之為右軍將軍㑹稽內史嘗在蕺山見一老姥持六角竹扇賣之羲之書其扇各為五字姥初有愠色因謂姥曰但言是王右軍書以求百錢耶姥如其言人競買之白氏六帖王右軍草書於團扇蔡雍魏志王粲徙長安左中郎將蔡雍見而竒之時雍才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之粲至年既幼弱容狀短小一坐盡驚雍曰此王公孫也有異才吾不如也吾家書籍文章盡當與之答張五弟終南有茅屋前對終南山終年無客長閉關終日無心長自閒不妨飲酒復垂釣君但能來相往還相顧可久本作且贈吳官長安客舍熱如煮無箇茗糜難御暑箇一作過空搖白團其諦苦疑有訛字欲向縹囊還歸旅江鄉鯖鮓不寄來秦人湯餅那堪許不如儂家任挑達草屩撈蝦富春渚撈劉本顧可久夲俱作蟧誤如煮釋名暑煮也熱如煮物也茗糜傅咸司隸教聞南市有蜀嫗作茶粥賣之廉士打破其器具使無為唐儲光羲有喫茗粥詩白團晉書王珉好捉白團扇吳均詩羃䍥懸丹鳳逶迤搖白團諦苦涅槃經何謂苦諦有八苦故名曰苦諦縹囊隋書經籍志盛以縹囊書用湘素昭明太子文選序詞人才子則名溢於縹囊飛文染翰則卷盈於緗帙吕向注縹青白色囊有底袋也用以盛書鯖鮓南齊書虞悰傳乃獻醒酒鯖鮓一方而已湯餅荆楚嵗時記六月伏日並作湯餅名為辟惡按魏氏春秋何晏以伏日食湯餅取巾拭汗面色皎然乃知非傅粉則伏日湯餅自魏以來有之草屩梁書何㸃傳或駕柴車躡草屩恣心所適致醉而歸富春渚謝靈運有富春渚詩吕延濟注富春渚在錢塘江上任昉詩朝發富春渚吕向注富春縣名渚水曲也雪中憶李揖積雪滿阡陌故人不可期長安千門復萬户何處蹀躞黃金羈蹀躞吳均詩蹀躞青驪馬韻㑹蹀躞行貌黃金羈吳均詩白馬黃金羈青驪紫絲鞚送崔五太守長安廄吏來到門朱文露網動行軒朱文一作未央誤黃花縣西九折坂玉樹宫南五丈原褒斜谷中不容幰惟有白雲當露冕子午山裏杜鵑啼嘉陵水頭行客飯劍門忽斷蜀川開萬井雙流滿眼來霧中逺樹刀州出天際澄江巴字回使君年幾三十餘幾唐詩正音作紀少年白晳專城居欲持畫省郎官筆筆一作草回與臨卭父老書長安廄吏漢書朱買臣拜㑹稽太守長安廄吏乘駟馬車來迎買臣遂乘傳去張晏注故事大夫乘官車駕駟如今州牧刺史矣朱文後漢書王龔傳柱下無朱文之軫也章懷太子注朱文畫車為文也黃花縣太平寰宇記廢黃花縣在鳳州北六十里本漢故道縣地唐武德元年分梁泉縣置東有黃花川因名之寶厯元年以其地併入梁泉九折坂漢書琅邪王陽為益州刺史行部至卭郲九折坂嘆曰奉先人遺體奈何數乘此險應劭注九折坂在蜀郡嚴道縣水經注邛崍山在漢嘉嚴道縣一曰新道山南有九折坂夏則凝氷冬則毒寒王子陽按轡處也方輿勝覽九折坂在邛崍山其坂阻峻曲回九折乃至山上玉樹宫三輔黃圖甘泉宫北岸有槐樹今謂玉樹根幹盤峙三二百年木也楊震關輔古語云耆老相傳咸以為此樹即楊雄甘泉賦所謂玉樹青葱也五丈原水經注斜水徑五丈原東諸葛亮與步隲書曰僕前軍在五丈原原在武功西十里元和郡縣志五丈原在鳳翔府郿縣西南一十五里褒斜谷括地志褒斜二谷名在漢中郡褒城縣北五十里南谷曰褒北谷曰斜長四百七十里同為一谷方輿勝覽鳳州之東興元之西褒斜谷在焉谷口三山翼然對峙南曰褒北曰斜在唐為驛路所以通巴漢不容幰庾肩吾詩長安有曲陌曲陌不容幰說文幰車幔也子午谷顔師古漢書注京城直南山有谷通梁漢道名子午谷一統志子午谷在西安府城南一百里谷中路通南北故名杜鵑啼埤雅杜鵑一名子規苦啼啼血不止一名怨鳥夜啼達旦血漬草木凡始鳴皆北向啼苦則倒懸於樹說文所謂蜀主望帝化為子巂今謂之子規是也嘉陵水水經注漢水又南入嘉陵道而為嘉陵水然世俗名之為皆陵水非也太平寰宇記嘉陵江自鳳州大散關發源從利州下流入劍州劍門縣界一統志嘉陵江在漢中府略陽縣治西南源出鳳縣東大散關歷兩當略陽㑹東谷等水流經四川利閬合州至重慶府入大江劍門唐六典注劍閣在劍州普安縣界今謂之劍門太平寰宇記劍門縣本漢梓潼縣地諸葛武侯相蜀於此立劍門以大劍山至此有隘束之路故曰劍門姜維距鍾㑹於此蜀川杜氏通典今蜀郡濛陽唐安臨邛盧山等郡亦曰蜀川萬井漢書一同百里提封萬井雙流左思蜀都賦帶二江之雙流劉淵林注江水出岷山分為二江經成都東南流經之故曰帶也水經注成都縣有二江雙流其下故揚子雲蜀都賦云兩江珥其前者也太平寰宇記秦李氷穿二江於成都城中皆可行舟今謂內江外江是也刀州晉書王濬夜夢懸三刀於卧屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎果遷益州刺史唐人以蜀地為刀州本此如姚合詩云東川橫劍閣南斗近刀州武元衡詩云錦谷嵐烟裏刀州晚照西又云刀州城北劍山東甲士屯雲騎散風岑參李逺李端雍陶集中皆有之並用王濬事也巴字三巴記閬白二水東南流曲折三回如巴字文獻通考巴江自古集來派於巴州郡治之右狀如巴字又曰字江方輿勝覽輿地廣記巴峽水屈曲成巴字或云江分三流中有小流橫貫成巴字故以為名白晳左傳有君子白晳鬒鬚眉甚口漢書霍光白晳疏眉目美鬚髯師古注晳潔白也專城居陌上桑古辭三十侍中郎四十專城居為人潔白晳鬑鬑頗有鬚潘嶽馬汧督誄剖符專城紆青拖墨之司張銑注專擅也謂擅一城也謂守宰之屬畫省杜氏通典尚書郎奏事明光殿省省中皆以胡粉塗壁畫古賢烈女郎官筆宋書百官志漢官云尚書丞郎月賜赤管大筆一雙隃糜墨一丸臨卭漢書司馬相如傳蜀長老多言通西南夷之不為用大臣亦以為然相如欲諫業已建之不敢乃著書藉蜀父老為辭而已詰難之以風天子且因宣其使指令百姓皆知天子意送李睢陽將置酒思悲翁使君去出城東麥漸漸雉子斑槐隂隂到潼關騎連連車遲遲遲遲顧元緯本作遙遙心中悲宋又遠周間之南淮夷東齊兒碎碎織練與素絲遊人賈客信難持五穀前熟方可為下車閉閣君當思天子當殿儼衣裳太官尚食陳羽觴彤庭散綬垂鳴璫黃紙詔書出東廂輕紈疊綺爛生光宗室子弟君最賢分憂當為百辟先布衣一言相為死何况聖主恩如天鸞聲噦噦魯侯旗明年上計朝京師須憶今日斗酒别慎勿富貴忘我為李睢陽唐書李峘性質厚歷宦有美名以王孫封趙國公楊國忠亂政悉斥不附已者峘由考功郎中拜睢陽太守將進酒思悲翁宋書漢鼓吹鐃歌十八曲有思悲翁曲將進酒曲麥漸漸潘嶽射雉賦麥漸漸以擢芒雉鷕鷕而朝雊徐爰注漸漸含秀之貌也雉子斑宋書漢鼓吹鐃歌十八曲有雉子斑此借用其字宋周睢陽本春秋時宋地與東周洛陽接壤按杜氏通典睢陽郡東至彭城郡西界二百十里西南到淮陽郡二百八十里去東京七百八十里淮夷睢陽之南則淮海孔穎達毛詩正義禹貢徐州淮夷蠙珠則淮夷在徐州也齊兒睢陽之東則古齊地漢書朱博傳觀齊兒欲以此為俗耶下車漢書班伯為定襄太守定襄聞伯素貴年少自請治劇畏其下車作威吏民竦息右丞作苖公德政碑云或閉閣思政或下車作威政用其事此詩以下車閉閣連用亦與碑文同意然祗用下車二字似歇後語也閉閣漢書韓延夀為左馮翊行縣至髙陵民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥咎在馮翊當先退是日移病不聽事因入卧傳舍閉閣思過於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭後漢書吳祐遷膠東侯相政惟仁簡以身率物民有爭欣者輒閉閣自責然後斷其訟以道譬之太官漢書少府屬官有太官師古注太官主膳食後漢書百官志太官令一人六百石掌御飲食唐六典太官署令二人從七品下丞四人從八品下監膳十人從九品下監膳史十五人供膳二千四百人太官令掌供膳之事丞為之二凡朝㑹燕饗九品以上並供其膳食尚食唐六典尚食局奉御二人正五品下直長五人正七品上掌供天子之常膳隨四時之禁適五味之宜當進食必先嘗凡元正冬至大朝㑹饗百官與光祿視其品秩分其等差而供焉其賜王公已下及外方賓客亦如之羽觴楚辭瑤漿蜜勺實羽觴些王逸注羽翠羽也劉良注觴酒器也插羽於上也班婕妤賦酌羽觴兮銷憂師古曰酒行疾如羽也孟康曰羽觴爵也作生爵形有頭尾羽翼如淳曰以玳瑁覆翠羽於下徹上見張衡西京賦羽觴行而無算劉良注羽觴杯上綴羽以速飲也陸機詩羽觴不可算吕延濟注羽觴置鳥羽於杯以急飲也諸家之說不同劉與吕皆屬不經如淳尤謬惟孟解為優黃紙詔書梁簡文帝謝啓黃紙詔書先開泉府石林燕語唐中書制詔有四封拜册書用簡以竹為之畫旨而施行者曰發曰敕用黃麻紙承旨而行者曰敕牒用黃藤紙赦書皆用絹黃紙始貞觀間或曰取不蠧也演繁露石林言制敕用黃紙始髙宗時非也晉恭帝時王韶之遷黃門侍郎凡諸詔黃皆其辭也則東晉時已用黃紙寫詔矣成按魏志劉放傳即以黃紙授放作詔世說元帝默然無言乃探懷中黃紙詔裂擲之又云明帝還內作手詔滿一黃紙云云則魏晉時已用黃紙又不始於恭帝時矣及考春明退朝録唐日厯貞觀十年十月詔始用黃麻紙寫敕上元三年閏三月戊子敕制敕施行既為永式比用白紙多有蟲蠧自今以後尚書省頒下諸司及州下縣並用黃紙則是貞觀前久用黃紙寫詔但尚書所頒及州府所用尚是白紙後乃改用黃耳東廂漢書吕后側耳於東廂聽師古曰東廂正寢之東西室皆曰廂言似廂篋之形張衡東京賦下雕輦於東廂薛綜注殿東西次為廂雍録正殿兩旁有室即廂也車之有廂亦其義也宗室按唐書李峘乃太宗第三子吳王恪之曾孫恪第三子琨之孫禕之子分憂晉書宣帝紀天子南巡觀兵吳疆帝留鎮許昌改封向亭侯轉撫軍假節領兵五千加給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寧息此非以為榮乃分憂耳百辟詩百辟卿士媚於天子鸞聲詩魯侯戾止言觀其旗其旗茷茷鸞聲噦噦上計賈公彥周禮疏漢之朝集使謂之上計吏謂上一年計㑹文書及功狀也後漢書百官志凡郡國皆掌治民進賢勸功決訟檢姧嵗盡遣吏上計忘我為古扊扅歌今日富貴忘我為寒食城東即事清溪一道穿桃李演漾緑蒲涵白芷溪上人家凡幾家落花半落東流水半顧可久本作共蹴踘屢過飛鳥上鞦韆競出垂楊裏少年分日作遨遊不用清明兼上已白芷爾雅翼白芷出近道下濕地處處有之可作面脂其葉名蒿麻可用沐浴蹴踘史記索隱鞠戲以皮為之中實以毛蹴踏為戲也荆楚嵗時記按劉向别録曰蹴踘黃帝所造本兵勢也或云起於戰國按鞠與毬同古人踏蹴以為戲也鞦韆劉孝孫事原古今藝術圖云鞦韆北方戎狄愛習輕趫之戲每至寒食為之中國女子學之乃以綵繩懸樹立架為之韻會鞦韆繩戲北方山戎以習輕趫者復古編云詞人髙無際作鞦韆賦漢武後庭之戲本云千秋祝壽詞也後訛為秋千又為鞦韆上已鄭康成周禮注嵗時祓除如今三月上已如水上之類賈公彥疏一月有三巳據上旬之已而為祓除之事見今三月三日水上戒浴是也後漢書禮儀志三月上已官民皆潔於東流水上曰洗濯祓除去宿垢疢為大潔潔者言陽氣布暢萬物訖出始潔之矣劉昭注謂之禊也風俗通曰周禮女巫掌嵗時以祓除疾病禊者潔也春者蠢也蠢搖動也尚書以殷仲春厥民析言人解析也蔡雍曰論語暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸自上及下古有此禮今三月上巳祓禊於水濱蓋出於此杜篤祓禊賦曰巫咸之徒秉火祈福則巫祝也一說云後漢有郭虞者三月上已産二女二日中並不育俗以為大忌至此月日諱止家皆於東流水上為祈禳自潔濯謂之禊祠引流行觴遂成曲水韓詩曰鄭國之俗三月上巳溱洧兩水之上招魂續魄秉蘭草祓除不祥漢書八月祓灞水亦斯義也後之良史亦據為正臣昭曰郭虞之說良為虛誕假有庶民旬內夭其二女何足驚彼風俗稱為世忌乎杜篤乃稱王侯公主暨於富商用事伊洛帷幔𤣥黃本傳大將軍梁商亦歌泣於洛禊也自魏不復用三日水宴者焉歐陽永叔作浣溪沙詞有云緑楊樓外出秋千朝無咎深美之以為出字後人道不到讀右丞競出垂楊之句則歐公又落第二義矣不遇詠北闕獻書寢不報南山種田時不登百人㑹中身不預五侯門前心不能身投河朔飲君酒家在茂陵平安否且共登山復臨水共顧元緯本作此莫問春風動楊栁今人作人多自私作顧元本作晚緯我心不說君應知濟人然後拂衣去肯作徒爾一男兒不報漢書朱買臣至長安詣闕上書書久不報不登禮記嵗凶年穀不登鄭康成注登成也百人㑹世說孝武在西堂㑹伏滔預坐還下車呼其兒語之曰百人髙㑹臨坐未得他語先問伏滔何在在此否此故未易得為人作父如此何如五侯門漢書王氏方盛賓客滿門五候兄弟爭名其客各有所厚不得左右唯樓護盡入其門咸得其歡心河朔初學記魏文帝典論曰大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲王右丞集箋注卷六
