body:
  text: 王右丞集箋注卷七仁和趙殿成撰近體詩三十九首奉和聖製賜史供奉曲江宴應制侍從有鄒枚瓊筵就水開就唐詩品彚作向言陪柏梁宴新下建章來下文苑英華作自對酒山河滿移舟草樹回天文同麗日駐景惜行杯供奉唐書𤣥宗以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書敕開元二十六年又改翰林供奉為學士别置學士院専掌內命曲江康駢劇談録曲江池本秦世隑洲開元中疏鑿遂為勝景其南有紫雲樓芙蓉苑其西有杏園慈思寺花卉環周烟水明媚都人游玩盛於中和上已之節綵幄翠幬匝於隄岸鮮車健馬比肩擊轂上巳即宴賜臣僚京兆府大陳筵席長安萬年兩縣以雄盛相較錦繡珍玩無所不施百辟㑹於山亭恩賜太常及教坊聲樂池中備綵舟數隻惟宰相三使北省官與翰林學士登焉每嵗傾動皇州以為盛觀入夏則菰蒲葱翠栁隂四合碧波紅渠湛然可愛好事者賞芳辰玩清景聮騎攜觴亹亹不絶長安志升道坊龍華尼寺南有流水屈曲謂之曲江其深處下不見底司馬相如賦云臨曲江之隑州蓋其所也雍録唐曲江本秦隑州至漢為宣帝樂游廟亦名樂游苑亦名樂游原基地最髙四望寬厰隋營京城宇文愷以其地在京城東南隅地高不便故闕此地不為居人坊巷而鑿之為池以厭勝之又㑹黃渠水自城外南來可以穿城而入故隋世遂從城外包之入城為芙蓉池且為芙蓉園也長安中太平公主於原上置亭游賞後賜寧申岐薛王正月晦日三月三日九月九日京城士女咸即此祓禊帟幕雲布車馬填塞詞人樂飲歌詩漢武帝時池周圍六里餘唐周七里占地三十頃又加展拓矣地在城東南升道坊龍華寺之南侍從班固西都賦言語侍從之臣鄒枚鄒陽枚乘也水經注梁王與鄒枚司馬相如之徒極游於其上柏梁宴三輔黃圖柏梁臺武帝元鼎二年春起此臺在長安城中北闕內三輔舊事云以香柏為梁也帝嘗置酒其上詔羣臣和詩能七言詩者乃得上建章三輔黃圖建章宫在未央宫西長安城外麗日庾信詩朱簾捲麗日翠幕蔽重陽從岐王過楊氏别業應教楊子談經所所文苑英華唐詩正音唐詩品彚俱作處萬首唐人絶句樂府詩集俱作去淮王載酒過興闌啼鳥換興闌萬首唐人絶句作醉來換唐詩正音唐詩品彚俱作緩坐久落花多徑轉回銀燭林開散玉珂嚴城時未啓前路擁笙歌擁一作引作郭茂倩樂府採首四句入近代曲辭題崑崙子萬首唐人絶句亦同岐王劉昫唐書惠文太子範睿宗第四子也初封鄭王尋改封衛王長夀二年隨例却入閣徙封巴陵郡王睿宗踐祚改封岐王開元初拜太子少師帶本官厯綘鄭岐三州刺史八年遷太子太傅範好學工書雅愛文章之士士無貴賤皆盡禮接待與閻朝隱劉庭琦張諤酈繇篇題唱和又多聚書畫古跡為時所稱應教魏晉以來人臣於文字間有屬和於天子曰應詔於太子曰應令於諸王曰應教淮王漢書淮南王安好學術折節下士招致英雋以百數載酒漢書揚雄家素貪嗜酒人希至其門時有好事者載酒肴從游學玉珂張華詩文軒樹羽蓋乘馬鳴玉珂嚴城何遜詩禁門儼猶閉嚴城方警夜艇齊詩話前人詩言落花有思致者三王維興闌啼鳥換坐久落花多李嘉祐細雨濕衣看不見閒花落地聽無聲荆公細數落花應坐久緩尋芳草得歸遲從岐王夜宴衛家山池應教座客香貂滿宫娃綺幔張澗花輕粉色山月少燈光少文苑英華作吐非積翠紗窗暗暗文苑英華作透飛泉繡戶凉還將歌舞出歸路莫愁長香貂江總詩杳貂拜黻衮花綬拂元除綺幔司馬相如長門賦張羅綺之幔帷兮大般若經張以綺幔內施珠帳和尹諫議史館山池尹文苑英華作伊非雲館接天居雲一作靈霓裳侍玉除春池百子外子一作草非芳樹萬年餘洞有仙人籙山藏太史書君恩深漢帝且莫上空虛空一作雲尹諫議劉昫唐書開元二十五年道士尹愔為諫議大夫集賢學士兼知史館事宋祁唐書尹愔秦州天水又博學尤通老子書初為道士𤣥宗尚𤣥言有薦愔者召對喜甚厚禮之拜諫議大夫集賢院學士兼修國史固辭不起有詔以道士服視事乃就職専領集賢史館圖書開元末卒史館長安志史館在門下省北貞觀三年置祕書內省以修五代史又置史館以編國史雲館左思吳都賦虹霓回帶於雲館天居鮑照詩層閣肅天居霓裳楚辭青雲衣兮白霓裳玉除曹植詩凝霜依玉除李善注玉除階也說文曰除殿階也百子池西京雜記戚夫人侍兒賈佩蘭說在宫內時常以七月七日臨百子池作于闐樂萬年樹西京雜記初修上林苑羣臣逺方各獻名果異樹亦有製為美名以標竒異中有千年長生樹十秼萬年長生樹十株仙人籙隋書經籍志道經受道之法初受五千文籙次受三洞籙次受洞元籙次受上清籙籙皆素書紀諸天曹官屬佐吏之名有多少又有諸符錯在其間文章詭怪世所不識受者必先潔齊然後齎金環一并諸贄幣以見於師師受其贄以籙授之仍剖金環各持其半云以為約弟子得籙緘而佩之陳子昂詩鳯藴仙人籙鸞歌素女琴太史書史記太史公自序略以拾遺補藝成一家之言厥協六經異傳整齊百家雜語藏之名山副在京師上空虛葛洪神仙傳河上公者莫知其姓字漢文帝時公結草為庵於河之濵帝讀老子經頗好之有所不解數事時人莫能道之聞時皆稱河上公解老子經義㫖乃使齎所不決之事以問公曰道尊德貴非可遙問也帝即幸其庵躬問之帝曰子雖有道猶朕民也不能自屈何乃髙乎公即撫掌坐躍冉冉在虛中去地數丈俯仰而答曰余上不知天中不纍人下不居地何臣民之有帝乃下車稽首曰朕以不德忝統先業才小任大憂於不堪雖治世事而心敬道直以暗昧多所不了惟願道君有以教之公乃授素書二卷與帝曰熟研之此經所疑皆了不事多言也余注此經以來一千七百餘年凡傳三人連子四矣勿以示非其人言畢失其所在同崔員外秋宵寓直同文苑英華作和建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月迥藏珠斗雲消出絳河消文苑英華作開更慚衰朽質南陌共鳴珂寓直成按潘嶽秋興賦序云豫春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直於散騎之省本以虎賁中郎將無省故寄直於散騎省耳後人則以直宿禁中為寓直矣曙鐘庾肩吾詩風長曙鐘近地迥洛城遙珠斗謂斗星相貫如珠絳河初學記天河亦曰絳河奉和楊駙馬六郎秋夜即事髙樓月似霜秋夜鬱金堂對坐彈盧女同看舞鳯凰少兒多送酒小玉更焚香結束平陽騎明朝入建章楊駙馬按唐書公主列傳𤣥宗二十九女駙馬楊姓者凡七人未知孰是月似霜梁元帝詩𤣥兔城前月似霜鬱金堂沈佺期詩盧家少婦鬱金堂舞鳯凰張衡東京賦鳴女牀之鸞鳥舞丹穴之鳯凰少兒漢書陽信長公主家僮衛媪長女君孺次女少兒次女則子夫小玉鮑令暉有代葛沙門妻郭小玉作二首又白居易詩吳妖小玉飛作烟自注云夫差女小玉死後形見於王其母抱之霏微若烟霧散空然觀元微之詩小玉上牀鋪夜衾李長吉詩小玉開屏見山色與右丞同意俱作侍貌解末詳平陽騎史記大將軍衛青者平陽人也其父鄭季為吏給事平陽侯家與侯妾衛媪通生青青壯為侯家騎從平陽主建元二年春青姊子夫得入宫幸上乃召青為建章監侍中成按漢書少兒初與霍仲孺通生去病後更為詹事陳掌妻衛青初為平陽侯家騎後青尊貴而平陽侯曹夀有惡疾就國上詔青尚平陽主皆非駙馬家美事而右丞用之蓋唐時引事初無顧忌若此也酬虞部蘇員外過藍田别業不見留之作貧居依谷口喬木帶荒村石路枉回駕山家誰候門漁舟膠凍浦獵火燒寒原燒一作繞惟有白雲外疏鐘聞夜猿聞字疑是間字之訛虞部劉昫唐書職官志工部有虞部員外郎一員從六品上藍田别業一統志輞川别業在西安府藍田縣西南輞谷唐王維置别業於此酬比部楊員外暮宿琴臺朝躋書閣率爾見贈之作臺凌本文苑英華俱作堂一作盧照鄰詩舊簡拂塵看鳴琴候月彈候文苑英華作俟桃源迷漢姓源一作花松樹有秦官樹顧元緯本凌本俱作徑空谷歸人少青山背日寒羡君棲隱處遙望白雲端秦官藝文類聚漢官儀曰秦始皇上封泰山逢疾風暴雨賴得松樹因覆其下封為五大夫初學記小天門有秦時五大夫松見在酬嚴少尹徐舍人見過不遇公門暇日少窮巷故人稀偶值乘籃輿非關避白衣不知炊黍谷誰解掃荆扉君但傾茶碗無妨騎馬歸少尹唐六典京兆河南太原府尹一人從三品少尹二人從四品下公門東觀漢紀吳漢南陽人鄧禹及諸將多薦舉者再三召見其後勤勤不離公門籃輿晉書陶潛傳刺史王𢎞以元熙中臨州甚欽遲之後自造焉潛稱疾不見𢎞每令人候之密知當往廬山乃遣其故人龎通之等齎酒先於半道邀之潛既遇酒便引酌野亭欣然忘進𢎞乃出與相聞遂欣宴窮日𢎞要之還州問其所乘答曰素有腳疾向乘籃輿亦足自反乃令一門生二兒共輿之至州而言笑賞適不覺有羡於華軒也炊黍裴松之三國志注沐並字德信河間人始為名吏有志介嘗過姊姊為殺雞炊黍而不留也慕容承攜素饌見過紗帽烏皮几閒居懶賦詩門看五栁識年算六身知靈夀君王賜雕胡弟子炊空勞酒食饌特底解人頤烏皮几謝朓有同詠座上玩器得烏皮隱几詩六身左傳晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六句也正義云二畫為首六畫為身下首之二畫並之使如其身旁則是生來日數也因亥畫似算位故假之以為言靈夀漢書孔光傳賜太師靈夀杖孟康注扶老杖也服䖍注靈夀木名師古注木似竹有枝節長不過八九尺圍三四寸自然有合杖制不須削治也解人頤漢書無說詩匡鼎來匡說詩解人頤如淳注解頤使人笑不能止也酬慕容上一作酬慕容十一行行西陌返駐幰問車公幰劉本顧可久本俱作爐非挾轂雙官騎應門五尺僮老年如塞北强起離牆東為報壺丘子來人道姓䝉姓字疑是住字之訛車公杜氏通典車引為桓溫治中有㑹不同溫輒云無車公不樂官騎後漢書將軍賜官騎十人晉書王祥傳置官騎二十人應門晉書李密傳內無應門五尺之童壺丘子髙士傳壺丘子林者鄭人也道法甚優列禦冦師事之酬張少府晚年惟好靜年一作來萬事不關心自顧無長䇿長一作良空知返舊林知文苑英華作如松風吹解帶山月照彈琴君問窮通理君一作若漁歌入浦深喜祖三至留宿門前洛陽客下馬拂征衣不枉故人駕平生多掩扉行人返深巷積雪帶餘暉早嵗同袍者髙車何處歸答王維留宿祖詠四年不相見相見復何為握手言未畢却令傷别離升堂還駐馬酌醴便呼兒語默自相對安用傍人知酬賀四贈葛巾之作野巾傳惠好兹貺重兼金嘉此幽棲物能齊隱吏心齊凌本作高早朝方暫挂晚沐復來簪復凌本作更坐覺囂塵逺思君共入林兼金趙岐孟子注兼金好金也其價兼倍於常者故謂之兼金江淹詩承榮重兼金晚沐沈約詩晨趨游建禮晚沐卧郊園李善注沐休沐也入林世說謝公道豫章若遇七賢必自把臂入林寄荆州張丞相所思竟何在悵望深荆門舉世無相識終身思舊恩方將與農圃藝植老丘園目盡南飛鳥飛鳥顧元緯本凌本俱作無雁何由寄一言張丞相劉昫唐書開元二十五年監察御史周子諒上書忤㫖㩧之殿庭朝堂決杖死之尚書右丞相張九齡以曾薦引子諒左授荆州長史所思竟何在沈約臨髙臺詩云所思竟何在洛陽南陌頭劉孝綽櫂歌行云所思竟何在相望徒盈盈首聨全學其句荆門盛宏之荆州記郡西沂江六十里南岸有山名曰荆門北岸有山名曰虎牙二山相對楚之西塞也虎牙石壁紅色間有白文如牙齒狀荆門上合下開開達山南有門形故因以為名然唐人多呼荆州為荆門文人稱謂如此不僅指荆門一山矣輞川閒居贈裴秀才迪寒山轉蒼翠轉顧可久本作積秋水日潺湲倚杖柴門外臨風聽暮蟬渡頭餘落日墟里上孤烟復值接輿醉狂歌五柳前輞川李肇國史補王維好釋氏故字摩詰立性髙致得宋之問輞川别業山水絶勝今清源寺是也雍録輞川在藍田縣西南二十里王維别墅在焉本宋之問别圃也陜西通志輞川在藍田縣南嶢山之口去縣八里川口為兩山之峽隨山鑿石計五里許路甚險狹過此豁然開朗村墅相望蔚然桑麻肥饒之地四顧山巒掩映似若無路環轉而南凡十三區其美愈竒王摩詰别業在焉有孟城拗華子岡文杏館斤竹嶺二十景維日與裴迪游詠其間舊有輞川圖四幅沈國華摹十二幅舉世寶之墟里陶潛詩曖曖逺人村依依墟里烟冬晚對雪憶胡居士家居一作處詩一作王劭寒更傳曉箭一作寒更催唱曉清鏡覽衰顔覽一作減隔牖風驚竹開門雪滿山門一作簾灑空深巷靜積素廣庭閒借問袁安舍翛然尚閉關袁安汝南先賢傳時大雪積地丈餘洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入户見安僵卧問何以不出安曰大雪人皆餓不冝干人令以為賢舉為孝亷山居秋暝空山新雨後天氣晚來秋明月松間照清泉石上流竹喧歸浣女蓮動下漁舟隨意春芳歇王孫自可流春芳歇劉鑠詩屢見流芳歇王孫楚辭王孫游兮不歸春草生兮萋萋歸嵩山作清山帶長薄清文苑英華作車馬去閒閒流水如有意暮禽相與還禽文苑英華作雲荒城臨古渡落日滿秋山迢遞嵩髙下髙文苑英華作山歸來且閉關閉一作掩嵩山按元和郡縣志嵩髙山在河南府告成縣西北二十三里登封縣北八里亦名外方山東曰太室西曰少室嵩髙總名即中嶽也山髙二十里周回一百三十里長薄陸機君子有所思行曲池何湛湛清川帶華薄又挽歌按轡遵長薄李周輪注草木叢生曰薄歸輞川作谷口疏鐘動漁樵稍欲稀悠然逺山暮獨向白雲歸菱蔓弱難定楊花輕易飛東臯春草色惆悵掩柴扉韋給事山居幽尋得此地幽尋凌本作尋幽詎有一人曾大壑隨階轉羣山入戶登庖㕑出深竹印綬隔垂藤即事辭軒冕誰云病末能山居即事寂寞掩柴扉蒼茫對落暉鶴巢松樹遍樹凌本作徑人訪蓽門稀嫩竹含新粉嫩顧元緯本作緑紅蓮落故衣渡頭燈火起處處採菱歸蒼茫庾信詩日晚荒城上蒼茫餘落暉蓽門左傳蓽門圭竇之人杜預注蓽門柴門也禮記蓽門圭窬鄭康成注蓽門荆竹織門也蓮衣庾信詩蓮浦落紅衣終南山太乙近天都乙一作一連山到海隅山文苑英華作天誤到一作接白雲回望合青靄入看無分野中峰變隂晴衆壑殊欲投人處宿隔水問樵夫水文苑英華作浦題樂府詩集採此詩後四句作一首曰睦州歌第一太乙張衡西京賦於前則終南太乙隆崛崔崒李善注漢書曰太一山古文以為終南五經要義曰太一一名終南山在扶風武功縣此云終南太一不得為一山明矣蓋終南南山之總名太一一山之别號耳潘嶽西征賦亦云靣終南而背雲陽跨平原而連嶓冢九嵕嶻嶭太一巃嵸唐書地理志京兆府武功縣有太乙山髙十八里一統志太乙山在終南山南二十里連亘秀特上插雲霄皆以終南太一為二山也右丞此作則猶以太一為終南之别稱耳青靄江淹詩虛堂起青靄崦嵫生暮霞成按唐詩紀事云或說此詩為議時之作謂太乙望近天都連山接海隅言勢焰盤據朝野也白雲回合青靄入看無言有表而無其內也分野中峰變隂晴衆壑殊言恩澤偏也欲投人處宿隔水問樵夫言畏禍深也其說甚鑿王友琢崕嘗闢之曰詩有二義或寄懷於景物或寓情於諷諭各有指歸乃好事之徒每以附㑹為能無論其詩之為興為賦為比而必曲為之說曰此有為而言也無乃矯誣實甚歟試思此詩右丞自詠終南於人何預而或者云云若是彼飛燕興讒於太白蟄龍騰謗於眉山又何怪焉黃山谷謂杜子美詩妙處乃在無意於文彼喜穿鑿者棄其大㫖取其發興於所遇林泉人物草木蟲魚以為物物皆有所託如世間商度隱語者則子美之詩委地矣斯言也豈僅讀杜者當奉為金科哉琢崕又言首句天都字依淮南子云登太山履石封以望八荒視天都若蓋江河若帶右丞韋氏逍遙谷宴集序云天都近者王官有之韓昌黎烏氏廟碑銘云作廟天都以致其孝皆以天都為帝都之別稱乃或引關中記言終南山在天之中居都之南故曰天都者是失之踳駮矣次句是言其與他山連接不斷直至海隅耳文意極明顯乃或謂終南在陜境去海極遙到海隅者形容之辭如此必指東方之海隅而言則齊魯之間豈有終南之拳石在者是失之拘執矣分野句是極言山之廣大陜志謂終南山西起隴山東踰商洛綿亘千里有餘南北亦然其盤踞不止一州之地則知天之分野亦不専𨽻一舍或謂中峰之北為雍為井鬼中峰之南為梁為翼軫者是失之臆撰矣其討論曲當不事撏扯多此類平日論詩必因其自然之勢而不好為鉤深索隱之言以求茍異於人多與豫見吻合者故集中諸家曲說刋削殆盡洗伐之功實多得其益焉輞川閒居一從歸白社不復到青門時倚簷前樹逺看原上村青菰臨水映映一作拔白鳥向山翻寂寞於陵子桔橰方灌園白社水經注北則白社故里也昔孫子楚㑹董威輦於白社謂此矣太平寰宇記曰社里在洛陽故城建春門東即董威輦舊居之地於陵子髙士傳陳仲子者齊人也其兄戴為齊卿食祿萬鍾仲子以為不義將妻子適楚居於陵自謂於陵仲子楚王聞其賢欲以為相遣使持金百鎰至於陵聘仲子仲子出謝使者逃去為人灌園桔橰韻㑹桔橰汲水機器春園即事宿雨乘輕屐春寒著弊袍開畦分白水間栁發紅桃草際成棋局林端舉桔橰還持鹿皮几日暮隱蓬蒿宿雨江總詩初晴原野開宿雨潤條枚淇上即事田園屏居淇水上東野曠無山日隱桑柘外日隱一作白日河明閭井間牧童望村去獵犬隨人還獵瀛奎律髓作田靜者亦何事荆扉乘晝關與盧象集朱家主人能愛客愛凌本作對終日有逢迎貰得新豐酒復聞秦女筝栁條疏客舍槐葉下秋城語笑且為樂吾將達此生達凌本作適盧象劉禹錫盧象集序尚書郎盧公諱象字緯卿始以章句振起於開元中與王維崔皓比肩驤首鼓行於時妍詞一發樂府傳貴由前進士補祕書省校書郎轉右衛倉曹掾丞相曲江公方執文衡揣摩得進得公深器之擢為左補闕河南府司録司勳員外郎名盛氣髙少所卑下為飛語所中左遷齊汾鄭三郡司馬入為膳部員外郎時大盜起幽陵入洛師中夏衣冠不克歸王所為虜劫執公墮脅從伍中初謫果州長史又貶永州司戶移吉州長史天下無事朝廷思用宿舊徴拜主客員外郎道病留武昌遂不起貰漢書常從王媪武負貰酒師古注貰賖也李登吕忱並音式制反而今之讀者謂與射同乃引地名射陽其字作貰以為證驗此說非也新豐酒梁元帝詩試作新豐酒遙勸陽臺人過福禪師蘭若巖壑轉微徑文苑英華作巖壑帶松徑一本作巖壑帶茅徑雲林隱法堂羽人飛奏樂天女跪焚香天一本作仙跪凌本作跽竹外峰偏曙藤隂水更凉欲知禪坐久行路長春芳蘭若即僧寺釋氏要覽蘭若梵云阿蘭若或云阿練若唐言無諍四分律云空淨處薩婆多論云閒靜處知度論云逺離處羽人楚辭仍羽人於丹丘王逸注山海經言有羽人之國不死之民或曰人得道身生羽毛也黎拾遺昕裴迪見過秋夜對雨之作一本裴字下多秀才二字促織鳴已急輕衣行向重向劉本作尚寒燈坐髙館秋雨聞疏鐘白法調狂象𤣥言問老龍何人顧蓬徑空愧求羊蹤求一作牛誤促織詩紀厯樞立秋促織鳴女工急促之候也郭璞爾雅注蟋蟀今促織也亦名青􅖹白法釋氏以惡法為黑法善法為白法華嚴經能普增長一切白法狂象遺教經又如狂象無鉤猿猴得樹騰躍踔躑難可禁制涅槃經譬如醉象狂騃暴惡多欲殺害有調象師以大鐡鉤鉤斫其項即時調順惡心都盡一切衆生亦復如是貪欲瞋恚愚癡醉故欲多造惡諸菩薩等以聞法鉤斫之令住更不得起造諸惡心𤣥言晉書王衍妙善𤣥言惟談老莊為事老龍莊子妸荷甘與神農同學于老龍吉求羊蹤羣輔録求仲羊仲不知何許人皆治車為業挫亷逃名蔣元卿之去兖州還杜陵荆棘塞門舍中有三徑不出惟二人從之游時人謂之二仲謝靈運詩惟開蔣生徑永懷求羊蹤晚春嚴少尹與諸公見過松菊荒三徑圖書共五車烹葵邀上客看竹到貧家鵲乳先春草鵲唐詩品彚作雀鶯啼過落花自憐黃髮暮一倍惜年華晚春梁元帝纂要三月季春亦曰暮春末春晚春三徑歸去來辭三徑就荒松菊猶存上客沈約詩匹彼露葵羮可以留上客黃髮論衡人少則髮黑老則髮白白久則黃顔師古漢書注黃髮老稱謂白髮盡落更生黃者過感化寺曇興上人山院感化寺文苑英華作化感寺暮持笻竹杖相待虎溪頭催客聞山響歸房逐水流野花藂發好谷鳥一聲幽夜坐空林寂林顧可久本作村松風直似秋感化寺按劉昫唐書方伎傳感化寺在藍田虎溪蓮社髙賢傳逺法師居東林其處流泉匝寺下入於溪師每送客過此輒有虎號鳴因名虎溪後送客未嘗過獨陶淵明陸修靜至語道契合不覺過溪因相與大笑太平寰宇記廬山有虎溪橋逺大師送客不過此橋同詠裴迪不逺灞陵邊安居向十年入門穿竹徑留客聽山泉鳥囀深林裏心閒落照前浮名竟何益從此願棲禪灞陵長安志灞陵故城在萬年縣東北二十五里灞水之東十三州志曰灞陵秦襄王所築芷陽也漢文帝更名霸陵莽曰水革郡國志曰在通化門東二十里秦襄王葬於其坂謂之霸上其城即秦穆公所築漢王元年十月至霸上子嬰降文帝後六年宗正劉禮為將軍次霸上文帝後葬其地謂之霸陵因為縣晉改為霸城後周建德二年省夏日過青龍寺謁操禪師龍鍾一老翁徐步謁禪宫欲問義心義遙知空病空山河天眼裏世界法身中莫怪銷炎熱能生大地風龍鍾埤蒼龍鍾行不進貌義心楞伽經此是過去未來現在諸如來應供等正覺性自性第一義心以性自性第一義心成就如來世間出世間上上法空病空維摩詰經得是平等無有餘病惟有空病空病亦空鳩摩羅什注上明無我無法而未遣空未遣空則空為纍纍則是病故明空病亦空也天眼法苑珠林昔佛在世時諸弟子中阿那律天眼第一能見三千大千世界乃至微細無幽不覩翻譯名義天眼通者於眼得色界四大造清淨色是名天眼天眼所見自地及下地六道衆生諸物若近若逺若粗若細諸色無不能照是天眼有二種一從報得二從修得又云凡是天眼逺近皆見前後內外晝夜上下悉皆無礙法身僧肇維摩詰經注經云法身者虛空身也無生而無不生無形而無不形超三界之表絶有心之境隂入所不能攝稱讚所不能及寒暑不能為其患生死無以化其體故其為物也微妙無象不可為有備應萬形不可為無彌綸八極不可為小細入無間不可為大故能入生出死通洞乎無窮之化變現殊方應無端之求此二乘之所不識補處之所不覩况凡夫無目敢措思於其間哉聊依經誠言粗標其元極耳然則法身在天而天在人而人豈可近捨丈六而逺求法身乎涅槃經復有菩薩摩訶薩住大涅槃斷取一切十方無量諸佛世界悉內巳身其中衆生悉無迫迮亦無往返及住處想同詠裴迪安禪一室內左右竹亭幽有法知不染無言誰敢酬鳥飛爭向夕蟬噪已先秋煩暑自兹退退顧可久本作適清凉何所求安禪佛報恩經山林樹下安禪靜默不染維摩詰經法名無染若染於法乃至涅槃是則染著非求法也華嚴經不染世間一切法而不斷世間一切所作鄭果州相過相凌本作見麗日照殘春麗劉本作斜初晴草木新牀前磨鏡客前顧元緯本凌本俱作頭林裏灌園人林裏顧元緯本作樹下凌本作花下五馬驚窮巷驚方輿勝覽作過雙童逐老身逐方輿勝覽作送中㕑辦粗飯中㕑文苑英華作㕑中當恕阮家貧當恕文苑英華作常恐果州唐書地理志山南西道有果州南充郡磨鏡客列仙傳負局先生者不知何許人也語似燕代間人常負磨鏡局徇吳市中衒磨鏡一錢因磨之輒問主人得無有疾苦者出紫丸藥以與之得者莫不愈如此數十年後大疫病家至户到與藥活者萬計不取一錢吳人乃知其真人也五馬王琢崖所輯李太白詩注辨五馬事極詳悉今載于此云五馬之說古今談者不一據墨客揮犀云世謂太守為五馬人罕知其故事或言詩云孑孑干旟在浚之都素絲組之良馬五之鄭注謂周禮州長建旟漢太守比州長法御五馬故云後見龎幾先朝奉云古乘駟馬車至漢時太守出則增一馬事見漢官儀也演繁露云太守五馬莫知的據古樂府五馬立踟蹰即其來已久或言詩有良馬五之侯國事也然上言良馬四之下言良馬六之則或四或六原非定制也漢有駟馬車正用四馬而鄭𤣥注詩曰周禮州長建旟漢太守比州長法御五馬𤣥以州長比方漢州大小相絶逺矣周之州乃反統𨽻于縣比漢太守品秩殊不侔不足為據然鄭後漢時人則太守之用五馬後漢已然矣至唐白樂天和春深二十首詩曰五匹鳴珂馬雙輪畫軾車至其自杭分司有詩曰錢塘五馬留三匹還擬騎游攪擾春杜詩亦曰使君五馬一馬驄則是真有五馬矣若其制之所始則未有知者按今本毛詩鄭注但云周禮州長建旟謂州長之屬不云漢太守亦比州長法御五馬則其說舛矣據師古杜詩注云昔王義之出守永嘉庭列五馬後人遂據為太守事今按晉書及古今傳記羲之並未嘗為永嘉太守則其說亦謬也宋人五色線集北齊栁元伯五子同時領郡時五馬參差于庭故時人呼太守為五馬今按古羅敷行已有五馬踟蹰之句則非自北齊始矣潘子真詩話禮天子六馬左右驂三公九卿駟馬右驂漢制九卿則中二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱遁齊閒覽及學林云漢時朝臣出使為太守增一馬故稱五馬其說亦無他證唯沈約宋書引逸禮王度記曰天子駕六諸侯駕五卿駕四大夫三士二庶人一後之太守即古之諸侯故有五馬之稱耳此或近之前之數說皆未的也雙童庾信詩五馬遙相問雙童來夾車中㕑古樂府隴西行談笑未及竟左顧敕中㕑促令辨粗飯慎莫使稽留阮家貧晉書阮咸與籍居道南諸阮居道北北阮富而南阮貧過香積寺文苑英華以此詩為王昌齡作不知香積寺數里入雲峰古木無人徑深山何處鐘深文苑英華作空泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍香積寺雍録香積寺吕圖在子午谷正北微西郭子儀肅宗時收長安陳于寺北唐本傳云距豐水臨大川大川者沉水交水唐永安渠也蓋寺在豐水之東交水之西也吕圖云在鎬水發源之北則近昆明池矣長安志城南名勝古蹟圖香積寺在神谷原右唐昭陵圖香積寺與麻池相近菩提寺在其左惠昭寺在其右屬醴泉縣陜西通志香積寺在長安縣神禾原上咽北山移文石泉咽而下愴毒龍涅槃經但我住處有一毒龍其性暴急恐相危害成按此篇起句極超忽謂初不知山中有寺也逮深入雲峰於古木森叢人蹤罕到之區忽聞鐘聲而始知之四句一氣盤旋滅盡針線之跡自非盛唐髙手未易多覯泉聲二句深山恆境每每如此下一咽字則幽靜之狀恍然著一冷字則深僻之景若見昔人所謂詩眼是矣或謂上一句喻心境之空靈動宕下一句喻心境之恬憺清涼則未免求深反謬耳毒龍冝作妄心譬喻猶所謂心馬情猴者若㑹意作降龍實事用失其解矣過崔駙馬山池畫樓吹笛妓畫一作書金碗酒家胡碗顧元緯本凌本俱作埒錦石稱貞女青松學大夫脫貂貰桂酌酌顧元緯本凌本俱作醑射鴈與山㕑聞道髙陽㑹愚公谷正愚崔駙馬按唐書公主列傳𤣥宗二十九女駙馬有崔惠童崔嵩二人未知孰是吹笛妓晉書王愷嘗置酒𨗳與敦俱在坐有女妓吹笛酒家胡辛延年羽林郎詩依倚將軍勢剛笑酒家胡錦石庾信詩錦石平砧面蓮房接杵腰貞女石水經注貞女峽西岸髙巖名貞女山山下際有石如人形髙七尺狀如女子故名貞女峽古來相傳有數女取螺於此遇風雨晝夜忽化為石斯誠巨異難以聞信但啓生石中摯􅈱空桑抑斯類矣物之變化寧以理求乎脫貂晉書阮孚遷黃門侍郎散騎常侍嘗以金貂換酒為所司彈劾桂醑沈約郊居賦席布騂駒堂流桂醑髙陽㑹徐友遜齊謂用山簡飲酒髙陽池上事胡友淡園謂用髙陽里德星聚事郭友培元謂用左傳八愷事借作才子字用不必拘泥㑹字三說皆得愚公谷說苑齊桓公出獵逐鹿而走入山谷之中見一老人而問之曰是為何谷對曰為愚公之谷桓公曰何故對曰以臣名之桓公曰今視公之儀狀非愚人也何為以公名對曰臣請陳之臣故畜㹀牛生子大而賣之買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷送李判官赴江東江東一作東江聞道皇華使方隨皂蓋臣封章通左語冠冕化文身樹色分揚子潮聲滿冨春遙知辨璧吏恩到泣珠人判官按唐書百官志節度觀察團練防禦諸使各有判官一人杜氏通典判官分判倉兵騎胄四曹事副使及行軍司馬通署皇華使杜預左傳注皇皇者華君遣使臣之詩也皂蓋後漢輿服志中二千石二千石皆皂蓋朱兩轓封章漢書營平守節屢奏封章左語揚雄蜀紀蜀之先代人民椎結左語不曉文字文身禮記東方曰夷被髮文身有不火食者矣孔穎達正義云文身者謂以丹青文飾其身漢書今之蒼梧鬱林合浦交趾九真南海日南皆粵分也其君禹後帝少康之庶子云封於㑹稽文身斷髮以避蛟龍之害應劭曰常在水中故斷其髮文其身以象龍子故不見傷害也淮南子九疑之南陸事寡而水事衆於是民人被髮文身以像鱗蟲髙誘注文身刻畫其體肉墨其中為蛟龍之狀以入水蛟龍不害也揚子方輿勝覽揚子江在真州揚子縣南與鎮江分界一統志揚子江在揚州府儀真縣南經通泰二州入於海富春一統志富春江在揚州富陽縣南即浙江之上流泣珠搜神記南海之外有鮫人水居如魚不廢織績其眼泣則能出珠王右丞集箋注卷七
