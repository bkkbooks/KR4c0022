body:
  text: 王右丞集箋注卷八仁和趙殿成撰近體詩三十三首送封太守忽解羊頭削聊馳熊軾轓軾顧元緯本凌本俱作首揚舲發夏口按節向吳門帆映丹陽郭楓攢赤岸村攢一作藏百城多候吏露冕一何尊羊頭削淮南子羊頭之銷許愼注銷生鐵也髙誘注羊頭之銷白羊子刀也熊軾轓後漢書輿服志公列侯安車朱斑輪倚鹿較伏熊軾皂繒蓋黑幡右騑顔師古漢書注伏熊軾者車前橫軾為伏熊之形也廣韻轓車大箱也揚舲謝朓詩揚舲浮大川玉篇舲小船屋也韻會舲舟也一曰舟有窗者丹陽元和郡縣志丹陽郡故城在潤洲上元縣東南五里赤岸太平寰宇記揚州六合縣有赤岸山南兖州記云瓜步山東五里有赤岸南臨江中按羅君章云赤岸若朝霞即此類也濤水自海入江衝激六七百里至此岸側其勢始衰郭景純江賦云鼓洪濤於赤岸即此也方輿勝覽真州有赤岸山其山巖與江岸數里土色皆赤送嚴秀才還蜀寧親為令子為文苑英華作真似舅即賢甥别路經花縣還鄉入錦城山臨青塞斷江向白雲平獻賦何時至明君憶長卿秀才唐六典凡貢舉人有博識髙才強學待問無失俊選者為秀才寧親法言孝莫大於寧親令子南史任昉傳褚彥回嘗謂任遙曰聞卿有令子相為喜之似舅南史何無忌劉牢之之外甥酷似其舅花縣白氏六帖潘嶽為河陽令植桃李花人號曰河陽一縣花錦城益州記錦城在州南笮橋東流江南岸昔蜀時故錦官處也號錦里城墉猶在元和郡縣志錦城在成都縣南十里故錦官城也輿地廣記成都舊謂之錦官城言官之所織錦也亦猶合浦之珠官云又或名之曰錦里城長卿漢書司馬相如字長卿蜀郡成都人著子虛之賦久之蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如送張判官赴河西單車曽出塞報國敢邀勳見逐張征虜今思霍冠軍沙平連白雪蓬卷入黃雲慷慨倚長劍髙歌一送君河西劉昫唐書河西節度使斷隔羌戎統赤水大斗建康寧寇玉門墨離豆盧新泉等八軍張掖交城白亭三守捉治在涼州管兵七萬三千人單車李陵答蘇武書足下昔以單車之使適萬乘之虜張征虜三國志先主既定江南以張飛為宜都太守征虜將軍霍冠軍史記霍去病傳天子曰剽姚校尉去病斬首虜二千二十八級及相國當户斬單于大父行籍若侯産生捕季父羅姑比再冠軍以千六百户封去病為冠軍侯倚劍江淹詩倚劍臨八荒李周翰注倚佩也送岐州源長史歸原注源與余同在崔常侍幕中時常侍已沒握手一相送心悲安可論秋風正蕭索客散孟嘗門故驛通槐里長亭下槿原槿一作柏征西舊旌節從此向河源岐州唐書地理志關內道鳯翔府扶風郡本岐州長史唐六典上州有長史一人從五品上中州有長史一人正六品上孟嘗史記孟嘗君在薛招致諸侯賔客及亡人有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人槐里水經渭水又東徑槐里縣故城南酈道元注縣古犬丘邑也周郝王都之秦以為廢丘亦曰舒丘漢三年改曰槐里王莽更名槐治世謂之大槐里晉太康中始平郡治也其城遞帶防陸舊渠尚存即漢書所謂槐里環隄者也史記正義括地志云犬丘故城一名槐里亦曰廢丘在雍州始平縣南十里長安志槐里驛在興平縣郭下東至咸陽驛四十五里西至武功驛六十五里長亭庾信哀江南賦十里五里長亭短亭槿原槿原秦中地名未詳所在宋之問詩人悲槐里月馬踏槿原霜旌節唐書百官志節度使辭日賜雙旌雙節河源江淹詩當學衛霍將建功在河源李善注河源胸奴之境山海經曰崑崙之東北隅實維河源也劉良注河源即西域唐書地理志隴右道鄯州西平郡有河源軍送張道士歸山先生何處去王屋訪毛君毛諸本皆作茅唯顧元緯本凌本作毛今從之别婦留丹訣驅雞入白雲人間若剩住若剩住文苑英華作數剩住顧元緯本凌本俱作苦難剩天上復離羣當作遼城鶴仙歌使爾聞王屋元和郡縣志王屋山在河南府王屋縣北十五里周圍一百三十里髙三十里毛君真誥昔毛伯道劉道恭謝稚堅張兆期皆後漢人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見二人如此不敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百嵗别婦晉書許邁移入臨安西山登巖茹芝眇爾自得有終焉之志乃改名玄字逺遊與婦書告别又著詩十二首論神仙之事焉離羣禮記吾離羣而索居亦已久矣遼城鶴搜神後記丁令威本遼東人學道於靈虛山後化鶴歸遼集城門華表柱時有少年舉弓欲射之鶴乃飛徘徊空中而言曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冡纍纍遂髙上沖天同崔興宗送瑗公一作同崔興宗送衡嶽瑗公南歸言從石菌閣新下穆陵關獨向池陽去白雲留故山綻衣秋日裏洗鉢古松間一施傳心法惟將戒定還穆陵關史記索隱舊説云穆陵在會稽非也按今淮南府有故穆陵關是楚之境唐書地理志沂州沂水縣北有穆陵關一統志穆陵關在青州府大峴山上池陽漢書地理志左馮翊有池陽縣應劭曰在池水之陽史記正義雍州涇陽縣西北三里有池陽故城輿地廣記耀州三原縣漢池陽縣地屬左馮翊傳心神會禪師顯宗記自世尊滅後西天二十八祖共傳無住之心同説如來知見同詠崔興宗行苦神亦秀冷然溪上松銅瓶與竹杖來自祝融峰常願入靈嶽藏經訪遺蹤南歸見長老且為説心胸祝融峰一統志祝融峰在衡州府衡山縣西北三十里位值離宫以配火德乃祝融君遊息之所上有青玉壇道書以為第二十四福地送錢少府還藍田草色日向好桃源人去稀手持平子賦目送老萊衣每候山櫻發時同海燕歸今年寒食酒應得返柴扉得一作是平子賦文選有張平子歸田賦目送南史張緒每朝見武帝目送之老萊衣藝文類聚列士傳曰老萊子孝養二親行年七十嬰兒自娛著五色采衣嘗取漿上堂跌仆因臥地為小兒啼或弄烏鳥於親側山櫻沈約詩山櫻火欲然留别錢起秉恕按錢起集亦載此詩題作晚歸藍田酬王維給事贈别文苑英華亦謂是起詩題作晚歸藍田酬中書常舍人贈别微有不同唐詩紀事云起還藍田王維贈别云草色日向好桃源人去稀云云起答詩云卑棲却得性每與白雲歸云云是以二詩為互相酬答之作也細玩知音青瑣之句合是錢作無疑蓋留别字是題錢起字是作者姓名本以同詠附載集中或者因聮書不斷誤謂四字俱是詩題遂作右丞之詩耳五絶內駐馬分襟一首亦是此誤但舊本所定未敢輒加變亂聊存管見以俟識者之論定焉卑棲却得性每與白雲歸徇祿仍懷橘仍凌本作猶看山免採薇山凌本作花采四句一作别山如昨日春露已沾衣蕨頻盈手看花空厭歸暮禽先去馬新月待開扉霄漢時回首知音青瑣闈徇祿謝靈運詩徇祿反窮海臥痾對空林張銑注徇求也懷橘三國志陸績年六嵗於九江見袁術術出橘績懷三枚去拜辭墮地術謂曰陸郎作賔客而懷橘乎績跪答曰欲歸遺母術大竒之青瑣闈漢書元后傳赤墀青瑣孟康注以青畫邊户鏤中天子制也如淳曰門楣格再重如人衣領再重裹青名曰青瑣天子門制也師古注孟説是青瑣者刻為連瑣文而以青塗之也爾雅宫中之門謂之闈送丘為往唐州宛洛有風塵君行多苦辛四愁連漢水百口寄隨人槐色隂清晝楊花惹暮春朝端肯相送天子繡衣臣唐州唐書地理志山南東道昌州春陵郡治棗陽武德五年以唐城山更名唐州九年徙治比陽四愁文選張衡為河間相時天下漸弊鬱鬱不得志為四愁詩依屈原以美人為君子以珍寶為仁義以水深雪氛為小人思以道術相報貽於時君而懼讒邪不得以通百口晉書孫盛傳請為百口切計隨人元和郡縣志隨州本春秋時隨國西至唐州三百六十里朝端宋書王宏傳忝承人乏位副朝端繡衣漢書百官公卿表侍御史有繡衣直指出討姧猾治大獄師古注衣以繡者尊寵之也楊升庵云王右丞楊花惹暮春李長吉古竹老稍惹碧雲溫庭筠暖香惹夢鴛鴦錦孫光憲六宫眉黛惹春愁用惹字凡四皆絶妙送元中丞轉運江淮錢起集亦載此首薄稅歸天府稅一作賦輕徭賴使臣歡沾賜帛老恩及卷綃人去問珠官俗珠錢集作殊來經石劫春凌本作來看石劫城錢集作來經幾却春東南御亭上御錢集作卸劉本顧可久本作髙俱非莫使有風塵使錢集作問元中丞劉昫唐書元載智性敏悟善奏對肅宗嘉之委以國計俾充使江淮都運領漕挽之任尋加御史中丞輕徭漢書昭帝紀輕徭薄賦與民休息賜帛老漢書文帝紀有司命縣道年九十以上賜帛人一匹絮三斤卷綃人左思吳都賦泉室潛織而卷綃劉淵林注俗傳鮫人從水中出曽寄寓人家積日賣綃鮫人臨去從主人索器泣而出珠滿盤以與主人珠官三國志孫權黃武七年改合浦為珠官郡劉昫唐書合浦郡秦之象郡地吳改為珠官石劫郭璞江賦石􅎕應節而揚葩李善注南越志曰石􅎕形如龜腳得春雨則生花花似草花江淹石劫賦序海人有食石劫一名紫􅀢蚌蛤類也春而發花有足異者御亭太平寰宇記御亭驛在常州東南一百三十八里輿地志云御亭在吳縣西六十里吳大帝所立梁庾肩吾詩云御亭一回望風塵千里昏即此也開皇九年置為驛十八年改為御亭驛李襲譽改為望亭驛送崔九興宗遊蜀送君從此去轉覺故人稀徒御猶回首田園方掩扉出門當旅食中路授寒衣江漢風流地遊人何處歸處唐詩紀事作嵗徒御徒徒行者御御車者詩徒御嘽嘽旅食魏文帝與吳質書馳騁北場旅食南館授詩九月授衣送崔興宗已恨親皆逺誰憐友復稀君王末西顧遊宦盡東歸塞濶山河淨濶顧元緯本凌本俱作迥山凌本作江天長雲樹微方同菊花節相待洛陽扉送平淡然判官不識陽關路新從定逺侯黃雲斷春色畫角起邊愁起唐詩正音作赴一作越瀚海經年别别顧元緯本凌本文苑英華俱作到交河出塞流須令外國使須文苑英華作預知飲月支頭知一作只非陽關漢書地理志燉煌郡龍勒有陽關玉門關元和郡縣志陽關在沙州夀昌縣西六里以居玉門關之南故曰陽關本漢置也謂之南道西趨鄯善莎車北邉備對玉門陽關漢之兩關皆在燉煌郡夀昌縣通典曰漢龍勒縣也玉門在縣之北陽關在玉門之南一縣而設二關者自此而趨西域有南北道故也定逺侯後漢書班超傳使軍司馬班超安集于置以西超遂踰蔥嶺迄縣度出入二十二年莫不賔從改立其王而綏其人不動中國不煩戎士得逺夷之和同異俗之心而致天誅捐宿恥以報將士之讎其封超為定逺侯邑千戶交河漢書車師前王國王治交河城河水分流繞城下故號交河元和郡縣志交河出西州交河縣北天山水分流於城下因以為名送孫秀才唐詩紀事以此詩為王縉之作帝城風日好風文苑英華作春况復建平家玉枕雙文簟文文苑英華唐詩紀事俱作紋金盤五色瓜山中無魯酒無文苑英華唐詩紀事俱作沽松下飯胡麻莫厭田家苦厭文苑英華作怨歸期逺復賒建平米書建平王景素好文章書籍招集才義之士傾身禮接以收名譽雙文簟東宫舊事有赤花雙文簟五色瓜阮籍詩昔聞東陵瓜近在青門外連畛距阡陌子母相鉤帶五色曜朝日嘉賔四面會述異記吳桓王時會稽生五色瓜今吳中有五色瓜嵗時充貢獻魯酒淮南子魯酒薄而邯鄲圍後人以薄酒為魯酒本此胡麻法苑珠林劉晨阮肇食胡麻飯山羊脯牛肉甚甘美賒韻會賖説文貰買也從貝佘聲一曰逺也又徐曰又謂遲緩為賒成按孫秀才蓋客於京師遨遊諸王之門不得意而歸者故首美帝城風日并引建平家以為擬喻承以赤枕金盤一聯則客遊之適意可知今捨之而歸去所飲者若彼所飯者若此田家淡薄大異疇昔幾何不生厭苦然而莫厭也視子之歸期尚逺而遲緩不可必者不猶愈乎其慰藉之意深矣送劉司直赴安西絶域陽關道胡煙與塞塵煙顧元緯本凌本文苑英華唐詩品彚俱作沙三春時有鴈萬里少行人苜蓿隨天馬蒲桃逐漢臣漢凌本作使當令外國懼不敢覓和親司直唐書百官志大理寺有司直六人從六品上安西杜氏通典安西都護府本龜兹國也大唐明慶中置東接馬耆西連疏勒南鄰吐蕃北拒突厥絶域漢書陳湯傳討絶域不羈之君係萬里難制之虜苜蓿史記大宛左右以蒲桃為酒富人藏酒至萬餘石久者十數嵗不敗俗嗜酒馬嗜苜蓿漢使取其實來於是天子始種苜蓿蒲桃肥饒地及天馬多外國使來衆則離宫别館旁盡種蒲桃苜蓿極望天馬史記初天子發書易云神馬當從西北來得烏孫馬好名曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極名大宛馬曰天馬云送趙都督赴代州得青字天官動將星漢地栁條青地顧元緯本凌本俱作上一作沚萬里鳴刁斗三軍出井陘忘身辭鳯闕報國取龍庭豈學書生輩窗間老一經間文苑英華作中老唐詩品彚作著都督唐書百官志大都督府都督一人從二品中都督府都督一人正三品下都督府都督一人從三品掌督諸州兵馬甲械城隍鎮戍糧廩總判府事代州唐書地理志代州雁門郡中都督府𨽻河東道天官史記有天官書索隱曰按天文有五官官者星官也星座有尊卑若人之官曹列位故曰天官將星隋書天文志天將軍十二星在婁北主武兵中央大星天之大將也外小星吏士也大將星搖兵起大將出小星不具兵發刁斗史記不擊刁斗以自衛孟康注曰刁斗以銅作鐎器受一斗晝炊飯食夜擊持行名曰刁斗索隱曰刁音貂按荀恱云刁斗小鈴如宫傳夜鈴也蘇林曰形如鋗以銅作之無緣受一斗故云刁斗鋗即鈴也埤蒼云鐎溫器有柄斗似銚無緣井陘史記正義井陘故關在并州石艾縣東十八里即井陘口元和郡縣志井陘口今名土門口在鎮州獲鹿縣西南十里即太行八陘之第五陘也四面髙中央下似井故名之唐書地理志鎮州常山郡獲鹿縣有故井陘關一名土門關鳯闕史記建章宫其東則鳯闕髙二十餘丈索隱曰三輔黃圖曰武帝營建章起鳯闕髙二十五丈三輔故事云北有圜闕髙二十丈上有銅鳯凰故曰鳯闕也龍庭班固封燕然山銘躡冒頓之區落焚老上之龍庭張銑注龍庭單于祭天地處也送方城韋明府遙思葭菼際寥落楚人行髙鳥長淮水平蕪故郢城使車聽雉乳縣鼓應雞鳴若見州從事無嫌手板迎方城元和郡縣志山南道唐州有方城縣明府成按明府字始見於漢書韓延夀龔遂兩傳中然皆以稱太守後漢書張湛傳明府位尊德重不宜自輕章懷太子注郡守所居曰府明者尊髙之稱又鍾皓傳明府必欲得其人劉寵傳明府下車以來劉翊傳明府聼之則被侫幸之名皆太守事也惟張儉傳李篤呼外黃令毛欽為明廷章懷太子注明廷猶明府唐人稱縣令為明府當本於此葭菼詩葭菼揭揭毛萇傳葭蘆也菼薍也長淮唐六典淮水出唐州厯豫潁亳泗四州之南境郢城史記正義括地志云郢城在荆州江陵縣東北楚平王築都之地也杜氏通典荆州江陵故楚之郢地秦分郢置江陵縣今縣界有故郢城劉昫唐書荆州江陵漢縣南郡治所也故楚都之郢城今縣北十里紀南城是也後治於郢在縣東南今治所桓溫所築城也雉乳後漢書魯恭拜中牟令郡國螟傷稼犬牙緣界獨不入中牟河南尹表安聞之疑其不實使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其旁旁有小兒童親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政績耳今蟲不犯禁此一異也化及鳥獸此二異也豎子有仁心此三異也州從事續漢志每州刺史皆有從事史手板隋書禮儀志笏晉宋以來謂之手板送李員外賢郎少年何處去負米上銅梁借問阿戎父知為童子郎魚箋請詩賦橦布作衣裳薏苡扶衰病歸來幸可將負米家語子路見於孔子曰昔者由也事二親之時常食藜藿之食為親負米百里之外銅梁太平寰宇記銅梁縣在合州西一百五十里亦漢墊江縣地宋改為宕渠縣魏為石鏡之地唐長安四年刺史陳靖意以大足川僑戶輻湊置銅梁縣以銅梁山為名銅梁山在合州石鏡縣南九里左太沖蜀都賦云外負銅梁於宕渠注云銅梁山名也按其山出鐵及桃竹杖東西連亘二十餘里山嶺之上平整逺望諸山而此獨秀也阿戎父劉孝標世説注竹林七賢論曰初阮籍與王戎父渾俱為尚書郎每造渾坐未安輒曰與鄒語不如與阿戎語造戎必日夕而返童子郎後漢書臧洪傳洪年十五以功拜童子郎章懷太子注漢法孝亷試經者拜為郎洪以年幼才俊故拜童子郎也又左雄傳雄奏徴海內名儒為博士又使公卿子弟為諸生有志操者加其俸祿及汝南謝亷河南趙建年始十二各能通經雄並奏拜童子郎又黃琬傳琬以公孫拜童子郎魚箋王勃七夕賦握犀管展魚箋橦布左思蜀都賦布有橦花麵有枕榔劉淵林注橦華者樹名橦其花柔毳可績為布也出永昌太平寰宇記劍南道巂州有橦木可以為布薏苡神農本草經薏苡味甘微寒主風濕痺下氣除筋骨邪氣久服輕身益氣送梓州李使君梓州唐詩正音作東川萬壑樹參天千山響杜鵑文苑英華作鄉音聽杜鵑山中一半雨半二顧本凌本唐詩品彚俱作夜樹杪百重泉漢女輸橦布橦瀛奎律髓唐詩正音俱作賨巴人訟芋田文翁翻教授不敢倚先賢不敢當是敢不之訛梓州唐書地理志劍南道有梓州梓潼郡輸晉書食貨志夷人輸賨布戶一匹逺者或一丈芋田左思蜀都賦瓜疇芋區郭義恭廣志蜀漢既繁芋民以為資圖經本草芋今處處有之閩蜀淮楚尤多植蜀川出者形圓而大狀若蹲鴟謂之芋魁彼人種以當糧食而度飢年文翁漢書文翁廬江舒人也為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風文翁誘進之由是大化蜀地學於京師者比齊魯馬三國志蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地理志曰文翁倡其教相如為之師漢家得士盛於其世成按文苑英華載王右丞詩多與今行槧本小異如松下清齋折露葵清齋作行齋種松皆作老龍鱗作種松皆老作龍鱗並以英華為佳送梓州李使君詩山中一夜雨樹杪百重泉作山中一半雨尤佳蓋送行之詩言其風土深山冥晦晴雨相半故曰一半雨而績之以僰女巴人之聯也崔皓詩寄語西河使知余報國心英華云余知報國心如俗本則皓此句為求知矣此類甚多讀者宜詳之送張五諲歸宣城五湖千萬里况復五湖西漁浦南陵郭人家春榖溪欲歸江渺渺未到草凄凄憶想蘭陵鎮可冝猿更啼更一作夜南陵元和郡縣志南陵縣東至宣州一百里本漢春穀縣地梁於此置南陵縣春榖溪謝眺詩山積陵陽阻溪流春榖泉李善注漢書曰丹陽郡有春榖縣水經注曰江連春穀縣北又合春榖水送友人南歸萬里春應盡三江鴈亦稀亦稀文苑英華作欲飛非連天漢水廣孤客郢城歸鄖國稻苗秀鄖顧可久本唐詩正音俱作郎誤楚人菰米肥米一作菜文苑英華作葉懸知倚門望遙識老萊衣三江水經注巴陵西對長洲其洲南湘浦北對大江故曰三江也三水所會亦謂之三江口矣一統志三江在嶽州府城下岷江為西江澧江為中江湘江為南江皆會於此故名亦名三江口漢水廣詩漢之廣矣鄖國杜預左傳注鄖國在江夏雲杜縣東南有鄖城酈道元水經注西有古竟陵大城古鄖國也鄖公辛所治所謂鄖鄉矣史記正義括地志云安州安陸縣城本春秋時鄖國城輿地廣記復州沔陽縣春秋鄖子之國漢雲杜縣地屬江夏郡菰米本草陶𢎞景曰菰米一名雕胡可作餅食陳戴器曰雕胡是菰蔣草米古人所貴故內則云魚宜苽皆水物也曹子建七啓云芳菰精稗謂二草之實可以為飯也蘇頌曰菰生水中葉如蒲葦其苖有莖梗者謂之菰蔣草至秋結實乃雕胡米也古人以為美饌今飢嵗人猶采以當糧倚門戰國策王孫賈年十五事閔王其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭而望送賀遂員外外甥南國有歸舟荆門沂上流蒼茫葭菼外雲水與昭丘與一作同檣帶城烏去江連暮雨愁猿聲不可聽莫待楚山秋南國韋昭國語解南國江漢之間也詩曰滔滔江漢南國之紀泝玉篇泝蘇故切逆流而上也上流臧榮緒晉書荆州勢據上流昭丘王粲登樓賦西接昭邱李善注荆州圖記曰當陽東南七十里有楚昭王墓登樓則見所謂昭丘水經注沮水又南徑楚昭王墓東對麥城故王仲宣之賦登樓云西接昭丘是也檣玉篇檣帆柱也城烏梁元帝詩城烏侵曙鳴送楊長史赴果州瀛奎律髓長史下多一濟字褒斜不容幰之子去何之去方輿勝覽作欲鳥道一千里猿啼十二時啼瀛奎律髓唐詩正音唐詩品彚俱作聲官橋祭酒客山木女郎祠别後同明月君應聽子規之子爾雅之子者是子也祭酒客未詳王友琢崕謂古者出行必有祖道之祭封土為山象以菩芻棘柏為神主酒脯祈告既祭以車轢之而去事見毛詩正義李長吉别友詩亦有今將下東道祭酒而别秦之句與此甚合然不切蜀事恐亦未的至或引史記荀卿傳注以席中尊者為祭酒或引後漢書劉焉傳中張魯以祭酒為吏事則更誤矣女郎祠水經注南有女郎山山上有女郎塜逺望山墳嵬嵬狀高及即其所裁有墳形山下直路下出不生草木世人謂之女郎道下有女郎廟及搗衣石言張魯女也有小水北流入漢謂之女郎水輿地廣記興元府褒城縣有女郎山上有女郎墳女郎廟俗言張魯女所葬明月謝莊月賦美人邁兮音塵絶隔千里兮共明月子規張華禽經注望帝修道處西山而隱化為杜鵑鳥或云化為杜宇鳥亦曰子規馬至春則啼聞者悽惻送邢桂州鐃吹喧京口風波下洞庭赭圻將赤岸擊汰復揚舲日落江湖白潮來天地青明珠歸合浦應逐使臣星邢桂州劉昫唐書上元二年以邢濟兼桂州都督侍御史充桂管防禦都使地理志桂州始安郡都督府屬嶺南道京口京口即今鎮江自宋至陳常為重鎮在唐時為丹陽郡之丹徒縣方輿勝覽京口圖經其城因山為壘緣江為境爾雅丘絶髙曰京故名洞庭史記正義洞庭湖在嶽州巴陵西南一里南與青草湖連輿地廣記嶽州巴陵縣有洞庭湖圓廣五百餘里日月若出沒於其中赭圻元和郡縣志赭圻故城在宣州南陵縣西北一百三十里西臨大江吳所置赭圻屯處也晉哀帝時桓溫領楊州牧入朝參政自荆州還至赭圻詔止之遂城赭圻鎮焉擊汰楚辭乘舲船余上沅兮齊吳榜以擊汰王逸注舲船船有窗牖汰水波也言已始去乘窗舲之船西上沅湘之水士卒齊舉大棹而擊水波合浦後漢書孟嘗遷合浦太守郡不産榖實而海出珠寶與交趾比境嘗通啇販貿糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙於交趾郡界於是行旅不至人物無資貧者餓死於道嘗到官革易前弊求民利病曾未踰嵗去珠復還百姓皆反其業商賈流通使星後漢書和帝即位分遣使者皆微服單行各至州縣觀採風謠使者二人當到益部投李郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使耶二人默然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳送宇文三赴河西充行軍司馬橫吹雜繁笳吹文苑英華作笛邊風捲塞沙還聞田司馬更逐李輕車蒲類成秦地類劉本顧可久本俱作壘誤莎車屬漢家車劉本顧可久本俱作居誤一本作丘亦非當令犬戎國朝聘學昆邪行軍司馬唐書百官志節度使有行軍司馬一人掌弼戎政居則習搜狩有役則申戰守之法器械糧􅖲軍籍賜豫皆專焉橫吹古今注橫吹胡樂也張博望入西域傳其法於西京唯得摩訶兜勒二曲李延年因胡曲更造新聲二十八解乘輿以為武樂後漢以給邊將軍和帝時萬人將軍得用之唐書儀衛志鼓吹五部有大橫吹小橫吹大橫吹部有節鼓二十四曲小橫吹部有角笛簫笳觱栗桃皮觱栗六種曲名失傳田司馬漢書田廣明以郎為天水司馬李輕車漢書李蔡為輕車將軍從大將軍擊右賢王有功中率封為樂安侯鮑照詩後逐李輕車追虜窮塞垣蒲類漢書西域傳蒲類國王治天山西疏榆谷去長安八千三百六十里西南至都護治所千三百八十七里後漢書班超傳戰於蒲類海多斬首級而還章懷太子注蒲類胸奴中海名在敦煌北也竇固傳固與耿忠率酒泉敦煌張掖甲卒及盧水羌戎萬二千騎出酒泉塞至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海章懷太子注蒲類海今名婆悉海在今庭州蒲昌縣東南也莎車漢書西域傳莎車國主治莎車城去長安九千九百五十里東北至都護治所四千七百四十六里後漢書西域傳莎車國西經蒲犁無雷至大月氐東去洛陽萬九百五十里犬戎韋昭國語解犬戎西戎之别名在荒服史記犬戎氏以其職來王昆邪漢書胸奴傳昆邪休屠王謀降漢漢使驃騎將軍迎之昆邪王殺休屠王并將其衆降漢送孫二郊外誰相送文苑英華作郭外誰將送夫君道術親書生鄒魯客才子洛陽人祖席依寒草行車起暮塵起文苑英華作薄山川何寂寞何文苑英華作向長望淚霑巾霑巾張衡詩側身北望涕霑巾送崔三往密州覲省南陌去悠悠東郊不少留同懷扇枕戀獨念倚門愁念文苑英華作解路繞天山雪家臨海樹秋魯連功未報且莫蹈滄洲密州唐書地理志河南道有密州髙密郡扇枕東觀漢紀黃香父為郡五官貧無奴僕香躬執勤苦盡心供養冬無被袴而親極滋味暑即扇牀枕寒則身溫席晉書王延事親色養夏則扇枕席冬則以身溫被天山雪元和郡縣志天山一名白山一名折羅漫山在伊州北一百二十里冬夏有雪出好木及金鐵胸奴謂之天山過之皆下馬拜海樹元和郡縣志蜜州東至大海一百六十里魯連史記田單歸而言魯連欲爵之魯連逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉送丘為落第歸江東憐君不得意况復栁條春為客黃金盡還家白髮新五湖三畝宅宅文苑英華作地萬里一歸人歸文苑英華作行知禰不能薦禰顧元緯本凌本唐詩品彚俱作爾羞為獻納臣為顧元緯本凌本唐詩紀事唐詩品彚俱作稱文苑英華作看三畝宅淮南子任一人之能不足以治三畝之宅也知禰後漢書禰衡善魯國孔融融亦深愛其才衡始弱冠而融年四十遂與為交友上疏薦之獻納班固兩都賦序朝夕論思日月獻納漢江臨泛泛瀛奎律髓作眺楚塞三湘接湘瀛奎律髓作江荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好風日日文苑英華作月留醉與山翁翁文苑英華瀛奎律髓俱作公漢江郭璞山海經注漢水出武都沮縣東狼谷經漢中魏興至南鄉東經襄陽至江夏安陸縣入江唐六典注漢水源出梁州金牛縣初名漾水一名沔水厯洋金均襄荆郢復七州至沔州入於江一統志漢江源出隴西嶓冡山由漢中流經鄖縣均州光化至襄陽府城北又東南經宜城抵安陸州至大别山入於江其水因地而名曰漾曰沔曰漢曰滄浪蓋總名為漢别言之則有四耳楚塞江淹詩奉義至江漢始知楚塞長九𣲖郭璞江賦流九派乎潯陽李善注水别流為派尚書曰九江孔殷應劭漢書注曰江自廬江潯陽分為九也好風日庾肩吾詩何當好風日極望長沙埀山翁晉書山簡出為征南將軍都督荆湘交廣四州諸軍事假節鎮襄陽優遊卒嵗惟酒是耽諸習氏荆土豪族有佳園池簡每出遊嬉多之池上置酒輒醉名之曰髙陽池時有童兒歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接㒿舉鞭向葛強何如并州兒登辨覺寺辨一作新竹徑從初地從文苑英華瀛奎律髓俱作連蓮峰出化城窗中三楚盡盡文苑英華作靜林上九江平上凌本瀛奎律髓俱作外軟草承趺坐軟文苑英華作嫩長松響梵聲空居法雲外觀世得無生初地涅槃經無量無邊恆河沙等諸菩薩輩得入初地化城化城注見二十卷中三楚水經注文潁曰史記貨殖傳曰淮以北沛陳汝南南郡為西楚彭城以東東海吳廣陵為東楚衡山九江江南豫章長沙為南楚是為三楚者也孟康漢書注舊名江陵為南楚吳為東楚彭城為西楚法雲淨住子慧日已沉法雲遐布琢崖嘗説此詩初地即菩薩十地中之第一地所謂歡喜地也本是聖境中所造階級之名今借作寺外路徑用化城用法華經中化城事本是方便小乘止息之喻今借作寺中殿宇用工則工矣然右丞是學佛者奈犯綺語戒何語雖近釋實中理解成觀九經中語為文人借用失其本來面目未易更僕數即以右丞而論如以傅母作乳媪用膳夫作饔子用獸人作獵夫用司諫作言官用之類皆典經義不合雖於文無害然不究其原而僅襲其步恐有邯鄲匍匐之患耳瀛奎律髓謂此詩似詠廬山僧寺蓋因三四二句也逺近數千里一望了然佳處全在窗中林外四字或取盡字平字以敵老杜兜率寺詩中之有字自字者猶恐未的涼州郊外遊望野老才三户邊村少四鄰邊村顧元緯本凌本俱作村邊誤婆娑依里社簫鼓賽田神灑酒灑芻狗焚香拜木人女巫紛屢舞羅襪自生塵涼州唐書地理志隴右道有涼州武威郡婆娑爾雅婆娑舞也邢昺疏李巡曰婆娑盤辟舞也郭璞曰舞者之容孫炎曰舞者之容婆娑然則婆娑舞者之狀貌也賽史記封禪書冬賽禱祀索隱曰賽謂報神福也芻狗淮南子譬如芻狗土龍之始成髙誘注芻狗束芻為狗以謝過求福羅襪洛神賦凌波微步羅襪生塵觀獵唐詩紀事作獵騎風徑角弓鳴徑一作動將軍獵渭城草枯鷹眼疾雪盡馬啼輕忽過新豐市市雲溪友議作戍還歸細栁營回看射雕處射雕雲溪友議作落雁一作失雁千里暮雲平郭茂倩樂府採首四句入近代曲辭題曰戎渾萬首唐人絶句亦摘入絶句內題作戎渾角弓詩騂騂角弓渭城水經注太史公曰長安故咸陽也漢髙帝更名新城武帝元鼎三年别為渭城在長安西北渭水之陽王莽之京城也太平寰宇記故渭城在今雍州咸陽縣東北二十二里渭水北即秦之杜郵白起死於此其城周八里秦自孝公至始皇皆都於此城武帝元鼎三年更名渭城後漢省併地入長安故此城存也細栁營漢書河內太守周亞夫為將軍次細栁服虔曰細桞在長安西北裴駰史記注細桞徐廣曰在長安西駰按如淳曰長安圖細栁倉在渭北近石徼張楫曰在昆明池南今有桞市是也史記索隱按三輔故事細長桞在直城門外阿房宫西北維又胸奴傳云細桞在安西如淳云在渭北非也元和郡縣志細桞營在萬年縣東北三十里相傳云周亞夫屯軍處今按亞夫所屯在咸陽西南二十里言在此非也射雕北史斛律光嘗從文襄於洹橋校獵雲表見一大烏射之正中其頸形如車輪旋轉而下乃雕也丞相屬邢子髙嘆曰此射雕手也胡應麟曰右丞五言工淡間麗自有二派楚塞三江接風徑角弓鳴楊子談經處等篇綺麗精工沈宋合調者也寒山轉蒼翠寂寞掩柴扉晚年惟好靜等篇幽間古淡儲孟同聲者也邵古庵謂細桞渭城皆在陜西長安縣新豐在臨潼縣相去七十里曰忽過曰還歸正見其往返之易成按漢書內地名詩人多襲用之蓋取其典而不俚也興會所至一時彚集又何嘗拘拘於道里之逺近而後琢句者哉王右丞集箋注卷八
