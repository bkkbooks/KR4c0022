body:
  text: 王右丞集箋注巻九仁和趙殿成撰近體詩三十五首春日上方即事方文苑英華作房誤好讀髙僧傳時看辟榖方鳩形將刻杖龜殻用支牀栁色春山映梨花夕鳥藏梨花瀛奎律髓作花明北牕桃李下閒坐但焚香坐瀛奎律髓作歩長樂府詩集採此詩後四句入近代曲辭題作女命謂張説作萬首唐人絶句亦採此四句收入五言絶句命題正同而仍作公詩髙僧傳隋書經籍志有高僧傳十四巻釋僧佑撰唐書藝文志有虞孝敬高僧傳六巻僧惠皎高僧傳十四巻僧道宗續高僧傳三十二巻鳩杖後漢書禮儀志仲秋之月縣道皆按戸比民年始七十者授之以玉杖餔之糜粥八十九十禮有加賜玉杖長尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎龜支牀史記南方老人用龜支牀足行二十餘年老人死移牀龜尚生不死龜能行氣導引汎前陂秋空自明迥自明一作明月況復遠人間間文苑英華作寰暢以沙際鶴兼之雲外山澄波澹將夕波一作陂清月皓方閒此夜任孤棹夷猶殊未還夷猶楚辭君不行兮夷猶王逸註夷猶猶豫也謝朓詩停驂我悵望輟棹子夷猶楊升菴曰王右丞詩暢以沙際鶴兼之雲外山孟浩然詩重以觀魚樂因之鼓枻歌雖用助語詞却無頭巾氣宋人黄陳輩效之如且然聊爾耳得也自知之又如命也豈終否時乎不暫留豈止學歩邯鄲效顰西子巳哉游李山人所居因題屋壁世上皆如夢世上一作世人一作人事狂來或自歌狂文苑英華作往或一作止問年松樹老有地竹林多林文苑英華作隂藥倩韓康賣門容向子過向一作尚翻嫌枕席上無那白雲何那一作奈向子英雄記向子平有道術為縣功曹休歸自入山擔薪賣以供食飲後漢書向長字子平河内朝歌人也隠居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止登河北城樓作井邑傅巖上傅文苑英華作傳誤客亭雲霧間髙城眺落日極浦映蒼山岸火孤舟宿漁家夕鳥還寂寥天地暮暮凌本作外心與廣川閒河北唐書地理志陜州平陸縣本河北縣元寶元年太守李齊物開三門以利漕運得古刃有篆文曰平陸因更名井邑釋名周制九夫為井其制似井字也四井為邑邑猶悒也邑人聚㑹之稱也陸雲詩脩路無窮跡井邑自相循傅巖水經注沙澗水北出虞山東南逕傅巖厯傅説隠室前俗名之為聖人窟孔安國傳傅説隠於虞虢之間即此處也史記正義地理志云傅險即傅説版築之處所隠之處窟名聖氏窟在今陜州河北縣北七里即虞國虢國之界元和郡縣志傅巖在陜州平陸縣北七里即傅説版築之處寂寥四子講徳論紛紜天地寂寥宇宙李善註寂寥曠逺之貌也廣川史記此皆廣川大水山林谿谷不食之地也登裴迪秀才小臺作端居不出户滿目望雲山望一作空落日鳥邊下秋原人外閒遙知遠林際不見此簷間好客多乗月應門莫上闗秋原沈約詩秋原嘶代馬上闗劉楨詩應門重其闗庾肩吾詩洛橋初度燭青門欲上闗被出濟州河嶽英靈集作初出濟州别城中故人㣲官易得罪謫去濟州隂執政方持法明君無此心無一作照閭閻河潤上井邑海雲深縱有歸來日多愁年鬢侵多諸本皆作各河嶽英靈集唐詩品彚俱作多今從之濟州劉昫唐書地理志隋置濟北郡武徳四年改濟州天寳元年改為濟陽郡十三載六月一日廢濟州持法漢書翟方進為相公潔請託不行郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多河潤莊子河潤九里千塔主人逆旅逢佳節征帆未可前牕臨汴河水門渡楚人船雞犬散墟落桑榆䕃逺田所居人不見枕席生雲烟汴河輿地廣記汴河葢古莨蕩渠也首受黄河水隋煬帝開浚以通江淮漕運兼引汴水亦曰通濟渠鄭樵通志汴水一名鴻溝一名官度水一名通濟渠一名莨蕩渠或云莨蕩渠别汴首受河水自汜水縣東南過滎陽陳留睢陽符離至泗州入淮使至塞上單車欲問邊屬國過居延文苑英華作銜命辭天闕單車欲問邊又問字一作向征蓬出漢塞蓬文苑英華作鴻歸鴈入胡天大漠孤烟直長河落日圓蕭闗逢候騎騎顧可久本唐詩品彚俱作吏都䕶在燕然屬國漢書武帝紀匈奴昆邪王殺休屠王并將其衆合四萬餘人來降置五屬國以處之師古註凡言屬國者存其國號而屬漢朝故曰屬國衛青傳乃分處降者於邊五郡故塞外而皆在河南因其故俗為屬國師古曰不改其本國之俗而屬於漢故號屬國居延漢書將軍去病公孫敖出北地二千餘里過居延斬首虜三千餘級師古曰居延匈奴中地名也韋昭以為張掖縣失之張掖所置居延縣者以安處所獲居延人而置此縣後漢書郡國志有張掖屬國居延屬國史記索隠地理志張掖居延縣西北有居延澤古文以為流沙廣志流沙在玉門闗外有居延澤居延城元和郡縣志居延海在甘州張掖縣東北一百六十里即居延澤古文以為流沙者風吹流沙行故曰流沙征蓬吳均詩胡笳屢悽斷征蓬未肯還漢塞史記匈奴傳單于既入漢塞胡天梁簡文帝阻歸賦隴樹饒風胡天少色大漠班固燕然山銘經磧鹵絶大漠李周翰註大漠沙漠也孤烟直庾信詩野戍孤烟起埤雅古之烽火用狼糞取其烟直而聚雖風吹之不斜或謂邊外多廻風其風迅急裊烟沙而直上親見其景者始知直字之佳蕭闗史記正義蕭闗今古隴山闗在原州平凉縣界元和郡縣志蕭闗故城在原州平高縣東南三十里漢書文帝十四年匈奴入蕭闗殺北地都尉是也候騎史記候騎至雍甘泉何遜詩侯騎出蕭闗追兵赴馬邑燕然後漢書車騎將軍竇憲出鷄鹿塞度遼將軍竇鴻出棝楊塞南單于出滿夷谷與北匈奴戰於稽落山大破之追至和渠北鞮海竇憲遂登燕然山刻石勒功而還太平寰宇記燕然在振武軍金河縣北近磧入塞圖云郎君戍又直北三千里至燕然山又北行千里至瀚海輿地廣記單于大都䕶府金河縣有燕然山東漢竇憲勒銘於此晚春閨思河嶽英靈集作春閨新妝可憐色落日巻羅帷羅河嶽英靈集作簾鑪氣清珍簟鑪一作淑牆隂上玉墀春蟲飛網户暮雀隠花枝向晚多愁思閒牕桃李時珍簟謝朓詩珍簟清夏室輕扇動凉颸網户楚辭網户朱綴刻方連些王逸註網户綺文縷也戲題示蕭氏外甥憐爾解臨池渠爺未學詩老夫何足似弊宅倘因之蘆笋穿荷葉穿顧元緯本凌本俱作藏菱花罥鴈兒郄公不易勝莫著外家欺臨池晉書衛恒傳張伯英臨池學書池水盡黑弊宅晉書魏舒少孤為外家寗氏所養寗氏起宅相宅者云當出貴甥祖母以魏氏甥小而慧意謂應之舒曰當為外祖成此宅相郄公世説王子敬兄弟見郄公躡屐問訊甚修外甥禮及嘉賔死皆著髙屐儀容輕慢命坐皆云有事不暇坐既去郄公慨然曰使嘉賔不死䑕子敢爾秋夜獨坐唐詩正音作冬夜書懐誤獨坐悲䨇鬢空堂欲二更雨中山果落燈下草蟲鳴白髪終難變黄金不可成欲知除老病惟有學無生黄金江淹詩丹砂信難學黄金不可成待儲光羲不至重門朝巳啓起坐聽車聲要欲聞清佩方將出户迎曉鐘鳴上苑疎雨過春城了自不相顧臨堂空復情空復情謝朓詩嬋娟空復情聽宫鶯春樹繞宫牆春鶯囀曙光文苑英華作宫鶯次第翔欲驚啼暫斷移處弄還長隠葉棲承露攀花出未央攀一作排游人未應返為此思故鄉文苑英華作為此始思鄉承露咸陽古跡圖漢承露臺在秦磁石門外未央西京雜記漢髙帝七年蕭相國營未央宫因龍首山製前殿建北闕早朝桞暗百花明春深五鳳城城烏睥睨曉烏文苑英華作鴉宫井轆轤聲方朔金門侍侍文苑英華作召班姬玉輦迎仍聞遣方士東海訪蓬瀛睥睨釋名城上垣曰睥睨廣雅睥睨女牆也轆轤韻㑹轆轤井上汲水木方朔漢書東方朔待詔金馬門稍得親近班姬漢書成帝游於後庭欲與班婕妤同輦載婕妤辭玉輦潘岳籍田賦天子乃御玉輦方士史記封禪書天子使方士入海求蓬萊安期生之屬蓬瀛列子渤海之東不知幾億萬里有大壑焉實惟無底之谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無減焉其中有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊其下髙下周旋三萬里其頂平處九千里山之中間相去七萬里以為隣居焉其上臺觀皆金玉其上禽獸相純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉愚公谷三首原註青龍寺與黎昕戲題愚谷與誰去唯將黎子同非須一處住不那兩心空寧問春將夏誰論西復東不知吾與子若箇是愚公吾家愚谷裏吾顧可久本作愚此谷本來平雖則行無跡還能響應聲不隨雲色暗只待日光明緣底名愚谷都由愚所成借問愚公谷與君聊一尋不尋翻到谷此谷不離心行處曾無險看時豈有深寄言塵世客何處欲歸臨歸臨一作窺林雜詩䨇燕初命子五桃初作花初一作新作凌本作結王昌是東舍宋玉次西家小小能織綺時時出浣紗親勞使君問南陌駐香車五桃鮑照詩中庭五株桃一株先作花王昌成按唐人詩中多用王昌事上官儀詩南國自然勝掌上東家復是憶王昌李義山詩王昌只在牆東住未必金堂得免嫌韓偓詩何必苦勞魂與夢王昌只在此牆東襄陽耆舊傳王昌字公伯為東平相散騎常侍早卒婦任城王曹子文女昌弟式為渡遼將軍長史婦尚書令桓楷女昌母聰明有教典二婦入門皆令變服下車不得踰侈後楷子嘉尚魏主欲金縷衣見式婦嘉止之曰其嫗嚴固不得倍爾不須持往犯人家法其畏如此似非挑逹之流也葢别是一人然他書無考宋玉登徒子賦宋玉曰天下之佳人莫若楚國楚國之麗者莫若臣里臣里之美者莫若臣東家之子増之一分則太長減之一分則太短著粉則太白施朱則太赤眉如栁羽肌如白雪腰如束素齒如含貝嫣然一笑惑陽城迷下蔡然此女登牆三年窺臣三年至今未許也織綺梁武帝詩莫愁十三能織綺過秦皇墓秦文苑英華作始年時年十五文苑英華作時二十古墓成蒼嶺幽宫向紫臺星辰七曜隔河漢九泉開有海人寧渡無春鴈不迴更聞松韻切疑是大夫哀秦皇墓漢書秦始皇帝𦵏於驪山之阿下錮三泉上崇山墳其髙五十餘丈周圍五百有餘石椁為游館人膏為燈燭水銀為江海黄金為鳬鴈珍寳之藏機械之變棺槨之麗官館之盛不可勝原水經注秦始皇大興厚葬營建冡壙於麗戎之山一名藍田其隂多金其陽多玉始皇貪其美名因而葬焉斬山鑿石下涸三泉以銅為椁旁行周迴三十餘里上畫天文星宿之象下以水銀為四瀆百川五岳九州具地理之勢宫觀百官竒器珍寶充滿其中以人魚膏為燈燭取其不滅者乆之後宫無子者皆使殉𦵏甚衆墳高五丈周圍五里餘作者七十萬人積年方成史記正義括地志云秦始皇陵在雍州新豐縣西南十里長安志秦始皇陵在臨潼縣東一十五里國志曰始皇陵有銀蠶金雁以多竒物故俗云秦王地市闗中記曰秦始皇陵在驪山之北高數十丈周六里今在隂平縣界三輔故事曰始皇陵七百步以明珠為日月魚膏為脂燭金銀為鳬雁金蠶三十箔四門施徼奢侈太過六年之間為項籍所發兩京道理記曰陵高一千二百四十尺内院周五里外院周十一里俗呼當陵紫臺江淹恨賦紫臺稍逺李善註紫臺猶紫宫也吕延濟註紫臺宫也天子所居處七曜初學記日月五星謂之七曜九泉木華海賦吹烱九泉李善註地有九重故曰九泉故太子太師徐公輓歌四首功徳冠羣英彌綸有大名軒皇用風后傅説是星精就第優遺老來朝詔不名留侯常辟榖常一作嘗何苦不長生徐公劉昫唐書天寳八載閏六月戊辰太子太師徐國公蕭嵩薨輓歌杜氏通典漢髙帝時齊王田横自殺其故吏不敢哭泣但隨柩叙哀而後代相承以為輓歌葢因於古也李周翰文選註便輓柩者歌之因呼為輓歌也風后帝王世紀黄帝夢大風吹天下之塵垢皆去帝悟而嘆曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉於是依占而求之得風后於海隅登以為相傅説莊子傅説得之以相武丁奄有天下乗東維騎箕尾而比於列星就第漢書鴻嘉元年張禹以老病乞骸骨上加優再三乃聽許賜安車駟馬黄金百斤罷就第以列侯朝朔望宋祁唐書嵩本傳帝委嵩擇相嵩推韓休及休同位峭正不相假至校曲直帝前嵩慚乞骸骨帝慰之曰朕未厭卿何庸去乎嵩伏曰臣待罪宰相爵位既極幸陛下未厭得以乞身有如厭臣首領且不保又安得自遂因流涕帝為改容曰卿言切矣朕未能决苐歸夕當有詔俄遣髙力士詔嵩曰朕將爾留而君臣誼當有始有卒者乃授尚書右丞相與休皆罷不名漢書髙皇帝褒賞元功相國蕭何邑户既倍又蒙殊禮奏事不名入殿不趨留侯史記留侯曰願棄人間事欲從赤松子遊耳乃學辟榖導引輕身劉昫唐書嵩本傳嵩性好服餌及罷相於林園植藥合鍊自適謀猷為相國翊贊奉乗輿贊一作戴乗文苑英華作宸劍履升前殿貂蟬託後車齊侯疏土宇漢室頼圖書僻處留田宅仍纔十頃餘謀猷書君陳爾有嘉謀嘉猷則入告爾后於内爾乃順之於外曰斯謀斯猷惟我后之徳又文侯之命越小大謀猷罔不率從乗輿賈誼新書天子車曰乘輿十六國春秋天子以四海為家故行曰乗輿止曰行在唐六典凡夷夏之通稱天子曰皇帝服御曰乗輿行幸曰車駕劍履史記於是乃令蕭何賜帶劍履上殿入朝不趨隋書禮儀志大臣優禮皆劍履上殿貂蟬後漢書侍中中常侍加黄金璫附蟬為文貂尾為飾章懐太子註應劭漢官曰説者以金取堅剛百鍊不耗蟬居髙飲潔口在腋下貂内勁捍而外温潤因此物生義也隋書禮儀志貂蟬按漢官内侍金蟬左貂金取剛固蟬取髙潔也董巴志曰内常侍右貂金璫銀附蟬内書令亦同此今宦者去貂内史令金蟬右貂納言金蟬左貂開皇時加散騎常侍在門下者皆有貂蟬唐六典註貞觀初置散騎常侍二員𨽻門下省明慶三年又置員外𨽻中書省始有左右之號並金蟬珥貂左散騎與侍中左貂右散騎右中書令右貂謂之八貂託後車魏文帝與吳質書從者鳴笳以啓路文學託乗於後車劉良註託附也齊侯按春秋齊國屬青州不屬徐州而唐之徐州彭城郡又是宋地非齊地右丞用齊侯字未詳疏土宇漢書黔布傳疏爵而貴之張晏註疏分也後漢書黄瓊傳大啓土宇開地七百圖書漢書沛公至咸陽諸將皆爭走金帛財物之府分之蕭何獨先入收秦丞相御史律令圖書藏之沛公具知天下阨塞户口多少强弱處明所疾苦者以何得秦圖書也田宅漢書蕭何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢母為勢家所奪舊里趍庭日新年置酒辰聞詩鸞渚客賦獻鳳樓人北闕辭明主闕顧可乆本文苑英華俱作首東堂哭大臣猶思御朱駱不惜汙車茵鸞渚客傅咸詩䨇鸞游蘭渚劉昫唐書嵩本傳嵩子華時為工部侍郎衡以主壻三品嵩皤然就養十餘年家財豐贍衣冠榮之鳳樓列仙傳蕭史者秦穆公時人也善吹蕭能致孔雀白鶴於庭穆公有女字弄玉好之公遂以女妻焉日教弄玉作鳳鳴居數年吹似鳳聲鳳凰來止其屋公為作鳳臺夫婦止其上不下數年一旦皆隨鳳凰飛去唐書公主列傳元宗女新昌公主下嫁蕭衡北首禮記故死者北首生者南鄉孔頴達正義體魄降入於地為隂故死者北首歸隂之義東堂杜氏通典摯虞決疑註云國家為同姓王公妃主發哀於東堂為異姓公侯都督發哀于朝堂北史魏晉以來親臨多闕至于戚臣必于東堂哭之汙車茵漢書丙吉為丞相馭吏嗜酒數逋蕩嘗從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹苐忍之此不過汗丞相車茵耳乆踐中台座終登上將壇誰言斷車騎言文苑英華作將空憶盛衣冠風日咸陽慘笳簫渭水寒無人當便闕應罷太師官中台晉書天文志三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開徳宣符也西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司祿主兵上將壇劉昫唐書嵩本傳開元十五年涼州刺史河西節度王君㚟恃衆每嵗攻擊吐蕃吐蕃大將悉諾邏恭祿及燭龍莽布支攻陷𤓰州城執刺史田元獻及君㚟父壽盡取城中軍資及倉糧仍毁其城而去又攻玉門軍及常樂縣無何君㚟又為迴紇諸部殺之於鞏筆驛河隴震駭乃以嵩為兵部尚書河西節度使判涼州事嵩乃請以裴寛郭虚巳牛仙客在其幕下又請以建康軍使左金吾將軍張守珪為𤓰州刺史修築州城招輯百姓令其復業時悉諾邏恭祿威名甚振嵩乃縱反間於吐蕃言其與中國潛通贊普遂召而誅之明年秋吐蕃大下悉末朗復率衆攻𤓰州守珪出兵擊走之隴右節度使鄯州都督張志亮引兵至青海西南馮波谷與吐蕃接戰大破之八月嵩又遣副將杜賔客率弩手四千人與吐蕃戰於祁連城下自晨至暮散而復合賊徒大潰臨陣斬其副將一人散走山谷哭聲四合露布至𤣥宗大悦乃加嵩同中書門下三品恩顧莫比十七年又加兼中書令自十四年燕國公張説罷中書令後缺此位四年而嵩居之常帶河西節度遙領之笳簫曹植與呉質書觴酌陵波於前笳簫發音於後太師宋書太師太傅太保是為三公論道經邦爕理隂陽無其人則闕唐六典太師太傅太保非道徳崇重則不居其位無其人則闕之故西河郡杜太守輓歌三首天上去西征雲中䕶北平生擒白馬將連破黑雕城忽見芻靈苦苦顧可乆本文苑英華俱作善徒聞竹使榮空留左氏傳誰繼卜商名西河郡唐書地理志河東道有汾州西河郡雲中史記正義括地志云雲中故城在勝州榆林縣東北四十里秦雲中郡北平史記正義幽州漁陽縣東南七十里北平城即漢古北平也白馬將史記有白馬將出䕶其兵李廣上馬與十餘騎奔射殺白馬將而復還芻靈禮記塗車芻靈自古有之明器之道也鄭康成註芻靈束茅為人馬謂之靈者神之類竹使漢書初與郡守為銅虎符竹使符應劭曰竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五師古曰與郡守為符者謂各分其半右留京師左以與之史記索隠漢舊儀銅虎符發兵長六寸竹使符出入徴發左氏傳晉書杜預立功之後從容無事乃躭思經籍為春秋左氏經傳集解又參考衆家譜第謂之釋例又作盟㑹圖春秋長厯備成一家之學比老乃成卜商史記卜商字子夏少孔子四十四嵗孔子既没子夏居西河教授為魏文侯師元和郡縣志汾州西河郡禹貢冀州之域其在虞舜十二州及周皆屬并州春秋時為晉地後屬魏謂之西河子夏居西河謂此也返葬金符守守劉本顧可乆本俱作宇非同歸石窌棲棲一本作妻為是巻衣悲畫翟持翣待鳴雞容衛都人慘山川駟馬嘶猶聞隴上客相對哭征西金符謝朓思歸賦拖銀黄之沃若剖金符之陸離金符即銅虎符也事見前首竹使註中石窌左傳齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰鋭師徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也予之石窌杜預註石窌邑名濟北盧縣東有地名石窌巻衣衣謂殯宫前所陳設之靈衣殯將出故巻而藏之即謝朓齊敬皇后哀策文所云爼徹三獻筵巻六衣之義或引䘮大紀北面三號巻衣投于前此則始死之儀非興殯之事矣畫翟禮記夫人揄狄鄭康成註翟雉名刻繪而畫之著於衣以為飾因以為名也孔頴達正義云揄讀如搖狄讀如翟謂畫搖翟之雉于衣謂三夫人及侯伯夫人也持翣周禮大䘮持翣禮記喪大記黼翣二黻翣二畫翣二鄭康成註漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其像柄長五尺車行使人持之而從既窆樹于壙中檀弓曰周人牆置翣是也孔穎達正義云翣形似扇以木為之在路則障車入椁則障柩凡有六枚二畫為黼二畫為黻二畫為雲氣禮器云天子八翣諸侯六大夫四釋各翣齊人謂扇為翣此似之也象翣扇為清涼也翣有黼有畫各以其飾名之也鳴雞潘安仁哀永逝文聞雞鳴兮戒朝咸驚號兮撫膺容衛庾子山入重陽閣詩北原風雨散南宫容衛疏又子山周大將軍趙公墓誌銘山河滿目容衛靈歸盧思道彭城王挽歌容衛儼未歸空山照秋月所謂容衛未詳其義或謂後漢書祭遵傳有朱輪容衛介士軍陣送葬之文章懐太子註容車容飾之車像生時也容衛恐亦是此義成按庾信祀方澤歌有川澤茂祉丘陵容衛之句右丞曲江侍宴應制詩有草樹連容衛山河對冕旒之句顧况宫詞有玉階容衛宿千官風獵青旂曉仗寒之句則非送葬之儀矣北史廣陽王嘉性好儀飾車服鮮華既居儀同又任端首出入容衛道路榮之則容衛即是儀衛之義矣征西浚漢書耿秉傳肅宗拜秉征西將軍遣案行涼州邊境勞賜保塞羗胡永元三年卒匈奴聞秉卒舉國號哭或至梨面流血塗芻去國門祕器出東園太守留金印夫人罷錦軒旌旄轉衰木蕭鼓上寒原墳樹應西靡長思魏闕恩塗芻釋名塗車以泥塗為車也芻靈束草為人馬靈名之也祕器漢書孔霸薨上素服臨弔者再至賜東園秘器後漢書鄧皇后紀新野君薨贈以長公主赤綬東園秘器玉衣繡衾章懐太子註東園署名屬少府主作凶器故言祕也錦軒漢書西域傳馮夫人錦車持節服䖍註錦車以錦衣車也西靡聖賢塚墓記東平思王歸國思京師後薨葬東平其塚上松栢皆西靡魏闕淮南子神游魏闕之下髙誘註魏闕王者門外闕也所以懸教民之書於象魏也嵬嵬髙大故曰魏闕故南陽夫人樊氏輓歌二首錦衣餘翟黻黻一作茀繡轂罷魚軒淑女詩長在夫人法尚存凝笳隨曉斾行哭向秋原歸去將何見誰能返㦸門翟茀詩翟茀以朝毛萇傳翟翟車也夫人以翟羽飾車孔潁達正義茀車蔽也婦人乗車不露見車之前後設障以自隠蔽謂之茀因以翟羽為之繡轂張正見詩金門四姓聚繡轂五香來魚軒左傳歸夫人魚軒杜預註魚軒夫人車以魚皮為飾淑女子貢詩傳文王之妃姒氏思得淑女以共内職賦闗睢夫人法世説王汝南少無婚自求郝普女司空以其癡㑹無婚處任其意便許之既婚果有令姿淑徳生東海遂為王氏母儀王司徒婦鍾氏女太傅曾孫亦有俊才女徳鍾郝為娣姒雅相親重鍾不以貴陵郝郝亦不以賤下鍾東海家内則郝夫人之法京陵家内範鍾夫人之禮凝笳謝朓詩凝笳翼髙葢李善註徐引聲謂之凝張銑註凝笳其聲凝咽也笳簫也行哭禮記内人皆行哭失聲㦸門鄭司農周禮註棘門以㦸為門後人稱㦸門本此石窌恩榮重金吾車騎盛將朝每贈言入室還相敬疊鼓秋城動懸旌寒日映不言長不歸環佩猶將聽金吾後漢書光武至長安見執金吾車騎甚盛因嘆曰仕宦當作執金吾將朝左傳伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難相敬後漢書龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔懸旌陸機辨亡論懸旌江介築壘遵渚環佩後漢書后紀居有保阿之訓動有環佩之響達奚侍郎夫人寇氏輓歌二首劉本顧可乆本俱作送奚侍郎夫人寇氏非文苑英華題上多吏部二字束帶將朝日鳴環映牖辰能令諫明主明一作皇相勸識賢人勸文苑英華作助遺挂空留壁迴文日覆塵金蠶將畫栁何處更知春達奚侍郎按唐書楊國忠傳有禮部侍郎達奚珣是其人也後為河南尹降祿山受偽署賊平伏誅鳴環劉孝綽詩曵綃爭掩榖搖佩奮鳴環遺挂潘岳悼亡詩流芳未及歇遺挂猶在壁吕延濟註遺挂謂平生玩用之物尚在於壁迴文晉書竇滔妻蘇氏始平人也名蕙字若蘭善屬文滔符堅時為秦州刺史被徙流沙蘇氏思之織錦為迴文旋圖詩以贈滔宛轉循環以讀之辭甚悽惋凡八百四十字金蠶南史王元謨傳元謨從弟元象位下邳太守好發塚地無完槨人間垣内有小塚墳上殆平每朝日初升見一女子立塚上近視則亡或以告元象便命發之有一棺尚全有金蠶銅人以百數始興簡王傳於益州園地得古塚無復棺但有石槨銅器十餘種並古形玉璧三枚珍寳甚多不可皆識金銀為蠶蛇形者數斗宜都王傳於時人發桓温女塜得金巾箱織金篾為嚴器又有金蠶銀蠒等物甚多史記正義括地志云齊桓公墓在臨淄縣南二十一里牛山上晉永嘉末人發之初得板次得水銀池有氣不得入經數日乃牽犬入中得金蠶數十箔珠襦玉匣繒綵軍器不可勝數畫桞釋名輿棺之車曰轜其葢曰桞柳聚也衆飾所聚亦其形僂也亦曰鼈甲以鼈甲亦然也孔潁達禮記正義按喪大記註云在旁曰帷在上曰荒皆所以衣桞則以帷荒之内木材為桞其實帷荒及木材等總名曰桞故縫人云衣翣柳之材註云柳之言聚諸飾之所聚是帷荒總稱桞也女史悲彤管夫人罷錦軒卜塋占二室占文苑英華作瞻行哭度千門秋日光能澹寒川波自翻波文苑英華作浪一朝成萬古松栢暗平原彤管毛萇詩傳古者后夫人必有女史彤管之法不記過其罪殺之杜預左傳註彤管赤管筆女史記事規誨之所執後漢書后紀女史彤管記功書過恭懿太子輓歌五首何悟藏環早纔知拜璧年翀天王子去對日聖君憐樹轉宫猶出笳悲馬不前雖蒙絶馳道京兆别開阡恭懿太子劉昫唐書恭懿太子佋肅宗第十二子至徳二載封興王上元元年六月薨佋皇后張氏所生上尤鍾愛后屢危太子欲以興王為儲貳㑹薨而止七月丁亥詔曰厚禮所以飾終易名所以表行况情鍾天屬寵及侯封載疇加等之美式備元儲之贈永懐軫念有惻彝章第十二子故興王佋毓慶璿源分華若木天資純孝神假聰明河間聚書㓜聞樂善之㫖延陵聽樂早得知音之妙頃以暫嬰沉瘵殆積旬時而資敬益彰穎悟逾爽愛親之戀言不間於斯須告訣之辭事先符於夢寐顧惟至性實切深哀將祚土析珪載崇藩翰聞詩對易爰就琢磨方冀成立豈期夭喪瑤英始茂遽摧於當春隙駟俄遷忽沉於厚夜興言痛悼閔惜良深宜賁寵於青宫俾哀榮於𤣥穸可贈太子謚曰㳟懿應緣喪葬所司凖式仍令京兆尹劉晏充監䕶使詔宰臣李揆持節册命十一月葬於髙陽原其哀册曰維上元元年太嵗庚子六月巳未朔二十六日甲申皇第十二子持節鳳翔等四州節度觀察大使興王佋薨於中京内邸殯於寢之西階粤八月丁亥册贈皇太子廟號恭懿冬十一月庚寅詔葬於長安之髙陽原禮也燕隧開封龍輼進轍陳祖載而就位儼塗芻以成列皇帝哀玉林之閟景憫璿蕚之惟霜瞻龍綍而増思懐鴈池而永傷考謚惟古褒崇有式爰詔史司恭宣懿徳其辭曰惟天祚唐累葉重光中興宸景再紐乾剛本枝建國磐石疏疆克開龍嗣實曰賢王驪源孕彩日幹騰芳深仁廣徳藴藝含章秀發童年惠彰齓齒蹈禮知方承尊叶㫖對日流辯占鳳擅美魯衛後塵間平絶軌戎孽初搆王師未班爰從襁褓載厯險艱愛備中掖名崇懿藩居常稟訓動不違顔禮及佩觽朝加分器胙土延渥登壇受帥玉質金聲文經武緯樂善為寳崇儒是貴濬哲外朗温文内深閲書成誦觀樂表音五經在口六律諧心才優藝洽絶古超今蛇豕猶梗寰區未乂滌慮祈真焚香演偈食去葷血心依定惠庶福邦家俾清兇穢霧露嬰疾聰明害神沉疴始遘彌曠盈旬止慮無擾發言有倫在膏方亟問膳逾勤雲物告徴星辰變象楚藥無救秦毉莫仗靈儀窅而上賔徽音邈其長往違舊邸於青社即幽陵於黄壤嗚呼哀哉魂氣奪兮去何之精靈存兮孝有思念君親之永隔託夢寐而來辭延桂宫而震悼貫椒壼而纒悲旌遺芳於碣館賁新命於儲闈嗚呼哀哉先遠戒候占龜獻吉指鶉野而西臨背鳳城而右出天惨慘而若霧山蒼蒼而曀日望馳道而長辭赴幽塗而永畢嗚呼哀哉生為寵王兮宸愛所鍾殁追上嗣兮朝典斯崇升玉笙於洞府閲銀棨於泉宫金石誰固人生有終簡册攸記兮徳音無窮敢直詞於篆美庶永代而成風嗚呼哀哉佋薨時年八嵗既薨之夕肅宗張后俱夢佋有如平昔拜辭流涕而去帝方寢疾追念過深故特以儲闈之贈寵之唐㑹要㳟懿太子沿陵在京兆府長安縣界藏環晉書羊祜年五嵗時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物也云何持去乳母具言之李氏悲惋時人異之謂李氏子則祜之前身也拜璧左傳楚共王無冢適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭使五人齋而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆壓紐翀天用周靈王太子晉事孫綽游天台山賦王喬控鶴以沖天詳見五巻浮丘公註中對日晉書明帝㓜而聰哲為元帝所寵異年數嵗嘗坐膝前屬長安使來因問帝曰汝謂日與長安孰近對曰長安近不聞人從日邊來居然可知也明日宴羣臣又問之對曰日近元帝失色曰何乃異間者之言乎對曰舉頭見日不見長安由是益竒之馳道漢書成帝紀上嘗急召太子出龍樓門不敢疾馳道西至直城門得絶乃度還入作室門上遲之問其故以狀對上大悦乃著令令太子得絶馳道云應劭曰馳道天子所行道也若今之中道師古註絶横度也京兆阡謂京兆尹别開墓道也或引漢書原涉傳内京兆阡事非是蘭殿新恩切椒宫夕臨幽白雲隨鳳管明月在龍樓人向青山哭天臨渭水愁雞鳴常問膳今恨玉京留蘭殿顔延年元皇后哀策文蘭殿常隂椒塗弛衛李善註漢武故事曰帝以七月七日旦生於猗蘭殿椒宫漢官儀皇后稱椒房以椒塗室亦取温煖除惡氣也三輔黄圖椒房殿在未央宫以椒和泥塗取其温而芬芳也臨臨力鴆切作林字去聲讀杜預左傳註臨哭也問膳禮記文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜食上必在視寒煖之節食下問所膳命膳宰曰末有原應曰諾然後退騎吹凌霜發旌旗夾路陳愷容金節䕶愷一作禮册命玉符新傅母悲香褓君家擁畫輪射熊今夢帝今顧元緯本作非秤象問何人騎吹海錄碎事列於殿庭者為鼓吹今之從行鼓吹為騎吹玉符唐六典隨身魚符之制左二右一太子以玉親王以金庶官以銅佩以為飾傅母列女傳下堂則從傅母保阿褓説文褓小兒衣也畫輪晉書輿服志畫輪車駕牛以綵漆畫輪轂故名曰畫輪車上起四夾杖左右開四望綠油幢朱絲絡青交路其上形制事事如輦其下猶如犢車耳至尊出朝堂舉哀乗之射熊史記趙簡子疾五日不知人寤而語大夫曰我之帝所甚樂有一熊欲來援我帝命我射之中熊熊死又有一熊來我又射之中熊熊死帝甚喜賜我二笥皆有副秤象魏志鄧哀王沖傳時孫權曾致巨象太祖欲知其斤重訪之羣下咸莫能出其理沖曰致象大船之上而刻其水㾗所至稱物以載之則校可知矣太祖大悦即施行焉蒼舒留帝寵子晉有仙才五嵗過人智三天使鶴催心悲陽祿館陽一作四非目斷望思臺若道長安近何為更不來蒼舒魏志鄧哀王沖字蒼舒少聰察岐嶷生五六嵗智意所及有若成人之智太祖數對羣臣稱述有欲傳後之意年十三建安十三年疾病太祖親為請命及亡哀甚文帝寛喻太祖太祖曰此我之不幸而汝曹之幸也三天雲笈七籖三天者清微天禹餘天大赤天是也天寶君治在玉清境即清㣲天也其氣始清靈寳君治在上清境即禹餘天也其氣𤣥黄神寳君治在太清境即大赤天也其氣𤣥白陽祿館班媫妤傷悼賦痛陽祿與柘館兮仍襁褓而離灾服䖍註二館名也生子此館皆失之也師古註二觀並在上林中望思臺漢書戾太子傳上憐太子無辜乃作思子宫為歸來望思之臺於湖顔師古曰言巳望而思之庶太子之魂歸來也其臺在今湖城縣之西閺鄉之東基址猶存西望昆池濶東瞻下杜平山朝豫章館樹轉鳳凰城五校連旗色千門疊鼓聲金環如有驗還向畫堂生西望沈約詩南瞻儲胥觀西望昆明池首聫葢學其句昆池三輔黄圖漢昆明池武帝元狩四年穿在長安西南周圍十里西南夷傳曰天子遣使求身毒國市竹而為昆明所閉天子欲伐之越嶲昆明國有滇池方三百里故作昆明池以象之以習水戰因名曰昆明池食貨志曰時越欲與漢用船戰遂乃大修昆明池也三輔舊事曰昆明池地三百三十二頃圖曰上林苑有昆明池周匝四十里長安志昆明池在長安縣西二十里今為民田下杜漢書宣帝紀率常在下杜孟康註在長安南師古註下杜即今之杜城長安志下杜城在長安縣南一十五里其城周三里一百七十三歩春秋左氏傳晉范宣子曰昔丐之祖在周為唐杜氏杜預註曰周成王滅唐遷之於杜為杜伯國記曰周宣王四十三年杜伯入為王卿士無罪而王殺之史記曰秦武公十一年初縣杜即此地也括地志曰葢宣王殺杜伯以後子孫㣲弱附於秦及春秋後武公滅之為縣漢宣帝修杜之東原為陵曰杜陵縣更名此為下杜城廟記曰下杜城杜伯所築東有杜原城在底下故曰下杜雍錄秦武公滅杜以杜國為杜縣縣之東有原名為東原宣帝以為巳陵故東原之地遂為杜陵縣也既有杜陵縣則名稱與杜縣相混遂改杜縣為下杜以别之或言杜縣之東有杜原而此之下杜在其下方故以下杜各此全不審也豫章館三輔黄圖豫章觀武帝造在昆明池中亦曰昆明觀班固西都賦集乎豫章之宇臨乎昆明之池吕延濟註豫章館名也張衡西京賦豫章珍館揭焉中峙薛綜註以豫章木為臺館也五校漢書霍光傳發材官輕車北軍五校士軍陣至茂陵以送其葬按後漢書百官志有屯騎校尉越騎校尉歩兵校尉長水校尉射聲校尉皆屬北軍中候所謂五校也章懐太子順帝紀註以長水歩兵射聲胡騎車騎五校尉為五校誤也畫堂三輔黄圖太子宫有甲觀畫堂漢書曰孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂畫堂謂宫殿中彩畫之室成按五詩中羊祜事凡二用晉明帝事凡二用王子晉事凡三用魏鄧哀王事凡二用右丞全不以此為詩病若使今人下筆爾爾有不訾其儉於書巻者乎王右丞集箋注巻九
