body:
  text: 王右丞集箋注巻十仁和趙殿成撰近體詩二十六首奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制文苑英華作奉和御製從蓬萊宫向興慶閣道中作渭水自縈秦塞曲塞文苑英華作甸黄山舊繞漢宫斜鑾輿迥出仙門栁仙唐詩正音唐詩品彚俱作千閣道迴㸔上苑花迴文苑英華作遙雲裏帝城䨇鳳闕雨中春樹萬人家為乗陽氣行時令不是宸游重物華重顧元緯本凌本唐詩品彚俱作翫蓬萊雍録大明宫南端門名丹鳯在平地門北三殿相踏皆在山上至紫宸又北則為蓬萊殿殿北有池亦云蓬萊池興慶劉昫唐書興慶宫在東内之南隆慶坊本𤣥宗在藩時宅也自東内逹南内有夾城複道經通化門逹南内人主徃來兩宮人莫知之唐會要開元二年七月二十九日以興慶里舊邸為興慶宫初上在藩邸與宋王等同居於興慶里時人號曰五王子宅至景龍末宅内有龍池湧出日以浸廣望氣者云有天子氣中宗數行幸其地命泛舟以馳象蹈氣以厭之至是為宫焉後於西南置樓西面題曰花蕚相輝之樓南面題曰勤政務本之樓長安志南内興慶宫距外郭城東垣武后大足元年睿宗在藩賜為五王子宅明皇始居之宅臨大池中宗時望氣者云此池有天子氣故嘗游宴此池上已泛舟以厭之南街東出春明門開元三年置宫因本坊為名十四年又取永嘉勝業坊之半増廣之謂之南内置朝堂十六年以宫成御朝徳音釋徒以下罪二十年築夾城入芙蓉園自大明宫東夾羅城複道經通化門以逹此宫次經春明延喜門至曲江芙蓉園而外人不之知也閣道史記周馳為閣道自殿下直抵南山張衡西京賦鉤陳之外閣道穹隆吕向註閣道飛陛也黄山漢書地理志右扶風槐里縣有黄山宫孝惠二年起漢書揚雄傳北繞黄山瀕渭而東三輔黄圖黄山宫在興平縣西三十里水經渭水又東北逕黄山宫南酈道元注即地理志所謂縣有黄山宫惠帝三年起者也東方朔傳曰武帝微行西至黄山宫故世謂之游城非也鑾輿班固西都賦乘鑾輿備法駕陽氣後漢書郎顗傳方春東作布徳之元陽氣開發養導萬物王者因天視聼奉順時氣宜務崇溫柔遵其行令成按結句言天子之出本為陽氣暢逹順天道而巡游以行時令非為賞玩物華因事進規深得詩人温厚之㫖可為應制體之式大同殿生玉芝龍池上有慶雲百官共覩聖恩便賜宴樂敢書即事生字一本作柱産二字上字下一本多神光照殿四字敢文苑英華作因欲笑周文歌宴鎬遙輕漢武樂横汾遙凌本作還豈如玉殿生三秀如顧元緯本凌本唐詩品彚俱作知詎有銅池出五雲陌上堯樽傾北斗樓前舜樂動南薫共歡天意同人意萬嵗千秋奉聖君大同殿唐六典興慶宫之西曰興慶門次南曰金門門内之北曰大同門其内曰大同殿玉芝劉昫唐書天寳七載三月乙酉大同殿柱產玉芝有神光照殿八載六月大同殿又產玉芝一莖龍池唐詩紀事龍池興慶宫池也明皇潛龍之地雍錄帝王之興悉著符瑞理固有之然而傅㑹者多也𤣥宗之名與隆慶坊舊宅相符固可命以為瑞矣六典所記曰宅有井怱湧為小池周袤數十丈常有雲氣或黄龍出其中至景雲間潛復出水其沼浸廣里中人悉移居遂鴻洞為龍池焉開元初以為離宮後又増廣遂為南内其正殿名大同殿殿之東北即有龍池殿蓋主此池以為之名也然予詳而考之長安志曰龍池在躍龍門南本是平地自埀拱初載後因雨水流潦成小流後又引龍首渠波分溉之日以滋廣至景龍中彌亘數頃深至數丈常有雲龍之祥後因謂之龍池志又曰龍首渠者隋城外東南角有龍首堰隋文帝自北堰分滻水北流至長樂陂西北分為二渠其西渠自永嘉坊西南流經興慶宫吕圖亦著滻水入興慶池路則是興慶之能變平地以為龍池者實引滻之力人力勝而舊池改故始時數尺乆乃數頃不難也至六典所紀乃言初時井溢已乃泉生合二水以成此池則全沒導滻之實而專以歸諸變化也六典者中書令張九齡之所領撰巳上而罷令李林甫繼之仍加註以奏凡此掩飾増損實皆註文而本文無之則是諂辭皆出林甫而非九齡之所得知也以其人想之則飾虛成有自可見矣宴鎬成按詩經王在在鎬豈樂飲酒本武王事謂為周文者誤也然考宋之問幸昆池應制詩亦云鎬飲周文樂汾歌漢武才豈唐人相襲作周文事用耶横汾漢武帝秋風辭上行幸河東祀后土顧視帝京欣然中流與羣臣飲燕上欣甚乃自作秋風辭曰秋風起兮白雲飛草木黄落兮㕍南歸蘭有秀兮菊有芳懷佳人兮不能忘泛樓船兮濟汾河橫中流兮揚素波簫鼓鳴兮發棹歌歡樂極兮哀情多少壯㡬時兮奈老何水經注漢武帝行幸河東濟汾河作秋風辭於斯水之上三秀楚辭采三秀兮於山間王逸註三秀謂芝草也銅池按漢書宣帝紀元康四年金芝九莖産於函徳殿銅池中師古註銅池承霤是也以銅為之與龍池義不合亦疑有誤五雲文人多謂慶雲五色為五雲或引周禮保章氏之五雲入註者非是堯樽杜審言詩堯尊隨歩輦舜樂繞行麾北斗楚辭援北斗兮酌桂漿王逸註斗謂玉爵南薰家語昔者舜彈五絃之琴造南風之詩其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮勅賜百官櫻桃原註時為文部郎中芙蓉闕下㑹千官紫禁朱櫻出上蘭總是寢園春薦後總文苑英華作纔非闗御苑鳥銜殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不須愁内熱愁文苑英華作憂大官還有蔗漿寒蔗文苑英華作柘文部唐書百官志吏部郎中二人正五品上天寳十一載改吏部曰文部至徳二載復舊芙蓉闕車􅛴詩重闗如隠起雙闕似芙蓉庾信詩長虹雙瀑布圓闕兩芙蓉紫禁謝莊宣貴妃誄收華紫禁李善註王者之宫以象紫微故謂宫中為紫禁吕延濟註紫禁即紫宫天子所居也朱櫻左思蜀都賦朱櫻春熟顔師古漢書註櫻桃即今之朱櫻也禮記謂之含桃爾雅謂之荆桃本草圖經櫻桃其實熟時深紅色者謂之朱櫻紫色皮裏有細黄㸃者謂之紫上蘭三輔黄圖上林苑有上蘭觀寢園寢寢廟園園陵也三輔黄圖孝文太后孝昭太后皆有寢園演繁露古不墓祭祭必於廟廟皆有寢故也凡廟列諸寢前寢則位乎廟後以象人君之前朝後寢也凡寢之有衣冠几杖象生之具者即在廟之寢也秦人始於墓側立寢漢世因之諸陵皆有園寢春薦成按月令仲夏之月天子乃以雛嘗黍羞以含桃先薦寢廟淮南吕覽諸書皆同唐李綽嵗時記云四月一日内園進櫻桃寢園薦訖頒賜百官各有差亦是孟夏事惟漢書叔孫通傳云古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟師古曰禮記曰仲春之月羞以含桃先薦寢廟即此櫻桃也今所謂朱櫻者是也右丞詩中用春薦字當是其時雖四月一日而節令未改尚在暮春否則因師古之註而誤也鳥銜髙誘吕氏春秋註含桃櫻桃鶯鳥所含食故言含桃史記索隠張揖云櫻桃一名含桃吕氏春秋云鶯鳥所含故云含桃爾雅謂之荆桃也青絲籠陌上桑古辭青絲為籠係桂枝為籠鉤赤玉􅌉藝文類聚史云後漢明帝於月夜宴羣臣於照園太官進櫻桃以赤瑛為盤賜羣臣月下視之盤與櫻桃同色羣臣皆笑云是空盤内熱食療本草櫻桃食多無損但發虛熱耳蔗漿楚辭臑鼈炮羔有柘漿些王逸註柘藷蔗也取藷蔗之汁為漿飲也漢書禮樂志泰尊柘漿析朝酲應劭註柘漿取甘柘汁以為飲也柘與蔗同同詠右補闕崔興宗未央朝謁正逶迤天上櫻桃錫此時朱實初傳九華殿繁花舊雜萬年枝全勝晏子江南橘全諸本皆作未非是今從文苑英華唐詩紀事作全莫比潘家大谷梨聞道令人好顔色神農本草自應知逶迤成按説文逶迤袤去之貌從移爾切韻㑹逶迤行貌從唐何切皆與本韻不合且義亦難通當是委蛇之訛作委曲自得解為是九華殿博物志西王母遣使乘白鹿告帝當來乃供帳九華殿以待之初學記洛陽宫殿簿有九華殿晏子橘説苑晏子將使荆荆王聞之謂左右曰晏子賢人也今方來欲辱之何以也左右對曰為其來也臣請縛一人過王而行於是荆王與宴子立語有縳一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盜王曰齊人固盜乎晏子反顧之曰江南有橘齊王使人取之而樹之於江北生不為橘乃為枳所以然者何其土地使之然也今齊人居齊不盜來之荆而盜得無土地使之然乎荆王曰吾欲傷子而反自中也大谷梨潘岳閒居賦張公大谷之梨劉良註洛陽張公居大谷有夏梨海内惟此一樹好顔色陶宏景名醫别録櫻桃調中益脾氣令人好顔色美志勅借岐王九成宫避暑應教丈苑英華於避暑下多之作二字帝子遠辭丹鳳闕天書遙借翠㣲宫隔牕雲霧生衣上巻幔山泉入鏡中林下水聲喧語笑巖間樹色隠房隴仙家未必能勝此何事吹笙向碧空笙二顧本凌本唐詩品彚俱作蕭九成宫雍録九成宫在鳯翔府麟游縣本隋仁夀宫文帝以避暑每嵗春徃冬還文帝竟終於此宮太宗欲以宫奉髙祖髙祖惡之不徃貞觀五年太宗自修繕以備清暑改為九成宫陜西志九成宫其趾在麟游縣城西五里之天台山丹鳳闕唐六典大明宫南面五門正南曰丹鳳門丹鳯門内正殿曰含元殿翠㣲宫爾雅釋山云未及上翠㣲郭璞註近上旁陂邢昺疏謂未及頂上在旁陂陀之處名翠微一説山氣青縹色故曰翠微也右丞所謂翠微宫蓋取此意與終南山之翠微宫無涉吹笙用周靈王太子晉事見五巻浮丘公註中和賈舍人早朝大明宫之作絳幘雞人送曉籌送唐詩鼓吹唐詩品彚俱作報尚衣方進翠雲裘九天閶闔開宫殿天文苑英華作重萬國衣冠拜冕旒日色纔臨仙掌動色瀛奎律髓作影香煙欲傍衮龍浮朝罷須裁五色詔珮聲歸向鳳池頭向凌本瀛奎律髓唐詩品彚俱作到大明宫長安志大明宫在禁苑之東南南接京城之北面西接宫城之東北隅南北五里東西三里貞觀八年置為永安宫城九年改曰大明宫以備太上皇清暑百官獻貲財以助役龍朔三年大加興造號曰蓬萊宫咸亨元年改曰含元宫尋復大明宮初髙宗命司農少卿梁孝仁制造此宫北據髙原南望爽塏每天晴日朗南望終南山如指掌京城坊市街陌俯視如在檻内蓋甚髙爽也絳幘漢官儀宫中輿臺並不得畜雞夜漏未明三刻雞鳴衛士候於朱雀門外著綘幘專傳雞唱雞人周禮雞人夜嘑旦以嘂百官尚衣唐書百官志尚衣局奉御二人直長四人掌供冕服几案翠雲裘宋玉諷賦主人之女翳承日之華披翠雲之裘九天吕氏春秋中央曰鈞天東方曰蒼天東北曰變天北方曰𤣥天西北曰幽天西方曰顥天西南曰朱天南方曰炎天東南曰陽天仙掌三輔黄圖廟記曰神明臺武帝造祭仙人處上有承露盤有銅仙人舒掌捧銅盤玊盃以承雲表之露以露和玊屑服之以求仙道長安記仙人掌大七圍以銅為之五色詔鄴中記石虎詔書以五色紙著鳯雛口中鳯池晉書荀勗拜中書監乆之以朂守尚書令朂乆在中書專管機事及失之甚惘惘悵悵或有賀之者朂曰奪我鳯凰池諸君賀我耶通典魏晉以來中書監令掌贊詔命記㑹時事典作文書以其地在樞近多承罷任是以人固其位謂之鳯凰池焉早朝大明宫呈兩省僚友賈至銀燭朝天紫陌長禁城春色曉蒼蒼千條弱桞垂青瑣百囀流鶯遶建章劍佩聲隨玉墀歩衣冠身惹御爐香共沐恩波鳳池裏裏唐詩品彚作上朝朝染翰侍君王兩省杜氏通典時謂尚書省為南省門下中書為北省亦謂門下省為左省中書省為右省或通謂之兩省成按至徳二年十月肅宗入京師明年改元乾元是時賈至為中書舍人杜甫為右拾遺皆有史傳嵗月可證王維之為中書舍人為給事岑參之為右補闕其嵗月無考要亦當在是時皆兩省官也是年六月甫貶華州司功參軍則四詩之唱和正在乾元元年戊戌之春中也紫陌劉孝綽詩紆餘出紫陌迤邐度青樓御爐唐書儀衛志朝日殿上設黼扆躡席熏爐香案同和杜甫五夜漏聲催曉箭九重春色醉仙桃旌旗日暖龍蛇動宫殿風㣲燕雀髙朝罷香烟攜滿袖詩成珠玉在揮毫欲知世掌絲綸美池上于今有鳯毛原註舍人先世掌絲綸五夜陸倕新漏刻銘六日無辨五夜不分李善註衛宏漢舊儀曰晝漏盡夜漏起省中用火中黄門持五夜甲夜乙夜丙夜丁夜戊夜也九重椘辭君之門以九重絲綸禮記王言如絲其出如綸王言如綸其出如綍唐書賈曽傳𤣥宗為太子遴選宫僚以曽為舍人俄擢中書舍人以父嫌名不拜徙諫議大夫知制誥開元初復拜中書舍人曽固辭議者謂中書乃曹司非官稱嫌名在禮不諱乃就職與蘇晉同掌制誥皆以文辭稱時號蘇賈子至從𤣥宗幸蜀拜起居舍人知制誥厯中書舍人鳳毛世説王敬倫丰姿似父作侍中加授桓公公服從大門入桓公望之曰大奴固自有鳯毛南齊書謝超宗祖靈運宋臨川内史父鳯超宗好學有文辭盛得名譽解褐奉朝請新安王子鸞孝武帝寵子超宗以選補王國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞曰超宗殊有鳯毛恐靈運復出同和岑參雞鳴紫陌曙光寒鶯囀皇州春色闌金闕曉鐘開萬户玉階仙仗擁千官花迎劍佩星初落桞拂旌旗露未乾獨有鳳凰池上客陽春一曲和皆難皇州謝眺詩春色滿皇州張銑註皇州帝都也玉階班固西都賦玉階彤庭張銑註玉階以玉飾階也花桞成按朱晦菴謂唐時殿庭間皆植花栁故杜子美詩有退朝花底散歸院栁邉迷之句岑詩用花栁字亦其一證陽春新序客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽陵採薇國中屬而和者數百人其為陽春白雪國中屬而和者數十人而已也引商刻羽雜以流徴國中屬而和者不過數人是其曲彌髙者其和彌寡毛西河曰丙午年避人在湖西長至夜飲施愚山使君官舍愚山偶論王維岑參杜甫和賈至早朝詩惟杜甫無法坐客怫然予解曰徐之徃有客亦主此説予責其或過客曰不然律法極細吾苐論其粗者律律也既題早朝則雞鳴曉鐘衣冠閶闔律法如是矣王維歉於岑參者岑能以花迎栁拂陽春一曲補舍人原唱春色二字則王稍減耳其他則無不同者何則律故也杜即不然王母仙桃非朝事也堂成而燕雀賀非朝時境也五夜便日暖耶舛也且日暖非早時也若夫旌旗之動宫殿之髙未嘗朝者也曰朝罷亂也詩成與早朝半四句乏主客也如是非律矣予時無以應然則愚山之論此豈過耶愚山大喜遂書其説以作記成按早朝四作氣格雄深句調工麗皆律詩之佳者結句俱用鳯池事惟老杜獨别此其妙處不容掩者也若評較全篇定其軒輊則岑為上王次之杜賈為下雖蘇子瞻所賞在旌旗日暖二句楊誠齋所取在花迎劔佩一聯文人愛尚各有不同讀西河毛氏之説其優劣固已判矣但謂王母仙桃非朝時之事燕雀相賀非朝時之境二語猶有未當處仙桃即殿廷所植之桃以其託根禁地故曰仙桃迎晨而春色濃酣天然如醉與王母仙桃迥焉無涉燕雀每於天光煥發之後髙飛四散此句詠早字甚得然寫作宫殿間景致未免荒凉耳要之於堂成而燕雀賀之説杳不相干也以此見訾未免過苦若其餘之所論駁豈為無當或者必欲不祧工部反訾岑王二作賔處太詳主處太略不如杜作後四句全注意舍人為得和詩體者豈非溺愛而反蹈不明之過哉或嫌右丞四用衣冠之字未免冗雜亦屬吹毛求疵洗垢索瘢善言詩者正不必拘拘於此至瀛奎律髓以京師蹀血之後瘡痍未復而四人誇美朝儀如此譏其已泰宋人腐語尤屬可嗤和太常韋主簿五郎温湯寓目湯凌本唐詩鼓吹唐詩品彚俱作泉漢主離宫接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度樹一作市小苑城邊獵騎迴聞道甘泉能獻賦懸知獨有子雲才太常主簿唐書百官志太常寺有主簿二人從七品上溫湯唐書地理志京兆府昭應縣有宫在驪山下貞觀十八年置咸亨二年始名溫泉宫天寳六載更温泉宫曰華清宮治湯井為池環山列宫室又築羅城置百司及十宅長安志溫湯在臨潼縣南一百五十步驪山之西北雍州圖曰温湯在新豐縣界溫谷即溫泉也三秦記曰驪山湯舊説以三牲祭乃得入可以去疾消病不爾即爛人肉俗云始皇與神女戯不以禮神女唾之即生瘡始皇怖謝神女為出溫泉而洗除後人因以為驗漢武帝故事曰驪山湯初始皇砌石起宇至漢武又加修飾焉十道志曰今按泉有三所其一處即皇堂石井周武帝天和四年大冢宰宇文䕶所造隋文帝開皇三年又修屋宇列樹松栢千餘株貞觀十八年詔左屯衛大將軍姜行本將作少匠閻立徳營建宫殿御湯名湯泉宫太宗臨幸製碑咸亨二年名溫泉宫天寳六載改為華清宫驪山上下益治湯井為池臺殿還列山谷明皇嵗幸焉又築會昌城即於湯所置百司及公卿邸第焉離宫三輔黄圖離宫天子出游之宫也露臺漢書文帝紀帝嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為師古曰今新豐縣南驪山之頂有露臺鄉極為髙顯猶有文帝所欲作臺之處括地志新豐縣南驪山上猶有露臺之舊址翼奉傳云孝文露臺其積土基至今猶存甘泉賦漢書揚雄字子雲孝成帝時客有薦雄文似相如者上方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風懸知庾信詩懸知曲不誤無事畏周郎蔡寛夫詩話樂天聽歌詩長愛夫憐第二句請君重唱夕陽開註云謂王右丞辭秦川一半夕陽開此句尤佳今摩詰集此詩所謂漢主離宫接露臺是也題乃是和太常韋主簿溫湯寓目不知何所指為想夫之辭大抵唐人歌曲不隨聲為長短句多是五言或七言取其辭與聲相疊成音耳豈非當時文人之辭為一時所稱者皆為歌人竊取而播之曲調乎楊升菴曰予嘗愛王維溫泉寓目贈韋五郎詩夫唐至天寳宫室盛矣秦川八百里而夕陽一半開則四百里之内皆離宫矣此言可謂肆而隠奢麗若此而猶以漢文惜露臺之費比之可謂反而諷末句欲韋郎效子雲之賦則其諷諌可知也言之無罪聞之可戒得揚雄之㫖者其王維乎成按詩以寓目命題則前六句皆即目中之所見而言也漢主句紀其所見宫室之富而并及其地秦川句紀其所見風景之麗而兼記其時青山碧澗之句乃寓目於近而言其所見者如此新豐小苑之句乃寓目於逺而詠其所見者又如此末則歸美韋郎以見屬和之意詩之大旨不過爾爾温湯接近露臺本是驪山實境其曰漢主者以漢武曽於此修飾堂宇故遂以漢主離宫為言何嘗有反諷之意乎夕陽未落或為雲霞所覆其餘輝所及徃徃半有半無今登髙望逺時一遇之不知楊氏有何創見而謂四百里之内皆離宫耶夫以秦皇之淫侈而史傳所記宮室之廣三百餘里唐又復過之則其淫侈又駕秦皇而上之矣果見何書何傳而為此言耶甘泉獻賦唐人習用執此而言諷諌尤屬迂談且賦云屏玉女却虙妃者以指趙昭儀也倘好事者於此比類而及之曰右丞并以此諌明皇當疏逺玉環吾知楊氏聞此必以為實獲我心也詩人之錦心繡腸夫豈有玲瓏曲折若此者而乃以此厚誣古人歟苑舍人能書梵字兼逹梵音皆曲盡其妙戱為之贈文苑英華本無皆字為字之字名儒待詔滿公車才子為郎典石渠蓮花法藏心懸悟貝葉經文手自書楚辭共許勝揚馬梵字何人辨魯魚故舊相望在三事願君莫厭承明廬苑舍人唐書藝文志苑咸京兆人開元末上書拜司經校書中書舍人貶漢東郡司户參軍復起為舍人終永陽太守名儒後漢書謝該善明春秋左氏為世名儒公車漢書東方朔初來上書文辭不遜髙自稱譽上偉之令待詔公車師古註公車令屬衛尉上書者所詣也後漢書光武帝紀公卿司𨽻州牧舉賢良方正各一人遣詣公車章懐太子註公車門名公車所在因以名焉漢宫儀曰公車掌殿司馬門天下上事及徵召皆總領之石渠三輔黄圖石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名所藏入闗所得秦之圖籍至於成帝又於此藏祕書焉三輔舊事石渠閣在未央宫大殿北以藏祕書法藏法華經阿難常為侍者䕶持法藏貝葉酉陽雜俎貝多出摩伽陁國長六七丈經冬不凋此樹有三種一者多羅娑力又貝多二者多棃娑力又貝多三者部娑力义多羅棃並書其葉部誾一色取其皮書之貝多是梵語漢翻為葉貝多羅力又者漢書葉樹也西域經書用此三種皮葉若能保䕶亦得五六百年魯魚抱朴子諺曰書三寫魚成魯虛為虎三事鄭康成毛詩箋以三事大夫為三公承明廬漢書君厭承明之廬勞侍從之事張晏註承明廬在石渠閣外直宿所止曰廬陸機洛陽記承明門後宫出入之門吾常怪謁帝承明廬問張公張公云魏明帝作建始殿朝會皆由承明門荅詩并序苑咸王員外兄以予嘗學天竺書有戱題見贈然王兄當代詩匠又精禪理枉採知音形於雅作輒走筆以酬焉且乆未遷因而嘲及蓮花梵字本從天華省仙郎早悟禪三㸃成伊猶有想一觀如幻自忘荃為文己變當時體入用還推間氣賢應同羅漢無名欲故作馮唐老嵗年梵字西域記詳其文字梵天所製原始埀則四十七言遇物合成隨事轉用法苑珠林昔造書之主凡有三人長名曰梵其書右行次曰佉盧其書左行少者蒼頡其書下行梵佉盧居於天竺黄史蒼頡在於中夏梵佉取法於淨天蒼頡因華於鳥跡文畫誠異傳理則同矣仰尋先覺所説有六十四書鹿輪轉眼筆制區分龍鬼八部字體殊式准梵及佉盧為世勝文故天竺諸國謂之天書西方寫經同祖梵文然三十六國徃徃有異譬諸中土猶有篆籕之變體乎又云佛生天竺彼土士族婆羅門者總稱為梵梵者清淨也承引光音色天其光音天梵世最為下劫初来此食地肥者身重不去因即為人仍其本名故稱為梵語言及書既象於天是以彼云梵書梵語華省潘岳秋興賦獨展轉于華省三㸃成伊佛書伊字如草書下字按湼槃經何等名為祕宻之藏猶如字三㸃若並則不成伊縱亦不成如摩醢首羅面上三目乃得成伊三㸃若别亦不得成伊我亦如是解脱之法亦非湼槃如來之身亦非湼槃摩訶般若亦非湼槃三法各異亦非湼槃我今安住如是三法為衆生故名入湼槃如世伊字一觀如幻菩薩瓔珞經觀一切法如空如幻忘荃莊子荃者所以在魚得魚而忘荃言者所以在意得意而忘言陸徳明註荃七全反香草也可以餌魚間氣春秋演孔圖正氣為帝間氣為臣羅漢四十二章經常行二百五十戒進止清淨為四真道行成阿羅漢阿羅漢者能飛行變化曠劫夀命住動天地隋書羅漢者出入生死去來隠顯而不為累馮唐史記馮唐以孝著為中郎署長事文帝拜為車騎都尉景帝立以唐為楚相免武帝求賢良舉馮唐唐時年九十餘不能復為官乃以唐子馮遂為郎重酬苑郎中并序部原註時為庫員外頃輒奉贈忽枉見訓叙末云且久不遷因而嘲及詩落句云應同羅漢無名欲故作馮唐老嵗年亦解嘲之類也類凌本作意何幸含香奉至尊多慚未報主人恩草木豈能酬雨露豈顧元緯本凌本俱作盡榮枯安敢問乾坤仙郎有意憐同舍丞相無私斷掃門揚子解嘲徒自遣馮唐已老復何論含香宋書漢官云尚書郎口含雞舌香以其奏事荅對欲使其氣息芬芳也夢溪筆談日華子云雞舌香治口氣所以三省故事郎官日含鷄舌香欲其奏事對荅其氣芬芳掃門史記魏勃少時欲求見齊相曹參家貧無以自通乃嘗獨早夜掃齊相舍人門外舍人怪之以為物而伺之得勃勃曰願見相君無因故為子掃欲以求見於是舍人見勃曹參因以為舍人解嘲漢書揚雄傳哀帝時丁傳董賢用事諸附離之者或起家至二千石時雄方草太𤣥有以自守泊如也或嘲雄以𤣥尚白而雄解之號曰解嘲酬郭給事洞門髙閣靄餘暉桃李隂隂栁絮飛禁裏疎鐘官舍晚官凌本作客晚唐詩正音作曉省中啼鳥吏人稀晨搖玉珮趨金殿晨一作朝夕奉天書拜瑣闈奉一作捧天凌本作丹强欲從君無那老那一作奈將因臥病解朝衣洞門漢書董賢傳重殿洞門師古註洞門謂門門相對也官舍史記陳豨傳邯鄲官舍皆滿省中漢書昭帝紀共養省中伏儼註蔡邕云本為禁中門閤有禁非侍衛之臣不得妄入孝元皇后父名禁避之故曰省中師古曰省察也言入此中皆當察視不可妄也瑣闈劉昭後漢書註漢舊儀曰黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎宫閣簿青瑣門在南宫衛瓘註呉都賦曰青瑣户邊青鏤也一曰天子門内有眉格再重裏青畫曰瑣那韻會那語助也乃箇切音與奈同後漢書韓康傳公是韓伯休那章懐太子註那語餘聲也音乃賀反解朝衣張協詩抽簪解朝衣散髮歸海隅既䝉宥罪旋復拜官伏感聖恩竊書鄙意兼奉簡新除使君等諸公忽䝉漢詔還冠冕始覺殷王解網羅日比皇明猶自暗天齊聖夀未云多花迎喜氣皆知笑皆知一作猶能鳥識歡心亦解歌聞道百城新佩印還來雙闕共鳴珂解網史記湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃命去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及禽獸花笑史通俗文士謂鳥鳴為啼花發為笑酌酒與裴迪酌酒與君君自寛人情翻覆似波瀾白首相知猶按劍朱門先達笑彈冠草色全經細雨濕經文苑英華作輕花枝欲動春風寒世事浮雲何足問不如髙卧且加餐酌酒鮑照行路難酌酒以自寛舉盃斷絶歌路難波瀾陸機詩休咎相乘躡翻覆若波瀾先達韓非子管仲鮑叔相謂曰齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先達者相收彈冠漢書王吉與貢禹為友世稱王陽在位貢禹彈冠言其取舍同也王弇州曰摩詰七言律自應制早朝諸篇外徃徃不拘常調至酌酒與君一篇四聮皆用反法此是初盛唐所無又云右丞此篇與岑嘉州嬌歌急管雜青絲銀燭金尊映翠眉使君地主能相送河尹天明坐莫辭春城月出人皆醉野戍花深馬去遲寄聲報爾山翁道今日河南異昔時蘇子瞻我行日夜見江海楓葉蘆花秋興長平淮忽迷天逺近青山乆與船低昂夀州己見白石塔短棹又轉黄茅岡波平風軟望不到故人乆立天蒼茫八句皆抝體也然自有唐宋之辨成按草色一聯乃是即景托諭以衆卉而邀時雨之滋以竒英而受春寒之痼即植物一類且有不得其平者况世事浮雲變幻又安足問耶擬之六義可比可興輞川别業不到東山向一年歸來纔及種春田雨中草色綠堪染水上桃花紅欲然欲劉本作亦優婁比丘經論學傴僂丈人鄉里賢披衣倒屣且相見相歡語笑衡門前欲然梁元帝詩杯間花欲然竹徑露初圓優婁比丘佛之弟子有優樓頻螺迦葉梵語優樓頻螺漢翻木𤓰癃以胷前有癃如木瓜故也釋氏要覽梵語云比丘秦言乞士謂上於諸佛乞法資益慧命下于施主乞食資益色身經論釋氏以佛所説者為經菩薩所言者為律聲聞所著者為論傴僂丈人莊子仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而惟蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎倒屣魏志王粲徙長安左中郎將蔡邕見而竒之時邕才學顯著貴重朝廷常車騎塡巷賔客盈坐聞粲在門倒屣迎之早秋山中作中顧可乆本作居無才不敢累明時思向東溪守故籬不厭向平婚嫁早不顧元緯本凌本俱作豈却嫌陶令去官遲草堂蛩響臨秋急蛩文苑英華作蟲山裏蟬聲薄暮悲聲文苑英華作鳴寂寞柴門人不到空林獨與白雲期期一作歸向平髙士傳尚長字子平河内朝歌人也隠居不仕建武中男女嫁娶既畢敕斷家事勿相闗當如我死也於是遂肆意與同好北海禽慶俱游五嶽名山竟不知所終蛩韻㑹蛬爾雅蟋蟀蛬一曰蜻蛚今促織也亦曰趨織集韻通作蛩積雨輞川莊作積文苑英華作秋莊衆玅集作秋歸輞川作積雨空林烟火遲蒸藜炊黍餉東葘漠漠水田飛白鷺隂隂夏木囀黄鸝山中習靜觀朝槿松下清齋折露葵清文苑英華作行野老與人爭席罷海鷗何事更相疑事一作處蒸藜爾雅翼毛詩義疏曰萊藜也莖葉皆似王芻今兖州蒸以為茹謂之萊蒸習靜何遜詩習靜悶衣巾讀書煩几案梁朱超詩當夏苦炎埃習靜對花臺朝槿埤雅木槿似李五月始花月令木槿榮是也花如葵朝生夕隕一名舜蓋瞬之義取於此王僧孺詩妾意在寒松君心逐朝槿露葵宋玉諷賦烹露葵之羹曹植七啓芳菰精稗霜蓄露葵張銑註蓄與葵宜于霜露之時爭席列子楊朱南之沛至梁而遇老子老子曰而睢睢而盱盱而誰與居大白若辱盛徳若不足楊朱蹙然變容曰敬聞命矣其徃也舍者迎將家公執席妻執巾櫛矣舍者避席煬者避竈其反也舍者與之爭席詩人玉屑云杜少陵詩云兩箇黄鸝鳴翠柳一行白鷺上青天王維詩云漠漠水田飛白鷺隂隂夏木囀黄鸝極盡寫物之工李肇國史補云王維有詩名然好竊取人文章佳句行到水窮處坐看雲起時英華集中詩也漠漠水田飛白鷺隂隂夏木囀黄鸝李嘉祐詩也石林詩話詩云下雙字極難須使五言七言之間除去五字三字外精神興致全見於兩言方為工妙唐人記水田飛白鷺夏木囀黄鸝為李嘉祐詩王摩詰竊取之非也此兩句好處正在添漠漠隂隂四字此乃摩詰為嘉祐㸃化以自見其妙如李光弼將郭子儀軍一號令之精采數倍不然嘉祐本句但是詠景耳人皆可到竹坡老人詩話云摩詰四字下得最為穏切成按諸家采選唐七言律者必取一詩壓巻或推崔司勲之黄鶴樓或推沈詹事之獨不見或推杜工部之玉樹彫傷昆明池水老去悲秋風急天髙等篇呉江周篆之則謂冠冕莊麗無如嘉州早朝澹雅幽寂莫過右丞積雨澹齋翁以二詩得廊廟山林之神髓取以壓巻眞足空古準今要之諸詩皆有妙處譬如秋菊春松各擅一時之秀未昜辨其優劣或有揚此而抑彼多由覽者自生分别耳質之與論未必僉同也過乗如禪師蕭居士嵩丘蘭若無著天親弟與兄嵩丘蘭若一峰晴食隨鳴磬巢鳥下行踏空林落葉聲迸水定侵香案濕雨花應共石牀平深洞長松何所有儼然天竺古先生嵩丘藝文類聚俗説曰傅亮北征在黄河中埀至洛遙見嵩髙山於時同從客在坐問傅曰潘安仁懐舊賦云前瞻太室旁眺嵩丘嵩丘太室故是一山何以言旁眺亮曰有嵩丘山去太室七十里此是寫書誤耳河南郡圖經嵩丘在縣西南十五里無著天親稽古要録初天竺國無著大士頻昇知足天宫咨參慈氏惟識宗旨及其弟天親菩薩生西度羅閲國發明大乘遂相興製論通塞志天竺國無著出世闡教其弟天親所造小乘論五百部後因無著開悟復造大乘論五百部世稱千部論師翻譯名義無著是初地菩薩天親之兄佛滅千年從彌沙塞部出家迸水法苑珠林晉潯陽廬山西有龍泉精舍即慧逺沙門之所立也逺始南度愛其區丘欲創寺宇未知定方遣諸弟子訪履林澗疲息此地羣僧並渇率同立誓曰若使此處宜立精舍當願神力即出佳泉乃以杖掘地清泉湧出遂畜為池因構堂宇雨花法華經佛説此經已結跏趺坐入於無量義處三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆古先生西昇經老子西昇開道竺乾號古先生善入無為不終不始永存綿綿李榮註竺乾者西域之國名也號古先生者謂無上大道先天而生故曰古先生即老子之别號也春日與裴廸過新昌里訪吕逸人不遇昌唐詩鼓吹作豐桃源一向絶風塵一向顧元緯本凌本俱作四面唐詩正音唐詩鼓吹唐詩品彚俱作面面絶唐詩鼓吹作少桞市南頭訪隠淪到門不敢題凡鳥看竹何須問主人城外青山如屋裏外一作上東家流水入西鄰閉户著書多嵗月著文苑英華作看種松皆老作龍鱗諸本皆作種松皆作老龍鱗今從文苑英華唐詩紀事本凡鳥世説稽康與吕安善每一相思千里命駕安後來值康不在喜出户延之不入題門上作鳯字而去喜不覺猶以為欣故作鳯字凡鳥也看竹晉書王徽之傳時呉中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘯良乆主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去閉户著書後漢書王充以為俗儒守文多失其眞乃閉門潛思絶慶弔之禮户牖牆壁各置刀筆著論衡八十五篇二十餘萬言同詠裴廸恨不逢君出荷蓑青松白屋更無他陶令五男曾不有蔣生三徑任相過芙蓉曲沼春流滿薜荔成帷晚靄多聞説桃源好迷客不如髙枕眄庭柯枕唐詩紀事作臥荷蓑小雅爾牧來思何蓑何笠何荷古通用五男陶淵明責子詩白髮被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒已二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子埀九齡但覔梨與栗天運茍如此且進杯中物三徑見七巻求羊蹤註芙蓉楚辭章句芙蓉荷花也薜茘楚辭九歌罔薜茘兮為帷爾雅翼薜茘狀如烏韭而生於石上食之止心痛亦縁木生在屋曰昔耶在牆曰垣衣今薜茘葉厚實而圓多蔓好敷巖石上若罔故云罔薜茘兮為帷也或夤縁上木古木之上有絶大者開花結實其實上鋭而下平外青而中瓤經霜則瓤紅而甘烏鳥所啄兒童亦食之謂之木饅頭亦曰之鬼饅頭其狀如餅餌中饅頭也食發瘴庭柯歸去來辭引壺觴而自酌眄庭柯以怡顔送方尊師歸嵩山仙官欲往九龍潭徃文苑英華作住旄節朱旛倚石龕旄顧元緯本凌本俱作毛山壓天中半天上洞穿江底出江南瀑布杉松常帶雨杉松凌本作松杉夕陽彩翠忽成嵐彩一作蒼借問迎來䨇白鶴已曾衡嶽送蘓耽仙官葛洪神仙傳欲舉形登天上補仙官當用金丹九龍潭一統志龍潭在登封縣東二十五里嵩頂之東九潭相接其深莫測登封縣志九龍潭在太室東巖之半山巔衆水咸歸於此蓋一大峽也峽作九疊每疊結為一潭遞相灌輸水色洞黑其深無際崖㟧險峻波濤怒激登臨者至此輒凜然生畏焉有石記戒人游龍潭者勿語笑以黷神龍龍怒則有雷恐旄節眞誥老君佩神虎之符帶流金之鈴執紫毛之節巾金精之巾紫陽眞人内傳衍門子乘白鹿執羽蓋杖青毛之節侍從十餘玉女朱旛劉孝綽詩月殿曜朱旛風輪和寳鐸蘇耽成按水經註洞仙傳所載蘇耽事皆無衡嶽白鶴之説唯葛洪神仙傳有蘇仙公所載事跡略同當是一人也其傳有云先生灑掃門庭修飾牆宇友人曰有何邀迎荅曰仙侣當降俄頃之間乃見天西北隅紫雲氤氲有數十白鶴飛翔其中翩翩然降於蘇氏之門皆化為少年儀形端美如十八九嵗怡然輕舉先生斂容逢迎乃跽白母曰某受命當仙被召有期儀衛已至當違色養即便拜辭云云豈即此事乎送楊少府貶彬州明到衡山與洞庭若為秋月聽猿聲愁看北渚三湘近近顧可乆夲唐詩鼓吹俱作客唐詩正音唐詩品彚俱作逺惡説南風五兩輕青草瘴時過夏口白頭浪裏出湓城出唐詩正音作見長沙不乆留才子賈誼何須弔屈平彬州唐書地理志彬州桂陽郡屬江南西道衡山水經注湘水又北逕衡山縣東山在西南有三峰一名紫蓋一名容峰容峰最為竦傑自逺望之蒼蒼隠天故羅含云望若陣雲非清霽素朝不見其峰丹水湧其左澧泉流其右山經謂之岣嶁山為南嶽也括地志衡山一名岣嶁山在衡州湘潭縣西四十一里方輿勝覽南嶽一名衡山在潭州衡山縣西三十里晉因山以名郡湘中記度應斗衡位值離宫故曰南嶽又名霍山爾雅疏泰與岱衡與霍皆一山有二名南嶽記衡山者朱陵之靈臺太虛之寳洞上承翼軫鈐總萬物故名衡山下踞離宫統攝火師故號南嶽赤帝館其嶺祝融宅其陽逮於軒轅以潛霍二山副焉長沙志軒翔聳㧞九千餘丈尊卑差次七十二峰巖洞溪澗泉石之勝交錯於中又有數十洞十五巖三十八泉二十五溪九池九潭六源八橋九井三穿三漏此最著者北渚水經注馮水出臨賀郡馮乘縣東北馮岡其水導源西北流縣馮谿以託名焉馮水帶約衆流渾成一川謂之北渚楚辭帝子降兮北渚青草瘴廣州記地多瘴氣夏為青草瘴秋為黄茅瘴王友琢崖謂彬州夏口皆在嶺内無有瘴氣瘴當是漲字之訛蓋謂青草湖之水漲耳元和郡縣志巴丘湖又名青草湖在巴陵縣南七十九里周迴二百六十五里俗云即古雲夢澤也一統志青草湖一名巴丘湖北連洞庭南接瀟湘東納汨羅之水毎夏秋水泛與洞庭為一水涸則此湖先乾青草生焉是其義矣湓城元和郡縣志隋文帝平陳置江州總管移理湓城古之湓口城也漢髙帝六年灌嬰所築太平寰宇記江州初理豫章郡後至成帝咸通元年移理湓城即今郡是也一統志湓城即今九江府治賈誼漢書天子議以賈誼任公卿之位綘灌東陽侯馮敬之屬盡害之迺毁誼曰雒陽之人年少初學專欲擅權紛亂諸事於是天子後亦疎之不用其議以誼為長沙王太傅誼既以適去意不自得及度湘水為賦以弔屈原屈原楚賢臣也被讒放逐作離騒賦其終篇曰已矣國亡人莫我知也遂自投江而死誼追傷之因以自喻屈平史記屈原者名平楚之同姓也成按送人遷謫用賈誼事者多矣然俱代為悲忿之詞惟李供奉巴陵贈賈舍人詩云聖主恩深漢文帝憐君不遣到長沙與右丞此篇結句俱得忠厚和平之㫖可為用事翻案法出塞作原註時為御史監察塞上作居延城外獵天驕城文苑英華作門白草連天野火燒白一作百非天文苑英華作山暮雲空磧時驅馬驅文苑英華作駐秋日平原好射鵰䕶羌校尉朝乗障破虜將軍夜渡遼玉靶角弓珠勒馬漢家將賜霍嫖姚居延城漢書地理志張掖郡有居延縣居延澤在東北古文以為流沙師古曰闞駰云武帝使伏波將軍路博徳築遮虜障於居延城括地志漢居延縣故城在甘州張掖縣東北千五百三十里太平寰宇記居延城後漢為縣廢城在今張掖縣東北本匈奴中地名也亦曰居延塞磧北邊備對幕者漠也言沙磧廣漠望之漠漠然也漢以後史家變稱為磧磧者沙積也其義一也䕶羌校尉漢官儀䕶羌校尉武帝置秩比二千石持節以䕶西羌乗障漢書上乃遣狄山乗障師古註乘登也登而守之障謂塞上險要之處别築為城因置吏士而為障蔽以扞寇也破虜將軍魏志袁術表孫堅行破虜將軍渡遼漢書遼東烏桓反以中郎將范明友為度遼將軍將北邊七郡郡千騎擊之應劭曰當度遼水徃擊之故以度遼為官號水經大遼水出塞外衛白平山東南入塞過遼東湘平縣西又東南過房縣西又東過海市縣西南入於海靶説文靶轡革也霍嫖姚漢書霍去病年十八為侍中善騎射再從大將軍大將軍受詔予壯士為票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當服䖍註票姚音飄搖師古曰票音頻妙反姚音羊召反票姚勁疾之貌也荀悦漢紀作票鷂字去病後為票騎將軍尚取票姚之字耳今讀者音飄遙則不當其義也然詩人多從服音成按王弇州甚佳此作謂非兩犯馬字足當壓巻謝廷瓚維園鉛擿以為驅馬當作驅雁引鮑照詩秋霜曉驅雁陽衒之洛陽伽藍記北風驅雁千里飛雪為證予謂驅馬射鵰皆塞外射獵之事若作驅雁則興上下句全不貫串詩中複字初盛名手徃徃不忌以此擿為瘡痏未免深文至欲改易一字以為全璧亦如無意味畫工割蕉加梅是則是矣豈妙手所謂冬景哉或謂劉夢得一詩用兩髙字蘇東坡一詩用兩耳字皆以解義不同不作重複論然觀杜工部崔評事弟許相迎不到一詩既云江閣要賔許馬迎又云醉於馬上徃來輕兩馬字全無分别古今詩律之細必推老杜杜亦不以此為忌何必鰓鰓於是乎聽百舌鳥上蘭門外草萋萋未央宫中花裏栖亦有相隨過御苑有顧元緯本凌本俱作自不知若箇向金隄入春解作千般語拂曙能先百鳥啼萬户千門應覺曉建章何必聽鳴雞百舌鳥髙誘淮南子註反舌百舌鳥也能辨反其舌變易其聲以效百鳥之鳴故謂百舌金隄子虛賦媻姍勃窣上金隄師古註金隄言水之隄塘堅如金也張衡西京賦周以金隄樹以杞柳王右丞集箋注巻十
