body:
  text: 王右丞集箋注卷十一仁和趙殿成撰近體詩二十七首奉和聖製慶𤣥元皇帝玉像之作應制明君夢帝先先文苑英華作見寶命上齊天秦后徒聞樂周王恥卜年玉京移大像金籙㑹羣仙承露調天供臨空敞御筵斗回迎壽酒山近起爐烟願奉無為化齊心學自然𤣥元皇帝杜氏通典大唐乾封元年號老君為太上𤣥元皇帝玉像劉昫唐書初太清宫成命工人于太白山採白石為𤣥元聖容又採白石為𤣥宗聖容侍立于𤣥元之右皆依王者衮冕之服綵繪珠玉為之録異記天寶中𤣥宗皇帝立𤣥元廟于長安大寧里臨淄舊邸欲塑𤣥元像夢神人曰太白北谷中有玉石可取而琢之紫氣見處是也翌日命使入谷求之山下人云旬日來常有紫氣連日不散果于其下掘獲玉石琢為𤣥元像髙二丈許又為二真人二侍童及李林甫陳希烈之形髙六尺以來雍録華清宫老君殿朝元閣之南玉石為老君像制作精絶夢帝通鑑開元二十九年上夢𤣥元皇帝告云吾有像在京城西南百餘里汝遣人求之吾當與汝興慶宫相見上遣使求得之于盩厔樓觀山間夏閏四月迎置興慶宫五月命畫𤣥元真容分置諸州開元觀秦后張衡西京賦昔者大帝悅秦穆公而覲之饗以鈞天廣樂李善注虞喜志林曰唁曰天帝醉秦暴金誤隕石墜謂秦穆公夢天帝奏鈞天樂已有此唁成按史記趙世家與百神遊于鈞天廣樂九奏萬舞不類三代之樂乃趙簡子事其引秦穆公但云我之帝所甚樂云云不言聞樂也西京賦當另有所據今無考矣卜年左傳成王定鼎于郟鄏卜世三十卜年七百天所命也金籙隋書道經者云其潔齊之法有黃籙玉籙金籙塗炭等齊唐六典齊有七名其一曰金籙大齊調和隂陽消災伏害為帝王國王延祚求福無為史記李耳無為自化清淨自正老子故聖人云我無為而民自化齊心列子黃帝退而閒居大庭之館齊心服形自然老子人法地地法天天法道道法自然奉和聖製與太子諸王三月三日龍池春禊應制應制文苑英華作之作故事修春禊新宫展豫游明君移鳯輦太子出龍樓賦掩陳王作杯如洛水流金人來捧劍畫鷁去回舟去顧元緯本凌本俱作出苑樹浮宫闕天池照冕旒宸章在雲漢漢顧元緯本凌本俱作表垂象滿皇州春禊廣韻禊祓除不祥也晉書禮志漢儀季春上已官及百姓皆禊于東流水上洗濯祓除去宿垢而自魏以後但用三日不以上已也徐廣史記三月上已臨水祓除謂之禊江總詩上巳餘春禊鳯輦唐㑹要舊制輦有七一曰大鳯輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦陳王魏志陳思王植字子建鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之洛水晉書束晳傳武帝嘗問摰虞三日曲水之義虞對曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招携之水濵洗祓遂因水以泛觴其義起此帝曰必如所談便非好事晳進曰摰虞小生不足以知臣請言之昔周公成洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏及霸諸侯因此立為曲水二漢相緣皆為盛集畫鷁子虛賦浮文鷁張揖注鷁水鳥也畫其像于船首張正見詩波中畫鷁涌帆上錦花飛奉和聖製上已于望春亭觀禊飲應制應制文苑英華作之作長樂青門外宜春小苑東樓開萬户上户文苑英華作井輦過百花中畫鷁移仙妓妓唐詩品彚作仗金貂列上公清歌邀落日妙舞向春風妙文苑英華作妍渭水明秦甸甸文苑英華作殿黃山入漢宫君王來祓禊灞滻亦朝宗萬首唐人絶句樂府詩集摘首四句題作浣沙女改輦過作人向望春亭唐書地理志京兆府萬年縣有南望春宫臨滻水西岸有北望春宫宫東有廣運潭雍録南望春亭北望春亭在禁苑東南髙原之上舊記多云望春宫其東正臨滻水也金貂隋書禮儀志武冠今左右侍臣及諸將軍武官通服之侍中常侍則加金紫馬插以貂尾黃金為飾云江淹詩金貂服元纓上公尚書庸建爾于上公晉書職官志太宰與太傅太保皆為上公唐六典三師訓導之官也其名即周之三公漢哀平間始尊師傅之位在三公之上謂之上公清歌妙舞謝朓詩清歌留上客妙舞送將歸灞滻三輔黃圗灞水出藍田谷西北入渭滻水亦出藍田谷北至霸陵入霸朝宗禹貢江漢朝宗于海孔安國傳二水經此州而入海有似于朝百川以海為宗宗尊也孔穎達正義云周禮大宗伯諸侯見天子之禮春見曰朝夏見曰宗鄭云朝猶朝也欲其來之早也宗尊也欲其尊王也朝宗是人事之名水無性識非有此義以海水大而江漢小以小就大似諸侯歸于天子假人事而言也詩沔彼流水朝宗于海鄭康成箋興者水流而入海小就大也喻諸侯朝天子亦猶是也諸侯春見天子曰朝夏見曰宗孔穎達正義朝宗者本諸侯見天子之禮臣之朝君猶水之趨海故以水流入海為朝宗也奉和聖製幸玉真公主山莊因題石壁十韻之作應制真劉本顧可久本唐詩品彚俱作霄非碧落風烟外瑶臺道路賖如何連帝苑别自有仙家比地回鑾駕比唐詩品彚作此一作匝俱非緣溪轉翠華洞中開日月窗裏發雲霞庭養冲天鶴溪流上漢查流劉本唐詩品彚俱作留種田生白玉泥竈化丹砂谷靜泉逾響山深日易斜御羮和石髓香飯進胡麻大道今無外長生詎有涯還瞻九霄上來往五雲車玉真公主按唐書公主列傳玉真公主睿宗女字持盈始封崇昌縣主太極元年為道士築觀京師以方士史崇元為師俄進號上清𤣥都大洞三景師山莊古樓觀紫雲衍慶集玉真公主與金仙公主俱入道今樓觀南山之麓有玉真公主祠堂存焉俗傳其地曰邸宫以為主家别館之遺址也然碑志湮沒圖經廢舛惟開元中戴璇樓觀碑有玊真公主師心此地之語而王維儲光羲皆有玉真公主山莊山居之詩則玉真祠堂為觀之别館審矣因盡録唐人題詠刻之祠中元祐二年歲在丁卯七月望日河東薛紹彭題碧落度人經道言昔于始靑天中碧落空歌注云東方第一天有碧霞遍滿是云碧落瑶臺拾遺記崑崙山有瑶臺十二各廣千步皆五色玉為臺基鑾駕庾肩吾詩鑾駕總朝遊翠華上林賦建翠華之旗李善注翠華以翠羽為葆也冲天鶴見九卷翀天注上漢查博物志舊說云天河與海通近世有人居海渚者年年八月有浮槎去來不失期人有竒志立飛閣于槎上多齎糧乘槎而去十餘日中猶觀日月星辰自後茫茫忽忽亦不覺晝夜去十餘月奄至一處有城郭狀屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具說來意并問此是何處答曰君還至蜀郡訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿記其年月正是此人到天河時也種玉搜神記楊公伯雍洛陽縣人也性篤孝父母亡葬無終山遂家焉山高八十里上無水公汲水作義漿于阪頭行者皆飲之三年有一人就飲以一斗石子與之使至髙平好地有石處種之云玉當生其中陽公未娶又語云汝後當得好婦語畢不見乃種其石數歲時時往視見玉子生石上人莫知也有徐氏者右北平著姓女甚有行時人求多不許公乃試求徐氏徐氏笑以為狂因戲云得白璧一雙來當聽為婚公至所種玉田中得白璧五雙以聘徐氏大驚遂以女妻公天子聞而異之拜為大夫乃于種玉處四角作大石柱各一丈中央一頃地名曰玉田石髓晉書王烈嘗得石髓如飴即自服半餘半與嵇康皆凝而為石列仙傳卭疏者周封史也煮石髓而服之謂之石鍾乳葛洪神仙傳神山五百年一開其中石髓出得而服之壽與天相畢無外莊子至道無外謂之大一九霄沈約詩鋭意三山上托慕九霄中張銑注九霄九天仙人所居處也雲笈七籖九霄九天也五雲車庾信詩東明九芝蓋北屬五雲車奉和聖製登降聖觀與宰臣等同望應制文苑英華本聖作御應制作之作又顧元緯本凌本俱無等字鳯扆朝碧落龍圖耀金鏡維嶽降二臣戴天臨萬姓山川八校滿井邑三農竟比屋皆可封誰家不相慶林疏逺村出野曠寒山靜帝城雲裏湥渭水天邊映喜氣含風景喜文苑英華作佳頌聲溢歌詠端拱能任賢彌彰聖君聖降聖觀按唐驪山宫圗降聖觀在山城門之下虢國莊在其東飲鹿槽在其西通鑑天寶七載十二月戊戌或言𤣥元皇帝降于朝元閣胡三省注𤣥宗于華清宫中起老君殿殿之北為朝元閣以或言老君降于此改為降聖閣鳯扆孔安國尚書傳扆屏風畫為斧文置户牖間謂之鳯扆者當是畫鳯于扆上也龍圖張衡東京賦龍圖授羲龜書畀姒水經注黃帝東巡河過洛修壇沉璧受龍圖于河龜書于洛赤文篆字金鏡劉孝標廣絶交論聖人握金鏡闡風烈李善注雒書曰秦失金鏡鄭元注金鏡喻明道也維嶽詩大雅嵩髙維嶽峻極于天維嶽降神生甫及申八校漢書百官公卿表中壘校尉屯騎校尉步兵校尉越騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉凡八校尉皆武帝初置三農周禮一曰三農生九穀鄭康成注鄭司農云三農平地山澤也𤣥謂三農原隰及平地比屋陸賈新語堯舜之民可比屋而封端拱北史天子端拱羣司奉職奉和聖製御春明樓臨右相園亭賦樂賢詩應制復道通長樂青門臨上路遙聞鳯吹喧暗識龍輿度龍凌本作金褰旒明四目伏檻紆三顧小苑接侯家飛甍映宫樹商山原上碧滻水林端素銀漢下天章瓊筵承湛露將非富民寵民文苑英華作人秉恕按唐人以太宗諱故以民為人右丞是作既云應制自當用人字民字疑是後人所改信以平戎故從來簡帝心詎得回天步春明樓唐六典京城東靣三門中曰春明北曰通化南曰延興右相唐書天寶元年改侍中為左相中書令為右相復道史記叔孫通傳孝惠帝為東朝長樂宫及問往來數蹕煩人乃作復道上路漢書枚乘傳游曲臺臨上路梁簡文帝詩垂隂滿上路鳯吹北山移文聞鳯吹于洛浦邱遲詩馳道聞鳯吹吕延濟注鳯吹笙也笙體似鳯故也龍輿隋煬帝詩翠霞乘鳯輦碧霧翼龍輿明四目尚書明四目達四聰孔安國傳廣視聽于四方使天下無壅塞也孔穎達正義云明四方之目使為已逺視四方也達四方之聰使為已逺聽聞四方也伏檻楚辭坐堂伏檻臨曲池些王逸注檻楯也三顧三國志諸葛亮傳先帝不以臣卑鄙猥自枉屈三顧臣于草廬之中商山杜氏通典上洛郡上洛縣有商山亦名地胏山亦名楚山四皓所隱其地險阻王莽命明威侯王級曰繞霤之固南當荆楚繞霤者言四靣塞厄屈曲水回繞而霤即今七盤十二䋫王應麟地理通釋商山在商州上洛縣南十四里商洛縣南一里滻水潘嶽西征賦南有𤣥灞素滻李善注𤣥素水色也雍録滻水源出藍田縣境之西暨稍北行至白鹿原西即趨大興城隋世自城外馬頭堰壅之向長樂坡入城西至萬年長安兩縣凡邑里宫禁苑囿多以此水為用直至霸陵乃始合霸又至新豐縣乃始同霸入渭一統志滻水在陜西西安府城東一十五里源出藍田縣合金谷水北流入灞水銀漢白氏六帖天河謂之天漢銀漢銀河河漢天津絳河明河湛露毛萇詩傳湛露天子燕諸侯也鄭康成箋燕謂與之燕飲酒也諸侯朝覲㑹同天子與之燕所以示慈惠富民史記平津侯傳治國之道冨民為要冨民之要在于節儉平戎左傳齊侯使管夷吾平戎于王使隰朋平戎于晉杜預注平和也帝心後漢書耿秉傳每公卿㑹議常引秉上殿訪以邊事多簡帝心王儉褚淵碑文績簡帝心聲敷物聽天步陸機詩粲粲光天步或謂律詩無仄韻其仄韻者乃是對偶古詩耳成謂古律之分當以調以格不當以韻唐人試士類用律詩今考張謂之落日山照曜豆盧榮之春風扇微和裴次元河儒亮之亞父碎玉斗郭雍之洛出書俱用仄韻不居然可知乎孫月峰作排律辨體特出仄律一門蓋有見于此矣奉和聖製暮春送朝集使歸郡應制萬國仰宗周衣冠拜冕旒玉乘迎大客金節送諸侯祖席傾三省褰帷向九州楊花飛上路槐色䕃通溝來預鈞天樂歸分漢主憂宸章類河漢一作宸章在雲漢垂象滿中州中一作皇朝集使唐六典凡天下朝集使皆令都督刺史及上佐更為之若邊要州都督刺史及諸州水旱成分則他官代焉皆以十月二十五日至于京師十月一日户部引見訖于尚書省與羣官禮見然後集于考堂應考績之事元日陳其貢篚于殿庭唐書禮樂志設諸州朝集使位都督刺史三品以上位于文武官三品之東西四品以下分方位于文武官當品之下宗周毛萇詩傳宗周鎬京也博物志周自后稷至于文武皆都關中號為宗周輿地廣記京兆府本周室所居謂之宗周玉乘江淹恨賦喪金輿及玉乘李善注玉乘玉輅也大客周禮大行人掌大賔之禮及大客之儀以親諸侯鄭康成注大賔要服以內諸侯大客謂其孤卿金節周禮山國用虎節土國用人節澤國用龍節皆以金為之鄭康成注諸侯使臣行俯聘則以金節授之以為行道之信也三省三省唐時以尚書省門下省中書省為三省褰帷後漢書賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎于州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震通溝左思魏都賦疏通溝以濵路羅青槐以䕃塗鈞天史記趙簡子疾五日不知人寤語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心樂當作洛音對下憂字與沈佺期稱觴獻壽樂鈞天同意中州列子從中州以東嵇康琴賦放肆大川濟乎中州李善注中州猶中國也張銑注中州帝都也奉和聖製送不蒙都護兼鴻臚卿歸安西應制上卿增命服都護揚歸斾雜虜盡朝周諸胡皆自鄶鄶文苑英華作㑹鳴笳瀚海曲按節陽關外落日下河源寒山靜秋塞靜文苑英華作盡萬方氛祲息六合乾坤大大文苑英華作太無戰是天心天心同覆載不蒙不蒙蕃將之姓郭友培元謂當是夫蒙之訛劉昫唐書髙仙芝傳有安西節度使夫蒙靈察即其人也鴻臚卿唐書百官志鴻臚寺卿一人從三品少卿二人從四品命服鄭康成毛詩箋命服者命為將受王命之服也沈約安陸昭王碑文軍麾命服之序李善注命服爵命之服也歸斾陸機詩引領望歸斾雜虜鮑照白馬篇雜虜入雲中成按雜虜朝周蓋用王㑹解中四夷大㑹之事見逸周書第九十五篇文多不載自鄶左傳自鄶以下無譏焉杜預注不復譏論之以其微也成按右丞用其字者亦取諸胡微細如曹鄶小國不足置論之意氛祲晉書阮孚傳皇澤遐被賊寇斂跡氛祲既澄日月自朗六合顔師古漢書注天地四方謂之六合三月三日曲江侍宴應制文苑英華曲江下有樓字萬乘親齊祭千官喜豫游奉迎從上苑祓禊向中流草樹連容衛山河對冕旒畫旗搖浦溆春服滿汀洲仙樂龍媒下樂顧元緯本凌本俱作籞神臯鳯蹕留從今億萬歲天寶紀春秋紀顧元緯本凌本俱作治祓禊孟康漢書注祓除也今三月上已祓禊也師古曰祓音廢禊音系韻語陽秋上巳日于流水上洗濯祓除去宿垢故謂之祓禊禊者潔也浦溆楚辭入溆浦余儃佪兮吕延濟注溆亦浦類也謝靈運詩映泫歸溆浦汀洲楚辭搴汀洲兮杜若文字集略汀水際也籞漢書宣帝紀池籞未御幸者假與貧民蘇林曰折竹以繩綿連禁禦使人不得往來律名為籞應劭曰籞者禁苑也章懷太子後漢書章帝紀注亦曰籞禁苑也音語龍媒漢書天馬來龍之媒應劭注言天馬者乃神龍之類今天馬已來此龍必至之效也張正見詩紅塵揚翠轂赭汗染龍媒神臯張衡西京賦實惟地之奧區神臯張銑注神者美言之澤畔曰臯沈約齊安樂昭王碑文禹穴神臯李周翰注臯地也其地肥沃故云神臯任昉竟陵文宣王行狀神臯載穆李周翰注神臯良田也謂都畿之內也蹕顔師古漢書注漢儀注曰皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也宋書禮志漢儀曰出稱警入稱蹕說者云車駕出則應稱警入則應稱蹕也而今俱唱之史臣以為警者警戒也蹕者止行也今從乘輿而出者並警戒以備非常也從外而入乘輿相干者蹕而止之也天寶此詩是天寶改元時所作奉和聖製十五夜燃燈繼以酺宴應制文苑英華作奉和十五夜燃燈繼以酺宴之作應制上路笙歌滿春城漏刻長漏刻凌本作刻漏遊人多晝日明月讓燈光魚鑰通翔鳯龍輿出建章九衢陳廣樂百福透名香透一作迓仙妓來金殿仙一作神都人繞玉堂定應偷妙舞定文苑英華作止妙一作艷從此學新粧奉引迎三事司儀列萬方列文苑英華作立願將天地壽同以獻君王燃燈菊坡叢話唐明皇在東都正月望夜移仗上陽宫設蠟炬連屬不絶結綵繒為燈樓髙五十丈垂以珠玉風動鏘鳴燈有龍鳯虎豹之狀士民縱樂初止三夜後又增十七十八兩夜當時惟王右丞奉和聖製一詩括盡時事酺宴漢書酺五日服䖍曰酺音蒲文穎曰音步漢律三人以上無故羣飲酒罰金四兩今詔橫賜得令㑹聚飲食五日也師古曰酺之為言布也王德布于天下而合聚飲食為酺服音是也漏刻後漢書孔壺為漏浮箭為刻下漏數刻以考中星魚鑰芝田録門鑰必以魚者取其不暝目守夜之義梁簡文帝詩夕門掩魚鑰宵牀悲畫屏翔鳯初學記晋宫閣名曰總章觀有翔鳯樓雍録唐都畿內外宫殿有薰風就日翔鳯咸池臨照望仙鶴羽乘龍等殿凌烟翔鳯等閣九衢楚辭天問靡蓱九衢王逸注九交道曰衢後人稱廣路曰九衢本此百福初學記洛陽宫殿簿有百福殿唐六典兩儀殿之右曰宜秋門宜秋門之右曰百福門其內曰百福殿唐宫城圗百福殿在太極殿內與千秋殿並奉引漢書郊祀志禮月之夕奉引復迷韋昭注奉引前導引車後漢書乘輿大駕公卿奉引張衡東京賦奉引既畢先輅乃發薛綜注奉引謂引道者司儀周禮司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節奉和聖製重陽節宰臣及羣臣上壽應制應制文苑英華作之作四海方無事三秋大有年百工逢此日工顧元緯本凌本皆作生萬壽願齊天芍藥和金鼎茱茰插玳筵玉堂開右個天樂動宫懸御栁踈秋影城鴉拂曙烟無窮菊花節長奉柏梁篇三秋李善文選注秋有三月故曰三秋春秋元命苞曰陽氣數成于三故時别三月宋衷曰四時皆象此類不唯秋也大有年穀梁傳五榖大熟為大有年百工百官也字見尚書芍藥子虛賦勺藥之和具而後御之韋昭曰勺藥和齊醎酸美味也郭璞曰勺藥五味也師古曰勺藥藥草名其根主和五臟又辟毒氣故合之于蘭桂五味以助諸食因呼五味之和為勺藥耳今人食馬肝馬腸者猶合勺藥而煮之豈非古之遺法乎李善注服䖍曰具美也或以勺藥調食也文穎曰五味之和也晉灼曰南都賦曰歸雁嗚鵽香稻鮮魚以為勺藥酸甜滋味百種千名之說是也服氏之說以勺藥為藥名或者因說今之煮馬肝猶加勺藥古之遺法晋氏之說以勺藥為調和之意枚乘七發曰勺藥之醬然則和調之言于義為得爾雅翼勺藥根可以和五臟制食毒古者有勺藥之醬合之于蘭桂五味以助諸食因呼五味之和為勺藥七發曰勺藥之醬子虛賦曰勺藥之和具而後御之南都賦曰歸雁鳴鵽香稻鮮魚以為勺藥酸甜滋味百種千名是因致其滋味也故孔子曰不得其醬不食非以備味自愛之至矣服䖍文頴伏儼輩解勺藥稱具美也或以為勺藥調食或以為五味之和或以為以蘭桂調食雖各得倣佛然未究名實之所起至韋昭又訓其讀勺丁削切藥旅酌切則并沒此物之名實矣西溪叢語溱洧詩贈之以勺藥江淹别賦下有勺藥之詩子虛南都二賦言勺藥者乃以魚肉等物為醢食物也子建七發張景陽七命勺藥云云五臣注勺音酌藥音略廣韻亦有二音子虛賦諸家皆誤以為溱洧之勺藥韓退之偃城聯句詩云兩相鋪氍毹五鼎調勺藥又曰但擲顧笑金難祈却老藥二藥不同音也金鼎鮑照詩金鼎玉七合神丹茱茰藝文類聚風土記曰九月九日律中無射而數九俗尚此日折茱茰房以插頭言辟除惡氣而禦初寒玳筵劉楨瓜賦布象牙之席薰玳瑁之筵右個吕氏春秋季秋之月天子居總章右個髙誘注明堂中方外圜通達四出各有左右房謂之個猶隔也宫縣周禮正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣鄭康成注樂縣謂鐘磬之屬縣于筍簴者鄭司農云宫縣四靣縣軒縣去其一靣判縣又去其一靣特縣又去其一靣四靣象宫室四靣有墻故謂之宫縣賈誼新書天子之樂宫縣諸侯之樂軒縣三月三日勤政樓侍宴應制綵仗連宵合瓊樓拂曙通年光三月裏宫殿百花中不數秦王日誰將洛水同酒筵嫌落絮舞袖怯春風天保無為德人歡不戰功仍臨九衢宴更達四門聰勤政樓劉昫唐書𤣥宗于興慶宫西南置樓西靣題曰花萼相輝之樓南靣題曰勤政務本之樓長安志興慶宫之西南隅曰勤政務本樓樓南向開元八年造每歲千秋節酺飲樓前按舊唐書本紀天寶四載春三月甲申宴羣臣于勤政樓又十四載春三月甲寅宴羣臣于勤政樓奏九部樂上賦詩效柏梁體四聰見本卷明四目注下和陳監四郎秋雨中思從弟據嫋嫋秋風動凄凄烟雨繁聲連鳷鵲觀色暗鳯凰原細栁踈髙閣輕槐落洞門九衢行欲斷萬井寂無喧忽有愁霖唱更陳多露言平原思令弟康樂謝賢昆逸興方三接衰顔强七奔相如今老病歸守茂陵園嫋嫋楚辭嫋嫋兮秋風王逸注嫋嫋秋風摽木貌鳷鵲觀上林賦過鳷鵲望露寒張揖注鳷鵲觀武帝建元中作在雲陽甘泉宫外三輔黃圗甘泉苑建元中作石闕封巒鳷鵲觀于苑垣內鳯凰原太平寰宇記雍州昭應縣有鳯凰原後漢延光二年鳯凰集新豐即此原也亦驪山之别麓一統志鳯凰原在西安府臨潼縣東北一十里愁霖唱謝曕答靈運詩忽獲愁霖唱懷勞奏所誠吕向注靈運寄愁霖詩于瞻故有此答多露國風豈不夙夜謂行多露平原晉書陸機傳成都王頴以機參大將軍軍事表為平原內史又陸雲傳雲字士龍六歲能屬文性清正有才理少與兄機齊名雖文章不及機而持論過之號曰二陸謝靈運詩末路值令弟康樂南史謝靈運傳靈運襲封康樂公性豪侈車服鮮麗衣物多改舊形制世共宗之咸稱謝康樂也又謝惠連傳惠連年十歲能屬文族兄靈運嘉賞之云每有篇章對惠連輒得佳語三接見周易晉卦七奔左傳吳始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反于是乎一歲七奔命和僕射晉公扈從溫湯原注時為右補闕天子幸新豐旌旗渭水東寒山天仗裏寒一作逺裏一作外溫谷幔城中奠玉羣仙座焚香太乙宫焚文苑英華作薰出游逢牧馬罷獵有非熊有一作見上宰無為化明時太古同靈芝三秀紫陳粟萬箱紅王禮尊儒教王禮文苑英華作玉醴誤天兵小戰功謀猷歸哲匠詞賦屬文宗司諫方無闕陳詩且未工長吟吉甫頌朝夕仰清風僕射晉公劉昫唐書開元二十五年七月庚申封李林甫為晉國公天寶元年八月壬辰吏部尚書兼右相李林甫加尚書左僕射溫谷潘嶽西征賦南有湯井溫谷李善注溫谷即溫泉也幔城庾肩吾詩别筵開帳殿離舟捲幔城羣仙按長安志華清宫中有集靈臺朝元閣皆祀神之所牧馬莊子黃帝將見大隗乎具茨之山方明為御昌㝢驂乘張若謵朋前馬昆閽滑稽後車至于襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣非熊搜神記吕望釣于渭陽文王出游獵占曰今日獵得一獸非龍非螭非熊非羆合得帝王師果得太公于渭之陽與語大悅同車載而還上宰謝靈運詩上宰奉皇靈侯伯咸宗長陳粟史記太倉之粟陳陳相因萬箱詩小雅乃求千斯倉乃求萬斯箱箱鄭康成作車箱解紅漢書賈捐之傳太倉之粟紅腐而不可食左思吳都賦䚕海陵之倉則紅粟流衍吕延濟注紅粟謂儲久而色赤儒教晉書宣帝紀博學洽聞伏膺儒教天兵揚雄長楊賦天兵四臨幽都先加李善注天兵言兵威之盛如天也哲匠殷仲文詩哲匠感蕭辰李周翰注哲智也匠謂善宰萬物者文宗後漢書崔駰傳贊崔為文宗世擅雕龍南史徐陵傳自陳創業文檄軍書及受禪詔䇿皆陵所製為一代文宗司諌成按周禮司諌掌糾萬民之德而勸之朋友正其行而强之道藝巡問而觀察之以時書其德行道藝辨其能而可任于國事者以考鄉里之治以詔廢置以行赦宥鄭康成注云諫猶正也以道正人行則非後世諫官之職蓋借用也陳詩禮記命太史陳詩以觀民風鄭康成注陳詩謂采其詩而視之吉甫頌詩大雅吉甫作誦穆如清風和宋中丞夏日遊福賢觀天長寺之作原注即陳左相所施已相殷王國空餘尚父溪釣磯開月殿築道出雲梯積水浮香象深山鳴白雞虛空陳妓樂陳一作無衣服製虹霓墨㸃三千界墨顧元緯本凌本俱作黑丹飛六一泥桃源勿遽返再訪恐君迷陳左相唐書宰相表天寶五載四月丁酉門下侍郎陳希烈同中書門下平章事六載二月甲辰希烈為左丞相兼兵部尚書殷王國史記武丁夜夢得聖人名曰說以夢所見視羣臣百吏皆非也于是乃使百工營求之野得說于傅險中是時說為胥靡築于傅險見于武丁武丁曰是也得而與之語果聖人舉以為相殷國大治尚父溪劉向列仙傳呂尚西適周匿于南山釣于磻溪鄭康成毛詩箋尚父呂望也尊稱焉月殿蕭子良詩月殿風轉層臺氣寒築道孔安國尚書傳傅氏之巖在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道說賢而隱代胥靡築之以供食雲梯謝靈運詩惜無同懷客共登青雲梯李善注郭璞游仙詩曰安事登雲梯張湛列子注云雲梯可以凌虛劉良注仙者因雲而升故曰雲梯然考唐人詩句多以山磴為雲梯也香象涅槃經壽命品云譬如香象為人所縛雖有良師不能禁制頓絶羈鎖自恣而去又現病品中列言諸象之力有凡象野象二牙象四牙象雪山白象香象青象黃象赤象白象山象等名白雞續博物志陶隱居云學道之人居山宜養白雞白犬可以辟邪妓樂法華經諸天妓樂百千萬種子虛空中一時俱作墨㸃法華經佛告諸比邱乃往過去無量無邊不可思議阿僧祗劫爾時有佛名大通智勝如來彼佛滅度已來甚大久逺譬如三千大千世界所有地種假使有人磨以為墨過于東方千國土乃下一㸃大如微塵又過千國土復下一㸃如是展轉盡地種墨于汝等意云何是諸國土若算師若算師弟子能得邊際知其數不不也世尊諸比邱是人所經國土若㸃不㸃盡抹為塵一塵一劫彼佛滅度已來復過是數無量無邊百千萬億阿僧祗劫我以如來知見力故觀彼久逺猶若今日六一泥抱朴子第一之丹名曰丹華當先作元黃用雄黃水礬石水一鉢作汞戎鹽鹵醎礬石牡礪赤石脂滑石胡粉各數十斤以六一泥封之火之三十六日成服之七日仙雲笈七籖作六一泥法礬石戎鹽滷醎礜石右四物分等燒之二十日止復取左顧牡蠣赤石脂滑石凡七物分等視土釡大小令足以泥土釡合治萬杵訖置鐵器中猛下火九日九夜藥正赤復治萬杵下細篩和以醇釅苦酒合如泥名曰六一泥取兩赤釡隨人作多少定其釡大小以六一泥塗兩土釡表裏皆令厚三分日中曝之十日期令乾燥沈十四拾遺新竹生讀經處同諸公之作閒居日清靜修竹自檀欒自文苑英華作復嫩節留餘籜新叢出舊欄細枝風響亂踈影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂仙壇檀欒枚乘兔園賦修竹檀欒夾池水謝朓詩檀欒映修竹吕延濟注檀欒竹美貌龍笛虞世南琵琶賦鳯簫輟吹龍笛韜吟仙壇永嘉記陽嶼有仙石山頂上有平石方十餘丈名仙壇壇陬輒有一䈥竹凡有四竹葳蕤青翠風來動音自成宫商石上淨潔初無粗籜相傳云曾有却粒者于此羽化故謂之仙石陰鏗詩夾池一叢竹青翠不驚寒湘川染别淚衡嶺拂仙壇贈東嶽焦鍊師先生千歲餘嵗文苑英華作載五嶽遍曾居遙識齊侯鼎新過王母廬不能師孔墨何事問長沮玉管時來鳯銅盤即釣魚竦身空裏語明目夜中書自有還丹術還丹一作丹砂時論太素初頻蒙露版詔時降軟輪車山靜泉逾響松高枝轉踈支頥問樵客支文苑英華作搘世上復何如錬師唐六典道士修行有三號其一曰法師其二曰威儀師其三曰律師其德髙思精謂之鍊師故當時凡稱學道者皆曰鍊師云五嶽說苑五嶽太山東嶽也霍山南嶽也華山西嶽也恆山北嶽也嵩山中嶽也齊侯鼎史記李少君見上上有故銅器問少君少君曰此器齊桓公十年陳于柏寢已而按其刻果齊桓公器一宫盡駭王母廬曹植詩驅風遊西海東過王母廬銅盤後漢書左慈字元放少有神道嘗在司空曹操坐操從容顧衆賔曰今日高㑹珍羞略備所少吳松江鱸魚耳元放于下坐應曰此可得也因求銅盤貯水以竹竿餌釣于盤中須臾引一鱸魚出操大拊掌笑㑹者皆驚操曰一魚不周坐席可更得乎放乃更餌釣沉之須臾復引出皆長三尺餘生鮮可愛操使目前鱠之周浹㑹者竦身淮南子若士舉臂而竦身遂入雲中葛洪神仙傳班孟者不知何許人能飛行終日又能坐空虛之中與人言語明目抱朴子或問明目之道抱朴子曰能引三焦之升景召大火于南離洗之以明日尉之以陽光及燒丙丁洞視符以酒和洗之古人曽以夜書也還丹抱朴子若取九轉之丹內神鼎中夏至之後爆之鼎熱翕然輝煌俱起神光五色即化為還丹取而服之一刀圭即白日升天太素列子太素者質之始也白虎通先有太初後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判軟輪車後漢書明帝紀尊事三老兄事五更安車軟輪供綏執授章懷太子注安車坐乘之車軟輪以蒲裹輪蔡雍獨斷使者安車軟輪送迎而至其家贈焦道士海上遊三島島凌本作嶽淮南預八公預文苑英華作遇坐知千里外跳向一壺中縮地朝珠闕行天使玉童飲人聊割酒送客乍分風天老能行氣吾師不養空謝君徒雀躍無可問鴻濛八公水經注淮南王劉安是漢高帝之孫厲王長子也折節下士篤好儒學養方術之徒數十人皆為俊異焉多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢相聞八公咸變成童王甚敬之八士並能鍊金化丹出入無間乃與安登山埋金于地白日升天坐知抱朴子服黃丹一刀圭即便長生不老矣及坐見千里之外吉凶皆知如在目前也又云用明鏡九寸以上自照有所思存七日七夕則見神仙或男或女或老或少一示之後心中自知千里之外方來之事也一壺葛洪神仙傳壺公者不知其姓名時汝南有費長房者為世掾忽見公從逺方來入市賣藥人莫識之賣藥口不二價治病皆愈常懸一空壺于屋上日入之後公跳入壺中人莫能見惟長房樓上見之知非常人也長房乃日日自掃公座前地及供饌物公受而不辭公知長房篤信謂曰至暮無人時更來長房如其言即往公語房曰見我跳入壺中時卿便可效我跳自當得入長房依言果不覺巳入入後不復見壺惟見仙宫世界樓觀重門閣道宫左右侍者數十人公語房曰我仙人也昔處天曹以公事不勤見責因謫人聞耳卿可教故得見我縮地葛洪神仙傳費長房有神術能縮地脉千里存在目前宛然放之復舒如舊也玉童太上飛行九神玉經凡行玉清之道出則諸天侍軒給玉童玉女各三千人行上清之道出則五宿侍衛給玉童玉女各一千五百人行太清之道出則五帝侍衛給玉童玉女各八百人割酒葛洪神仙傳曹公召左慈乃為設酒慈曰今當逺曠乞分杯飲酒曹公聞慈求分杯飲酒謂當使公先飲以餘與慈耳而慈拔道簮以畫杯酒中斷其間相去數寸即飲半半與公分風葛洪神仙傳廬山廟有神能于帳中共外人語飲酒空中投杯人往乞福能使江湖之中分風舉帆行各相逢水經注宫亭山廟甚神能分風劈流住舟遣使行旅之過必敬祀而後得去故曹毗詠云分風為二劈流為兩天老帝王世紀黃帝以風后配上台天老配中台五聖配下台行氣抱朴子欲求神仙惟當得其至要至要者在于寶精行氣服一大藥便足亦不用多也又曰初學行氣鼻中引氣而閉之隂以心數至一百二十乃以口微吐之及引之皆不欲令已耳聞其有出入之聲常令入多出少以鴻毛著鼻口之上吐氣而鴻毛不動為候也漸自轉增其心數久可以至千至千則老者更少日還一日矣夫行氣當以生氣之時勿以死氣之時也故曰仙人服六氣此之謂也養空賈誼服賦養空而浮服䖍注道家養空虛若浮舟也司馬貞注言體道之人但養空性而心若浮舟也北史徐則傳先生履德養空宗元齊物鴻濛莊子雲將東遊過扶搖之枝而適遭鴻濛鴻濛方將拊脾雀躍而遊雲將見之倘然止贄然立曰叟何人邪叟何為此鴻濛拊脾雀躍不輟對雲將曰遊雲將曰朕願有問也鴻濛仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生為之奈何鴻濛拊脾雀躍掉頭曰吾弗知吾弗知投道一師蘭若宿一作宿道一上方院顧可久本作投福禪師蘭若宿一公棲太白髙頂出雲烟雲一作風梵流諸壑遍壑一作洞花雨一峰偏迹為無心隱名因立教傳鳥來還語法客去更安禪晝涉松露盡露一作路暮投蘭若邊洞房隱深竹清夜聞遙泉向是雲霞裏今成枕席前豈惟留暫宿服事將窮年道一傳燈録江西道一禪師漢州什邡人也姓馬氏容貌竒異牛行虎視引舌過鼻足下有二輪文幼歲依資州唐和尚落髮受具于渝州圎律師唐開元中習禪定于衡嶽傳法院遇讓和尚同參九人惟師密受心印太白水經注地理志曰縣有太一山古文以為終南杜預以為中南也亦曰太白山在武功縣南去長安二百里不知其髙幾何俗云武功太白去天三百杜彥達曰太白山南連武功山于諸山最為秀傑冬夏積雪望之皓然太平寰宇記太白山在鳯翔府郿縣東南五十里一統志太白山在西安府武功縣南九十里鳥來法苑珠林齊鄴東大覺寺沙門僧範姓李平鄉人也善解羣書時稱府庫晚年出家經論諳委言行相輔祥徵屢降嘗有膠州刺史杜弼于鄴顯義寺請範冬講至華嚴六地忽有一鴈飛下從浮圖東順行入堂正對高座伏地聽法講散徐出還順塔西乃爾翔逝又于此寺夏講雀來在座西南伏聽終于九旬又曾處濟州亦有一鶚鳥飛來入聽講訖便去洞房上林賦巖窔洞房李周翰注洞通也山中示弟等二顧本凌本皆無等字山林吾喪我冠帶爾成人莫學嵇康懶且安原憲貧山隂多北戶泉水在東鄰緣合妄相有性空無所親安知廣成子不是老夫身吾喪我莊子南郭子綦曰今者吾喪我汝知之乎嵇康懶嵇康絶交書性復踈懶筋駑肉緩頭靣常一月十五日不洗不大悶飬不能沐也原憲貧史記原憲亡在草澤中子貢相衛而結駟連騎排藜藿入窮閻過謝原憲憲攝敝衣冠見子貢子貢恥之曰夫子豈病乎原憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也緣合涅槃經是受皆從緣合而生大般若經然一切法自性夲空無生無滅緣合謂生緣離謂滅實無生滅僧肇維摩詰經注身亦然耳衆緣所成緣合則起緣散則離性空涅槃經觀一切法夲性皆空華嚴經法性夲空寂無取亦無見性空即是佛不可得思量廣成子葛洪神仙傳廣成子者古之仙人也居崆峒之山石室之中黃帝聞而造焉請問治身之要廣成子答曰至道之精杳杳冥冥無視無聽抱神以靜形將自正必靜必淸無勞爾形無搖爾精乃可長生慎內閉外多知為敗我守其一以處其和故千二百歲而形未嘗衰得我道者上為皇失吾道者下為土將去汝入無窮之門遊無極之野與日月參光與天地為常人其盡死而我獨存矣田家文苑英華家字下多一作字舊榖行將盡良苗未可希苖顧元緯本凌本俱作田老年方愛粥粥文苑英華作竹誤卒歲且無衣雀乳青苔井雞鳴白板扉柴車駕羸㹀草屩牧豪豨豪一作齊多雨紅榴折多一作夕新秋緑芋肥餉田桑下憩旁舍草中歸住處名愚谷何煩問是非何煩文苑英華作煩君卒歲詩無衣無褐何以卒歲鄭康成箋卒終也雀乳傅休奕詩雀乳空井中柴車後漢書趙一獨柴車草屏章懷太子注韓詩外傳曰周子髙對齊景公曰臣賴君之賜疏食惡肉可得而食駑馬柴車可得而乘柴車弊惡之車也羸㹀世說負重致逺曽不若一羸㹀草屩漢書卜式既為郎布衣草蹻而牧羊師古曰蹻即草鞋也南方謂之蹻字本作屩豪豨方言豬北燕朝鮮之間謂之豭關東西或謂之彘或謂之豖南楚謂之豨過盧員外宅看飯僧共題一本作過盧四員外宅看飯僧共題七韻三賢異七聖聖顧元緯本凌本唐詩品彚俱作賢青眼慕青蓮乞飯從香積裁衣學水田上人飛錫杖檀越施金錢趺坐簷前日焚香竹下烟寒空法雲地秋色淨居天身逐因緣法心過次第禪不須愁日暮自有一燈然三賢仁王經三賢十聖住果報惟佛一人居淨土大藏一覽長者論如三乘中十住菩薩學生空觀對治閳提不信障一行菩薩作法空觀修自利利他行對治聲聞自利障十回向菩薩作法空觀成起悲願力垂形六道教化衆生對治獨覺自度障此三十心菩薩謂之三賢七聖釋氏以信行法行信解見得身證時解脫不時解脫為七聖又仁王經復有十億七賢居士德行具足青眼晉書阮籍能為青白眼見禮俗之士以白眼對之及嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見青眼青蓮大般若經世尊眼相修廣譬如青蓮花葉甚可愛樂維摩詰經目淨修廣如青蓮僧肇注天竺有青蓮花其業修而廣青白分明有大人目相故以為喻也水田釋氏要覽僧祗律云佛住王舍城帝釋石窟前經行見稻田畦畔分明語阿難言過去諸佛衣相如是從今依此作衣相增輝記云田畦貯水生長嘉苗以養形命法衣之田潤以四利之水增其三善之苗以養法身慧命也飛錫孫綽遊天台山賦應真飛錫以設虛李周翰注應真得真道之人執錫杖而行于虛空故云飛也檀越翻譯名義梵語陀那鉢底唐言施主今稱檀那訛陀為檀去鉢底留那也又稱檀越者檀即施法也此人行施越貧窮海金錢法苑珠林賢愚經云波婆梨自竭所有為設大㑹一切都集設㑹巳訖大施達嚫人得五百金錢法雲地華嚴經十地品如須彌盧山王純寶所成大威德諸天咸住其中無有窮盡菩薩所住法雲地亦復如是如來力無畏不共法一切佛事咸在其中問答宣說不可窮盡淨居天色界十八天之中淨居天為最無煩天無熱天善見天善現天色究竟天此五天皆謂之淨居天謂雜欲淨身所居也第三果人于知界中九品習氣俱時滅盡即生此天不復欲界受生故又謂之五不還天法苑珠林從廣果以上無煩無熱等五淨居天惟是那含羅漢之所住也縱凡生彼天者要是進向那含身得四禪發于無漏起熏禪業或起一品乃至九品方乃得生凡夫無此熏禪業故不得生也因緣法法華經大通智勝如來廣說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂苦悲惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅維摩詰經以因緣法化衆生故我為辟支佛華嚴經一切世間從緣生不離因緣見諸法次第禪華嚴經隨其次第入諸禪定涅槃經後分以三昧力得入𥘉禪漸漸次第入第四禪濟州過趙叟家宴原注公左降濟州司倉參軍時作雖與人境接閉門成隱居道言莊叟事儒行魯人餘深巷斜暉靜閒門高柳踈荷鋤修藥圃散帙曝農書上客搖芳翰中厨饋野蔬夫君苐髙飲景晏出林閭道言南史顧歡傳佛言華而引道言實而抑莊叟北史蕭大圜傳沽酪牧羊協潘生之志畜雞種黍應莊叟之言儒行禮記哀公曰敢問儒行散帙謝靈運詩散帙問所知劉良注散帙謂開書帙也說文帙書衣也林閭顔延年詩林閭時晏開李善注爾雅曰野外謂之林鄭元周禮注云閭里門也青龍寺曇壁上人兄院集并序吾兄大開䕃中明徹物外明一本作朝外一本作獨俱非以定力勝敵以惠用解嚴深居僧坊傍俯人里髙原陸地下映芙蓉之池竹林果園中秀菩提之樹八極氛霽霽一本作氣非萬彚塵息太虛寥廓南山為之端倪皇州蒼茫渭水貫於天地經行之後趺坐而間升堂梵筵餌客香飯不起而游覽不風而清凉得世界於蓮花記文章於貝葉時江寧大兄持片石命維序之詩五韻坐上成髙處敞招提虛空詎有倪坐看南陌騎下聽秦城雞渺渺孤烟起芊芊逺樹齊青山萬井外落日五陵西眼界今無染心空安可迷定力瓔珞經所謂定力者立根上位菩薩摩訶薩攝意去想不懷狐疑是謂定力解嚴宋書武帝紀公至彭城解嚴息甲勝敵解嚴皆以兵事為佛法借喻僧坊佛報思經造立僧坊供養僧衆髙原陸地維摩詰經高原陸地不生蓮花竹林果園班固西都賦竹林果園芳草甘木菩提樹唐㑹要菩提樹一名婆羅樹葉似白楊西域記金剛坐上菩提樹者即畢鉢羅之樹也昔佛在世高數百尺屢經殘伐猶髙四五丈佛坐其下成等正覺因而謂之菩提樹焉莖幹黃白枝葉青翠冬夏不凋光鮮無變每至如來涅槃之日葉皆凋落頃之如故八極淮南子八絃之外乃有八極東北方曰方上之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰署門西南方曰編駒之山曰白門西方曰西極之山曰閭闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門髙誘注八極八方之極太虛孫綽遊天台山賦太虛寥廓而無閡李善注太虛天也李周翰注大虛混氣也遼廓廣遠也端倪莊子反覆終始不知端倪經行法華經經行林中勤求佛道釋氏要覽經行慈恩解云西域池濕疊磚為道于中往來如布之經故曰經行梵筵沈約栖禪精舍銘往辭妙幄今承梵筵世界蓮花華嚴經爾時普賢菩薩告大衆言諸佛子此十不可說佛剎微塵數香水海在華藏莊嚴世界海中如天帝網分布而住此最中央香水海名無邊妙華光以現一切菩薩形摩尼王幢為底出大蓮花名一切香摩尼王莊嚴有世界種而住其上名普照十方熾然寶光明以一切莊嚴具為體有十不可說佛剎微塵數世界于中布列云云丈多不備録江寧大兄唐書王昌齡字少伯江寧人第進士補祕書郎又中宏詞遷汜水尉不護細行貶龍標尉以世亂還鄉里為刺史閭邱曉所殺昌齡工詩緒密而思清時謂王江寧云招提釋氏要覽招提增輝記梵云拓鬪提奢唐言四方僧物但筆者訛拓為招去鬬奢留提故稱招提即今十方住持寺院是也芊芊謝靈運詩逺樹曖阡阡李善注廣雅曰芊芊盛也阡與芊同同詠王昌齡本來清淨所竹樹引幽隂引顧元緯本作隱簷外含山翠人間出世心圓通無有象聖境不能侵真是吾兄法何妨友弟深天香自然㑹靈異識鐘音圓通周聽無遺曰圓虛明離障曰通楞嚴經真信明了一切圓通聖境楞嚴經心存佛國聖境冥現天香涅槃經後分一切諸天雨無數百千種種上妙天香天華遍滿三千大千世界庾信詩天香下桂殿仙梵入伊笙同詠王縉林中空寂舍階下終南山髙臥一牀上上二顧本俱作地回看六合間浮雲幾處滅飛鳥何時還問義天人接無心世界閒誰知大隱客兄弟自追攀客一作者空寂舍空寂舍字見維摩詰經詳二十卷空舍注中大隱王康琚詩小隱隱陵藪大隱隱朝市同詠裴迪靈境信為絶法堂出塵氛自然成高致向下看浮雲逶迤峰岫列參差閭井分林端逺堞見風末踈鐘聞吾師久禪寂在世超人羣逶迤此逶迤當依說文作邪去貌解王右丞集箋注卷十一
