body:
  text: 王右丞集箋注卷十三仁和趙殿成撰近體詩七十三首答裴迪萬首唐人絶句作答裴迪憶終南山渺渺寒流廣蒼蒼秋雨晦君問終南山心知白雲外輞口遇雨憶終南山因獻絶句裴迪積雨晦空曲平沙滅浮彩輞水去悠悠南山復何在輞口長安志輞谷水出南山輞谷北流入霸水陜西志輞川在藍田縣南嶢山之口去縣八里水淪漣如車輞然川盡處為鹿苑寺即王維别業山中寄諸弟妹萬首唐人絶句無諸字凌本唐詩正音俱無妹字山中多法侣禪誦自為羣城郭遙相望惟應見白雲禪誦謂坐禪誦經陳書吳郡陸慶築室屏居以禪誦為事聞裴秀才迪吟詩因戲贈萬首唐人絶句作聞裴迪吟詩戲贈猿吟一何苦愁朝復悲夕莫作巫峽聲腸斷秋江客巫峽水經注丹山西即巫山者也其間首尾一百六十里謂之巫峽蓋因山為名也絶巘多生柳柏懸泉瀑布飛漱其間清瑩峻茂良多趣味每至晴初霜旦林寒澗肅常有高猿長嘯屬引凄異空谷傳響哀轉久絶故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳一統志巫峽在夔州府巫山縣東三十里即巫山也與西陵峽歸峽並稱三峽連山七百里略無斷處自非亭午夜分不見日月贈韋穆十八與君青眼客共有白雲心不向東山去日令春草深日一作自皇甫嶽雲溪雜題五首鳥鳴澗人閒桂花落夜靜春山空月出驚山鳥時鳴春澗中皇甫嶽按唐書宰相世系表有皇甫嶽乃皇甫恂之子未知即此人否蓮花塢日日採蓮去洲長多暮歸弄篙莫濺水畏濕紅蓮衣鸕鷀堰乍向紅蓮沒復出清浦揚獨立何䙰褷銜魚古查上清顧可久本作晴浦萬首唐人絶句作蒲鸕鷀埤雅鸕鷀水鳥似鶂而黑一名鷧嘴曲如鈎食魚入喉則爛其熱如湯其骨主鯾及噎蓋以類推之者也此鳥吐而生子神農書所謂鸕鷀不卵生口吐其雛獨為一異者也揚孚異物志云鸕鷀能沒于深水取魚而食之不卵而孕雛于池澤既胎而又吐生多者生七八少生五六相連而出若絲緒焉水鳥而巢髙本之上䙰褷木華海賦鳬雛離褷鶴子淋滲張銑注離褷淋滲羽毛初生貌古查玉篇楂水中浮木也亦作查江總詩古楂橫近澗危石聳前洲上田平朝耕上平田暮耕上平田借問問津者寧知沮溺賢寧唐詩正音作誰萍池春池深且廣會待輕舟回靡靡緑萍合垂楊掃復開掃復開顧元緯本凌本俱作復掃開輞川集并序余别業在輞川山谷其遊止有孟城坳華子岡文杏館斤竹嶺鹿柴木蘭柴茱茰沜宫槐陌臨湖亭南垞欹湖栁浪欒家瀨金屑泉白石灘北垞竹里館辛夷塢漆園椒園等與裴迪閒暇各賦絶句云爾秉恕按唐書本傳稱維嘗聚其田園所為詩號輞川集者即此二十首是蓋當時自為一帙耳孟城拗新家孟城口古木餘衰栁來者復為誰空悲昔人有同詠裴迪結廬古城下時登古城上古城非疇昔今人自來往疇昔檀弓余疇昔之夜鄭康成注疇發聲也昔猶前也華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極同詠裴迪落日松風起還家草露稀雲光侵履跡山翠拂人衣文杏館文杏裁為梁香茅結為宇不知棟裏雲去作人問雨文杏梁長門賦刻木蘭以為榱兮飾文杏以為梁香茅左思吳都賦食葛香茅棟裏雲郭璞詩雲生梁棟間風出忩户裏同詠裴迪迢迢文杏館躋攀日已屢南嶺與北湖前看復回顧斤竹嶺檀欒映空曲青翠漾漣漪暗入商山路樵人不可知斤竹考戴凱之竹譜劉美之續竹譜贊寧筍譜皆無斤竹名惟謝靈運有從斤竹澗越嶺溪行詩一首又靈運遊名山志云神子溪南山與七里山分流去斤竹澗數里始見斤竹之名通志略竹之良者惟有箽竹謝靈運所遊之澗今在雁蕩則斤竹即箽竹是矣同詠裴迪明流紆且直緑篠密復深一徑通山路行歌望舊岑緑篠說文篠小竹也謝靈運詩緑篠媚清漣鹿柴空山不見人但聞人語響返景入深林復照靑苔上苔一作莓柴柴士邁切音與寨同栅也一作寨凡師行野次立木為區落謂之柴别墅有籬落者亦謂之柴同詠裴迪日夕見寒山便為獨往客不知松林事但有麏麚跡松顧可久本萬首唐人絶句唐詩紀事皆作深麏麚廣韻麏鹿屬麚牡鹿劉繪詩麏麚或騰倚林薄杳芊眠木蘭柴秋山斂餘照飛鳥逐前侣彩翠時分明夕嵐無處所處所髙唐賦風止雨霽雲無處所同詠裴迪蒼蒼落日時烏聲亂溪水緣溪路轉深幽興何時巳茱萸沜結實紅且緑復如花更開山中倘留客置此茱茰杯茱茰顧元緯本凌本俱作芙蓉茱萸沜廣韻沜水涯音與泮同玉篇直以為古文泮字蓋其水上有茱萸因名圗經本草茱茰今處處有之江淮蜀漢尤多木髙丈餘皮青緑色葉似椿而濶厚紫色三月開紅紫細花七月八月結實似椒子嫩時微黃至熟則深紫芙蓉杯庾信詩芙蓉承酒杯又云芙蓉即奉杯同詠裴迪飄香亂椒桂布葉間檀欒雲日雖回照森沉猶自寒宫槐陌仄徑䕃宫槐幽隂多緑苔應門但迎掃畏有山僧來同詠裴迪門南宫槐陌是向欹湖道秋來山雨多落葉無人掃南二顧本唐詩品彚俱作前是顧可久本作堤山唐詩品彚作風臨湖亭輕舸迎上客悠悠湖上來當軒對樽酒四面芙蓉開上萬首唐人絶句作仙舸方言南楚江湘凡船大者謂之舸同詠裴迪當軒彌滉漾孤月正徘徊谷口猿聲發風傳入戶來滉漾玉篇滉漾波也南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識遙遙唐詩正音作遙山誤南垞成按集韻垞直加切小邱名或疑古字書多不載垞字而玉篇韻㑹諸書均以垞字為古文宅字頗疑垞字即宅字之訛正韻麻陌二韻垞垞二字俱不收姑從集韻作茶音讀同詠裴迪孤舟信風泊南垞湖水岸落日下崦嵫清波殊渺漫風顧元緯本作一崦嵫山海經鳥鼠同穴之山西南三百六十里曰崦嵫之山郭璞注日沒所入山也見離騷奄兹兩音欹湖吹簫凌極浦日暮送夫君湖上一回首山青卷白雲山青顧可久本作青山同詠裴迪空濶湖水廣青熒天色同艤舟一長嘯四靣來清風青熒羽獵賦石玉嶜崟眩耀青熒師古注青熒言其色青而有光熒也李善注青熒光明貌艤舟史記烏江亭長檥船待徐廣注檥音儀一音俄駰按應劭曰檥止也孟康曰檥音蟻附也附船著岸也如淳曰南方人謂整船向岸曰檥檥艤字同栁浪分行接綺樹倒影入清漪不學御溝上春風傷别離分行顧元緯本凌本俱作行分綺樹江淹四時賦憶上國之綺樹想金陵之蕙枝同詠映池同一色逐吹散如絲結陰既得地何謝陶家時欒家瀨颯颯秋雨中淺淺石溜㵼跳波自相濺白鷺驚復下石溜㵼謝朓郊遊詩靃靡青莎被潺湲石溜㵼同詠裴迪瀨聲喧極浦沿步向南津泛泛鳬鷗渡時時欲近人金屑泉日飲金屑泉少當千餘歲翠鳯翔文螭羽節朝玉帝翔一作翊翠鳯拾遺記西王母乘翠鳯之輦而來前導以文虎文豹後列雕麟紫麏羽節羽節謂羽蓋毛節並是仙人之儀衛桓真人升仙記五色霞內見霓旌羽節仙童靈官百餘人同詠裴迪瀠渟淡不流金碧如可拾迎晨含素華獨往事朝汲素華本草平旦第一汲為井華水白石灘清淺白石灘緑蒲向堪把家住水東西浣紗明月下向唐詩紀事唐詩品彚俱作尚同詠裴迪跂石復臨水弄波情未極日下川上寒浮雲淡無色無色一作秋色一作凝碧跂石庾信詩下橋先勸酒跂石始調琴北垞北垞湖水北雜樹映朱欄逶迤南川水明滅青林端同詠裴迪南山北垞下結宇臨欹湖每欲採樵去扁舟出菰蒲山世本或作上扁舟漢書范蠡乃乘扁舟浮江湖孟康注扁舟特舟也竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照幽篁楚辭余處幽篁兮終不見天王逸注幽篁竹林也吕向注幽深也篁竹叢也同詠裴迪來過竹里館日與道相親出入惟山鳥幽深無世人辛夷塢木末芙蓉花山中發紅萼澗户寂無人紛紛開且落紛紛劉本顧可久本俱作絲絲辛夷朱子楚辭集注辛夷樹大連合抱髙數仭其花初發如筆北人呼為木筆其花最早南人呼為迎春木末楚辭搴芙蓉兮木末同詠裴迪緑堤春草合王孫自留玩况有辛夷花色與芙蓉亂漆園古人非傲吏自闕經世務偶寄一微官婆娑數枝樹偶顧元緯本凌本俱作惟傲吏史記莊子者蒙人也名周周嘗為蒙漆園吏郭璞詩漆園有傲吏婆娑晉書殷仲文與衆至大司馬府府中有老槐樹顧之良久而嘆曰此樹婆娑無復生意同詠裴迪好閒早成性果此諧宿諾今日漆園遊還同莊叟樂椒園桂尊迎帝子杜若贈佳人椒漿奠瑶席欲下雲中君君劉本顧可久本俱作身椒陸璣詩疏椒樹似茱茰有刺針葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香桂尊漢書尊桂酒賓入鄉應劭注以水積桂為大尊酒帝子楚辭帝子降兮北渚杜若楚辭采芳洲兮杜若將以遺兮下女爾雅翼杜若苖似山薑花黃赤子赤色大如棘子中似豆蔻有杜連白連白岑若芝之名亦一名杜衡椒漿楚辭奠桂酒兮椒漿王逸注椒漿以椒置漿中也雲中君楚辭九歌有雲中君又漢書郊祀志晉巫祀五帝東君雲中君巫社巫祠族人炊之屬師古注雲中君謂雲神也同詠裴迪丹刺罥人衣芳香留過客幸堪調鼎用願君垂採摘臨髙臺送黎拾遺萬首唐人絶句無臨髙臺三字相送臨高臺川原杳何極日暮飛鳥還行人去不息送别萬首唐人絶句唐詩正音唐詩品彚俱作山中送别名賢詩作送友山中相送罷日暮掩柴扉春草明年緑王孫歸不歸明年二顧本凌本唐詩品彚俱作年年别輞川别業依遲動車馬惆悵出松蘿忍别青山去其如緑水何依遲王融詩參差興别緒依遲起離慕松蘿毛萇詩傳女蘿菟絲松蘿也孔穎達正義釋草云唐䝉女蘿女蘿菟絲毛意以菟絲為松蘿故言松蘿也陸璣疏云菟絲蔓連草上生黃赤如金今合藥菟絲子是也非松蘿松蘿自蔓松上生枝正青與菟絲殊異同詠王縉山月曉仍在林風凉不絶殷勤如有情惆悵令人别崔九弟欲往南山馬上口號與别唐文粹少馬上以下六字萬首唐人絶句作别崔九弟城隅一分手幾日還相見山中有桂花莫待花如霰花如霰梁元帝詩上林朝花色如霰桞惲詩春花落如霰同詠裴迪歸山深淺去須盡邱壑美莫學武陵人暫遊桃源裏留别崔興宗萬首唐人絶句于四卷內載此首作王維詩題曰留别崔興宗十六卷重出作崔興宗詩題曰留别王維唐文粹作崔興宗唐詩品彚亦作右丞詩唐詩紀事載王維有崔九往南山馬上口號與别云城隅一分手云云裴迪云歸山深淺去云云興宗留别云駐馬欲分襟云云是以此詩為興宗留别二人之詩也顧元緯本凌本皆删去此首劉須溪顧可久本有之駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵息夫人原注時年二十河嶽英靈集作息夫人怨國秀集作息媯怨莫以今時寵能忘舊日恩看花滿眼淚不共楚王言時古今詩話作朝能忘本事詩作寧忘萬首唐人絶句唐詩紀事俱作難忘樂府詩集作寧無舊國秀集作昔唐詩紀事作異眼本事詩作目息夫人左傳楚子滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言本事詩寧王憲貴盛寵妓數十人皆絶藝上色宅左有賣餅者妻纎白明媚王一見屬目厚遺其夫取之寵惜逾等環歲因問之汝復憶餅師否默然不對王召餅師使見之其妻注視雙淚垂頰若不勝情時王座客十餘人皆當時文士無不悽異王命賦詩王右丞維詩先成云云坐客無敢繼者王乃歸餅以終其志珊瑚鈎詩話云杜牧之息夫人詩曰細腰宫裏露橈新脉脉無言幾度春至竟息亡緣底事可憐金谷墜樓人與所謂莫以今朝寵難忘舊日恩看花滿眼淚不共楚王言語意逺矣蓋學有淺深識有高下故形于言者不同也班婕妤三首唐文粹河嶽英靈集並作媫妤怨玉窗螢影度金殿人聲絶秋夜守羅幃孤燈耿明滅明顧元緯本凌本俱作不班媫妤漢書孝成班媫妤帝初即位選入後宫始為少使俄而大幸為媫妤居增成舍再就館有男數月失之其後趙飛燕姊弟從自微賤興踰越禮制寢盛于前班媫妤及許皇后皆失寵稀復進見許皇后坐廢媫妤恐久見危求供養太后長信宫上許馬媫妤退處東宫作賦自傷宫殿生秋草君王恩幸踈那堪聞鳯吹門外度金輿恩文苑英華作寵吹一作笛金輿史記為之金輿錯衡以繁其飾怪來妝閣閉朝下不相迎總向春園裏花間笑語聲向國秀集作在笑語顧可久本國秀集萬首唐人絶句樂府詩集唐詩品彚俱作語笑國秀集選此一首題作扶南曲題友人雲母障子原注時年十五君家雲母障持向野庭開自有山泉入非因彩畫來持顧元緯本凌本俱作時因一作關障子唐時呼屏障為障子杜甫有題李尊師松樹障子歌齊已有二龍障子歌張祐有題山水障子詩李洞有觀水墨障子詩是矣紅牡丹緑艷間且靜紅衣淺復深花心愁欲斷春色豈知心閒顧元緯本凌本俱作開左掖梨花文苑英華作左掖海棠花間灑階邊草輕隨箔外風黃鶯弄不足嗛入未央宮入文苑英華作向左掖雍録漢書曰朱虛侯章從太尉勃請卒千人入未央宫掖門師古曰非正門而在兩旁若人之臂掖也御覽曰出禁省為殿門外出大道為掖門則不特夾立正門之旁乃為掖門雖殿門外他出之門皆可名為掖門也唐門下北省在日華門名左掖亦名東省中書北省在月華門名右掖亦名西掖此之日華月華者立門自在宣政殿東西兩廊出門未是宫外而亦以掖名之則是殿門自正門外旁或有門皆為掖門也同詠邱為冷艷全欺雪餘香乍入衣春風且莫定吹向玉階飛同詠冉集作和王給事維禁省梨花詠皇甫冉巧解迎人笑偏能亂蝶飛春風時入户幾片落朝衣迎一作逢偏一作還春風時入户一作春時風入户口號又示裴迪七絶內有私成口號誦示迪一首故此云又示也萬首唐人絶句作菩提寺禁示裴迪安得捨塵網拂衣辭世喧悠然䇿藜杖歸向桃花源塵一作羅向萬首唐人絶句作去塵網陶潛詩誤落塵網中一去三十年杖藜莊子原憲華冠縰履杖藜而應門陸德明注杖藜以藜為杖也雜詩家住孟津河門對孟津口常有江南船寄書家中否孟津孔穎達尚書正義孟者河北地名春秋所謂向盟是也于孟地置津謂之孟津史記正義杜預云盟河內郡河陽縣南孟津也在洛城北都道所凑古今以為津武王度之近代呼為武濟括地志云盟津周武王伐紂與八百諸侯會盟津亦曰孟津又曰富平津水經云小平津今云河陽津是也君自故鄉來應知故鄉事來日綺窗前寒梅著花未成按陶淵明詩云爾從山中來早晚發天目我居南窗下今生幾藂菊王介甫詩云道人北山來問松我東岡舉手指屋脊云今如許長與右丞此章同一杼軸皆情到之辭不假修飾而自工者也然淵明介甫二作下文綴語稍多趣意便覺不逺右丞只為短句一吟一咏更有悠揚不盡之致欲于此下復贅一語不得已見寒梅發復聞啼鳥聲愁心視春草畏向玉階生玉階萬首唐人絶句作階前崔興宗寫真唐詩紀事作與崔興宗寫真詠畫君年少時如今君已老今時新識人知君舊時好山茱萸朱實山下開清香寒更發幸有藂桂花窗前向秋月朱實顧元緯本作茱茰有一作與山茱茰圗經本草山茱茰葉如梅有刺二月開花如杏四月實如酸棗赤色通志略山茱茰其實似萇楚之實一名蜀棗一名雞足一名鬾實哭孟浩然原注時為殿中侍御史知南選至襄陽作萬首唐人絶句作哭孟襄陽唐詩紀事作憶孟詩故人不可見漢水日東流借問襄陽老江山空蔡洲首二句唐詩紀事作故人今不見日夕漢江流蔡洲各本俱作蔡州今從顧元緯本校正孟浩然唐書孟浩然襄州襄陽人少好節義喜振人患難隱鹿門山年四十乃遊京師嘗于太學賦詩一座嗟伏無敢抗張九齡王維雅稱道之維私邀入內署俄而𤣥宗至浩然匿牀下維以實對帝喜曰朕聞其人而未見也何懼而匿詔浩然出帝問其詩浩然再拜自誦所為至不才明主棄之句帝曰卿不求仕而朕未嘗棄卿奈何誣我因放還張九齡為荆州辟置于府府罷開元末病疽背卒蔡洲水經沔水又東南經蔡洲酈道元注漢長水校尉蔡瑁居之故名蔡洲荆州圗經襄陽峴山東南一里江中有蔡洲一統志蔡洲在襄陽府城東北漢水中後漢蔡瑁居其上曹操嘗造其家王右丞集箋注卷十三
