body:
  text: 王右丞集箋注卷十四仁和趙殿成撰近體詩三十三首田園樂七首詩林廣記作輞川六言出入千門萬戶經過北里南鄰蹀躞鳴珂有底崆峒散髮何人顧元緯本凌本出入俱作厭見蹀躞俱作官府北里南鄰左思詩南鄰擊鐘磬北里吹笙竽再見封侯萬户立談賜璧一雙詎勝耦耕南畝何如髙卧東窗立談解嘲或立談間而封侯賜璧史記虞卿躡屩擔簦一見趙王賜白璧一雙黃金百鎰再見拜為上卿三見卒受相印封萬戶侯採菱渡頭風急策杖村西日斜杏樹壇邊漁父桃花源裏人家急一本作起村顧元緯本作林杏壇莊子孔子遊于緇帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴奏曲未半有漁父者下船而來鬚眉交白被髮揄袂行原以上拒陸而止左手據膝右手持頤以聽萋萋芳草春緑落落長松夏寒牛羊自歸村巷童稚不識衣冠首句諸本皆作萋萋春草秋緑惟唐詩品彚作萋萋芳草春緑今從之又緑字凌本作碧不字萬首唐人絶句作未長松孫綽遊天台山賦藉萋萋之纎草䕃落落之長松吕延濟注萋萋草美貌落落松髙貌夏寒王屮頭陀寺碑文桂深冬燠松疏夏寒山下孤烟逺村天邊獨樹髙原一瓢顔回陋巷五柳先生對門髙原揚雄羽獵賦相與列乎髙原之上桃紅復含宿雨柳緑更帶春烟花落家僮未掃鶯啼山客猶眠宿萬首唐人絶句作夜春唐詩品彚作朝鶯凌本唐詩品彚俱作鳥皇甫冉集亦載此首題作閒居六言酌酒㑹臨泉水抱琴好倚長松南園露葵朝折東谷黃粱夜舂東谷凌本唐詩品彚俱作西舍黃粱爾雅翼今粱有三種青梁殼穗有毛粒青米亦微青而細于黃白米也夏月食之極為清凉但以味短色惡不如黃白粱故人少種之亦早熟而收少作餳青白勝餘米黃粱穗大毛長殼米俱粗于白粱而收子少不耐水旱食之香味逾于諸粱人號為竹根黃白粱穗亦大毛多而長殼粗扁長不似粟圓米亦白而大其香美為黃粱之亞古天子之飯所以有白粱黃粱者明取黃白二種耳少年行四首新豐美酒斗十千咸陽遊俠多少年相逢意氣為君飲繫馬髙樓垂柳邊萬首唐人絶句本多作皆意氣作氣味斗十千曹植詩歸來宴平樂美酒斗十千出身仕漢羽林郎初隨驃騎戰漁陽孰知不向邊庭苦縱死猶聞俠骨香苦一作死羽林郎後漢書羽林郎比三百石無員掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家補驃騎史記元狩二年春以冠軍侯去病為驃騎將軍將萬騎出隴西有功正義曰漢書霍去病征胸奴有絶幕之勳始置驃騎將軍位至三司品秩同大將軍漁陽章懷太子後漢書注漁陽郡在漁水之陽今幽州俠骨香張華遊俠曲生從命子遊死聞俠骨香成按詩意謂死于邊庭者反不如俠少之死而得名蓋傷之也與太白縱死俠骨香不慚世上英同用張華遊俠曲中語而命意不同矣一身能擘兩雕弧虜騎千重只似無偏坐金鞍調白羽紛紛射殺五單于樂府詩集擘作臂重作羣擘顔師古漢書注今之弩以手張者曰擘張以足踏者曰蹶張雕弧玉篇弧木弓也雕弧謂有雕畫之弧白羽上林賦鸞蕃弱滿白羽文穎注以白羽羽箭故言白羽也鮑照詩留我一白羽李善注白羽矢名國語曰吳素甲白羽之矰望之如荼五單于漢書宣帝紀胸奴虛閭權梁單于病死右賢王屠耆堂代立骨肉大臣立虛閭權渠單于子為呼韓邪單于擊殺屠耆堂諸王並自立分為五單于更相攻擊死者以萬數漢家君臣歡宴終髙議雲臺論戰功天子臨軒賜侯印將軍佩出明光宫雲臺江淹上建平王書結綬金馬之庭髙議雲臺之上臨軒後漢書崔實傳天子臨軒百僚畢㑹寄河上假十六此詩亦載盧象集中與君相見即相親聞道君家在孟津為見行舟試借問客中時有洛陽人盧集見作識在作住贈裴旻將軍腰間寶劍七星文臂上雕弓百戰勳見說雲中擒黠虜始知天上有將軍裴旻唐書裴旻嘗與幽州都督孫佺北伐為奚所圍旻舞刀立馬上矢四集皆迎刀而斷奚大驚引去後以龍華軍使守北平北平多虎旻善射一日得虎三十一休山下有老父曰此彪也稍北有真虎使將軍遇之且敗旻不信怒馬趨之有虎出叢薄中小而猛據地大吼旻馬辟易弓矢皆墜自是不復射李翰裴旻將軍射虎圖贊敘開元中山戎冦邊元宗命將軍守北平州且充龍華軍使以捍薊之北門公嘗率偏軍橫絶漠策匹馬陷重圍搖轆轤而百萬洞開馳槖駝而沙場一掃聲振北狄氣懾東邊人皆服藝畏威不敢南牧願充麾下者五百餘人七星吳越春秋子胥乃解百金之劍以與漁者此吾前君之劍中有七星價值百金孔稚圭詩文犀六屬鎧寶劍七星光吳均詩刀含四尺影劍抱七星文雕弓張衡東京賦雕弓斯豰薛綜注雕弓謂有刻畫也古雕字亦作雕如漢書郊杞志之雕戈貢禹傳之雕牆抱朴子之雕輦其義一也黠虜後漢書伏湛傳㸃虜困迫必求其助九月九日憶山東兄弟原注時年十七兄凌本作九日憶東山弟獨在異鄉為異客每逢佳節倍思親遙知兄弟登髙處遍插茱茰少一人茱茰爾雅翼風土記日俗尚九月九日謂為上九茱茰至此日氣烈熟色赤可折其房以插頭云辟惡氣禦冬劉禹錫嘉話茱茰二字經三詩人皆已道亦有能否焉杜公言更把茱茰仔細看王右丞云遍插茱茰少一人朱放云學他年少插茱茰杜公為最優也戲題輞川别業柳條拂地不須折松樹梢雲從更長藤花欲暗藏猱子柏葉初齊養麝香樹凌本作枝梢二顧本凌本俱作披猱邢昺爾雅疏猱一名猿善攀援樹枝麝香埤雅陶氏云麝形似獐今謂之香獐常食柏葉故養生論云麝食柏而香也戲題盤石可憐盤石臨泉水復有垂楊拂酒杯若道春風不解意何因吹送落花來盤一作磐臨顧元緯本凌本俱作鄰拂一作梢何因一作因何與盧員外象過崔處士興宗林亭緑樹重陰蓋四鄰青苔日厚自無塵科頭箕踞長松下白眼看他世上人重一作垂松文苑英華作林看他世上人一作看君是甚人科頭章懷太子後漢書注科頭謂以髮縈繞成科結也揚伯嵒臆乘俗謂不冠為科頭箕踞漢書尉他魋結箕踞見陸賈師古曰箕踞謂伸其兩腳而坐亦曰箕踞其形似箕白眼見十二卷青眼注同詠盧象映竹時聞轉轆轤當窗只見網蜘蛛主人非病常髙卧環堵䝉籠一老儒環堵禮記儒有一畝之宫環堵之室鄭康成注環堵面一堵也五板為堵孔穎達正義環謂周圍也東西南北唯一堵也淮南子環堵之室茨之以生茅髙誘注堵長一丈髙一丈面環一堵為方一丈故曰環堵言其小也同詠王縉身名不問十年餘老大誰能更讀書林中獨酌鄰家酒門外時聞長者車長者車史記陳平家乃負郭窮巷以弊席為門然門外多有長者車轍同詠裴迪喬柯門裏自成陰散髮窗中曾不簪逍遙且喜從吾事榮寵從來非我心窗中劉本顧可久本俱作空中唐詩品彚作空窗喬柯劉孝綽詩喬柯貫簷上垂條拂户陰酬王摩詰過林亭唐詩紀事作喜羣公訪林亭崔興宗窮巷空林常閉關悠悠獨臥對前山今朝忽枉嵇生駕倒屣開門遙解顔空唐詩紀事作深嵇生駕世說嵇康與吕安善每一相思千里命駕解顔列子夫子始一解顔而笑送王尊師歸蜀中拜掃二顧本俱無拜掃字大羅天上神仙客濯錦江頭花柳春不為碧雞稱使者惟令白鶴報鄉人大羅天雲笈七籖最上一天名曰大羅在元都玉京之上紫微金闕七寶騫樹麒麟獅子化生其中三世天尊治在其內濯錦江太平寰宇記濯錦江即蜀江水至此濯錦錦彩鮮潤于他水故曰濯錦江九域志笮橋江水亦名濯錦江俗云以此水濯錦鮮明碧雞漢書郊祀志或言益州有金馬碧雞之神可醮祭而致于是遣諫大夫王褒使持節而求之如淳注金形似馬碧形似雞水經注蜻蛉縣有禺同山其山神有金馬碧雞光景倏忽民多見之漢宣帝遣諌大夫王褒祭之欲致其雞馬褒道病而卒是不果焉故左太沖蜀都賦曰金馬光而絶影碧雞倏忽而耀儀王褒碧雞頌曰持節使者敬移金精神馬彯彯碧雞歸來歸來漢德無疆黃龍見兮白虎仁歸來歸來可以為倫歸來翔兮何事南荒也白鶴搜神後記丁令威本遼東人學道于靈虛山後化鶴歸遼集城門華表柱時有少年舉弓欲射之鶴乃飛徘徊空中而言曰有鳥有鳥丁令威去家千年今來歸城郭如故人民非何不學仙家纍纍遂高上沖天送元二使安西詩人玉屑作贈别樂府詩集作渭城曲渭城朝雨裛輕塵客舍青青柳色新勸君更盡一杯酒西出陽關無故人次句劉本萬首唐人絶句樂府詩集俱作客舍青青柳色春又一本作客舍依依楊柳春成按詩人玉屑以此詩為折腰體謂中失粘而意不斷也唐人歌入樂府以為送别之曲至陽關句反覆歌之謂之陽關三叠亦謂之渭城曲白居易晚春欲擕酒尋沈四著作詩云最憶陽關唱真珠一串歌注云沈有謳者善唱西出陽關無故人詞又對酒詩云相逢且莫推辭醉聽唱陽關第四聲注云第四聲勸君更盡一杯酒西出陽關無故人也劉禹錫與歌者詩云舊人惟有何戡在更與殷勤唱渭城渭城陽關之名蓋因詩中辭云送别萬首唐人絶句題作齊州送祖三送君南浦淚如絲君向東州使我悲為報故人憔悴盡如今不似洛陽時州顧元緯本凌本俱作周南浦江淹别賦送君南浦傷如之何淚如絲梁武帝詩臉下淚如絲東州後漢書樊準傅雖有西屯之役宜先東州之急章懷太子注東州謂冀兖州送韋評事欲逐將軍取右賢沙場走馬向居延遙知漢使蕭關外愁見孤城落日邊評事唐書百官志大理寺有評事八人從八品下右賢史記元朔之五年春漢令車騎將軍衛靑將三萬騎出高闕胸奴右賢王當衛靑等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人壯騎數百馳潰圍北去漢輕騎校尉郭成等逐數百里不及得右賢裨王十餘人靈雲池送從弟金杯緩酌清歌轉畫舸輕移艷舞回自歎鶺鴒臨水别不同鴻雁向池來靈雲池高適集有陪竇侍御泛靈雲池陪竇侍御靈雲南亭宴詩二首其序云凉州近胡高下其池亭蓋以耀蕃落也意此池即凉州之靈雲池矣鶺鴒張華禽經注鶺鴒雀屬也爾雅曰鶺鴒雍渠毛詩曰水鳥也大如雀高足長尾尖喙頸黑青灰色腹下正白飛則鳴行則搖又曰鶺鴒在原兄弟急難鶺鴒共母者飛吟不相離詩人取以喻兄弟相友之道也送沈子福歸江東二顧本俱無福字歸萬首唐人絶句唐詩品彚俱作之楊柳渡頭行客稀罟師蕩漿向臨圻惟有相思似春色江南江北送君歸臨圻謝靈運詩臨圻阻參錯李善注埤蒼曰崎曲岸頭也崎與圻同寒食汜上作文苑莢華作寒食汜水山中作國秀集作途中口號廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人汜上元和郡縣志河南府有汜水縣西南至府一百八十里汜水出縣東南三十二里浮戲山經武牢城東漢破曹咎于此廣武城杜氏通典河南府汜水縣古東虢國為鄭滅之鄭為制邑左傳曰制巖邑也有故虎牢城昔周穆王獲虎命畜之故曰虎牢漢謂之成臯縣後漢置成臯關其側有廣武城汶陽漢書地理志魯國有汶陽縣元和郡縣志故汶陽城在兖州龔丘縣東北五十四里其城側土田沃壤故魯號汶陽之田成二年齊歸我汶陽之田謂此地也劇嘲史寰清風細雨濕梅花驟馬先過碧玉家正直楚王宫裏至門前初下七香車菩提寺禁裴迪來相看說逆賊等凝碧池上作音樂供奉人等舉聲便一時淚下私成口號誦示裴迪萬首唐人絶句作書提寺禁聞逆賊凝碧池上作樂萬户傷心生野煙百官何日再朝天秋槐葉落空宫裏凝碧池頭奏管絃官唐詩紀事全唐詩話珊瑚鈎詩話俱作寮再二顧本明皇雜録唐詩紀事全唐詩話唐詩品彚俱作更葉珊瑚鈎詩話作花空唐詩紀事珊瑚鈎詩話俱作深菩提寺長安志平康坊南門之東有菩提寺隋開皇二年隴西公李敬道及僧惠英所奏立寺唐昭陵圖菩提寺在麻池之下與香積寺近賈氏談録賈君嘗自說太原軍前御命至永興軍催發馬草舍于菩提寺僧有智滿者言祖師宏道天寶末為寺主值祿山犯闕王右丞為賊所執囚于經藏院與左丞裘迪密相往來裘說賊㑹蕃漢兵馬宴于太極西內王聞之泣下遂為詩二絶書于經卷麻紙之後祖師收得之相傳至智滿賈君既獲披閲遂録得其辭云萬戶傷心生野煙云云又示裴迪安得捨塵網云云凝碧池明皇雜録天寶末羣賊陷兩京大掠文武朝臣及黃門宫嬪樂工騎士每獲數百人以兵仗嚴衛送于雒陽至有逃于山谷者而卒能羅捕追脅授以冠帶祿山尤致意樂工求訪頗切于旬日獲梨園弟子數百人羣賊因相與大㑹于凝碧池宴僞官數十人大陳御庫珍寶羅列于前後樂既作梨園舊人不覺歔欷相對泣下羣逆皆露刃持滿以脅之而悲不能已有樂工雷海青者投樂器于地西向慟哭逆黨乃縳海青于戲馬殿支解以示衆聞之者莫不傷痛王維時為賊拘于菩提佛寺聞之賦詩云云唐禁苑圖凝碧池在西內苑重元門之北飛龍院之南凉州賽神原注時為節度判官在凉州作凉州城外少行人百尺峯頭望虜塵健兒擊鼓吹羌笛共賽城東越騎神健兒唐六典天下諸軍皆有健兒成按稱軍士為健兒蓋本于三國時考吳志陳表傳云權以表能得健兒之心甘寧傳云能厚養健兒健兒亦樂為用命凌統傳云統為前鋒與所厚健兒數十人共乘一船吕範傳云範親客健兒篡取以歸之類羌笛成按說文笛七孔筒也羌笛三孔馬融笛賦曰近世雙笛從羌起羌人伐竹未及已龍鳴水中不見後裁竹吹之聲相似剡其上孔通洞之裁以當檛便易持易京君明識音律故本四孔加以一君明所加孔後出是為商聲五音畢然則羌笛本三孔後人加一孔京房又加一孔與今之六孔者不同也哭殷遙國秀集唐詩紀事俱作送殷四葬送君返葬石樓山松柏蒼蒼賔馭還埋骨白雲長已矣空餘流水向人間石樓山元和郡縣志京兆府渭南縣西南有石樓山太平寰宇記隰州石樓縣有石樓山唐書地理志汝州梁縣有石樓山一統志西安府盩厔縣有石樓山鳯翔府寶雞縣有石樓山未知孰是歎白髮宿昔朱顔成暮齒須臾白髮變垂髫一生幾許傷心事不向空門何處銷暮齒隋書王劭傳爰自志學暨乎暮齒篤好經史遺落世事垂髫玉篇髫小兒髮也魏志毛玠傳垂髫執簡纍勤取官王右丞集箋注卷十四
