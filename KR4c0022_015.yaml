body:
  text: 王右丞集箋注卷十五仁和趙殿成撰外編四十七首東溪玩月顧元緯外編録此首文苑英華亦作王維詩唐文粹作王昌齡詩月從斷山口遙吐柴門端萬木分空霽分唐文粹作紛流隂中夜攢光連虛象白氣與風露寒谷靜秋泉響巖深青靄殘清澄入幽夢清澄唐文粹作澄清破影抱空巒破影唐文粹作影破恍惚琴窗裏松溪曉思難過太乙觀賈生房顧元緯外編及凌本俱録此首文苑英華亦作王維詩昔余棲遁日之子烟霞鄰共攜松葉酒俱篸竹皮巾攀林遍雲洞雲一作巖採藥無冬春謬以道門子徵為驂御臣常恐丹液就先我紫陽賔天促萬塗盡哀傷百慮新蹟峻不容俗才多反纍真泣對雙泉水還山無主人松葉酒庾肩吾詩方欣松葉酒自和遊仙吟王績詩春釀煎松葉秋杯浸菊花竹皮巾漢書髙帝為亭長乃以竹皮為冠韋昭曰竹皮竹筠也今南夷取竹幼時績以為帳師古注竹皮筍皮謂笋上所解之籜耳非竹筠也今人亦往往為笋皮巾古之遺製也王績詩橫裁桑節杖直剪竹皮巾丹液漢武內傳其次藥有九丹金液子得服之白日升天此飛仙之所服地仙之所見也紫陽賔周氏冥通記第一紫陽左真人治葛衍山周君第二紫陽右真人治嶓冡山王君送孟六歸襄陽一作送孟浩然作顧元緯外編録此首文苑英華亦王維詩瀛奎律髓作張子容詩杜門不欲出欲瀛奎律髓作復久與世情疏以此為長策長一作良勸君歸舊廬醉歌田舍酒笑讀古人書好是一生事無勞獻子虛淮陰夜宿二首以下五首俱見顧元緯外編注云宋本作公詩又載唐孫逖集文苑英華俱編入行邁類亦稱逖作蓋與右丞早入榮陽界諸詩同紀遂誤作右丞詩耳水國南無畔扁舟北未期鄉情淮上失歸夢郢中疑木落知寒近山長見日遲客行心緒亂不及洛陽時永絶臥煙塘蕭條天一方秋風淮木落寒夜楚歌長宿莽非中土鱸魚豈我鄉孤舟行已倦南越尚茫茫宿莽楚辭夕攬中洲之宿莽王逸注草冬生不死者楚人名之曰宿莽南越杜氏通典自嶺而南當唐虞三代為蠻夷之國是百越之地亦謂之南越古謂之雕題非禹貢九州之域又非周禮職方之限在天文牽牛婺女則越之分野兼得楚之交下京口埭夜行孤帆度緑氛寒浦落紅曛江樹朝來出吳歌夜漸聞南溟接潮水北斗近鄉雲行役從兹去歸情入雁羣京口埭按唐書地理志潤州丹徒縣有京口埭山行遇雨驟雨晝氛氲空天望不分暗山惟覺電窮海但生雲涉澗猜行潦緣崖畏宿氛夜來江月霽棹唱此中聞夜到潤州夜入丹陽郡天髙氣象秋海隅雲漢轉江畔火星流城郭傳金柝閭閻閉緑洲客行凡幾夜新月再如鈎潤州按唐書地理志江南道有潤州丹陽郡武德三年以江都郡之延陵縣地置取潤浦為州名金柝顔延年詩卧伺金柝響起候亭燧烟又延年陽給事誄金柝夜擊和門晝扄李善注金謂刁斗也衛宏漢舊儀曰晝漏盡夜漏起城門擊刁斗周廬擊木柝李周翰注柝打更木也冬夜寓直麟閣顧元緯外編録此首唐詩品彚亦作王維詩文苑英華作宋之問詩成按題中麟閣之名乃是天授時所改神龍時無復此稱則此詩自應歸宋耳直事披三省省一作閣重關祕七門廣廷憐雪淨淨一作靜深屋喜罏溫深屋一作狹室月幌花虛馥花一作雲風窗竹暗喧東山白雲意兹夕寄琴樽樽一作言麟閣杜氏通典天授初改祕書省為麟閭神龍初復占掌經籍圖書七門後漢書百官志宫掖門每門司馬一人比千石本注曰南官南屯司馬主平城門北宮門蒼龍司馬主東門𤣥武司馬主𤣥武門北屯司馬主北門北官朱雀司馬主南掖門東明司馬主東門朔平司馬主北門凡七門月幌玉篇幌户廣切帷幔也王勃九成宫頌序風閨夕敞攜少女于歌筵月幌宵朧下姮娥于舞席賦得秋日懸清光詩雋類函唐詩類苑俱作王維詩唐詩品彚作無名氏詩寥廓凉天靜晶明白日秋圓光含萬象碎影入閒流迥與青𡨕合遙同江甸浮晝隂殊衆木斜影下危樓宋玉登髙怨張衡望逺愁餘暉如可託雲路豈悠悠江甸宋書蕭思話傳仗順沿流席卷江甸宋玉宋玉九辨悲哉秋之為氣也蕭瑟兮草木搖落而變衰憭栗兮若在逺行登山臨水兮送將歸張衡張衡作四愁詩有側身東望涕霑翰側身南望涕霑襟側身西望涕霑裳側身北望涕霑巾之句山中顧元緯外編凌本俱録此首荆溪白石出天寒紅葉稀山路元無雨空翠濕人衣荆溪一作藍田天寒一作玉關荆溪長安志荆谷水一名荆溪來自藍田縣至康村入萬年縣界西流二十里出谷至平川合庫谷採谷石門水為荆谷水一名産水冷齊夜話云吾弟超然喜論詩其為人純至有風味嘗曰陳叔寶絶無肺腸然詩語有警絶者如曰午醉醒未晚無人夢自驚夕陽如有意偏傍小窗明王摩詰山中詩曰溪清白石出天寒紅葉稀山路元無雨空翠濕人衣舒王百家夜休曰相看不忍發慘淡暮潮平欲别更攜手月明洲渚生此皆得于天趣豫問之曰句法固佳然何以識其天趣超然曰能言蕭何所以識韓信則天趣可言余竟不能詰曰微超然誰知之蘇東坡書摩詰藍田烟兩圖云味詰摩之詩詩中有畫觀摩詰之畫畫中有詩詩曰藍溪白石出玉川紅葉稀山路元無雨空翠濕人衣此摩詰之詩也或曰非也好事者以補摩詰之遺從軍行二首顧元緯本凌本俱録此首樂府詩集亦作王維詩萬首唐人絶句唐詩紀事俱作王涯詩辭行顧元緯本作戈甲從軍久戈樂府詩集作旌風雲識陳難今朝拜韓信計日斬成安後二句凌本樂府詩集俱作今朝韓信計日下斬成安拜韓信漢書髙帝紀漢王齊戒設壇場拜韓信為大將軍問以計策計日魏志司馬懿臨危制變禽公孫淵可計日待也斬成安史記韓信與張耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之也聚兵井陘口號稱二十萬信引兵下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道草山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟謂軍吏曰趙已先據便地為壁且彼未見吾大將旗鼓未肯擊前行恐吾至阻險而還信乃使萬人先行出背水陳趙軍望見大笑平旦信建大將之旗鼓鼓行出井陘口趙開壁擊之大戰良久于是信佯棄鼓旗走水上軍水上軍開入之復疾戰趙果空壁爭漢鼓旗逐韓信信已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍已不勝不能得信等欲還歸壁壁皆漢赤幟大驚以為漢皆已得趙王將矣兵遂亂遁走於是漢兵夾擊大破虜趙軍斬成安君泜水上禽趙王歇燕頷多奇相狼頭敢犯邊寄言班定逺正是立功年燕頷後漢書班超行詣相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指曰生燕頷虎頭飛而食肉此萬里侯相也後使西域西域五十餘國悉皆納質內屬焉下詔封超為定逺侯狼頭北史突厥者其先居西海之右獨為部落蓋胸奴之別種也姓阿史那氏後為鄰國所破盡滅其族有一兒年且十歲兵人見其小不忍殺之乃刖足斷其臂棄草澤中有牝狼以肉餌之及長與狼交合遂有孕馬彼王聞此兒尚在重遣殺之使者見在狼側并欲殺狼于時若有神物投狼于西海之東落髙昌國西北山山有洞穴狼匿其中遂生十男十男長外託妻孕其後各為一姓阿史那即其一也最賢遂為君長故牙門建狼頭纛示不忘本也遊春曲二首顧元緯本凌本俱録此首樂府詩集亦作王雒詩唐詩紀事作張仲素詩萬首唐人絶句作王涯詩萬樹江邊杏新開一夜風滿園深淺色照在緑波中上苑無窮樹花開次第新香車與絲騎風靜亦生塵無凌本唐詩紀事樂府詩集俱作何相思顧元緯外編凌本俱録此首凌本作江上贈李龜年萬首唐人絶句作相思紅豆生南國秋來發幾枝勸君多採擷此物最相思萬首唐人絶句豆作杏幾作故多作休凌本勸作贈紅豆資暇録豆有圓而紅其首烏者舉世呼為相思子即紅豆之異名也其木斜斫之則有文可為彈博局及琵琶槽其樹也大株而白枝葉似槐其花與皂莢花無殊其子若穆豆處于莢中通身皆紅李善云其實赤如珊瑚是也雲溪友議明皇幸岷山百官皆竄辱李龜年奔迫江潭杜甫以詩贈之曰岐王宅裏尋常見崔九堂前幾度聞正值江南好風景落花時節又逢君龜年曾于湘中採訪使筵上唱紅豆生南國秋來發幾枝贈君多採擷此物最相思又曰清風明月苦相思蕩子從戎十載餘征人去日殷勤囑歸雁來時數附書此辭皆王右丞所製至今梨園唱焉歌合座莫不望南幸而慘然太平樂二首顧元緯本凌本俱録此首樂府詩集亦作王維詩萬首唐人絶句作王涯詩唐詩紀事作張仲素詩樂顧元緯本凌本俱作辭風俗今和厚君王在穆清行看採花曲盡是泰階平和顧元緯本作何探唐詩紀事作採太平樂樂府詩集樂苑曰太平樂商調曲也穆清史記漢興以來至明犬子獲符瑞建封禪改正朔易服色受命于穆清如淳注受天命清和之氣正義曰穆美也言天子有美德而教化清也泰階平長楊賦玉衡正而太階平李善注黃帝六符經泰階者天之三階也上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人三階平則隂陽和風雨時歲大登民人息天下平是謂太平李周翰注太階三階星也此三星正平則天下太平也聖德超千古皇威靜四方蒼生今息戰無事覺時長威唐詩紀事作風送春辭顧元緯本凌本俱録此首萬首唐人絶句作王涯詩唐詩紀事全唐詩話並作張仲素詩日日人空老年年春更歸相歡在尊酒不用惜花飛書事顧元緯外編凌本俱録此首輕隂閣小雨深院畫慵開坐看蒼苔色欲上人衣來詩人玉屑王維書事云輕隂閣小雨深院晝慵開坐看蒼苔色欲上人衣來舒王云若耶溪上踏莓苔興盡張帆載酒回汀草岸花渾不見青山無數逐人來兩詩皆含不盡之意子由謂之不帶聲色楊升菴詩話王摩詰詩今所傳僅六卷如輕隂閣小雨深院晝慵開坐看蒼苔色欲上人衣來一首見于洪覺範天廚禁臠人家在仙掌雲氣欲生衣見于董畫跋而本集不載則知其詩遺落多矣塞上曲二首顧元緯本凌本俱録此首樂府詩集亦作王維詩萬首唐人絶句作王涯詩唐詩紀事前首作張仲素詩後首作王涯詩天驕逺塞行出鞘寶刀鳴定是酬恩日今朝覺命輕出鞘樂府詩集作鞘裏塞虜常為敵邊風已報秋平生多志氣箭底覓封侯隴上行顧元緯本凌本俱録此首萬首唐人絶句唐書紀事俱作王涯詩負羽到邊州鳴笳度隴頭雲黃知塞近草白見邊秋羽萬苜唐人絶句作箭負羽江淹别賦或乃邊郡未和負羽從軍吕延濟注箭有羽從軍負之于背而行閨人贈逺五首顧元絳本凌本俱録五首萬首唐人絶句唐詩紀事唐詩品彚並作王涯詩閨又唐詩紀事題作人寄逺花明綺陌春柳拂御溝新為報遼陽客流芳不待人陽一作東芳一作光綺陌梁簡文帝詩三條綺陌平遼陽漢書地理志遼東郡冇遼陽縣逺戍功名薄幽閠年貌傷妝成對春樹不語淚千行功名薄陸機詩但恨功名薄竹帛無所宣幽閨江淹别賦慚幽閨之琴瑟啼鶯緑樹深語燕雕梁晚不省出門行沙場知近逺啼鶯一作鶯啼語燕一作燕語雕梁昭明太子十二月啓魚遊碧沼疑呈逺道之書燕語雕梁狀對幽閨之語形影一朝別烟波千里分君看望君處秖是起行雲朝一作相洞房今夜月如練復如霜為照離人恨亭亭到曉光洞房長門賦懸明月以自照兮徂清夜于洞房吕向注洞深也如練沈約詩秋月光如練照耀三爵臺如霜謝朓樂府夜月如霜金風方嫋嫋亭亭謝靈運詩亭亭曉月映冷冷朝露滴謝惠連詩亭亭映江月李善注亭亭迥貌吕向注亭亭月明貌過友人莊此本孟浩然八言律詩今萬首唐人絶句減去後四句作一絶作王維不知何據顧元緯外編亦録此首故人具雞黍邀我至田家緑樹村邊合青山郭外斜感興此本鄭谷詩詩學權輿以為王摩詰作顧元緯外編亦録此首禾黍不艷陽競栽桃李春翻令力耕者半作賣花人遊春辭二首顧元緯本凌本俱録此首樂府詩集亦作王維詩萬首唐人絶句唐詩紀事俱作王涯詩令洪邁萬首唐人絶句序云王涯在翰林同學士狐楚張仲素所賦宫詞諸章乃誤入于王維集乂于王維詩下注云別本維乂有遊春詞等詩十五篇并五言十五篇皆王涯所作今已入涯詩中曲江絲柳變烟條寒谷冰隨暖氣銷才見春光生綺陌已聞清樂動雲韶雲韶雲門黃帝樂大韶虞舜樂陸雲詩鸞棲髙岡耳想雲韶曹毗宗廟歌詩愔愔雲韶盡美盡善經過柳陌與桃溪尋逐春光著處迷鳥度時時衝絮起花繁滚滚壓枝低溪唐詩紀事樂府詩集俱作蹊春樂府詩集作風秋思二首顧元緯本凌本俱録此首樂府詩集作王維詩萬首唐人絶句唐詩紀事作王涯詩網軒凉吹動輕衣夜聽更生玉漏稀月渡天河光轉濕鵲驚秋樹葉頻飛網一本作緑生萬首唐人絶句唐詩紀事樂府詩集俱作長網軒沈約詩網軒映朱輟張銑注軒屋檐也以網及珠綴而飾之宫連太液見滄波暑氣微消秋意多一夜輕風蘋末起露珠翻盡滿池荷消凌本樂府詩集俱作清太液史記建章宫其北治大池漸臺髙二十餘丈名曰太液池有蓬萊方丈瀛州壺梁象海中神山龜魚之屬漢書昭帝紀黃鵠下建章宫太液池中如淳注謂之液者言天地和液之氣所為也臣瓚曰太液池言承陰陽津液以作池也三輔黃圖太液池在長安故城西建章宫北未央宫西南太液者言其津潤所及廣也長安志大明宫蓬萊殿後有含凉殿後有太液池池內有太液亭子柳惲詩太液滄波起蘋末宋玉風賦夫風生于地起于青蘋之末秋夜曲二首顧元緯本凌本俱載此首樂府詩集作王維詩萬首唐人絶句作王涯詩全唐詩話唐詩紀事俱作張仲素詩丁丁漏水夜何長漫漫輕陰露月光秋逼暗蟲通夕響寒衣未寄莫飛霜陰凌本萬首唐人絶句唐詩紀事樂府詩集俱作雲逼凌本樂府詩集俱作壁桂魄初生秋露微輕羅已薄未更衣銀筝夜久殷勤弄心怯空房不忍歸從軍辭顧元緯本凌本俱載此首樂府詩集并前從軍辭二首亦作王維詩萬首唐人絶句唐詩紀事作王涯詩髦頭夜落捷書飛來奏軍門著賜衣白馬將軍頻破敵黃龍戍卒幾時歸軍凌本萬首唐人絶句唐詩紀事樂府詩集俱作金樂府詩集作鏑非髦頭史記天官書昴口髦頭胡星也正義曰昴一星為髦頭胡星亦為獄事明天下獄訟平暗為刑罰濫六星明與大星等大水且至其兵大起搖動若跳躍者兵大起一星不見皆兵之憂也白馬將軍三國志龎德常乘白馬羽軍謂之白馬將軍皆憚之塞下曲二首辛勤幾出黃花戍迢遰初隨細柳營塞晚每愁殘月苦邊愁更逐斷蓬驚愁凌本唐詩紀事樂府詩集俱作秋驚唐詩紀事作聲黃花戍唐書地理志河北道平州北平郡有黃花戍年少辭家從冠軍金裝寶劍去邀勳不知馬骨傷寒水惟見龍城起暮雲金裝梁簡文帝登山馬詩間樹識金裝馬骨陳琳詩飲馬長城窟水寒傷馬骨龍城漢書車騎將軍衛青至龍城獲首虜七百級又胸奴傳五月大㑹龍城祭其先天地鬼神史記索隱崔浩云西方皆事龍神故名大㑹處為龍城後漢書云胸奴俗歲有三龍祠天神平戎辭二首顧元緯本凌本俱載此首作平戎辭萬首唐人絶句作王涯詩唐詩紀事前首作王涯詩後首作張仲素詩太白秋髙助漢兵長風夜卷虜塵清男兒解却腰間劍喜見從王道化平漢顧元緯本萬首唐人絶句俱作後唐詩紀事作發從樂府詩集作君卷斾生風喜氣新早持龍節靜邊塵漢家天子圖麟閣身是當今第一人龍節唐書大將出賜旌以顓賞節以顓殺旌以綘帛五丈粉畫虎有銅龍一首纒緋幡紫縑為袋油囊為表節懸畫木盤三相去數寸隅垂赤麻餘與旌同麟閣漢書甘露三年單于始入朝上思股肱之美乃圖畫其人于麒麟閣法其形貌署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍額侯韓增次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽成侯劉德次曰少府梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世是以表而揚之以著中興輔佐列于方叔召虎仲山甫焉張晏注武帝獲麒麟時作此閣圖畫其像于閣遂以為名師古曰漢宫閣疏名云蕭何造閨人春思顧元緯本凌本俱載此首萬首唐人絶句作王涯詩全唐詩話唐詩紀事並作張仲素詩愁見遙空百丈絲春風挽斷更傷離閒花落遍青苔地盡日無人誰得知遙唐詩紀事萬首唐人絶句俱作遊挽唐詩紀事作惹遍凌本萬首唐人絶句作盡百丈絲庾信詩洛陽游絲百丈連黃河春冰千片穿贈遠二首顧元緯本凌本俱載此首萬首唐人絶句作王涯詩唐詩紀事作張仲素詩當年只自守空帷夢見關山覺別離不見鄉書傳雁足惟看新月吐蛾眉自一作是關唐詩紀事作江雁足漢書天子射上林中得雁足有係帛書厭攀楊柳臨青閣閒採芙渠傍碧潭走馬臺邊人不見拂雲堆畔戰初酣青閣江淹詩朝與住人期日夕望肯閣芙渠毛萇詩傳荷花芙渠也其花菡萏陸璣詩疏荷其花未發為菡萏已發為芙渠走馬臺漢書張敝傳時罷朝㑹過走馬章臺街孟康注章臺街在長安中拂雲堆唐書地理志豐州中受降城有拂雲堆祠接靈州境元和郡縣志朔方軍北與突厥以河為界河北岸有拂雲堆祠突厥將入寇必先詣祠祭酹求福因牧馬料兵而後渡河太平寰宇記拂雲堆在勝州榆林縣北百七十里酣韓非子酣戰之時司馬子反渴而求飲獻壽辭顧元緯本凌本俱載此首萬首唐人絶句唐詩紀事俱作王涯詩宫殿參差列九重祥雲瑞氣捧階濃微臣欲獻唐堯壽遙指南山對衮龍殿唐詩紀事作觀唐堯壽莊子堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也女獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰天生萬民必授之職多男子而授之職則何懼之有富而使人分之則何事之有夫聖人鶉居而鷇食烏行而無彰天下有道則與物皆昌天下無道則修德就閒千歲厭世去而上仙乘彼白雲至于帝鄉三患莫至身常無殃則何辱之有失題顧元緯本凌本俱載此首亦見萬首唐人絶句顧元緯本萬首唐人絶句作李龜年所歌凌本作雜詩樂府詩集作伊州歌第一叠清風明月苦相思蕩子從戎十載餘征人去日殷勤囑歸雁來時數寄書清凌本作秋明萬首唐人絶句作朗苦相思一作獨離居戎凌本作車寄凌本萬首唐人絶句俱作附疑夢見事文類聚莫驚寵辱空憂喜莫計恩讐浪苦辛黃帝孔子何處問安知不是夢中身成讀諸家所刻右丞詩集惟劉須溪評本為最善然其中亦往往雜以他人之作如錢起盧象崔興宗諸公所賦皎然明白者亦亂厠其間况其他乎洪邁辨遊春詞等三十首為王涯所作而諸本儼然猶載集中雖其詩亦佳麗可誦較之魚目混珠碔砆亂玉大有徑庭然究非摩詰本來面目矣若文苑英華雲溪友議冷齊夜話詩人玉屑樂府詩集等書所載右丞詩章有集中所不載者而别書又以為某某所作疑不能定也存之懼其亂真因别彚為一卷謂之外編以明非劉氏所較集內之詩故耳蓋亦存而不論之意至于分涇渭之殊流別淄澠之異味于聲調體格微似之間而辨正其某首為真某首為誤則請以俟淹雅之君子王右丞集箋注卷十五
