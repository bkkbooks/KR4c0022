body:
  text: 王右丞集箋注卷十六仁和趙殿成撰賦表八首白鸚鵡賦若夫名依西域族本南海同朱喙之清音變緑衣於素彩于一作而惟兹鳥之可貴諒其美之斯在鳥文苑英華作禽爾其入玩於人見珍奇質狎蘭房之伎女去桂林之雲日易喬枝以羅袖代危巢以瓊室兩以字文苑英華俱作于慕侣方逺依人永畢託言語而雖通顧形影而非匹而唐文粹作之經過珠網出入金鋪單鳴無應隻影長孤偶白鷴於池側對皓鶴於庭隅愁混色而難辨願知名而自呼願文苑英華作每明心有識懷恩無極無文苑英華作何芳樹絶想雕梁撫翼時嗛花而不言每投人以方息慧性孤稟雅容非飾含火德之明輝被金方之正色至如海燕呈瑞有玉筐之可依筐文苑英華作笥唐文粹作篋山雞學舞向寶鏡而知歸寶文苑英華作瑤皆羽毛之偉麗奉日月之光輝羽毛文苑英華作毛羽豈憐兹鳥地逺形微色凌紈質彩奪繪衣深籠久閉喬木長違閉一作間非儻見借其羽翼與遷鶯而共飛其文苑英華作于白鸚鵡初學記廣州記曰根杜出五色鸚鵡曾見其白者大如母雞南方異物志曰鸚鵡有三種一種青大如鳥臼一種白大如鴟梟一種五色大于青者交州巴南盡有之凡鳥四指三向前一向後此鳥兩指向後桂海虞衡志白鸚鵡大如小鵝亦能言羽毛玉雪以手撫之有粉粘著指掌如蛺蝶翅西域禰衡鸚鵡賦惟西域之靈鳥挺自然之奇姿李善注西域謂隴坻出此鳥也南海史記始皇本紀略取陸梁地為桂林象郡南海杜氏通典南海今南海始興義寧海豐恩平南陵臨賀髙要感義晉康臨封開陽髙涼連城新興銅陵懷德等郡是蘭房宋玉諷賦乃更于蘭房芝室止臣其中桂林漢書地理志鬱林郡故秦桂林郡屬尉陀武帝元鼎六年開更名杜氏通典桂林今始安平樂蒙山開江潯江蒼梧臨江鬱林平琴安城賀水常林象郡龍城融水朗寧懷澤寧浦橫山修德龍池永定等郡是依人庾信詩愛靜魚爭樂依人鳥入懷珠網江淹詩結眉向珠網瀝思視青苔王融詩雕雲度綺錢香風入珠網金鋪長門賦擠玉户以撼金鋪李延濟注金鋪扉上有金花花中作鈕鐶以貫鎖左思蜀都賦金鋪交映劉淵林注金鋪門鋪首以金為之韻會鋪説文著門鋪首也從金甫聲增韻所以銜環者作龜蛇之形以銅為之故曰金鋪白鷴張華禽經注白鷴似山雞而色白皓鶴謝惠連雪賦皓鶴奪鮮白鷴失素投人晉書載記烏雀投人尚宜濟免火德禰衡鸚鵡賦體金精之妙質含火德之明輝李善注西方為金毛有白者故曰金精南方為火觜有赤者故曰火德李周翰注西方金也質寄于西故云體金精也朱鳥南方火也鳥皆稟之故云含火德也玉筐宋書符瑞志髙辛氏之世妃曰簡狄以春分玄鳥至之日從帝祀郊禖與其妹浴于玄丘之水有玄鳥銜卵而墜之五色甚好二人競取覆以玉筐簡狄先得而吞之遂孕胸剖而生契山雞異苑山雞愛其毛羽映水則舞魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令置大鏡其前雞鑒形而舞不知止遂乏死遷鶯本小雅出谷遷喬義然詩人是泛指凡鳥而言後人多作鶯事使所未詳也成按文苑英華載白鸚鵡賦凡三首第一即右丞作第二不著姓氏第三郝名逺作皆于題下注云以容日上飾孤飛色媚為韻而本集無之又第一第二並止賦五韻缺餘三韻豈當時之制雖限八韻亦聽士子為盈縮耶賀古樂器表臣維言伏見今月七日中書門下敕牒道士申太芝奏稱伏奉恩旨令臣往名山修功德去載六月二十日於南海葛洪居處至誠祈請中夜恍惚見一老人云是茅山羅浮神人常於七曜洞來往昔曾九疑山於桂陽石室中藏天樂一部歲月久逺變為五野豬彼郡百姓捉獲汝可往取獻皇帝每祈祭但依方安置奏之即五音自和天仙百神應聲降福所求必遂壽命延長臣奉神言即往桂陽尋問百姓云天寶二載村人常見有五野豬逐之便走入石室就裏尋覓化為石物五枚衆共驚異臣取以扣之音律相和與神人言不異今將奉進者臣聞陰陽不測之謂神變化無方之謂聖惟神與聖感而遂通伏惟開元天寶聖文神武應道皇帝陛下居皇建之極中得混成之大道奉先天之聖祖元化協於無為育率土之羣生至仁侔於陰隲然猶精意不倦聖祀逾崇遍禮羣仙思祐九服故得龎眉皓髮遙同入昴之人真訣玄言來告馭風之客棲身七曜以俟唐堯藏樂九疑不傳虞舜留兹石室思獻玉墀憑野豕以呈形表洞仙之屬意且神物思變古亦有之龍躍平津實為寶劍鳬飛葉縣空餘素履器非上品人才下仙猶能精誠聿修神變浚若況殊庭致貺天老效祥願授至尊以享上帝亦既考擊動諧律吕韶濩慚其九奏雲咸失其八音翠鳳入于洞簫殊非雅韻朱鷺傳于鼗鼓敢比仙聲天地同和神祗降福無窮之壽永撫寶圖無疆之休以康庶績實由至德斯感大道玄通神人親告於休徴靈仙不祕其空樂稽之古昔實未見聞臣等限以留司不獲隨例抃舞不任踴躍喜慶之至敕牒唐六典凡上之所以逮下其制有六曰制敕册令教符凡下之所以達上其制亦有六曰表狀箋啓辭牒李林甫注天子曰制曰敕曰册皇太子曰令親王公主曰教尚書省下於州州下於縣縣下於鄉皆曰符表上於天子其近臣亦為狀牒啓于皇太曰子然于其長亦為之非公文所施九品以上公文皆牒庶人曰辭申太芝神仙彚紀申太芝字元芝洛陽人其母楊夢吞芝而孕故名以玄宗同日生稍長去家學道常遊南嶽至祝融峯頂遇異人授金丹火龍之術遂能乘虛玄宗感夢以像求得之召至京師命住玄真觀神遊隱顯出入不可測元中中秋夜與玄宗同遊月宫過一大門在玉光中見宫榜曰廣寒清虛之府守門兵衛甚設太芝引帝躍起雲煙霧上俯視玉城嵯峨若萬頃琉璃田仙人道士乘駕鶴往來其間下見素娥十餘皓衣乘白鸞笑舞於廣庭大樹下樂音清麗帝歸因製霓裳羽衣之曲天寶初奉詔祭羅浮山訪尋朱明洞道遇異人告以天樂甚異後應安祿山之亂即所奏于凝碧池頭者太芝道術最高醮祭輒動風雨所著有服食要訣世稱天師又曰仙翁後坐妖妄伏誅道流謂為兵解競傳在大余湖山白晝沖舉云葛洪居處廣東志羅浮山朱明洞前有虛觀即都虛觀故址晉咸和中葛洪于此煉丹以從學者衆乃于此置四庵山南曰都虛又曰玄虛又改名沖虛至唐朝天寶初置守祠十家仍度道士賜額內有葛洪祠葛洪丹竈茅山太平寰宇記茅山在升州句容縣南五十里本勾曲山其山形如勾字三曲晉茅山君得道于此山後人遂名為茅山其山接句容金壇延陵三縣界羅浮藝文類聚羅浮山記曰羅浮者蓋總稱焉羅羅山也浮浮山也二山合體謂之羅浮在增城博羅二縣之境舊説羅浮高三千丈有七十石室七十二長溪神明神禽玉樹朱草太平寰宇記羅浮山本名蓬萊山一峯在海中與羅山合體因名之山有洞通句曲又有璇房瑤室七十二所裴淵廣州記云羅浮二山隱天唯石樓一路可登謝靈運羅浮山賦序客夜夢見延陵茅山在京之東南明旦得洞經所載羅浮山事云茅山是洞庭口南通羅浮正與夢中意相會遂感而作羅浮山賦九疑山方輿勝覽九疑山在道州寧遠縣南六十里亦名蒼梧山九峯相似望而疑之謂之九疑山有九峯峯各有一水四水流灌於南海五水北注合為洞庭其一曰朱明峯其下湘水源二曰石城峯其下沱水源女冠魯妙典所居三曰石樓峯其下巢水源四曰娥皇峯其下池水源五曰舜源峯其下瀑水源亦曰華蓋此峯最髙六曰女英峯其下砅水源七曰簫韶峯其下渀水源八曰桂林峯其下洑水源九曰梓林峯其下湎水源桂陽石室唐書地理志彬州桂陽郡屬江南西道方輿勝覽道州有髙士巖在舜祠西二里間舊名野豬巖丘順甫欽若改曰髙士巖昔有獵者見羣豖逐入巖不見因得樂器一部無為觀道士以獻之朝事見唐王維賀表尊號歐陽修唐書本紀天寶七載五月壬午羣臣上尊號曰開元天寶聖文神武應道皇帝皇建書洪範五皇極皇建其有極孔安國傳皇大極中也大中之道大立其有中混成老子有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道強為之名曰大河上公注謂道無形混沌而成萬物乃在天地之間聖祖唐會要乾封元年三月二十日追尊老君為太上玄元皇帝至永昌元年却稱老君神龍元年二月四日依舊號太上玄元皇帝天寶二年正月十五日加號太上玄元皇帝為大聖祖玄元皇帝八載閏六月十五日加號為大聖祖大道玄元皇帝十三年二月七日加號大聖髙上大道金闕玄元皇帝元化張華詩先王統大業玄化漸八維陰隲書洪範惟天陰隲下民孔安國傳隲定也不言而默定下民龎眉皓髮後漢書劉寵傳山陰縣有五六老叟龎眉皓髮自若邪山谷間出章懷太子注龎雜也老者眉雜白黑也入昴見十一卷五老注馭風莊子列子御風而行泠然善也句有五日而後反龍躍平津晉書初吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也惟張華以為不然及吳平之後紫氣愈明華圍豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰是何祥也煥曰寶劍之精上徹于天耳華曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍並刻題一曰龍泉一日太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒豔發大盆盛水置劍其上視之者精芒炫目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰本朝將亂張公將受其禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服也華得劍寶愛之常置坐側華以南昌土不如華陰赤土報煥書曰詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳因以華陰土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽于腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反須臾光彩照水波浪驚沸於是失劍華嘆曰先君化去之言張公終合之論此其驗乎鳬飛葉縣後漢書王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來于是候鳬至舉羅張之但得一隻舄焉乃詔上方診視則四年中所賜尚書官屬履也殊庭漢書郊祀志上親禪髙里祠后土臨勃海將以望祀蓬萊之屬幾至殊庭焉師古注殊庭蓬萊中仙人庭也韶濩雲咸蔡雍獨斷五帝三代樂之别名黃帝曰雲門顓頊曰六莖帝嚳曰五英堯曰咸池舜曰大韶夏曰大夏殷曰大濩周曰大武九奏初學記凡樂作謂之奏九奏乃終謂之九成孔頴達尚書正義成謂樂曲成也鄭云成猶終也每曲一終必變更奏故經言九成傳言九奏周禮謂之九變其實一也八音晉書金石匏革絲竹土木謂之八音翠鳳用列仙傳簫史事朱鷺陸璣詩疏楚威王時有朱鷺合沓飛翔而來舞舊鼓吹朱鷺曲是也寶圖徐陵文帝登祚尊皇太后詔復子明辟還承寶圖無疆之休商書實萬世無疆之休庶績虞書庶績咸熙休徴出尚書洪範孔安國傳休徴美行之驗也賀玄元皇帝見真容表臣維言伏見中書門下奏上黨郡奏啓聖祖大道玄元皇帝玉石真容主上聖容今月十五日三元齊開光明其日戍後道士陳希玉等十三人同朝禮見內殿有光非常照耀及開殿門其光彌盛滿堂如晝久之方散其時檢校官及押官等皆共瞻覩者臣聞仙祖行化真氣臨關聖人降生祥光滿室固知仙聖必有景光伏惟開元天地大寶聖文神武應道皇帝陛下大道為心上元同體挾風雲之質敬想猶龍寫日月之儀欽承大象仍迥舊邸以奉清都真容聖容既明四目照殿照室忽類三光蘂宫自明初謂上天無夜桂殿如晝還疑就日而朝琪樹韜華瑤池奪映實由陛下宏敷本際大啓玄宗明君潤色于真源聖祖和光于帝載表文明之在御六合以清知臨照之無疆億載多慶臣等限以留司不獲隨例抃舞無任踴躍喜慶之至上黨郡唐書地理志潞州上黨郡屬河東道玉石真容唐會要天寶元年正月七日陳王府參軍田同秀上言玄元皇帝降于丹鳳門之通衢告賜靈符在尹喜之故宅上遣使就函谷故關尹喜臺而得之于是置玄元皇帝廟于大寧坊西南角東都置于積善坊臨淄舊邸廟初成命工人于太白山砥石為玄元皇帝聖容又採白石為玄宗聖容侍立于玄元皇帝之右衣以王者袞冕之服三元唐六典齋有七名其四日三元齋注云正月十五日天官為上元七月十五日地官為中元十月十五日水官為下元皆法身自懺愆罪焉檢校官杜氏通典神龍二年三月又置員外官二千餘人于是遂有員外檢校試攝判知之官攝者言敕攝非州府板署之命檢校者云檢校某官判官者云判某官事知者云知某官事皆是詔除而非正命真氣水經注老子西出關關令尹喜候氣知真人將有西遊者遇老子強令之著書耳不得已為著道德二經祥光宋書符瑞志光武皇帝父為濟陽令濟陽有武帝行官常封閉哀帝建平元年十二月甲子夜光武將産乃開而居之時有赤光室中盡明皇考異焉南史宋髙祖武皇帝諱褡字德輿以晉哀帝興寧元年歲在癸亥三月壬寅夜生神光照室盡明宋世祖孝武皇帝諱駿字休龍文帝第二子也元嘉七年八月庚午夜生有光照室魏書髙祖孝文皇帝諱宏獻文皇帝之太子也皇興元年八月戊申生于平城紫宫神光照室猶龍史記孔子謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為網遊者可以為綸飛者可以為矰至于龍吾不能知其乘風雲而上天吾今日見老子其猶龍乎清都列子王實以為清都紫微鈞天廣樂帝之所居蘂宫真靈位業圖有太和殿寥陽殿蘂珠宫桂殿沈約詩恩暢籣席歡同桂殿就日用帝堯就之如日事琪樹孫綽遊天台山賦琪樹璀璨而垂珠吕延濟注琪樹玉樹也瑤池穆天子傳天子觴西王母于瑤池之上集仙録九層玄室紫翠丹房左帶瑶池右環翠水宏敷宏大也敷布也出周書君牙篇帝載尚書有能奮庸熙帝之載孔安國傳載事也賀神兵助取石堡城表臣維等言伏奉中書門下牒伏見絳郡太平縣百姓王英杞狀稱去載七月於萬春鄉界頻見聖祖空中有言曰我以神兵助取石堡城當時具經郡縣陳説並有文狀申奏訖今載正月又于舊處再見云我昔于梓州威洞造一龕尊像在獨坐山東北公成山左側年代已遠其處傾陷像在土中可報吾孫令人往取斯乃蒼生之福國祚無疆者近奉進止差直省往彼求覓昨見梓潼郡奏稱去年某月二十六日郡縣官吏并道士父老百姓等一千餘人與直省李萬德依此尋求其日諸山盡皆晴朗惟公成山上雲霧暗合遍尋不知所在遂結壇齋戒祈請經宿至二十七日辰時有五色雲見于霧合之處遂即分人子細尋覓乃見山半腹有少土傾處其上竹樹非常蒙密并見一石角出土一寸便穿掘深三尺已來乃是一石龕龕中有尊像一左右真人六并師子崑崙各二遂以水洗沃儀相儼然事實吐符並如真誥其石龕重大非人力所能運轉今於龕上造屋宇便差精誠道士三人專修香火供養謹畫圖奉進者臣聞元德升聞與至降監必錫靈貺彰厥有成不祕祥符昭其克享伏惟開元天地大寶聖文神武應道皇帝陛下以道理國以竒用兵先天而法自然終日不離輜重故得仙君居九霄之上屢降中州聖祖在千古之前還臨後葉視之不見者今見聽之不聞者今聞仍敕神兵以助王旅天丁力士潛結鸛鵝星劍雲旗暗克貔虎遂殱逆命之冦果屠難拔之城加以言必有徴德無不報指尊像之所在為寶祚之休徴周流六虛言于晉而驗于蜀混成一氣出于有而入于無未達齋心初迷三里之霧既符真氣俄成五色之雲山腹洞開仙容儼若萬物今覩千劫未逢昔河啓緑圖緑顧本作籙非是今校正山輸玄女尚謂得天之助藏為受命之符況真誥人聞聖容神造照臨下土不住大羅之天保祐羣生爰啓小有之洞實感明主縮地而來豈比漢時乘空而去元后欽崇之福遠至邇安聖祖昭報之心天長地久臣等限以留司不獲隨例抃舞不勝踴躍喜慶之至石堡城劉昫唐書本紀天寶八載六月隴右節度使哥舒翰攻吐蕃石堡城拔之太平縣唐書地理志河東道絳州絳都有太平縣獨坐山太平寰宇記獨坐山在梓州射洪縣東南二十五里周回一里髙一百丈卓然孤峻南枕涪梓二水一統志獨坐山在射洪縣東南二十里射洪涪江左右合流此山卓然孤立故名崑崙唐人多以蠻人為奴謂之崑崙劉昫唐書南蠻傳自林邑以南皆拳髮黑身通號為崑崙玄德舜典玄德升聞乃命以位孔安國傳玄謂幽潛潛行道德升聞天朝遂見徴用以竒用兵老子以正治國以竒用兵法自然見十一卷注不離輜重老子重為輕根靜為躁君是以聖人終日行不離輜重河上公注輜靜也聖人終日行道不離其靜與重也離音利鸛鵝左傳丙戌與華氏戰于赭丘鄭翩願為鸛其御願為鵝杜預注鸛鵝皆陳名貔虎牧誓勗哉夫子尚桓桓如虎如貔如熊如罷于商郊周流六虛借用周易繫詞句出有入無孫綽遊天台山賦騁神變之揮霍忽出有而入無三里霧後漢書關西人裘優亦能為三里霧劫魏書道家稱劫數頗類佛經其延康龍漢赤明開皇之屬皆其名也及其劫終稱天地俱壞緑圖淮南子洛出丹書河出緑圖髙誘注黃帝云夢見兩龍挺白圖即帝以授于河之都天老曰天其授帝圖乎黃帝乃齋河洛之間至于翠媯泉大盧魚折溜而至泛白圖蘭采朱文以授黃帝舒受之故曰緑圖玄女桓驎西王母傳黃帝討蚩尤之暴威所未禁而蚩尤幻變多方徴風召雨吹煙噴霧師衆大迷帝歸息太山之阿昏然憂寢王母遣使者被玄狐之裘以符授帝曰太一在前天一在後得之者勝戰則克矣佩符既畢王母乃命一婦人人首鳥身謂帝曰我九天玄女也授帝以三宮五意陰陽之略太一遁甲六壬步斗之術陰符之機靈寶五符五勝之文遂克蚩尤于中冀龍魚河圖黃帝攝政蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石造兵仗刀戟大駑威震天下誅殺無道不仁不慈萬民欲令黃帝行天子事黃帝仁義不能禁止蚩尤遂不敵帝仰天而嘆天遣玄女下授兵信神符而令制伏蚩尤歸臣帝因使鎮兵以制八方元后元后大君也見大禹謨欽崇商書欽崇天道遠至邇安左傳恕思以明德則令名載而行之是以遠至邇安天長地久老子天長地久天地所以能長且久者以其不自生故能長生門下起赦書表伏奉制書如右好生之德洽於人心奉天之時以行春令體元作則惟聖裁成伏惟乾元大聖皇帝陛下道凝庶績功深廣運極孝敬於至誠致雍和於允穆狹其祝網陋彼畫衣寧失不經況乎輕繫大赦戮餘之罪益寬流宥之典人謂無寃何如捨而不問殺而有禮豈若至于無刑加以親減庶羞無祭肺之膳下除冗食贍糊口之人買櫝設闕藏彼無歸之骨歲取畝收本乎盍徹之稅巨猾止于一惡貧人免于十夫思折劵者寬其暴征嘗書勳者貰其宿負道德齊禮成其有恥之心悔咎思愆開其自新之路道之一變將使比屋可封守在四夷庶夫外戶不閉風俗忠厚禮讓興行六府孔修萬代永賴臣等忝居門下不任鳬藻抃躍之至赦書唐書肅宗本紀上元元年三月丙子降死罪流以下原之二年正月甲寅降死罪流以下原之好生虞書大禹謨好生之德洽于民心春令月令仲春之月命有司省囹圄去桎梏母肆掠止獄訟體元東都賦體元立制繼天而作杜預左傳注凡人君即位欲其體元以居正尊號唐書肅宗本紀乾元二年正月已巳羣臣上尊號曰乾元大聖光天文武孝感皇帝今云乾元大聖皇帝當是闕文雍和後漢書后紀述敘平生雍和終日允穆南史陳武帝紀百揆時序四門允穆畫衣漢書刑法志有虞氏之時畫衣冠異章服以為戮而民弗犯不經虞書與其殺不辜寧失不經孔安國傳寧失不常之罪不枉不辜之善流宥虞書流宥五刑孔安國傳宥寬也以流放之法寬五刑無刑虞書刑期于無刑民協于中庶羞周禮羞用百二十品鄭康成注羞出於牲及禽獸以備滋味謂之庶羞公食大夫禮內則下大夫十六上大夫二十其物數備焉天子諸侯有其數而物未得盡聞史記口甘五昧為之庶羞酸鹹以致其美曹子建詩樂飲過三爵緩帶傾庶羞李周翰注庶羞衆味也祭肺禮記歲凶年榖不登君膳不祭肺鄭康成注禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也糊口左傳而使糊其口義于四方孔穎達正説文云糊寄食也以此傳言糊口四方故以寄食言之昭七年傳云饘于是鬻于是以糊余口釋言云糊饘也則糊是饘鬻别名今人以薄鬻塗物謂之也糊紙糊帛則糊者以鬻食口之名故云糊其口巨猾東京賦巨猾間舋竊弄神器十夫南史郭原平父亡自賣十夫以供衆費葬畢詣所買主執役無懈與諸奴分務讓逸取勞主人不忍使每遣之原平服勤未嘗暫替吳達之嫂亡無以葬自賣為十夫客以營冢椁守在四夷淮南子天子得道守在四夷外戶不閉禮運故外户而不閉是謂大同孔穎達正義外戶者扉從外闔也不閉者不用關閉之也重門擊柝本禦暴客既無盜竊亂賊則戶無俟于閉也但為風塵入寢故設扉耳無所捍拒故從外而掩之六府虞書水火金木土穀惟修六府三事允治萬世永賴時乃功鳬藻後漢書杜詩傳將相和睦士卒鳬藻章懷太子注言其和睦歡悅如鳬之戲于水藻也顔延年詩鳬藻馳目成吕延濟注如鳬鳥得水草歡躍而進也庾信賀平鄴都表臣忝竊榮幸蒞政東藩不獲躬到闕庭預觀大慶不勝鳬藻踴躍之至謝除太子中允表臣維稽首言伏奉某月日制除臣太子中允詔出宸𠂻恩過望表捧戴惶懼不知所裁臣聞食君之祿死君之難當逆蕃干紀上皇出宫臣進不得從行退不能自殺情雖可察罪不容誅伏惟光天文武至聖皇帝陛下孝德動天聖功冠古復宗社於墜地救塗炭於橫流少康不及君親光武出於支庶今上皇返正陛下御乾歷數前王曾無比德萬靈抃躍六合歡康仍開祝網之恩免臣釁鼓之戮投書削罪端袵立朝穢汗殘骸死滅餘氣伏謁明主豈不自愧於心仰厠羣臣亦復何施其面局天內省無地自容且政化之源刑賞為急陷身凶冦尚沐官榮陳力興王將何寵異況臣夙有誠願陛下中興逆賊殄滅臣即出家修道極其精勤庶裨萬一頃者身方待罪國未書刑若慕龍象之儔是避魑魅之地所以鉗口不敢萌心今聖澤含宏天波昭洗朝容罪人食祿必招屈法之嫌臣得奉佛報恩自寬不死之痛謹詣銀臺門冒死陳請以聞無任惶恐戰越之至太子中允唐書百官志太子中允二人正五品下不知所裁陸機謝平原內史表拜授祗竦不知所裁李周翰注裁制也尊號唐書肅宗本紀乾元元年正月戊寅上皇天帝御宣政殿授皇帝傳國受命寶符册號曰光天文武大聖孝感皇帝橫流傅亮修張良廟教夷項定漢大極橫流吕向注橫流謂亂也少康左傳昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思于是妻之以二姚邑諸綸有田一成有衆一旅能布其德而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘遂滅過戈復禹之績祀夏配天不失舊物光武後漢書世祖光武皇帝髙祖九世之孫也出自景帝生長沙定王發發生舂陵節侯買買生鬱林太守外外生巨鹿都尉回回生南頓令欽欽生光武萬靈封禪書其後黃帝接萬靈明庭釁鼓左傳君之惠不以纍臣釁鼓杜預注殺人以血塗鼓謂之釁鼓局天陸機謝平原內史表局天蹐地若無所容劉良注局曲也興王南史運屬興王依光日月龍象大般若經是諸菩薩行深般若波羅蜜多是人中龍象翻譯名義摩訶那伽大論云那伽或名龍或名象是五千阿羅漢諸羅漢中最大力以是故言如龍如象水行中龍力最大陸行中象力最大魑魅左傳舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅杜預注裔遠也放之四遠使當魑魅之災魑魅山林異氣所生為人害者鉗口淮南子鉗口而不以言委心而不以慮陸機謝平原內史表鉗口結舌不敢上訴所天天波陸機謝平原內史表塵洗天波謗絶衆口張詵注天波喻天子恩澤屈法丘遲與陳伯之書主上屈法申恩吞舟是漏銀臺門按唐大明宮圖有左銀臺門右銀臺門謝集賢學士表朝議大夫試太子中允臣維稽首言伏奉今月十八日敕令臣充集賢殿學士擢及無能恩加非望抃躍慙懼不知所裁且謂之集賢非賢莫集固當宣其五德列在四科逖聽衆推方紆聖鑒臣抽毫作賦非古詩之流挾策讀書無專經之業伏惟陛下文思超前哲之后書契踰畫卦之君龜圖不能比其詞龍甲不足究其義聞相如在蜀畏不同時徴枚乘于齊惜其已老急賢之旨欲賜追鋒如臣不才豈宜濫吹將何以編次漆簡刋定石經東堂賦詩將招不成之罰北面待詔必無善對之才以榮為憂席寵知懼無任感恩踴躍戰越之至謹詣延英門陳謝以聞集賢學士唐六典集賢院學士掌刋緝古今之經籍以辨明邦國之大典而備顧問應對凡天下圖書之遺逸賢才之隱滯則承旨而徴求焉其有籌策之可施于時著述之可行于代者較其才藝考其學術而申表之凡承旨撰集文章校理經籍月終則進課于內歲終則考最于外唐書百官志開元十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士朝議大夫唐六典凡敘階二十有九正五品下曰朝議大夫注云漢班儀大夫以上得奉朝議則其義也隋文帝置朝議大夫為從三品散官五德新論五德者智信仁勇嚴也四科後漢書方術傳才兼四科行包九德漢官儀曰建初八年十二月巳未詔書辟士四科其一曰德行高妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問才任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔令皆有孝弟清公之行自今以後審四科辟召逖聽司馬相如封禪書率邇者踵武逖聽者風聲徐廣注逖遠也古詩之流班孟堅西都賦序賦者古詩之流也李善注毛詩序曰詩有六義二日賦故賦為古詩之流挾策讀書莊子問臧奚事則挾䇿讀書專經南史王儉傳宋孝武好文章天下悉以文采相尚莫以專經為業文思尚書堯典欽明文思孔穎達正義鄭玄云經緯天地謂之文慮深通敏謂之思畫卦禮含文嘉伏羲德洽上下始畫八卦三皇本紀太皥庖犧氏始畫八卦以通神明之德以類萬物之情造書契以代結繩之政龜圖龍魚河圖堯時與羣臣賢智到翠媯之川大龜負圖來授堯堯敕臣下寫取告瑞符應寫畢龜還水中龍甲尚書中候堯時龍馬銜甲赤文緑色臨壇上甲似龜廣袤九尺圓理平上五色文有列星之分斗政之度帝王録紀之數相如見八卷長卿注中枚乘漢書枚乘淮陰人也武帝自為太子聞乘名及即位乘年老乃以安車蒲輪徵乘道死追鋒裴松之三國志注傳暢晉諸公贊曰帝常與中護軍司馬望侍中王沈散騎常侍裴秀黃門侍郎鍾會等講宴于東堂并屬文論名秀為儒林丈人沈為文籍先生望會亦各有名號帝性急請召欲速秀等在內職到得及時以望在外特給追鋒車虎賁卒五人每有集會望輒奔馳而至濫吹江淹詩更以畏友朋濫吹乖名實李善注韓子曰齊王使人吹竽南郭處士請為王吹竽粟食與三百人等宣王死文王即位一一聽之處士乃逃或云韓昭侯嚴使一一聽之乃知濫也漆簡晉書太康二年汲郡人不準盜發魏襄王墓或言安釐王冡得竹書數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年蓋魏國之史書大略與春秋皆多相應其中經傳大異則云夏年多殷益干啓位啓殺之太甲殺伊尹文丁殺季歷自周受命至穆王百年非穆王壽百歲也幽王既亡有共伯和者攝行天子事非二相共和也其易經二篇與周易上下經同易繇陰陽卦二篇與周易略同繇辭則異卦下易經一篇似説卦而異公孫假二篇公孫假與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳諸卜筮師春似是造書者姓名也瑣語十一篇諸國卜夢妖怪相書也梁丘藏一篇先敘魏之世數次言丘藏金玉事􅌳書二篇論弋射法生封一篇帝王所封大歷二篇鄒子談天類也穆天子傳五篇言周穆王遊行四海見帝臺西王母圖詩一篇畫贊之屬也又雜書十九篇周氏田法周書論楚事周穆王美人盛姬死事大凡七十五篇七篇簡書折壞不識名題􅃮書皆科斗字初發冡者燒䇿照取寶物及官收之多燼簡斷札文既殘缺不復詮次武帝以其書付祕書校綴次第尋考指歸而以今文寫之束晳在著作得觀竹書隨疑分釋皆有義證石經後漢書盧植傳時始立太學石經以正五經文字又儒林傳熹平四年靈帝乃詔諸儒正定五經刋于石碑為古文篆隸三體書法以相參檢樹之學門使天下咸取則焉東堂賦詩晉書李密遷漢中太守賜餞東堂詔普令賦詩不成之罰南史梁武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顔色不變言笑自若席寵周書畢命兹殷庶士席寵惟舊延英門唐六典大明宫宣政殿之左曰東上閣右曰西上閣次西曰延英門謝御書集賢院額表臣維言伏奉今月某日聖札題集賢殿御書院額捧戴抃舞不知所裁竊以先聖微言前王令典所以興行禮義訓正人倫顧逆蕃凶頑不識經籍恣行毁裂有甚焚燒伏惟陛下御極統天功成理定愍其墜簡旁搜古壁發求書之使置寫書之官于是九流百家韋編緗帙爛然虎觀盛彼鴻都加以親重儒門將為教首俯題金榜自運銀鈎龍鳳翔于煙雲日月照于天地曾無以諭誰敢強名況乎方丈之書七分入木仲將虛為白首羲之枉在墨池將使率土之人知陛下寵兹書府普天之下斆陛下敦彼儒風政化之源實始于此臣忝編次漆簡刋校石經載光載輝誠歡誠喜集賢院唐六典注今上即位大敝羣書以廣儒術洎開元五年于乾元殿東廊下寫四部書以充內庫令右散騎常侍褚無量袐書監馬懷素總其事置刋定官四人以一人判事其後因之六年駕幸東京七年于麗正殿安罝為修書使褚馬既卒元行沖為使尋以張説代之十二年駕幸東都于命婦院安置十三年召學士張説等宴于集仙殿于是改名集賢殿改修書所為集賢殿書院五品以上為學士六品以下為直學士令典晉書褒德顯仁前王令典功成理定樂記王者功成作樂治定制禮鄭康成注功成治定同時耳功主于王業治主于教民古壁漢書魯恭王壞孔子宅欲以為宫而得古文于壞壁之中逸禮有三十九篇書十六篇發求書之使置寫書之官漢書藝文志漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩聖上喟然而稱曰朕甚閔焉于是建藏書之䇿置寫書之官下及諸子傳説皆充祕府至成帝時以書頗散亡使謁者陳農求遺書於天下九流後漢書張衡傳劉向父子領校祕書閲定九流章懷太子注九流謂儒家道家陰陽家法家名家墨家縱橫家雜家農家百家漢書武帝紀罷黜百家表章六經師古注百家謂諸子雜説違背六經後漢書伏湛傳詔無忌與議郎黃景校定中書五經諸子百家藝術章懷太子注藝文志曰諸子凡一百八十九家言百家舉其成數也韋編漢書孔子晚而好易讀之韋編三絶而為之傳師古曰編所以聯次簡也緗帙昭明太子文選序飛文染翰則卷盈乎緗帙吕向注緗淺黃色也帙書衣也虎觀後漢書章帝紀于是下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異使五官中郎將魏應承制問侍事中淳于恭奏帝親稱制臨決如孝宣甘露石渠故作白虎議奏又丁鴻傳肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異于北宫白虎觀章懷太子注白虎門名于門立觀因以名之焉又儒林傳建初中大會諸儒子白虎觀詳察同異連月乃罷肅宗親臨稱制如石渠故事顧命史臣著為通義鴻都後漢書蔡雍傳光和元年置鴻都門學畫孔子及七十二弟子像其諸生皆敕州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者金榜梁元帝詩玉題書仙篆金榜燭神光銀鈎晉書蓋草書之為狀也宛若銀鈎漂若驚鸞方丈之書晉書王獻之嘗書壁為方丈大字羲之甚以為能法書要録師宜官後漢不知何許人何官能為大字方一丈入木筆勢傳晉成帝時祀北郊更祝版工人削之羲之筆入木七分仲將晉書魏時陵雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸磴書之比訖鬚鬢盡白裁餘氣息還語子弟宜絶此法書斷韋誕字仲將京兆人官至侍中伏膺于張芝兼邯鄲淳之法諸書並善尤精題署明帝時凌雲臺成令誕題榜髙下異好宜就加點正因致危懼鬚鬢皆白既下戒子孫無為大字楷法墨池太平寰宇記墨池王右軍洗硯池也并舊宅在蕺山下去會稽縣二里餘太平寰宇記撫州臨川縣有王右軍故宅荀伯子臨川記云王羲之嘗為臨川內史置宅于郡東髙坡名曰新城傍臨回溪特據層阜其地爽塏山川如畫今舊井及墨池猶存方興勝覽紹興府戒珠寺本王羲之故宅門外有二池曰墨池鵝池王右丞集箋注卷十六
