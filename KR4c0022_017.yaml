不證涅槃永處生死名不住無為也如維摩詰經諸法亦然不出于如僧肇注如謂如本相也又云隨順本相謂之如常住不變謂之性到實相彼岸謂之際有漏涅槃經迦葉菩薩白佛言世尊如佛所說三有漏者云何名為欲漏有漏無明漏耶佛言欲漏者一切內惡覺觀外諸因緣名之為欲是名欲漏有漏者色無色界內諸惡法外諸因緣除欲界中外諸因緣內諸覺觀是名有漏無明漏者不能了知我及我所不别內外名無明漏百榖爾雅翼古人說百榖以為梁者黍稷之總名稻者溉種之總名菽者衆豆之總名三榖各二十種為六十蔬果之實助榖各二十凡為百榖然豫以為榖之種類每物不下十數亦何假蔬果而後為百耶順成禮記順成之方其蠟乃通孔頴達正義年榖和順成熟六氣左傳天有六氣杜預注謂陰陽風雨晦明也時若義出尚書洪範龍騰衛恆四體書勢矯然特出若龍騰于川森爾下頺若雨墜于天昭回詩大雅倬彼雲漢昭回于天毛萇傳回轉也鄭康成箋雲漢謂天河也昭光也韋誕晉書太和中韋誕為武都太守以能書留補侍中魏氏寶器銘題皆誕書也法書要録韋誕字仲將京兆人善楷書漢魏宫觀題署多是誕手梁鵠法書要録安定梁鵠後漢人官至選部尚書得師宜官法魏武重之常以鵠書懸帳中宫觀題署多是鵠手玉繩春秋元命苞玉衡北兩星為玉繩慚德見商書仲虺誥梵行涅槃經迦葉菩薩白佛言云何名為清淨梵行佛言一切法是華嚴經永持梵行離一切惡法流梁元帝謝敕送齊王瑞像還啓身持淨戒心抃法流慚愧衣菩薩瓔珞經首戴七覺華身被慚愧服華嚴經所謂願一切衆生得慚愧衣以覆其身煩惱髮華嚴經剃除鬚髮當願衆生永離煩惱究竟寂滅寶器華嚴經願一切衆生成無上寶器悉能受持三世佛法恆沙恆河之沙也恆河在西域其源從阿耨達池獅子口流出周圍四十餘里其中沙細如麵西國人謂無數無量不可計者多以恆沙為喻涅槃經如恆河沙無能數者為僧等請上佛殿梁表僧某言天地之大未滿法身紺殿朱宫豈云光宅陛下尊崇像教大捨外財白法利人黃金布地不役一人之力不費一家之産崇崇寶坊雲構將畢所營某寺以某月日上佛殿梁伏望天恩內賜一繖庶使大千世界悉入蓋中六合人天共歸宇下然後以無礙慧大化羣物將使四生皆度豈惟比屋可封則中天之臺才留幻士畫雲之觀徒候神人以古況今前王何陋謹詣右銀臺門奉表陳謝以聞法身華嚴經如來法身甚廣大十方邊際不可得紺殿徐陵孝義寺碑紺殿安坐蓮花養神光宅孔安國尚書傳昔在帝堯聰明文思光宅天下左思魏都賦暨聖武之龍飛肇受命而光宅像教王巾頭陀寺碑文正法既沒像教陵夷李周翰注像教謂為形像以教人也寶坊梁簡文帝答湘東王書鳴銀鼓于寶坊轉金輪于香地雲構陸雲詩思樂華堂雲構崇基王融曲水詩序飛觀神行虛檐雲構吕向注雲構言髙與雲齊也大千世界維摩詰經爾時毗耶離城有長者子名曰寶積與五百長者子俱持七寶蓋來詣佛蓋所頭靣禮足各以其蓋共供養佛佛之威神令諸寶合成一蓋遍覆三千大千世界而此世界廣長之相悉于中現李善文選注大千者謂一三千界下至阿毗地獄上至非想天為一世界千世界為小千世界千小千世界為中千世界至千中千世界為大千世界無礙慧菩薩瓔珞經賢聖八等道演暢無礙慧四生法苑珠林如般若經云一者卵生二者胎生三者濕生四者化生又阿含口解十二因緣經云有四種生一腹生者謂人及畜生二寒熱和合生者謂蟲蛾蚤虱三化生者謂天及地獄四卵生者謂飛鳥魚鱉又正法念經云或以天眼見諸畜生有四種生何等為四一者胎生所謂象馬牛羊之類二者卵生所謂蛇蚖鵝鴨雞雉衆鳥三者濕生所謂虱蟻子之類四者化生如長靣龍等又涅槃經云衆生佛性住五陰中若住五陰名曰殺生若有殺生即墮惡道依此生死故有四生依殼而生曰卵藏而出曰胎假潤而興曰濕歘然而現曰化衆生所攝不過此四也中天臺列子周穆王時西極之國有化人來入水火貫金石反山川移城邑乘虛不墜觸實不礙千變萬化不可窮極既巳變物之形又且易人之慮穆王敬之若神事之若君化人以王之宫室卑陋而不可處穆王乃為之改築土木之功赭堊之色無遺巧焉五府為虛而臺始成其髙千仞臨終南之上號曰中天之臺化人猶不舍然不得已而臨之候神人史記封禪書公孫卿曰仙人可見而上往常遽以故不見今陛下可為觀如緱城置棗脯神人宜可致也且仙人好樓居于是上令長安則作飛亷桂觀甘泉則作益延夀觀使卿持節設具而候神人責躬薦弟表臣維稽首言臣年老力衰心昏眼暗自料涯分其能幾何能文苑英華作夀久竊天官每慙尸素慙文苑英華作競頃又沒于逆賊不能殺身負國偷生以至今日陛下矜其愚弱託病被囚愚文苑英華作檽不賜疵瑕纍遷省閣閣一作閭一作門俱非昭洗罪纍免負惡名洗顧本作失今從文苑英華作洗在于微臣百生萬足足文苑英華作死昔在賊地泣血自思一日得見聖朝即願出家修道及奉明主伏戀仁恩明文苑英華作聖貪冒官榮荏苒歲月不知止足尚忝簪裾始願屢違私心自咎始文苑英華作昔臣又聞用不才之士才臣不來賞無功之人功臣不勸有國大體為政本源非敢議論他人竊以兄弟自比竊以兄弟自比六字文苑英華作竊見二字臣弟蜀州刺史縉太原五年撫養百姓盡心為國竭力守城臣即陷在賊中茍且延命臣忠不如弟一也縉前後歷任所在著聲歷文苑英華作效臣忝職甚多曾無裨益臣政不如弟二也臣頃負纍繫在三司繫文苑英華作狀縉上表祈哀請代臣罪臣之于縉一無憂憐憐文苑芵華作恤臣義不如弟三也縉之判䇿屢登甲科衆推才名素在臣上臣小言淺學不足謂文臣才不如弟四也縉言不忤物行不上人植性謙和執心平直直文苑英華作坦臣無度量實自空疏臣德不如弟五也臣之五短弟之五長加以有功又能為政顧臣謬官華省而弟逺守方州外愧妨賢妨文苑英華作其內慙比義痛心疾首以日為年臣又逼近懸車朝暮入地闃然孤獨迥無子孫弟之與臣更相為命兩人又俱白首一别恐隔黃泉儻得同居相視而沒泯滅之際魂魄有依伏乞盡削臣官放歸田里賜弟散職令在朝廷廷文苑英華作行臣當苦行齊心弟自竭誠盡節並願肝腦塗地隕越為期葵藿之心庶知向日犬馬之意何足動天不勝私情懇迫之至王縉劉昫唐書王縉字夏卿河中人也少好學與兄維早以文翰著名縉連應草澤及文辭清麗舉纍授侍御史武部員外祿山之亂選為太原少尹與李光弼同守太原功效謀略衆所推先加憲部侍郎兼本官時兄維陷賊受僞署賊平維付吏議縉請以巳官贖維之罪特為减等縉尋入拜國子祭酒改鳳翔尹秦隴州防禦使歷工部侍郎左散騎常侍撰𤣥宗哀册文時稱為工改兵部侍郎屬平殄史朝義河朔未安詔縉以本官河北宣慰奉使稱旨廣德二年拜黃門侍郎同平章事太微宫使𢎞文崇賢館大學士其年河南副元帥李光弼薨于徐州以縉為侍中持節都統河南淮西山南東道諸節度行營事縉懇讓侍中從之加上柱國兼東都留守歲餘遷河南副元帥請减軍資錢四十萬貫修東都殿宇大歷三年幽州節度使李懷仙死以縉領幽州盧龍節度縉赴鎮而還委政于燕將朱希彩又屬河東節度辛雲京卒遂兼太原尹北都留守河東節度營田觀察等使縉又讓河南副元帥東都留守從之太原舊將王無縱張奉璋等恃功且以縉儒者易之每事多違約束縉一朝悉召斬之將校股栗二歲罷河東歸朝授門下侍郎中書門下平章事時元載用事縉卑附之不敢與忤然恃才與老多所傲忽載所不悅心雖希載旨然以言辭凌詬無所忌憚時京兆尹黎幹者戎州人也數論事載甚病之而力不能去也幹嘗白事於縉縉曰尹南方君子也安知朝禮其慢而侮人率如此類縉弟兄奉佛不茹葷血縉晚年尤甚與杜鴻漸捨財造寺無限極妻李氏卒捨道政里第為寺為之追福奏其額曰寶應度僧三十人住持每節度觀察使入朝必延至寶應寺諷令施財助已修繕初代宗喜祠祀未甚重佛而元載杜鴻漸與縉喜飯僧徒代宗嘗問以福業報應事載等因而啓奏代宗由是奉之過當嘗令僧百餘人于宫中陳設佛像經行念誦謂之內道場其飲膳之厚窮極珍異出入乘廄馬度支具廩給每西蕃入冦必令羣僧講誦仁王經以禳冦盜茍幸其退則橫加錫賜胡僧不空官至卿監封國公通籍禁中勢移公卿爭權擅威日相凌奪凡京畿之豐田美利多歸于寺觀吏不能制僧之徒侣雖官有贓姦畜亂敗戮相繼而代宗信心不易乃詔天下吏不得箠曳僧尼又見縉等施財立寺窮極瓌麗每對揚啓沃必以業果為證以為國家慶祚靈長皆福報所資業力已定雖小有患難不足道也故祿山思明毒亂方熾而皆有子禍僕固懷恩將亂而死西戎犯闕未擊而退此皆非人事之明徴也帝信之愈甚公卿大臣既挂以業報則人事棄而不修故大歷刑政日以凌遲有由然也五臺山有金閣寺鑄銅為瓦塗金于上照曜山谷計錢巨億萬縉為宰相給中書符䐑令五臺山僧數十人分行郡縣聚徒講說以求貨利代宗七月望日于內道場造盂蘭盆飾以金翠所費百萬又設髙祖巳下七聖神座備幡節龍􅏛衣裳之制各書尊號于幡上以識之舁出內陳于寺觀是日排儀仗百察序立于光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典其傷教之源始于縉也縉又縱弟妹女尼等廣納財賄貪猥之跡如市賈馬元載得罪縉連坐貶括州刺史移處州刺史大歷十四年除太子賔客留司東都建中二年十二月卒年八十二天官晉書久㸃天官塵蔽賢路班固東都賦天官景從寢威盛容李善注蔡雍獨斷曰百官小吏曰天官成按今本蔡雍獨斷無此文也荏苒晉書李皓傳時移節邁荏苒三年韻㑹荏苒猶侵尋也又展轉也止足老子知足不辱知止不殆三司唐書百官志凡鞫大獄以刑部尚書侍郎與御史中丞大理卿為三司使吕諲傳帝復兩京詔盡繫羣臣之汙賊者以御史中丞崔器憲部侍郎韓擇木大理卿嚴向為三司使處其罪小言莊子大言炎炎小言詹詹方州班固典引卓犖乎方州羡溢乎要荒比義後漢書孔融傳先君孔子與君先人同德比義而相師友說苑君子比義農夫比榖痛心疾首左傳斯是用痛心疾首昵就寡人縣車白虎通臣七十懸車致仕者臣以執事趨走為職七十陽道極耳目不聰明跂踦之屬是以退去避賢者所以長亷恥也縣車示不用也漢書薛廣德為御史大夫乞骸骨賜安車駟馬黃金六十斤罷縣其安車傳子孫朝暮入地漢書龔勝傳吾受漢家厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉竭誠盡節北史髙熲有又武大略明達政務及䝉任寄之後竭誠盡節進引貞良以天下為已任肝腦塗地漢書蘇武傳武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖䝉斧鉞湯鑊誠甘樂之隕越杜預左傳注隕越顛墜也晉書奮不顧命隕越為期葵藿曹植求通親親表若葵藿之傾葉太陽雖不為回光然向之者誠也請施莊為寺表臣維稽首臣聞罔極之恩豈有能報終天不返何堪永思然要欲强有所為自寬其痛釋教有崇樹功德宏濟幽冥臣亡母故博陵縣君崔氏師事大照禪師三十餘歲褐衣蔬食持戒安禪樂住山林志求寂靜臣遂于藍田縣營山居一所草堂精舍竹林果園並是亡親宴坐之餘經行之所臣往丁凶釁當即發心願為伽藍永劫追福比雖未敢陳請終日常積懇誠又屬元聖中興羣生受福臣至庸朽得備周行無以謝生將何答施願獻如天之壽長為率土之君惟佛之力可憑施寺之心轉切效微塵于天地固先國而後家敢以烏鼠私情冒觸天聽伏乞施此莊為一小寺兼望抽諸寺名行僧七人精勤禪誦齊戒住持上報聖恩下酬慈愛無任懇欵之至施莊為寺長安志清源寺在藍田縣南輞谷內唐王維母奉佛山居營草堂精舍維表乞施為寺焉罔極詩欲報之德昊天罔極終天潘嶽哀永逝文今奈何兮一舉邈終天兮不返李善注天地之道理無終極今云終天不返長逝之辭劉良注終天謂終竟天地永思劉向九嘆心怊悵以永思兮意暗暗而自頽博陵縣君成按唐書百官志云文武官一品國公之母妻為國夫人三品以上母妻為郡夫人四品母妻為郡君五品母妻為縣君勳官四品有封者母妻為鄉君至于國名地號則以族望所自為冠又按宰相世系表崔氏有博陵安平一𣲖當是右丞母氏所出故以博陵為號也伽藍法顯佛國記中天竺佛法甚盛名衆僧住止處為僧伽藍周行國風置彼周行毛萇傳行列也思君子官賢人置周之列位鄭康成箋周之列位謂朝廷臣也王右丞集箋注卷十七
