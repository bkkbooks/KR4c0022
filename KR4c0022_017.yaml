body:
  text: 王右丞集箋注卷十七仁和趙殿成撰表九首為薛使君謝婺州刺史表臣某言伏奉今月日制除臣某官拜命若驚稽首無地臣聞洪波退流必蕩其溷穢慶雲所潤不遺於荆棘伏惟陛下孝悌之至通于神明馨香之德格於天地故指旗而黑䘲旋靜揮戈而白日再中豈臣蟲臂鼠肝所能談天述聖臣之本末强欲自陳擢髮數罪臣戮餘也剖心自明天知之矣臣素書生少為文吏折衝禦侮幾何不亡奉法守文一日之長當賊逼溫洛兵接河潼拜臣陜州催臣上道驅馬才至長圍已合未暇施力旋復陷城㦸枝叉頭刀環築口身關木索縛就虎狼臣實驚狂自恨駑怯脫身雖則無計自刃有何不可而折節凶頑偷生厠溷縱齒盤水之劍未消臣惡空題墓門之石豈解臣悲今於抱釁之中寄以分憂之重且天兵討賊曾無汗馬之勞天命興王得返屠羊之肆免其釁鼓之戮仍開祝網之恩臣縱粉骨糜軀不報萬分之一況褰帷露冕是去歲之縲囚洗垢滌瑕為聖朝之嶽牧臣欲殺身滅愧刎首謝恩生無益於一毛死何異於腐鼠謹當閉閣以思政酌泉以勵心親畢力於平人無煩八部誓不負於明主非畏四知用釋愆誅敢求課最婺州唐書地理志江南東道有婺州東陽郡慶雲曹植上責躬應詔詩表不别荆棘者慶雲之惠也七子均養者􅀈鳩之仁也劉良注言慶雲䕃物不分荆棘蘭桂而覆之孝悌孝經孝悌之至通於神明馨香尚書君陳至治馨香感於神明黍稷非馨明德惟馨黑䘲左傳吾見赤黑之䘲杜預注䘲妖氛也揮戈淮南子魯陽公與韓搆難戰酣日暮援戈而撝之日為之反三舍蟲臂鼠肝莊子以汝為鼠肝乎以汝為蟲臂乎擢髮數罪史記須賈頓首言死罪范睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足戮餘左傳若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣剖心李陵報蘇武書陵不難刺心以自明刎頸以見志折衝家語其守也則必折衝千里之外其征也則必還師枕席之上李氏春秋夫修之於廟堂之上而折衝乎千里者其司城子罕之謂乎髙誘注衝車所以衝突敵之軍能陷破之也有道之國不事攻伐使欲攻已者折還其衝車於千里之外不敢來也禦侮毛萇詩傳武臣折衝曰禦侮孔穎達正義云禦侮者有武力之臣能折止敵人之衝突者是能扞禦侵侮故曰禦侮也溫洛述征記洛水底有礜石故上無冰人謂之溫洛又易乾鑿度帝盛德之應洛水先溫九日乃寒五日變為五色𤣥黃文心雕龍縈河溫洛是孕圖緯任昉九日侍宴樂遊苑詩時來濁河變瑞起溫洛清皆指洛水而言右丞則借用為洛陽解矣河潼按通鑑天寶十四載十二月祿山陷東京封常清戰敗帥餘衆至陜知不可守與高仙芝西趨潼關賊尋至官軍狼狽走無復部伍士馬相騰踐死者甚衆至潼關修完守備賊至不得入而去陜州唐書地理志河南道有陜州陜郡本𢎞農郡義寧元年置武德元年曰陜州天寶元年更郡名㦸枝叉頭裴松之三國志注舊制三公領兵入見皆交㦸叉頸而前刀環築口三國志諸葛恪圍合肥新城城中遣士鄭像出城傳消息或以語恪恪遣馬騎尋圍跡索得像還四五人的頭面縳將繞城表勑語像使大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得言像遂大呼令城中聞知像為兵能守義執節子弟宜有差異詔追賜像爵關中侯除士名使子襲爵北齊書祖珽傳以刀環築口鞭杖亂下木索漢書司馬遷傳其次關木索被箠楚受辱張銑注關木杻械索繩也以拘縛之也盤水之劍漢書故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請罪耳上不執縛係引而行也如淳注水性平若已有正罪君以平法治之也加劍當以自刎也或曰殺牲者以盤水取頸血故示若此也墓門之石西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先草露骨肉歸於后土氣魂無所不之何必故丘然後即化封於長安北郭此焉宴息及死命刋石埋於墓側抱釁曹植上責躬應詔詩表臣自抱釁歸藩刻肌刻骨吕向注釁罪也汗馬漢書今臣愚駑無汗馬之勞師古曰言未嘗從軍旅屠羊肆莊子楚昭王失國屠羊說走而從乎昭王昭王反國將賞從者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵祿巳復矣又何賞之有王曰强之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊說曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吳軍入郢說畏難而避寇非故隨大王也今大王欲廢法毁約而見說此非臣之所以聞天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚髙子綦為我延之以三旌之位屠羊說曰夫三旌之位吾知其貴於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也縲囚左傳兩釋縲囚以成其好杜預注縲繫也嶽牧古有四嶽十二牧孔安國書傳四嶽即羲和之四子分掌四嶽之諸侯故稱焉鄭康成禮記注每一州之中天子選諸侯之賢者以為之牧也周禮曰乃施典於邦國而建其牧腐鼠後漢書竇憲傳國家棄憲如孤雛腐鼠耳酌泉晉書廣州包帶山海珍異所出一篋之寶可資數世然多瘴疫人情憚焉唯貧窶不能自立者求補長史故前後刺史皆多黷貨朝廷欲革嶺南之弊隆安中以吳隱之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懷無厭之欲隱之既至語其親人曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一歃懷千金試使夷齊飲終當不易心及在州清操踰厲八部世說王丞相為揚州遣八部從事之職顧和時為下傳還同時俱見諸從事各奏二千石官長得失至和獨無言王問顧曰卿何所聞答曰明公作輔寧使網漏吞舟何緣采聽風聞以為察察之政丞相咨嗟稱家諸從事自視缺然也四知後漢書楊震當之郡道經昌邑故所舉荆州茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出課最晉書賀循舉秀才除陽羡令以寬惠為本不求課最為崔常侍謝賜物表臣某言總管關敬之至奉九月十五日敕吐蕃贊普公主信物金胡瓶等十一事伏䝉恩旨特以賜臣捧戴慚惶以抃以躍臣幸居無事待罪西門恭守嘉謨欽承成憲王師不戰無汗馬之勞堯屋可封何理入之有實無異效特降殊恩竊用勤以忘家志不顧命分膏草野以報萬一無任感戴戰越之至總管唐書百官志武德初邊要之地置總管以統軍加號使持節蓋漢刺史之任七年改總管曰都督開元天寶時無此官矣此所云總管者未詳其義吐蕃杜氏通典吐蕃在吐谷渾西南不知有國之所由或云秃髮利鹿孤有子樊尼其主傉檀為乞伏熾盤所滅樊尼率餘種依沮渠䝉遜其後子孫西魏時為臨松郡丞與主簿皆得衆心因魏末中華擾亂招撫羣羌日以强大改姓為窣勃野故其人至今號其主曰贊府貴臣曰主簿又或云始祖贊普自言天神所生號鶻堤悉補野因以為姓其國出鄯城五百里過烏海入吐谷渾部落彌多彌蘇毗及白蘭等國至吐蕃界唐書吐蕃傳吐蕃本西羌屬蓋百有五十種散處河湟江岷間有發羌唐旄等然未始與中國通居析支水西祖曰鶻提勃悉野健武多智稍并諸羌據其地蕃發聲近故其子孫曰吐蕃而姓勃窣野或曰南凉秃髮利鹿孤之後二子曰樊尼曰傉檀傉檀嗣為乞佛熾盤所滅樊尼挈殘部臣沮渠䝉遜以為臨松太守䝉遜滅樊尼率兵西濟河逾積石遂撫有羣羌云贊普唐書吐蕃傳其俗謂强雄曰贊丈夫曰普故號君長曰贊普公主按劉昫唐書神龍三年四月辛已以嗣雍王守禮女為金城公主出降吐蕃贊普景龍四年正月已卯幸始平送金城公主歸吐蕃開元二十八年金城公主薨嘉謨法言或問忠言嘉謨曰言合稷契謂之忠謨合臯陶謂之嘉成憲商書監於先王成憲其永無愆志不顧命後漢書馬皇后紀吾少壯時但慕竹帛志不顧命分膏草野漢書蘇武傳空以身膏草野誰復知之為畫人謝賜表臣某言臣猥以賤伎得備衆工誤㸃屏風乏成蠅之巧偶持團扇無事㹀之能徒以職官不敢二事顧惟時論有慚三絶伏惟皇帝陛下撥亂反正受命中興俯協龜圖傍觀鳥迹卦因於畫畫始生書知微知彰惟聖體聖臣奉詔旨令寫功臣運偶鳳翔之初無非鷹揚之士燕頷猿臂裂眥奮髯髮衝鶡冠力舉龍鼎骨風猛毅眸子分明皆就筆端别生身外傳神寫照雖非巧心審象求形或皆暗識妍蚩無枉敢顧黃金取舍惟精時憑白粉且如日磾下泣知其孝思于禁懷慚愧此忠節乃無聲之針頌亦何賤于丹青宣父之似臯繇元子之類越石不待或人之說無煩故妓之言此又一竒誠為可尚臣得䑛筆麟閣繼踵虎頭頻䝉奬教之恩益用精誠自勵勤以補拙雖未仙飛感而遂通實因聖訓況賜衣服纍問官資中使相望屢加宣慰微臣戰灼無答恩私之至事㹀晉書王獻之桓溫嘗使書扇筆誤落因畫作烏駁㹀牛甚妙二事禮記王制凡執技以事上者不二事不移官左傳晉侯觀於軍府見鍾儀問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事杜預注言不敢學他事也三絶晉書俗傳顧愷之有三絶才絶畫絶癡絶撥亂反正後漢書陳元傳陛下撥亂反正文武並用鳥迹水經注倉頡本鳥迹為字取其孳乳相生知微知彰出易經繫詞鳳翔劉昫唐書肅宗至德二載二月幸鳳翔郡九月癸卯廣平王收西京十月壬戌廣平王入東京癸亥上自鳯翔還京鷹揚大雅惟師尚父時維鷹揚凉彼武王毛萇傳鷹揚如鷹之飛揚也猿臂史記李廣為人長猿臂其善射亦天性也裂眥史記樊噲瞋目視項王頭髮上指目眥盡裂淮南子荆軻西刺秦王高漸離宋意為擊筑而歌于易水之上聞者莫不瞋目裂眥髮植沖冠奮髯漢書朱博奮髯抵几鶡冠後漢書武冠俗謂之大冠環纓無蕤以青系為緄加雙鶡尾豎左右為鶡冠云五官左右虎賁羽林五中郎將羽林左右監皆冠鶡冠紗縠單衣虎賁將虎文褲白虎文劍佩刀虎賁武騎皆鶡冠虎文單衣鶡者勇雉也其鬬對一死乃止故趙武靈王以表武士秦施安焉龍鼎張載榷論孱夫與烏獲訟力非龍文赤鼎無以明之猛毅淮南子剛强猛毅志厲青雲瞳子分明劉孝標世說注嚴尤三將叙曰平原君勸趙孝成王受馮亭王曰受之秦兵必至武安君必將誰能當之者乎對曰澠池之㑹臣察武安君小頭而面鋭瞳子白黑分明視瞻不轉小頭而面鋭者敢斷決也瞳子白黑分明者見事明也視瞻不轉者執志强也可以持久難與爭鋒亷頗為人勇鷙而愛士知難而忍恥與之野戰則不如持守足以當之王從其計傳神寫照晉書顧愷之每畫人成或數年不㸃目晴人問其故答曰四體妍蚩本無闕少于妙處傳神寫照正在阿堵中日磾漢書金日磾母教誨兩子甚有法度上聞而嘉之病死詔圖畫于甘泉宫署曰休屠王閼氏日磾每見畫常拜向之涕泣然後乃去于禁三國志太祖使曹仁討關侯于樊又遣于禁助仁秋大霖雨漢水溢平地水數丈禁等七軍皆沒禁與諸將登高望水無所回避侯乘大船就攻禁等禁遂降惟龎德不屈節而死太祖聞之哀嘆者久之曰吾知禁三十年何意臨危處難反不及龎德邪㑹孫權禽侯獲其衆禁復在吳文帝踐祚權稱藩遣禁還帝引見禁鬚髮皓白形容憔悴泣涕頓首帝慰喻以茍林父孟明視故事拜為安遠將軍欲遣使吳先令北詣鄴謁高陵帝使豫于陵屋畫關侯戰克龎德憤怒禁降服之狀禁見慙恚發病薨宣父史記孔子適鄭與弟子相失孔子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産然自腰以下不及禹三寸纍纍若喪家之狗唐書禮樂志貞觀十一年詔尊孔子為宣父作廟于兖州給戶二十以奉之元子晉書桓溫字元子自以雄姿風氣是宣帝劉琨之儔于北方得一巧作老婢訪之乃琨妓女也一見溫便澘然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌溫于是褫冠解帶昏然而睡不怡者數日越石晉書劉琨字越石虎頭歷代名畫記顧愷之字長康小字虎頭晉陵無錫人多才藝尤工丹青傳寫形勢莫不妙絶吳曾漫録云世說顧愷之為虎頭將軍非小字也按晉書無此官世說亦無此語仙飛用顧愷之妙畫通靈變化而去事詳見十二卷注為曹將軍謝寫真表臣某言天幸微臣身逢大聖得為列卒以備戎行於臣一生已為萬足況建旗為將裂組受官䝉推食之恩辱賜衣之寵匹夫之勇雖不顧身長䇿無聞未能盡敵仰慚介胄俯愧橐鞬加以弓不重於六鈞箭不穿於七札詎中雀目誠慙猿臂以劉琨而恨小非關公之絶倫何以厠跡虎臣儀形麟閣伏惟皇帝陛下昭格天地懸超七十二家微臣託附風雲不如二十八將而䝉垂聖旨特命圖工畫植㦸之黃鬚圖石稜之紫色才如過隙顧侯已得其神不待臨淄鄒子自知其醜豈可藏之祕府以示後人將謂飛龍之時無俟貔貅之士寵過其效力不稱恩願死藝於伏韜誓殺身於鳴轂無任感激欣戴之至戎行左傳下臣不幸屬當戎行建旗曹植詩願䝉矢石建旗東嶽裂組江淹為蕭王讓揚州表深乃裂組逺故分圭推食賜衣史記韓信曰漢王授我上將軍印豫我數萬衆解衣衣我推食食我盡敵國語夫戰盡敵為上六鈞左傳顔商之弓六鈞杜預注顔高魯人三十斤為鈞六鈞百八十斤古稱重故以為異强七札左傳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂于戰王怒曰大辱國詰朝爾其死藝杜預注言汝以射自多必當以藝死也絶倫蜀志關侯聞馬超來降舊非故人因書與諸葛亮問超人才可誰比類亮知其護前乃答之曰孟起兼資文武雄烈過人一世之傑黥彭之徒當與益德並驅爭先猶未及髯之絶倫逸羣也侯美鬚髯故亮謂之髯虎臣魯頌矯矯虎臣在泮獻馘七十二家史記古者封太山襌梁父者七十二家二十八將後漢書中興二十八將前世以為上應二十八宿未之詳也然咸能感㑹風雲奮其志勇稱為佐命亦各志能之士也永平中顯宗追感前世功臣乃圖畫二十八將于南宫雲臺石稜世說劉尹道桓公鬚如反猬皮眉如紫石稜臨淄藝文類聚新序曰齊王聘田巴先生而將問政焉對曰政在正身正身之本在於羣臣王召臣臣改制鬋飾問于妾奚若妾愛臣諛臣曰佼臣臨淄水而觀然後自知醜惡也今齊之臣諛王者衆王能臨淄水見已之惡過而自改斯齊國治矣此云鄒子未詳祕府漢書藝文志下及諸子傳說皆充祕府晉書裴秀作禹貢地域圖十八篇奏之藏于祕府飛龍易飛龍在天利見大人貔貅晉書熊遠傳今順天下之心命貔貅之士死藝見本文七札注伏韜左傳王召養由基與之兩矢使射吕錡中項伏韜以一矢復命杜預注韜弓衣也鳴轂見六卷越甲注為幹和尚進注仁王經表沙門惠幹言法離言說了言說即解脫者終日可言法無名相知名相即真如者何嘗壞相實際以無際可示無生以不生相傳非夫自得性空密印心地見聞自在宗說皆通者何以證玉毫之光辨金口之義伏惟乾元光天皇帝陛下高登十地降撫九天宏濟羣生濡蓮花之足示行世法屈金粟之身心淨超禪頂法懸解廣釋門之六度包儒行之五常老僧空空復何語語以無見之見不言之言淺智勝疑冰之蟲微戒愈溺埿之象以自覺離念注先聖微言如人何足盡思食木偶然成字人字疑是蟲字之訛豈堪上塵慧眼仰稱聖心有命自天藏拙無地伏以集解仁王般若經十卷謹隨表奉進無任慚惶然本注經先發大願釋第一義開不二門與四十九僧離一百八句六時禪誦三載懇祈俾廓妖氛得瞻慧日三千世界悉奉仁王五千善神常衛樂土令果蕩定無量安寧緇服蒼生不勝慶躍仁王經釋藏有仁王護國波若波羅密經二卷姚秦三藏鳩摩羅什譯沙門後漢紀佛教以修善慈心為主不殺生專務清淨其精者號為沙門者漢言息心蓋息意去欲而歸于無為也四十二章經辭親出家識心達本解無為法名曰沙門鳩摩羅什維摩詰經注佛法及外道凡出家者皆名沙門解脫涅槃經有煩惱故名為繫縛無煩惱故名為解脫僧肇維摩詰經注解脫者自在心法也得此解脫則凡所作為內行外應自在無礙翻譯名義心得自在不為不能所縳故曰解脫法無名相佛報恩經法無言說如來以妙方便能以無名相法作名相說真如大般若經真如者謂諸法性非如愚夫異生所得亦非異彼然諸法性如諸如來及佛弟子菩薩所見如是法性理趣真實常無變易故名真如即此真如說為菩薩甚深般若波羅密多起信論心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法惟依妄念而有差别若離妄念則無一切境界之相是故一切法從本巳來離言說相離名字相離心緣相畢竟平等無有變異不可破壞惟是一心故名真如以一切言說假名無實但隨妄念不可得故言真如者亦無有相謂言說之極因言遣言此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故當知一切法不可說不可念故名為真如成唯識論真如真謂真實顯非虛妄如謂如常表無變易謂此真實於一切位常如其性故曰真如即是湛然不虛妄義亦言顯此復有多名謂名法界及實際等如餘論中隨義廣釋實際鳩摩羅什維摩詰經注始見其實謂之如轉深謂之性盡其邊謂之實際宗鏡録天台淨名疏云一法異名者諸經異名說真性實相或言一實諦或言自性清淨心或言如來藏或言如如或言實際或言實相般若或言一乘或言即是首楞嚴或言法性或言法身如是等種種異名此皆是實相之異稱宗說楞伽經一切聲聞緣覺菩薩有二種通相謂宗通及說通宗通者謂緣自得勝進相遠離言說文字妄想趣無漏界自覺地自相逺離一切虛妄覺想降伏一切外道衆魔緣自覺趣光明輝發是名宗通相云何說通相謂說九部種種教法離異不異有無等相以巧方便隨順衆生如應說法令得度脫是名說通相玉毫大般若經如來眉間有白毫相右旋柔軟如兜羅綿鮮白光靜踰珂雪等華嚴經白毫相中放大光明金口華嚴經何況如來金口所說十地成唯識論言十地者一極喜地初獲聖性具證二空能益自他生大喜故二離垢地具淨尸羅遠離能起微細毁犯煩惱垢故三發光地成就勝定大法總持能發無邊妙慧光故四熖慧地安住最勝菩提分法燒煩惱薪慧熖增故五極難勝地真俗兩智行相互違合令相應極難勝故六現前地住緣起智引無分别最勝般若令現前故七遠行地至無相住功用後邊出過世間二乘道故八不動地無分别智任運相續相用煩惱不能動故九善慧地成就微妙四無礙解能遍十方善說法故十法雲地大法智雲舍衆德水蔭蔽一切如空粗重充滿法身故如是十地總攝有為功德以為自性與所修行為勝依持令得生長故名為地楞嚴經是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地異性入同同性亦滅名離垢地淨極明生名發光地明極覺滿名焰慧地一切同異所不能至名難勝地無為真如性淨明露名現前地盡真如際名逺行地一真如心名不動地發真如用名善慧地是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位慈陰妙雲覆涅槃海名法雲地華嚴經一切佛法皆以十地為本十地究竟修行成就得一切智蓮花足西域記菩薩隨足所蹈出大蓮花金粟淨名經義鈔梵語維摩詰此云淨名般提之子母名離垢妻名金機男名善思女名月上過去成佛號金粟如來超禪涅槃經後分爾時世尊說是語已復入超禪從初襌出入第三禪從三禪出入虛空處從虛空處出入無所有處從無所有處出入滅盡想定從滅盡想定出次第還入至非想非非想處從非想非非想出入無邊識處從無邊識處出入第四禪從四禪出入第二禪從二禪出入于初禪如是逆順入超禪已頂法涅槃經有暖法頂法忍法世第一法六度三教論衡六度者六波羅密六波羅密者即檀波羅密尸波羅密羼提波羅密毗梨耶波羅密禪定波羅密槃若波羅密以唐言譯之即布施持戒忍辱精進禪定智慧是也五常白虎通五常者何謂仁義禮智信也孔穎達尚書正義五常即五典謂父義母慈兄友弟恭子孝五者人之常行空空大般若經善現白佛言世尊云何空空佛言善現空謂一切法空此空由空空何以故非常非壤本性爾故是為空空北山移文談空空于釋部核𤣥𤣥于道流語語詩于時言言于時語語無見之見僧肇維摩詰經注實相慧眼之境非肉眼所見慧眼尚不見實而況非實雖曰無見而無所不見此真慧眼之體不言之言莊子仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎于此言巳曰丘也聞不言之言矣未之嘗言于此乎言之郭象注聖人無言其所言者百姓之言耳故曰不言之言茍以言為不言則雖言出于口故為未之嘗言疑冰蟲孫綽遊天台山賦哂夏蟲之疑冰李善注言淺近小智同乎夏蟲莊子夏蟲不可以語于冰者篤于時也溺埿象遺教經世間縳著沒于衆苦譬如老象溺泥不能自出楞伽經名身與句身及形身差别凡夫愚計著如象溺深泥食木成字涅槃經如蟲食木有成字者此蟲不知是字非字智人見之終不唱言是蟲解字亦不驚怪慧眼華嚴經肉眼見一切色慧眼見一切衆生諸根境界第一義楞伽經第一義者聖智自覺所得非言說妄想覺境界維摩詰經能善分别諸法相于第一義而不動僧肇注第一義謂諸法一相義也開不二門維摩詰經爾時維摩詰謂衆菩薩言諸仁者云何菩薩入不二法門各隨所樂說之四十九僧時注經者凡五十人除惠幹一人而言是四十九矣一百八句楞伽經不生句生句常句無常句相句無相句住異句非住異句剎那句非剎那句自性句離自性句空句不空句斷句不斷句邊句非邊句中句非中句常句非常句緣句非緣句因句非因句煩惱句非煩惱句愛句非愛句方便句非方便句巧句非巧句淨句非淨句成句非成句譬句非譬句弟子句非弟子句師句非師句種性句非種性句三乘句非三乘句所有句非所有句願句非願句三輪句非三輪句相句非相句有品句非有品句俱句非俱句緣自聖智現法樂句非現法樂句剎土句非剎土句阿㝹句非阿㝹句水句非水句弓句非弓句實句非實句數句非數句明句非明句虛空句非虛空句雲句非雲句工巧伎術明處句非工巧伎術明處句風句非風句地句非地句心句非心句施設句非施設句自性句非自性句陰句非陰句衆生句非衆生句慧句非慧句涅槃句非涅槃句爾𦦨句非爾𦦨句外道句非外道句荒亂句非荒亂句幻句非幻句夢句非夢句𦦨句非𦦨句像句非像句輪句非輪句揵闥婆句非揵闥婆句天句非天句飲食句非飲食句淫欲句非淫欲句見句非見句波羅密句非波羅密句戒句非戒句日月星宿句非日月星宿句諦句非諦句果句非果句滅起句非滅起句治句非治句相句非相句文句非文句巧明處句非巧明處句禪句非禪句迷句非迷句現句非現句護句非護句族句非族句仙句非仙句王句非王句攝受句非攝受句寶句非寶句記句非記句一闡提句非一闡提句女男不男句非女男不男句味句非味句事句非事句身句非身句覺