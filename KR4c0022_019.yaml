body:
  text: 王右丞集箋注卷十九仁和趙殿成撰序十首暮春太師左右丞相諸公于韋氏逍遙谷宴集序山有姑射人蓋方外海有蓬瀛地非宇下逍遙谷天都近者王官有之不廢大倫存乎小隱迹崆洞而身拖朱紱朝承明而暮宿青靄故可尚也先天之君俾人在宥歡心格于上帝喜氣降為陽春時則太子太師徐國公左丞相稷山公右丞相始興公少師宜陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賔客王公黼衣方領垂璫珥筆詔有不名命無下拜熙天工者坐而論道典邦教者官司其方典邦教唐文粹作掌邦典相與察天地之和人神之泰聽于朝則雅頌矣問于野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合宴樂考擊鐘鼓退于彤庭選辰擇地選唐文粹作撰右班劍驂六騶畫輪載轂羽幢先路以詣夫逍遙焉唐文粹遙字下有谷字神臯藉其緑草驪山啓于朱户渭之美竹魯之嘉樹雲出其棟水源于室唐文粹作雲出于棟水環其室灞陵下連乎菜地菜顧本作萊誤今從唐文粹本新豐半入于家林館層巔檻側徑徑舊作趣非師古節儉惟新丹堊巖谷先曙羲和不能信其時卉木後春勾芒不能一其令卉木唐文粹作芳卉花徑窈窕蘅臯漣漪花唐文粹作桃漣漪唐文粹作超忽驂御延佇于叢薄佩玉升降于蒼翠于是外僕告次獸人獻鮮樽以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷慨于座右趙舞徘徊于白雲衮旒松風珠翠煙露日在濛汜羣山夕嵐猶有濯纓清歌據梧高詠與松喬為伍是羲皇上人且三代之後而其君帝舜九服之內而其俗華胥上客則冠冕巢由主人則弟兄元愷是四美同乎一時廢而不書罪在司禮竊賢楚傅常詣茅堂之居仰謝右軍忽序蘭亭之事賢唐文粹作思蓋不獲命豈曰能賢姑射莊子堯治天下之民平海內之政往見四子于藐姑射之山汾水之陽窅然喪其天下焉太平寰宇記平山一名壺口山尚書謂壺口治梁及岐即此也今名姑射山在晉州臨汾縣西八里平水出焉足美石山海經云憲山之南三百里有姑射山冀州圖云西入文城郡以山為界莊子藐姑射之上有神人居焉肌膚若氷雪綽約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外堯見之窅然喪其天下即此地也方外莊子彼遊方之外者也而丘遊方之內者也曹植七啓雍容暇豫娛志方外王官左傳若治其故則王官之邑也小隱見十一卷大隱注中在宥莊子聞在宥天下不聞治天下也在之也者恐天下之淫其性也宥之也者恐天下之遷其德也天下不淫其性不遷其德有治天下者哉黼衣見五卷朱紱注中下拜左傳王使宰孔賜齊侯胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜坐而論道周禮坐而論道謂之王公官司其方左傳夫物物有其官官修其方朝夕思之一日失職則死及之杜預注方法術也賡歌賡續也事見虞書帝舜作歌歸美股肱臯陶以其義未足乃續為歌詩責難于君以成其義猗哉玉篇猗嘆辭也韻會猗假借為美也班劍王儉褚淵碑文給班劍二十人劉良注班劍謂執劍而從行者也李周翰注班劍木劍無刃假作劍形畫之以文故曰班也任昉竟陵文宣王行狀虎賁班劍百人李善注晉公卿禮秩曰諸公及開府位從公者給虎賁二十人持班劍焉呂向注班列也言使勇士行列持劍以為儀仗也通鑑宋紀劭使班劍及左右排湛胡三省注班劍持劍為班立在車前六騶左傳程鄭為乘馬御六騶屬焉杜預注六騶六間之騶周禮諸侯有六間焉孔穎達正義以騶是主駕之官羽幢漢書韓延夀傳建幢棨植羽葆晉灼曰幢旌幢也師古曰幢麾也説文幢旌旗之屬先路楚辭乘騏驥以馳騁兮來吾道夫先路驪山太平寰宇記驪山在昭應縣東南三里即藍田山也溫湯出山下其陽多寶玉其隂多黃金三秦記始皇作閣道至驪山八十里人行橋上車行橋下今石柱猶存一統志驪山在臨潼縣東南二里因驪戎所居故名山之麓溫泉所出唐玄宗更名昭應上有老母廟山左肩曰東繡嶺右肩曰西繡嶺美竹史記渭川千畝竹其人與千户侯等嘉樹左傳晉侯使韓宣子來聘宴于季氏有嘉樹焉宣子譽之菜地即采地也古菜采字通用層巔謝靈運詩葺宇臨回江築觀基曽巔劉良注曽高也言築觀于高山之巔丹堊子虛賦其土則丹青赭堊雌黃白附師古曰丹今之朱砂也堊今之白土也古今注其上皆丹堊羲和廣雅日御謂之羲和勾芒月令孟春仲春季春之月其神勾芒窈窕謝靈運詩側徑既窈窕環洲亦玲瓏李周翰注窈窕長逺貌蘅臯曹植洛神賦稅駕乎蘅臯秣駟乎芝田李善注蘅杜蘅也臯澤也劉良注蘅臯香草之澤也延佇楚辭結桂兮延佇王逸注延長也佇立也叢薄淮南子鳥飛千仞之上獸走叢薄之中高誘注聚木曰叢深草曰薄鮑照蕪城賦灌莽杳而無際叢薄紛其相依呂向注叢薄草木相雜也外僕杜預左傳注外僕掌次舍者獸人左傳子有軍事獸人無乃不給于鮮敢獻于從者杜預注新殺為鮮大罍鄭康成周禮注大罍瓦罍也五鼎漢書丈夫生不五鼎食張晏注五鼎食牛羊豕魚麋也諸侯五卿大夫三擁腫莊子吾有大樹人謂之樗其大本擁腫而不中繩墨沼毛左傳澗溪沼沚之毛蘋蘩蕰藻之菜杜預注沼池也毛草也蘋大萍也蘩皤蒿也曼姬子虛賦鄭女曼姬文穎注鄭國出好女曼者其色理曼澤也齊瑟曹子建詩秦箏發西氣齊瑟揚東謳濛汜楚辭出自湯谷次于濛汜王逸注汜水涯也言日出東方湯谷之中暮入西極蒙水之涯也淮南子邅回濛汜之渚高誘注濛汜日所入之地也松喬西都賦庶松喬之羣類時遊從乎斯庭赤松王喬皆古仙人羲皇宋書陶潛嘗言五六月北窗下臥遇涼風暫至自謂是羲皇上人司禮唐書百官志龍朔二年改禮部曰司禮楚傅漢書韋孟為楚元王傅傳子夷王及孫王戊戊荒淫不遵道孟作詩風諌後遂去位徙家于鄒又作一篇其在鄒詩曰爰戾于鄒鬋茅作堂我徒我環築室于牆右軍晉書王羲之嘗與同志宴集于會稽山陰之蘭亭羲之自為之序以申其志或以潘嶽金谷詩序方其文羲之比于石崇聞而甚喜豈曰能賢左傳若棄德不讓是廢先君之舉也豈曰能賢成按篇中所稱太子太師徐國公是蕭嵩右丞相始興公是張九齡少師宜陽公是韓休禮部尚書杜公是杜暹賔客王公是王丘左丞相稷山公當是裴耀卿然史傳但言封趙城侯不言封稷山公當是闕文餘二人未詳據劉昫唐書本紀云開元二十四年十一月侍中裴耀卿為尚書左丞相中書令張九齡為尚書右丞相尚書右丞相蕭嵩為太子太師工部尚書韓休為太子少保至二十五年四月張九齡左授荆州長史不在朝廷矣是諸公宴集實在二十五年之春名賢畢集觴咏交錯何減金谷蘭亭之會而篇什不傳德音湮沒惜哉洛陽鄭少府與兩省遺補宴韋司户南亭序惟帝克辟惟股肱克左右庶績允釐有司多暇舉無違德孰獻其可雖列侍丹陛而罕伏青蒲攄懷致館灞陵南望曲江左轉轉舊本作輔非登一級而鄠杜如近盡三休而天地始大凝氣向晦蒼蒼寒木式與汝歌多酌我酒墨客既序親當獸炭膳夫交馳屢奏鮮食夫含德之厚與時偕化拂衣為放為唐文粹作而則野人于小隱之中束帶而朝則君子于大夫之後何軌轍一境是非外物哉且騎有羈紲紲唐文粹作勒徒有次舍可以永日可以繼夜客非詩人之徒歟奚其默也司户唐六典上州司户參軍事二人從七品下中州一人正八品下下州一人從八品下股肱左傳君之卿佐是為股肱克左右商書惟尹躬克左右厥辟宅師允釐尚書允釐百工庶績咸熙孔安國傳允信釐治工官績功也青蒲漢書史丹直入臥內頓首伏青蒲上應劭曰以青規地曰青蒲自非皇后不得至此攄懷西都賦願賔攄懷古之蓄念廣雅攄舒也鄠杜西都賦商洛緣其隈鄠杜濵其足李善注扶風有鄠縣杜陽縣式式用也獸炭晉書羊琇性豪侈費用無復齊限而屑炭和作獸形以溫酒洛下豪貴咸競效之膳夫成按周禮膳夫乃是食官之長掌王之食飲膳羞者後人借為厨子之稱鮮食尚書暨益奏庶鮮食孔安國傳鳥獸新殺曰鮮羈紲左傳臣負羈紲從君巡于天下杜預注羈馬羈也紲馬韁也孔穎達正義説文云羈馬絡頭也又曰馬絆紲係也少儀云犬則執紲牛則執紖馬則執􅀈服虔云一曰犬韁曰紲古者行則有犬杜今正以紲為馬韁者紲是係之别名係馬係駒皆得稱紲彼對文耳散則可以通巡于天下用馬為多故主于馬耳玉篇紲思列切馬韁也次舍漢書吳王濞傳治次舍須大王師古注次舍息止之處也送高判官從軍赴河西序河西顧本作西河誤今校正今上合大道以撫荒外振長䇿以馭宇內故左言返踵穿胸沸脣膺騰白波驟輸碧砮之貢腹阻赤坂傳致紫琥之琛辮髮名王養馬于下廏魋結去帝獻珠于小臣而犬戎不識蝸角自大偷安九服之外謂天誅罕及自絶所國之後而王祭不供天子按劍謀臣切齒思以赤山為城青海為塹盡平其地悉虜其人而上將有哥舒大夫者名蓋四方身長八尺眼如紫石稜鬚如蝟毛磔指撝而百蠻不守叱吒而萬人俱廢䯱髵奮髯哮吼如虎裂眥大怒磨牙欲吞不待成師固將身先士卒常思盡敵不以賊遺君父矢集月窟劍斬天驕蹴崑崙使西倒縛呼韓令北面豈直趙人祭其東門胸奴不敢南牧而已開府之日辟書始下以為踴躍用兵健將之事意氣跨馬俠少之能蓋欲謀夫起豫哲士俾我殲黠冦以無類舉外國如拾遺待夷門而不食置廣武于上座始得我高子焉高子讀書五車運籌百勝慷慨謀議折天口之是非指畫山川知地形之要害嘗著七發曹王慕義每奏一篇漢文稱善緣情之製獨步當時主人橫挑而有餘墨客仰攻而不下公卿籍甚遍交歡于五侯孫吳暗合將建功于萬里徴以露版召見甘泉衣短後之衣帶櫑具之劍象弧雕服鞭弭櫜鞬目無先零氣射西旅蒼頭宿將持漢節以臨戎白面書生坐胡牀而破賊然孤烽逺戍黃雲千里嚴城落日而閉鐵騎升山而出邊笳咽于塞下畫角發于軍中亦可悲也遲子之獻凱雲臺奏事宣室紫綬曳地金印如斗列居東第位為通侯舊友拜塵羣公書幣祁大夫老矣武安侯問乎振長䇿史記振長䇿而御宇內師古曰以乘馬為喻也䇿所以撾馬也返踵淮南子丹穴大蒙反踵空同大夏北户竒肱修股之民高誘注反踵國名其人南行武迹向北穿胸山海經貫胸國其為人胸有竅郭璞注尸子曰四夷之民有貫胸者有深目者有長肱者黃帝之德嘗致之異物志曰穿胸之國去其衣則無自然者蓋似效此貫胸人也淮南子地形訓有穿胸民高誘注穿胸胸前穿孔達背博物志昔禹平天下會諸侯會稽之野防風氏後到戮之夏德之盛二龍降之禹使范成克御之行域外既周而還至南海經防風防風之神二臣以塗山之戮見禹使怒而射之迅風雷雨二龍升去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草是為穿胸民沸脣晉書沸脣成俗鳴鏑為羣劉孝標辨命論左帶沸脣乘間電發李善注齊梁之間通以虜為沸脣也張銑注沸脣戎狄之語也膺騰王褒四子講德論膺騰撇波而濟水不如乘舟之逸也碧砮梁簡文帝大法頌序金鱗鐵面貢碧砮之琛航海梯山奉白環之使王融曲水詩序文鉞碧砮之琛竒幹善芳之賦李善注徐廣晉紀曰鮮卑以碧石為寶王沈魏書曰東夷矢用楛青石為鏃赤坂漢書西域傳又歷大頭痛小頭痛之山赤土身熱之坂令人身熱無色頭痛嘔吐驢畜盡然鮑照苦熱行赤坂橫西阻養馬漢書金日磾字翁叔本胸奴休屠王太子也單于怨昆邪休屠居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其衆降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃門養馬魋結去帝史記陸賈傳尉陀平南越因王之高祖使陸賈賜尉陀印為南越王陸生至尉陀魋結箕踞見陸生陸生因進説尉陀乃蹶然起坐謝陸生又南越尉陀傳詔丞相陳平等舉可使南越者平言好畤陸賈先帝時習使南越乃召賈以為太中大夫往使因讓陀自立為帝曾無一介之使報者陸賈至南越王甚恐于是下令國中自今以後去帝制黃屋左纛服虔曰魋音椎今兵士椎頭結也索隱云魋直追反結音計謂為髻一撮以椎而結之故字從結且按魋結二字依字讀之亦通謂粵人本椎髻其髮今陀同其風俗但魋其髮而結之也顔師古漢書注結讀曰髻椎髻者一撮之髻其形如椎王祭不供見十二卷包茅注天子按劍鮑照詩天子按劍怒赤山後漢書烏桓傳赤山在遼東西北數千里青海周書吐谷渾治伏俟城在青海西十五里青海周圍千餘里梁書吐谷渾地有青海方數百里哥舒大夫劉昫唐書哥舒翰突騎施首領哥舒部落之裔也蕃人多以部落稱姓因以為氏世居安西翰家富于財倜儻任俠好然諾縱蒲酒年四十遭父喪三年客居京師為長安尉不禮慨然發憤折節仗劍之河西事節度使王倕倕攻新城使翰經略三軍無不震懼後節度使王忠嗣補為衙將翰好讀左氏春秋傳及漢書踈財重氣士多歸之忠嗣以為大斗軍副使嘗使翰討吐蕃于新城有同列為副者見翰禮倨不為用翰怒撾殺之軍中股栗遷左衛郎將後吐蕃冦邊翰拒之于苦拔海其衆三行從山差池而下翰持半段槍當其鋒擊之三行皆敗無不摧靡由是知名天寶六載擢授右武衛員外將軍充隴西節度副使都知關西兵馬使河源軍使先是吐蕃每至麥熟時即率部衆至積石軍穫取之共呼為吐蕃麥莊前後無敢拒之者至是翰使王難德楊景暉等潛引兵至積石軍設伏以待之吐蕃以五千騎至翰于城中率驍勇馳擊殺之略盡餘或挺走伏兵邀擊匹馬不還其冬玄宗在華清宮敕召翰至與語悅之遂以為鴻臚卿兼西平郡太守攝御史中丞代忠嗣為隴右節度支度營田副大使知節度事明年築神威軍于青海上吐蕃至攻破之又築城于青海中龍駒島有白龍見遂名為應龍城吐蕃屏迹不敢近青海吐蕃保石堡城路遙而險久不拔八載以朔方河東羣牧十萬衆委翰總統攻石堡城翰使麾下將高秀巖張守瑜進攻不旬日而拔之上録其功拜特進鴻臚員外卿與一子五品官賜物千匹莊宅各一所加攝御史大夫十一載加開府儀同三司十二載進封涼國公食實封三百户加河西節度使尋封西平郡玉十三載拜太子太保更加實封三百户又兼御史大夫眼如紫石稜鬚如蝟毛磔晉書桓溫豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善惔常稱之曰溫眼如紫石稜鬚作蝟毛磔孫仲謀晉宣王之流亞也叱吒史記項王喑噁叱吒千人皆廢索隱曰叱昌栗反吒卓嫁反或作吒喑噁懷怒氣叱吒發怒聲孟康曰廢伏也張晏曰廢偃也䯱髵張衡西京賦及其猛毅䯱髵隅目高眶廣韻䯱髵猛獸奮鬛貌磨牙揚雄長楊賦鑿齒之徒相與磨牙而爭之成師左傳成師以出聞敵強而退身先士卒吳志孫輔傳孫䇿西襲廬江太守劉勳輔隨從身先士卒有功賊遺君父後漢書是時帝在魯聞耿弇為張步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當擊牛灑酒以待百官反欲以賊虜遺君父耶月窟揚雄長楊賦西壓月􅒸東震日域服虔曰􅒸音窟穴之窟月􅒸月所生也崑崙趙至與嵇茂齊書披艱掃穢蕩海夷嶽蹴崑崙使西倒踏太山令東覆呼韓漢書胸奴傳姑夕王與烏禪幕及左地貴人共立稽侯㹪為呼韓邪單于東門史記齊威王曰吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家賈逵曰燕趙之人畏見侵伐故祭以求福此云東門疑誤南牧史記乃使蒙恬北築長城而守藩籬却胸奴七百餘里胡人不敢南下而牧馬辟書阮籍奏記開府之日人人自以為掾屬辟書始下下走為首李善注辟猶召也踴躍用兵邶風擊鼓其鏜踴躍用兵健將後漢書呂布傳與其健將成廉魏越等數十騎馳突燕陳謀夫小雅謀夫孔多俾説文俾益也從人卑聲拾遺漢書梅福傳高祖舉秦如鴻毛取楚如拾遺廣武漢書韓信以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車説成安君曰臣聞千里饋糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣竒兵三萬人從間路絶其輜重足下深溝高壘勿與戰彼前不得鬭退不得還吾騎兵絶其後野無所掠鹵不至十日兩將之頭可致戲下願君留意臣之計必不為二子所禽矣成安君儒者常稱義兵不用詐謀竒計不聽廣武君䇿信使間人窺知其不用還報則大喜乃敢引兵遂下破虜趙軍斬成安君泜水上禽趙王歇乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之運籌淮南子運籌于廟堂之上而決勝千里之外矣百勝史記臣有百戰百勝之術天口任彥升宣德皇后令辨析天口而似不能言李善注七略曰齊田駢好談論故齊人為語曰天口駢天口者言田駢子不可窮其口若事天指畫山川北史長孫晟口陳形勢手畫山川寫其虛實皆如指掌七發曹子建七啓序昔枚乘作七發傳毅作七激張衡作七辨崔駰作七依辭各美麗余有慕之焉遂作七啓每奏一篇史記陸賈傳高帝乃謂陸生曰試為我著秦所以失天下吾所以得之者何及古成敗之國陸生乃粗述存亡之徴凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬歲號其書曰新語此云漢文疑訛緣情陸機文賦詩緣情而綺靡賦體物而瀏亮李善注詩以言志故曰緣情賦以陳事故曰體物獨步當時北史自孝明之後文雅大盛邢邵雕蟲之美獨步當時每一文初出京師為之紙貴誦讀俄遍逺近公卿籍甚漢書陸賈以此遊漢庭公卿間名聲籍甚孟康曰言狼籍甚盛孫吳晉書平吳之後帝詔天下罷軍役示海內大安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武于宣武場山濤時有疾詔乘步輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而暗與之合召見甘泉漢書劉德少時數言事召見甘泉宮武帝謂之千里駒短後之衣莊子吾王所見劍士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難櫑具之劍漢書雋不疑冠進賢冠帶櫑具劍珮環玦褒衣博帶盛服至門上謁應劭注櫑具木標首之劍櫑落壯大也晉灼曰古長劍首以玉作井鹿盧形上刻木作山形如蓮花初生未敷時今大劍木首其狀似此師古曰晉説是也櫑音磊象弧雕服鮑照詩氈帶佩雙鞬象弧插雕服張銑注象弧象牙飾弓也服盛箭器雕畫也鞭弭櫜鞬左傳其左執鞭弭右屬櫜鞬以與君周旋杜預注弭弓末無緣者櫜以受箭鞬以受弓孔穎達正義曰釋器云弓有緣者謂之弓無緣者謂之弭李巡曰骨飾兩頭曰弓不以骨飾兩頭曰弭孫炎曰緣謂繳束而漆之弭謂不以繳束骨飾兩頭者也二説雖反俱以弭為弓末也詩云載櫜弓矢則弓矢所藏俱名櫜也昭元年傳伍舉請垂櫜而入注云示無弓則櫜亦受弓之物方言云弓藏謂之鞬此櫜鞬二物必一弓一矢以鞬是受弓故云櫜以受箭因對文而分之耳先零後漢書西羌傳元康三年先零乃與諸羌大共盟誓將欲冦邊帝聞使安國將兵觀之安國至召先零豪四十餘人斬之因放兵擊其種斬首千餘級于是諸羌怨怒遂冦金城乃遣趙充國與諸將將兵六萬人擊破平之鄭氏曰零音憐西旅尚書西旅底貢厥獒孔穎達正義西方之戎有國名旅者蒼頭宿將宋書沈慶之患頭風好著狐皮帽羣蠻惡之號曰蒼頭公每見慶之軍輒畏懼曰蒼頭公已復來矣戰國䇿田盼宿將也白面書生宋書沈慶之傳陛下今欲伐國而與白面書生輩謀之晉書張重華以謝艾為使持節軍師將軍率步騎三萬進軍臨河麻秋以三萬衆距之艾乘軺車冠白幍鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡牀指麾處分賊以為伏兵發也懼不敢進張瑁從左南緣河而截其後秋軍乃退艾乘勝奔擊遂大敗之鐵騎晉書精甲耀日鐵騎前驅宣室三輔黃圖宣室未央前殿正室也淮南子云周武王殺紂于宣室漢取舊名也漢書曰文帝受釐宣室夜半前席賈生問鬼神之事即此也紫綬劉昫唐書二品三品紫綬三采紫黃赤紅紫質長一丈六尺一百八十首廣八寸金印如斗晉書周顗傳今年殺諸賊奴取金印如斗大繫肘東第漢書司馬相如傳位為通侯居列東第師古注東第甲宅也居帝城之東故曰東第也張揖注列東第在天子下方李周翰注第次也西為尊東為下言為通侯列在天子之下次通侯漢書高帝紀通侯諸將毋敢隱朕應劭曰舊曰徹侯避武帝諱曰通侯通亦徹也通者言其功德通于王室也漢書百官公卿表徹侯金印紫綬避武帝諱曰通侯或曰列侯師古注徹侯言其爵位上通于天子拜塵晉書潘嶽與石崇等諂事賈謐每候其出與崇輒望塵而拜祁大夫左傳襄三年祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可于是羊舌職死矣晉侯曰孰可以代之對曰赤也可于是使祁午為中軍尉羊舌赤佐之君子謂祁奚于是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣又襄二十一年范宣子囚叔向樂王鮒見叔向曰吾為子請叔向不應出不拜其人皆咎叔向叔向曰必祁大夫祁大夫外舉不棄讎內舉不失親其獨遺我乎于是祁奚老矣聞之乘馹而見宣子宣子與之乘以言諸公而免之武安侯成按漢時田蚡封武安侯三國時曹爽亦封武安侯然與此俱不合送李補闕充河西支度營田判官序漢張右掖以備左袵西遮空道北護居延然犬戎夜獵于山外胸奴射雕于塞下歲或有之我散騎常侍曰王公勇能盡敵禮可用兵讀黃石書殺白馬將入備顧問載以乘輿副車出命專征賜以內棧文馬將軍幕府請命介于本朝天子瑣闈輟諌官以從士補闕李公家世龍門詞場虎步五經在笥一言蔽詩廣屯田之蓄度長府之羡以贍邊人以弱敵國然後馳檄識匿略地崑崙使麾下騎刃樓蘭之腹發外國兵繫郅支之頸五單于遁逃于漠北雜種羌不近于隴上子之行也不謂是乎拜首漢庭驅傳而出窮塞砂磧以西極黃河混沌而東注胡風動地朔雁成行拔劍登車慷慨而别補闕唐書百官志門下省有左補闕六人中書省有右補闕六人皆從七品上支度營田判官唐書百官志節度使兼支度營田招討經略使則有副使判官各一人漢張右掖漢書地理志張掖郡故胸奴昆邪王地武帝太初元年開應劭曰張國臂掖故曰張掖也西遮空道漢書西域傳漢興至于孝武事征四夷廣威德而張騫始開西域之迹其後驃騎將軍擊破胸奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙民充實之分置武威張掖敦煌列四郡據兩關焉射雕史記天子使中貴人從廣勒習兵擊胸奴中貴人將騎數十縱見胸奴三人與戰三人還射傷中貴人殺其騎且盡中貴人走廣廣曰是必射雕者也廣乃遂從百騎往馳三人三人亡馬步行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果胸奴射雕者也索隱曰案服虔云雕大鷙鳥也一名鷲黑色多子可以其毛作矢羽禮可用兵左傳晉侯登有莘之虛以觀師曰少長有禮其可用也黃石書漢書張良遊下邳圯上有一老父出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我已遂去不見旦日視其書乃太公兵法副車晉書輿服志屬車一曰副車一曰二車一曰左車漢因秦制大駕屬車八十一乘行則中央左右分為行專征白虎通好惡無私執意不傾賜以弓矢使得專征內棧顔延年赭白馬賦序歲老氣殫斃于內棧李善注棧櫪也司馬彪曰棧若㯪牀施之濕地也呂向注棧以板禦濕而承馬足也文馬左傳宋人以兵車百乘文馬百駟孔穎達正義文馬謂文飾雕畫之若朱其尾鬛之類也幕府史記李牧傳市租皆輸入莫府如淳曰將軍征行無常處所在為治故言莫府莫大也索隱曰如淳解莫為大非也崔浩云古者出征為將帥軍還則罷理無常處以幕帟為府署故曰幕府則莫當為幕字之誤也又李廣傳莫府省約文書籍事索隱曰案大顔云凡將軍謂之莫府者蓋兵門合施帷帳故稱幕府古字通用遂作莫耳小爾雅訓為大非也漢書李廣傳莫府省文書晉灼曰將軍職在征行無常處所在為治故言莫府也莫大也或曰衛青征胸奴絶大莫大克獲帝就拜大將軍于幕中府故曰莫府莫府之名始于此也師古曰二説皆非也莫府者以軍幕為義古字通單用耳軍旅無常居也故以帳幕言之廉頗李牧市租皆入幕府此則非因衛青始有其號又莫訓大于義乖矣介杜預左傳注介副也龍門世説李元禮風格秀整高自標持欲以天下名教是非為巳任後進之士有升其堂者皆以為登龍門詞場昭明太子十二月啓詞場月白辨囿日新虎步魏志夏侯淵傳虎步關右所向無前五經在笥後漢書邊韶字孝先陳留浚儀人也以文學知名教授數百人韶口辨曽晝日假臥弟子私嘲之曰邊孝先腹便便懶讀書但欲眠韶潛聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慙長府何晏論語集解長府藏名也藏貨財曰府識匿唐書西域傳識匿或曰尸棄尼曰瑟匿東南直京師九千里東五百里距蔥嶺守捉所南三百里屬護密西北五百里抵俱蜜初治苦汗城後散居山谷有大谷五酋長自為治謂之五識匿地二千里無五穀人喜攻剽劫商賈播蜜川四谷稍不用王號令俗窟室崑崙禹貢織皮崑崙析支渠搜西戎即敘孔安國傳織皮毛布有此四國在荒服之外流沙之內羌髳之屬孔穎達正義曰四國皆衣皮毛故以織皮冠之傳言織皮毛布有此四國崑崙也析支也渠也搜也四國皆是戎狄也末以西戎總之此戎在荒服之外流沙之內牧誓云武王伐紂有羌髳從之此是羌髳之屬禹皆就次敘美禹之功逺及戎狄故記之也鄭玄云衣皮之民居此崑崙析支渠搜三山之野者皆西戎也王肅云崑崙在臨羌西析支在河關西鄭以崑崙為山謂别有崑崙之山非河所出者也所以孔意或是地名國號不必為山也刃樓蘭漢書樓蘭王為胸奴反間數遮殺漢使其弟尉屠耆降漢具言狀元鳳四年大將軍霍光白遣平樂監傅介子往刺其王介子輕將勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺王王貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉耆屠在漢者漢兵方至毋敢動自令滅國矣介子遂斬王安歸首馳傳詣闕懸首北闕下封介子為義陽侯郅支漢書宣帝時胸奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居其後都護甘延夀副校尉陳湯發戊巳校尉西域諸國兵至康居誅滅郅支單于漠北漢書武帝紀元封元年遣使者告單于曰南越王頭已懸于漢北闕矣胸奴能戰天子自將待邊不能亟來臣服何但亡匿幕北寒苦之地為胸奴讋焉雜種羌後漢書西羌傳元和三年迷吾與弟號吾諸雜種反畔號吾先輕入冦隴西界郡督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損于羌誠得生歸必悉罷兵不復犯塞段熲傳雜種羌屯聚白石熲進擊首虜三千餘人驅傳蕭察愍時賦始解印于稽山即驅傳于湘水庾信詩無庸奉天眷驅傳收南秦混沌枚乘七發沌沌渾渾狀如奔馬李善注沌沌渾渾波相隨之貌朔雁謝靈運撰征賦眷轉蓬之辭根悼朔雁之赴越送懷州杜參軍赴京選集序國自有初以節守西門者得自召吏選客故我常侍崔公以二車迎杜侯于杜陵而咨之矣舍之門下衣儒者之服立于軍中説諸侯之劍猗元帥之理也行有賁育鐵馬成羣而雄戟罕耀角弓載櫜秉王者師不邀竒功樓庭籍甚高冠長劍拜命雲臺在是行也羣公自出轅門驂騑滿路置酒欲飲高歌自悽寂寥孤城惆愴朔管飛雪蔽野長河始冰吾子勉之慷慨而别懷州唐書地理志河北道有懷州河內郡參軍唐書百官志外官有録事參軍功曹參軍倉曹參軍田曹參軍户曹參軍兵曹參軍法曹參軍士曹參軍二車國語大夫有二車備承事也韋昭解二副也諸侯劍莊子諸侯之劍以知勇士為鋒以清廉士為鍔以賢良士為脊以忠勝士為鐔以豪傑士為夾此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圎天以順三光下法方地以順四時中和民意以安四鄉此劍一用如雷霆之震也四封之內無不賔服而聽從君命者矣此諸侯之劍也賁育漢書司馬相如傳力稱烏獲捷言慶忌勇期賁育師古曰孟賁古之勇士也水行不避蛟龍陸行不避豺狼發怒吐氣聲響動天夏育亦猛士也史記注夏育衛人力舉千鈞鐵馬陸倕石闕銘鐵馬千羣朱旗萬里李善注鐵馬鐵甲之馬也雄戟子虛賦建干將之雄戟張揖云干將韓王劍師也雄戟胡中有􅟉者干將所造史記索隱方言云戟中小子刺者所謂雄戟也周處風土記云戟為五兵雄也􅟉音巨案周禮冶氏為戈胡三之注云胡其子也又周禮圖謂戟反曲下為胡也載櫜周頌載戢干戈載櫜弓矢毛萇傳櫜韜也孔穎達正義曰櫜者弓衣一名韜故納弓于衣謂之韜弓高冠長劍後漢書若夫高冠長劍紆木懷紫者布滿宮闈轅門周禮掌舍設車宮轅門鄭康成注謂王行止宿阻險之處備非常次車以為籓則仰車以其轅表門孔穎達正義云謂仰兩乘車轅相向以表門故名為轅門後人稱軍門為轅門本此朔管謝莊月賦聆臯禽之夕聞聽朔管之秋引李善注朔管羌笛也説文云管十二月位在北方故云朔呂向注朔管謂北胡之笛也送鄆州須昌馮少府赴任序少年明經試出補吏學通大義政習前典本之于德輔之以才大官大邑可也不惟是歟豫昔仕魯蓋嘗之鄆書社萬室帶以魚山濟水旗亭千隧雜以鄭商周客有鄒人之風以厚俗有汶陽之田以富農齊紈在笥河魴登俎一都會也子其不寶貨不耽樂不弄法不慢官無侮老成人無虐孤與幼上官奏課輶軒以聞則繡衣方領垂璫珥筆子所得也誰敢有之豫病且憊歲晚彌獨窮巷衡門落日秋草趙服過我且東其轅促飯中厨子不可以蔬食送車出郭吾不可以徒行屨以及門拜于宇下猶且抱杖延頸送之以目城闕樹轉悲其馬嘶云須昌唐書地理志河南道鄆州東平郡有須昌縣明經唐六典凡舉試之制每歲仲冬率與計偕其科有六二曰明經凡明經先帖經然後口試并答䇿取粗有文性者為通注云舊制諸明經試每經十帖孝經二帖論語八帖老子兼注五帖每帖三言通六巳上然後試䇿十條通七即為高第開元二十五年敕諸明經先帖經通五已上然後口試每經通問大義十條通六已上并答時務䇿三道前典晉書憲章令軌祖述前典書社左傳自濟以西禚媚杏以南書社五百杜預注二十五家為一社籍書而致之史記昭王將以書社地七百里封孔子服虔曰書籍也索隱曰古者二十五家為里里則各立社則書社者書其社之人于籍蓋以七百里書社之人封孔子也魚山元和郡縣志魚山一名吾山在鄆州東阿縣南二十里瓠子歌曰吾山平兮巨野溢魚沸鬱兮迫冬日即此山也濟水元和郡縣志鄆州須昌縣濟水南自鄆城縣界流入去縣西二里旗亭張衡西京賦旗亭五重俯察百隧薛綜注旗亭市樓也隧列肆道也李周翰注隧市道也汶陽之田左傳公賜季友汶陽之田杜預注汶陽田汶水北地汶水出泰山萊蕪縣西入濟太平寰宇記故汶陽縣在兖州龔丘縣東北五十四里其城側田沃壤故魯號汶陽之田成公二年齊人歸我汶陽之田是也齊紈漢書地理志齊地織作氷紈綺繡純麗之物如淳曰紈白熟也臣瓚曰冰紈紈細密堅如冰者也師古曰紈素也梁元帝謝東宮啓鮮潔齊紈聲高趙縠河魴國風豈其食魚必河之魴無侮老成人商書無侮老成人無弱孤有幼奏課任昉齊竟陵王行狀又以奏課連最進號冠軍將軍輶軒風俗通周秦常以八月遣輶軒之使求異代方言還奏籍之藏于祕室送之以目呂氏春秋客有見田駢者被服中法進退中度趨翔間雅辭令遜敏田駢聽之畢而辭之客出田駢送之以目送鄭五赴任新都序邠人前京兆右扶風居上谷間上疑是山字或川字之訛與寢園接七月之什蕩無遺風五陵之豪雜居其地故有黠吏惡少犯命干紀干舊作于非政寬則以姦病人操急則以事中吏鄭子為邑也絃歌之化洋溢四封雷霆之威燀赫百里下車按捕盡致法焉繡衣下帷風俗之治之疑是以字之訛茍以文墨抵罪除名為人削迹于野杜陵解印時賣故侯之瓜彭澤無官詎有公田之黍牽衣肘見步雪履穿獲戾由中是貧非病屬聖朝龍旗鑾輅登封告成之事畢蒼玉黃琮郊天祀地之禮備天下無事海內乂安盡登仁夀之域猶下哀憐之詔萬方有罪與之更新百竂失職使復其位降邑宰為輿尉從館墨而解褐龍星始見馬首欲西搢紳先生居多結友諸曹列署且有同時時工部侍郎蕭公詞翰之宗德義之府弱年筮仕一命聮官于奉常幾日左遷六人同罪于外郡籯金盛業克傳丞相文儒萬石高風彌重故人賔客賦詩寵别贈言誡行騎登棧道館于板屋劍門中斷蜀國滿于二川銅梁下臨巴江入于萬井黃鸝欲語夏木成隂悲哉此時相送千里新都唐書地理志劍南道成都府蜀郡有新都縣邠唐書地理志邠州新平郡義寧二年析北地郡之新平三水置邠故作豳開元十三年以字類幽改元和郡縣志雍州京兆府西北至邠州三百里岐州扶風郡東北至邠州三百三十里九域志邠州新平郡南至本州界一百二里自界首至京兆府一百八十里東南至本州界一百二里自界首至京兆府一百五十里西南至本州界六十里自界首至鳳翔府一百一十里寢園按唐書地理志獻陵在三原縣東十八里昭陵在醴泉縣西北六十里乾陵在奉天縣北五里定陵在富平縣西北十五里橋陵在奉先縣西北三十里皆屬京兆府至天祐三年始割奉先一縣屬同州七月之什毛萇詩傳七月陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也五陵豪漢書原涉傳郡國諸豪及長安五陵諸為氣節者皆歸慕之師古曰五陵謂長陵安陵陽陵茂陵平陵也班固西都賦曰南望杜霸北眺五陵是知杜陵霸陵非此五陵之類也而説者以為高祖以下至茂陵為五陵失其本意黠吏漢書尹翁歸傳縣縣收取黠吏豪民按致其罪惡少漢書昭帝紀發三輔及郡國惡少年師古曰惡少年為無賴子弟也燀赫莊子聲侔鬼神燀赫千里削迹莊子夫子再逐于魯削迹于衛伐樹于宋窮于商周圍于陳蔡公田晉書陶潛為彭澤令在縣公田悉令種秫穀曰令吾常醉于酒足矣妻子固請種粳乃使一頃五十畝種秫五十畝種粳牽衣肘見莊子曾子居衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉襟而肘見納履而踵決步雪履穿史記東郭先生久待詔公車貧困飢寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎獲戾由中左傳吉若獲戾子將行之袁宏三國名臣序贊正以招疑忠而獲戾是貧非病莊子子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色龍旗魯頌龍旗承祀鄭康成箋交龍為旗鑾輅江總詩翠渚還鑾輅瑤池命羽觴登封告成後漢書祭祀志羣司禮官咸以為宜登封告成為民報德蒼玉黃琮周禮以蒼璧禮天以黃琮禮地鄭康成注禮神者必象其類璧圜象天琮八方象地仁夀之域漢書王吉傳驅一世之民躋之仁夀之域更新後漢書袁紹傳蠲除細故與下更新百寮尚書臯陶謨百寮師師百工惟時孔安國傳僚官也輿尉左傳廢其輿尉服虔注輿尉軍尉主發衆使民國語知鐸遏冦之恭敬而信強也使為輿尉韋昭注輿尉上軍尉也非唐時縣尉之職右丞借作縣尉用解褐褐衣庶人之服解去褐衣而登仕版晉書曹毗傳安期解褐于秀林魚父擺釣于長川龍星始見左傳龍見而雩杜預注龍見建已之月蒼龍宿之體昏見東方孔穎達正義曰天官東方之星盡為蒼龍之宿見謂合昏見也馬首左傳欒黶曰余馬首欲東搢紳難蜀父老文耆老大夫搢紳先生之徒二十有七人儼然造焉劉良注搢紳謂衣冠也後漢書楊彪傳今天下纓緌搢紳所以瞻仰明公者章懷太子注紳帶也搢插也插笏于紳也或作搢者淺赤言帶之色晉書輿服志古者貴賤皆執笏其有事則搢之于腰帶所謂搢紳之士者搢笏而垂紳帶也結友後漢書吳祐舉孝廉將行郡中為祖道祐越壇共小史雍丘黃真歡語移時與結友而别三國志吕蒙因為魯肅畫五䇿肅于是越席就之拊其背曰吕子明吾不知卿才略所及乃至于此也遂拜蒙母結友而别諸曹杜氏通典大唐州府佐吏有司功司倉司户司兵司法司士等六參軍在府為曹在州為司列署何晏景福殿賦屯方列署三十有二呂延濟注列署百官諸曹蕭公按唐書蕭嵩傳嵩子華當嵩罷相時擢給事中久之為工部侍郎天寶末為兵部侍郎德義之府國語夫先王之法志德義之府也奉常唐六典太常寺龍朔二年改為奉常咸亨元年復舊左遷史記周昌傳吾極知其左遷索隱曰地道尊右右貴左賤故謂貶秩為左遷籯金漢書韋賢為人質朴少欲篤志于學兼通禮尚書以詩教授號稱鄒魯大儒本始三年代蔡義為丞相少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經如淳曰籯竹器受三四斗今陳留俗有此器萬石史記萬石君家以孝謹聞于郡國雖齊魯諸儒質行皆自以為不及也棧道史記索隱棧道閣道也音士諌反包愷音士版反崔浩云險絶之處傍鑿山巖而施版梁為閣送從弟惟祥宰海陵序天子若曰咨爾三事百辟冦賊姦宄震驚朕師其舉吏二千石至墨綬豫將大命于朝以撫方夏羣從曰惟祥舊有令聞克奉成憲往踐乃職無恫于人獄貨非寶農食滋碩浮于淮泗浩然天波海潮噴于乾坤江城入于泱漭彼有美錦爾嘗操刀學古入官倚法為吏上官奏課國將大選爾勞勉哉行乎唱豫和汝海陵唐書地理志揚州廣陵郡有海陵縣冦賊姦宄舜典蠻夷猾夏冦賊姦宄孔安國傳羣行攻劫曰冦殺人曰賊在外曰姦在內曰宄震驚朕師舜典朕堲讒説殄行震驚朕師孔安國傳震動也動驚我衆二千石漢書郡守秦官掌治其郡秩二千石墨綬賈公彥周禮疏漢法丞相中二千石金印紫綬御史大夫二千石銀印黃綬縣令六百石銅印墨綬以撫方夏尚書誕膺天命以撫方夏孔安國傳以撫綏四方中夏令聞禮記三代之王也必先其令聞鄭康成注令善也往踐乃職左傳豫嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命獄貨非寶呂刑獄貨非寶惟府辜功報以庶尤孔安國傳受獄貨非家寶也泱漭西京賦山谷原隰泱漭無疆薛綜注泱漭無限域之貌操刀左傳子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛于子子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不已多乎學古入官周官學古入官議事以制孔安國傳言當先學古訓然後入官治政唱豫和汝鄭風叔兮伯兮唱豫和汝送衡嶽瑗公南歸詩序衡嶽瑗上人者常學道于五峰蔭松棲雲與狼虎雜處得無所得矣天寶癸已歲始遊于長安手提瓶笠至自萬里宴居吐論緇屬高之初給事中房公謫居宜春與上人風土相接因為道友伏臘往來房公既海內盛名上人亦以此增價秋九月杖錫南返扣門來别秦地草木摵然已黃蒼梧白雲不日而見滇陽有曹溪學者為我謝之五峰方輿勝覽衡山七十二峯最大者五祝融紫蓋雲密石廩天柱而祝融為最高得無所得涅槃經以自在故得一切法如來之心亦無得想何以故無所得故若是有者可名為得實無所有云何名得若使如來計有得想是則諸佛不得涅槃以無得故名得涅槃以自在故得一切法得諸法故名為大我華嚴經于一切法得無所得瓶笠釋氏要覽淨瓶梵語軍遲此云瓶常貯水隨身用以淨手寄歸傳云軍持有二若瓷瓦者是淨用若銅鐵者是觸用蓋律有二種一竹蓋二葉蓋寄歸傳云西域僧有持竹蓋或持傘者梁高僧慧韶遇有請則自攜杖笠也今僧戴竹笠棕笠乃竹蓋葉蓋之遺製但去柄耳今又加油絹于上即唐馬周製在席帽以禦雨故效之也房公劉昫唐書房琯傳天寶五載擢試給事中賜爵漳南縣男坐與李適之韋堅等善貶宜春太守宜春唐書地理志江南西道有袁州宜春郡伏臘史記秦本紀德公二年初伏正義曰六月三伏之節起秦德公為之故云初伏伏者隱伏避盛暑也厯忌釋云伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至于立秋以金代火火畏于金故至庚日必伏庚者金故也説文臘冬至後三戌臘祭百神也左傳虞不臘矣杜預注臘歲終祭衆神之名孔穎達正義曰月令孟冬臘門閭及先祖五祀臘之見于傳記者唯月令與此二文而已秦本紀惠王十二年初臘始皇三十一年更改臘曰嘉平蔡雍獨斷云臘者歲終大祭縱吏民宴飲非迎氣故但送不迎應劭風俗通云案禮夏曰嘉平殷曰清祀周曰大蠟漢改為臘臘者獵也田獵取獸祭先祖也此言虞不臘矣明當時有臘祭周時臘與大蠟各為一祭言漢改曰臘不蠟而為臘矣摵潘嶽秋興賦庭樹摵以灑落兮李善注摵枝空之貌李延濟注摵葉落貌盧諶詩摵摵芳葉零李善注摵凋柯貌蒼梧白雲藝文類聚歸藏曰有白雲出自蒼梧入于大梁滇陽滇陽疑是湞陽太平寰宇記英州湞陽縣本漢舊縣屬桂陽郡隋為真陽縣五年屬洭州唐貞觀初州廢改真陽為湞陽屬廣州以湞山為名音貞曹溪學者六祖駐錫曹溪説法利人學徒甚衆所謂曹溪學者是其門人也曹溪舊志曹溪故為曹侯村乃魏武帝玄孫曹叔良里也以一水自東繞山而曲故稱曹溪薦福寺光師房花藥詩序心舍于有無眼界于色空皆幻也離亦幻也至人者不捨幻而過于色空有無之際故目可塵也而心未始同心不世也而身未嘗物物方酌我于無垠之域亦已殆矣上人順陰陽之動與勞侶而作在雙樹之道場以衆花為佛事天上海外異卉竒藥齊諧未識伯益未知者地始載于兹人始聞于我瓊㽔滋蔓侵回階而欲上寶庭盡蕪當露井而不合羣艷耀日衆香同風開敷次第連九冬之月種類若干多四天所雨至用楊枝已開貝葉高閣聞鐘升堂覲佛右繞七匝卻坐一面則流芳忽起雜英亂飛焚香不俟于旃檀散花奚取于優鉢漆園傲吏著書以稊稗為言蓮座大仙説法開藥草之品道無不在物何足忘故歌之詠之者吾愈見其默也薦福寺長安志開化坊半以東隋煬帝在藩舊宅武德中賜尚書左僕射蕭瑀為園後瑀子鋭尚襄城公主詔别營主第主辭以姑婦異居有乖禮則因固陳請乃取園地充主第又辭公主棨戟不欲異門乃併施瑀之院門襄城薨後官市為英王宅文明元年高宗崩後百日立為大獻福寺度僧二百人以實之天授元年改為薦福寺中宗即位大加營飾自神龍以後翻譯佛經並于此寺寺東院有放生池周二百餘步傳云即漢代洪池陂也齊諧莊子齊諧者志怪者也伯益列子大禹行而見之伯益知而名之夷堅聞而志之山海經古序説禹乘四載隨山刋木定高山大川益與伯翳主驅禽獸命山川類草木别水土四嶽佐之以周四方逮人迹之所希至及舟輿之所罕到內别五方之山外分八方之海紀其珍寶竒物異方之所生水土草木禽獸昆蟲鱗鳯之所止禎祥之所隱及四海之外絶域之國殊類之人禹别九州任土作貢而益等類物善惡著山海經皆聖賢之遺事古文之著名者也瓊㽔陸機詩玉顔侔瓊㽔張銑注瓊㽔玉花也露井古樂府桃生露井上李樹生桃旁九冬張正見詩九冬飄逺雪六出表豐年四天釋書有四禪天謂初禪有三天二禪有三天三禪有三天四禪有九天合之為色界十八天又欲界十天中有四天王天沈約內典序包括四天卷舒萬劫楊枝西域記饌食既訖嚼楊枝而為淨七匝維摩詰經稽首佛足右繞七匝一心合掌在一面立法苑珠林經律之中制令右旋若左繞行為神所訶乃至右繞麥積為俗所責其徒衆矣今時行事者順于天時面西北轉右肩袒膊向佛而恭也或旋百匝十匝七匝三匝各有所表釋氏要覽繞佛又云旋繞此方稱行道西域記云西天隨所宗事禮後皆須旋繞蓋歸敬之至也惟佛法右繞法苑云順天行也若匝數則不定三匝表三業七匝表七支如經云百千匝無數匝但以為數表敬之極也卻坐一面涅槃經疾至佛所稽首佛足繞百千匝合掌恭敬卻坐一面雜英謝朓詩喧鳥覆春洲雜英滿芳甸旃檀香譜旃檀即白檀也優鉢翻譯名義優鉢羅此云青蓮花涅槃經云如優鉢羅花鉢頭摩花拘物頭花分陀利花生於淤泥而終不為淤泥所汙稊稗莊子東郭子問于莊子曰所謂道惡乎在莊子曰無所不在東郭子曰期而後可莊子曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶曰在瓦甓曰何其愈甚耶曰在屎溺蓮座華嚴經爾時世尊在摩竭提國阿蘭若法菩提場中始成正覺于普光明殿坐蓮花藏師子之座釋氏要覽蓮花座知度論問云諸牀可坐何必蓮花答諸牀為世間白衣坐法又蓮花濡淨柔脆欲現神力能坐其上令蓮不壞故又以莊嚴妙法坐故大仙釋氏要覽古譯經有稱佛名大仙者此與天仙不同般若燈論云聲聞菩薩等亦名仙佛于中最尊上故已登一切波羅密多功德善根彼岸故名大仙藥草品法華經有藥草喻品王右丞集箋注卷十九
