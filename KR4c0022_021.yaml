body:
  text: 王右丞集箋注卷二十一仁和趙殿成撰碑二首裴僕射濟州遺愛碑夫為政以德必世而後仁齊人以刑茍免而無恥則刑禁者難久百年安可勝殘德化者效遲三載如何考績刑以佐德猛以濟寬月期政成成而不朽者唯公能之月期當是期月之訛公名耀卿字渙之河東聞喜人也益為帝虞實相帝舜非子其胄而邑諸裴邑顧本作已誤今校正在漢者為水衡在魏者守代郡十三代祖徽魏益豫雍兖徐五州刺史蘭陵武公源于大賢派以俊德世濟其美不隕其名矣曽祖正隋散騎常侍長平郡贊理祖眘皇朝洛南南鄭二縣令著族斯茂衣冠未敢爭雄繼世皆賢英彥無出其右故有常侍縣君遞輝迭映父守真真顧本作忠誤今考唐書本傳校正太常博士判駕部夏官員外今上楚王府咨議參軍邠寧二州刺史贈晉兖沂三州刺史文儒之宗伯禮樂之本源藉業雖曰承家復始由乎種德再典大郡二為仙郎舉十大夫是則是斆且年不及夀而位未稱德朝多其能殁而獨贈公則晉州之第三子也語而能文有識便智為兒則量過黃髮未仕而心在蒼生伯達試經子琰應詔古之人也我不後之伯達顧本作伯建子琰顧本作子淡俱誤今校正八歲神童舉試毛詩尚書論語及第解褐補祕書省校書郎歷中宗安國相王府典籖中字疑誤東觀載筆班固名香西園賦詠劉楨氣逸轉國子主簿檢校詹事府丞學識宜在儒林風度雅膺儲寀儲顧本作諸誤今校正河南府士曹參軍考功員外郎公府屈廊廟之才曹無留事仙郎明黜陟之法野無遺賢右司兵部二郎中長安縣令其在含香一臺推妙以之製錦四海是儀公之斷獄也必原情以定罪不阿意以侮法是以小失天旨旨字顧本作二日誤今校正出為此州刺史公推善于國不稱無罪思利于人志其屈已戮豪右以懲惡一至無刑旌孝弟以勸善洪惟見德然後務材訓農通商惠工敬教勸學授方任能行之一年郡乃大理襁負而至何憂乎蕩析之人析顧本作相誤今校正路不拾遺何畏乎穿窬之盜既富之矣汲黯奚取于開倉使無訟乎仲由何施其折獄居無何詔封東嶽關東列郡頗當馳道至于犧牲玉帛資糧扉屨其或不供為有司所劾因而厚斂非天子之意豐省之度多不得中故二千石有不能受事于宰旅者矣季孫請魯視邾滕濤塗恐師出周鄭抑為是也公盡事君之心且曰從人之欲萬斯箱之粟兹乃如京百執事之人于我乎館四封之境二為帝庭一郡之賦再粒天下士卒林會馬牛谷量士顧本作十馬顧本作襄俱誤今校正皆投足獲安端拱取給無虞燥濕不畏冦盜草莽之中用能便其體羈紲之外無所勞其力天朝中貴持權用事厚為之禮則生我羽毛小不如意則成是貝錦公享有常牢覿無私幣冒貨賄者我以為仇淫芻蕘者吾所能禦至于急宣中旨暴征庶物或命嘉蔬先春當薦錫貢珍果非土所生舉是一隅其徒千計皆曽不旋踵若取諸懷又不知其備預之所以然也謂餼牽竭矣而家有餘糧謂疲勞甚矣而人有餘力豈非積年之儲用之有度終身之逸使之有時不然班貢藝事輕重以列我視子男之國而倍公侯之征今日之事我為上也大駕還都分遣中丞蔣欽緒御史劉日政宋珣等巡按皆嘉公之能奏課第一公未受賞朝而歸藩天災流行河水決溢蝗蟲避境雖馬稜之化能然稜顧本作援誤今校正洪水滔天固帝堯之時且爾高岸崒以雲斷平郊豁其地裂噴薄雷吼沖融天回百姓巢居主客有其家室五稼波殄沼毛荒于畎畝公急人之虞分帝之憂御衣假寐對案輟食不候駕而星邁不入門而雨行議隄防也至則平板幹具糇糧揆形略趾量功命日而赤岸成谷白濤亘山雖有呂梁之人盡下淇園之竹無能為也乃有壞防之餘衝波且盡僅在而危同纍卵將墜而間不容髮公暴露其上為人請命風伯屏氣以遷迹陽侯整波而退舍又王尊至誠未足加也然後下密揵搴長茭土簣雲積金鎚電散公親巡而撫之慰而勉之千夫畢飯始就飲食一人未息不歸蘧廬惰者發憤以躒勤懦者自強以齊壯成之不日金隄峩峩下截重泉上可方軌北河回其竹箭東郡鬱為桑田先是朝廷除公宣州刺史公惜九仞之垂成恐衆心之或怠懷絲綸之詔密金玉之音率負薪而益勤親執撲而彌勵既成乃發書示之皆捨畚攀轅廢歌成泣淚而濟袂澤陰魯郊哀哀號呼不崇朝而達四境噫公之視人也如子人之去公也如父宜其升聞于天司我五教公之富人也以簡簡則不擾而人得肆其業非富歟公之愛吏也以嚴嚴則畏威而吏不陷于罪非愛歟是其大旨也至若沛郡謂為神明淮陽謝其清淨尊經于學校魯風載儒加信于兒童齊人不詐明間視聽其察姦也無全曉習文法于決事乎何有六義之製文在于斯五車之事學半于我其為身計保乎忠貞將為孫謀貽以清白貽顧本作賜誤今校正熊軾之貴子弟夷于平人龍門則高賔客不遺下士非禮不動出言有章語曰愷悌君子民之父母其是之謂乎維也不才嘗備官屬公之行事豈不然乎維實知之維能言之况夫婦男女思我遺愛者吟詠成風耆艾人吏願頌清德者道路如市則王襄所講奚斯之頌美政盛德綴詞之士固未嘗闕如也維敢拒之哉頌曰童子何知兮公邁成人大不必佳兮公德日新天生德于公兮遺此下民天子命我兮守兹東郡人調公以謫去兮不能致訓公曽不私已兮政聲益振惟嵗十月兮帝封岱宗千乘萬騎兮行幸山東小郡之賦兮再粒萬邦豐不盈儉不陋兮公之舉也得中河為不道兮離常流以痡毒不用一牲兮不沈一玉身當中流兮馮夷感而避賢敕陽侯兮使却走夫洪漣板築既具兮薪又屬庶人欣以就役兮高岸崛起于深谷人降丘宅土兮桑田鬱以載緑行無五馬兮食不載味惠恤鰥寡兮威讋黠吏公之德兮曽無與二人思遺愛兮淚淫淫歲久不衰兮至今性與天道吾不得聞兮志其小者近者兮已是過人之德音裴僕射劉昫唐書裴耀卿贈户部尚書守真子也少聰敏數歲解屬文童子舉弱冠拜祕書正字俄補相王府典籖時睿宗在藩甚重之令與掾丘悅文學韋利器更直府中以備顧問府中稱為學直及睿宗升極拜國子主簿開元初纍遷長安令長安舊有配戶和市之法百姓苦之耀卿到官一切令出儲畜之家預給其直遂無姦僦之弊公私甚以為便在職二年寬猛得中及去官縣人甚思詠之十三年為濟州刺史其年車駕東巡州當大路道里綿長而户口寡弱耀卿躬自條理科配得所時大駕所歷凡十餘州耀卿稱為知頓之最又歷宣冀二州刺史皆有善政入為戶部侍郎二十年禮部尚書信安王褘受詔討契丹詔以耀卿為副其冬遷京兆尹明年拜黃門侍郎同中書門下平章事充轉運使明年遷侍中二十四年拜尚書左丞相罷知政事纍封趙城侯天寶元年改為尚書右僕射尋轉左僕射一歲薨年六十三贈太子太傅諡曰文獻宋祁唐書裴耀卿為濟州刺史俄徙宣州前此大水河防壞諸州不敢擅興役耀卿曰非至公也乃躬護作役未訖有詔徙官耀卿懼功不成弗即宣而撫巡飭厲愈急隄成發詔而去濟人為立碑頌德三載考績尚書三載考績孔安國傳三年有成故以考功猛以濟寬左傳政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和聞喜唐書地理志河東道絳州有聞喜縣裴氏世系按唐書宰相世系表裴氏出自風姓顓頊裔孫大業生女華女華生大費大費生臯陶臯陶生伯益賜姓嬴氏生大廉大廉五世孫曰仲衍仲衍四世孫曰軒軒生潏潏生飛廉飛廉生惡來惡來生女防女防生旁臯旁臯生太几太几生大輅大輅生非子周孝王使養馬汧渭之間以馬蕃息封之于秦為附庸使續嬴氏號曰秦嬴非子之支孫封􅘌鄉因以為氏今聞喜􅘌城是也六世孫陵當僖王之時封為解邑君乃去邑從衣為裴裴衣長貌一云晉平公封顓頊之孫針于周川之裴中號裴君疑不可辨陵裔孫蓋漢水衡都尉侍中九世孫燉煌太守遵自雲中從光武平隴蜀徙居河東安邑安順之際徙聞喜曽孫曄并州刺史度遼將軍子茂字巨光靈帝時歷郡守尚書率諸將討李傕有功封陽吉平侯生三子潛徽輯徽字文秀魏冀州刺史蘭陵武公四子黎康楷綽黎字伯宗名演遊擊將軍祕書監二子粹苞苞三子軫丕彬彬生嗣嗣西涼武都太守三子雍奣策雍度江居襄陽生順宗順宗三子叔寶叔業令寶叔業齊南兖州刺史初歸北號南來吳裴事後魏豫州刺史蘭陵郡公諡忠武子蒨之字文聽北齊隋王左常侍蒨之子談輔國將軍襲蘭陵敬公談子景富平令景子正隋散騎常侍正子眘字歸原南鄭酇令眘子守真字方忠邠寧二州刺史方忠第三子耀卿字渙之相玄宗帝虞漢書地理志秦之先曰伯益出自帝顓頊助禹治水為舜朕虞養育草木鳥獸賜姓嬴氏守代郡三國志裴潛字文行河東聞喜人也太祖定荆州以潛參丞相軍事出歷三縣令入為倉曹屬時代郡大亂以潛為代郡太守世濟其美不隕其名句出左傳詳見十八卷十六族注長平郡隋書地理志長平郡舊曰建州開皇初改為澤州贊理杜氏通典隋開皇三年改别駕治中為長史司馬至煬帝又罷長史司馬置贊治一人後又改郡贊治為丞位在通守下唐人以高宗諱治通以治為理故曰贊理洛南唐書地理志關內道商州有洛南縣南鄭唐書地理志山南道興元府有南鄭縣太常博士唐六典太常寺有博士四人從七品上駕部唐六典兵部有駕部員外郎一人從六品上夏官員外唐六典兵部有員外郎二人從六品上唐書光宅元年改兵部曰夏官楚王劉昫唐書玄宗本紀垂拱三年閏正月丁卯封楚王長夀二年臘月丁卯改封臨淄郡王咨議參軍唐書百官志王府官有咨議參軍事一人正五品下掌訏謀議事邠寧晉兖沂按唐書地理志邠州新平郡寧州彭源郡俱屬關內道晉州平陽郡屬河東道兖州魯郡沂州琅琊郡俱屬河南道承家周易師卦大君有命開國承家復始左傳公侯之子孫必復其始種德尚書臯陶邁種德德乃降孔安國傳種布也孔穎達正義種物必布于地故言種也是則是斆小雅君子是則是效毛萇傳是則是效言可法效也伯達魏書司馬朗字伯達河內溫人也十二試經為童子郎子琰後漢書黃琬字子琰早而辨慧祖父瓊為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊思其對而未知所况琬年七歲在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔而深竒愛之祕書省校書郎唐書百官志祕書省有校書郎十人正九品下安國相王劉昫唐書睿宗本紀神龍元年以誅張易之昆弟功進號安國相王遷太尉加實封典籤唐書百官志王府官有典籤二人從八品下掌宣傳書教班固隋書經籍志光武中興篤好文雅于東觀及仁夀閣集新書校書郎班固傅毅等典掌焉劉楨三國志文帝為五官將及平原侯植皆好文學王粲與北海徐幹字偉長廣陵陳琳字孔璋陳留阮瑀字元瑜汝南應瑒字德璉東平劉楨字公幹並見友善文帝書與元城令吳質曰公幹有逸氣但未遒耳國子主簿唐書百官志國子監有主簿一人從七品下詹事府丞唐書百官志詹事府有丞二人正六品上儲寀韋承慶重上東宫啓昔參朱邸忝膠東之藩史晚侍青宮叨望苑之儲寀河南府唐書地理志河南府河南郡本洛州開元元年為府士曹參軍唐書百官志外官有士曹司士參軍事掌津梁舟車舍宅工藝考功員外郎唐六典吏部有考功員外郎一人從六品上曹無留事南史梁始興忠武王憺為荆州刺史自以少年始居重任開導物情辭訟者皆立待符教決于俄頃曹無留事下無滯獄黜陟尚書黜陟幽明孔安國傳黜退其幽者升進其明者野無遺賢尚書野無遺賢萬邦咸寧右司郎中唐六典尚書都省有右司郎中一人從五品上兵部郎中唐六典兵部有郎中二人從五品上長安縣唐書地理志京兆府有長安縣一臺推妙晉書尚書令衛瓘學問深博明習文藝與尚書郎敦煌索靖俱善草書時人號為一臺二妙天旨晉書拜授之榮初非天旨務材訓農左傳衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能孔穎達正義曰務材務在植材用也訓農訓民勸農業也通商通商販之路合貨利往來也惠工加恩惠于百工賞其利器用也敬教敬民五教也勸學勸民學問也授方授民以事皆有方法也任能其所委任信用能人也襁負三國志涼茂為泰山太守旬月之間襁負而至者千餘家裴松之注博物記曰襁織縷為之廣八寸長尺二以約小兒于背上負之而行路不拾遺史記子産為相三年門不夜關道不拾遺後漢書宋登為潁川太守市無二價道不拾遺汲黯史記河內失火延燒千餘家上使汲黯往視之還報曰家人失火屋比延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪上賢而釋之封東嶽唐書玄宗本紀開元十三年十一月庚寅封于泰山馳道禮記馳道不除孔穎達正義馳道正道如今御路也是君馳走車馬之處故曰馳道也犧牲玉帛左傳犧牲玉帛待于二境資糧屝屨左傳若出于陳鄭之間共其資糧屝屨其可也杜預注屝草屨也孔穎達正義曰少儀云君將適他臣如致金玉貨貝于君則曰致馬資于有司鄭玄云資猶用也然則諸所費用之物皆為資也糧謂米粟行道之食也屝屨俱是在足之物善惡異名耳揚雄方言云屝粗屨也絲作之曰履麻作之曰屝粗者謂之屨喪服傳曰疏屨者藨蒯之菲也是菲用草為之也注云草屨者履屨通言耳相形以曉人也宰旅左傳晉韓宣子聘于周王使請事對曰晉士起將歸時事于宰旅無他事矣鄭康成注時事四時貢職宰旅冢宰之下士言獻職貢于宰旅不敢斥尊魯視邾滕左傳季武子使謂叔孫以公命曰視邾滕杜預注兩事晉楚則貢賦重故欲比小國師出周鄭左傳陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病若出于東方觀兵于東夷循海而歸其可也申侯曰善濤塗以告齊侯許之如京小雅曽孫之稼如茨如梁曽孫之庾如坻如京乃求千斯倉乃求萬斯箱毛萇傳京高丘也百執事商書邦百師長百執事之人尚皆隱哉孔穎達正義云百執事謂大夫以下諸有職事之官皆是也粒虞書蒸民乃粒孔安國傳米食曰粒林會詩大雅殷商之旅其會如林孔穎達正義殷商之兵衆其會聚之時如林木之盛也谷量漢書戎王十倍其償豫畜畜至用谷量牛馬師古注言其數饒不可算計故以山谷多少言之無虞燥濕左傳賔至如歸無寧災患不畏冦盜而亦不患燥濕羽毛西京賦所好生毛羽所惡成瘡痏張銑注言此辨士所好者譽之使生羽毛所惡者毁之令生瘡痏貝錦小雅萋兮斐兮成是貝錦彼譖人者亦已太甚毛萇傳貝錦錦文也鄭康成箋興者喻讒人集作已過以成子罪猶女工之集采色以成錦文冒貨賄左傳貪于飲食冒于貨賄杜預注冒亦貪也淫芻蕘左傳叔鮒求貨于衛淫芻蕘者孔穎達正義芻者飼牛馬之草也蕘者共燃火之草也中旨南史豫聞中旨罔不宣露暴征左傳逼介之關暴征其私旋踵史記議不反顧計不旋踵若取諸懷左傳所謂取諸其懷而與之者也餼牽竭矣左傳吾子淹久于敝邑惟是脯資餼牽竭矣注牲腥曰餼牲生曰牽班貢藝事左傳子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至于昏晉人許之仲尼謂子産于是行也足以為國基矣詩曰樂只君子邦家之基子産君子之求樂者也且曰合諸侯藝貢事禮也杜預注列位也藝法制也蔣欽緒唐書蔣欽緒傳開元十三年以御史中丞録河南囚宣慰百姓振窮乏天災流行左傳天災流行國家代有馬稜東觀漢記馬稜為廣陵太守郡連歲有蝗蟲穀價貴稜奏罷鹽官振貧羸薄賦稅蝗蟲飛入海化為魚蝦洪水滔天書益稷謨洪水滔天浩浩懷山襄陵沖融木華海賦浺瀜沆漾李善注浺瀜沆漾深廣之貌五稼杜預左傳注平地出水漂殺熟麥及五稼之苗孔穎達正義種之曰稼斂之曰穡月令五時食穀黍稷麻麥豆周禮謂之五穀故云五稼之苗晉書傅咸傳五稼頗收僅足相接星邁魏明帝善哉行兼塗星邁亮兹行阻平板幹具糇糧左傳令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板幹稱畚築程土物議逺邇略基趾具糇糧度有司事三旬而成不愆于素杜預注幹楨也略行也趾城足也糇乾食也孔穎達正義曰釋詁云楨幹楨也舍人曰楨正也築牆所立兩木也幹所以當牆兩邊鄣土者也彼楨為幹故謂幹為楨謂牆之兩頭立木也板在兩旁即鄣土者即彼丈幹也平板幹者等其高下使城齊也呂梁之人莊子孔子觀于呂梁縣水三十仞流沫四十里黿鼉魚鱉之所不能遊也見一丈夫遊之以為有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而遊于塘下孔子從而問焉曰吾以子為鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齎俱入與汨偕出從水之道而不為私焉此吾所以道之也淇園之竹漢書上乃使汲仁郭昌發卒數萬人塞瓠子決河于是上以用事萬里沙則還自臨決河湛白馬玉璧令羣臣從官自將軍以下皆負薪置決河是時東郡燒草以故薪柴少而下淇園之竹以為揵纍卵漢書危于纍卵難于上天間不容髮漢書其出不出間不容髮為人請命裴松之三國志注為民請命則活萬國為世撥亂則致升平風伯龍魚河圖天太白星主兵凶其精下為雨師之神天熒惑星主司非其精下為風伯之神風俗通飛廉風伯也元冥雨師也搜神記風伯者箕星也雨師者畢星也陽侯應劭漢書注陽侯古之諸侯也有罪自投江其神能為大波王尊漢書王尊遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大決為害尊躬率吏民投沈白馬祀水神河伯尊親執圭璧使巫䇿祝請以身填金隄因止宿廬居隄上吏民數千萬人爭叩頭救止尊尊終不肯去及水盛隄壞吏民皆奔走惟一主簿泣在尊旁立不動而水波稍卻回還吏民嘉壯尊之勇節下密揵如淳漢書注樹竹塞水決之口稍稍布插按樹之水稍弱補令密謂之揵以草塞其中乃以土填之有石以石為之搴長茭漢書溝洫志搴長茭兮湛美玉河公許兮薪不屬臣瓚曰竹葦絙謂之茭也所以引置土石也師古曰搴拔也絙索也湛美玉者以祭河也茭字宜從竹搴音騫茭音交土簣玉篇簣土籠也蘧廬郭象莊子注蘧廬猶傳舍也成之不日大雅庶民攻之不日成之重泉淮南子川谷通原積水重泉黿鼉之所便也方軌漢書車不得方軌師古注方軌謂併行也竹箭慎子西河下龍門其流敵于竹箭九仞周書為山九仞功虧一簣孔安國傳八尺曰仞執撲左傳子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役杜預注撲杖也攀轅北史宋世良拜清河太守及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非惟善政清亦徹底今失賢者人何以濟莫不攀轅涕泣崇朝國風崇朝其雨毛萇傳崇終也從旦至食時為終朝升聞尚書玄德升聞乃命以位五教尚書汝作司徒敬敷五教左傳舜舉八元使布五教于四方父義母慈兄友弟恭子孝孔穎達正義曰一家之內父母兄弟子尊卑有五品父不義母不慈兄不友弟不恭子不孝是五品不遜順也故使契為司徒布五教于四方教父以義教母以慈教兄以友教弟以恭教子以孝是之謂五教淮陽史記汲黯遷為東海太守黯學黃老之言治官理民好清靜擇丞史而任之其治責大指而已不苛小黯多病臥閨閣內不出歲餘東海大治稱之後為淮陽太守黯居郡如故治淮陽政清加信兒童後漢書郭伋為并州牧始至行部到西河美稷有童兒數百各騎竹馬道次迎拜伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之行部既還先期一日伋為違信于諸兒遂止于野亭須期乃入齊人漢書齊人多詐而無情明間北史薛琡久在省闥明間簿領曉習文法漢書尹翁歸為獄小吏曉習文法六義子夏詩序故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌忠貞左傳臣竭其股肱之力加之以忠貞孫謀詩大雅詒厥孫謀以燕翼子清白後漢書楊震性公廉不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎出言有章詩小雅其容不改出言有章王襄漢書益州刺史王襄欲宣風化于衆庶聞王褒有俊材請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時何武為僮子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之奚斯班固兩都賦故臯陶歌虞奚斯頌魯李善注詩魯頌曰新廟奕奕奚斯所作薛君曰奚斯魯公子也言其新廟奕奕然盛是詩公子奚斯所作也綴詞潘嶽馬汧督誄綴詞之士未之或遺也童子何知國語范文子暮退于朝武子曰何暮也對曰有秦客庾辭于朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人于朝大不必佳世説孔文舉年十歲隨父到洛時李元禮有盛名為司𨽻校尉詣門者皆雋才清稱及中表親戚乃通文舉至門謂吏曰我是李府君親既通前坐元禮問曰君與僕有何親對曰昔先君仲尼與君先人伯陽有師資之尊是僕與君奕世為通好也元禮及賔客莫不竒之大中大夫陳韙後至人以其語語之韙曰小時了了大未必佳文舉曰想君小時必當了了韙大踧踖岱宗初學記太山五經通義云一曰岱宗言王者受命易姓報功告成必于岱宗也東方萬物始交代之處宗長也言為羣嶽之長千乘萬騎蔡雍獨斷天子大駕則公卿奉引大將軍參乘太僕御屬車八十一乘備千乘萬騎痡孔安國尚書傳痡病也沈玉見淇園竹注中馮夷山海經從極之淵深三百仞維冰夷恆都焉冰夷人面乘兩龍郭璞注冰夷馮夷也淮南云馮夷得道以潛大川即河伯也穆天子傳所謂河伯無夷者竹書作馮夷事或作冰也博物志馮夷華陰潼鄉人也得仙道化為河伯李善文選注書傳曰河伯華陰潼鄉人也姓馮氏名夷浴于河中而溺死是為河伯太公金匱曰河伯姓馮名修裴氏新語謂為馮夷淮南子曰馮夷服夷石而水仙注曰馮夷河伯也華隂潼鄉隄首人服夷石而水仙俾使也史記正義姓馮名夷以庚日溺死河常以庚日好溺死人洪漣木華海賦吸波則洪漣踧踖吹潦則百川倒流降丘宅土禹貢桑土既蠶是降丘宅土孔安國傳地高曰丘大水去民下丘居平土就桑蠶威讋梁書武帝紀功業克建威讋四海淚淫淫楚辭望長楸而太息兮涕淫淫其若霰王逸注淫淫流貌也德音詩豳風公孫碩膚德音不瑕京兆尹張公德政碑雲從龍風從虎氣應也聖人作賢人輔德同也君臣同德天地通氣以康九有以遂萬類惟皇御極二十載光格四表至于海隅日出越小大邦蠻貊師長罔不欽于成憲以承天休然天子猶日省三揖列辟揖唐文粹作接日聽萬方輿頌懼人有未化賢有未登故敡仄陋兼乎十等故顧本作明今改從唐文粹本選宗室及乎九族任事以觀材積時以觀行乃得我賢京兆焉夫京兆號為難理清淨病于不給刀筆拘于守文或以軟弱廢或以賊殺劾把宿負淺為丈夫用鉤距蓋非長者我則異于是大道難名大理無法閉關于任數巧算不能知堅壁于畫一善政不能下摧宿豪如剃草無愠色視大權如歷塊無傲容百司之務總以竒而得正唐文粹作百司之吏總一德以咸服五方之人雜異教而同理受命之始先聲已振黠吏惡少聞風改行改唐文粹作族及乎鳴騶詣府登堂坐定縣尹掾史以次上謁守正之人其氣高含章之人其詞大見容色而聞號令小人戚而君子泰戚唐文粹作感日者櫟陽男子閭里為豪借客報仇聚人為盜或白日手刃或黃塵袖鎚政寬則以身先諸偷操急則以事中長吏二過不已萬計自脫公命吏縛之立死鈴下鈴顧本作領今改從唐文粹本于是人入暗室若遇大賔焉前年不登人悴太甚野無遺秉秉唐文粹作粳路有委骨天子不忍征于不粒賦于無衣六軍從衛以臨東諸侯息關中也帝曰咨天之降威之唐文粹作其人罔畏罪台恐冦盜乃邑矧曰蕩析離居惟爾克濟撫兹方夏方夏唐文粹作西土公拜稽首思塞休命布慈惠之政不以利淫振雷霆之威其或宥過饔人減雙雞之膳圉人省五馬之秣陶不獻服圬不塓館自身已往振廩同食雖人煙不動道殣相望不思濫以茍生咸守教以就死是不可能也先是王公或專南山之利司農涸昆明之池收赤岸澤將為田以便官至是悉奏罷之舟鮫衡麓之守廢鮫唐文粹作漁誤蒲荷薪蒸之産入自郊徂邑室有魚飱斬隂伐陽市多山木人得以贍惟涇有防比歲多決近縣疲于力役他山匱于度材公命刮朽壤填巨石辦大木去編菅其始告勞乃終有慶匠石日減功萬藏史日省錢億農始竟耒竟唐文粹作學女始安織于是台背黃髮之老唐文粹作鮐背黃髮之耆曰我有田疇鍾秉其畝我有子弟顔閔其行鄉黨以睦惸失其獨道路有禮汰無與爭顧元緯本作鄉黨以睦恂子失其獨道路有禮祀汰無與爭今改從唐文粹本酒先養老賄不問吏既無吠犬犬唐文粹作狗亦無姦人臨年餘資幸蒙惠化幸唐文粹作竊其曷以臻兹君子曰此天子至公內舉不避親錫汝明君君唐文粹作尹張公之力也夫公于國為外戚于帝為外弟重組纍印珥香貂者七葉奉車駙馬乘朱輪者十人勝衣則綺襦紈袴通籍則玉墀青瑣動則兩驂如舞坐則五鼎成列文軒楚製素女趙舞而公儼兮其若客淡兮其無味客舊本皆作容今校正心在四教語稱七德目視六籍口誦九歌懷君子令德之忠保詩人錫類之孝悌有過于共被慈有踰于含食惡衣以居公服不敢降也屈體下士王綱不敢替也協二姓之好以正人倫旁無嬖御分一人之憂以審官政下多英傑若夫皇帝敬問之詔御札自書天王命賜之衣上宮所製勞勤則中使接武計議則走馬來朝豈惟衆臣重其經術為吏雜以儒雅而已且公之升聞于天唐文粹于之字下多一德字非一朝一夕之漸也亦所以稱職于纍官著聲于所在其丞祕書也闕文遺簡多在大家深為子孫之藏密有緘縢之固公不憚權貴或抵或誘盡歸天閣盡一本作畫非官書備焉其牧郢也郢字下唐文粹多一人字人有不若德戮之不為暴人有不保居撫之不為諂存者考其事壯其食以畜之行者緝其宮藝其樹以待之此邦之人既優他邦之人又重焉重唐文粹作至未盈一歲遂增萬户其守汾也仍歲大旱郡祠介推雖屢舞仙仙仙仙舊作仙仙非而靈應未若公命束藴請火伐樹置薪釀酒而祝曰有功于人祀為明神無德而祿禍亦覆餗自絳以來人實祀子純犧大璧不敢愛必以薦也童兒季女不敢黷必以敬也神既靡答人將安仰若亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天鑠地靈衣且為煨燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周于闔境不入他郡雖封疆咫尺而彼竭我盈嘻若記能事載盛德渭川之竹不足簡終南之木不足軸夫訓人至于禮義曰德安人免于阽危曰功德者上賞于上下頌于下長老孜孜願刋于石以豫學于舊史來即我謀且維與人編户與人為伍與人出入與人言語知風俗之淳弊識政化之源本屬詞愧文書事蓋實詞曰五代相韓七葉侍漢及我聖朝亦生邦翰大道無形貞蠱以幹含章不耀在割能斷情偽萬端吾道一貫帝選賢尹無以易張金印紫綬京兆之良良唐文粹作章佩我鳴玉冠我兩梁天子休命拜手以將寬而愛人立滅暴強明明天子哀此南畝將息西人遂覲東后我教我訓我鎮我守茫茫三秦則罔糊口守死以義徇生不茍王曰外弟視人不佻何以寵之手書以詔何以問之賜衣而朝俾人華胥致君帝堯刻石作頌永世彌昭京兆尹唐六典京兆尹從三品九有商頌方命厥后奄有九有毛萇傳九有九州也萬類張華詩洪鈞陶萬類大塊稟羣生李周翰注萬類萬物也四表虞書光被四表格于上下孔安國傳格至也海隅日出周書海隅出日罔不率俾越小大邦周書越小大邦用喪師長商書邦伯師長孔安國傳云衆長公卿也孔穎達正義云師訓為衆衆長衆官之長故為三公六卿也與蠻貊字不相貫右丞蓋借作君長字用矣以承天休商書各守爾典以承天休孔安國傳守其常法承天美道三揖周禮土揖庶姓時揖異姓天揖同姓鄭康成注土揖推手小下之也時揖平推手也天揖推手小舉之列辟司馬相如封禪文歷選列辟以迄于秦李善注辟君也班固典引德臣列辟功君百王李周翰注列辟百官也輿頌晉語輿人誦之曰佞之見佞果喪其田韋昭注輿衆也不歌曰誦敡側陋虞書明明揚側陋孔安國傳明舉明人在側陋者廣求賢也孔穎達正義汝當明白舉其明德之人于辟隱鄙陋之處何必在位之人乃舉之也往時文人有訾明揚側陋四字為割截書語用者是從蔡沈注而未逺稽夫二孔之釋耳十等左傳天有十日人有十等故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺孔穎達正義云公者五等諸侯之總名公言公正無私也大夫者夫之言扶也大能扶成人也士者事也言能理庶事也服虔云皂造也造成事也輿衆也佐皂舉衆事也𨽻𨽻屬于吏也僚勞也共勞事也僕僕豎主藏者也臺給臺下微名也把宿負漢書張敞守京兆尹自趙廣漢誅後比更守尹如黃霸等數人皆不稱職京師􅐛廢長安市偷盜尤多百賈苦之敞既視事求問長安父老偷盜酋長數人居皆溫厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盜天子嘉之師古曰把執持也淺為丈夫左傳宣子出曰吾淺之為丈夫也鉤距漢書趙廣漢為京兆尹尤善為鉤距以得事情鉤距者設欲知馬賈則先問狗已問羊又問牛然後及馬參伍其賈以類相準則知馬之貴賤不失實矣唯廣漢至精能行之他人效者莫能及也晉灼注鉤致也距閉也使對者無疑若不問而自知衆莫覺所由以閉其術為距也任數韓非子夫治法之至明者任數不任人是以有術之國不用譽而得人之情境內必治任數也亡國使兵公行乎其地而弗能圉禁者任人而無數也淮南子體道者逸而不窮任數者勞而無功畫一漢書百姓歌之曰蕭何為法講若畫一曹參代之守而弗失載其清靖民以寧一師古曰畫一言整齊也宿豪漢書長安宿豪大猾東市賈萭城西萭章箭張禁酒趙放杜陵楊章等皆通邪結黨挾養姦軌剃説文剃除草也他計切歷塊聖主得賢臣頌過都越國蹶如歷塊先聲史記兵固有先聲而後實者族行左傳宫之竒以其族行掾六書故掾乃屬官通稱上謁漢書雋不疑傳盛服至門上謁師古注上謁若今之通名也含章周易含章可貞孔穎達正義內含章美之道櫟陽元和郡縣志京兆府有櫟陽縣借客報仇漢書朱雲少時通輕俠借客報仇師古注借助也鈴下晉書輿服志鈴下二人執馬鞭暗室南史何子平幼持操檢敦厲名行雖處暗室如接大賔不登劉昫唐書本紀開元二十一年關中久雨害稼京師飢詔出太倉米二百萬石給之二十二年春正月已已幸東都遺秉小雅彼有遺秉此有滯穗毛萇傳云秉把也委骨鮑照蕪城賦埋魂幽石委骨窮塵李善注委猶積也不粒北史高允雖蒙寵待而家貧布衣妻子不粒東諸侯左傳郤犨將新軍且為公族大夫以主東諸侯杜預注主齊魯之屬降威周書天降威知我國有疵台恐爾雅台我也商書以台正于四方台恐德勿類蕩析離居商書今我民用蕩析離居罔有定極孔穎達正義播蕩分析離其居宅宥過尚書宥過無大刑故無小雙雞左傳公膳日雙雞饔人竊更之以鶩杜預注卿大夫之膳食圉人鄭康成周禮注圉人掌養馬者省秣毛萇詩傳歲凶年穀不登則趣馬不秣陶不獻服杜預左傳注復陶主衣服之官塓館左傳圬人以時塓館宮室杜預注圬人塗者塓塗也孔穎達正義曰釋宮云鏝謂之杇李巡曰鏝一名杇塗工作具也郭璞云泥鏝也然則圬是塗之所用因謂泥牆屋之人為圬人振廩同食左傳自廬以往振廩同食杜預注振發也廩倉也同食上下無異饌也道殣左傳道殣相望而女富溢尤杜預注餓死為殣國語四境盈壘道殣相望韋昭注道冢曰殣舟鮫衡麓蒲荷薪蒸左傳山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之杜預注衡鹿舟鮫虞候祈望皆官名也孔穎達正義曰周禮司徒之屬有林衡之官掌巡林麓之禁鄭玄云衡平也平林麓之大小及所生者竹木生平地曰林山足曰麓此置衡鹿之官守山林之木是其宜也舟是行水之器鮫是大魚之名澤中有水有魚故以舟鮫為官名也魚飱公羊傳俯而窺其户方食魚飱斬隂伐陽周禮仲冬斬陽木仲夏斬隂木鄭康成注鄭司農云陽木春夏生者隂木秋冬生者玄謂陽木生山南者隂木生山北者涇防元和郡縣志涇水在京兆府雲陽縣西南二十五里初鄭國分涇水置鄭渠後倪寬又穿六輔渠今此縣與三原界六道小渠猶有存者謹按秦始皇元年韓聞秦好興事欲疲之乃使水工鄭國間説令鑿涇水自仲山西瓠口為渠東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利秦以為然卒使就渠既成溉澤鹵之地四萬頃畝皆一鍾關中無凶年命為鄭國渠後至漢武帝元鼎六年一百三十六歲倪寬為左內史又奏請穿六輔渠以益溉鄭渠旁高卬之田後十六歲趙中大夫白公又奏穿涇水注渭中溉田四千餘頃人得其饒而歌之他山詩小雅他山之石可以為錯編菅左傳或取一編菅焉或取一秉秆焉杜預注編菅苫也乃終有慶借用周易坤卦句匠石莊子匠石之齊至乎曲轅台背黃髮魯頌黃髮台背夀胥與試鄭康成箋黃髮台背皆夀徴也台之言鮐也大老則背有鮐文鍾秉杜預左傳注六斛四斗曰鍾何晏論語集解十六斛曰秉酒先養老家語酒者所以養老所以養病也吠犬後漢書劉寵拜會稽太守簡除煩苛禁察非法郡中大化徴為將作大匠山隂縣有五六老叟龎眉皓髮自若邪山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守持吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之惠化三國志盧育遷安平廣平太守所在有惠化內舉不避親韓非子聖王明君內舉不避親外舉不避讎奉車駙馬唐書百官志奉車都尉掌馭副車有其名而無其人大陳設則他官攝駙馬都尉無定員與奉車都尉皆從五品下朱輪漢書楊惲傳惲家方隆盛時乘朱輪者十人綺襦紈袴漢書敘傳在于綺襦紈袴之間非其好也晉灼曰白綺之襦冰紈之袴也師古曰紈素也綺今細綾也並貴戚子弟之服通籍漢書霍光夫人顯及諸女皆通籍長信宮師古注通籍謂禁門之中皆有名籍恣出入也兩驂如舞詩鄭風執轡如組兩驂如舞孔穎達正義其兩驂馬與兩服馬和諧如人舞者之中于樂節也文軒後漢書崔駰傳文軒丹轂顯于新世素女史記太帝使素女鼓五十弦瑟悲帝禁不止故破其瑟為二十五弦此借用其字作美女稱儼兮其若客道德經古之善為士者微妙玄通深不可識夫唯不可識故強為之容與兮若冬涉川猶兮若畏四鄰儼兮其若客河上公注如客畏主人儼然無所造作也淡兮其無味道德經道之出口淡乎其無味四教禮記樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書六籍班固東都賦六籍所不能談李善注六籍六經也令德左傳忠為令德錫類詩孝子不匱永錫爾類鄭康成箋孝子之行非有竭極之時長以與汝之族類謂廣之以教導天下也含食世説新語郗公值永嘉喪亂在鄉里甚窮餒鄉人以公名德傳共飴之公常攜兄子邁及外甥周翼二小兒往食鄉人曰各自飢困以君之賢欲共濟君耳恐不能兼有所存公于是獨往食輒含飯著兩頰邊還吐與二兒後並得存同過江郗公亡翼為剡縣解職歸席苫于公靈牀頭心喪終三年敬問晉書成帝幼沖見王導每拜常與導書手詔則云惶恐言中書作詔則曰敬問于是以為定制天王蔡雍獨斷天王諸夏之所稱天下之所歸往故稱天王接武武迹也借用禮記堂上接武字衆臣重其經術漢書始元五年有一男子乘黃犢車建黃旐衣黃襜䄖著黃冒詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹雋不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患于衛太子昔蒯瞶違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明于大誼繇是名聲重于朝廷在位者皆自以不及也雜以儒雅漢書張敞治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰祕書丞唐書百官志祕書省丞一人從五品上緘縢莊子攝緘縢固扄鐍郢唐書地理志山南東道有郢州富水郡若德若順也周書𢎞于天若德保居尚書生民保厥居汾唐書地理志河東道有汾州西河郡介推祠太平寰宇記汾州介休縣有介山一名橫嶺地名綿上左傳晉侯賞從亡者介之推不言祿祿亦弗及遂與母偕隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人杜注西河介休縣南有地名綿上此山即綿上田之故地漢以為縣郡國志云介山上有子推冢并祠存屢舞仙仙詩小雅舍其坐遷屢舞仙仙孔穎達正義仙仙舞貌也束緼請火漢書蒯通傳即束緼請火于亡肉家師古注緼亂麻音于粉反覆餗周易鼎折足覆公餗其形渥凶孔穎達正義餗糝也八珍之膳鼎之實也純犧高唐賦進純犧禱琁室孔安國尚書傳色純曰犧大璧左傳卑余而大璧亭午初學記纂要云日在午曰亭午孫綽遊天台山賦羲和亭午遊氣高褰劉良注亭至也鷺羽詩陳風無冬無夏值其鷺羽毛萇傳鷺鳥之羽可以為翳鄭康成箋翳舞者所持以指麾騂毛左傳王賴之而賜之騂旄之盟杜預注騂旄赤牛也孔穎達正義周禮牧人陽祀用騂牲檀弓云周人尚赤牲用騂尚書洛誥云文王騂牛一武王騂牛一諸言騂皆是赤牛則知此騂旄是赤牛也旄謂尾也共旌旗之用故其字從旌旗者旌旗行而從風偃也靈衣楚辭九歌靈衣兮披披玉佩兮陸離來即我謀詩衛風匪來貿絲來即我謀鄭康成箋即就也編户漢書諸將故與帝為編户民師古注編户言列次民籍也五代相韓史記留侯張良者其先韓人也大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王悼惠王二十三年平卒卒二十歲秦滅韓良年少未宦事韓韓破良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以大父父五世相韓故七葉侍漢左太沖詩金張藉舊業七葉珥漢貂李善注班固漢書金日磾贊曰七葉內侍何其盛也七葉自武至平也又張湯傳贊曰張氏之子孫相繼自宣元以來為侍中中常侍者凡十餘人功臣之後惟有金氏張氏親近貴寵比于外戚邦翰詩大雅大邦維屏大宗維翰毛萇傳翰幹也邦翰者互文借用為邦家楨幹之臣也大道無形淮南子大道無形大仁無親大辨無聲大廉不嗛大勇不矜貞蠱以幹周易蠱卦初六幹父之蠱有子考無咎厲終吉九二幹母之蠱不可貞在割能斷晉書袁宏為東征賦賦末列稱過江諸名德不及陶侃侃子胡奴嘗于曲室抽刃問宏曰家公勳迹如此君賦云何相忽宏窘急答曰我已盛稱尊公何乃言無因曰精金百汰在割能斷功以濟時職思靜亂長沙之勳為史所贊胡奴乃止兩梁杜氏通典漢武帝太初元年更名右扶風與左馮翊京兆尹是為三輔治長安城中銀章青綬進賢兩梁冠絳朝服佩水蒼玉天子休命尚書敢對揚天子之休命明明天子漢書韋玄成傳明明天子俊德烈烈覲東后尚書歲二月東巡狩至于岱宗柴望秩于山川肆覲東后孔安國傳遂見東方之國君三秦三輔黃圖項籍滅秦分其地為三以章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都高奴謂之三秦視人不佻詩小雅我有嘉賔德音孔昭視民不恌君子是則是效毛萇傳恌愈也是則是效言可法效也鄭康成箋視古示字也可以示天下之民使之不愈于禮義是乃君子所法效言其賢也問之詩鄭風雜佩以問之毛萇傳云問遺也王右丞集箋注卷二十一
