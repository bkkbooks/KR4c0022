body:
  text: 王右丞集箋注巻二十二仁和趙殿成撰碑一首魏郡太守河北採訪處置使上黨苗公德政碑一本北字下多一道字五方殊俗魏風婉而其人舒九土異宜冀田壤而其賦錯前政有寛猛之異時令有班藝之差夫非酌舊典于可行啟新圖于必當多方而不失正一貫而或從權曲成更人大抵厚俗選衆而舉非公而誰公先自吏部侍郎出為安康郡太守某載月日詔以公為魏郡太守河北道採訪處置使公諱某字郡縣人也其出處本末奕世冠冕國史家牒詳焉凡邦伯到官詔使按部或閉閤思政或下車作威或劾吏為明或移書示禁公異于是可略而言公素號鮮明積有治行宿訟不決之務餘地割分疑獄自誣之枉容光立照故陋其思政也安全長吏不逐老丞成就諸生光教小吏吏顧本作史今考漢書校正導德齊禮有恥且格故鄙其作威也謝亭長之問勞野次之賢吏悉謂為神明人不隠其毫髪故無事劾吏也列郡共職清節銷其過求諸曹報簿直筆破其汚詆故不待移書也山東古之七雄河北有其四國地方數千里人葢億萬計獻子三歎之饋滋無舊德平原十日之飲顧有遺風朱亥袖鎚豪雄扼腕曹王拂局輕薄為心奢泰擬都䕶之堂遲緩學邯鄲之步公抑末技而敦本斥浮食以歸業督課八政擇良吏以遣行講求六籍置學官于便坐于是橫經左塾力穡先疇盡業農桑大興庠序家知禮義更式段子之廬户有京坻增修史起之貌叢臺歌舞成市鄴郡帝王舊都袨服靚妝挾筑跕屣淇上留客河間數錢公課其組紝之庸開其婚嫁之節冶容絶四方之袖織室致五匹之工刑于上官訓及處子鄭聲衛樂共棄師襄趙帶燕裾思齊漆室漁陽騎客奏報本朝鯷海樓船連漕絶域郊迎館給不敢淫其芻蕘水路陸衢盡若安于枕席某載月日詔賜紫袍玉帶金魚袋衣若干副方伯十聫賴其澄清之轡天子七命賜以安吉之衣緹油屏車璽書增秩未是過也勝殘之化既成觀俗之風允穆優游無事學宦思歸況乎父母之邦近在嬰兒之國表請拜掃有詔許焉預約守宰幸無偵候至郡則投刺上謁至邑則舍車而徒展禮先塋椎心泣血迴趨長老稽顙緒言宗人族姻姑黨姪行覿以重幣筐篚徧于里閭享有加牢牛酒溢于衢陌朱軒駟馬耀于衡門紫綬雙龜出入編户蘇公佩印始歸鄉里盡歡疏傅散金不與子孫為計迨乎將去仍以餘資一里置社備養生送死之具一鄉置校開閲禮敦詩之本相如衣錦且飛大漢檄書買臣懷紱不德長安廏吏故使巴蜀太守負弩前驅會稽守丞引章下拜此葢恨不禮于他日思釋憾于故鄉是輕桑梓之人適騁斗筲之志豈若公自心而至率禮無違來悦去思推才降體平陽傳舍不許望塵山隂吏卒詎聞治道富貴還鄉榮之至也揚名顯親孝之終也凡百君子無一至焉公當九伯之官兼八使之任深總之體不求于無虞闕于草竊政成德舉風動神行頃有勲臣旁典屬郡曩者風雲際㑹攀附騰驤貪天之功以為已力謂國不忘尚嘉乃勲宋父宣驕條侯倨貴當闗常從横恣不法帷帳狗馬僭侈踰制公劾之則重傷國恩置之則大廢邦典于是喻以禍福告之話言昔有不愛趙城將蹈滄海既尊漢室願遂赤松功成不居道家所韙至于析珪分組跨壤連州懷四術而自疑見九重而失望或寃家上變司敗受辭朝享膏梁寧知獄吏暮成葅醢遍賜諸侯難恃白馬之盟徒思黃犬之樂彫墻峻宇萬乗而蹈五刑紫衣狐裘一朝而數三罪雖嫌絳灌等列不踰梁楚為墟于是翕肩振驚折節度教杜門謝絶賓客終身不紊紀綱以寛服人實在有德厥有挾左道飛訛言南國青珠之符東海赤刀之術分風送客割水飲人偽辯而納之于邪善誘而濟之以惡户外多保汝之屨恐為亂階階舊作堦非門前無長者之車知其惑衆公奉誅首惡悉宥面從丕蔽要囚惟良折獄良顧本作長誤議事以制不徵于書副至仁之納隍用輕典于平國刑期不濫人乃大安奏課計功天下小察責吏以實則舉其不矜欲人自新則貰其宿負官以德舉政以禮成至于賞善勸能正源端本齊風變魯葢以悉禮名儒晉盜奔秦豈俟多誅惡少納貢獻賦則惟恐居後疇庸命賞則義不敢先布以聖恩奉宣明主之詔問其理狀對用議曹之言邦家之光其斯謂矣年若干秀才擢第應制舉第若干等授某官厯某官若夫明眸白晳玉潤珠耀美秀備于儀形風流發于言笑行之方也留如守司智之圓也速若發括量包羣有思入無間壤壁古文曲臺遺禮淮王九師之易漢氏三家之詩傅癖書滛鷹揚學府比文園入室之武同丞相登科之䇿奏甚平讞詩窮綺靡硯燔紙貴虎視詞林嘗奉和聖製雨中春望詩云雨後山川光正發雲端花栁意無窮又奉和行幸詩云接仗風雲動迎軍鳥獸舞時人以為鮑㕘軍謝吏部為更生云云顧本作曰誤今校正某年月日詔除公河東太守兼採訪使官吏百姓等或守闕乞留或遮道更借淚增時雨思結仁風親愛之深諱名而號為父歌詠不足取姓以命其兒公既去官多厯年所人思愈甚共立生祠異邑居而瓦合無契約而麏至恐不預于聚財懼不任乎輸力棠樹勿翦何如審像圖形桐鄉置祠豈比耳聞身及以此觀德何德之深仍建豐碑立于祠宇匍匐千里前後百輩求綴詞之客為頌德之文維也竊比老農不知舊史衆心所至難抑與于輿人予病未能不獲已于求我乃為頌曰禹别九州漢分八使實惟方伯且曰連帥建節乗軺觀風察吏山東河北全趙大魏授方任能惟名與器葢非其才孰享斯位天子命我導揚皇風敬教勸學通商惠工法去太甚政貴得中守丞老病小吏童䝉督郵不逐博士成功遂安賢者大啟儒宫四國之餘一都之會平原舊俗信陵遺態博塞以遊椎埋為害叢臺淇水燕裾趙帶淳化旁屬貞風俶載劈纊巻綃横經秉耒秉舊作乗非清節峻邈碩量宏深投書置水酹酒捐金樹德滋蔓持刑不滛訛言免坐倨貴懷音繡衣罷斧墨綬停琴既此時雨當聞作霖申哀松柏展敬桑梓伏謁公門徒行故里椎心馬鬛啟顙鯢齒身紆紫綬禮及童穉帝賜黃金盡于筐篚社養宗人學招邑子能事具舉令問允穆璽書改印緹油轉轂壁挂胡牀舍留官犢人吏老幼涕泗號哭頌德豐碑圖形華屋閲實數美移晷更僕苗公劉昫唐書苗晉卿上黨壺闗人幼好學善屬文進士擢第初授懷州修武縣尉厯奉先縣尉坐累貶徐州司户㕘軍秩滿隨調判入髙等授萬年縣尉遷侍御史厯度支兵吏部三員外郎開元二十三年遷吏部郎中二十四年拜中書舍人二十九年拜吏部侍郎天寶二載御史中丞張倚男奭參選晉卿以倚初承恩欲悦附之考選人判等凡六十四人分甲乙丙科奭在其首衆知奭不讀書論議紛然上怒晉卿貶為安康郡太守三載閏二月轉魏郡太守充河北採訪處置使居職三年政化洽聞㑹入計因上表請歸鄉里既至壺闗望縣門而步小吏進曰太守位髙德重不宜自輕晉卿曰禮下公門式路馬況父母之邦所宜尊敬汝何言哉大㑹鄉黨歡飲累日而去又出俸錢三萬為鄉學本以教授子弟尋改河束太守河東採訪使入為尚書東京留守徵為憲部尚書拜左相晉卿寛厚廉謹為政舉大綱不問小過所到有惠化魏人思之為立碑頌德魏風婉左傳呉公子札來聘請觀于周樂為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也九土國語能平九土韋昭曰九土九州之土也冀田禹貢冀州厥土惟白壤厥賦惟上上錯孔安國傳無塊曰壤水去土復其性色白而壤賦謂土地所生以供天子上上第一錯雜雜出第二等之賦曲成易曲成萬物而不遺安康郡按唐書地理志金州本西城郡天寶元年改安康郡至德二載改漢隂郡隸山南東道邦伯商書邦伯師長孔安國傳國伯二伯及州牧也宿訟東觀漢記魯恭為中牟令宿訟許伯等爭陂澤田積年州郡不決恭平理典直各退自相責讓老丞漢書黃霸為潁川太守力行教化而後誅罰務在成就全安長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及奸吏緣絶簿書盜財物公私費耗甚多皆當出于民所易新吏又未必賢或不如其故徒相益為亂凡治道去其太甚者耳小吏漢書文翁為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士數嵗蜀生皆成就還歸文翁以為右職用次察舉官有至郡守刺史者又修起學官于成都市中招下縣子弟以為學官弟子為除更繇髙者以補郡縣吏次為孝弟力田數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學于京師者比齊魯焉謝亭長之問漢書趙廣漢為京兆尹嘗記召湖都亭長湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其發奸摘伏如神皆此類也勞野次之賢漢書黄霸為潁川太守嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食于道旁烏攫其肉民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食于道旁乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢有所隠河北有其四國成按唐開元天寶間河北道所隸州府凡二十五安東乃髙麗之地戰國時未入版圖其懷衛相魏澶五州是古魏國之地洺邢趙恒定莫瀛深冀貝十州是古趙國之地易幽媯營平五州是古燕國之地博德滄棣四州是古齊國之地則河北兼有四國之地矣獻子三嘆國語梗陽人有獄將不勝請納賂于魏獻子獻子將許之閻没謂叔寛曰與子諫乎吾主以不賄聞于諸侯今以梗陽之賄殃之不可二人朝而不退獻子將食問誰在庭曰閻明叔襃在召之使佐食比已食三歎既飽獻子問焉曰人有言曰唯食可以忘憂吾子一食之間而三歎何也同辭對曰吾小人也貪饋之始至懼其不足故歎中食而自咎也曰豈主之食而有不足是以再歎之既食願以小人之腹為君子之心屬厭而已是以三歎獻子曰善乃辭梗陽人十日飲史記秦昭王乃詳為好書遺平原君曰寡人聞君之髙義願與君為布衣之友君幸過寡人寡人願與君為十日之飲曹王拂局世説彈棊始自魏宫内用裝奩戲文帝于此戲特妙用手巾角拂之無不中有客自云能帝使為之客著葛巾角低頭拂棊妙踰于帝都䕶堂左思魏都賦都䕶之堂殿居綺牕劉淵林註都䕶者將軍曹淵也吕向註都䕶宫名居殿之中飾為綺牕邯鄲步漢書昔有學步于邯鄲者曾未得其髣髴又復失其故步遂匍匐而歸耳浮食三國志止浮食之費并從容之官八政禮記齊八政以防淫八政飲食衣服事為異别度量數制鄭康成註飲食為上衣服次之事為謂百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也便坐漢書文翁為蜀郡守嘗選學官僮子使在便坐視亊每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閣縣邑吏民見而榮之師古註便坐别坐可以視事非正廷也左塾禮記古之教者家有塾黨有庠鄭康成註門側之堂謂之塾孔穎達正義周禮百里之内二十五家為閭同共一巷巷首有門門邊有塾謂民在家之時朝夕出入恒就教于塾故曰家有塾白虎通云古之教民百里皆有師里中之老有道德者為里右師其次為左師教里中之弟子以道藝孝弟仁義也案書傳説云大夫七十致仕而退老歸其鄉里大夫為父師士為小師新穀已入餘子皆入學距冬至四十五日始出學上老平明坐于右塾庶老坐于左塾餘子畢出然後皆歸夕亦如之力穡商書若農服田力穡乃亦有秋孔安國傳穡耕稼也先疇班固西都賦士食舊德之名氏農服先疇之畎畝段子廬髙士傳段干木者晉人也守道不仕魏文侯欲見就造其門段干木踰墻而避文侯文侯以客禮待之出過其廬而軾其僕問曰干木布衣也君軾其廬不已甚乎文侯曰段干木賢者也不移勢利懷君子之道隠處窮巷聲馳千里吾敢不軾乎干木先乎德寡人先乎勢干木富乎義寡人富乎財勢不若德貴財不若義髙又請為相不肯後卑已固請見與語文侯立倦不敢息京坁詩小雅曾孫之稼如茨如梁曾孫之庾如坻如京毛萇傳京髙邱也鄭康成箋庾露積穀也坻水中之髙地也史起漢書魏文侯時西門豹為鄴令有令名至文侯曾孫襄王時與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也于是以史起為鄴令遂引漳水溉鄴以富魏之河内民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱鄴郡成按商河亶甲居相即鄴郡之地魏曹操受封于此建都焉洎後趙石虎前燕慕容雋東魏靜帝北齊武帝並都之袨服靚妝鄒陽書武力鼎士袨服叢臺之下李善註袨服大盛元黄服也左思蜀都賦都人士女袨服靚妝劉淵林註蘇林曰袨服謂盛服也張揖曰靚謂粉白黛黑也顔延年曲水詩序靚妝藻野袨服縟川張銑註靚妝美人脂粉之色袨服美麗之衣也跕屣史記為倡優女子則鼓鳴瑟跕屣游媚貴富人後宫徧諸侯徐廣曰跕音帖張晏曰跕屣也瓚曰躡跟為跕也顏師古漢書註屣謂小履之無跟者也跕謂輕躡之也河間數錢後漢書車斑斑入河間河間姹女工數錢組紝禮記内則執麻枲治絲繭織紝組紃學女事以共衣服孔穎達正義云組紃俱為絛也紝為繒帛故杜註左傳紝謂繒帛皇氏云組是綬也然則薄闊為組似繩者為紃冶容周易冶容誨淫五匹古樂府雞鳴入機織夜夜不得息三日斷五匹大人故嫌遲處子束晳補亡詩堂堂處子無營無欲李善註處子處士也師襄家語孔子學琴于師襄子趙帶燕裾沈約八詠詩開燕裾吹趙帶趙帶飛㕘差燕裾合且離漆室列女傳漆室女者魯漆室邑之女也過時未適人當穆公時君老太子幼女倚柱而嘯旁人聞之莫不為之慘者其鄰人婦從之遊謂曰何嘯之悲也子欲嫁耶吾為子求偶漆室女曰嗟乎始吾以子為有知今無識也吾豈為不嫁不樂而悲哉吾憂魯君老太子幼鄰婦笑曰此乃魯大夫之憂婦人何與焉漆室女曰不然非子所知也昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使我終嵗不食葵鄰人女奔隨人亡其家倩吾兄行追之逢霖水出溺流而死令吾終身無兄吾聞河潤九里漸洳三百步今魯君老悖太子少愚愚偽日起夫魯國有患者君臣父子皆被其辱禍及衆庶婦人獨安所避乎吾甚憂之子乃曰婦人無與者何哉鄰婦謝曰子之所慮非妾所及三年魯果亂齊楚攻之魯連有寇男子戰鬭婦人轉輸不得休息鯷海漢書地理志㑹稽海外有東鯷人分為二十餘國以嵗時來獻見云孟康註鯷音題謝朓詩化協鯷海君恩變龍庭長沈約詩浮天出鯷海束馬渡交河金魚袋唐書車服志髙宗給五品以上隨身魚銀袋以防召命之詐出内必合之三品以上金飾袋垂拱中都督刺史始賜魚天授二年改佩魚皆為龜其後三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋景龍中令特進佩魚散官佩魚自此始也然貟外試檢校官猶不佩魚景雲中詔衣紫者魚袋以金飾之衣緋者以銀飾之開元初駙馬都尉從五品者假紫金魚袋都督刺史品卑者假緋魚袋五品以上檢校試判官皆佩魚中書令張嘉貞奏致仕者佩魚終身自是百官賞緋紫必兼魚袋謂之章服當時服朱紫佩魚者衆矣方伯十聫禮記千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬于天子之老二人分天下以為左右曰二伯鄭康成註屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧澄清後漢書時冀州饑荒盜賊羣起乃以范滂為清詔使案察之滂登車攬轡慨然有澄清天下之志七命詩唐風豈曰無衣七兮不如子之衣安且吉兮毛萇傳侯伯之禮七命冕服七章緹油屏車漢書黄霸為揚州刺史三嵗宣帝詔曰制詔御史其以賢良髙第揚州刺史霸為穎川太守秩比二千石居官賜車葢特髙一丈别駕主簿車緹油屏泥于軾前以彰有德璽書增秩漢書循吏傳孝宣繇仄陋而登至尊興于閭閻知民事之囏難自霍光薨後始躬萬機厲精為治五日一聽事自丞相巳下各奉職而進及拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎以為太守吏民之本也數變易則下不安民知其將久不可欺罔迺服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至闗内侯公卿缺則選諸所表以次用之嬰兒國春秋晉師滅赤狄潞氏以潞子嬰兒歸元和郡縣志潞州上黨禹貢冀州之域殷時為黎國春秋時屬晉又兼有潞子之國潞子嬰兒為晉所滅偵候後漢書任延傳止罷偵候守卒章懷太子註偵伺也音丑政反投刺梁書諸葛璩安貧守道悦禮敦詩未嘗投刺邦宰曳裾府寺釋名書稱刺書以筆刺紙簡之上也舍車而徒用周易賁卦詞椎心李陵報蘇武書此陵所以仰天椎心而泣血也緒言莊子曩者先生有緒言而去牢鄭康成周禮註三牲牛羊豕具為一牢筐篚南史江革曰我通不受餉不應獨當故人筐篚雙龜章懷太子後漢書註漢舊儀曰鍡印皆龜鈕其文刻曰某官之章苗為太守又為採訪處置使兼官二印故曰雙龜雙龜字出潘岳馬汧督誄中蘇公史記蘇秦為從約長并相六國北報趙王乃行過雒陽車騎輜重諸侯各發使送之甚衆擬于王者蘇秦喟然嘆曰使我有洛陽負郭二頃田吾豈能佩六國相印乎于是散千金以賜宗族朋友疏傅漢書疏廣為太傅上疏乞骸骨上以其年篤老許之加賜黄金二十斤皇太子贈以五十斤廣既歸鄉里日令家共具設酒食請族人故舊賓客與相娯樂數問其家金餘尚有幾所趣賣以共具居嵗餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立產業基阯今日飲食費且盡宜從文人所勸説君買田宅老人即以閒暇時為廣言此計廣曰吾豈老誖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為嬴餘但教子孫怠墮耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既亡以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎閲禮敦詩左傳趙衰曰卻縠可臣亟聞其言矣説禮樂而敦詩書孔穎達正義云説謂愛樂之敦謂厚重之相如漢書司馬相如為郎數嵗㑹唐蒙使略通夜郎僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率巴蜀民大驚恐上聞之乃遣相如責唐蒙等因諭告巴蜀民以非上意檄曰云云相如還報唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二嵗道不成士卒多物故費以億萬計蜀民及漢用事者多言其不便是時卭莋之君長聞南夷與漢通得賞賜多多欲願為内臣妾請吏比南夷上問相如相如曰卭莋冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈于南夷上以為然乃拜相如為中郎將建節往使副使者王然于壺充國吕越人馳四乗之傳因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵買臣漢書朱買臣傳上拜買臣㑹稽太守初買臣免待詔常從㑹稽守邸者寄居飯食拜為太守買臣衣故衣懷其印綬步歸郡邸直上計時㑹稽吏方相與羣飲不視買臣買臣入室中守邸與共食食且飽少見其綬守邸怪之前引其綬視其印㑹稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入視之還走疾呼曰實然坐中驚駭白守丞相推排陳列中庭拜謁買臣徐出户有頃長安廏吏乗駟馬車來迎買臣遂乘傳去率禮無違後漢書朱浮傳清明履約率禮無違張衡南都賦獻酬既交率禮無違平陽傳舍漢書霍去病既壯大乃自知父為霍中孺未及求問㑹為驃騎將軍擊匈奴道出河東河東太守郊迎負弩矢先馳至平陽傳舍遣吏迎中孺中孺趨入拜謁將軍迎拜因跪曰去病不早自知為大人遺體也中孺扶服叩頭曰老臣得託命將軍此天力也去病大為中孺買田宅奴婢而去山隂吏卒漢書朱買臣呉人也上拜買臣㑹稽太守上謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝㑹稽聞太守且至發民除道縣吏並送迎車百餘乘入呉界見其故妻妻夫治道此用其事易㑹稽為山隂者葢以叶聲之輕重耳揚名顯親孝經立身行道揚名于後世以顯父母孝之終也九伯左傳五侯九伯女實征之杜預註五等諸侯九州之伯八使後漢書周舉傳時詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中與侍中杜喬守光禄大夫周栩前青州刺史馮羨尚書欒巴侍御史張綱兗州刺史郭遵太尉長史劉班並守光禄大夫分行天下其刺史二千石有贓罪顯名者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上于是八使同時俱拜天下號曰八俊風動神行沈約齊故安陸昭王碑文公下車敷化風動神行吕延濟註風動神行言化無所不至也貪天之功左傳天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎竊人之財猶謂之盜況貪天之功以為已力乎宋父宣驕左傳稠父喪勞宋父以驕詩維彼愚人謂我宣驕毛萇傳宣示也條侯倨貴史記郅都傳丞相條侯至貴倨也潘岳西征賦重條侯之倨貴當闗嵇康與山巨源絶交書當闗呼之不置張銑註漢置當闗之職欲曉即至門呼人使起邦典周禮凡諸侯之獄訟以邦典定之鄭康成註邦典六典也告之話言太雅其維哲人告之話言順德之行毛萇傳話言古之美言也滄海按史記魯連見新垣衍言不肯帝秦之事平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽魯連笑曰所貴于天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見其後二十餘年燕將攻下聊城聊城人或讒之燕將懼誅因保守聊城不敢歸齊田單攻聊城嵗餘士卒多死而聊城不下魯連乃為書約之矢以射城中遺燕將書燕將見魯連書泣三日乃自殺聊城亂田單遂屠聊城歸而言魯連欲爵之魯連逃隠于海上曰吾與富貴而詘于人寜貧賤而輕世肆志焉此混二事作一事用赤松史記留侯乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇強秦天下振動今以三寸舌為帝者師封萬户位列侯此布衣之極于良足矣願棄人間事欲從赤松子游耳乃學辟榖導引輕身功成不居老子功成而弗居夫惟弗居是以不去析珪揚雄解嘲析人之珪儋人之爵張銑註析分也珪諸侯所執也四術三國志古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急議論一也爭名勢二也重朋黨三也務欲速四也急議論則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全也上變史記條侯子為父買工官尚方甲楯五百被可以𦵏者取庸苦之不予錢庸知其盜買縣官器怒而上變告子事連條侯司敗韋昭國語解楚謂司寇為司敗獄吏漢書人上書有告周勃欲反下廷尉逮捕勃治之勃恐不知置詞吏稍侵辱之勃以千金與獄吏文帝使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍安知獄吏之貴也葅醢史記漢誅梁王彭越醢之盛其醢徧賜諸侯白馬之盟漢書功臣表于是申以丹書之信重以白馬之盟師古曰白馬之盟謂刑白馬歃其血以為盟也黃犬之樂史記李斯傳二世二年七月具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族彫墻峻宇尚書甘酒嗜音峻宇彫墻孔安國傳峻髙大彫飾畫紫衣狐裘左傳衛侯為虎幄于藉圃成求令名者而與之始食焉太子請使良夫良夫乗衷甸兩牡紫衣狐裘至袒裘不釋劍而食太子使牽以退數之以三罪而殺之絳灌等列史記韓信知漢王畏惡其能常稱病不朝從由此日怨望居常鞅鞅羞與絳灌等列翕肩揚雄解嘲翕肩蹈背扶服入橐師古註翕斂也吕向註翕肩畏懼貌折節史記齊王大怒折節而下秦左道禮記析言破律亂名改作執左道以亂政殺鄭康成註左道若巫蠱及俗禁孔穎達正義盧云左道謂邪道地道尊右右為貴故漢書云右賢左愚右貴左賤故正道為右不正道為左漢書奸人惑衆挾左道懷詐偽以欺罔世主師古註左道邪僻之道非正道也訛言小雅民之訛言寧莫之懲青珠符南史宋太子劭傳有女巫嚴道育夫為劫坐没入奚官劭姊東陽公主應閤婢王鸚鵡白公主道育通靈主乃白上託云善蠶求召入道育曰所奉天神當賜符應時主夕卧見流光相隨狀若螢火遂入中箱化為雙珠圓青可愛于是主及劭並信惑之赤刀西京雜記東海人黃公少時為術能制蛇御虎佩赤金刀以絳繪束髮立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術秦末有白虎見于東海黄公乃以赤刀往厭之術既不行遂為虎所殺割水飲人北史靈大后臨朝屬有沙門惠憐以呪水飲人云能愈疾百姓奔凑日以千數李義徽白清河王懌稱其妖妄因令義徽草奏以諫太后納其言保汝莊子列御寇之齊中道而反遇伯昬瞀人伯昬瞀人曰奚方而反曰吾驚焉曰惡乎驚曰吾嘗食于十􅜅而五􅜅先饋伯昬瞀人曰若是則汝何為驚巳曰夫内誠不解形諜成光以外鎮人心使人輕乎貴老而􅕖其所患夫􅜅人特為食羮之貨多餘之贏其為利也薄其為權也輕而猶若是而況于萬乗之主乎身勞于國而知盡于事彼將任我以事而効我以功吾是以驚伯昬瞀人曰善哉觀乎汝處巳人將保汝矣無幾何而往則户外之屨滿矣伯昬瞀人北面而立敦杖蹙之乎頥立有間不言而出賔者以告列子列子提屨跣而走暨乎門曰先生既來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也郭象註茍不遺形則所在見保保者聚首之謂也首惡漢書濟南瞷氏宗人三百餘家豪猾二千石莫能制于是景帝拜郅都為濟南守至則誅瞷氏首惡餘皆股栗面從虞書汝無面從退有後言丕蔽要囚周書要囚服念五六日至于旬時丕蔽要囚孔安國傳要囚謂察其要辭以㫁獄既得其辭服膺思念五六日至于十日至于三月乃大㫁之言必反覆思念重刑之至也惟良折獄周書非佞折獄惟良折獄孔安國傳非口材可以折獄惟平良可以斷獄議事以制左傳鄭人鑄刑書叔向使詒子產書曰昔先王議事以制不為刑辟懼民之有爭心也民知有辟則不忌于上並有爭心以徵于書而徼幸以成之弗可為矣納隍梁書武帝紀古人云一物失所如納諸隍輕典周禮刑新國用輕典刑平國用中典刑亂國用重典孔安國傳新國者新辟地立君之國用輕法者為其民未習于教平國承平守成之國也用中典者常行之法刑期不濫左傳善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人小察晉書謝安傳不存小察宏以大綱政以禮成左傳共儉以行禮而慈惠以布政政以禮成民是以息晉盜奔秦左傳晉侯請于王以黻冕命士㑹將中軍且為太傅于是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄冰善人在上也善人在上則國無幸民民之多幸國之不幸也是無善人之謂也疇庸陸機漢髙祖功臣頌帝疇爾庸議曹之言漢書龔遂為渤海太守數年上遣使者徵遂議曹王生願從功曹以為王生素嗜酒無節度不可使遂不忍逆從至京師王生日飲酒不視太守㑹遂引入宫王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生言天子説其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也留如守司速若發括莊子其發若機括其司是非之謂也其留如詛盟其守勝之謂也司字疑是勝字之訛無間揚雄解嘲大者含元氣細者入無間李善註無間言至㣲也曲臺漢書后倉説禮數萬言號曰后氏曲臺記服䖍曰在曲臺校書著説因以為名師古曰曲臺殿在未央宫劉向七略宣皇帝時行射禮博士后倉為之辭至今記之曰曲臺記九師易七略易傳淮南九師道訓淮南王安所造也漢書藝文志易經有淮南道訓二篇淮南王安聘明易者九人號九師説三家詩漢書藝文志詩經二十八巻魯齊韓三家應劭註申公作魯詩后蒼作齊詩韓安作韓詩傳癖晉書杜預嘗稱王濟有馬癖和嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖書淫晉書黄甫謐耽翫典籍忘寢與食時人謂之書淫梁書劉峻從桑乾得還自謂所見不博更求異書聞京師有者必往祈借清河崔慰祖謂之書淫學府晉書儒林傳范平等學府儒宗譽隆望重文園史記司馬相如拜為孝文園令索隠云百官志云陵園令六百石掌按行掃除也法言詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼升堂相如入室矣如其不用何丞相登科漢書元光五年徵賢良文學菑川國推上公孫宏宏至太常上策詔諸儒時對者百餘人太常奏宏第居下䇿奏天子擢宏對為第一召入見容貌甚麗拜為博士待詔金馬門元朔中代薛澤為丞相平讞漢書景帝紀諸獄疑若雖文致于法而于人心不厭者輒讞之師古注讞平議也音魚列反綺靡陸機文賦詩緣情而綺靡李善註綺靡精妙之言硯燔晉書陸機天才秀逸辭藻宏麗弟雲嘗與書曰君苗見兄文輒欲燒其筆硯紙貴晉書左思欲賦三都搆思十年門庭藩溷皆著筆紙遇得一句即便書之及賦成時人未之重自以其作不謝班張恐以人廢言安定皇甫謐有髙譽思造而視之謐稱善為其賦序張載為註魏都劉逵註呉蜀陳留衛瓘又為思賦作略解司空張華見而嘆曰班張之流也使讀之者盡而有餘久而更新于是豪貴之家競相傳寫洛陽為之紙貴虎視曹植與呉季重書足下鷹揚其體鳳觀虎視詞林梁昭明太子與晉安王書殽核墳史魚獵詞林鮑參軍宋書鮑照字明逺文辭贍逸嘗為古樂府文甚道麗元嘉中河濟俱清當時以為美瑞照為河清頌其序甚工世祖以照為中書舍人臨海王子頊為荆州照為前軍參軍掌書記之任謝吏部南齊書謝朓遷尚書吏部郎善草隸長五言詩沈約常云二百年來無此詩也守闕乞留後漢書种暠為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后嘆曰未聞刺史得人心若是乃許之暠復留一年遮道更借後漢書穎川盜賊羣起帝謂冦恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也恂對曰穎川剽輕聞陛下逺踰阻險有事隴蜀故狂狡乗間相詿誤耳如聞乘輿南向賊必惶怖歸死臣願執鋭前驅即日車駕南征恂從至穎川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降號為父漢書召信臣遷南陽太守吏民親愛號之曰召父後漢書鮑德為南陽太守時嵗多荒災唯南陽豐穰吏人愛悦號為神父晉書杜預拜鎮南大將軍都督荆州諸軍事修召信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刋石使有定分公私同利衆庶賴之號曰杜父取姓命兒後漢書賈彪舉孝廉補新息長小民困貧多不養子彪嚴為其制與殺人同罪數年間人養子者千數僉曰賈父所長生男名為賈子生女名為賈女任延為九真太守駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸禄以賑助之同時相娶者二千餘人其產子者始知種姓咸曰使我有是子者任君也多名子為任瓦合漢書酈食其傳足下起瓦合之卒收散亂之兵師古註瓦合謂如破瓦之相合雖曰聚合而不齊也又陳湯傳湯知烏孫瓦合不能久攻師古註瓦合謂碎瓦之雜居不齊同麏至左傳求諸侯而麇至杜預註麇羣也顔延之詩懷仁憬集抱智麏至麏麇字同輸力左傳昔陪臣書能輸力于王室棠樹風俗通義召公當農桑之時重為所煩勞不舍鄉亭止于棠樹之下聽訟決獄百姓各得其所壽百九十餘乃卒後人思其德美愛其樹而不敢伐詩甘棠之所作也詩云蔽芾甘棠勿翦勿伐召伯所茇桐鄉漢書朱邑病且死屬其子曰我故為桐鄉吏其民愛我必𦵏我桐鄉後世子孫奉嘗我不如桐鄉民及死其子𦵏之桐鄉西郭外民果然共為邑起塚立祠嵗時祠祭不絶輿人左傳聽輿人之謀杜預註輿衆也禹别九州孔安國尚書傳禹别九州隨山濬川任土作貢方伯漢書何武傳刺史古之方伯上所委任一州表率也建節乘軺邱遲與陳伯之書佩紫懷黃讚帷幄之謀乗軺建節奉疆場之任劉良註軺使車也節旌節也晉書輿服志軺車古之時軍車也一馬曰軺車二馬曰軺傳一都之會史記貨殖傳邯鄲亦漳河之間一都㑹也燕亦勃碣之間一都㑹也三國志吕乂傳蜀郡一都之㑹戸口衆多此用其句博塞以遊莊子問臧奚事則挾筴讀書問穀奚事則博塞以遊椎埋漢書又使人椎埋攻剽為奸甚衆師古註椎殺人而埋之故曰椎埋酹酒捐金後漢書張奐傳東羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿于諸羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懷悉以金馬還之樹德滋蔓左傳伍員曰樹德莫如滋去疾莫如盡又祭仲曰無使滋蔓懷音魯頌翩彼飛鴞集于泮林食我桑黮懷我好音鄭康成箋云懷歸也言鴞恒惡鳴今來止于泮林之木上食其桑黮為此之故故改其鳴歸就我以善音喻人感于恩則化也孔穎達正義惡聲之鳥食桑黮而變音喻不善之人感恩惠而從化繡衣罷斧漢書武帝末軍旅數發郡國盜賊羣起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下停琴説苑宓子賤治單父彈鳴琴身不下堂而單父治後人因之以彈琴為令故事停琴葢即罷去之意時雨趙岐三輔決録茂材郭伋為穎川化如時雨作霖商書若嵗大旱用汝作霖雨馬鬛禮記孔子之喪有自燕來觀者舍于子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也今一日三斬板而巳封尚行夫子之志乎哉孔穎達正義既言四墳之異夫子之意從若斧者焉以為刃上難登狹又易為功力子夏既道從若斧形恐燕人不識故舉俗稱馬鬛封之謂也以語燕人馬鬷鬛之上其肉薄封形似之啟顙駱賓王兵部奏姚州破賊露布南薰解慍仰雲闕以翔魂東律和音叩轅門而啓顙鯢齒郭璞爾雅註鯢齒齒墮更生細者邑子史記中大夫泄公曰臣之邑子素知之令問家語凡三代之王必先其令問壁挂胡牀裴松之三國志註魏略曰裴潛為兖州時嘗作一胡牀及其去也留以挂壁舍留官犢裴松之三國志註時苗為壽春令始之官乗薄軬車黃㹀牛布被囊居官嵗餘牛生一犢及其去留其犢謂主簿曰令來時本無此犢犢是淮南所生有也羣吏曰六畜不識父自當隨母苗不聽時人皆以為激然由此名聞天下晉書羊篇歴官清慎有私牛于官舍産犢及遷而留之華屋戰國䇿乃説趙王于華屋之下鮑彪註華髙麗也移晷昭明太子文選序未嘗不心遊目想移晷忘倦吕向註晷日影日側不知其倦更僕禮記儒行遽數之不能終其物悉數之乃留更僕未可終也孔穎達正義留久也更代也僕太僕也君燕朝則太僕正位掌擯相也言若委細悉説之則大久僕侍疲倦宜更代之王右丞集箋注巻二十二
