body:
  text: 王右丞集箋注卷二十六仁和趙殿成撰志銘四首故任城縣尉裴府君墓志銘天寶二年正月十二日唐故魯郡任城縣尉河東裴府君卒于西京新昌坊私第享年三十九嗚呼哀哉君諱回字玉溫河東聞喜人也曾祖宏泰皇雍州録事參軍贈上黨長史泰顧本作春誤今考唐書宰相世系表改正祖思義皇侍御史吏部貟外左司郎中户部吏部侍郎河東郡太守晉城縣開國子父揚珍皇薛王府騎曹參軍自晉已降世為冠族令德不替以至于君夫其事親孝兄弟順與朋友信其從政公平而壽不中年官才一命慈母在堂諸弟未仕兒未有識女且嬰孩妻夭于前身殁于後天可問邪其若老親何其若季仲諸孤何生人之悲莫甚于是家貧祭以棗脯殮以時服以某月日祔葬于鳳棲原先府君之塋棲顧本作樓誤今校正嗚呼有河東裴子之墓志之蓋古有之繼後之知者亦何有哉銘曰一死萬紀終天不復為之奈何哀哀慟哭覆載至廣庶類繁育萬物方春而就于木任城縣唐書地理志河南道兖州魯郡有任城縣新昌坊長安志朱雀街東第五街之南有新昌坊聞喜唐書地理志河東道絳州有聞喜縣雍州唐書地理志京兆府京兆郡本雍州開元二年為府録事參軍按唐六典京兆有録事參軍事二人正七品上長史唐書百官志髙宗即位改别駕皆為長史侍御史唐六典御史臺有侍御史四人從六品下吏部員外唐六典吏部有貟外郎二人從六品上左司郎中唐六典尚書省有左司郎中一人從五品上户部吏部侍郎唐六典户部侍郎二人吏部侍郎二人正四品下晉城縣唐書地理志河東道澤州髙平郡有晉城縣開國子唐書百官志凡爵九等八曰開國縣子食邑五百户正五品上騎曹參軍事唐六典親王府有騎曹參軍事一人正七品上令德詩小雅顯允君子莫不令德鄭康成箋令善也祔葬按鄭康成禮記注祔謂合葬也後人作附葬用者失其解矣鳳棲原陜西志鳳棲原在少陵原北萬紀孔安國尚書傳十二年曰紀顔延年詩萬紀載絃吹千嵗託旒旌就木左傳季隗曰我二十五年矣又如是而嫁則就木焉杜預注言將死入木工部楊尚書夫人贈太原郡夫人京兆王氏墓志銘夫人諱某京兆霸城人也晉出三家公子尊于魏國秦亡六國時人謂之王家河南則分虎臨人華隂則老熊當道髙祖德真皇左僕射祖九思京兆府三原縣令父潛河南府告成縣令告成顧本作郜城誤今校正作告成唐書宰相世系表作吉城亦誤大名之後重光不替夫人令儀淑德發于天姿間禮明詩傳乎世業明顧本作名誤今校正言成女誡可著于縑緗行為女師詎資乎行待豈止彈琴吐論誦賦吟詩而已及乎有行嬪于君子事姑至孝旁穆六姻為母深慈均養七子男以無雙令德降帝子于鳳樓女則第一解空歸法王之象教閨門之訓朝野稱多既而家列公侯地連妃主珠翠滿座不御采衣方丈盈前唯甘素食同德大師大照和尚覩如來之奧昭羣有之源夫人一入空門便蒙法印朱簾紺幰無復餘乘龍藏寶經悉通至義惠用圓滿誡力堅嚴藥藉茹葷雖愈疾而不受心已久淨縱沒齒而常安沒舊作設非以某年月日奄歸大寂于長興里之私第厥初寢疾彌曠旬時駙馬上人柴毁骨立揮淚嘗藥身不解衣泣血持經手不釋卷晝夜懺悔非止六時身命供養寧唯七寶御醫繼踵中使重跡魂兮不反空焚外國之香生也有涯非無上天之樂某月日有詔追贈太原郡夫人襄城石􅐎增寵其榮名翟茀魚軒空悲于象設以某月日安厝于某原禮也功德之至散花天女不留釋梵之筵勝鬘夫人何在嗚呼哀哉乃為銘曰天生淑德實俾宜家特能柔順深棄嬌奢詎離環珮不御其華其疑是鉛字之訛其一婦道允諧母儀俱美每出誡夫停餐訓子賦掩西征書教內史其二門容髙幰庭列長筵幰顧本作憲誤男乘翠鳳女比紅蓮繁華貴里寂寞安禪其三朝含香兮禮闈夕青瑣兮黃扉方天公兮密啓建出牧兮髙麾俄入守兮京兆賜黃金兮被皂衣其四捐余珮兮江中隱思君兮不可窮歌泰山兮不返夢濟洹兮遂空素車兮逶遲宛鄉關兮故時時顧本作待誤望國門兮不入到秦山兮不知瞻舊域兮松楸平原夕兮素滻愁魂兮歸來江南不可以久留霸城成按太平寰宇記後周建德二年省霸城縣併入萬年縣唐時無此縣久矣右丞蓋本其舊族望而言耳王氏世系唐書宰相世系表京兆王氏出自姬姓周文王少子畢公髙之後封魏至昭王彤生公子無忌封信陵君無忌生間憂襲信陵君秦滅魏間憂子卑子逃難于太山漢髙祖召為中涓封蘭陵侯時人以其故王族也謂之王家卑子生悼悼生賢濟南太守宣帝徙豪傑居霸陵遂為京兆人卑子九世孫遵字子春後漢河南尹上樂莊侯遵生魴魴孫康康生諶諶生鵠魴别孫景生均忠均八世孫羆至易從徙居汲郡忠七世孫直瓜州刺史直子武宣嶽州刺史武子德真相髙宗武后德真子九思三原令九思子潛吉城令分虎後漢書苴茅分虎南面臣人章懷太子注分銅虎符也老熊當道北史王羆除華州刺史嘗修州城未畢梯在城外神武遣韓軌司馬子如從河東宵濟襲羆羆不覺比曉軌衆巳乘梯入城羆尚卧未起聞閣外洶洶有聲便袒身露髻徒跣持一白棒大呼而出謂曰老羆當道卧貉子那得過敵見驚退逐至東門左右稍集合戰破之軌遂投城遁走三原唐書地理志京兆府有三原縣告成唐書地理志河南府有陽城縣萬嵗登封元年將封嵩山改陽城曰告成神龍元年復故名二年復為告成大名左傳晉侯賜畢萬魏以為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆重光南史王筠與諸兒書論家門集云史傳稱安平崔氏及汝南應氏並纍葉有文才所以范蔚宗云崔氏雕龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門者也令儀詩小雅豈弟君子莫不令儀淑德後漢書崔實母劉氏有母儀淑德博覽書傳明詩洛神賦嗟佳人之信修羌習禮而明詩女誡後漢書扶風曹世叔妻作女誡七篇有助女訓女師毛萇詩傳古者女師教以婦德婦言婦容婦功祖廟未毁教于公宫三月祖廟既毁教于宗室行待左傳女待人婦義事者也杜預注待人待人而行也有行詩國風女子有行逺父母兄弟鄭康成箋云行道也婦人生而有適人之道嬪于君子虞書嬪于虞孔安國傳云嬪婦也使行婦道于虞氏六姻北史楊椿誡子孫曰我家入魏之始即為上客自爾至今二千石方伯不絶祿恤甚多于親姻知故吉凶之際必厚加贈襚來往賔寮必以酒肉飲食故六姻朋友無憾焉七子曹植上責躬應詔詩表七子均養者鳲鳩之仁也詩國風鳲鳩在桑其子七兮毛萇傳云鳲鳩之養其子朝從上下暮從下上平均如一無雙史記至如韓信者國士無雙第一解空僧肇維摩詰經注須菩提秦言善吉弟子中解空第一羣有王屮頭陀寺碑文行不捨之檀而施洽羣有李善注羣有謂有色無色有想無想以其不一故曰羣有法印大般若經般若波羅蜜多是諸如來真實法印亦是一切聲聞緣覺真實法印朱簾江淹靈丘竹賦綺疏蔽而停日朱簾開而留風紺幰隋書今犢車通幰自王公巳下至五品以上並給乘之三品以上青幰朱裏五品已上紺幰碧裏江總詩輪停紺幰引馬度紅塵餘龍藏寶經龍樹菩薩入龍宫看藏見華嚴三本菩薩處胎經曰金翅鳥從龍子到海宫殿彼有七寶塔諸佛所說諸法深藏沈約內典序足蹈慧門學通龍藏大寂涅槃經我曠劫來已入大寂長興里按長安志朱雀街東第二街有長興坊其東北隅有侍中駙馬都尉楊師道宅柴毁骨立晉書許孜字季義東陽吳寧人也二親沒柴毁骨立杖而能起六時佛名經云若比丘比丘尼優婆塞優婆夷欲懺悔諸罪當淨洗浴著新淨衣淨治室內敷好髙座安置尊像懸二十五枚幡種種華香供養誦此二十五佛名日夜六時懺悔滿二十五日滅四重八重等罪身命供養涅槃經若有建立護持正法如是之人應從啓請當捨身命而供養之外國香十洲記聚窟洲上有大山形似人鳥之象因名之為神鳥山山多大樹與楓木相類而花葉香聞數百里名為反魂樹扣其樹亦能自作聲聲如羣牛吼聞之者皆心震神駭伐其木根心于玉釜中煮取汁更微火煎如黑餳狀令可丸之名曰驚精香或名之為震靈丸或名之為反生香或名之為震檀香或名之為人鳥精或名之為却死香一種六名斯靈物也香氣聞數百里死者在地聞香氣乃却活不復亡也以香薰死人更加神驗征和三年武帝幸安定西胡月支國王遣使獻香四兩大如雀卵黑如桑椹帝以香非中國所有以付外庫到後元元年長安城內病者數百亡者大半帝試取月支神香燒之于城內其死未三月者皆活芳氣經三月不歇于是信知其神物也乃更祕録餘香後一旦又失之檢函封印如故無復香也生也有涯莊子吾生也有涯而知也無涯襄城後漢書宏農人宰宣素性佞邪欲取媚于梁冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租嵗入五千萬加賜赤紱比長公主象設楚辭象設君室靜安間些母儀晉書母儀之教光于邦俗停餐訓子漢書雋不疑為京兆尹每行縣録囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為飲食語言異于他時或亡所出母怒為之不食故不疑為吏嚴而不殘西征李善文選注曹大家集曰子穀為陳留長大家隨至官作東征賦內史張懷瓘書斷衛夫人名鑠字茂猗廷尉展之女弟恆之從女汝隂太守李矩之妻也隸書尤善規矩鍾公云碎玉壺之冰爛瑶臺之月婉然芳樹穆若清風右軍少常師之永和五年卒年七十八長筵曹植名都篇鳴儔嘯匹侣列坐竟長筵禮闈任昉王文憲集序出入禮闈朝夕舊館李善注十州記曰崇禮闈即尚書上省門崇禮東建禮門即尚書下舍門因尚書省二門名禮故曰禮闈也黃扉黃扉猶黃闥禁門也宋之問詩寵就黃扉日威回白簡霜出牧何遜詩入朝耿長劍出牧盛層麾髙麾沈約齊故安陸昭王碑文建麾作牧明德攸在吕向注麾旗類也以毛為之皂衣漢書京兆尹張敞上書言敞備皂衣二十餘年如淳曰雖有五等服至朝皆著皂衣歌泰山禮記孔子蚤作負手曳杖消搖于門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也夢濟洹左傳聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之暮而卒久留楚辭招魂魂兮歸來東方不可以託些又招隱士王孫兮歸來山中兮不可以久留唐故潞州刺史王府君夫人榮國夫人墓志銘榮一本作營誤夫人姓盧氏范陽人也昔堯命伯夷典秩宗號太常為尚父上有闕文桓襄之際公子食盧卯金故人王于大國越石從事官至中郎曾祖士㑹隋行臺侍御史祖某皇朝奉禮郎父某豪淄卭等三州刺史持斧衣繡威加不法奠玉瘞帛舉無違禮守臨淄而齊兒不詐去臨卭而蜀物盡留夫人即府君之長女積纍世之德鍾二門之美儀表秀整進止詳間不咨保傅動由詩禮既以七族冠時遂歸齊大之偶入持門户內事舅姑枕席溫凊于堂上環珮逶迤于堂下不脫簪珥親當浣濯𤣥纁可實于筐篚粢盛可獻于宗廟魚軒或駕翟茀而朝衆婦于是修容夫人專之以禮克贊君子纍至大官雅政清德實多左右潞州早世深秉義方母儀可則庭訓不替女史之學多讚大家之書衆婦之儀盡禀夫人之法天與盛德不降永年以某月日寢疾薨于長安善和里享年若干以某月日合祔某山原禮也子某某官淳孝之性泣血待盡永惟令德固不可泯彰示後人乃刋于石銘曰有姜之後或邑于盧歷代種德示有稱孤從事文府振轡長途其一憲府持法奉常秉禮皇考專城腰章郡邸厚德重跡深仁繼體其二降生哲人其行惟惇儀形衆庶門冠諸姻齊姜宋子敢望清塵其三君子之二實聞髙義乃躬浣濯先晨簪珥穆及外親敬是中饋其四母儀既峻庭訓載揚子以才貴煌煌寵章馳暉難駐令問空長其五壽宫既啓髙堂永寂千秋萬古山川松柏紀德志行惟兹貞石其六盧氏世系唐書宰相世系表盧氏出自姜姓齊文公子髙髙孫傒為齊正卿諡曰敬仲食采于盧濟北盧縣是也其後因以為氏田和篡齊盧氏散居燕秦之間秦有博士敖子孫家于涿水之上遂為范陽涿人伯夷史記舜曰嗟四嶽有能典朕三禮皆曰伯夷可舜曰嗟伯夷以汝為秩宗夙夜維敬直哉惟靜潔正義曰秩宗若太常也漢書百官表云王莽太常曰秩宗依古也孔安國云秩序宗尊也主郊廟之官也卯金故人史記盧綰者豐人也與髙祖同里盧綰親與髙祖太上皇相愛及生男髙祖盧綰同日生里中持羊酒賀兩家及髙祖盧綰壯俱學書又相愛也里中嘉兩家親相愛生子同日壯又相愛復賀兩家羊酒髙祖為布衣時有吏事辟匿盧綰常隨出入上下及髙祖初起沛盧綰以客從入漢中為將軍常侍中從東擊項籍以太尉常從出入卧內衣被飲食賞賜羣臣莫敢望雖蕭曹等特以事見禮至其親幸莫及盧綰髙祖已定天下欲王盧綰為羣臣觖望及虜臧荼乃下詔諸將相列侯擇羣臣有功者以為燕王羣臣知上欲王盧綰皆言曰太尉長安侯盧綰常從平定天下功最多可王燕詔許之漢五年八月乃立盧綰為燕王諸侯王得幸莫如燕王漢書王莽傳夫劉之為字卯金刀也越石從事晉書盧諶字子諒清敏有理思好老莊善屬文州舉秀才辟太尉掾洛陽沒北依劉琨為劉粲所虜粲據晉陽留諶為參軍琨收散卒引猗盧騎還攻粲粲敗走諶得赴琨琨為司空以諶為主簿從事中郎奉禮郎唐六典太常寺有奉禮郎二人從九品上濠淄卭唐書地理志濠州鍾離郡淄州淄川郡俱屬河南道卭州臨卭郡屬劍南道瘞帛唐六典凡祭天及日月星辰之玉帛則焚之祭地及社稷山嶽則瘞之海瀆則沉之蜀物南史王僧孺傳昔人為蜀郡長史終身無蜀物七族唐㑹要顯慶四年詔後魏隴西李寶太原王瓊滎陽鄭溫范陽盧子遷盧澤盧輔清河崔伯宗崔元孫前燕博陵崔懿晉趙郡李楷凡七姓十家不得自為婚姻齊大之偶左傳齊侯欲以文姜妻鄭太子忽太子忽辭人問其故太子曰人各有耦齊大非吾耦也持門户古詩健婦持門户亦勝一丈夫𤣥纁夏書厥篚元纁璣組孔穎達正義曰釋器云三染謂之纁李巡云三染其色巳成為絳纁絳一名也考工記云三入為纁五入為緅七入為緇鄭云纁者三入而成又再染以黑則為緅又再染以黑則為緇𤣥色在緅緇之間其六入者是染𤣥纁之法也義方左傳臣聞愛子教之以義方大家後漢書扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學髙才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之帝數召入宫令皇后諸貴人師事焉號曰大家文府沈約到著作省謝表珥筆史觀記言文府振轡晉書崑峯振轡風山訪道繼體左思吳都賦虞魏之昆顧陸之裔岐嶷繼體老成奕世齊姜宋子詩國風豈其取妻必齊之姜豈其取妻必宋之子鄭康成箋齊姜姓宋子姓清塵李善文選注楚辭曰聞赤松之清塵蓋行必塵起不敢指斥尊者故假塵以言之清尊之也中饋周易無攸遂在中饋馳暉謝朓詩馳暉不可接李善注馳暉日也壽宫楚辭蹇將憺兮壽宫王逸注壽宫供神之處也貞石王屮頭陀寺碑文勝幡西振貞石南刋劉良注貞堅也汧陽郡太守王公夫人安喜縣君成氏墓志銘汧一本作河誤夫人字某某郡人也其先周成王之後古之錫姓命氏或以先父之職官或因始祖之名諡漢魏以降史牒詳焉曾祖休寧某官祖某某官襲封常山公二公執帛調護儲闈九伯剖符典司方嶽典司方嶽顧本作典日方兵誤今校正漢雄右輔實拜翁歸左顧本作右誤今校正周命僕臣惟兹伯冏夫人即太僕府君之第二女也世有明訓家無遺德蕙心紈質豈曰師成螓首蛾眉抑惟天與同雲降雪常聞栁絮之詩獻嵗發春即賦椒花之頌言事姑舅宜其家室寢門才闢笄六珈而問安擊鐘未晞具八籩而獻饋染朱與緑不愆公子之衣采藻及蘋有甚季姜之祭魚軒翟茀為諸侯之夫人鳴珮垂環對有國之君子綺疏寓目助選賢人青帳藩身用酬髙論善持門户能睦族姻誡良人之從畋不嘗原獸訓愛子之為政遂返池魚言成大家之書行為衆婦之法至于彈琴製賦纂組攻書具舉百事之能仍居四德之外嗚呼降年不永春秋五十以某載月日薨于長安平康里之私第某月日祔于咸陽洪瀆原之先塋禮也不獲偕老空傷奉倩之神未始有生誰達莊周之禮長子濡前某官次子澄某官次曰某某官及女等漣漣泣血㷀㷀在疚哀纒聖善痛七子之無依文叙塞淵兾九原之可識塞顧本作寒誤今校正銘曰齊侯之子兮衛侯之妻膚如凝脂兮手如柔荑奉初之嘉訓兮淑德日躋供養兮姑舅簪珥問安兮先夜漏製三繅兮元纁具五獻兮籩豆翟茀兮錦衣駕魚軒兮來歸從如雲兮滿中闈忽形沉兮影絶夫傷神兮子泣血悲餘澤兮猶在怨回文兮未滅返葬兮咸陽寒天暮兮渭水長嗟梧桐兮半死無雙飛兮鳳凰汧陽郡唐書地理志關內道隴州汧陽郡本隴東郡義寧二年析扶風郡之汧源汧陽南由安定郡之華亭置天寶元年更郡曰汧陽安喜縣唐書地理志河北道定州博陵郡有安喜縣二公尚書周官少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人孔安國傳副二三公也執帛杜預左傳注公侯伯子男執玉諸侯世子附庸孤卿執帛儲闈沈約彈王源文升采儲闈亦居清顯劉良注儲闈東宫也剖符漢書髙帝紀又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟右輔三輔黃圖京兆尹左馮翊右扶風共治長安城中是為三輔三輔郡皆有都尉如諸郡京輔都尉治華隂左輔都尉治髙陵右輔都尉治郿翁歸漢書尹翁歸以髙第入守右扶風滿嵗為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵類常如翁歸言無有遺脫緩于小弱急于豪彊豪彊有論罪輸掌畜官使斫莝責以貟程不得取代不中程輒笞督極者至以鈇自剄而死京師畏其威嚴扶風大治盜賊課常為三輔最伯冏孔安國尚書傳穆王命伯冏為周太僕正作冏命太僕唐書百官志太僕寺卿一人從三品少卿二人從四品上蕙心紈質鮑照蕪城賦東都妙姬南國麗人蕙心紈質玉貌絳唇張銑注蕙香草喻美也紈輕細綺也言妙姬佳人嬌美之心輕細之質螓首蛾眉詩國風螓首蛾眉集傳云螓如蟬而小其額廣而方正蛾蠶蛾也其眉細而長曲同雲詩小雅上天同雲雨雪氛氛集傳云同雲雲一色也栁絮世說謝太傅寒雪日內集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女曰未若栁絮因風起公大笑樂即公大兄奕女左將軍王凝之妻也獻嵗發春楚辭獻嵗發春兮汩吾南征王逸注言嵗始來進春氣奮揚萬物皆感氣而生椒花晉書劉臻妻陳氏者聰辨能屬文嘗正旦獻椒花頌其辭曰旋穹周回三朝肇建青陽散輝澄景載煥摽美靈葩爰採爰獻聖容映之永夀於萬言事姑舅庾信周安昌公夫人鄭氏墓志銘及乎作配君子言事舅姑宜其家室詩周南之子于歸宜其家室寢門孔穎達禮記正義寢門最內門也笄六珈詩國風君子偕老副笄六珈毛萇傳云笄衡笄也珈笄飾之最盛者所以别尊卑孔穎達正義首服副飾而著衡笄以六珈玉為之飾八籩周禮夫人致禮八壺八豆八籩采藻詩召南于以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女季姜季姜恐是季蘭之訛按左傳濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也杜預注以季蘭為服蘭之女孔穎達正義云詩言季女而此言季蘭謂季女服蘭草也案宣三年傳曰蘭有國香人服媚之知是女之服蘭也青帳晉書王凝之妻謝氏字道韞安西將軍奕之女也凝之弟獻之嘗與賔客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步鄣自蔽申獻之前議客不能屈不嘗原獸列女傳楚莊王即位好狩獵樊姬諌不止乃不食禽獸之內王改過勤于政事左傳不修民事而淫于原獸杜預注原野也返池魚吳録孟仁為鹽池司馬自能結網手以捕魚作鮓寄母母因以還之曰汝為魚官而以鮓寄我非避嫌也纂組楚辭纂組綺縞結琦璜些王逸注纂組綬類也漢書錦繡纂組害女紅者也應劭曰纂今五采屬綷是也組者今綬紛絛是也臣瓚云許慎云纂赤組也四德後漢書九嬪掌教四德章懷太子注四德謂婦德婦言婦容婦功也奉倩裴松之三國志注荀粲字奉倩常以婦人者才智不足論自宜以色為主驃騎將軍曹洪女有美色粲于是聘焉容服帷帳甚麗專房歡宴厯年後婦病亡未殯傅嘏往唁粲粲不哭而神傷嘏問曰婦人才色並茂為難子之娶也遺才而好色此自易遇今何哀之甚粲曰佳人難再得顧逝者不能有傾國之色然未可謂之易遇痛悼不能已嵗餘亦亡莊周莊子莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無概然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也人且偃然寢于巨室而我噭噭然隨而哭之自以為不通乎命故止也㷀㷀在疚詩周頌遭家不造嬛嬛在疚鄭康成箋遭武王崩家道未成嬛嬛然孤特在憂病之中陸德明音釋嬛其傾反崔本作㷀聖善詩國風母氏聖善我無令人塞淵詩國風仲氏任只其心塞淵毛萇傳塞實也淵深也孔穎達正義其心誠實而深逺也九原禮記趙文子與叔譽觀乎九原據鄭康成注本是地名晉卿大夫之墓地在焉後人因之概呼墓地為九原矣齊侯之子詩國風碩人其頎衣錦褧衣齊侯之子衛侯之妻凝脂柔荑詩國風手如柔荑膚如凝脂日躋詩商頌聖敬曰躋毛萇傳躋升也三繅禮記世婦卒蠶奉繭以示于君遂獻繭于夫人及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅說文繅繹繭為絲也五獻左傳及享具五獻之籩豆于幕下杜預注朝聘之制大國之卿五獻中闈陸士衡詩哀響沸中闈梧桐半死枚乘七發龍門之桐髙百尺而無枝中鬱結之輪菌根扶疏以分離上有千仞之峯下臨百丈之溪湍流遡波又淡淡之其根半死半生王右丞集箋注卷二十六
