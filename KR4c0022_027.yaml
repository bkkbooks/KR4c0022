body:
  text: 王右丞集箋注巻二十七仁和趙殿成撰哀辭宋進馬哀辭并序宋進馬者中書舍人宋公之子也公無弟兄子一而已文則有種顧本作交則不擇德亦惟肖忽疾倐逝醫不及視宋公哀之他人悲之故為詞曰背春涉夏兮衆木藹以繁陰連金華與玉堂兮宫閣鬱其沉沉百官並入兮何語笑之啞啞君獨静默以傷心草王言兮不得辭裁悲減思兮少時裁劉本作我僕夫命駕兮出閶闔厯通逵陌上人兮如故識不識兮往來眼中不見兮吾兒驂紫騮兮從青驪低光垂彩兮怳不知其所之闢朱户兮望華軒意斯子兮侯門忽思瘞兮城南心瞀亂兮重昏仰訴天之不仁兮家惟一身身止一子何引嗣之不繁就單尠而又死將清白兮遺誰問詩禮兮已矣哀從中兮不可勝哀舊本作彎非豈暇料餘年兮復㡬餘一作天日黯黯兮頽曄頽一作隕鳥翩翩兮疾飛邈窮天兮不返疑有日兮來歸静言思兮永絶復驚呌兮沾衣驚一作號客有弔之者曰觀未始兮有物同委蛻兮胡悲且延陵兮未至况西河兮不知學無生兮庶可幸能聽于吾師金華漢書時上方向學鄭寛中張禹朝夕入説尚書論語于金華殿中師古曰金華殿在未央宫沉沉史記陳涉世家夥頥涉之為王沉沉者應劭曰沉沉宫室深䆳之貌也啞啞周易笑言啞啞孔穎達正義啞啞笑語之聲也草王言唐六典中書舍人掌侍奉進奏參議表章凡詔㫖制勅及璽書冊命皆按典故起草進畫既下則署而行之僕夫毛萇詩傳僕夫御夫也通逵謝靈運詩密親麗華苑軒甍飭通逵瞀亂楚辭忼慨絶兮不得中瞀亂兮迷惑潘岳寡婦賦思纒綿以瞀亂兮心摧傷以愴惻吕向註瞀亂迷惑也重昏楚辭余將董道而不豫兮固將重昏而終身王逸註昏亂也窮天鮑照凌煙樓銘重樹窮天通原盡目静言思詩國風静言思之寤辟有摽鄭康成箋言我也未始有物莊子古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣弗可以加矣其次以為有物矣將以生為表也以死為反也是以分已委蛻莊子孫子非汝有是天地之委蛻也郭象注氣自委結而蟬蛻也延陵禮記延陵季子適齊于其反也其長子死葬于嬴博之間孔子曰延陵季子吳之習于禮者也往而觀其葬焉其坎深不至泉其斂以時服既葬而封廣輪揜坎其高可隠也既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之于禮也其合矣乎西河史記子夏居西河教授為魏文侯師其子死哭之失明祭兵部房郎中文為人作維載月日朔某官某乙謹以酒脯之奠敬祭于故兵部郎中房公之靈嗚呼君子之才周而不器茍求行道未嘗私身沉静好謀話言必雅往嵗穀貴闗輔阻饑眷命自天發廩以賑中朝之使屬之鄙夫不敢自賢請子為介匹夫嫠婦黄口之孤鍾釜之施㒺不必當舉無棄粒野有頌聲國家厭兵革苦徵戍大召浮食以靖國人召字訛單車諭㫖萬里窮磧西度赤坂館于烏孫形勞者病神勞則夭棄成功于末路未復命而言謝死不廢命忠也尸而加紳寵也我盥而撫子瞑受含求仁得仁其誰不死玉闗之下素車威遲愁雲晝聚白雪春下絳旐從風車徒行哭至上京而不駐將返葬于闗東河活活而東注天慘慘而悲風道路猶長子實途窮人世如舊子實成空我有㫖酒以歆以餞想像明德歔欷出涕尚饗闗輔鮑照詩家世宅闗輔李善注闗闗中也漢書曰右扶風左馮翊京兆尹是為三輔阻饑虞書黎民阻饑孔安國傳阻難也衆人之難在于饑以靖國人左傳華元使向戍為左師老佐為司馬樂裔為司寇以靖國人烏孫漢書西域傳烏孫國大昆彌治赤谷城去長安八千九百里我盥而撫子瞑受含左傳荀偃卒而視不可含宣子盥而撫之曰事吳敢不如事主猶視欒懐子曰其為未卒事于齊故也乎乃復撫之曰主茍終所不嗣事于齊者有如河乃瞑受含玉闗太平寰宇記玉門闗在沙州夀昌縣西南一百十八里威遲顔延年詩隠憫徒御悲威遲良馬煩吕向注威遲馬行貌絳旐賀循葬禮杠今之旐也古以緇布為之絳繒題姓名而已不為畫飾活活詩國風河水洋洋北流活活毛萇傳活活流也我有㫖酒詩小雅我有㫖酒嘉賔式燕以敖為楊郎中祭李員外文維載月日朔行尚書司勲郎中賜緋魚袋楊元璋等謹以清酌少牢之奠敬祭于故左司員外郎李公之靈嗚呼大朴難名大辨若訥泊兮無兆汎然隨物泊顧本作治誤今校正直而好學敏以從事行隠于寡言文成于沉醉澡身浴德唯仁與義讀書甚解作賦彌工麗詞秀務奧義元通記言西掖起草南宫第五將姪伏波事嫂食先與甘衣必讓好口嘗其糲身席于藁結友一言同官一日徇我朋好㤀其身恤豈惟攜手亦將加膝明明天子惟賢是思恨馮唐之已老喜相如之同時罷刋書于虎觀將載筆于鳳池嗚呼病時七啓卧内一訣痛乾坤而忽窮嗟古今而長絶永言北首返葬東周何夫子之適去同衆人之若休厯千門而行哭動九陌而増愁馬悲鳴而笳咽雲寡色而風秋元璋等或結髪舊遊比肩同列悲薤歌之首路哀栁車之就轍嗟無見而空來痛不知而成列嗚呼哀哉尚饗司勲郎中唐六典吏部有司勲郎中一人從五品上緋魚袋總見二十二巻金魚袋注内清酌禮記凡祭宗廟之禮酒曰清酌孔穎達正義酌斟酌也言此酒甚清徹可斟酌也少牢鄭康成周禮註羊豕曰少牢左司員外郎唐六典尚書省有左司員外郎一人從六品上大辯若訥老子大辯若訥河上公註大辯者智無疑如訥者口無辭泊兮無兆老子我獨泊兮其未兆河上公註我獨泊然安静未有所欲之形兆沉醉晉書帝讓九錫公卿將勸進使阮籍為其辭籍沉醉㤀作臨時詣府使取之見籍方據案醉眠使者以告籍便書案使寫之無所改竄辭甚清壯為時所重澡身浴德禮記儒有澡身而浴德孔穎達正義澡身謂能澡潔其身不染濁也浴德謂沐浴于德以德自清也記言唐六典中書省有起居舍人二人從六品上掌修記言之史録天子之制誥德音如記事之制以記時政之損益年終則授之于國史注云起居舍人因起居注而名官焉古者人君言則右史書之即其任也李盖嘗為中書舍人者西掖西掖即中書省詳見二巻東掖垣注中起草見十一巻建禮門注中第五將姪後漢書第五倫傳或問倫曰公有私乎對曰吾兄子嘗病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎伏波事嫂後漢書馬援敬事寡嫂不冠不入廬口建武十七年璽書拜援伏波將軍力膝禮記進人若將加諸膝七啓成按枚乗作七發設言楚太子有疾而吳客往問之說七事以起發太子太子霍然病已云云曹子建効之作七啓然非疾病事七啓當作七發為是東周史記索隠按高誘曰東周成周故洛陽之地適去見三巻懸解注中若休賈誼服賦其生兮若浮其死兮若休師古注休息也九陌三輔遺事長安八街九陌雲寡色江淹恨賦隴雁少飛岱雲寡色比肩戰國策千里而一士是比肩而立薤歌古今注薤露蒿里並喪歌也出田横門人横自殺門人傷之為之悲歌言人命如薤上之露易晞滅也亦謂人死魂魄歸乎蒿里故有二章一章曰薤上朝露何易晞露晞明朝還復滋人死一去何時歸其二曰蒿里誰家地聚斂魂魄無賢愚鬼伯一何相催促人命不得少踟蹰至孝武時李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽􅀈者歌之世呼為挽歌首路顔延年詩改服飭徒旅首路跼險艱潘朂九錫文王師首路威風先逝李善注廣雅首向也栁車韻會􅬉喪車也通作栁釋名喪車其盖曰栁服䖍曰東郡謂廣轍車為栁李竒曰大牛車鄧展曰喪車也為兵部祭庫部王郎中文惟公宏量碩德抱義戴仁早離我見常守吾真朝稱端士世謂淳人夏官之職惟賢是寄既節五官兼選騎士宿衛扞城必由兹地速應為敏平分是貴決遣先馳曹無留事嗚呼積善無慶寢疾彌留唐肆求馬夜壑藏舟深悟幻境獨與道遊死而不㤀魂兮若休嗚呼某等何幸得備官屬泰然若春温兮如玉去德何永事生何促五情如喪百身不贖敬薦醴牢哀哀慟哭尚饗庫部郎中唐六典兵部有庫部郎中一人從五品上掌邦國軍州之戎器儀仗及冬至元正之陳設并祠祭葬之羽儀諸軍州之甲仗皆辨其出入之數量其繕造之功以分給焉我見華嚴經逺離我見無有我想夏官杜氏通典周禮夏官大司馬之職掌以九伐之法正邦國制軍詰禁以糺邦國領校人牧司職方司兵之屬即今兵部之任也五官淮南子兵畧訓夫論除謹動静時吏卒辨兵甲治正行五連什伯明鼔旗此尉之官也前後知險易見敵知難易發斥不㤀遺此候之官也隧路亟行輜治賦文均處軍輯井竈通此司空之官也收藏于後遷舍不離無淫輿無遺輜此輿之官也凡此五官之于將也猶身之有股肱手足也必擇其人技能其才使官勝其任人能其事告之以政申之以令使之若虎豹之有爪牙飛鳥之有六翮莫不為用騎士漢書百官公卿表屯騎校尉掌騎士宿衛後漢書百官志凡郎官皆主更直執㦸宿衛諸殿門彌留周書顧命篇病日臻既彌留孔安國作久留解唐肆求馬莊子汝殆著乎吾所以著也彼巳盡矣而汝求之以為有是求馬于唐肆也郭象注唐肆非停馬處也言求向者之有不可復得也人之生若馬之過肆耳恒無駐須臾新故之相續不舍晝夜也著見也言女殆見吾所以見者耳吾所以見者日新也故巳盡矣女安得有之夜壑藏舟莊子夫藏舟于壑藏山于澤謂之固矣然而夜半有力者負之而走昧者不知也道遊淮南子循天者與道遊者也隨人者與俗交者也如玉詩國風言念君子温其如玉孔穎達正義云我念君子之德行其心性温然其如玉無有瑕惡之處也五情曹植上責躬應詔詩表形影相弔五情愧赧劉良注五情喜怒哀樂怨也為人祭李舍人文年月日某以茶藥之奠祭于故舍人李公之靈嗚呼見人多矣未有如子生于德門長于貴里名高江夏之童童顧本作重今校正貌奪河陽之美行比曾顔才兼文史含恣輕肥仰偃紈綺惡如涕唾棄如塵滓比布衣以同年甘蔬食而沒齒嗚呼深入度門高居道源獨一静處寂默無言待草誡之真性歸化光之法尊曠無浄染頓離塵根豈期昨日分首别離未久萬法皆空一生何有無餘湼槃應無所受無漏智慧斯為不朽予以凡情哀哀其後世相謂然道心斯醜敢不從俗子其無咎德門南史謝氏自晉以降雅道相傳景恒景仁以德素傳美景懋景先以節義流譽方明行巳之度元暉藻繢之竒各擅一時可謂德門者矣江夏後漢書黄香字文彊江夏安陸人博學經典究精道術能文章京師號曰天下無雙江夏黄童河陽按晉書潘岳美姿儀嘗為河陽令浄染成唯識論染謂虛妄遍計所執浄謂真實圓成實性無漏智慧湼槃經我以無漏智慧熾火燒彼衆生諸煩惱結翻譯名義肇師云決定審理謂之智造心分别謂之慧天台云善入佛法名慧巧用佛法名智為人祭某官文惟公宏量碩德寡言敏行直而能婉和而不競闕儒墨為鋒鍔在顔冉之季孟白雲刑官繡衣使者時無寃人路多避馬既踐文昌來司武庫冀翟車之高足為鳳池之先路豈期位薄德崇才逺途窮拜命之時初一朝于北闕移疾于外不再入于南宫嗚呼哀輓悲笳寒天疎木宅不卜地祔于故塋家無餘財斂以時服弟難會𦵏兒未及哭其營䕶而奠遣惟甥姪與姻族某嘗同官實喜良友仰德彌高立言不朽居常接膝未忍分手况永訣兮無期向空筵而灑酒尚饗白雲刑官服䖍左傳注黄帝以雲名官盖春官為青雲氏夏官為縉雲氏秋官為白雲氏冬官為黑雲氏中官為黄雲氏繡衣使者漢書遣直指使者暴勝之等衣繡衣杖斧分部逐捕漢書蕭望之傳其後奸邪横暴羣盜並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之無寃人漢書于定國傳張釋之為廷尉天下無寃民武庫唐書百官志庫部郎中員外郎各一人掌戎器鹵簿儀仗元日冬至陳設祠祀喪葬辯其名數而供焉凡戎器色别而異處以衛尉幕士暴凉之京衛旗畫蹲獸立禽行幸則給飛走旗凡諸衛儀仗以御史涖其􅍥掌武庫器仗則兵部長官涖其修完京官五品以上征行者假甲纛旗幡矟諸衛給弓千牛給皁翟車按周禮翟車乃王后親桑所乗者非臣子所用疑翟字有誤立言不朽左傳太上有立德其次有立功其次有立言雖久不廢此之謂不朽為羽林將軍祭武大將軍文維年月日將軍某等謹以清酌少牢之奠祭于故大將軍武公之靈嗚呼武公命代出羣氣盖朔方勇冠六軍生長下國聲聞上天天子壯之命居北門北門伊何國之重寄羽林孤兒旄頭突騎罔不畢勸為之元帥帝在紫微與君為衛身恒披堅手不捨銳出乗天駟入並東第同官為寮出入五世顧我軍旅凜然遺風一日之長萬夫之雄身雖有極德不可窮嗚呼門館蒼黄風景凄凉櫪馬悲鳴角弓不張弔客接武哭聲滿堂嗚呼凡民有喪匍匐斯救况我武公屨及其霤盥而撫之唅玉當受敢不嗣事如公之舊羽林將軍唐六典左右羽林衛大將軍各一人正三品將軍各二人從三品掌統領北衙禁兵之法令而督攝左右廂飛騎之儀仗以統諸曹之職若大朝會則率其儀仗以周衛階陛若大駕行幸則夾馳道而為内仗凡飛騎每月番上者皆據其名厯而紀于所職其飛騎或有勅上南衙者則大將軍將軍承墨勅白移于金吾引駕仗引駕仗官與監門奏覆又降墨勅後得入朔方唐書地理志闗内道有夏州朔方郡羽林孤兒漢書武帝取從軍死事之子孫養羽林官教以五兵號羽林孤兒旄頭章懐太子後漢書注漢官儀曰舊選羽林為旄頭披髪先驅魏文帝列異傳曰秦文公時梓樹化為牛以騎擊之騎不勝或墮地髻解被髪牛畏之入水故秦因是置旄頭騎使先驅突騎漢書鼂錯傳輕車突騎師古注突騎言其驍銳可用衝突敵人也後漢書上谷太守耿况漁陽太守彭寵各遣其將吳漢寇恂等將突騎來助擊王郎章懐太子注突騎言能衝突軍陣紫微章懐太子後漢書注天有紫微宫是上帝之所居也王者立宫象而為之披堅漢書高帝紀朕親被堅執銳自帥士卒犯危難平暴亂師古曰被堅謂甲冑也執銳謂利兵也同官為寮左傳荀林父曰同官為寮匍匐斯救詩國風凡民有喪匍匐救之鄭康成箋匍匐言盡力也凡于民有凶禍之事鄰里尚盡力救之及霤左傳三進及溜而後視之孔穎達正義曰溜謂簷下水溜之處古字霤與溜通用為崔常侍祭牙門姜將軍文維大唐開元二十五年嵗次丁丑十一月辛未朔四日甲戌左散騎常侍河西節度副大使攝御史中丞崔公致祭于故姜公之靈嗚呼天子命之建旗西門帶甲十萬鐵騎雲屯横挑强冦飲馬河源嗟爾勇健表為牙門牙門伊何全齊大族四方有事誓死鳴轂前有血刃後有飛鏃其氣益振大呼馳逐翩翩白馬象弧雕服戈摏其喉矢集其目嗚呼天下無事今上好文爾有餘勇莫敢邀勲腰鞬白首蹉跎塞雲死于禆將誰統前軍家本秦人靈車東騖長天積雪邊城欲暮麾下行哭前旌抗路身有寳劒不佩而去轅有代馬悲鳴跼顧嗚呼我誡軍吏令送爾歸既素我服亦朱其衣黠虜未滅壯士長辭牢醴以祭太息歔欷尚饗牙門按杜氏通典牙門將冠服與將軍同魏文帝黄初中置明帝以胡烈為之又王隠晉書云陸機少襲父為牙門吳重武官故也晉恵帝特置四部牙門以汝南王祐為之蜀以趙雲為之唐時無此官名疑是軍中私署之職如押衙虞候之類一時稱謂爾爾雲屯陸機詩胡馬如雲屯越騎亦星羅横挑強冦漢書司馬遷傳李陵提步卒不滿五千深踐戎馬之地足厯王庭垂餌虎口横挑強冦仰億萬之師與單于連戰十餘日李善注臣瓚曰挑挑敵來戰也古謂之致師飲馬左傳楚子北師次于郔沈尹將中軍子重將左子反將右將飲馬于河而歸全齊大族唐書宰相世系表崔氏出自姜姓齊丁公伋嫡子季子讓國叔乙食采于崔遂為崔氏濟南東朝陽縣西北有崔氏城是也戈摏其喉左傳敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首于子駒之門矢集其目左傳楚君以鄭故親集矢于其目餘勇左傳齊高固入晉師桀石以投人禽之而乗其車繫桑本焉以狥齊壘曰欲勇者賈余餘勇腰鞬徐陵與楊僕射書佩弭腰鞬前旌庾信華林園馬射賦行漏抱刻前旌載鳶代馬韓詩外傳詩云代馬依北風飛鳥棲故巢皆不㤀本之謂也今本韓詩外傳無此文見李善文選注中悲鳴跼顧潘岳寡婦賦輪按軌以徐進兮馬悲鳴而跼顧劉良注跼顧踡跼顧盻不前也為王常侍祭沙陀鄯國夫人文維年月日朔河西節度使左散騎常侍王公遣總管石抱玉以酒牢之奠致祭于故沙陁鄯國夫人之靈嗚呼惟此淑德降于異域至性不師天姿靡飾禮容詎假于環珮工藝非因于組織行閨訓于穹廬成母儀于蕃國懿此清範夫人之則沙陀令門外家之力嗚呼夫人歸命干戈遂寢子孫扞城國家高枕居之右地革其左衽散辮垂鬟解裘衣錦嗚呼降年不永逺日方臨寂矣高堂飲珠含玉哀哉貴女刃面摧心嗚呼聖朝命我䕶此諸蕃夫人所出天子加恩能守漢制不効夷言馬無北首車必南轅教義所及忠信彌敦寶嘉内訓用潔斯樽尚饗沙陀唐書沙陀西突厥别部處月種也始突厥東西部分治烏孫故地與處月處蜜雜居貞觀七年太宗以鼔纛立利邲咄陸可汗而族人步真觖望謀並其弟彌射乃自立彌射匱特勒劫越之子賀魯統之西突厥寖彊内相攻其大酋乙毘咄陸可汗建廷鏃曷山之西號北廷而處月等又𨽻屬之處月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀突厥云咄陸寇伊州引二部兵圍天山安西都䕶郭孝恪擊走之㧞處月俟斤之城後乙毘可汗敗奔吐火羅賀魯來降詔拜瑶池都督徙其部廷州之莫賀城處月朱邪闕俟斤阿厥亦請内屬永徽初賀魯反而朱邪孤注亦殺招慰使連和引兵據牢山于是射脾俟斤沙陀那連不肯從高宗以賀魯所領授之明年弓月道總管梁建方契苾何力引兵斬孤注俘九千人又明年廢瑶池都督府即處月地置金滿沙陀二州皆領都督賀魯亡安撫大使阿史那彌射次伊麗水而處月來歸乃置崑陵都䕶府綂咄陸部以彌射為都䕶龍朔初以處月酋沙陀金山從武衛將軍薛仁貴討鐵勒授墨離軍討擊使長安二年進為金滿州都督累封張掖郡公金山死子輔國嗣先天初避吐蕃徙部北廷率其下入朝開元二年復領金滿州都督封其母鼠尼施為鄯國夫人輔國累爵永夀郡王蕃國周禮九州之外謂之蕃國世壹見各以其所貴寶為摯高枕漢書北狄不服中國未得高枕安寢也右地按漢書匈奴傳有左地右地盖其國制王侯大將皆分左右諸左王將居東方直上谷以東接穢貊朝鮮右王將居西方直上郡以西接月氏氐羌也刃面隋書突厥列傳有死者停屍帳中家人親屬多殺牛馬而祭之遶帳號呼以刀劃面血淚交下七度而止摧心潘岳寡婦賦少伶俜而偏孤兮痛忉怛以摧心南轅左傳令尹南轅反斾奉和聖製聖劄賜宰臣連珠詞五首應制原注時為庫部員外臣聞大名馭㝢天地同符間氣佐時君臣恊德故千年聖主唐帝撫其寶圗七德諸侯周公為之元老連珠傅元叙連珠曰所謂連珠者興于漢章帝之世班固賈逵傅毅三子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指說事情必假喻以達其㫖而覽者微悟合于古詩諷興之義欲使厯厯如貫珠易覩而可恱故謂之連珠也大明詩大雅有大明之章鄭康成箋云二聖相承其明德日以廣大故曰大明孔穎達正義云聖人之德終始實同但道加于民化有廣狹文王則纔及六州武王徧被天下論其積漸之功故云日以廣大以其益大故曰大明千年聖主庾信徵調曲聖人千年始一生黄河千年始一清元老詩小雅方叔元老克壯其猶毛萇傳元大也五官之長出于諸侯曰天子之老臣聞有其才者效其職重其任者竭其能故樂播大風乃能調四氣身騎列宿于是運三光樂播大風左傳吳公子札來聘請觀于周樂為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也四氣禮記動四氣之和孔穎達正義動四氣之和者謂感動四時之氣序之和平使陰陽順序也臣聞先天不違德合于上事君盡力功濟于下故君臣同體于大道庶人以康億兆宅心于至仁萬邦乃固臣聞形之端者影必隨焉聲之善者響必應焉故偃武修文皇天降之善氣薄賦省役后土報以豐年臣聞宣至理者文懸之于日月表聖言者字動之以煙雲故虞舜作歌徒施于典策伏羲畫卦未類于昭囘懸之日月揚雄答劉歆書是懸諸日月不刋之書也虞帝作歌虞書帝庸作歌曰勅天之命惟時惟㡬乃歌曰股肱喜哉元首起哉百工熈哉宫門誤不下鍵判安上門應閉主者誤不下鍵對設險守國金城九重迎賔逺方朱門四闢將以晝通阡陌宵禁姦非眷彼閽人實司是職當使秦王宫裏不失狐白之裘漢后廐中唯通赭馬之跡是乃不施金鍵空下鐵闗將謂堯人可封固無狗盜之侶王者無外有輕魚鑰之心過自慢生陷兹詿誤而抱闗為事空欲望于侯嬴或犯門有人將何禦于臧紇固當無疑必寘嚴科安上門長安志皇城南面三門正南曰朱雀門東曰安上門西曰含光門設險守國見周易坎卦金城史記金城千里索隠曰金城言其實且堅也四闢虞書闢四門閽人鄭康成周禮注閽人司昏晨以啓閉者狐白裘史記秦昭王囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之徧問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦王幸姬幸姬為言昭王昭王釋孟嘗君王者無外公羊傳王者無外臧紇左傳季孫怒命攻臧氏臧孫斬鹿門之闗以出奔邾王右丞集箋注巻二十七
