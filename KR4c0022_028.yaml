  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0022_WYG_028-1a, image: WYG1071/WYG1071-0342c.png}
body:
  text: 王右丞集箋注巻二十八仁和趙殿成撰論畫三首畫學祕訣夫畫道之中水墨最為上肇自然之性成造化之功或咫尺之圗寫千里之景東西南北宛爾目前春夏秋冬生于筆下初鋪水際忌為浮泛之山次布路岐莫作連綿之道主峰最宜高聳客山須是奔趨迴抱處僧舍可安水陸邊人家可置村庄著數樹以成林枝須抱體山崖合一水而瀑瀉泉不亂流渡口只宜寂寂人行須是疎疎泛舟檝之橋梁且宜高聳著漁人之釣艇低乃無妨懸崖險峻之間好安怪木峭壁巉巖之處莫可通途逺岫與雲容相接遥天共水色交光山鈎鏁處㳂流最出其中路接危時棧道可安于此平地樓臺偏宜高栁映人家名山寺觀雅稱竒杉襯樓閣逺景煙籠深巖雲鎖酒旗則當路高懸客帆宜遇水低掛逺山須宜低排近樹惟宜㧞迸手親筆硯之餘有時遊戲三昧嵗月遥永頗探幽微妙悟者不在多言善學者還從規矩塔頂參天不須見殿似有似無或上或下茅堆土埠半露簷厫草舍廬亭畧呈檣橣山分八面石有三方閒雲切忌芝草様人物不過一寸許松柏上現二尺長凡畫山水意在筆先丈山尺樹寸馬分人逺人無目逺樹無枝逺山無石隠隠如眉逺水無波高與雲齊此是訣也山腰雲塞石壁泉塞樓臺樹塞道路人塞石看三面路看兩頭樹看頂𩕳水看風脚此是法也凡畫山水平夷頂尖者巔峭峻相連者嶺有穴者岫峭壁者崖懸石者巖形圓者巒路通者川兩山夾道名為壑也兩山夾水名為澗也似嶺而高者名為陵也極目而平者名為坂也依此者粗知山水之髣髴也觀者先看氣象後辯清濁定賔主之朝揖列羣峰之威儀多則亂少則慢不多不少要分逺近逺山不得連近山逺水不得連近水山腰掩抱寺舍可安斷岸坂堤小橋可置布路處則林木岸絶處則古渡水斷處則煙樹水濶處則征㠶林密處則居舍臨巖古木根斷而纒藤臨流石岸欹竒而水痕凡畫林木逺者踈平近者高密有葉者枝嫩柔無葉者枝硬勁松皮如鱗柏皮纒身生土上者根長而莖直生石上者拳曲而伶仃古木節多而半死寒林扶疎而蕭森有雨不分天地不辯東西有風無雨只看樹枝有雨無風樹頭低壓行人傘笠漁父蓑衣雨霽則雲收天碧薄霧霏微山添翠潤日近斜暉早景則千山欲曉霧靄微微朦朧殘月氣色昏迷晩景則山銜紅日㠶捲江渚路行人急半掩柴扉春景則霧鎻煙籠長煙引素水如藍染山色漸青夏景則古木蔽天綠水無波穿雲瀑布近水幽亭秋景則天如水色簇簇幽林雁鴻秋水蘆鳥沙汀冬景則借地為雪樵者負薪漁舟倚岸水淺沙平凡畫山水須按四時或曰煙籠霧鎻或曰楚岫雲歸或曰秋天曉霽或曰古塜斷碑或曰洞庭春色或曰路荒人迷如此之類謂之畫題山頭不得一様樹頭不得一般山藉樹而為衣樹藉山而為骨樹不可繁要見山之秀麗山不可亂須顯樹之精神能如此者可謂名手之畫山水也石刻二則夫畫道之中水墨最為上肇自然之性成造化之功展或大或小之圗寫百里千里之景東西南北宛爾目前春夏秋冬生于筆下初鋪水際忌為浮泛之山已有路岐莫作連綿之道主位唯宜高聳客山須是奔趨迴抱處僧舍可安水陸邊人村可着數株樹以成林枝須抱體一水通而瀑㵼泉可亂流渡口只宜寂寂人行須是疎疎唯舟檝之橋梁且宜高聳通漁人之釣艇低乃無妨懸崖險峻之間好安怪木峭㧞千尋之處莫可通途逺岫與雲容相接遥天共水色交光山鉤鏁處㳂流最出其中路接危時棧道可安兹地樓閣偏宜栁映人村但把煙瞑酒旗則當途高掛客㠶宜雲水低張逺山須要低排近樹唯宜㧞迸手親筆硯之外未嘗虛度光陰有時餘暇除此縈絆嵗月遥永頗探幽微先生黌苑之間意同斯矣無隠友人求予畫遂書之也太原王摩詰集古堂記吾友薛無隠長安人少有志操既冠不復應舉學行聲名西北士人甚高之以飲酒吟詩為樂日道千首而不勞酒飲一石而不醉自稱逍遥子累求予戲墨十三年許之長沙一見告行掃之小軸四時之景以償前願長安有好事者無隠也此畫能飽人矣能醉人矣但饑渴時聊展而有驗矣太原王維石刻在闗中前後有薛氏家藏并太原王維之記二印後有唐賢題名云洛州刺史徐嶠之節度使孫志真杭州刺史杜濟夀州刺史張鑑祕書監陸齊望臨汝太守韋斌朝議大夫徐浩節度使李元諒節度使李昌言節度使李祐節度使李聽節度使何進滔吏部尚書高元裕御史中丞裴曠節度使韋正貫節度使樊澤祕書丞王守真汀州刺史沈珍少府監胡况有唐十九名賢前後皆閱摩詰畫嘗題又有高陽沈光庭䟦曰得此圗并書迹及唐賢觀題遂排列刋石于永興嘉祐二年八月十五日題成按焦竑經籍志有王維山水論一巻集中無之後閱說郛至九十一巻有王維所著畫學祕訣一篇知焦氏所稱即此是矣焦氏盖本之王世貞畫苑洎詹景鳳著畫苑補益採録後一則作荆浩畫山水賦後之評題繪事者援引摘句多稱王維不稱荆浩然考其辭語殊不類盛唐人况維文章筆墨冠天下宜有絶妙好辭以寫其胸中所得之祕傳為模範以啓佑後人乃卑卑無甚雋言其為後人所託又何疑焉石刻二則其前一則與祕訣中首則微有異同後一則語亦凡近不能佳殆非維真筆也東觀餘論云俗傳石本王摩詰所畫四時山水上有摩詰薛邕等印盖今淺俗所為見之令人鄙吝生而士大夫或收藏甚者張于屋壁是可嘆也嗟夫畫既偽矣其題記又安見為真哉顧其傳世已久姑且存之别為一巻以殿于詩文之後俾愛竒之士無嘆其闕畧焉耳至宋韓拙山水純全論中引右丞之言有路欲斷而不斷水欲流而不流之句又有松不離于弟兄謂高低相亞亦有子孫謂新枝相續數語苦無全文可稽並附識于此以為談繪事者之考則焉王右丞集箋注巻二十八
