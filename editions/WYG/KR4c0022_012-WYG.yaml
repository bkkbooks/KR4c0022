body:
  text: 王右丞集箋注巻十二仁和趙殿成撰近體詩十六首春過賀遂員外藥園前年槿籬故今作藥欄成香草為君子名花是長卿水穿盤石透藤繋古松生畫為開㕑走來䝉倒屣迎蔗漿菰米飯蒟醬露葵羮頗識灌園意於陵不自輕藥園唐李華賀遂員外藥園小山池記賀遂公衣冠之鴻鵠執憲起草不塵其心夢寐以青山白雲為念庭際有砥礪之材礎礩之璞立而像之衡巫堂下有畚􅓩之􅉾圩塓之凹陂而象之江湖種竹藝藥以佐正性華實相蔽百有餘品鑿井引汲伏源出山聲聞池中尋竇而發泉躍波轉而盈沿支流脉散而滿畦一夫躡輪而三江逼户十指攢石而羣山倚蹊智與化侔至人之用也其間有書堂琴軒置酒娛賔卑痺而敞若雲天尋丈而豁如江漢以小觀大則天下之理盡矣心目所自不忘乎賦情遣辭取興兹境當代文士目為詩園道在抑末敦元可以扶教趙郡李華舉其畧而記之槿籬沈約詩槿籬踈復密通志畧木槿人多植庭院間亦可作籬故謂之槿籬香草楚辭章句離騷之文依詩取興引類譬喻故善鳥香草以配忠貞惡禽臭物以比讒侫靈修美人以嫓于君宓妃佚女以譬賢臣虬龍鸞鳯以托君子飄風雲霓以為小人長卿謂司馬長卿也喻風流艶麗之意白樂天東亭詩云緑樹為閒客紅蕉當美人亦是此意或謂是草中之徐長卿盖本蕭子雲賦長卿晚翠簡子秋紅之句而云然成按蜀本草徐長卿生下濕川澤之間苗似小麥兩葉相對三月苗靑七月八月著子似蘿摩子而小九月苗黄十月凋初非竒英珍草與名花意不貫開厨晉書顧愷之嘗以一厨畫糊題其前寄桓元皆其深所珍惜者元乃發其厨後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色南史時有高平郗紹作晋中興書數以示何法盛法盛有意圖之紹不與至書成在齋内厨中法盛詣紹紹不在直入竊書紹還失之無復兼本于是遂行何書是書畫二者皆有開厨失去之事愚意究以畫字為是蒟醬史記使番陽令唐蒙風指曉南越南越食蒙蜀蒟醬裴駰集解徐廣曰枸一作蒟音寠駰按漢書音義曰枸木似穀樹其葉似桑葉用其葉作醬酢美蜀人以為珍味索隠曰按晋灼枸音矩劉德云枸樹如桑其椹長二三寸味酢取其實以為醬美小顔云枸者縁木而生非樹也今蜀土家出枸實不長二三寸味卒似薑不酢劉説非也廣志云枸色黒味辛下氣消穀劉淵林蜀都賦註蒟醬縁樹而生其子如桑椹熟時正青長二三寸以蜜藏而食之味香温調五臟南方草木狀蒟醬蓽茇也生于蕃國者大而紫謂之蓽茇生于番禺者小而青謂之蒟焉可以為食故謂之醬焉交趾九眞人家多種蔓生河南嚴尹弟見宿弊廬訪别人賦十韻上客能論道吾生學養蒙貧交世情外才子古人中冠上方簪豸簪文苑英華作安車邊已畫熊拂衣迎五馬垂手憑雙童花醥和松屑醥一作醴茶香透竹叢薄霜澄夜月殘雪帯春風古壁蒼苔黒寒山逺燒紅眼看東候别心事北山同山文苑英華作川為學輕先軰為文苑英華作若何能訪老翁欲知今日後不樂為車公養蒙字出周易蒙卦簪豸獨斷法冠楚冠也一曰柱後惠文冠高五寸以纚裹鐵柱巻秦制執法服之今御史廷尉監平服之謂之獬豸冠獬豸獸名一角今冠兩角以獬豸為名非也劉昫唐書輿服志法冠一名獬豸冠以鐵為柱其上施珠兩枚為獬豸之形左右御史䑓流内九品以上服之畫熊劉昭後漢書輿服志註古今註曰武帝天漢四年令諸侯王大國朱輪特虎居前左兕右麋小國朱輪畫特熊居前寢麋居左右卿車者也醥左思蜀都賦觴以淸醥李周翰註醥清酒也候候謂封土為壇以記里也唐制五里隻候十里雙候韓昌黎路旁堠詩堆堆路傍堠一雙復一隻是也北山申公詩說北山大夫行役不得以養其父母而作此詩先軰成按先輩有三義一為尊敬之稱國史補云進士互相推敬謂之先軰是也一為已第之稱演繁露云唐世舉人呼已第者為先輩是也一為先達之稱魏志陶謙傳註郡守張磐同郡先輩與謙父友意殊親之吴志闞澤傳州里先輩丹陽唐固亦終身積學稱為儒者隋書經籍志班固為蘭䑓令史與諸先輩陳宗尹敏孟冀等共成光武本紀是也右丞此句當作先達解車公晉書車𦙍善于賞㑹當時毎有盛坐而𦙍不在皆云無車公不樂謝安游集之日輒開筵待之送祕書晁監還日本國并序還極元集文苑英華唐詩正音俱作歸又極元集唐詩品彚俱無國字舜覲羣后有苗不服服一本作格禹㑹諸侯防風後至動干戚之舞興斧鉞之誅乃貢九牧之金始頒五瑞之玉我開元天地大寶聖文神武應道皇帝大道之行先天布化乾元廣運涵育無垠苦垂為東道之標戴勝為西門之候豈甘心于卭杖非徵貢于苞茅亦由呼韓來朝舍于蒲陶之館卑彌遣使報以蛟龍之錦犧牲玉帛以將厚意服食器用不寶逺物百神受職五老告期况乎戴髮含齒得不稽顙屈膝海東國日本為大服聖人之訓有君子之風正朔本乎夏時衣裳同乎漢制歷歲方達繼舊好于行人滔天無涯貢方物于天子司儀加等位在王侯之先掌次改觀不居蠻夷之邸我無爾詐爾無我虞彼以好來廢闗弛禁上敷文教虛至實歸上顧元緯本作止故人民雜居往來如市晁司馬晁舊本作朝盖古字朝晁通用故也顧元緯以朝字為誤眞誤矣結髮游聖負笈辭親問禮于老􅅨學詩于子夏魯借車馬孔子遂適于宗周鄭獻縞衣季札始通于上國名成太學官至客卿必齊之姜不歸娶于髙國在楚猶晉亦何獨于由余遊宦三年願以君羮遺母不居一國欲其晝錦還鄉莊舄既顯而思歸闗羽報恩而終去于是馳首北闕裹足東轅馳一本作稽裹一本作裏俱非篋命賜之衣懐敬問之詔金簡玉字傳道經于絶域之人方鼎彜樽致分器于異姓之國琅邪䑓上迴望龍門碣石館前夐然鳥逝鯨魚噴浪則萬里倒迴鷁首乗雲則八風却走扶桑若薺鬰島如萍萍一本作浮沃白日而簸三山浮蒼天而吞九域黄雀之風動地黑蜃之氣成雲淼不知其所之何相思之可寄嘻去帝鄉之故舊謁本朝之君臣詠七子之詩佩兩國之印恢我王度諭彼蕃臣三寸猶在樂毅辭燕而未老十年在外信陵歸魏而逾尊子其行乎余贈言者積水不可極安知滄海東九州何處逺逺極元集作所萬里若乗空向國惟看日歸帆但信風㠶一作途鰲身映天黑魚眼射波紅魚一作蜃鄉樹扶桑外主人孤島中别離方異域音信若為通祕書監唐書百官志祕書省監一人從三品少監二人從二品上晁監唐書日本傳長安元年遣朝臣眞人粟田貢方物開元初粟田復朝請從諸儒授經詔四門助教趙元黙即鴻臚寺為師獻大幅布為贄悉賞物貿書以歸其副朝臣仲滿慕華不肯去易姓名曰朝衡歷左補闕儀王友多所該識久乃還天寶十二載朝衡復入朝上元中擢左散騎常侍安南都䕶日本唐書日本古倭奴也去京師萬四千里直新羅東南在海中島而居東西五月行南北三月行國無城郭聨木為栅落以草茨屋左右小島五十餘皆自名國而臣附之後稍習夏音惡倭名更號日本使者自言國近日所出以為名或云日本乃小國為倭所并故冒其號使者不以情故疑焉有苖韓非子當舜之時有苖不服禹將伐之舜曰不可上德不厚而行武非道也乃修教三年執干戚舞有苖乃服防風博物志禹平天下㑹諸侯㑹稽之野防風氏後到殺之九牧金左傳昔夏之方有德也逺方圖物貢金九牧鑄鼎象物五瑞玉尚書輯五瑞孔顆達正義周禮典瑞云公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧是圭璧為五等之瑞諸侯執之以為王者瑞信故稱瑞也尊號劉昫唐書元宗本紀天寶八載閏六月丙寅羣臣上皇帝尊號為開元天地大寶聖文神武應道皇帝先天周易先天而天弗違後天而奉天時廣運尚書大禹謨帝徳廣運孔安國傳廣謂所覆者大運謂所及者逺㴠育宋書顧顗之傳夫聖人虛懐以㴠育凝明以洞照無垠屈原九章穆渺渺之無垠廣韻垠岸也苦垂苦垂未詳徐宗伯全唐詩録作若華成按大荒北經泂野之山有赤樹青葉赤華名曰若木郭璞註生崑崙西附西極其花光赤下照地非東方之木疑非是標郭璞江賦峨嵋為泉陽之揭玉壘作東别之標李善註標表也戴勝山海經西山經玉山是西王母所居也西王母其狀如人豹尾虎齒而善嘯蓬髮戴勝是司天之厲及五殘郭璞註勝玉勝也音龎又大荒西經崑崙之邱有人戴勝虎齒有豹尾穴處名曰西王母候後漢書百官志門有門候三輔黄圖漢城門皆有候門候主候時謹啟閉也卭杖史記博望侯張騫使大夏來言居大夏時見蜀布卭竹杖使問所從來曰從東南身毒國可數千里得蜀賈人市或聞卭西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匈奴隔其道誠通蜀身毒國道便近有利無害于是天子乃令王然于栢始昌吕越人等使間出西夷西指求身毒國正義曰卭都卭山出此竹因名卭竹節髙實中或寄生可為杖包茅左傳齊侯以諸侯之師伐楚楚子使與師言管仲對曰爾貢包茅不入王祭不供無以縮酒寡人是徴杜預註包裹束也茅菁茅也束茅而灌之以酒為縮酒蒲陶館漢書元壽二年單于來朝上以太歳厭勝所在舍之上林苑蒲陶宫成按此是烏珠留單于事非呼韓邪盖誤用也卑彌魏志倭國亂相攻伐歷年乃共立一女子為王名曰卑彌呼事鬼道能惑衆景初二年六月倭女王遣大夫難升米等詣郡求詣天子朝獻其年十二月詔書報倭女王曰制詔親魏倭王卑彌呼帯方太守劉夏遣使送汝大夫難升米次使都市牛利奉汝所獻男生口四人女生口六人班布二疋二丈以到汝所在踰逺乃遣使貢獻是汝之忠孝我甚哀汝今以絳地交龍錦五匹絳地縐粟罽十張蒨絳五十匹紺青五十匹荅汝所獻貢直不寶逺物尚書旅􅋙不寶逺物則逺人格百神受職禮記故禮行于郊而百神受職焉孔穎達正義百神天之羣神也王郊天備禮則星辰不忒故云受職五老沈約宋書堯率舜等升首山遵河渚有五老遊焉盖五星之精也相謂曰河圖將來告帝以期知我者重瞳黄姚五老因飛為流星上入昴戴髮含齒列子有七尺之骸手足之異戴髮含齒倚而趨者謂之人王侯先漢書匈奴傳呼韓邪單于朝天子于甘泉宫漢寵以殊禮位在諸侯王上贊謁稱臣而不名掌次周禮掌次掌王次之法以待張事王大旅上帝則張氊案設皇邸朝日祀五帝則張大次小次設重帟重案合諸侯亦如之師田則張幕設重帟重案諸侯朝覲會同則張大次小次蠻夷邸後漢書西域傳傳送京師縣蠻夷邸章懐太子註蠻夷皆置邸以居之若今鴻臚寺也三輔黄圗蠻夷邸在長安城内藁街爾詐我虞左傳宋及楚平華元為質盟曰我無爾詐爾無我虞文教禹貢三百里揆文教二百里奮武衛問禮家語孔子問禮于老聃訪樂于萇宏學詩家語卜商衛人字子夏習于詩能通其義以文學著名魯借車馬家語孔子謂南宫敬叔曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也今將往矣對曰謹受命遂言于魯君曰孔子將適周觀先王之遺制考禮樂之所極斯大業也君曷以乗資之臣請與往公曰諾與孔子車一乗馬二疋䜿子侍御敬叔與俱至周縞衣左傳襄二十九年呉公子札聘于鄭見子産如舊相識與之縞帯子産獻紵衣焉縞衣字疑誤上國左傳昭二十七年吳子使延州來季于聘于上國孔穎達正義服䖍云上國中國也盖以呉辟在東南地勢卑下中國在其上流故謂中國為上國也下云遂聘于晉則上國之言不包晉矣當總謂宋衛陳鄭之徒為上國耳齊姜詩豈其娶妻必齊之姜娶高國左傳齊侯伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶于髙國杜預註高氏國氏齊貴族也無存欲必有功還取卿相之女在楚猶晉左傳茍有寡君在楚猶在晉也由余史記戎王使由余于秦由余其先晉人也亡入戎能晉言聞穆公賢故使由余觀秦秦穆公退而問内史廖曰孤聞隣國有聖人敵國之憂也今由余賢寡人之害將奈之何内史廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以䟽其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠于政繆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡詧而後令内史廖以女樂二八遺戎王戎王受而悦之終年不還于是秦乃歸由余由余數諫不聽穆公又數使人間要由余由余遂去降秦遺母左傳潁考叔為潁谷封人有獻于公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之不居一國漢書賢者不獨居一國范蠡徧遊天下由余去戎入秦晝錦前漢紀朱買臣拜㑹稽太守上謂之曰富貴不歸故鄉如衣錦夜行今還故鄉富貴于子何如買臣頓首謝上莊舄史記越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪貴富矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也闗羽三國志曹公擒闗羽以歸拜為偏將軍禮之甚厚而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問羽羽嘆曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立效以報曹公乃去及既殺顔良曹公知其必去重加賞賜乃盡封其所賜拜書告辭而奔先主于袁軍裹足後漢書郅惲傳君不授􅂹以重任􅂹亦俛首裹足而去耳敬問詔漢書孝文前六年遺匈奴書曰皇帝敬問匈奴大單于無恙金簡玉字吴越春秋禹登宛委山發金簡之書案金簡玉字得通水之理方鼎左傳晉侯賜子産莒之二方鼎孔穎達正義曰服䖍云鼎三足則圓四足則方彜樽國語出其尊彜韋昭解尊彜皆受酒之噐尚書叙武王既勝殷邦諸侯班宗彜作分噐孔安國傳賦宗廟彜器酒樽賜諸侯孔穎達正義周禮有司尊彜之官鄭云彜亦尊也鬰鬯曰彜彜法也言為尊之法正然則盛鬯者為彜盛酒者為尊皆祭宗廟之酒器也琅琊䑓山海經琅琊䑓在渤海間琅琊之東郭璞註今琅琊在海邊有山嶣嶤特起狀如高臺此即琅琊臺也史記正義琅琊山在密州東南百三十里琅琊臺在山上水經註琅琊山名也越王句踐之故國也句踐并吳欲覇中國徙都琅琊秦始皇二十六年滅齊以為郡城即秦王之所築也遂登琅琊大樂之作層臺于其上謂琅琊臺臺在城東南十里孤立特顯出于衆山上下周二十餘里傍濵巨海秦王樂之因留三月乃徙黔首三萬戸于琅琊山下復十二年所作臺基三層層髙三丈上級平敞方二百餘歩高五里刋石立碑紀秦功德輿地廣記越王句踐欲霸中國徙都琅琊起觀臺于山周七里以望東海龍門髙誘淮南子註龍門河之隘也在左馮翊太平寰宇記龍門山在同州韓城縣北五十里禹貢所謂導河積石至于龍門三秦記云河津一名龍門外懸泉而兩旁有山川陸不通魚鱉莫上故江河大魚有暴腮龍門之困碣石水經註濡水又東南至絫縣碣石山文穎曰碣石在遼西絫縣王莽之選武也絫縣并屬臨渝王莽更臨渝為憑德地理志曰大碣石山在右北平驪城縣西南王莽改曰碣石也漢武帝亦嘗登之以望巨海而勒其石于此今枕海有石如甬道數十里當山頂有大石如柱形往往而見立于巨海之中潮水大至及潮波退不動不没不知深淺世名之天橋柱也狀若人造要亦非人力所就韋昭亦指此以為碣石也輿地廣記平州石城縣有禹貢碣石山秦皇漢武皆登之以望巨海其石碣然而立在海旁故名之晉太康地志云秦築長城所起于碣石在今髙麗界非此碣石也王應麟通鑑地理通釋碣石在平州石城縣西南漢右北平郡驪城縣碣然而立在海旁其山昔在河口海濵歷世既久為水所漸淪入于海去岸五百餘里禹貢夾右碣石入于河山海經碣石之山純水出焉註水經曰今在遼西臨渝縣南水中秦皇刻碣石門登之以望巨海通典碣石山在漢樂浪郡遂城縣長城起于此山長城東截遼水而入髙麗遺趾猶存鳥逝木華海賦望濤逺決冏然鳥逝鯨魚古今註鯨魚者海魚也大者長千里小者數十丈一生數萬子常以五月六月就岸邊生子至七八月導從其子還大海中鼓浪成雷噴沫為雨水族驚畏皆逃匿莫敢當者其雌曰鯢大者亦長千里眼為明月珠鷁首淮南子龍舟鷁首浮吹以娛髙誘註鷁大鳥也畫其像著船頭故曰鷁首也八風淮南子何謂八風東北曰炎風東方曰條風東南曰景風南方曰巨風西南曰凉風西方曰飂風西北方曰麗風北方曰寒風扶桑十洲記扶桑在碧海之中地方萬里上有太帝宮太眞東王父所治處地多林木葉皆如桑又有椹樹長者數千丈大二千餘圍樹兩兩同根偶生更相依倚是以名為扶桑仙人食其椹而一體皆作金光色飛翔空元其樹雖大其葉椹故如中夏之桑也但椹稀而色赤九千歲一生實耳味絶甘香美南史扶桑國者齊永元元年其國沙門慧深來至荆州說云扶桑在大漢國東二萬餘里地在中國之東其上多扶桑木故以為名扶桑葉似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為錦若薺顔氏家訓羅浮山記云望平地樹如薺戴暠詩今上闗山望長安樹如薺薛道衡詩遥原樹若薺逺水舟如葉鬰島水經註東北海中有大洲謂之郁洲山海經所謂郁山在海中者也言是山自蒼梧徙此云山上猶有南方草木今郁州治故崔季珪之敘述初賦言郁州者故蒼梧之山也心悦而怪之聞其上有仙人石室也乃往觀見一道人獨處休休然不談不對顧非已及也即其賦所云吾夕濟于郁洲者也太平寰宇記海州東海縣本秦末田横所保鬰洲亦曰郁州亦謂之田横島為贑榆縣之地宋泰始六年失淮北于鬰洲上僑立青州即此地一統志淮安府海州朐山東北海中有大洲謂之鬰洲又名郁州一名郁州山一名蒼梧山或云昔從蒼梧飛來九域李善文選註韓詩云方命厥后奄有九域薛君曰九域九州也黄雀風周處風土記六月則有東南長風俗名黄雀長風時海魚變為黄雀因為名也蜃氣埤雅蜃形似蛇而大腰以下鱗盡逆一曰狀似螭龍有耳有角背鬛作紅色噓氣成樓臺望之丹碧隱然如在烟霧高鳥倦飛就之以息喜且至氣輙吸之而下今俗謂之蜃樓將雨即見史記曰海旁蜃氣成樓臺廣野氣成宫闕即此是也七子詩魏文帝典論今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應瑒東平劉楨斯七子者於學無所遺於辭無所假咸自以騁騏驥於千里仰齊足而並馳王度左傳思我王度式如玉式如金樂毅戰國策昌國君樂毅為燕昭王合五國之兵而攻齊下七十餘城盡郡縣之以屬燕三城未下而燕昭王死惠王即位用齊人反間疑樂毅而使騎劫代之將樂毅奔趙趙封以為望諸君信陵史記信陵君列傳公子留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使往請公子公子歸救魏魏王見公子相與泣而以上將軍印授公子公子遂將率五國之兵破秦軍于河外走蒙鷔遂乗勝逐秦軍至凾谷闗抑秦兵秦兵不敢出當是時公子威震天下積水荀子積土而為山積水而為海鰲楚辭章句鰲大龜也送徐郎中徐顧元緯本凌本俱作禰東郊春草色草色顧元緯本作色早驅馬去悠悠况復鄉山外猿啼湘水流島夷傳露版江館候鳴騶卉服為諸吏珠官拜本州孤鶯吟逺墅野杏發山郵早晩方歸奏南中絶忌秋絶諸本皆作纔今從唐詩品彚及顧可久本作絶湘水王應麟通鑑地理通釋湘水出全州清湘縣陽朔山東入洞庭北至衡州衡陽縣入江唐六典註湘水出桂州湘源縣北流歷永衡潭岳四州界入洞庭露版宋書謝靈運傳孟顗露版上言郵廣雅郵驛也南中華陽國志晉㤗始六年初置蜀之南中諸郡南中在昔盖夷越之地送熊九赴任安陽安劉本顧可久本俱作洛誤魏國應劉後寂寥文雅空漳河如舊日之子繼清風阡陌銅臺下閭閻金虎中送車盈灞上輕騎出闗東相去千餘里西園明月同安陽唐書地理志相州鄴郡有安陽縣應劉魏志始文帝為五官將及平原侯植皆好文學汝南應瑒字德璉東平劉楨字公幹並見友善謝莊月賦陳王初䘮應劉端憂多暇漳河杜氏通典漳水在相州鄴縣西元和郡縣志濁漳水在相州鄴縣北五里銅臺水經注鄴城之西北有三臺皆因城為基巍然崇舉其高若山建安十五年魏武所起其中曰銅雀臺高十丈有屋百餘間一統志銅雀臺在漳德府臨漳縣治西魏曹操築并金虎氷井三臺相去各六十歩其上複道樓閣相通中央懸絶鑄大銅雀高一丈五尺置之樓頂金虎魏志建安十八年九月作金虎臺鑿渠引漳水入白溝以通河一統志金虎臺在漳徳府臨漳縣治西南鄴鎮曹操于臺下鑿渠引漳水入白溝遺趾尚存灞上元和郡縣志白鹿原在萬年縣東二十里亦謂之霸上漢文帝葬其上謂之霸陵王仲宣詩曰南登霸陵岸回首望長安即此也雍録霸上霸水之上也亦曰霸頭輕騎史記劉敬傳輕騎一日一夜可以至秦中西園曹子建公讌詩公子敬愛客終宴不知疲清夜遊西園飛盖相追隨明月澄清景列宿正参差沈約詩西園遊上才吕向註西園謂魏氏鄴都之西園也文帝毎以月夜集文人才子共遊于西園一統志西園在漳徳府鄴縣舊治魏曹操所作送李太守赴上洛商山包楚鄧積翠藹沉沉驛路飛泉灑闗門落照深野花開古戍行客響空林板屋春多雨山城晝欲隂丹泉通虢畧白羽抵荆岑若見西山爽應知黄綺心上洛按唐書地理志商州上洛郡屬關内道楚鄧太平寰宇記商州東至鄧州七百里闗門南都賦是以闗門反距漢徳久長水經註晉地道記曰嶢闗當上洛縣西北括地志故武闗在商州商洛縣東九十里唐書地理志商州上洛郡商洛縣東有武闗板屋詩在其板屋丹泉水經丹水出京兆上洛縣西北冢嶺山東南過其縣南又東南過商縣南又東南至于丹水縣入于汋一統志丹水出商縣竹山東流入河南界虢畧左傳東盡虢畧孔頴達正義云虢畧虢之境界也後漢書郡國志𢎞農郡陸渾西有虢畧地太平寰宇記商州北至虢州四百里白羽杜預左傳註析楚邑一名白羽今南鄉析縣水經註淅水又東逕淅縣故城北盖春秋之白羽也輿地廣記鄧州内鄉縣本楚之白羽邑春秋昭十八年許遷于白羽後改為析漢屬𢎞農郡後漢屬南陽郡晉屬順陽郡後曰西淅置淅陽郡後周改曰中鄉隋改中鄉曰内鄉屬淅陽郡唐屬鄧州荆岑王粲登樓賦蔽荆山之髙岑李善註漢書臨沮縣荆山在東北也西山爽世說王子猷作桓車騎參軍桓謂王曰卿在府久比當相料理初不答直髙視以手扳拄頰云西山朝來致有爽氣黄綺髙士傳四皓者皆河内軹人也或在汲一曰東園公二曰甪里先生三曰綺里季四曰夏黄公皆修道潔巳非義不動秦始皇時見秦政虐乃退入藍田山而作歌曰莫莫高山深谷逶迤曄􅁮紫芝可以療饑唐虞世逺吾將何歸駟馬高盖其憂甚大富貴之畏人不如貧賤之肆志乃共入商雒隱地肺山以待天下定及秦敗漢髙聞而徵之不至深自匿終南山不能屈已陶潛詩咄咄俗中愚且當從黄綺成按詩中複二泉字三山字凡十二見地形竟無太守意古人不以為病李于鱗選唐詩去取極刻亦登此首則詩之所尚概可知矣彼吹毛索垢者必執一例以繩古人之詩又安能得佳搆于牝牡驪黄之外哉遊感化寺文苑英華作遊化感寺翡翠香烟合瑠璃寶地平地凌本唐詩正音唐詩品彚俱作殿龍宮連棟宇虎穴傍簷楹谷静惟松響山深無鳥聲瓊峰當户拆金澗透林鳴鳴文苑英華唐詩品彚俱作明郢路雲端迥秦川雨外晴雁王銜果獻雁一作鳯非鹿女踏花行踏文苑英華作蹈抖擻辭貧里歸依宿化城繞籬生野蕨空館發山櫻香飯青菰米菰一作萌嘉蔬緑芋羮緑一作紫芋文苑英華唐詩品彚俱作笋羮文苑英華作莖誓陪清梵末端坐學無生翡翠梁簡文帝詠烟詩欲持翡翠色瑠璃法華經地平如掌瑠璃所成簷楹謝惠連詩落日隱簷楹金澗鮑照詩霜崖滅土膏金澗側泉脈雁王佛報恩經有五百羣雁從北方來飛空南過中有雁王墮獵網中時有一雁悲鳴吐血即鼔兩趐來投雁王五百羣雁徘徊虛空亦復不去獵師念言鳥獸尚能共相戀慕不惜身命我今當以何心而殺是雁王尋時開網放使令去法苑珠林宋京師道林寺有沙門僧伽達多博通經論偏以禪思為業以元嘉之初來遊宋境達多常在山中坐禪日時將逼念欲受齊乃有羣鳥銜果飛來授之達多思維昔猴奉蜜佛亦受而食之今飛鳥授食何為不可於是受進食之鹿女佛報恩經有國號波羅奈去城不逺有山名聖所遊居其山有一仙人住居南窟復有一仙住居北窟二山中間有一泉水其泉水邊有一平石爾時南窟仙人在此石上浣衣洗足去後未久有一雌鹿來飲泉水次第到浣衣處飲是石上浣衣垢汁飲此衣垢汁已㢠廻頭反顧自䑛小便處爾時雌鹿尋便懷妊月滿産生鹿産生法要還向夲得胎處即還水邊住夲石上悲鳴宛轉産生一女南窟仙人聞是鹿大悲鳴聲即出往看見此雌鹿産生一女以草衣裹拭將還採衆妙果隨時將飬漸漸長大至年十四其父愛念常使宿火令不斷絶忽于一日心不謹愼便使火滅其父語其女言北窟有火汝可往取爾時鹿女即往詣北窟歩歩舉足皆生蓮華隨其踪跡行伍次第如似街陌往至北窟從彼仙人乞求少火爾時仙人見此女人福德如是足下生蓮華報言欲得火者汝當右繞我窟滿足七帀行伍次第了了分明隨其舉足皆生蓮華繞七帀巳語其女言復當在此右邊還歸去者當與汝火爾時鹿女為得火故隨教而去貧里用法華經窮子事見二十巻寶藏註歸依華嚴經哀哉衆生生老病􅂮之所恐怖我當云何為作歸依令其永得身心安穏野蕨謝靈運詩野蕨漸紫苞嘉蔬郭璞江賦挺自然之嘉蔬傅亮喜雨賦覃餘潤于嘉蔬緑芋羮沈約詩緑芋鬰參差漢書翟方進傳飯我荳食羮芋魁師古註羮芋魁者以芋根為羮也淸梵庾信詩淸梵兩邊來遊悟眞寺唐詩紀事唐詩品彚俱以此詩為王縉所作聞道黄金地仍開白玉田開文苑英華作依擲山移巨石呪嶺出飛泉猛虎同三逕愁猿學四禪買香燃緑桂乞火踏紅蓮踏一作塌紅凌本唐詩紀事俱作青草色揺霞上上唐詩品彚作起松聲汎月邊山河窮百二世界滿三千滿一作接梵宇聊憑視憑視文苑英華作平覽唐詩紀事作憑覽王城遂渺然灞陵纔出樹纔一作才渭水欲連天遠縣分諸郭諸文苑英華唐詩紀事俱作朱孤村起白烟村文苑英華作城望雲思聖主披霧憶羣賢憶一作隱薄宦慙尸素終身擬尚𤣥誰知草庵客曾和栢梁篇悟眞寺長安志崇法寺即唐悟真寺也在藍田縣東南二十里王順山白居易有詩述其靈後改名法苑珠林雍州藍田東悟真山寺寺居藍田谷之西崖製窮山美殿堂嚴整黄金地法苑珠林須逹長者請祗陀太子欲買園造精舍祗陀太子言若能以黄金布地令間無空者便當相與須達曰諾謹隨其價便使人象負金出八十頃中須臾欲滿殘餘少地須達思惟何藏金足不多不少當取滿之祗陀問言嫌貴置之答言不也自念金藏何者可足當得補滿祗陀念言佛必大德乃使斯人輕寶乃爾教齊且止勿更出金園地屬卿樹木屬我我自上佛共立精舍白玉田後漢書郡國志藍田出美玉張衡西京賦爰有藍田珍玉是之自出呪泉十六國春秋曇無䜟隨王入山王渴須水不能即得䜟乃密呪石為出水因贊曰大王惠澤所感遂使枯石生泉隣國聞者莫不嘆伏四禪湼槃經獲得四禪神通安樂華嚴經是菩薩住此發光地時即離欲惡不善法有覺有觀離生喜樂住初禪滅覺觀内浄一心無覺無觀定生喜樂住第二禪離喜住捨有念正知身受樂諸聖所説能捨有念正受樂住第三禪斷樂先除苦喜憂滅不苦不樂捨念清浄住第四禪緑桂拾遺記王母與昭王遊于燧林之下取緑桂之膏燃以照夜乞火見本巻鹿女註中百二漢書秦形勝之國也帯河阻山縣隔千里持㦸百萬秦得百二焉蘇林曰言河山之險與諸侯相懸隔地絶千里所以能擒諸侯者利百二也應劭曰百二得百中之二二萬人也秦地險固二萬人足當諸侯百萬人也世界三千法苑珠林長阿含起世經等四洲地心即是須彌山山外别有八山圍如須彌山下大海深八萬四千由旬其邊八山大海初廣八千由旬中有八功德水如是漸小至第七山下水廣一千二百五十由旬其外醎海廣于無際海外有山即是大鐵圍山四周圍輪并一日月晝夜迴轉照四天下名為一國土即以此為量數至滿千鐵圍繞訖名小千世界即數小千復至一千鐵圍繞訖名為中千世界即數中千復滿一千鐵圍繞訖名為大千世界其中四洲山王日月乃至有頂各有萬億成則同成壊則同壊皆是一化佛所綂之處名為三千大千世界號為娑婆世界梵本正音名為索訶世界依自誓三昧經云沙訶世界釋氏要覽三千大千世界即釋迦牟尼佛所化境也世界何義楞嚴經云世為遷流界為方位又云東西南北四維上下名界過去未來現在名世長阿含經并起世因本經云四洲地心即須彌山梵音蘇彌盧此云妙髙此山有八山繞外有大鐵圍山周迴圍繞并一日月晝夜迴轉照四天下名一國土積千國土名小千世界積一千小千界名中千世界積一千中千界名大千世界以三積千故名三千大千世界王城鮑照詩家世宅闗輔勝带宦王城望雲史記帝堯者就之如日望之如雲披霧晉書尚書令衛瓘見樂廣而竒之命諸子造焉曰此人之水鏡見之瑩然若披雲霧而覩青天也尸素漢書今朝廷大臣上不能匡主下亡以益民皆尸位素餐潘岳闗中詩愧無獻納尸素以甚李善註薛君韓詩章句曰何謂素餐素餐者質人但有質樸而無治民之材名曰素餐尸祿者頗有所知善惡不言黙然不語茍欲得祿而已譬若尸焉尚元用揚雄太元事草庵客神仙傳焦先居河之湄結草為庵獨止其中與蘇盧二員外期遊方丈寺而蘓不至因有是作文苑英華唐詩品彚俱以此詩為王昌齡所作共仰頭陀行能忘世諦情㢠廻看䨇鳯闕鳯顧元緯本作樹誤相去一牛鳴法向􅆰林説心隨寳地平手巾花􅏩浄香帔稻畦成聞道邀同舍相期宿化城安知不來往翻以得無生以得顧元緯本凌本唐詩品彚俱作得似頭陀行法苑珠林夫五欲葢纒竝是禪障既能除棄其心寂静堪能修道故此章内具明十二頭陀之行少欲知足無過此等西云頭陀此云抖擻能行此法即能抖擻煩惱去離貪著如衣抖擻能去塵垢是故從喻為名翻譯名義頭陀新云杜多此云抖擻亦云修治亦云洮汰垂裕記云抖擻煩惱故也善住意天子經云頭陀者抖擻貪欲嗔恚愚癡三界内外六入若不取不捨不修不著我説彼人名為杜多今訛稱頭陀大品云須菩提説法者受持十二頭陀一作阿蘭若二常乞食三衲衣四一坐食五節量食六中後不飲漿七塜間住八樹下住九露地住十常坐不臥十一次第乞食十二但三大衣世諦湼槃經世尊所説世諦第一義諦其義云何如出世人之所知者名第一義諦世人知者名為世諦五隂和合稱言某甲凡夫衆生隨其所稱是名世諦解隂無有某甲名字離隂亦無某甲名字出世之人如其性相而能知之名第一義諦或復有法有名有實或復有法有名無實有名無實者即是世諦有名有實者是第一義諦如我衆生壽命知見養育丈夫作者受者熱時之燄乾闥婆城龜毛角旋火之輪諸隂界入是名世諦苦集滅道名第一義諦昭明太子解二諦義云所言二諦者一是眞諦二名俗諦眞諦亦名第一義諦俗諦亦名世諦眞諦俗諦以立體立名義諦世諦以褒貶立目宗鏡録經云以凡夫見之為世諦以聖人見之為􅆰諦所稱諦者審實不虛故稱為諦世諦不無執假為諦眞諦非有證實為諦一牛鳴太藏一覽一牛鳴地其聲五里翻譯名義拘盧舍此云五百弓亦云一牛吼地謂大牛鳴聲所極聞或云一鼓聲拘舍云二里雜寳藏云五里心平楞嚴經持地菩薩言毘舍如來摩頂謂我當平心地則世界地一切皆平花􅏩南史高昌國有草實如繭繭中絲如細纑名曰白叠子國人取之織以為布布甚軟白交市用焉曉行巴峽際曉投巴峽餘春憶帝京晴江一女浣朝日衆雞鳴雞唐詩品彚作禽水國舟中市山橋樹杪行杪凌本作上登高萬井出眺迥二流明人作殊方語鶯為舊國聲舊唐詩正音作故頼諳山水趣諳文苑英華唐詩品彚皆作多稍解别離情巴峽劉淵明蜀都賦註三峽巴東永安縣有髙山相對相去可二十丈左右崖甚高人謂之峽江水過其中餘春梁簡文帝晚春賦待餘春于北閣樹杪韻㑹杪木末也殊方漢書殊方萬里悅德歸誼賦得清如玉壺冰原註京兆府試時年十九字凌本文苑英華皆無賦得二藏冰玉壺裏冰水類方諸文苑英華作玉壺何用好偏許素冰居未共銷丹日還同照綺䟽抱明中不隱含浄外疑虛氣似庭霜積光言砌月餘言毛氏試帖本作㴠曉凌飛鵲鏡宵映聚螢書若向夫君比淸心尚不如文苑英華作若向貪夫比貞心定不餘又如字顧元緯本凌本俱知淸如玉壺冰鮑照白頭吟淸如玉壺冰方諸鄭康成周禮註鍳鏡屬取水者世謂之方諸淮南子方諸見月則津而為水髙誘註方諸隂燧大蛤也熟摩拭令熱月盛時以向月下則水生以銅盤受之下水數滴綺䟽後漢書梁冀傳窻牖皆有綺疏靑𤨏章懐太子註綺疏謂鏤為綺文也飛鵲鏡神異傳有夫婦相别破鏡人各執半以為信其妻與人通鏡化為鵲飛至夫前夫乃知之後人因鑄鏡為鵲安背上吳均詩願為飛鵲鏡翩翩照離别聚螢書晉書車𦙍恭勤不倦博學多通家貧不常得油夏月則練囊盛數十螢火以照書以夜繼日焉春日直門下省早朝原註時為左補闕騎省直明光雞鳴謁建章遥聞侍中佩暗識令君香君文苑英華作公玉漏隨銅史隨文苑英華作催天書拜夕郎拜文苑英華作問旌旗映閶闔歌吹滿昭陽官舍梅初紫宫門栁欲黄願將遲日意同與聖恩長門下省雍録按六典宣政殿前有兩廡兩廡各自有門其東曰日華日華之東則門下省也以其地居殿廡之左故又曰左省也凡兩省官繫銜以左者如左散騎左諫議給事中皆其屬也西廊有門曰月華月華之西即中書省也凡繫銜為右者如右諫議右常侍中書舍人則其屬也故東西兩省皆有騎省為其各分左右而常侍亦分左右也騎省謂散騎之省出潘岳秋興賦序唐時兩省皆有散騎常侍故亦謂之騎省侍中佩宋書禮志侍中左右常侍皆佩水蒼玉古今註漢末喪亂玉佩之法絶而不傳魏侍中王粲識古佩法始更制焉令君香藝文類聚襄陽記曰荀令君至人家坐處三日香銅史陸倕新漏刻銘銅史司刻金徒抱箭李善註張衡漏水轉渾天儀制曰盖上又鑄金銅仙人居左壺為胥徒居右壺皆以左手抱箭右手指刻以别天時早晩夕郎見十巻瑣䦝註中歌吹梁徐俳妻劉氏詩况復昭陽近風傳歌吹聲遲日詩春日遲遲毛萇傳云遲遲舒緩也孔穎達正義云遲遲者日長而暄之意故為舒緩計春秋漏刻多少正等而秋言凄凄春言遲遲者隂陽之氣感人不同張衡西京賦云人在陽則舒在隂則慘然則人遇春暄則四體舒㤗春覺晝景之稍長謂日行遲緩故以遲遲言之及遇秋景四體褊燥不見日行急促惟覺寒氣襲人故以凄凄言之凄凄是凉遲遲是暄二者觀文似同夲意實異也上張令公珥筆趨丹陛垂璫上玉除歩簷靑瑣闥方幰畫輪車市閲千金字朝開五色書開一作聞致君光帝典薦士滿公車伏奏回金駕横經重石渠從兹罷角抵希復幸儲胥希顧元緯本凌本俱作且誤天綂知堯後王章笑魯初匃奴遥俯伏漢相儼簪裾賈生非不遇汲黯自堪踈學易思求我言詩或起予嘗從大夫後何惜隷人餘張令公唐書元宗本紀開元十二年四月甲子張説為中書令二十一年五月戊子張九齡為中書令此張令公應是九齡顧元緯以為張説誤矣珥筆曹植求通親親表安宅京窒執鞭珥筆李善註珥筆載筆也潘岳詩優㳺省闥珥筆華軒吕向註珥執也垂璫鮑照詩垂璫散佩盈玉除歩簷上林賦歩櫩周流師古註歩櫩言其下可行歩即令之歩廊也左思魏都賦方歩櫩而有踰李善註歩櫩長廊也靑瑣闥范彦龍詩攝官靑瑣闥遙望鳯凰池方幰紀少瑜詩日落庭光轉方幰屢移隂千金字史記是時諸侯多辨士如荀卿之徒著書布天下吕不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰呂氏春秋布咸陽市門懸千金其上延諸侯遊士賔客有能増損一字者予千金帝典王儉禇淵碑文光我帝典緝彼民黎廻金駕顔延年詩金駕映松山李善註金駕金輅也後漢書帝嘗輕與期門近出姚期頓首車前曰臣聞古令之戒變生不意誠不願陛下㣲行數出帝為之囬輿而還石渠漢書韋元成受詔與太子太傅蕭望之及五經諸儒雜論同異于石渠閣角抵漢書武帝紀元封三年春作角抵戲文穎註名此樂為角抵者兩兩相當角力角技藝射御故名角牴葢雜樂技也元帝紀初元五年罷角抵貢禹傳天子納善其忠乃下詔罷角抵諸戲刑法志春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵後漢書南匈奴傳祖㑹饗賜作樂角抵百戲章懐太子註角抵之戲則魚龍爵馬之屬言兩兩相當亦角而為抵對卽今之鬬朋古之角抵也儲胥三輔黄圗武帝作迎風館于甘泉山後加露寒儲胥二館皆在雲陽甘泉中天綂漢書漢承堯運德祚已盛斷蛇著符旗幟上赤協于火德自然之應得天綂矣孟康曰十一月天綂物萌色赤故云得天統矣臣瓚曰漢承堯緒為火德秦承周後以火代木得天之綂緒故曰得天綂漢初因秦正至太初元年始用夏正不用十一月為正也王章左傳晉侯請隧弗許曰王章也魯初檀弓夫魯有初鄭康成註初謂故事匃奴漢書單于來朝引見白虎殿丞相王商坐未央廷中單于前拜謁商商起離席與言單于仰視商貎大畏之遷延却退天子聞而嘆曰此眞漢相矣賈生漢書劉向稱賈誼言三代與秦治亂之意其論甚美通達國體雖古之伊管未能遠過也使時見用功化必盛為庸臣所害甚可悼痛追觀孝文元黙躬行以移風俗誼之所陳畧施行矣及欲改定制度以漢為土德色尚黄數用五及欲試屬國施五餌三表以係單于其術固已疏矣誼亦天年早終雖不至公卿未為不遇也汲黯史記汲黯為中大夫以數切諫不得久留内求我見周易䝉卦隷人左傳隷人牧圍哭褚司馬妄識皆心累浮生定死媒誰言老龍吉未免伯牛災故有求仙藥仍餘遁俗杯山川秋樹苦牕戸夜泉哀尚憶靑騾去寧知白馬來漢臣修史記莫蔽褚生才老龍吉莊子妸荷甘與神農同學于老龍吉神農隱几闔戸畫暝妸荷甘日中奓户而入曰老龍死矣神農隱几擁杖而起嚗然投杖而笑曰天知予僻陋慢訑故棄予而死亡矣夫子無所發予之狂言而死矣夫伯牛災史記伯牛有惡疾孔子往問之靑騾魯女生别傳李少君死後百餘日人見其在河東蒲坂乗靑騾帝聞之發棺無所見白馬後漢書范式少游太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式仕為郡功曹忽夢見元伯元冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下便服朋友之服投其𦵏日馳往赴之式未及到而䘮已發引旣至壙將窆而柩下肯進其母撫之曰元伯豈有望邪遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿旣至叩喪言曰行矣元伯死生路異永從此辭㑹葬者千人咸為揮涕式因執紼而引柩於是乃前褚生史記索隠張晏曰褚先生潁川人仕元成間韋陵云禇顗家傳褚少孫梁相褚大弟之孫宣帝時為博士寓居沛事大儒王式故號先生續太史公書過沈居士山居哭之楊朱來此哭桑扈返于眞獨自成千古依然舊四隣閑簷暄鳥雀故榻滿埃塵曙月孤鶯囀􅆰山五桞春野花愁對客泉水咽迎人善巻明時隱黔婁在日貧逝川嗟爾命邱井嘆吾身前後徒言隔相悲詎幾晨幾凌本唐詩品彚俱作嵗楊朱列子隨梧之死楊朱撫其尸而哭桑扈莊子子桑戸孟子反子琴張三人相與友莫然有間而子桑户死未𦵏孔子聞之使子貢往待事焉或編曲或鼓瑟相和而歌曰嗟來桑戸乎嗟來桑户乎而已反其眞而我猶為人猗善巻髙士傳善巻者古之賢人也堯聞得道乃北面師之及堯受終之後舜又以天下讓巻巻曰予立于宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞動秋收歛身足以休息日出而作日入而息逍遥于天地之間而心意自得吾何以天下為哉悲夫子之不知余也遂不受去入深山莫知其終黔婁列女傳魯黔婁先生死曾子與門人往弔之哭之曰嗟乎先生之終也何以為謚其妻曰以康為謚曾子曰先生在時食不充口衣不葢形死則手足不歛旁無酒肉生不得其美死不得其榮何樂于此而謚為康乎其妻曰昔先生君嘗欲授之以政以為相國而辭不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚于貧賤不忻忻于富貴求仁而得仁求義而得義其謚為康不亦宜乎逝川鮑照詩東海并逝川西山導落暉王儉褚淵碑文感逝川之無舍哀淸暉之𣺌黙邱井維摩詰經是身如邱井為老所逼鳩摩羅什曰邱井邱墟枯井也哭祖六自虛原註時年十八否極當聞㤗嗟君獨不然憫凶纔稚齒齒凌本作子誤羸疾至中年餘力文章秀生知禮樂全翰留天帳覽詞入帝宫傳國訝終軍少人知賈誼賢公卿盡虛左朋識共推先不恨依窮轍終期濟巨川才雄望羔雁壽促背貂蟬福善聞前錄殱良昧上元何辜鎩鸞翮何事與龍泉文苑英華作底事碎龍泉又與字一作失一作劚鵩起長沙賦麟終曲阜編域中君道廣海内我情偏乍失疑猶見見文苑英華作在沉思悟絶縁生前不忍别死後向誰宣為此情難盡彌令憶更纒本家清渭曲歸𦵏舊塋邊永去長安道徒聞京兆阡聞文苑英華作開旌車出郊甸鄉國隱雲天天凌本作間定作無期别寧同舊日旋舊凌本作昔候門家屬苦屬凌本作族行路國人憐送客哀終進終一作難征途泥復前泥文苑英華顧可久本俱作哭贈言為挽曲奠席是離筵念昔同擕手風期不暫捐南山俱隱逸東洛類神仙未省音容間那堪生死遷花時金谷飲月夜竹林眠滿地傳都賦傾朝看藥船羣公咸屬目公一作英㣲物敢齊肩謬合同人㫖而將玉樹連不期先掛劍長恐後施鞭為善吾無矣知音子絶焉琴聲縱不沒終亦斷悲絃斷一作繼否㤗抱朴子寒暑代謝否終則㤗閔凶左傳寡君少遭閔凶杜預註閔憂也稚齒後漢書郎顗傳子竒稚齒化阿有聲王融曲水詩序耆年闕市井之遊稚齒豐車馬之好羸疾晉書陶潛傳躬畊自資遂抱羸疾天帳書斷梁鵠字孟皇安定烏氏人少好書受法于師冝官以善八分書知名舉孝亷為郎靈帝重之亦在鴻都門下遷幽州刺史魏武甚愛其書常懸帳中又以釘壁以為勝宜官也終軍漢書終軍字子雲濟南人也少好學以辯博能屬文聞于郡中年十八選為博士弟子至府受遣太守聞其有異才召見軍甚竒之賈誼漢書賈誼洛陽人也年十八以能誦詩書屬文稱于郡中虛左見六巻夷門註中窮轍晉書阮籍時率意獨駕不由徑路車迹所窮輒慟哭而返巨川尚書若濟巨川用汝作舟楫羔雁說苑卿以羔為贄羔者羊也羊羣而不黨故卿以為贄大夫以雁為贄雁者行列有長㓜之禮故大夫以為贄後漢書陳紀傳毎宰府辟召常同時旌命羔雁成羣福善尚書湯誥天道福善禍滛殲良詩殱我良人孔紹安詩與善成空説殲良信在兹上元揚雄甘泉賦將郊上元李善註上元天也鎩鸞翮顔延年詩鸞翮有時鍛李善註許慎曰鍛殘羽也龍泉見十六巻龍躍平津註鵩賦漢書賈誼為長沙王太傳三年有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也誼既謫居長沙長沙卑濕誼自傷悼以為壽不得長乃為賦以自廣麟終春秋元命苞孔子曰丘作春秋始于元終于麟王道成也范寗榖梁集解春秋之文廣大悉備義始于隱公道終于獲麟曲阜史記封周公旦于少昊之墟曰阜是為魯公應劭曰曲阜在魯城中委曲長七八里京兆阡漢書武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡郊甸潘岳詩登城望郊甸風期庾信詩風期幸共存神仙後漢書郭林宗遊于洛陽始見河南尹李膺膺大竒之遂相友善于是名振京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賔望之以為神仙焉金谷石崇金谷詩敘曰余以元康六年從太僕卿出為使持節監青徐諸軍事征虜將軍有别廬在河南縣界金谷澗中或高或下有清泉茂林衆果竹柏藥草之屬莫不畢備又有水碓魚池土窟其為娛目歡心之物備矣時征西大將軍祭酒王詡當還長安余與衆賢共送往澗中晝夜遊宴屢遷其坐或登髙臨下或列坐水濱時琴瑟笙筑合載車中道路並作及住令與鼔吹逓奏遂各賦詩以叙中懐或不能者罰酒三斗竹林魏氏春秋稽康寓居河内之山陽縣與之遊者未嘗見其喜慍之色與陳留阮籍河内山濤河南向秀籍兄子咸瑯琊王戎沛人劉伶相與友善遊于竹林號為七賢都賦世說庾仲初作揚都賦成以呈庾亮亮以親族之懐大為其名價云可三二京四三都于是人人競冩都下紙為之貴藥船晉書夏統傳㑹三月上已洛中王公以下並至浮橋士女駢填車服燭路綂時在船中曝所市藥諸貴人車乗來者如雲綂並不之顧同人見周易同人卦玉樹世說魏明帝使后弟毛曽與夏侯元共坐時人謂蒹葭倚玉樹掛劍史記季札之初使北過徐君徐君好季扎劍口勿敢言季札心知之為使上國未獻還至徐徐君已死于是乃解其寶劍繫之徐君冡樹而去從者曰徐君已死尚誰與乎季子曰不然始吾已心許之豈以死倍吾心哉為善左傳子産聞子皮卒哭且曰吾已無為為善矣惟夫子知我知音楚辭章句鍾子期死伯牙破琴絶絃不更復鼔以世無知音也王右丞集箋註巻十二
