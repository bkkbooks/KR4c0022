body:
  text: 王右丞集箋注巻二十仁和趙殿成撰文讚七首讚佛文竊以真如妙宰具十方而無成涅槃至功滿四生而不庶庶疑是廣字之訛故無邊大照不照得空有之深萬法偕行無行為滿足之地惟兹化佛即具三身不捨凡夫本無五藴實藉津梁相法脱落塵容始于度門漸于空舍然後金剛道後為三界太師玉毫光相得一生補處左散騎常侍攝御史中丞崔公第十五娘子于多劫來植衆徳本以般若力生菩提家含哺則外葷羶勝衣而斥珠翠教從半字便㑹聖言戲則剪花而為佛事常侍公頃以入朝天闕上簡帝心雖功在于生人深辭拜命願賞延于愛女密啓出家白法宿修紫書方降即令某月日敬對三世諸佛十方賢聖稽首合掌奉詔落髮乆清三業素成菩薩之心新下雙鬟如見如來之頂綺襦方解樹神獻無價之衣香飯當消天王持衆寳之鉢惟娘子舍諸珍寳塗彼戒香在微塵中見億佛刹如獻珠頃具六神通頃顧本作須具顧本作臭俱訛今校正伏願以度人設齋功徳上奉皇帝聖夀無疆記椿樹以為年土宇無垠包蓮花而為界又用莊嚴常侍公出為法將入拜台臣身在百官之中心超十地之上夫人以文殊智本是法王在普賢心長為佛母郎君娘子等住誡性為孝順用闕徳為道場將遍衆生之慈迥同一子之想又願普同法界盡及有情共此勝因俱登聖果十方法苑珠林十方謂四方四維上下俗儒所説惟據此洲洲外有洲古今未説若依内典通窮無際横亘十方傍羅異域今佛教中娑婆忍土百億日月四重圍輪大千世界名一佛土此猶據化佛釋迦如來所王之域故華嚴經云盧舍那佛報身如來所王之土復過是數盡十方界非凡所謀涅槃涅槃經涅槃亦名無生亦名彼岸魏書釋老志涅槃釋云滅度或言常樂我淨明無遷謝及諸苦累也錦繡萬花谷梵語涅槃此云無為楞伽經云乃不生不死之地一切修行之所依歸佛説施燈文云願一切衆生皆得涅槃微妙光明至涅槃者乃有微妙光明世人誤認以為死大非也無行菩薩瓔珞經云何有行無行諸法不生不滅無過去當來今現在是謂無行必終諸法分别過去當來今現在是謂有行三身釋氏要覽三身一清淨法身二圓滿報身三變化身五藴宗鏡録五藴藴者藏也亦云五陰陰者覆也即藴藏妄種覆蔽真心雜集論云藴者積聚義又荷雜染擔故名為藴如肩荷擔大藏一覽大乘五藴論云五藴者謂色受想行識色藴四大所成也受藴領納苦樂不苦不樂三也想藴取種種境也行藴諸心所法貪不息也識藴于所緣境了别為性亦名心意採集所攝也錦繡萬花谷五藴謂色受想行識也色謂色身有形或黄或白是也受謂一切受苦受樂受用是也想謂一切思念是也行謂所行之事識謂曉解世間事五藴即五陰津梁世説庾公嘗入佛圖見臥佛曰此子疲于津梁沈約内典序舟輿六趣津梁五道塵容北山移文焚芰製而裂荷衣抗塵容而走俗狀度門楞迦經無量度門隨類普現空舍維摩詰經畢竟空寂舍鳩摩羅什曰障蔽風雨莫過于舍滅除衆想莫妙于空亦能絶諸問難降伏魔怨猶密宇深重冦患自消亦云有非真要時復暫遊空為理宗以為常宅也金剛仁王經世尊導師金剛體心行寂滅轉法輪三界大師釋氏要覽佛稱三界大師者瑜伽論云能化導無量衆生令入寂滅又云摧滅邪穢外道出現世界故號大師玉毫光相華嚴經菩薩摩訶薩于兜率天下生之時從于眉間白毫相中放大光明名曰覺悟普照三千大千世界照彼宿世一切同行菩薩身彼諸菩薩䝉光照已咸知菩薩將欲下生各各出興無量供具詣菩薩所而為供養一生補處菩薩瓔珞經菩薩初舉右足蹈地之時復作是念過去諸佛先行是法當觀一生補處菩薩紹吾處者名號是誰法苑珠林須達問舍利弗言是六天何處最樂舍利弗言下三色染上二憍逸第四天中少欲知足恒有一生補處菩薩來生其中法訓不絶多劫隋書每佛滅度遺法相傳有正像末三等淳醨之異年歳逺近亦各不同末法以後衆生愚鈍無復佛教而業行轉惡年夀短促經數千百載間乃至朝生夕死然後有大水大火大風之灾一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世法苑珠林夫劫者葢是紀時之名猶年號耳華嚴經多劫在惡趣始得見聞汝植衆徳本維摩詰經時維摩詰即入三昧令此比丘自識宿命曾于五百佛所植衆徳本迴向阿耨多羅三藐三菩提般若翻譯名義般若法界次第云秦言智慧照了一切諸法皆不可得而能通達一切無閡名為智慧菩提翻譯名義菩提後代諸師皆譯為道以大論翻為佛道故僧肇維摩詰經註道之極者稱曰菩提秦無言以譯之菩提者葢是正覺無相之真智乎其道虚元妙絶常境聰者無以容其聽智者無以運其知辯者無以措其言像者無以狀其儀故其為道也微妙無相不可為有用之彌勤不可為無故能幽鑑萬物而不耀元軌超駕而弗夷大包天地而罔寄曲濟羣惑而無私至能導達殊方開物成務元機必察無思無慮然則無知而無不知無為而無不為者其惟菩提大覺之道乎此無名之法固非名所能名也不知所以言故强名曰菩提斯無為之道豈可以身心而得乎含哺莊子含哺而熈鼓腹而遊勝衣史記三王世家能勝衣趨拜半字涅槃經譬如長者惟有一子心常憶念憐愍無已將詣師所欲令受學懼不速成尋便將還以愛念故晝夜殷勤敎其半字而不教誨毘伽羅論何以故以其幼稚力未堪故梁僧佑法師梵漢譯經音義同異記梵書製文有半字滿字所以名半字者義未具足故字體半偏猶漢文月字虧其旁也所以名滿字者理既究竟故字體圓滿猶漢文日字盈其形也半字雖單為字根本緣有半字得成滿字譬凡夫始于無明得成常住故因字製義以譬涅槃梵文義奥皆此類也紫書元和郡縣志武都有紫水泥亦紫漢朝封璽書用紫泥即此水之泥也太平寰宇記隴右記云武都紫水有泥其色赤紫而粘用之封璽書故詔誥有紫泥之美合掌釋氏要覽合掌若此方之叉手也法苑云若指合其掌不合者良由心慢而情散也必須指掌相著不令虛也三業翻譯名義業有三種謂身口意業菩薩錦繡萬花谷梵語菩提此云覺梵語薩埵此云有情言菩薩者本云菩提薩埵欲簡于稱呼故省文言菩薩此云覺有情也凡有生皆有情菩薩乃有情之中覺者耳佛有覺性而無情菩薩亦未免有情故謂之覺有情如來頂涅槃經佛告迦葉一切人天魔王波旬沙門婆羅門無有能見我頂相者大般若經如來頂相無能見者綺襦説文襦短衣也從衣需聲一曰㬮衣人朱切古詩緗綺為下裙紫綺為上襦樹神法苑珠林佛告文殊師利我初踰城離父王宫四十里到彼叢林身小疲怠權時止息時彼樹神現身告我言汝今修道定得金色身為三界大師迦葉佛涅槃時付囑我珠函并絹僧伽梨令我轉付囑汝我語神言汝絹僧伽梨非我所用我聞先老所言諸佛出世不著蠶衣我今修道如何害生以付我著汝今是魔故來相惱樹神告言汝大智人何輒麤言諸佛慈悲實不著蠶衣此絲化出非是害生汝今受此珠函開中有字我即開函具見諸竒特事有大毘尼及修多羅藏迦葉佛遺教並在此中并見僧伽梨彼佛手迹遺書付囑樹神令付與我伽葉佛書云我初成道時大梵天王施我彼絲是化出非是繰蠒梵天王施經絲堅牢地神王施緯絲由彼二施主共成一法衣由是義故今持施我我自成道已來常披此衣未曽損失今付悉達若得成佛取我僧伽梨安置祗洹中若轉毘尼時當為我著今留此衣汝涅槃後一百年初有無智比丘分毘尼藏遂為五部從百年後分汝修多羅當為無量部諍論由興令法速滅由彼愚僧不閑三藏聞開著繒衣即謂殺蠒汝若成道後彼絲自出諸國非是殺蠶故我將付樹神令轉付汝此函中並是我遺教亦將付汝住持遺法香飯維摩詰經阿難白佛言今所聞香自昔未有是為何香佛告阿難是彼菩薩毛孔之香于是舍利弗語阿難言我等毛孔亦出是香阿難言此所從來曰是長者維摩詰從衆香國取佛餘飯于舍食者一切毛孔皆香若此阿難問維摩詰是香氣住當乆如維摩詰言至此飯消曰此飯乆如當消曰此飯勢力至于七日然後乃消又阿難若聲聞人未入正法食此飯者得入正位然後乃消巳入正位食此飯者得心解脱然後乃消若未發大乘意食此飯者至發意乃消已發意食此飯者得無生忍然後乃消已得無生忍食此飯者至一生補處然後乃消譬如有藥名曰上味其有服者身諸毒滅然後乃消此飯如是滅除一切諸煩惱毒然後乃消阿難白佛言未曽有也世尊如此香飯能作佛事衆寳鉢西域記佛在樹下結跏趺坐寂然宴黙受解脱樂過七日後方從定起時二商主行次林外而彼林神告商主曰釋種太子今在此中初證佛果心凝寂定四十九日未有所食隨有奉上獲大善利時二商主各持行資麨蜜奉上世尊思以何器受之時四天王從四方來各持金鉢而以奉上世尊黙然而不納受以為出家不宜此器四天王捨金鉢奉銀鉢乃至頗胝瑠璃瑪瑙車渠真珠等鉢世尊皆不受四天王各還宮奉持石鉢紺青映徹重以進獻世尊斷彼此故而總受之次第重叠按為一鉢其外則有四際焉戒香涅槃經願諸衆生戒香具足維摩詰經淨心以澡浴戒品為塗香華嚴經恒塗淨戒香忍辱牢莊嚴微塵華嚴經一切諸佛皆悉能于一微塵中示現衆刹與一切世界微塵數等具足種種上妙莊嚴恒于其中轉妙法輪教化衆生而微塵不大世界不小常以智證安住法界獻珠法華經文殊師利言有娑竭羅龍王女年始八歳智慧利根善知衆生諸根行業得陀羅尼諸佛所説甚深秘藏悉能受持深入禪定了達諸法于刹那頃發菩提心得不退轉辯才無礙慈念衆生猶如赤子功徳具足心念口演微妙廣大慈悲仁讓志意和雅能至菩提智積菩薩言我見釋迦如來于無量劫難行苦行積功累徳求菩提道未曽止息觀三千大千世界乃至無有如芥子許非是菩薩捨身命處為衆生故然後乃得成菩提道不信此女于須臾頃便成正覺言論未訖時龍王女忽現于前頭面禮敬却住一面舍利弗語龍女言汝謂不乆得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何女身速得成佛爾時龍女有一寳珠價值三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寳珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速于此當時衆㑹皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寳蓮花成等正覺三十二相八十種好普為十方一切衆生演説妙法爾時娑婆世界菩薩聲聞天龍八部人與非人皆遙見彼龍女成佛普為時㑹人天説法心大歡喜悉遙敬禮無量衆生聞法解悟得不退轉無量衆生得受道記無垢世界六反震動娑婆世界三千衆生住不退地三千衆生發菩提心而得受記智積菩薩及舍利弗一切衆㑹黙然信受六神通瓔珞經以有常神通無常神通自識宿命神通識他宿命神通眼識神通耳識神通為六神通大般若經云何名六神通神境智證通天眼智證通天耳智證通他心智證通宿住隨念智證通漏盡智證通是名六神通椿樹莊子上古有大椿者以八千歳為春八千歳為秋文殊華嚴經東北方有處名清涼山從昔巳來諸菩薩衆于中止住現有菩薩名文殊師利與其眷屬諸菩薩衆一萬人俱常在其中而演説法法華經是文殊師利法王之子已曾親近供養過去無量諸佛普賢心華嚴經入法界品云時善財童子即見普賢菩薩在如來前衆㑹之中坐寳蓮花師子之座諸菩薩衆所共圍繞最為殊特世無與等智慧境界無量無邊難測難思等三世佛一切菩薩無能觀察又離世間品云菩薩摩訶薩發十種普賢心何等為十所謂發大慈心救䕶一切衆生故發大悲心代一切衆生受苦故發一切施心悉捨所有故發念一切智為首心樂求一切佛法故發功徳莊嚴心學一切菩薩行故發如金剛心一切處受生不忘失故發如海心一切白淨法悉流入故發如大山王心一切惡言皆忍受故發安穩心施一切衆生無怖畏故發般若波羅蜜究竟心巧觀一切法無所有故若諸菩薩安住此心疾得成就普賢善巧智佛母華嚴經摩耶夫人言佛子我巳成就菩薩大願智幻解脱門是故常為諸菩薩母善男子如我于此閻浮堤中迦毘羅城淨飯王家右脇而生悉達太子現不思議自在神變如是乃至盡此世界海所有一切毘羅遮那如來皆入我身示現誕生自在神變善男子我于淨飯王宫菩薩將欲下生之時現諸竒特事與眷屬俱來入我身彼諸菩薩于我腹中遊行自在或以三千大千世界而為一步或以不可説佛刹微塵數世界而為一步又念念中十方不可説一切世界諸如來所菩薩衆㑹及四天王天三十三天乃至色界諸梵天王欲見菩薩處胎神變恭敬供養聽受正法皆入我身雖我腹中悉能容受如是衆㑹而身不廣大亦不迫窄其諸菩薩各見自處衆㑹道場清淨嚴飾善男子如此四天下閻浮提中菩薩受生我為其母三千大千世界百億四天下閻浮提中悉亦如是然我此身本來無二非一處住非多處住善男子如今世尊我為其母往昔所有無量諸佛悉亦如是而為其母我昔曽作蓮華池神時有菩薩于蓮華藏忽然化生我即捧持瞻侍養育一切世間皆共號我為菩薩母又我昔為菩提場神時有菩薩于我懐中忽然化生世亦號我為菩薩母善男子有無量最後身菩薩于此世界種種方便示現受生我皆為母善男子如此世界賢劫之中過去世時拘留孫佛拘那含牟尼佛迦葉佛及今世尊釋迦牟尼佛現受生時我為其母未來世中彌勒菩薩從兜率天將降神時放大光明普照法界示現一切諸菩薩衆受生神變乃于人間生大族家調伏衆生我于彼時亦為其母如是次第有師子佛法幢佛善眼佛淨華佛乃至樓至如來在賢劫中于此三千大千世界當成佛者悉為其母一子想涅槃經如來恒于衆生生一子想而為演説無上法故譬如長者多有財寳唯有一子心甚愛重情無捨離所有珍寳悉用示之如來亦爾視諸衆生同于一子法界釋氏以地獄餓鬼畜生修羅人道天道聲聞縁覺菩薩佛十等所住之界謂之法界聖果大般若經已得現觀已得聖果西方變畫讚并序法身無對非東西也淨土無所離空有也若依佛慧既洗滌于六塵未捨法求猒如幻于三有故大雄以不思議力開方便門我心猶疑未認寳藏商人既倦且息化城究竟達于無生因地從于有相西方淨土變者左常侍攝御史中丞崔公夫人李氏奉為亡考故某官中祥之所作也夫人門為士族之先道為梵行之首大師繼踵望塵而理印命婦盈朝聞風而素履心王自在萬有皆如頂法真空一乗不立以示見故菩薩為勝鬘夫人同解脱因天女讚維摩長者顧本天字下多一人字今校正陟岵何至哀哀縗絰順有漏法泣血以居念罔極恩滅性非報唯兹十力所䕶豈與百身之贖不寳纓絡資于繪素圖極樂國象無上樂法王安詳聖衆圍繞湛然不動疑過于往來寂爾無聞若離于言説林分寳樹七重遶于香城衣捧天花六時散于金地迦陵欲語曼陁未落衆善普㑹諸相具美于是竭誠稽首隕涕焚香願立功徳以備梯航得彼佛身常以慈悲為女存乎法性還在菩提之家偈曰稽首十方大導師能于一法見多法以種種相導羣生其心本來無所動稽首無邊法性海功徳無量不思議于已不色等無礙不住有無亦不捨我今深達真實空知此色相體清淨願以西方為導首往生極樂性自在西方彌陀經爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在説法彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂極樂國土七重闌楯七重羅網七重行樹皆是四寳周帀圍繞又極樂國土有七寳池八功徳水充滿其中池底純以金沙布地四邊階道金銀琉璃玻瓈合成上有樓閣亦以金銀琉璃玻瓈硨磲赤珠瑪瑙而嚴飾之池中蓮華大如車輪青色青光黄色黄光赤色赤光白色白光微妙香潔彼佛國土常作天樂黄金為地晝夜六時雨天曼陀羅華其土衆生常以清旦各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行彼國常有種種竒妙雜色之鳥白鶴孔雀鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土衆生聞是音已皆悉念佛念法念僧舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道其佛國土尚無惡道之名何况有實是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作彼佛國土微風吹動諸寳行樹及寳羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心彼佛何故號阿彌陀彼佛光明無量照十方國無所障碍是故號為阿彌陀彼佛夀命及其人民無量無邊阿僧祗劫故名阿彌陀阿彌陀佛成佛已來于今十劫有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩衆亦復如是舍利弗彼佛國土成就如是功徳莊嚴又舍利弗極樂國土衆生生者皆是阿鞮跋致其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祗説舍利弗衆生聞者應當發願願生彼國所以者何得與如是諸上善人俱㑹一處舍利弗不可以少善根福徳因緣得生彼國若有善男子善女人聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土舍利弗我見是利故説此言若有衆生聞是説者應當發願生彼國土如我今者讚歎阿彌陀佛不可思議功徳之利淨土法苑珠林世界皎潔目之為淨即淨所居名之為土故攝論云所居之土無于五濁如玻瓈柯等名清淨土法華論云無煩惱衆生住處名為淨土淨土不同有其四種一法性土以真如為體故梁攝論云以蓮華王為淨土所依譬法界真如為淨土所依體故二實報土依攝論云以二空為門三慧為出入路奢摩他毘鉢舍那為乘以根本無分别智為用此皆約報功徳辯其出體三事淨土謂上妙七寳是五塵色性聲香味觸為其土相故攝論云佛周遍光明七寳處也又華嚴經云諸佛境界相中種種間錯莊嚴故淨土論云備諸珍寳性具足妙莊嚴又新翻大菩薩藏經云假使如上世界乃至大火洞然如來在中若依經行若住坐臥其處自然八功徳水出現于地四化淨土謂佛所變七寳五塵為化土體故涅槃經云以佛神力地皆柔輭無有丘墟土沙礫石乃至猶如西方無量夀佛極樂世界等又大莊嚴論云由智自在隨彼所欲能現水精琉璃等清淨世界又維摩經云佛以足指按地現淨等事又十地經云隨諸衆生心所樂見為示現故此諸經論所明並約化為淨土由佛神力現故即有攝故即無故名化土六塵大藏一覽六塵者謂色聲香味觸法也眼見為色塵耳聞為聲塵鼻齅為香塵舌嘗為味塵聲染為觸塵意著為法塵三有釋氏要覽三有婆沙論云一欲有二色有三無色有有者何義謂一切有漏法是佛言若業能令後生相續是有又云生滅故名墮苦集諦中是有大雄法華經大雄猛世尊諸佛之法王不思議力瓔珞經如來神力不可思議方便門法華經此經開方便門示真實相寳藏法華經爾時慧命須菩提摩訶迦栴延摩訶迦葉摩訶目犍連聞世尊授舍利弗阿耨多羅三藐三菩提記發希有心歡喜踊躍而白佛言我等居僧之首年並朽邁自謂巳得涅槃無所堪任不復進求阿耨多羅三藐三菩提今于佛前聞授聲聞阿耨多羅三藐三菩提記心甚歡喜得未曾有不謂于今忽然得聞希有之法深自慶幸獲大善利我等今者樂説譬喻以明斯義譬若有人年既幼稚捨父逃逝乆住他國加復窮困馳騁四方以求衣食漸漸遊行遇向本國其父先來求子不得中止一城其家大富財寳無量金銀琉璃珊瑚琥珀玻瓈珠等其諸倉庫悉皆盈溢多有僮僕臣佐吏民象馬車乘牛羊無數出入息利乃徧他國商估賈客亦甚衆多時貧窮子遊諸聚落經歴國邑遂到其父所止之城父每念子與子離别五十餘年而未曽向人説如此事但自思惟心懐悔恨自念老朽多有財物無有子息一旦終没財物散失無所委付是以殷勤毎憶其子爾時窮子傭賃展轉遇到父舍住立門側遙見其父踞師子牀寳几承足諸婆羅門刹利居士皆恭敬圍繞以真珠瓔珞價值千萬莊嚴其身吏民僮僕手執白拂侍立左右覆以寳帳垂諸華幡香水灑地散衆名華羅列寳物出内取與有如是等種種嚴飾威徳特尊窮子見父有大力勢即懐恐怖悔來至此竊作是念此或是王或是王等非我傭力得物之處不如往至貧里肆力有地衣食易得若乆住此或見逼迫强使我作作是念已疾走而去時富長者于師子座見子便識心大歡喜即遣旁人急追將還爾時使者疾走往捉窮子驚愕稱怨大喚我不相犯何為見捉使者執之逾急强牽將還于時窮子自念無罪而被囚執此必定死轉更惶怖悶絶躃地父遙見之而語使言不須此人勿强將來以冷水灑面令得醒悟莫復與語所以者何父知其子志意下劣自知豪貴為子所難審知是子而以方便不語他人云是我子使者語之我今放汝窮子歡喜從地而起往至貧里以求衣食爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威徳者汝可詣彼徐語窮子此有作處倍與汝直窮子若許將來使作若言欲何所作便可語之雇汝除糞時二使人即求窮子具陳上事爾時窮子先取其價尋與除糞其父見子愍而怪之又以他日于牕牖中遙見子身羸瘦憔悴糞土塵坌汙穢不淨即脱瓔珞細軟上服嚴飾之具更著麤弊垢膩之衣塵土坌身右手執持除糞之器語諸作人汝等勤作勿得懈息以方便故得近其子後復告言汝常此作勿復餘去當加汝價諸有所須盆器米麫鹽醋之屬莫自疑難亦有老弊使人須者相給我如汝父勿復憂慮所以者何汝常作時無有欺怠瞋恨怨言都不見汝有此諸惡如餘作人自今巳後如所生子即時長者更與作字名之為兒爾時窮子雖欣此遇猶故自謂客作賤人于二十年中常令除糞過是已後心相體信入出無難然其所止猶在本處爾時長者有疾自知將死不乆語窮子言我今多有金銀珍寳倉庫盈溢其中多少所應取與汝悉知之我心如是當體此意所以者何今我與汝便為不異宜加用心無令漏失爾時窮子即受教勅領知衆物金銀珍寳及諸庫藏然其所處猶在門外止宿草庵復經少時父知子意漸以通泰成就大志自鄙先心臨欲終時而命其子并㑹親族國王大臣刹利居士皆悉已集即自宣言諸君當知此是我子我之所生于某城中捨吾逃走竛竮辛苦五十餘年昔在本城懐憂推覓忽于此間遇㑹得之今我所有一切財物皆是子有先所出内是子所知窮子聞父此言即大歡喜而作自念我本無心有所希求今此寳藏自然而至世尊大富長者則是如來我等皆似佛子如來常説我等為子世尊我等以三苦故于生死中受諸熱惱迷惑無知樂著小法今日世尊令我等思惟蠲除諸法戲論之糞我等于中勤加精進得至涅槃一日之價既得此已心大歡喜自以為足便自謂言于佛法中勤精進故所得宏多然世尊先知我等心著弊欲樂于小法便見縱捨不為分别汝等當有如來知見寳藏之分世尊以方便力説如來智慧我等從佛得涅槃一日之價以為大得于此大乗無有志求我等又因如來智慧為諸菩薩開示演説而自于此無有志願所以者何佛知我等心樂小法以方便力隨我等説而我等不知真是佛子今我等方知世尊于佛智慧無所恡惜所以者何我等昔來真是佛子而但樂小法若我等有樂大之心佛則為我説大乘法于此經中唯説一乘而昔于菩薩前毁訾聲聞樂小法者然佛實以大乘教化是故我等説本無心有所希求今法王大寳自然而至如佛子所應得者皆已得之化城法華經譬如五百由旬險難惡道曠絶無人怖畏之處若有多衆欲過此道至珍寳處有一導師聰慧明達善知險道通塞之相將導衆人欲過此難所將人衆中路懈退白導師言我等疲極而復怖畏不能復進前路猶逺今欲退還導師多諸方便而作是念此等可愍云何捨大珍寳而欲退還以方便力于險道中過三百由旬化作一城告衆人言汝等勿怖莫得退還今此大城可于中止隨意所作若入是城快得安隠若能前至寳所亦可得去是時疲極之衆心大歡喜我等今者免斯惡道快得安隠于是衆人前入化城生已度想生安隠想爾時導師知此人衆既得止息無復疲倦即滅化城語衆人言汝等去來寳處在近向者大城我所化作為止息耳如來亦復如是今為汝等作大導師知諸生死煩惱惡道險難長逺應去應度若衆生但聞一佛乗者則不欲見佛不欲親近便作是念佛道長逺乆受勤苦乃可得成佛知是心怯弱下劣以方便力而于中道為止息故説二涅槃若衆生住于二地如來爾時即便為説汝等所作未辦汝所住地近于佛慧當觀察籌量所得涅槃非真實也但是如來方便之力于一佛乗分别説三如彼導師為止息故化作大城既知息已而告之言寳處在近此城非實我化作耳究竟華嚴經名為究竟地智慧決定故因地楞嚴經應當審觀因地發心與果地覺為同為異中祥成按喪禮無中祥之名唯後漢書禮儀志註中引應劭之言謂中祥大祥以紅為領縁究未考中祥是何時也命婦釋名大夫之妃曰命婦婦服也服家事也夫受命于朝妻受命于家也心王涅槃經是身如城血肉筋骨皮裹其上手足以為卻敵樓櫓目為竅孔頭為殿堂心王處中一乘涅槃經如來普為諸衆生故三乗之法説言一乗一乘之法隨宜説三法華經一切諸世尊皆説一乘道今此諸大衆皆應除疑惑諸佛語無異唯一無二乘勝鬘夫人楞伽經令勝鬘夫人及利智滿足諸菩薩等宣揚演説如來藏名七識俱生聲聞計著見人法無我故勝鬘夫人承佛威神説如來境界非聲聞縁覺及外道境界如來藏識藏餘佛及餘利智依義菩薩智慧境界天女維摩詰經時維摩詰室有一天女見諸大人聞所説法便現其身舍利弗言天止此室其已乆如答曰我止此室如耆年解脱舍利弗言止此乆耶天女曰耆年解脱亦何如乆舍利弗黙然不答天女曰如何耆舊大智而黙答曰解脱者無所言説故吾于是不知所云天女曰言説文字皆解脱相所以者何解脱者不内不外不在兩間文字亦不内不外不在兩間是故舍利弗無離文字説解脱也舍利弗問天女汝于三乘為何志求天女曰以聲聞法化衆生故我為聲聞以因縁法化衆生故我為辟支佛以大悲法化衆生故我為大乘舍利弗如人入瞻蔔林唯齅瞻蔔不齅餘香如是若入此室但聞佛功徳之香不樂聞聲聞辟支佛功徳香也其有釋梵四天王諸天龍鬼神等入此室者聞斯上人講説正法皆樂佛功徳之香發心而出吾止此室十有二年初不聞説聲聞辟支佛法但聞菩薩大慈大悲不可思議諸佛之法此室常現八未曽有難得之法何等為八此室常以金色光照書夜無異不以日月所照為明是為一未曽有難得之法此室入者不為諸垢之所惱是為二未曽有難得之法此室常有釋梵四天王及他方菩薩來會不絶是為三未曾有難得之法此室常説六波羅蜜不退轉法是為四未曽有難得之法此室常作天人第一之樂絃出無量法化之聲是為五未曾有難得之法此室有四大藏衆寳積滿周窮濟乏求得無盡是為六未曽有難得之法此室釋迦牟尼佛阿彌陀佛阿閦佛寳徳寳炎寳月寳嚴難勝師子響一切利成如是等十方無量諸佛是上人念時即皆為來廣説諸佛祕要法藏説已還去是為七未曾有難得之法此室一切諸天嚴飾宮殿諸佛淨土皆于中現是為八未曽有難得之法舍利弗此室常現八未曽有難得之法誰有見斯不思議事而復樂于聲聞法乎陟岵魏風陟彼岵兮瞻望父兮毛萇傳山無草木曰岵有漏法大般若經具夀善現白佛言世尊云何有漏法佛告善現世間五藴十二處十八界四靜慮四無量四無色定所有一切墮三界法是名有漏法泣血禮記高子臯之執親之喪也泣血三年未嘗見齒君子以為難孔穎達正義凡人涕淚必因悲聲而出若血出則不由聲也今子臯悲無聲其涕亦出如血之出故云泣血滅性禮記三日而食三月而沐期而練毁不滅性不以死傷生也十力僧肇維摩詰經註十力是如來之别稱耳十力備故即以為名百身之贖秦風彼蒼者天殲我良人如可贖兮人百其身無上樂華嚴經功徳具足充滿法界徧照十方施無上樂法王法華經如來于三界中為大法王以法教化一切衆生釋迦方誌凡人極位名曰輪王聖人極位名曰法王安詳法華經爾時世尊從三昧安詳而起湛然南史帝問大僧正慧念曰見不可思議事不慧念答曰法身常住湛然不動迦陵翻譯名義迦陵頻伽此云妙身鳥大論云如伽陵頻伽鳥在㲉中未出發聲微妙勝于餘鳥正法念經云山谷曠野其中多有迦陵頻伽出妙音聲如是美音若天若人𦂳那羅等無能及者唯除如來音聲曼陀翻譯名義曼陀羅此云適意又云白花大藏一覽曼陀羅花此云雜色花慈悲女維摩詰經法喜以為妻慈悲心為女鳩摩羅什註慈悲性弱從物入有猶如女之為性弱而隨物法性海華嚴經能捨一切諸妄見海能觀一切諸法性海宗鏡録諸經内逗縁稱機更有多名隨處安立以廣大義邊目之為海以圓明理顯稱之曰珠以萬法所宗號之曰王以能生一切詔之曰母導首華嚴經為諸衆生而作導首令修一切善根法行繡如意輪像讚并序寂等于空非心量得如則不動離意識界實無所住常遍羣生不捨有為懸超萬行法性如是豈可説邪如意輪者觀世音菩薩陀羅尼三昧門現方便于幻眼六臂色身以究竟為佛心體真相隨念即藏乃無縁之慈應度而來斯不共之力衆生如意菩薩何心崇通寺尼無疑道登等貴族出家梵筵上首乆積淨業三世皆空長在道場一乗自立亡兄故河南少尹雖明世典深達實相以不二法處于百官花萼相連恩深女弟栴檀舊繞望絶仁兄雖曰如夢無寧喪我煩惱性淨示有同凡之悲菩提路空强為助道之相選妓惟潔底功加敬針鋒線縷日就月將五彩相宣千光欲發金蓮捧足寳珠垂髻原夫審像于淨心成形于纖手像顧本作豫誤今校正珊瑚掌内疑現不動如來頻婆口中同乎無法可説焚香讚歎散花瞻仰有情苦業滅而不生無上法輪轉而恒寂願以此福冥用莊嚴乃為偈曰菩薩神力不思議能以一身遍一切常轉法輪無所轉衆生隨念得解脱色即是定非空有是故以色像觀音願以淨斯六趣福迴向過去不可得心量謂自心現量楞伽經觀諸有為法離攀縁所縁無心之心量我説為心量量者自性處縁性二俱離性究竟妙淨我説名心量如則不動金剛經不取于相如則不動陀羅尼法苑珠林陀羅尼者西天梵音東華人譯則云持也持善不失持惡不生翻譯名義陀羅尼大論秦言能持集種種善法能持令不散不失譬如好器盛水水不漏散惡不善根心生能遮令不生若欲作惡罪時持令不作是名陀羅尼肇翻總持謂持善不失持惡不生又翻遮持輔行云體遮三惑性持三智熏聞云遮二邊之惡持中道之善此從慧性立名三昧門大藏一覽三昧或云三摩提或云三摩地此云正定謂任縁一境離諸邪亂也亦云等持等正也正持心也持謂持諸功徳也翻譯名義三昧此云調直定又云正定亦云正受圭峰疏云不受諸受名為正受逺法師云夫稱三昧者專思寂想之謂也思專則志一不分想寂則氣虛神朗氣虚則智恬其照神朗則無幽不徹斯二乃是自然之元符用一而致用也是故靖恭閑宇而感物通靈御心惟正動必入微此假修以凝神積功以移性六臂楞嚴經觀世音菩薩白佛言由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寳覺故我能現衆多妙容能説無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寳目或慈或威或定或慧救䕶衆生得大自在無縁慈涅槃經慈有三縁一縁衆生二縁于法三則無縁衆生縁者縁于五隂願與其樂是名衆生縁法縁者縁諸衆生所須之物而施與之是名法縁無縁者縁于如來是名無縁慈者多縁貧窮衆生如來大師永離貧窮受第一樂若縁衆生則不縁佛法亦如是以是義故縁如來者名曰無縁世尊慈之所縁一切衆生如縁父母妻子親屬以是義故名曰衆生縁法縁者不見父母妻子親屬見一切法皆從縁生是名法縁無縁者不住法相及衆生相是名無縁十六觀經以無縁慈攝諸衆生王簡栖頭陀寺碑文唱無縁之慈而澤周萬物李善註夫行慈者以衆生為縁衆生為縁則慈無所寄故大士之慈離于衆相離相行慈名為無縁無縁生慈是為真實以斯而唱則物無不周涅槃經曰得諸菩薩無縁之慈僧肇論曰禪典唱無縁之慈思益演不知之知呂向註大事之慈空中而行空中行慈故為無縁之慈不共力維摩詰經大聖法王衆所歸淨心觀佛靡不欣各見世尊在其前斯則神力不共法上首涅槃經爾時有一恒河沙菩薩摩訶薩人中之龍位階十地安住不動方便現身其名曰海徳菩薩無盡意菩薩如是等菩薩摩訶薩而為上首復有二恒河沙等諸優婆塞受持五戒威儀具足其名曰威徳無垢稱王優婆塞善徳優婆塞等而為上首復有三恒河沙諸優婆夷受持五戒威儀具足其名曰夀徳優婆夷徳鬘優婆夷毘舍佉優婆夷等八萬四千而為上首淨業維摩詰經心淨已度諸禪定乆積淨業稱無量三世皆空華嚴經了知三世皆空寂雖明世典維摩詰經雖明世典常樂佛法深達實相維摩詰經彼上人者難為酬對深達實相善説法要如夢華嚴經應知世間諸行如夢菩提路華嚴經示我菩提路住佛正見地日就月將周頌日就月將學有緝熙于光明鄭康成箋日就月將言當習之以積漸也千光金光明經如日千光彌滿虚空淨心維摩詰經隨其心淨則一切功徳淨纖手陸機詩佳人撫琴瑟纖手清且閒不動如來華嚴經如來應正等覺示涅槃時入不動三昧頻婆口法華經如來唇色赤好如頻婆果無法可説金剛經須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故須菩提説法者無法可説是名説法無上法輪法華經我于伽耶城菩提樹下坐得成最正覺轉無上法輪涅槃經諸佛世尊凡有所説皆悉名為轉法輪也翻譯名義轉佛心中化他之法度入他心名轉法輪一身遍一切華嚴經如來能以一身自在變化徧一切世界不思議故六趣釋氏要覽五趣一天二人三地獄四畜生五餓鬼謂修羅四趣皆攝故今開為一趣故云六趣也趣者何義毘婆沙論云所往義是諸有情所應往結生之處故名趣也毘曇論云趣到義謂彼善惡業因能令有情到其生處又道義故名六道矣迴向法苑珠林迴向者回諸福徳向無上道給事中竇紹為亡弟故駙馬都尉于孝義寺浮圖畫西方阿彌陀變讚并序易曰游魂為變記曰魂氣則無不之固知神明更生矣輔之以道則變為妙身之于樂士大覺曰聖離妄曰性克修其業以正其命得無法者即六塵為淨域繫有相者憑十念以往生西方變者給事中竇紹敬為亡弟故駙馬都尉某官之所畫也天理之愛加人數等悲讓佞而無所痛殞身而莫贖傾無長之工不平分于我生將厚貸于泉路尚兹繪事滌彼染業寳樹成列金砂自映迦陵欲語曼陀未落墜此中年登乎上品池蓮寳座將踰棠棣之榮水鳥法音當悟鶺鴒之力讚曰生因妄念没有遺識憑化而遷轉身不息將免六趣惟兹十力哀此仁兄友于後生不知世界畢意經營傍熏獲悟自性當成竇紹按唐書宰相世系表有竇紹為給事荆府長史兄弟八人二曰綜三曰綸四曰繹為駙馬都尉衞尉卿五曰繽六曰績為奉先令七曰縯八曰級公主列傳𤣥宗女常山公主下嫁竇繹遊魂為變周易精氣為物游魂為變是故知鬼神之情狀孔穎達正義曰精氣為物者謂隂陽精靈之氣氤氲積聚而為萬物也游魂為變者物既積聚極則分散將散之時浮遊精魂去離物形而為改變則生變為死成變為敗或未死之間變為異類也若魂氣則無不之禮記骨肉復歸于土命也若魂氣則無不之也無不之也十念法苑珠林彌勒發問經云若欲樂生安養國者當修十念即得往生何等為十一者于一切衆生常生慈心二者于一切衆生不毁其行若有毁者終不往生三者于一切衆生深起悲心除殘害心四者發䕶法心不惜身命于一切法不生誹謗五者于忍辱中生決定心六者深心清淨不染利養七者發一切種智心日日常念無有廢忘八者于一切衆生生尊重心除憍慢心謙下言説九者于諸談話不生染著心近于覺意深起種種善根因縁不生憒閙散亂心十者常念觀佛除去諸相當知如是十念一一次第相續而起不生彼國無有是處釋氏要覽稱十念者即是念十聲阿彌陀佛觀經云臨終遇善知識教稱十聲阿彌陀佛得生第九品十疑論問云衆生造惡無量云何臨終十念成就即得往生出過三界結業答衆生造惡是有間心臨終念佛是無間心善心猛利故承佛願力故上品淨土化生凡有九品謂上品上生上品中生上品下生中品上生中品中生中品下生下品上生下品中生下品下生佛説觀無量夀佛經上品上生者若有衆生願生極樂國者發三種心即便往生何等為三一者至誠心二者深心三者迴向發願心具三心者必生彼國復有三種衆生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念迴向發願願生彼國具此功徳一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大衆無量諸天七寳宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身衆相具足見諸菩薩色相具足光明寳林演説妙法聞已即悟無生法忍經須臾間歴侍諸佛徧十方界于諸佛前次第受記還至本國得無量百千陀羅尼門上品中生者不必受持讀誦方等經典善解義趣于第一義心不驚動深信因果不謗大乘以此功徳迴向願求生極樂國行此行者命欲終時阿彌陀佛與觀世音大勢至無量大衆眷屬圍繞持紫金臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺合掌叉手讚歎諸佛如一念頃即生彼國七寳池中此紫金臺如大寳華經宿則開行者身作紫磨金色足下亦有七寳蓮花佛及菩薩俱時放光照行者身目即開明因前宿習普聞衆生純説甚深第一義諦即下金臺禮佛合掌讚歎世尊經于七日應時即于阿耨多羅三藐三菩提得不退轉即能飛行徧至十方歴侍諸佛于諸佛所修諸三昧經一小劫得無生忍現前授記上品下生者亦信因果不謗大乗但發無上道心以此功徳迴向願求生極樂國行者命欲終時阿彌陀佛及觀世音大勢至與諸眷屬持金蓮花化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝見此事時即自見身坐金蓮華坐已華合隨世尊後即得往生七寳池中一日一夜蓮華乃開七日之中乃得見佛雖見佛身于衆相好心不明了于三七日後乃了了見聞衆音聲皆演妙法遊歴十方供養諸佛于諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者棠棣詩小雅棠棣之華鄂不韡韡凡今之人莫如兄弟水鳥法音佛説觀無量夀佛經極樂國土有八池水一一池水七寳所成其寳柔輭從如意珠王生分為十四支一一支作七寳色黄金為渠渠下皆以雜色金剛以為底沙一一水中有六十億七寳蓮華一一蓮華團圓正等十二由旬其摩尼水流注華間尋樹上下其聲微妙演説苦空無常無我諸波羅蜜復有讚歎諸佛相好者如意珠王涌出金色微妙光明其光化為百寳色鳥和鳴哀雅常讚念佛念法念僧是為八功徳水想鶺鴒詩小雅鶺鴒在原兄弟急難熏釋氏要覽熏義者顯識論云譬如燒香熏衣香體滅而香氣在衣此香不可言有體滅故不可言無香氣在衣故宗鏡録熏習義者如世衣服非臭非香隨以物熏則有彼氣真如淨法性非是染無明熏故則有染相無明染法實無淨業真如熏故説有淨用自性楞伽經自性無垢畢竟清淨為相國王公紫芝木瓜讚并序孝悌之至通于神明天為之降和地為之嘉植發書占之推理可得何者人心本于元氣元氣被于造物心善者氣應氣應者物美故呈祥于魚鳥或發揮于草木示神明之陰隲與天地之嘉㑹今中書侍郎相公先生左丞府君沈潛上徳遐尚絶軌江海漭沆嬰孩杏壇高門長軌隱几含素葢鳳凰之高逝薄龍虎之逶迤積有淳徳誕敷餘慶而我相公生而英姿河目海口量與太素而無端倪應㑹神速動若發括事遣理盡澹然虚空亦猶太清雲無處所重元之㫖達而有餘奥大白之明漫而不及理文可以經邦訓俗武可以保大定功故天子咨之以布元化昔者高堂既聞聞字疑誤扇枕無所歐血長號禮不能制其哭泣之度終身巨痛時無以加其霜露之惕攻苦食淡寢苫枕塊淚少于血骨餘于形風淚起而裂其心鳥悲鳴而感其哭俄而紫芝生棟葉成仙人之葢色奪齊侯之衣又有木瓜在林味若楚王之萍大如安期之棗枯物無生物之理而布濩滋蔓時果有常分之形而碩大殊亢鄰里駭之郡縣聞之公泣而不敢言州司遽表以獻或曰因心而致人之祥也或曰率土所生國之瑞也有識君子曰至孝所感物為人之祥大賢佐時人為國之瑞二物者雖感曩時之純至亦符今日之崇高也公尤不敢當歸美于今上以為震位先兆孝徳動天至乾元二年乃畫圖以進詔報曰芝草者延夀之徴也木瓜者投報之應也葢至誠所感有開必先朕與卿道契雲龍義同水石位崇台衮寄重股肱故得嘉瑞薦臻靈物昭格君臣同徳區宇克寧覽其進圖可為嘉應請宣付史館者既依史䇿亦藏書府讚曰紫芝三秀則生于梁木瓜一實其大盈筐嘉應薦至其故何祥哀哀孝思漣漣泣血終身致毁每慟將絶雲為徘徊風為慘切依仁據徳移孝為忠經目盡理任心便公其道橐籥虚而不窮公位先兆聖人斯覩賜以詔書藏之祕府邦家之光哀榮終古相國王公按唐書宰相表乾元元年五月乙未太常少卿王璵為中書侍郎同中書門下平章事二年三月乙未璵罷為刑部尚書宰相世系表璵乃王方慶六世孫祖仲連揚州録事參軍父紹不仕絶軌孫綽遊天台山賦追羲農之絶軌躡二老之元蹤漭沆張衡西京賦顧臨太液滄池漭沆薛綜註漭沆猶洸潒寛大也杏壇莊子孔子遊乎緇帷之林休坐乎杏壇之上河目海口孔叢子萇𢎞語劉文公曰吾觀孔仲尼有聖人之表河目而隆顙黄帝之形也家語孔子適鄭與弟子相失獨立郭東門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙王肅註河目上下匡平而長也孝經援神契孔子海口言若含澤斗脣吐教陳機授度大白老子上徳若谷大白若辱保大定功見十七巻七徳註中巨痛晉書謝尚傳抱傷心之巨痛懐忉怛之至戚霜露之惕禮記霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之寢苫枕塊禮記父母之喪居倚廬寢苫枕塊不説絰帶齊侯衣韓非子齊桓公好服紫一國盡服紫當是時也五素不得一紫楚王萍家語楚昭王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問羣臣莫之能識王使使聘于魯問于孔子子曰此所謂萍實者也可剖而食之吉祥也唯霸者為能獲焉使者返王遂食之大美乆之使來以告魯大夫大夫因子遊問曰夫子何以知其然曰吾昔之鄭過乎陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是楚王之應也吾是以知之布濩封禪書匪唯偏我汜布濩之師古註布濩言遍布也延夀古瑞命記曰王者慈仁則芝生採食之則延年不終與真人同論衡芝草延年仙者所食投報國風投我以木瓜報之以瓊琚匪報也永以為好也有開必先禮記耆欲將至有開必先水石李蕭逺運命論張良受黄石之符誦三畧之説以游于羣雄其言也如以水投石莫之受也及其遭漢祖也其言也如以石投水莫之逆也台衮北史揚雄傳論位登台衮慶流後嗣漣漣國風泣涕漣漣橐籥老子天地之間其猶橐籥乎虛而不屈動而愈出河上公註天地空虛和氣流行萬物自生其空虚猶橐籥動而搖之益出聲邦家之光小雅樂只君子邦家之光終古楚辭春蘭兮秋菊長無絶兮終古皇甫岳寫真讚有道者古其神則清雙眸朗暢四氣和平長江月影太華松聲周而不器獨也難名且未婚嫁猶寄簪纓燒丹藥就辟穀將成雲溪之下法本無生雲劉本顧可乆本俱作漢誤裴右丞寫真讚澹爾清徳居然素風氣和容衆心靜如空智以窮理才包至公大盜振駭羣臣困䝉忘身狥節歴險能通仁者之勇義無失忠凝情取象惟雅則同粉繪不及清明在躬麟閣之上其誰比崇困䝉本周易䝉卦清明在躬禮記清明在躬氣志如神正義曰清謂清靜明謂顯著言聖清靜光明之徳在于躬身王右丞集箋注巻二十
