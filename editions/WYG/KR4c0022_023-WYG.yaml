body:
  text: 王右丞集箋注巻二十三仁和趙殿成撰碑二首故右豹韜衛長史賜丹州刺史任君神道碑右一本作左君諱某字某其先奚仲之後于周為上卿周疑是殷字或商字之訛世有功列于諸侯氏則任鬱為著族後有官于京兆者子孫因家焉今為萬年縣人也逺祖某漢河東太守曾祖某周清河太守先復舊職先疑是克字之訛異世而同符祖某隋梁州南鄭縣令父某皇石州離石縣令不墜象賢一門而二鳬舄皆為政以德遺愛在人能髙其門必有興者雖不當代果生達人君離石府君之第某子也膺一賢之期鍾累葉之善忠孝自得稟乎天姿詩禮輔成潤以庭訓文含四始雕蟲之技附庸武有七德啼猿之術居外明經者皓首弱嵗成儒達法者腐脣端居曉吏以鄉貢明經擢第解褐益州新都尉居無何丁母憂廬以長號淚少于血杖而後起骨餘于形彈琴不成從先王之禮捧筐便慟有終身之哀服闋授左金吾衛兵曹參軍轉左衛錄事參軍又遷右豹韜衛長史王樂為用率武夫以扞城人愛其才稱君子之為衛方將冠章甫之冠衣縫掖之衣奏議雲臺論政赤墀一見天子必為之前席三説大臣必為之解印若端委以相六合盡宅心于帝庭授鉞以董八蠻可傳首于魏闕然後挂冠東郡拂衣五湖郡當是都字之訛髙蹈烟虹笑謝珪組天命不祐沮我良策春秋若干以某年月日寢疾卒于永興里第某年月日𦵏于京兆神禾原禮也禾舊本作和非嗣子曰某善繼先志克成厥家多藝多才安英實選匪為名寶十城之價不以力聞萬夫之敵命同御座漢帝以恩待故人超將中軍先軫以才登元帥以某年月日從駕謁五陵天子若曰自古明王王舊本作三非因心以孝待人由已以施物故休戚共憂樂同也其贈羽林將軍任某父使持節丹州諸軍事丹州刺史敬其事則命以始寵其身以及其親明主所以盡心忠臣所以盡力故羊舌職悦是賞也陳力異代官成聖朝修文下泉名在天爵前賢隂德雖遺慶于後昆嗣子揚名乃大顯于先父養則致樂没而有稱昔也為士享惟將軍之食今則典邦𦵏亦諸侯之禮皇帝命之太史書之報昊天之恩曾舉世未有豈與夫手樹行檟躬廬長松負土成墳傭身以𦵏匹夫之孝同年而語哉君少有大略長而能賢安于仁樂于善厚生以儉守智以愚視事所及筆硯盈庭其力文也容膝之外圖書滿屋其嗜學也八體之能右軍曾未知翰五弦之妙中散何擅于琴以禮庇身以清守官惟邦之彥惟國之翰夫人河東裴氏始以某為光禄也封河東郡君及是又贈河東郡太君子之忠由母之教母以子貴不亦宜乎司文者執簡以往刋石旌德其詞曰薛侯之裔兮代濟其美不隕其名是生碩德兮為世作程忠不祐孝不福兮早謝休名身為士兮子為卿大將羽林兮綂天兵大顧本作文誤今校正天子寵兮為崇榮贈我武符兮賜我專城青松寂寂兮晝無人聲狗不吠兮雞不鳴蒼茫千古兮孰云旌賴孝子兮揚音英豹韜衛唐六典左右威衛光宅元年改為左右豹韜衛神龍元年復為左右威衛有長史各一人從六品上丹州唐書地理志闗内道有丹州咸寧郡奚仲之後唐書宰相世系袁任姓出自黄帝少子禹陽受封于任因以為姓十二世孫奚仲為夏車正更封于薛又十二世孫仲虺為湯左相大戊時有臣扈武丁時有祖已皆徙國于邳祖已七世孫成侯又遷于摰亦謂之摰國漢有御史大夫廣阿侯任敖世居于沛其後徙居渭南萬年縣按唐書地理志京兆府有萬年縣離石縣按唐書地理志河東道石州有離石縣象賢禮記繼世以立諸侯象賢也鄭康成註賢者子孫恒能法其先父德行遺愛在人晉書樂廣所在為政無當時功譽然每去職遺愛為人所思南史蕭引傳吾宗再世為始興郡遺愛在人髙門漢書于定國父于公其閭門壞父老方共治之于公謂曰少髙大門閭令容駟馬髙葢車我治獄多隂德未嘗有所寃子孫必有興者至定國為丞相永為御史大夫封侯傳世云一賢員半千傳五百嵗一賢者生四始子夏詩序是謂四始詩之至也孔穎達正義四始者鄭答張逸云風也小雅也大雅也頌也此四者人君行之則為興廢之則為衰又箋云始者王道興衰之所由然則此四者是人君興廢之始故謂之四始也雕蟲法言或問吾子少而好賦曰然童子雕蟲篆刻俄而曰壯夫不為也啼猿淮南子楚王有白猿王自射之則搏矢而熈使養由基射之始調弓矯矢未發而猿擁柱號矣弱嵗江總讓尚書令表臣弱嵗立朝本無竒志杖而後起禮記君子之執親之喪也水漿不入于口者三日杖而後能起彈琴不成禮記子夏既除喪而見與之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而勿敢過也左金吾衛兵曹參軍唐六典左金吾衛有兵曹參軍事二人正八品下左衛錄事參軍唐六典左衛録事參軍事一人正八品上扞城周南﨣赳武夫公侯干城毛萇傳干扞也晉書桓溫傳贊受寄扞城用恢威略君子為衛晉書劉超遷射聲校尉時軍校無兵義興人多義隨超因綂其衆以宿衛號為君子營章甫之冠縫掖之衣禮記孔子對曰丘少居魯衣縫掖之衣長居宋冠章甫之冠鄭康成註逢猶大也大掖之衣大袂禪衣也此君子有道藝者所衣也前席漢書文帝思賈誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席師古曰漸促近誼聽説其言也解印用史記蔡澤説范睢事端委左傳吾與子弁冕端委以治民臨諸侯杜預註弁冕冠也端委禮衣也宅心陸機漢髙祖功臣頌萬邦宅心駿民効足李周翰註宅居也言天下之人懷髙祖寛仁之德常居于心劉琨勸進表純化既敷則率土宅心義風既暢則遐方企踵皆作歸心解雖同用周書宅心知訓語而訓異也授鉞淮南子凡國有難君自宫召將詔之曰社稷之命在將軍即今國有難願請子將而應之將軍受命乃令祝史太卜齋宿三日之太廟鑽靈龜卜吉日以受鼓旗君入廟門西面而立將入廟門趨至堂下北面而立主親操鉞持頭授將軍其柄曰從此上至天者將軍制之復操斧持頭授將軍其柄曰從此下至淵者將軍制之將已受斧鉞答曰國不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣既以受制于前矣鼓旗斧鉞之威臣無還請願君亦以垂一言之命于臣也君若不許臣不敢將君若許之臣辭而行八蠻孔穎達禮記正義南方曰蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也其類有八李巡註爾雅云一曰天竺二曰咳首三曰僬僥四曰跂踵五曰穿胸六曰儋耳七曰狗軹八曰旁春挂冠後漢書時王莽殺其子宇逢萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客于遼東拂衣五湖謝靈運詩髙揖七州外拂衣五湖裏烟虹鮑照詩蚌節流綺藻輝石亂烟虹珪組晉書張軌傳綰累葉之珪組賦絶域之琛寶十城之價庾信詩名髙六國共價重十城連不以力聞列子孔子之勁能拓國門之闗而不肯以力聞萬夫之敵三國志闗羽張飛皆稱萬人之敵為世虎臣漢帝晉書王導傳帝登尊號百官陪列命導升御牀共坐導固辭至于三四曰若太陽下同萬物蒼生何由仰照帝乃止漢字疑誤先軫左傳晉卻縠卒原軫將中軍胥臣佐下軍上德也杜預註先軫以下軍佐超將中軍故曰上德五陵唐㑹要髙祖𦵏獻陵在京兆府三原縣界太宗𦵏昭陵在京兆府醴泉縣界髙宗𦵏乾陵在京兆府奉天縣界中宗𦵏定陵在京兆府富平縣界睿宗𦵏橋陵在京兆府奉先縣界羽林將軍唐書百官志左右羽林軍將軍各三人從三品命以始左傳故敬其事則命以使服其身則衣之純羊舌職左傳晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣曰吾獲狄土子之功也㣲子吾喪伯氏矣羊舌職説是賞也曰周書所謂庸庸祇祇者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫載周能施也率是道也其何不濟修文王隠晉書蘇韶死而甦云顔淵卜商為地下修文郎昊天詩小雅欲報之德昊天罔極負土成墳後漢書祭遵喪母負土起墳晉書山濤年踰耳順居喪過禮負土成墳手植松柏傭身以𦵏搜神記漢董永千乗人少偏孤與父居肆力田畝鹿車載自隨父亡無以𦵏乃自賣為奴以供喪事主人知其賢與錢一萬遣之永行三年喪畢欲還主人供其奴職道逢一婦人曰願為子妻遂與之俱主人謂永曰以錢與君矣永曰蒙君之惠父喪收藏永雖小人必欲服勤致力以報厚德主曰婦人何能永曰能織主曰必爾者但令君婦為我織縑百疋于是永妻為主人家織十日而畢女出門謂永曰我天之織女也緣君至孝天帝令我助君償債耳語畢凌空而去不知所在守智以愚家語聰明睿知守之以愚容膝歸去來辭倚南牕以寄傲審容膝之易安八體晉書自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書中散臧榮緒晉書嵇康字叔夜譙國人也少有竒才博覽經籍無所不見拜中散大夫嵇康琴賦衆器之中琴德最優故綴叙所懷以為之賦惟邦之彥詩彼其之子邦之彥兮毛萇傳彥士之美稱惟國之翰詩維申及甫維周之翰毛萇傳翰榦也鄭康成箋申伯甫侯皆以賢知入為周之楨榦之臣母以子貴公羊傳子以母貴母以子貴執簡以往左傳南史氏聞太史盡死執簡以往聞既書矣乃還碩德晉書索襲傳索先生碩德名儒真可以諮大義為世作程蔡邕陳太丘碑文含光醇德為士則程劉良註程法也武符唐人以諱謂虎為武武符即虎符也漢書文帝紀初與郡守為銅虎符竹使符狗不吠雞不鳴漢書燕王旦自歌曰歸空城兮狗不吠雞不鳴橫衍何廣廣兮固知國中之無人大唐故臨汝郡太守贈祕書監京兆韋公神道碑銘坑七族而不顧赴五鼎而如歸徇千載之名輕一朝之命烈士之勇也隠身流涕獄急不見南冠而縶遜詞以免北風忽起刎頸送君智士之勇也種族其家則廢先君之嗣戮辱及室則累天子之姻非茍免以全其生思得當有以報漢棄身為餌俛首入槖偽就以亂其謀佯愚以折其僭謝安伺桓温之亟蔡邕制董卓之邪然後吞藥自裁嘔血而死仁者之勇夫子為之公諱某字某京兆杜陵人也昔豕韋氏主盟于商後扶陽侯重世相漢髙祖某官父某某官並勲德茂著史牒詳焉牒顧本作諜誤今校正公即文貞公之仲子也初以宰相子弁髦署吏抱拜授封加朝散大夫封平樂郡公累拜某官丁文貞公憂又丁某國夫人憂無容顧禮殆不勝喪終身之痛厯稔猶毁幼無童心長積純氣抱其天素立于人紀先聖㣲言宿儒未辨貫穿精義總括旁説文言蔚于興表筆態奼于力外子虚上林敢云雄似黃庭團扇方議雁行鶴氅乏姿羊車奪映乏顧本誤作之今校正會選公壻詔婚王室天家熀燿獨任素風時論騰躍宜在右職乃拜中書舍人動翔鳳之詠啟迪古詩下流水之書敦崇雅誥轉太常少卿六宗九奏悉具其儀天神地祇可得而禮俄入覲累貶巴陵太守入覲疑是以親二字之訛稍遷壽春太守又遷臨汝太守其理務教訓其政尚寛簡謂其叙在六官又踐三事疇咨帝載必歌九功之德式和人則必復三代之英天子避其用親奸臣惡其異己馮衍竟廢揚雄不遷抑古人而有之何夫子之命也逆賊安禄山吠堯之犬驅彼六騾憑武之狐猶威百獸藉天子之寵稱天子之官徴天子之兵逆天子之命始反幽薊稍逼温洛云誅君側尚惑人心列郡無備百司安堵變折衝為賊矣兼法令而盜之將逃者已落彀中謝病者先之死地密布羅網遥施陷穽舉足便跌奮飛即挂智不能自謀勇無所致力賊使其騎劫之以兵署之以職以孥為質遣吏挾行公潰其腹心候其間隙義覆元惡以雪大恥嗚呼上京既駭法駕大遷天地不仁穀洛方鬭鑿齒入國磨牙食人君子為投檻之猨小臣若喪家之狗偽疾將遁以猜見囚勺飲不入者一旬穢溺不離者十月白刃臨者四至赤棒守者五人刀環築口㦸枝叉頸縛送賊庭實賴天幸上帝不降罪疾逆賊恫瘝在身無暇戮人自憂為厲公哀予㣲節私予以誠推食飯我致館休我畢今日歡泣數行下示予佩玦斫手長吁座客更衣附耳而語指其心曰積憤攻中流痛成疾猥不見戮專車之骨梟枕鼓之頭焚骸四衢然臍三日見子而死知予此心至明日而卒某年月日絶于洛陽某之私第以某月日返𦵏于某原禮也皇帝中興悲憐其意下詔褒美贈祕書監天下之人謂之賞不失德矣公敦穆孝友明允篤誠髙居化源濡跡物軌元昆曰陟伯與仲居愛之欲無方視之若不足薄其私而厚其室抑謙已而讓其名故有靈芝聳葢嘉木連理時人以為孝悌之祥而公昆季謙而不以聞也維穉弱之契晩年彌篤吾實知之能言者乃為銘曰銘亡臨汝郡按唐書地理志汝州臨汝郡屬河南道韋斌按劉昫唐書韋斌韋安石之子也景雲初安石為宰輔時授太子通事舍人早修整尚文藝容止嚴厲有大臣體與兄陟齊名開元十七年司徒薛王業為女平恩縣主求婚以斌才地奏配焉遷祕書丞天寶初轉國子司業徐安貞王維崔顥當代辭人特為推挹天寶中拜中書舍人兼集賢院學士兄陟先為中書舍人未幾遷禮部侍郎陟在南省斌又掌文誥改太常少卿天寶五載右相李林甫構陷刑部尚書韋堅斌以親累貶巴陵太守移臨汝太守加銀青光禄大夫斌授五品時兄陟為河東太守堂兄由為右金吾將軍縚為太子少師四人同時列㦸衣冠之盛罕有其比十四載安禄山反陷洛陽斌為賊所得偽授黃門侍郎憂憤而卒及尅復兩京肅宗乾元元年贈祕書監坑七族史記鄒陽傳荆軻之湛七族要離之燔妻子張晏曰七族上至曾祖下至曾孫赴五鼎新序佛肸以中牟叛置鼎于庭致士大夫曰與我者受邑不吾與者烹大夫皆從之至于田卑田卑中牟之邑人也曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹褰衣將就鼎佛肸脱屨而生之漢書主父偃傳丈夫生不五鼎食死則五鼎烹耳師古曰五鼎烹謂被鑊烹之誅獄急漢書朱建母死貧未有以發喪方假貸服具辟陽侯乃奉百金裞列侯貴人以辟陽侯故往賻凡五百金久之人或毁辟陽侯惠帝大怒下吏欲誅之大臣多害辟陽侯行欲遂誅之辟陽侯困急使人欲見建建辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺于是閎籍孺從其計言帝帝果出辟陽侯辟陽侯之囚欲見建建不見辟陽侯以為背之大怒及其成功出之大驚南冠左傳晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也刎剄送君用侯嬴事詳見六巻夷門註種族其家漢書蕭曹等皆文吏自愛恐事不就後秦種族其家師古註誅及種族也報漢漢書李陵提步卒不滿五千深輮戎馬之地抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬭千里矢盡道窮士張空拳冒白刃北首爭死敵得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴于天下彼之不死宜欲得當以報漢也師古註言欲立功以當其罪也入橐漢書范雎魏之亡命也折脅拉髂免于徽索翕肩蹈背扶服入槖激卬萬乘之主界涇陽抵穰侯而代之謝安晉書孝武帝富于春秋政不自已桓温威振内外人情噂􅊱互生同異謝安與王坦之盡忠匡翼終能輯穆及温病篤諷朝廷加九錫使袁宏具草安見輒改之由是歴旬不就㑹温薨錫命遂寢蔡邕後漢書董卓為司空聞蔡邕名髙辟之邕不得巳到署祭酒甚見敬重舉髙第補侍御史又轉侍書御史遷尚書三日之間周歴三臺遷巴郡太守復留為侍中初平元年拜左中郎將從獻帝遷都長安封髙陽鄉侯董卓賓客部曲議欲尊卓比太公稱尚父卓謀之于邕邕曰太公輔周受命翦商故特為其號今明公威德誠為巍巍然比之尚父愚意以為未可宜須闗東平定車駕還反舊京然後議之卓從其言初平二年六月地震卓以問邕邕對曰地震者隂盛侵陽臣下踰制之所致也前春郊天公奉引車駕乗金華青葢𤓰畫兩轓逺近以為非宜卓于是改乗皁葢車卓重邕才學厚相遇待每集讌輒令邕鼔琴贊事邕亦每存匡益豕韋氏唐書宰相世系表韋氏出自風姓顓頊孫大彭為夏諸侯少康之世封其别孫元哲于豕韋其地滑州韋城是也豕韋大彭迭為商伯周赧王時始失國徙居彭城以國為氏扶陽侯漢書韋賢代蔡義為丞相封扶陽侯食邑七百户少子元成復以明經歴位為丞相文貞公唐書韋安石京兆萬年人舉明經累官中書令封郇國公卒天寶初加贈左僕射諡文貞弁髦左傳豈如弁髦而因以敝之孔穎達正義云弁謂緇布冠髦謂童子垂髦凡加冠之禮先用緇布之冠歛括垂髦三加之後去緇布之冠不復更用故云因以敝之右丞用其字葢取始冠之義朝散大夫唐六典敘階從五品下曰朝散大夫不勝喪後漢書桓麟母終麟不勝喪未祥而卒成按禮記云居喪之禮頭有創則沐身有痬則浴有病則飲酒食肉疾止復初不勝喪乃比于不慈不孝鄭康成註云勝任也孔穎達正義云不勝喪乃比于不慈不孝者結所以沐浴酒肉之義也不勝喪謂疾不食酒肉創痬不沐浴毁而滅性者也不留身繼世是不慈也滅性又是違親生時之意故云不孝不云同而云比者此滅性本心實非為不孝故言比也後人以不勝喪為孝子之美稱則失之矣毁禮記居喪之禮毁瘠不形孔穎達正義毁瘠羸瘦也形骨露也骨為人形之主故謂骨為形也居喪乃許羸瘦不許骨露見也天素零陵先賢傳諸葛亮謂劉巴曰足下雖天素髙亮宜少降意也人紀商書伊訓先王肇修人紀宿儒後漢書故司空掾桓梁宿儒盛名冠德州里雄似漢書揚雄傳孝成帝時客有薦雄文似相如者上方郊祠甘泉㤗畤汾隂后土以求繼嗣召雄待詔承明之庭黃庭白氏六帖右軍王羲之嘗見山隂道士有羣鵝求之人邀右軍書黃庭經以換遂書之雁行晉書王羲之每自稱我書比鍾繇當抗行比張芝草猶當雁行也書史㑹要韋斌以行草著名書小史韋斌善隸書鶴氅世説孟昶未達時家在京口嘗見王恭乗髙輿被鶴氅裘于時㣲雪昶于籬間窺之嘆曰此真神仙中人羊車晉書衛玠總角乗羊車入市見者皆以為玉人觀之者傾都翔鳳之詠謝朓直中書省詩兹言翔鳳池鳴珮多清響啟迪啟迪開道也借用商書太甲篇中字流水之書史記下令如流水之源令順民心故論卑而易行太常少卿唐六典太常少卿正四品上六宗舜典禋于六宗孔安國傳宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也孔穎達正義云宗之為尊常訓也名曰六宗明是所尊祭者有六但不知六者為何神耳祭法云埋少牢于太昭祭時相近于坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱也據此言六宗彼祭六神故傳以彼六神謂此六宗必謂彼之所祭是此六宗者彼文上有祭天祭地下有山谷丘陵此六宗之文在上帝之下山川之上二者次第相類故知是此六宗王肅亦引彼文乃云禋于六宗此之謂矣鄭𤣥註彼云四時謂隂陽之神也然則隂陽寒暑水旱各自有神此言禋于六宗則六宗常禮也禮無此文不知以何時祀之鄭以彼皆為祈禱之祭則不可用鄭𤣥註以解此傳也漢世以來説六宗者多矣歐陽及大小夏侯説尚書皆云所祭者六上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗為乾坤六子水火風雷山澤也賈逵以為六宗者天宗三日月星辰地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此其謂六也鄭𤣥以六宗言禋與祭天同名則六者皆是天之神祇謂星辰司中司命風師雨師星謂五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉初幽州秀才張髦上表云臣謂禋于六宗祀祖考所尊者六三昭三穆是也司馬彪又上表云厯難諸家及自言已意天宗者日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗四時五帝之屬惟王肅據家語六宗與孔同各言其志未知孰是司馬彪續漢書云安帝元初六年立六宗祠于洛陽城西北亥地祀比大社魏亦因之晉初荀覬定新祀以六宗之神諸説不同廢之摰虞駁之謂宜依舊近代以來皆不立六宗之祠也天神地祇周禮凡樂圜鍾為宫黃鍾為角太簇為徴姑洗為羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徵南宫為羽靈鼔靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣巴陵按唐書地理志岳州巴陵郡隸江南西道壽春按唐書地理志壽州壽春郡隸淮南道六官鄭康成周禮註太宰司徒宗伯司馬司寇司空為六官疇咨虞書疇咨若時登庸孔安國傳疇誰也帝載虞書舜曰咨四岳有能奮庸熈帝之載孔安國傳載事也九功之德左傳夏書曰戒之用休董之用威勸之以九歌勿使壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府正德利用厚生謂之三事式和人則周書君牙宏敷五典式和民則孔安國傳大布五常之教用和民令有法則三代之英禮運大道之行也與三代之英丘未之逮也而有志焉馮衍後漢書鮑永馮衍審知更始巳殁乃共罷兵幅巾降于河内帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜頃之帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毁故賞不行建武六年日食衍上書陳八事帝將召見初衍為狼孟長以罪摧陷大姓令狐略是時略為司空長史讒之于尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也䕶等懼之即共排間衍遂不得入後衛尉隂興新陽侯隂就以外戚貴顯深敬重衍衍遂與之交結由是為諸王所聘請尋為司隸從事帝懲西京外戚賔客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪常自詣獄有詔赦不問西歸故郡閉門自保不敢復與親故通建武末上書自陳猶以前過不用顯宗即位又多短衍以文過其實遂廢于家揚雄漢書揚雄除為郎給事黄門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官安禄山通鑑安禄山專制三道隂蓄異志殆將十年以上待之厚欲俟上晏駕然後作亂㑹楊國忠與禄山不相悦屢言禄山且反上不聽國忠數以事激之欲其速反以取信于上禄山由是決意遽反詐為勅書悉召諸將示之曰有密旨令禄山將兵入朝討楊國忠諸軍宜即從軍衆愕然相顧莫敢異言十一月甲子禄山發所部兵及同羅奚契丹室韋凡十五萬衆號二十萬反于范陽諸將皆引兵夜發詰朝禄山出薊城南大閲誓衆以討楊國忠為名牓軍中曰有異議扇動軍人者斬及三族于是引兵而南禄山乘鐵轝步騎精鋭烟塵千里鼓譟震地時海内久承平百姓累世不識兵革猝聞范陽兵起逺近震駭河北皆禄山綂内所過州縣望風瓦解守令或開門出迎或棄城竄匿或為所擒戮無敢拒之者十二月丁亥禄山陷靈昌郡庚寅陷陳留癸巳陷滎陽聲勢益張以其將田承嗣安忠志張孝忠為前鋒封常清所募兵皆白徒未更訓練屯武牢以拒賊賊以鐵騎蹂之官軍大敗常清收餘衆戰于葵園又敗戰上東門内又敗丁酉禄山陷東京賊鼔譟自四門入縱兵殺掠常清戰于都亭驛又敗退守宣仁門又敗乃自苑西壞牆西走河南尹達奚珣降于禄山臨汝宏農濟隂濮陽雲中郡皆降于禄山至德元載春正月乙夘朔禄山自稱大燕皇帝改元聖武六月辛夘乾祐進攻潼闗克之于是河東華隂馮翊上洛防禦使皆棄郡走所在守兵皆散是日哥舒翰麾下來告急上不時召見及暮平安火不至上始懼壬辰召宰相謀之楊國忠首唱幸蜀之䇿上然之癸已國忠集百官于朝堂惶懅流涕問以䇿略皆唯唯不對仗下士民驚擾奔走不知所之市里蕭條甲午百官朝者什無一二上御勤政樓下制云欲親征聞者皆莫之信乙未黎明上獨與貴妃姊妹皇子妃主皇孫楊國忠韋見素魏方進陳元禮及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去是日百官猶有入朝者至宫門猶聞漏聲三衛立仗儼然門既啓則宫人亂出中外擾攘不知上所之于是王公士民四出逃竄山谷吠堯犬漢書鄒陽傳桀之犬可使吠堯跖之客可使刺由六騾漢書霍去病傳單于視漢兵多而士馬尚彊而匈奴不利薄暮單于遂乗六騾壯騎可數百直冒漢圍西北馳去憑武狐戰國䇿荆宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如江乙對曰虎求百獸而食之得狐狐曰子無敢食我也天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏已而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也君側公羊傳晉趙鞅取晉陽之甲以逐茍寅與士吉射荀寅與士吉射者曷為者也君側之惡人也此逐君側之惡人曷為以叛言之無君命也元惡周書康誥元惡大憝孔安國傳大惡之人上京班孟堅幽通賦皇十紀而鴻漸兮有羽儀于上京法駕蔡邕獨㫁天子出車駕次第謂之鹵簿有大駕有小駕有法駕法駕公卿不在鹵簿中唯河南尹執金吾洛陽令奉引侍中參乘奉車郎御屬車三十六乘天地不仁晉書載記天地不仁助寇為虐穀洛方鬭國語靈王二十二年穀洛鬭將毁王宫韋昭註穀洛二水名鬭者兩水格有似于鬭洛在王城之南穀在王城之北東入于瀍至靈王時穀水盛出于王城之西而南流合于洛水毀王城西南將及王宫鑿齒山海經羿與鑿齒戰于壽華之野羿射殺之在崑崙墟東羿持弓矢鑿齒持盾郭璞註鑿齒亦人也齒如鑿長五六尺因以名云淮南子堯之時猰㺄鑿齒九嬰大風封豨修蛇皆為民害堯乃使羿誅鑿齒于疇華之野殺九嬰于凶水之上繳大風于青邱之澤髙誘註鑿齒獸名齒長三尺其狀似鑿下徹頷下而持戈盾揚雄長楊賦昔有彊秦封豕其士窫窳其民鑿齒之徒相與磨牙而爭投檻猿淮南子置猿檻中則與豚同非不巧捷也無所肆其能也喪家狗家語纍然如喪家之狗王肅註云喪家之狗主人哀荒不見飲食故纍然而不得意孔子生于亂世道不得行故纍然是不得意之貌也恫瘝周書恫瘝乃身孔安國傳云恫痛也瘝病也畢今日歡漢武蘇武傳自分已死久矣王必欲降武請畢今日之驩效死于前泣數行下漢書蘇武傳李陵泣下數行因與武決專車骨國語昔禹致羣神于㑹稽之山防風氏後至禹殺而戮之其骨節專車枕鼔漢書王莽傳夙夜連率韓博士言有竒士長丈大十圍来至臣府曰欲奮撃邊冦自謂巨母霸出于蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝卧則枕鼓以鐵箸食焚骸四衢裴松之三國志註魏略曰孟達被圍旬有六日而敗焚其首于洛陽四達之衢然臍三日後漢書王允與吕布及僕射孫士瑞謀誅董卓使皇甫嵩攻卓弟旻于郿塢殺其母妻男女盡滅其族乃尸卓于市天時始熱卓素充肥脂流于地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之于路賞不失德左傳舉不失德賞不失勞明允篤誠左傳齊聖廣淵明允篤誠杜預註允信也篤厚也王右丞集箋注巻二十三
